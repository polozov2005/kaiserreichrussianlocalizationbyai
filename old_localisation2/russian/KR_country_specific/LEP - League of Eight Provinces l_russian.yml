 #榮宗敬
 LEP_rong_zongjing: "Жун Цзунцзин"
 LEP_rong_zongjing_bio: "Знаменитый "мучной король" Шанхая, Жун Цзунцзян в юном возрасте поступил в частную школу, а затем стал подмастерьем в шанхайском банке. В 1890 году Жун стал управляющим банка "Гуаншэн", основанного его отцом Жун Ситаем и несколькими друзьями. В 1900 году Жун использовал возможности, открывшиеся после вторжения союзных войск Восьми держав в Северный Китай, чтобы вместе с братом перевезти на север гигантское количество муки, что привело к огромному накоплению богатства.\n\n Используя полученную прибыль, Жун Цзунцзин и Жун Дешэн открыли мукомольный завод в Маосине, а в 1907 году собрали средства для строительства новой хлопковой фабрики в Уси. В 1912 году он основал мукомольную фабрику Фусинь в Шанхае и наблюдал за ее огромным ростом, вызванным прекращением импорта иностранного продовольствия во время Великой войны. В 1916 году он снова основывает хлопчатобумажную фабрику, Shanghai Shenxin Cotton Mill. В 1922 году империя братьев Жун охватывала 12 мукомольных заводов, на которые приходилась треть производственных мощностей мукомольных предприятий страны.\n\nПереживая период убытков, братья начали реформировать управление, повышая эффективность производства и интенсивность труда рабочих. После очередного бойкота иностранных товаров прибыль братьев Жун снова возросла, однако в 1926 году их империя оказалась под угрозой Северного похода. Тем не менее, Жун выстояли, а Цзун даже стал кратковременным директором Нанкинского банка. Вместе с братом Жун стал неформальным лидером Цзяннаньского консорциума, отстаивая интересы китайского бизнеса, купечества и дворянства в свете ОАК."
 LEP_rong_zongjing_advisor_desc: "§YОписание советника\nРодился:§! §g23 сентября 1873, Уси, Цзянсу, Империя Цин§!\n§YСимпатизирует:§! §cЦзяньнаньский консорциум§!\n§YПолитическая карьера:§! §g$LEP_rong_zongjing_bio$§!"

 #孫傳芳
 LEP_sun_chuanfang: "Сунь Чуаньфан"
 LEP_sun_chuanfang_bio: "Семья Сунь Чуаньфана, родившаяся в скромных условиях, впала в нищету после смерти отца. Его шурин Ван Инкай взял Суня под свое крыло и спонсировал его поступление в ускоренную военную академию армии Бэйяна, предшественницу Баодинской военной академии. В 1905 году Сунь окончил ее после двух лет обучения пехоте и поступил в 6-й китайский класс Академии императорской армии Японии, чтобы освоить пехоту. В 1909 году Сунь вернулся в Китай и стал служить под началом Ван Чжанюаня, который стал наставником последнего. Когда в 1921 году из-за деспотичного управления Хубэй рухнул, Сунь перешел на службу к У Пэйфу, который в 1923 году отправил его захватывать Фуцзянь. \n\nСун централизовал свою власть в Фуцзяни и в течение следующих двух лет сотрудничал с офицерами Чжили Ци Сеюанем и Чэнь Тяоюанем, чтобы захватить контроль над Чжэцзяном и Нанкином, а также боролся с губернатором Шаньдуна Чжан Цзунчаном в Цзянсу и в конце концов оттеснил его в Шаньдун. Сунь воспользовался этой возможностью для создания Лиги пяти провинций и в 1926 году обосновался в Нанкине. Сунь успешно отвоевал Наньчан у Гоминьдана во время Северного похода и распространил свою власть на Хунань, Гуанси и Гуандун.\n\nПосле Северного похода Сунь активно сотрудничал с немецкой военной миссией, проводя модернизацию армии и реформы. Хотя Сунь выступал против всепроникающего немецкого влияния, он позволил Ци заключить несколько выгодных сделок с Германией в Шанхае и жестоко подавил Шанхайское восстание 1932 года. Амбиции Суня привели его к соперничеству с У за влияние в клике Чжили - конфликту, который, несомненно, определит будущее Китая."
 LEP_sun_chuanfang_notes: "§YПримечания: Сунь Чуанфань хорошо известен в Восточном Китае благодаря своей мягкой политике по отношению к крестьянству и дружеским отношениям с местной интеллигенцией. Однако за его дружелюбным лицом скрывается злобный тигр, готовый к нападению.§!"
 LEP_sun_chuanfang_leader_desc: "§YОписание лидера\nРодился:§! 17 апреля 1885, Тайянь, Шаньдун, Империя Цин\n§YПолитическая карьера:§! $LEP_sun_chuanfang_bio$\n\n$LEP_sun_chuanfang_notes$"
 LEP_sun_chuanfang_commander_desc: "§YОписание генерала\nРодился:§! §g17 апреля 1885, Тайянь, Шаньдун, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_sun_chuanfang_bio$§!\n\n$LEP_sun_chuanfang_notes$"

 #齊燮元
 LEP_qi_xieyuan: "Ци Сюэюань"
 LEP_qi_xieyuan_bio: "Особо прилежный в юности, Ци решил поступить во 2-й класс ускоренной военной академии армии Бэйяна в качестве артиллерийского офицера и окончил ее в 1906 году. Ци был направлен в распоряжение Ли Чуня и стал его начальником штаба к моменту образования Китайской республики. Во время Второй революции Ли захватил Цзянси. Когда Фэн Гочжан поднимался на пост президента, он поручил Ли Чуню управлять Цзянсу. В 1920 году Ли Чунь неожиданно покончил жизнь самоубийством, и Ци стал его преемником при поддержке Чэнь Тяоюаня.\n\nВ ходе 1-й Чжифэньской войны Ци поддержал У Пэйфу, и Нефритовый маршал наградил его контролем над Аньхой, Цзянси и Цзянсу. После того как У потерпел поражение от Чжан Цзолиня во 2-й Чжифэньской войне, Старый маршал направил генерала Собачьего мяса, чтобы захватить контроль над Цзянсу. Ци был вытеснен из-за различных дезертирств в его лагере, и он бежал ко двору Сун, чтобы заключить союз. В 1925 году они начали ответное вторжение в Цзянсу, и Ци снова стал губернатором Су.\n\nКогда Сунь официально оформил создание Лиги, Чэнь и Ци служили его главными лейтенантами, но Ци смог завоевать расположение Суня. Сунь позволил Ци курировать создание нескольких элитных подразделений, обученных в Германии. Ци укрепил свое положение, став главным сторонником расширения связей с Германией и одобрив несколько выгодных сделок с Берлином в Шанхае, что помогло вызвать Шанхайское восстание 1932 года. Ци жестоко подавил сопротивление, что привело к еще большему отчуждению Чэня."
 LEP_qi_xieyuan_leader_desc: "§YОписание лидера\nРодился:§! 28 апреля 1885, Нинхэ, Чжили, Империя Цин\n§YПолитическая карьера:§! Особо прилежный в юности, Ци решил поступить во 2-й класс ускоренной военной академии армии Бэйяна в качестве артиллерийского офицера и окончил ее в 1906 году. Ци был направлен в распоряжение Ли Чуня и стал его начальником штаба к моменту образования Китайской республики. Во время Второй революции Ли захватил Цзянси. Когда Фэн Гочжан поднимался на пост президента, он поручил Ли Чуню управлять Цзянсу. В 1920 году Ли Чунь неожиданно покончил жизнь самоубийством, и Ци стал его преемником при поддержке Чэнь Тяоюаня.\n\nВ ходе 1-й Чжифэньской войны Ци поддержал У Пэйфу, и Нефритовый маршал наградил его контролем над Аньхой, Цзянси и Цзянсу. После того как У потерпел поражение от Чжан Цзолиня во 2-й Чжифэньской войне, Старый маршал направил генерала Собачьего мяса, чтобы захватить контроль над Цзянсу. Ци был вытеснен из-за различных дезертирств в его лагере, и он бежал ко двору Сун, чтобы заключить союз. В 1925 году они начали ответное вторжение в Цзянсу, и Ци снова стал губернатором Су.\n\nКогда Сунь официально оформил создание Лиги, Чэнь и Ци служили его главными лейтенантами, но Ци смог завоевать расположение Суня, а также поддержку Германской империи. Близость Ци к Суну принесла свои плоды, когда Улыбающийся Тигр был убит, и первый смог получить контроль над Лигой. Вернув в свои руки Восточный Китай, Ци будет следить за тем, чтобы никогда больше не потерять контроль над ним, используя все доступные ему средства."
 LEP_qi_xieyuan_commander_desc: "§YОписание генерала\nРодился:§! §g 28 апреля 1885, Нинхэ, Чжили, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_qi_xieyuan_bio$§!\n\n$LEP_qi_xieyuan_notes$"
 LEP_qi_xieyuan_mhc_desc: "§YОписание офицера\nРодился:§! §g 28 апреля Нинхэ, Чжили, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_qi_xieyuan_bio$§!\n\n$LEP_qi_xieyuan_notes$"
 LEP_qi_xieyuan_advisor_desc: "§YОписание советника\nРодился:§! §g 28 апреля 1885, Нинхэ, Чжили, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YПолитическая карьера:§! §g$LEP_qi_xieyuan_bio$§!\n\n$LEP_qi_xieyuan_notes$"
 LEP_qi_xieyuan_notes: "§YПримечания: Невероятно амбициозный и прагматичный, мало кто знает, есть ли у Ци нижняя граница, которую он не переступит, чтобы добиться большей власти для себя..§!"

 #劉宗紀
 LEP_liu_zongji: "Лю Цзунцзи"
 LEP_liu_zongji_bio: "Ранняя жизнь Лю Цзунцзи, учившегося в 6-м классе Академии императорской японской армии вместе с Сунь Чуаньфаном, Ли Гэньюанем, Тан Цзяо и Лю Цунхоу, остается во многом неизвестной. Все, что о нем известно, это то, что он был отправлен в Японию при поддержке правительства и учился с 1906 по 1908 год, во время которого он вместе со своими сокурсниками основал военное периодическое издание под названием "Wu Xue" ("Боевые исследования")\n\nПосле возвращения в Китай он служил штабным офицером в угасавшей тогда империи Цин. Успешная Синьхайская революция 1911 года не сильно помешала его военной карьере, и, прежде чем получить звание генерал-майора в 1918 году, Лю несколько лет служил в штабе Фэн Гочжана в Чжэцзяне. В 1926 году, через два года после того, как Лю достиг звания генерал-лейтенанта, он был назначен начальником штаба Сунь Чуаньфана и получил звание полного генерала в возрасте 42 лет. С тех пор как Сунь Чуаньфан провозгласил себя маршалом Лиги, Лю служил начальником штаба армии Лиги, помогая ему в организации его многочисленной армии и высказывая скромные мнения по поводу военных операций, которые включали бесчисленные подавления восстаний и многочисленные сражения с Национально-революционной армией."
 LEP_liu_zongji_notes: "§YПримечания: Будучи главой ассоциации выпускников своего класса, получившего японское образование, Лю поддерживает тесные отношения почти со всеми своими одноклассниками, причем его связи распространяются на все провинции и идеологии. Этот скромный и добросовестный начальник штаба армии Лиги не интересуется политикой, а лишь выполняет свои обязанности верного солдата и сотрудника.§!"
 LEP_liu_zongji_commander_desc: "§YОписание генерала\nРодился:§! §g1884, Хэцзянь, Чжили, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_liu_zongji_bio$§!\n\n$LEP_liu_zongji_notes$"
 LEP_liu_zongji_mhc_desc: "§YОписание офицера\nРодился:§! §g1884, Хэцзянь, Чжили, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_liu_zongji_bio$§!\n\n$LEP_liu_zongji_notes$"

 #陳儀
 LEP_chen_yi: "Чэнь И"
 LEP_chen_yi_desc: "Чэнь И родился в семье богатого бизнесмена и в юности стал заядлым любителем китайской классики и истории. В связи с упадком династии Цин у Чэня возникло желание служить своей стране, и он начал военную карьеру. Прежде чем изучать артиллерию в 5-м китайском классе Академии императорской армии Японии, Чэнь прошел обучение в школе артиллерийской стрельбы японской армии. Находясь за границей, Чэнь связался с Гуанфухуэй (Обществом реставрации) и познакомился с несколькими другими чжэцзянцами, включая Цай Юаньпэя, Цзян Цзунгуя, Цю Цзиня и Сюй Силиня.\n\nЧэнь вернулся в Китай в 1907 году и стал клерком в Министерстве армии. Во время Синьхайской революции Цзян Цзунгуй стал губернатором Чжэ, и Чэнь вернулся в родную провинцию, чтобы служить по приглашению первого. В 1914 году Чэнь отправился в Пекин, чтобы работать политическим советником. В следующем году Юань направил Чэня в погоню за Цай Е, который бежал в Юньнань, но Чэнь лишь сделал вид, что преследует его, после чего подал в отставку и вернулся в Чжэцзян. После смерти Юаня Чэнь вернулся в Японию, чтобы снова учиться в течение трех лет, на этот раз в Военном колледже армии Японии, а затем стал бизнесменом в Шанхае.\n\nВ 1924 году во время войны в Цзяннани Чэнь был избран местным представителем для встречи с Сунем, чтобы положить конец войне. Сунь был впечатлен знаниями Чэня о японской военной подготовке, и поэтому завербовал его в свою армию. Чэнь помог Суню отбить Цзянсу у Чжан Цзунчана, и тот был награжден губернаторством в Чжэ после того, как предыдущий губернатор попытался поднять мятеж, - этот пост он занимает и десять лет спустя."
 LEP_chen_yi_commander_desc: "§YОписание генерала\nРодился:§! §g3 мая 1883, Шаосин, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §cЧжэцзянская клика§!\n§YВоенная карьера:§! §g$LEP_chen_yi_desc$§!\n\n$LEP_chen_yi_notes$"
 LEP_chen_yi_mhc_desc: "§YОписание офицера\nРодился:§! §g3 мая 1883, Шаосин, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §cЧжэцзянская клика§!\n§YВоенная карьера:§! §g$LEP_chen_yi_desc$§!\n\n$LEP_chen_yi_notes$"
 LEP_chen_yi_notes: "§YПримечания: Хотя Сунь высоко ценит Чэня, он не питает лояльности к Улыбающемуся Тигру. Главная забота Чэнь И - уберечь Чжэцзян от войны, и многие подозревают, что он симпатизирует Чэнь Тяоюаню в Аньхой.§!"

 #鄭俊彥
 LEP_zheng_junyan: "Чжэн Цзюньянь"
 LEP_zheng_junyan_desc: "Окончив в 1905 году ускоренную военную академию при Бэйянской армии, Чжэн сначала служил военным инструктором в Чжилийской военной школе, а затем младшим штабным офицером в Цинской армии. Некоторое время Чжэн служил в 3-й дивизии Цао Куня, но в 1916 году его назначили командующим отрядом в Чжэцзяне под командованием генерала Лу Юнсяна, члена Аньхойской клики. Лу захватил контроль над Чжэцзяном после смерти Ян Шандэ в 1919 году, но был смещен Сунь Чуаньфаном во время Цзянсу-Чжэцзянской войны в 1924 году.\n\nПосле того как Лу ушел в отставку, а Сунь занял пост губернатора после войны, генерал-лейтенант Чжэн Цзюньянь и его подразделение были приняты Улыбающимся Тигром в его новую армию Чжэцзяна. Будучи командиром дивизии в армии Цзянсу, Чжэн Цзюньянь помогал Сунь Чуаньфану и Ци Сеюаню отвоевать Цзянсу у Фэнтяньской клики во время Антифэнтяньской войны. Позже Сунь назначит Чжэна заместителем военного начальника в Цзянсу, чтобы помочь Ци управлять провинцией. Чжэн недолго участвовал в Северном походе по отвоеванию Цзянси у Гоминьдана."
 LEP_zheng_junyan_commander_desc: "§YОписание генерала\nРодился:§! §g1883, Нинцзинь, Чжили, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_zheng_junyan_desc$§!\n\n$LEP_zheng_junyuan_notes$"
 LEP_zheng_junyan_mhc_desc: "§YОписание офицера\nРодился:§! §g1883, Нинцзинь, Чжили, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_zheng_junyan_desc$§!\n\n$LEP_zheng_junyuan_notes$"
 LEP_zheng_junyan_advisor_desc: "§YОписание советника\nРодился:§! §g1883, Нинцзинь, Чжили, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YПолитическая карьера:§! §g$LEP_zheng_junyan_desc$§!\n\n$LEP_zheng_junyuan_notes$"
 LEP_zheng_junyuan_notes: "§YПримечания: Хотя Чжэн и Ци редко конфликтуют при управлении Цзянсу, многие (включая самого Ци) подозревают, что Чжэн просто помогает Улыбающемуся Тигру следить за своим амбициозным лейтенантом.§!"

 #鄧如琢
 LEP_deng_ruzhuo: "Дэн Жучжуо"
 LEP_deng_ruzhuo_desc: "Хотя Дэн родился в ученой семье, его семья была очень большой. Когда в Аньхой началась засуха, Дэн решил облегчить бремя, лежащее на семье, и ушел в солдаты. Дэн начал свою военную карьеру в качестве кухонного работника в местной казарме. Во время особенно напряженного боя, когда рота не ела несколько дней, Ден вызвался лично доставлять еду на фронт с большим риском для себя, чем заслужил уважение командира роты Фанг Бенрена. Рота Дэна продержалась достаточно долго, чтобы Сунь Чуаньфань смог провести внезапную атаку на тылы вражеских военачальников, что привело к победе.\n\nФанг вознаградил Дэнга, назначив его командиром взвода, и они стали заклятыми братьями. Фанг и Дэн быстро поднялись в рядах Сун, пока первый не стал командиром дивизии, а второй - батальона. Однако амбиции Дэна привели к тому, что он предал Фанга и ложно обвинил его в сговоре с Гоминьданом, чтобы присвоить себе его звание. Позднее Сунь назначил его военным губернатором провинции Цзянси.\n\nВо время Северного похода Чан Кайши неоднократно пытался склонить Дэна к переходу на сторону националистов, но Дэн неоднократно отказывался. Дэн попытался совершить неудачный переворот внутри Лиги, чтобы захватить для себя владения Суна, но Сун ожидал от него предательства и держал его на расстоянии, но также не пытался удалить его из Цзянси.\n\nДэн и Чан боролись за Цзянси, и в конце концов Дэн смог вернуть Наньчан. После Шанхайского восстания Дэн боролся с Гоминьданом в сельской местности."
 LEP_deng_ruzhuo_commander_desc: "§YОписание генерала\nРодился:§! §g1888, Фуян, Аньхой, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_deng_ruzhuo_desc$§!\n\n$LEP_deng_ruzhuo_notes$"
 LEP_deng_ruzhuo_mhc_desc: "§YОписание офицера\nРодился:§! §g1888, Фуян, Аньхой, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_deng_ruzhuo_desc$§!\n\n$LEP_deng_ruzhuo_notes$"
 LEP_deng_ruzhuo_advisor_desc: "§YОписание советника\nРодился:§! §g1888, Фуян, Аньхой, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YПолитическая карьера:§! §g$LEP_deng_ruzhuo_desc$§!\n\n$LEP_deng_ruzhuo_notes$"
 LEP_deng_ruzhuo_notes: "§YПримечания: Многие военные уважают Дэнга за то, что он занял столь высокий пост без особого военного образования. Однако его амбиции привели к тому, что Улыбающийся Тигр решил держать его на расстоянии вытянутой руки в Цзянси.§!"

 #周蔭人
 LEP_zhou_yinren: "Чжоу Иньжэнь"
 LEP_zhou_yinren_desc: "В 1904 году Чжоу Иньжэнь закончил обучение артиллерии в ускоренной военной академии армии Бэйяна. Фэн Гочжан рекомендовал ему поступить в 6-й класс Академии императорской армии Японии, где он продолжал изучать артиллерию. Вернувшись в Китай в 1909 году, Чжоу познакомился с Сунь Чуаньфаном, когда они сдавали один и тот же военный экзамен в Министерстве армии династии Цин. В начале республиканской эпохи Чжоу служил на различных должностях в Центральной армии в качестве артиллерийского офицера, а к 1918 году стал генерал-майором.\n\nВо время службы в Хунани Чжоу был прикомандирован к Чэнь Гуаньюаню, который должен был стать губернатором Цзянси. В 1923 году губернатор Аньхойской клики Ван Юнцюань объявил о своей независимости от пекинского правительства, в котором доминировали чжилийцы, и Чжоу был назначен Сунь Чуаньфаном в кампанию по отвоеванию у Вана провинции Фуцзянь. Чжоу остался командовать провинцией Фуцзянь, пока Сунь двигался на север, чтобы захватить Чжэцзян, а затем помочь Ци отбить Цзянсу у Фэнтяньской клики. Чжоу принял на себя основной удар Гоминьдана во время Северного похода и был вынужден отступить на север в Чжэцзян.\n\nНо вскоре военные усилия Гоминьдана потерпели крах, и Чжоу вновь занял провинцию Фуцзянь. Чжоу был печально известен в Фуцзяни тем, что взимал непомерные налоги с местного населения, что толкало его на помощь зарождающемуся гоминьдановскому восстанию, которое возникло после Шанхайского восстания в 1932 году. Хотя Чжоу номинально контролирует всю Фуцзянь, его фактическая власть в основном сосредоточена вдоль побережья и в крупных городах."
 LEP_zhou_yinren_commander_desc: "§YОписание генерала\nРодился:§! §g1885, in Уциан, Чжили, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_zhou_yinren_desc$§!\n\n$LEP_zhou_yinren_notes$"
 LEP_zhou_yinren_mhc_desc: "§YОписание офицера\nРодился:§! §g1885, in Уциан, Чжили, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_zhou_yinren_desc$§!\n\n$LEP_zhou_yinren_notes$"
 LEP_zhou_yinren_advisor_desc: "§YОписание советника\nРодился:§! §g1885, in Уциан, Чжили, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YПолитическая карьера:§! §g$LEP_zhou_yinren_desc$§!\n\n$LEP_zhou_yinren_notes$"
 LEP_zhou_yinren_notes: "§YПримечания: Хотя Сунь не одобряет действия Чжоу по управлению Фуцзянь, этих двух людей связывает давняя дружба, и Чжоу будет поддерживать маршала Лиги во всех будущих начинаниях.§!"

 #上官雲相
 LEP_shangguan_yunxiang: "Шаньгуань Юньсян"
 LEP_shangguan_yunxiang_desc: "Родившись в умеренно обеспеченной семье, Шаньгуань решил сделать военную карьеру. В 1910 году он поступил в начальную школу армии Шаньдуна. Через несколько лет он продолжил военное образование в Третьей армейской подготовительной школе в Учане. Его военное образование завершилось в 1919 году, когда он окончил 6-й класс Баодинской военной академии, где изучал пехоту. Затем он поступил на службу в Хубэйскую армию Сунь Чуаньфана в качестве командира взвода, а во время войны помог Хунани и в качестве командира полка сражался против южных революционеров под командованием Чжан Хуайчжи.\n\nС годами Шангуань вырос до командира дивизии накануне Северного похода. Во время Северного похода Шангуань смог разгромить 4-ю армию НРА, которая ранее нанесла поражение У Пэйфу. Эту победу Сунь Чуаньфан с тех пор отмечал как доказательство превосходства армии Лиги по сравнению с Центральной армией У в Лояне."
 LEP_shangguan_yunxiang_commander_desc: "§YОписание генерала\nРодился:§! §g1895, Шанхэ, Шаньдун, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_shangguan_yunxiang_desc$§!\n\n$LEP_shangguan_yunxiang_notes$"
 LEP_shangguan_yunxiang_advisor_desc: "§YОписание советника\nРодился:§! §g1895, Шанхэ, Шаньдун, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YПолитическая карьера:§! §g$LEP_shangguan_yunxiang_desc$§!\n\n$LEP_shangguan_yunxiang_notes$"
 LEP_shangguan_yunxiang_notes: "§YПримечания: Шангуань Юньсян считается самым способным подчиненным Сунь Чуаньфана, и Улыбающийся Тигр постоянно осыпает его похвалами.§!"

 #周鳳岐
 LEP_zhou_fengqi: "Чжоу Фэнци"
 LEP_zhou_fengqi_desc: "В 1900 году Чжоу сдал уездные экзамены, успешно их сдал и стал ученым. В 1903 году он учился в Чжэцзянской военной академии, а на следующий год поступил в ускоренную военную академию армии Бэйяна для изучения пехоты. В 1906 году Чжоу познакомился с Ши Цюцзинем, который привел его в Гуанфухуэй (Общество реставрации), антицинскую революционную организацию. В 1907 году Чжоу стал капитаном в армии Чжэцзяна. Поступив в 1909 году в 3-й класс Штабного колледжа (тогда Баодинской офицерской академии), Чжоу вскоре прекратил учебу, вернувшись в Чжэцзян в 1911 году. Во время Синьхайской революции он во главе тысячи человек напал на гробничную стражу Мин Сяолин, в результате чего погиб цинский генерал Ван Юхун.\n\nВ эпоху ранней республики Чжэцзян был охвачен политическими беспорядками, постоянно сменяя различных губернаторов, а Чжоу часто выступал в роли посредника. Постоянные политические неурядицы в Чжэцзяне обернулись против Чжоу, когда Чжэцзян оказался под контролем генерала Аньхойской клики Ян Шандэ. Из-за этого Чжоу был вынужден бежать в Японию. Через два года Ян умер, и его сменил Лу Юнсян. Лу позволил Чжоу Фэнци и Ся Чао вернуться в Чжэ на службу.\n\nВ 1924 году, во время Цзянсу-Чжэцзянской войны между Лу Юнсяном и Сунь Чуаньфаном, Чжоу и Ся составили заговор с целью свержения Лу и попытались добиться независимости Чжэцзяна. Сунь привлек их к сотрудничеству и сделал Ся губернатором, но централизовал управление провинцией, в результате чего Ся попытался восстать, а Сунь заменил его на Чэнь И. Сунь держал Чжоу подальше от Чжэцзяна, назначив его командующим Нанкинским гарнизоном, и заставил его участвовать в подавлении Шанхайского восстания."
 LEP_zhou_fengqi_commander_desc: "§YОписание генерала\nРодился:§! §g1879, Чансин, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_zhou_fengqi_desc$§!\n\n$LEP_zhou_fengqi_notes$"
 LEP_zhou_fengqi_mhc_desc: "§YОписание офицера\nРодился:§! §g1879, Чансин, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_zhou_fengqi_desc$§!\n\n$LEP_zhou_fengqi_notes$"
 LEP_zhou_fengqi_notes: "§YПримечания: Чжоу Фэнци - ярый сторонник автономии Чжэцзяна и затаил злобу на Улыбающегося Тигра за то, что тот не только централизовал Чжэцзян в рамках Лиги, но и оторвал его от любимого дома.§!"

 #湯恩伯
 LEP_tang_enbo: "Тан Эньбо"
 LEP_tang_enbo_desc: "Тан родился в небольшой деревне и был еще мальчиком, когда была свергнута монархия Цин и установлена республика. В 1919 году он поступил в Чжэцзян-Фуцзянскую армейскую военную академию, чтобы стать солдатом. По окончании академии Тан поступил на службу к Чэнь И, который стал его наставником. После того как Чжэцзянская армия потерпела поражение, Тан вернулся домой и стал офицером полиции. В 1921 году он отправился в Японию вместе с сыном богатого бизнесмена из Вуйи.\n\nВ следующем году Тан был принят в Университет Мэйдзи и изучал политическую экономию. Из-за нехватки средств Тан бросил учебу и вернулся в Китай, чтобы собрать деньги. Чэнь И порекомендовал ему поступить в Академию императорской армии Японии, что он и сделал, изучая пехоту в 18-м китайском классе. В академии Тан усиленно изучал пехотную доктрину, и в результате его компетентность вызвала уважение Сунь Чуаньфана. По окончании академии в 1926 году Тан вернулся в качестве штабного офицера в Чжэцзянскую армию Чэня и женился на Ван Цзинбай."
 LEP_tang_enbo_commander_desc: "§YОписание генерала\nРодился:§! §g20 сентября 2000, Уи, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §cЧжэцзянская клика§!\n§YВоенная карьера:§! §g$LEP_tang_enbo_desc$§!\n\n$LEP_tang_enbo_notes$"
 LEP_tang_enbo_mhc_desc: "§YОписание офицера\nРодился:§! §g20 сентября 2000, Уи, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §cЧжэцзянская клика§!\n§YВоенная карьера:§! §g$LEP_tang_enbo_desc$§!\n\n$LEP_tang_enbo_notes$"
 LEP_tang_enbo_advisor_desc: "§YОписание советника\nРодился:§! §g20 сентября 2000, Уи, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §cЧжэцзянская клика§!\n§YПолитическая карьера:§! §g$LEP_tang_enbo_desc$§!\n\n$LEP_tang_enbo_notes$"
 LEP_tang_enbo_notes: "§YПримечания: Тан пользуется уважением в армии Чжэцзяна как восходящая звезда и известен тем, что предпочитает использовать современные средства связи, а не руководить с фронта.\nЕго прозвище - "Железный человек".§!"

 #石友三
 LEP_shi_yousan: "Ши Юйсань"
 LEP_shi_yousan_desc: "Родившись в бедной семье в Чанчуне, Ши подружился с богатой семьей, чтобы посещать начальную школу. Однако он бросил учебу, чтобы присоединиться к Бэйянской армии У Пэйфу, расквартированной в Чанчуне. После создания Китайской Республики Ши покинул армию У и поступил на службу к Фэн Юйсяну. Во время службы в армии Фэна Ши познакомился с Гао Шуксуном, который стал его заклятым братом.\n\nВ 1926 году во время антифэнтяньской войны Гоминьцзюнь оказался под угрозой со всех сторон, и Ши без ведома Фэна заключил мир с Янь Сишанем, что привело к краху сил Фэна, и впоследствии он бежал в Шэньси под защиту Яня. Когда начался Северный поход, Ши сразу же присоединился к Гоминьдану, чтобы затем дезертировать обратно к Фэну, когда националисты потерпели крах.\n\nШи на коленях умолял Фэна о прощении, которое тот неохотно дал, но только после того, как передал своего верного офицера Ли Бинсюаня под командование Ши, чтобы тот следил за ним. Позже Ши похоронил Ли заживо, чтобы передать послание. Когда во время 3-й Чжифэньской войны клика Чжили вновь стала править, Ши снова предал Фэна, чтобы присоединиться к Ву. Однако позже Ши предал У во время 4-й Чжифэнской войны, чтобы снова присоединиться к Фэну.\n\n Когда У победил, Ши в третий раз бросил Фэна и попытался присоединиться к У Пэйфу. Зная о характере Ши, Ву передал его в подчинение Сунь Чуаньфану, к большому сожалению Улыбающегося Тигра. В Лиге Ши оценил личные преимущества немецкого спонсорства, но кто знает, когда он может снова дезертировать..."
 LEP_shi_yousan_commander_desc: "§YОписание генерала\nРодился:§! §g1 декабря 1891, Цзюйтай, Цзилинь, Империя Цин§!\n§YСимпатизирует:§! §L"Аполитичен"§!\n§YВоенная карьера:§! §g$LEP_shi_yousan_desc$§!\n\n$LEP_shi_yousan_notes$"
 LEP_shi_yousan_mhc_desc: "§YОписание офицера\nРодился:§! §g1 декабря 1891, Цзюйтай, Цзилинь, Империя Цин§!\n§YСимпатизирует:§! §L"Аполитичен"§!\n§YВоенная карьера:§! §g$LEP_shi_yousan_desc$§!\n\n$LEP_shi_yousan_notes$"
 LEP_shi_yousan_advisor_desc: "§YОписание советника\nРодился:§! §g1 декабря 1891, Цзюйтай, Цзилинь, Империя Цин§!\n§YСимпатизирует:§! §L"Аполитичен"§!\n§YПолитическая карьера:§! §g$LEP_shi_yousan_desc$§!\n\n$LEP_shi_yousan_notes$"
 LEP_shi_yousan_notes: "§YПримечания: Ши называют "генералом-перебежчиком" и "сыном пяти отцов" за то, что он трижды за три года предал Фэн Юйсяна, служил У, Фэну, Чиану, Яну и Суню и предал их всех.§!"

 #謝鴻勛
 LEP_xie_hongxun: "Се Хунсунь"
 LEP_xie_hongxun_bio: "Как выдающийся офицер армии Лиги, заботящийся о своих солдатах и являющийся одним из самых ценных подчиненных Сунь Чуаньфана, ранняя жизнь Се Хунсуня довольно туманна, поскольку о нем рассказывают противоречивые истории. Достоверным фактом о его ранней карьере является то, что он изучал пехоту в 1-м классе Баодинской военной академии и окончил ее в 1914 году.\n\nДо того как присоединиться к войскам Сунь Чуаньфана в 1921 году в качестве командира полка, Се Хунсунь служил младшим офицером на различных должностях в Китайской Республике. К 1924 году он стал командиром дивизии под командованием Суня. Когда в 1926 году Национально-революционная армия двинулась на север, Се Хунсунь сражался против нее в Цзянси, хотя он и задержал продвижение НРА, но был тяжело ранен в бою, где ему прострелили ногу. Когда эта новость дошла до Сунь Чуаньфана, который вместе со своими подчиненными разрабатывал планы операций в своем штабе, он был в слезах и сказал присутствующим, что теряет свою правую руку. К счастью для Се, он был немедленно отправлен в Шанхай и получил самые современные немецкие лекарства и лечение, которые спасли ему жизнь. После длительного восстановления Се Хунсунь вернулся в армию Лиги, чтобы вновь стать правой рукой Суня."
 LEP_xie_hongxun_notes: "§YПримечания: Этот опытный генерал очень уважает У Пэйфу и Сунь Чуаньфана и обращается к ним как "Великий маршал".\nПо слухам, Се Хунсунь презирает Чжан Цзунчана, называя его простым ребенком, хотя Чжан (якобы) старше его.§!"
 LEP_xie_hongxun_commander_desc: "§YОписание генерала\nРодился:§! §g1882, Дамин, Чжили, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_xie_hongxun_bio$§!\n\n$LEP_xie_hongxun_notes$"
 LEP_xie_hongxun_mhc_desc: "§YОписание офицера\nРодился:§! §g1882, Дамин, Чжили, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_xie_hongxun_bio$§!\n\n$LEP_xie_hongxun_notes$"

 #孟昭月
 LEP_meng_zhaoyue: "Мэн Чжаоюэ"
 LEP_meng_zhaoyue_bio: "Мэн Чжаоюэ, потерявший отца в юном возрасте, изначально был торговцем тофу и жил бедно. Когда в 1911 году разразилась Синьхайская революция, в поисках лучшей жизни 24-летний Мэн решил вступить в армию, начав таким образом свою военную карьеру. К 1913 году Мэн уже прошел путь от младшего офицера до подполковника и командира саперного батальона. До того как в 1921 году Мэн стал командиром бригады в дивизии Сунь Чуаньфана, он служил в различных подразделениях пекинского правительства в звании полковника и командира полка.\n\nВ 1922 году Мэн получил звание генерал-майора, а через два года ему было присвоено звание генерал-лейтенанта. В начале 1920-х годов, когда Сунь Чуаньфан отправился в поход на юго-восток Китая, Мэн последовал за ним в качестве командира гарнизона в Ханчжоу и командира дивизии под командованием маршала Лиги. Когда Национально-революционная армия выступила против Сунь Чуаньфана, он был назначен главнокомандующим Чжэцзянской армией и успешно удерживал НРА от базы Сунь Чуаньфана в Нанкине, используя свои фортификационные навыки, приобретенные за последнее десятилетие. С тех пор Мэн совместно с Чжоу Фэнци командовал гарнизоном в Нанкине, охраняя сердце Лиги Сунь Чуаньфана."
 LEP_meng_zhaoyue_notes: "§YПримечания: Давний последователь и верный подчиненный Сунь Чуаньфана, Мэн никогда не получал никакой формальной военной подготовки, однако его опыт всегда пригодится маршалу Лиги.§!"
 LEP_meng_zhaoyue_commander_desc: "§YОписание генерала\nРодился:§! §g1887, Шоучжан, Шаньдун, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_meng_zhaoyue_bio$§!\n\n$LEP_meng_zhaoyue_notes$"
 LEP_meng_zhaoyue_mhc_desc: "§YОписание офицера\nРодился:§! §g1887, Шоучжан, Шаньдун, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_meng_zhaoyue_bio$§!\n\n$LEP_meng_zhaoyue_notes$"

 #馬玉仁
 LEP_ma_yuren: "Ма Южэнь"
 LEP_ma_yuren_bio: "Родом из Янчэна, города, названного в честь процветающей соляной промышленности, Ма Южэнь, потерявший отца в возрасте 13 лет, зарабатывал на жизнь контрабандой соли, чтобы прокормить семью. Чтобы противостоять попыткам цинского правительства преследовать контрабандистов соли, Ма во время рейда на лодке силой столкнулся с чиновниками, после чего был объявлен в розыск цинскими властями. Однако позже, когда он присоединился к местной банде под командованием Сюй Баошаня, его освободили от преследований Цин.\n\nПосле Синьхайской революции Ма Южэнь вслед за Сюем присоединился к республиканскому правительству под руководством Юань Шикая. В 1911 году Ма возглавил войска, чтобы отстоять часть Нанкина от цинских лоялистов. За свою лояльность он постоянно поднимался по служебной лестнице и в 1920 году был повышен в звании до командира дивизии правительством Чжили. После Цзянсу-Чжэцзянской войны, вспыхнувшей в 1924 году, Сунь Чуаньфань повысил Ма Южэня до командира корпуса за его вклад в конфликт. С тех пор Ма следовал за маршалом Лиги как уникальный подчиненный, не имеющий формальной военной подготовки, но обладающий известным характером. Однако ходят слухи, что Ма с недоверием относится к маршалу Лиги."
 LEP_ma_yuren_notes: "§YПримечания: Этот смелый и сильный человек, благодаря своей ранней контрабандистской жизни, имеет опыт нетрадиционных способов ведения боя. Он также имеет привычку вести своих солдат на фронт. Говорят, что он настолько силен, что может нести сто килограммов соли и преодолевать километры пешком.§!"
 LEP_ma_yuren_commander_desc: "§YОписание генерала\nРодился:§! §g1875, Яньчэн, Цзянсу, Империя Цин§!\n§YСимпатизирует:§! §gЦзиньбао§!\n§YВоенная карьера:§! §g$LEP_ma_yuren_bio$§!\n\n$LEP_ma_yuren_notes$"

 #錢宗澤
 LEP_qian_zongze: "Цянь Цзунцзе"
 LEP_qian_zongze_bio: "Несмотря на то, что Цянь Цзунцзе был относительно неизвестным, молодым и неопытным командиром по сравнению с другими генералами клики Сунь Чуаньфана, он занимает важное положение в Лиге, поскольку отвечает за железные дороги в Юго-Восточном Китае и полицейские дела в Чжэцзяне, одной из самых процветающих китайских провинций. \n\nПоступив в 1-й класс Баодинской военной академии в 1914 году для изучения пехоты, Цянь выбрал совсем другую карьеру военного, несмотря на сравнительно высокий уровень образования, ведь в 1919 году он также окончил 5-й класс Штабного колледжа. После недолгой службы во 2-й дивизии в качестве офицера Цянь был отправлен на учебу за границу во Францию, где он стал непосредственным свидетелем радикальных перемен и революции, разворачивавшихся там.\n\nПо возвращении в 1921 году Цянь был назначен пекинским правительством начальником железнодорожного гарнизона и полиции вместо того, чтобы сохранить за собой обычные командные или штабные должности. В 1927 году Сунь Чуаньфан назначил Цяня начальником полиции провинции Чжэцзян и возложил на него задачи по обеспечению безопасности железных дорог и надзору за военными перевозками для своей огромной армии."
 LEP_qian_zongze_commander_desc: "§YОписание генерала\nРодился:§! §g23 октября 1891, Ханчжоу, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_qian_zongze_bio$§!\n\n$LEP_qian_zongze_notes$"
 LEP_qian_zongze_advisor_desc: "§YОписание советника\nРодился:§! §g23 октября 1891, Ханчжоу, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YПолитическая карьера:§! §g$LEP_qian_zongze_bio$§!\n\n$LEP_qian_zongze_notes$"
 LEP_qian_zongze_notes: "§YПримечания: Цянь - сторонник более тесных связей с Германией, поскольку она склонна инвестировать в железнодорожную инфраструктуру Китая. По мнению Цяня, железные дороги приносят процветание, а также модернизацию вооруженных сил.§!"

 #汪鎬基
 LEP_wang_haoji: "Ван Хаоцзи"
 LEP_wang_haoji_bio: "Ван Хаоцзи поступил в 5-й китайский класс Академии императорской армии Японии и изучал кавалерию. Вернувшись в Китай после года обучения, он стал работать преподавателем истории и военных наук в Пекине. После образования Китайской Республики в 1912 году он получил звание полковника кавалерии и в 1914 году был направлен на службу в Чжэцзян, где начал свою карьеру под началом Сунь Чуаньфана.\n\nВ 1920 году он стал командиром пехотной бригады в звании генерал-майора под началом Чжоу Фэнци. После этого он более десяти лет командовал различными пехотными частями в армии Лиги Сунь Чуаньфана, сражаясь против различных восстаний и врагов Лиги во время Антифэнтяньской войны и Северного похода Гоминьдана. Только в конце 1930-х годов Ван был назначен начальником кавалерии армии Лиги, а в начале 1936 года получил звание генерал-лейтенанта."
 LEP_wang_haoji_notes: "§YПримечания: Несмотря на то, что Ван Хаоцзи был обучен и интересовался кавалерийскими войнами, почти половину своей военной карьеры он провел в армии Сунь Чуаньфана, командуя пехотой, но надеемся, что все изменится.§!"
 LEP_wang_haoji_commander_desc: "§YОписание генерала\nРодился:§! §g1884, Тунсиан, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_wang_haoji_bio$§!\n\n$LEP_wang_haoji_notes$"
 LEP_wang_haoji_mhc_desc: "§YОписание офицера\nРодился:§! §g1884, Тунсиан, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YВоенная карьера:§! §g$LEP_wang_haoji_bio$§!\n\n$LEP_wang_haoji_notes$"

 #葛敬恩
 LEP_ge_jingen: "Гэ Цзинъэнь"
 LEP_ge_jingen_bio: "Гэ Цзинъэнь, как и многие жители Чжэцзяна, родился в купеческой семье, но он не выбрал путь наследования семейного бизнеса. В 1904 году он поступил в Чжэцзянскую военную академию и через два года после ее окончания стал военным воспитателем.\n\nВо время учебы знаменитый революционер Цю Цзинь склонил членов новой армии присоединиться к революционному делу, и Гэ оказался под сильным влиянием революционных идеалов, поскольку в нем росло недовольство коррумпированной цинской властью. В 1907 году Гэ Цзинъэнь вступил в Тунмэньхуэй, а в ноябре 1911 года присоединился к восстанию в Ханчжоу после восстания в Вучане, где разработал план операции и помог закрепиться революционерам.\n\nОн также служил в штабе восставшей армии в Нанкине и помогал в охране города. После создания Нанкинского правительства в 1912 году Гэ был назначен начальником военных перевозок и одним из представителей на переговорах между правительствами Бэйяна и Нанкина. После этого Гэ продолжил свое военное образование, обучаясь в Штабном колледже с 1913 по 1916 год. Через два года он был направлен в Военный колледж армии Японии и вернулся в Китай в 1921 году. Его служба в Чжэцзянской армии началась по приглашению Чэнь И в 1924 году.\n\nЭтот талантливый командир прослужит начальником штаба Чэнь более десяти лет, но он не испытывает особого энтузиазма в борьбе со своими соотечественниками из Гоминьдана."
 LEP_ge_jingen_notes: "§YПримечания: Хороший друг Чэнь И. Этот ветеран революции больше заинтересован в том, чтобы остаться со своим другом, чем служить Лиге.§!"
 LEP_ge_jingen_commander_desc: "§YОписание генерала\nРодился:§! §g30 июля 1889, Цзясин, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §cЧжэцзянская клика§!\n§YВоенная карьера:§! §g$LEP_ge_jingen_bio$§!\n\n$LEP_ge_jingen_notes$"
 LEP_ge_jingen_mhc_desc: "§YОписание офицера\nРодился:§! §g30 июля 1889, Цзясин, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §cЧжэцзянская клика§!\n§YВоенная карьера:§! §g$LEP_ge_jingen_bio$§!\n\n$LEP_ge_jingen_notes$"

 #林蔚
 LEP_lin_wei: "Линь Вэй"
 LEP_lin_wei_bio: "После окончания средней школы в местной школе в Чжэцзяне Линь Вэй изучал инженерное дело в Цзяннаньской армейской академии и, как способный курсант, поступил в 4-й класс штабного колледжа, чтобы продолжить военную карьеру. После окончания колледжа в 1916 году Линь был направлен в армию Чжэцзяна в качестве командира инженерного батальона. Этот способный командир вскоре стал командиром полка и штабным работником своего подразделения.\n\nКак осторожный и вдумчивый командир, Лин хорошо справлялся с работой штаба и планированием материально-технического обеспечения, его планы были известными и тщательными. Поэтому в 1926 году Чэнь И пригласил его в штаб 1-й дивизии армии Чжэцзян. В последующее десятилетие Линь помогал решать различные административные военные задачи и давал советы своему начальнику вместе с Гэ Цзинъэном, начальником штаба Чэнь И. Позже, когда влияние Чэнь И расширилось, он выдвинул Линь Вэя в поддержку своего укрепления на политической сцене. Однако сам Линь не особенно интересовался подобными делами."
 LEP_lin_wei_notes: "§YПримечания: Одноклассник Гэ Цзинъэна по штабному колледжу. И Лин, и Гэ - доверенные и способные подчиненные Чэнь И.§!"
 LEP_lin_wei_commander_desc: "§YОписание генерала\nРодился:§! §g1889, in Хуанъян, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §cЧжэцзянская клика§!\n§YВоенная карьера:§! §g$LEP_lin_wei_bio$§!\n\n$LEP_lin_wei_notes$"

 #郭懺
 LEP_guo_chan: "Го Чань"
 LEP_guo_chan_bio: "Родившись в бедной крестьянской семье и потеряв отца, когда ему был всего один год, Го Чань должен был нести ответственность за содержание своей семьи в раннем возрасте. Из-за финансовых трудностей он смог поступить в начальную школу Чжэцзянской армии только в 1908 году, так как его семья слышала, что в школе предлагалась современная программа обучения, такая же, как и в других школах, и, что более важно, она была бесплатной.\n\n Когда разразилась Синьхайская революция, Го и его товарищи-кадеты вступили в ряды Чжэцзянской восстановительной армии и осаждали местные цинские власти в провинции. В 1914 году он поступил во Вторую школу подготовки армии в Вучане - колыбель многих крупных военачальников современного Китая. Проучившись два года, Го поступил в 6-й класс Баодинской военной академии, изучал артиллерию и окончил ее в 1919 году.\n\nКак хорошо образованный офицер, Го поступил на службу в Чжэцзянскую армию в качестве младшего офицера под командованием Чжоу Фэнци, жена которого была сестрой жены Го Чана. Прослужив в армии Чжэцзяна несколько лет и приняв участие в различных сражениях, включая войну против Националистическо-революционной армии и многочисленные внутренние репрессии, Го уверенно продвигался по служебной лестнице, используя свои военные способности, а не связь с Чжоу. Человек с революционными убеждениями, он, тем не менее, оказывается молодым реформатором в разлагающемся государстве."
 LEP_guo_chan_commander_desc: "§YОписание генерала\nРодился:§! §g18 апреля 1894, Чжуцзи, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_guo_chan_bio$§!"

 #周碞
 LEP_zhou_yan: "Чжоу Янь"
 LEP_zhou_yan_bio: "Отец Чжоу Яня, учившийся в Чжэцзянской военной академии, был унтер-офицером Чжэцзянской армии и членом Гуанфухуэй, который участвовал в восстании в Чжэцзяне после восстания в Вучане в 1911 году. Этот поступок вдохновил его сына стать солдатом.\n\nКак и его отец, Чжоу Янь учился в начальной военной школе в Чжэцзяне, а позже - в средней военной школе в Вучане.  В 1914 году Чжоу поступил в 3-й класс Баодинской военной академии, где изучал артиллерию. После окончания академии в 1916 году он был направлен в армию Чжэцзяна в качестве младшего артиллерийского офицера, начав свою военную карьеру. До поступления в 7-й класс Штабного колледжа в 1924 году он уже был командиром артиллерийской роты 2-й дивизии Чжэцзянской армии под командованием Чжоу Фэнци.\n\n Однако его учеба в Пекине была прервана беспорядочными военными действиями на севере, и ему пришлось вернуться в свою часть на юге, продолжая выполнять свои обязанности. Когда Национально-революционная армия попыталась войти в Цзянсу, Чжоу Янь, который в то время был командиром полка, успешно сдержал их с помощью полевых укреплений и обеспечил безопасность логистической линии армии Лиги. Позже он принимал участие в различных военных действиях армии Сунь Чуаньфана (в том числе в подавлении синдикалистов во время Шанхайского восстания 1932 года) и был повышен до командира дивизии.\n\nПо мере роста численности армии Лиги и увеличения спроса на способных командиров, Чжоу Янь, благодаря своим выдающимся победам и надежным способностям, становится все более популярным."
 LEP_zhou_yan_notes: "§YПримечания: Доверенный и способный бывший подчиненный Чжоу Фэнци, Чжоу Янь, похоже, не интересуется политикой своего начальства. Продвигается по службе исключительно благодаря своим заслугам, а не связям.§!"
 LEP_zhou_yan_commander_desc: "§YОписание генерала\nРодился:§! §g26 декабря, 1895, Шэн, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_zhou_yan_bio$§!\n\n$LEP_zhou_yan_notes$"
 LEP_zhou_yan_mhc_desc: "§YОписание офицера\nРодился:§! §g26 декабря, 1895, Шэн, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_zhou_yan_bio$§!\n\n$LEP_zhou_yan_notes$"

 #李忍濤
 LEP_li_rentao: "Ли Жэньтао"
 LEP_li_rentao_bio: "Несмотря на то, что Ли Жэньтао родился в одном из беднейших регионов Китая, его достижения не ограничивались его происхождением. Прежде чем поступить в Университет Цинхуа, этот прилежный студент в 1920 году окончил нормальную школу в своей родной провинции. Благодаря своей исключительной успеваемости в Цинхуа Ли получил государственную поддержку для обучения за границей, что позволило ему стать одним из самых образованных людей в Китае.\n\nВ 1926 году началась его военная карьера, недоступная для большинства его коллег: Ли Жэньтао поступил в Виргинский военный институт и пехотную школу армии США, закончив пехотную подготовку в Форте Беннинг. Позже он поступил в Чикагский университет. Однако его учеба за границей не закончилась в США. Этот замечательный кадет получил еще одну порцию спонсорской помощи для продолжения учебы, и на этот раз он отправился в Прусский штабной колледж, чтобы изучать химию и химическую войну - совершенно новую форму войны в китайских условиях.\n\nПосле возвращения в Китай с женой-немкой в 1931 году этот военный талант был немедленно направлен в армию Сунь Чуаньфана под немецким руководством. Он был назначен военным наставником и командиром специального учебного подразделения для офицеров с немецким образованием."
 LEP_li_rentao_notes: "§YПримечания: Этот крепкий, с квадратным лицом, густыми бровями и большими глазами генерал является самым известным сторонником химической войны (если не первым и единственным) и написал несколько учебников по ней. Он также известен своей строгой дисциплиной и обучением, говорят, что девиз его подразделения "Я вижу, я прихожу, я подчиняюсь".§!"
 LEP_li_rentao_commander_desc: "§YОписание генерала\nРодился:§! §g1904, Хэцин, Юньнань, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_li_rentao_bio$§!\n\n$LEP_li_rentao_notes$"
 LEP_li_rentao_mhc_desc: "§YОписание офицера\nРодился:§! §g1904, Хэцин, Юньнань, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_li_rentao_bio$§!\n\n$LEP_li_rentao_notes$"

 #徐培根
 LEP_xu_peigen: "Сюй Пэйгэн"
 LEP_xu_peigen_bio: "Известный своей сообразительностью и умом в юном возрасте, Сюй Пейген окончил школу на высший балл. Однако из-за нехватки средств Сюй не смог продолжить обучение. Вместо этого в 1909 году ему рекомендовали учиться в Чжэцзянской армейской начальной школе, а затем Сюй поступил во Вторую армейскую подготовительную школу в Учане. Во время Синьхайской революции Сюй присоединился к своим товарищам по революции и сражался в студенческом батальоне.\n\nПоступив в Баодинскую военную академию после Синьхая в 1914 году, Сюй изучал пехоту в 3-м классе академии и был одноклассником Бай Чунси. Окончив академию в 1916 году, Сюй вскоре стал офицером: в 1919 году он был принят в 6-й класс штабного колледжа, который окончил 3 года спустя. Назначенный в 1-й полк 1-й дивизии Чжэцзянской армии, в 1926 году он становится командиром 4-го полка 2-й бригады.\n\nОказавшись вторым после Сунь Чуаньфана в штабе Цзиньлинской военной академии, он был назначен в 1-ю дивизию под командованием Чэнь И. Видя ожесточенные бои во время Северного похода, Сюй оставался непоколебимым на фронте. В 1928 году за выдающиеся заслуги в руководстве Северным походом, наряду с Ли Жэньтао, он был выбран для обучения в Прусском штабном колледже, а в 1931 году вернулся в Китай. Назначенный директором Военной академии Цзиньлин, Сюй впоследствии также стал директором Центральной авиационной школы Ханчжоу Цзяньцяо."
 LEP_xu_peigen_commander_desc: "§YОписание генерала\nРодился:§! §g30 декабря 1895, Сяншань, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_xu_peigen_bio$§!\n\n$LEP_xu_peigen_notes$"
 LEP_xu_peigen_mhc_desc: "§YОписание офицера\nРодился:§! §g0 декабря 1895, Сяншань, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_xu_peigen_bio$§!\n\n$LEP_xu_peigen_notes$"
 LEP_xu_peigen_notes: "§YПримечания: Способный, хорошо образованный и старательный командир, Сюй не имеет конкретных политических пристрастий и сосредоточен на публикации книг по современной тактике, военной науке и военной истории Китая. Во время учебы в немецком штабном колледже Сюй был одним из лучших в своем классе, и некоторые немецкие офицеры отмечали, что Сюй мог бы стать "Мольтке Востока".§!"

 #方本仁
 LEP_fang_benren: "Фан Беньжэнь"
 LEP_fang_benren_bio: "Став учителем в 20 лет, Фан Беньжэнь позже начнет военную карьеру, вступив в кавалерийский батальон "Правое знамя Учана". В качестве небольшого перерыва он был выбран для обучения в специальной начальной школе армии Хубэя, но вскоре вернулся в кавалерию. В 1907 году он поступил в Баодинскую офицерскую академию, предшественницу Штабного колледжа. Служа командиром взвода кавалерии Императорской гвардии, он стал штабным офицером У Лучжэня.\n\nПосле Синьхая Фан сохранил свою должность, хотя в 1913 году был переведен в канцелярию губернатора Цзянси. В 1914 году он стал директором Института подготовки офицеров армии Цзянси, а затем начальником штаба военного губернатора. В 1916 году он был назначен начальником гарнизона Западной Цзянси, а в 1922 году переведен на юг.\n\nВ 1923 году ему было присвоено звание "Генерал Цуйвэй", и в конечном итоге он стал директором обороны Гуандун-Цзянси. Под командованием губернатора Цай Чэнсюня Фан получил приказ атаковать революционеров Гуанчжоу, но вместо этого решил сместить Цая и захватить губернаторский пост.\n\nГлавнокомандующий армией Цзянси в расширенной Межсоюзнической армии пяти провинций под командованием Сунь Чуаньфана, Фан был официально назначен губернатором Цзянси, но в 1926 году У Пейфу вынудил его уйти в отставку, и его заменил Дэн Жужуо. Бежав в Шанхай, Фанг был переманен революционерами Гуанчжоу и недолго служил командующим 11-й армией Национально-революционной армии, а затем бежал в изгнание, как только дела пошли на спад.\n\nПолагаясь на добрую милость и связи, Фанг снова вернулся в центр внимания. Однако у него есть две красные линии: Работа с У Пэйфу и отказ от управления Цзянси."
 LEP_fang_benren_commander_desc: "§YОписание генерала\nРодился:§! §g1880, Туаньфэн, Хубей, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_fang_benren_bio$§!\n\n$LEP_fang_benren_notes$"
 LEP_fang_benren_notes: "§YПримечания: Он пожертвовал значительные суммы денег на развитие гражданской промышленности Пинсяна, ткацкой фабрики Хуанчжоу и средней школы Байфуси Чухуан.§!"

 #李世甲
 LEP_li_shijia: "Ли Шицзя"
 LEP_li_shijia_bio: "Зачисленный в 6-й класс Яньтайской военно-морской академии в 1908 году, Ли Шицзя изучал вождение военных кораблей и окончил ее в тот же год Синьхайской революции. Однако его военное образование не прекратилось с распадом империи Цин. Прежде чем отправиться в США в 1915 году для изучения подводной войны, Ли в 1913 году поступил в Нанкинскую военно-морскую академию (бывшую Цзяннаньскую военно-морскую академию) и проучился там два года. После возвращения в Китай он служил в военно-морском министерстве в качестве младшего офицера и сотрудника пекинского правительства.\n\nХотя китайский военно-морской персонал был разделен на фракции в хаотичной борьбе режимов военачальников, Ли Шицзя не играл никакой роли, поскольку он был младшим морским командиром под началом Ян Шучжуана, который получил свое положение в Фуцзяни благодаря связи с Ду Сигуем, тесно связанным с У Пэйфу. Вскоре после того, как Сунь Чуаньфан провозгласил себя маршалом Лиги, Ли был назначен командиром небольшой канонерской лодки, которую можно отнести к Движению за самоукрепление. На протяжении 1930-х годов Ли участвовал в различных конфликтах в качестве подчиненного Ян Шучжуана и клики Чжили. После череды сложных событий и конфликтов Ли Шицзя стал восходящим флотоводцем Лиги Сунь Чуаньфана, специализирующимся на нетрадиционных методах ведения морской войны."
 LEP_li_shijia_admiral_desc: "§YОписание адмирала\nРодился:§! §g1894, Хоугуань, Фуцзянь, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_li_shijia_bio$§!\n\n$LEP_li_shijia_notes$"
 LEP_li_shijia_mhc_desc: "§YОписание офицера\nРодился:§! §g1894, Хоугуань, Фуцзянь, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_li_shijia_bio$§!\n\n$LEP_li_shijia_notes$"
 LEP_li_shijia_notes: "§YПримечания: Как адмирал, преданный своей военной карьере, Ли Шицзя не имеет твердых политических взглядов.§!"

 #吳振南
 LEP_wu_zhennan: "У Чжэньнань"
 LEP_wu_zhennan_bio: "Получив стандартное образование, У Чжэньнань в 15 лет поступил в Нанкинскую военно-морскую академию, где изучал английский язык, арифметику, астрономию, навигацию и другие предметы, к которым У относился с особой симпатией, занимая первые места по каждому из них. Пройдя полевую службу на двух разных кораблях, У стал инструктором в своей прежней академии. Его отправили за границу, в Британию, для изучения военных кораблей, и он совершил кругосветное путешествие в составе Восточного флота Великобритании.\n\nОн вернулся в Китай, но его снова отправили учиться в Британию, в Военно-морской университет в Гринвиче и два военно-морских училища в Портсмуте. У Чжэньнань вернется еще раз, чтобы стать основой военно-морского флота Китайской Республики, обучая многочисленных будущих моряков. Присоединившись к революционерам в Синьхае, У станет президентом Временной военно-морской ассоциации и постепенно поднимется по карьерной лестнице адмиралтейства.\n\nНа Версальской мирной конференции он решительно выступит против империалистических махинаций Центральных держав, но в конечном итоге окажется бессилен остановить их. Вернувшись в свою страну, Ву занял пост директора Национального отдела береговой охраны, контролируя метеорологические сводки по внутреннему морю и отчеты о спасении затонувших кораблей. У - один из самых способных адмиралов в свите нации, хотя его отношения с Лигой оставляют желать лучшего."
 LEP_wu_zhennan_notes: "§YПримечания: У известен своей фразой: "Многие известные адмиралы японского флота учились в Великобритании, как и я. Их таланты не выдающиеся, но они могут проявить свои таланты в японском флоте. Наш китайский флот ничего не делает и не воюет. Как же не огорчаться, когда таланты слабой страны не так хороши, как таланты сильной?"§!"
 LEP_wu_zhennan_admiral_desc: "§YОписание адмирала\nРодился:§! §g1882, Ичжэн, Цзянсу, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_wu_zhennan_bio$§!\n\n$LEP_wu_zhennan_notes$"
 LEP_wu_zhennan_mhc_desc: "§YОписание офицера\nРодился:§! §g1894, Хоугуань, Фуцзянь, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_wu_zhennan_bio$§!\n\n$LEP_wu_zhennan_notes$"

 #王壽廷
 LEP_wang_shouting: "Ван Шутин"
 LEP_wang_shouting_bio: "Окончив шестой курс Цзяннаньской военно-морской академии, Ван Шцтин продолжил службу на ряде канонерских лодок в качестве первого помощника. Продолжая продвигаться по адмиралтейской лестнице, он дослужился до адъютанта командования Первого флота, получил звание капитана, а позже стал капитан-лейтенантом. В 1916 году он был награжден золотой медалью первого класса, а через год - медалью пятого класса "Вэньху". Командуя собственным кораблем в 1918 году, он становится подполковником, а также офицером первого класса штаба Главнокомандующего ВМС и Морского департамента.\n\nНагражденный медалью Вэньху третьего класса, он получает медаль Цзяхэ четвертого класса, а в 1921 году становится капитаном другой канонерской лодки, "Юнцзянь". Достигнув звания полковника флота, в 1925 году он был переведен в штаб Первого флота, а в 1926 году стал капитаном крейсера. В 1927 году он попытался остаться в составе войск Бэйяна, так как Северный поход застопорился, и предпочел продолжить работу в качестве капитана в военно-морском департаменте. В 1932 году его повысили до командира партизанского отряда "Тропедо", а в 1934 году он стал директором департамента военно-морского флота. В 1935 году Ван был награжден Баодинской медалью четвертого класса. Он - чисто аполитичный морской офицер, надеющийся лишь на продолжение своей карьеры."
 LEP_wang_shouting_mhc_desc: "§YОписание адмирала\nРодился:§! §g1888, Чжэнцзянь, Цзянсу, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_wang_shouting_bio$§!"

 #沈覲宸
 LEP_shen_jingchen: "Шэнь Цзинчэнь"
 LEP_shen_jingchen_bio: "Поступив в 1897 году на шестое производственное отделение Фучжоуской кораблестроительной академии, Шэнь Цзинчэнь в 1903 году стал кандидатом на императорский экзамен, который он успешно сдал. В 1907 году Шэнь был назначен цензором, а в 1913 году отправился во Францию изучать кораблестроение и самолетостроение, но перевелся в Лозанну в Швейцарии, чтобы продолжить обучение до начала Великой войны. Получив диплом инженера по авиастроению, он работал секретарем посольства в Великобритании и секретарем китайской делегации на Версальской мирной конференции. Вернувшись в Китай в 1919 году, он был назначен директором департамента судоходства, а затем директором школы военно-морского производства.\n\nПолучив звание суперинтенданта военно-морского вооружения в 1921 году, он переходит на должность директора пекинской авиационной школы Наньюань, контролируя работу от имени авиационной администрации. В 1925 году Шэнь становится директором департамента производства самолетов в Мавэе, а затем главным инспектором по производству военно-морского вооружения. Назначенный техническим инспектором Военно-морского министерства и директором Военно-морской академии Фучжоу, Шен продолжал службу до 1930 года, когда он стал полковником технического надзора Военно-морского министерства."
 LEP_shen_jingchen_mhc_desc: "§YОписание адмирала\nРодился:§! §g11 марта 1881, Хугуань, Фуцзянь, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_shen_jingchen_bio$§!"

 #Ministers

 #田文炳
 LEP_tian_wenbing: "Тянь Вэньбин"
 LEP_tian_wenbing_bio: "Поступив подростком в Хубэйскую военную академию, чтобы обеспечить себе пропитание, Тянь Вэньбин окончил ее в 1909 году и поступил на службу в цинскую армию в качестве командира взвода. Как и многие его сверстники и товарищи по учебе, Тянь выступил против коррумпированного и недееспособного цинского двора и присоединился к революционной армии, когда в 1911 году вспыхнуло восстание в Вучане. В Республике этот скромный офицер сначала служил в штабе в своей родной провинции Хэнань, а в 1916 году был переведен в канцелярию президента Ли Юаньхуна и в Генеральный штаб в качестве младшего офицера.\n\nТянь недолго пробыл в Пекине, так как в следующем году он был назначен штабным офицером в Цзянсу, где встретил своего начальника Ци Сеюаня, в то время военного губернатора этой провинции. Будучи верным и усердным сотрудником Ци, Тянь поддержал Ци в конфликте 1924 года и последовал за ним, когда Ци отправился в изгнание. Ци Сеюань вернулся в Восточный Китай после Шанхайской конференции, и Тянь стал его самым доверенным подчиненным, ведь он один из немногих, кто следовал за Ци от начала и до конца.\n\n§YПримечания: Как скромный подчиненный Ци, Тянь редко ставит под сомнение его решения, и всегда с готовностью поддерживает и выполняет его приказы в лучшем виде.§!"
 LEP_tian_wenbing_advisor_desc: "§YОписание советника\nРодился:§! §g1891, Синьсян, Хэнань, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YПолитическая карьера:§! §g$LEP_tian_wenbing_bio$§!"

 #厲麟似
 LEP_li_linsi: "Ли Линьси"
 LEP_li_linsi_bio: "Потомок знаменитой семьи Ли из Чжэцзяна, Ли Линьси начал свою жизнь, погрузившись в классику и другую литературу. Поступив в Университет Тунцзи, он окончил его в 1915 году и отправился в Софийский университет в Японии, где проучился четыре года. Вернувшись в Китай, он решительно и с отличными результатами сдал спонсируемый правительством экзамен для обучения в Германии. В Германии он получил степень магистра права в Йенском университете и доктора философии в Гейдельбергском университете.\n\nНа протяжении целого десятилетия он изучал политологию, образование, военное дело, английский, французский и русский языки. В 1921 году он основал известную в Германии организацию по изучению китаеведения, Академию Цзинсин, и первый профессиональный академический журнал, посвященный китаеведению. Продвигая усилия, направленные на то, чтобы западные люди могли понять значение китайской культуры, наряду с Ричардом Вильгельмом, Ли также познакомился с огромным количеством других китайцев, таких как Чжоу Эньлай, Чжу Дэ и Чжу Цзяхуа.\n\nВозвратившись в Китай в 1930 году с богатыми знаниями и пылающим патриотизмом, он поступил на работу в Министерство образования, работавшее на территории Лиги. Развивая образование и культурную дипломатию, Ли основал Китайско-немецкую культурную ассоциацию, Китайское образовательное общество и Китайскую образовательную киноассоциацию. Профессор Нанкинского университета, Ли также был директором Китайско-немецкого общества, а чтобы укрепить связи между Китаем и Миттельевропой, Ли совершил турне по различным европейским странам для проведения образовательных исследований и привлечения к дальнейшему сотрудничеству.\n\nСотрудничая с немецкой военной миссией в Китае, Ли служил переводчиком, а позже, в 1935 году, основал в Нанкине первую официальную организацию по обмену между Китаем и Германией."
 LEP_li_linsi_advisor_desc: "§YОписание советника\nРодился:§! §g18 февраля 1896, Ханчжоу, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YПолитическая карьера:§! §g$LEP_li_linsi_bio$§!\n\n$LEP_li_linsi_notes$"
 LEP_li_linsi_notes: "§YПримечания: Ли очень тесно дружит с В.К. Веллингтоном Ку, они разделяют идеи использования международной дипломатии для разрешения китайских споров.§!"

 #張心一
 LEP_zhang_xinyi: "Чжан Синьи"
 LEP_zhang_xinyi_bio: "Помогая своей семье в юном возрасте, Чжан Синьи поступил в местную школу в Ланьчжоу, а позже продолжил карьеру преподавателя английского языка. В 1914 году он был отобран в Академию Цинхуа в Пекине на основании своих знаний английского языка, но, несмотря на то, что его первоначально отклонили на повторном экзамене, он яростно отстаивал свою точку зрения и в итоге был принят в качестве студента на полный курс. В течение восьми лет обучения в Цинхуа Чжан изучал общественные науки, специализируясь на китайских школах мысли, буддизме и христианстве. В конце концов он принял теорию Ван Янмина о знании и действии.\n\nПосле начала ноябрьских протестов Чжан погрузился в патриотическое движение, осуждая правительство Аньхой, и в результате был задержан. Вскоре его освободили, и он вернулся в Цинхуа, чтобы сосредоточиться на изучении сельского хозяйства. Создав "Ассоциацию новых фермеров", он окончил Цинхуа в 1922 году и отправился в Университет Айовы, чтобы изучать животноводство и генетику в Университете Висконсина, практиковаться в измерении объема леса в Мичигане и обработке шерсти в Университете Вайоминга.\n\nПродвигая китайскую культуру в Америке, Чжан перешел в Корнельский университет, чтобы получить степень магистра в области экономики сельского хозяйства. Отказавшись от мечты об открытии эффективной фермы, Чжан стал профессором кафедры экономики сельского хозяйства в Университете Цзиньлин, где преподавал в течение двух лет. Пытаясь провести национальное сельскохозяйственное обследование, чтобы получить достоверные данные для своих исследований, Чжан нанял более 1900 человек в 23 провинциях и 600 уездах для проведения местных обследований, создав первую систематическую и научную сельскохозяйственную статистику в современной истории Китая.\n\nПомогая в публикации "Использование земли в Китае" в 1932 году, Чжан продолжил свою революционную сельскохозяйственную работу, находясь в Нанкине."
 LEP_zhang_xinyi_advisor_desc: "§YОписание советника\nРодился:§! §g17 января 1897, Юнцин, Ганьсу, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YПолитическая карьера:§! §g$LEP_zhang_xinyi_bio$§!"

 #丁文江
 LEP_ding_wenjiang: "Дин Вэньцзян"
 LEP_ding_wenjiang_bio: "Сын ученой семьи, Дин Вэньцзян отправился учиться в Японию, где помогал развивающимся революционным движениям. Получив письмо от У Чжихуя, в котором говорилось о процветании интеллектуализма в Шотландии, Дин отправился в Шотландию изучать зоологию и геологию, по пути познакомившись с Кан Ювэем. Поехав в Глазго, чтобы подрабатывать, Динг в конце концов оказался в Кембридже, а затем в Университете Глазго.\n\nВ 1911 году он вернулся в Китай и стал преподавать в государственной школе Наньян в Шанхае. Отправившись в Пекин на должность главы Департамента геологии Министерства промышленности и торговли, он возродил национальный интерес к геологическому искусству, отправившись в такие места, как Шаньси и Юньнань, для проведения геологических исследований и изучения полезных ископаемых. Работая с такими людьми, как Чжан Хунчжао, Цай Юаньпэй и Вэн Вэньхао, Дин в 1919 году отправился в Европу вместе с Лян Цичао.\n\nОкончив Пекинский университет в 1921 году, его сменил Вэн, и он отправился в провинцию Рехэ, чтобы стать генеральным директором угольной компании Beipiao Coal Mine Company. В 1922 году Динг участвовал в создании Геологического общества Китая, редактировал "Китайскую палеонтологию", а в 1923 году даже начал дебаты с Чжан Цзюньмаем о науке и метафизике. В 1925 году Дин оставил свой пост и присоединился к свите Сунь Чуаньфана, став генеральным директором Управления по надзору за торговым портом Сынху и даже участвуя в подавлении восстаний в пользу Суня.\n\nВ 1926 году Дин уходит в отставку и переезжает в Пекин, а в 1931 году снова становится профессором кафедры геологии Пекинского университета. В 1934 году по просьбе Сунь Дин снова отправляется на юг и становится генеральным директором Академии Цзиньлин."
 LEP_ding_wenjiang_advisor_desc: "§YОписание советника\nРодился:§! §g13 апреля 1887, Тайсин, Цзянсу, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YПолитическая карьера:§! §g$LEP_ding_wenjiang_bio$§!\n\n$LEP_ding_wenjiang_notes$"
 LEP_ding_wenjiang_notes: "§YПримечания: Его сотрудничество с Сунь Чуаньфаном привело к тому, что многие друзья-интеллектуалы Дина отдалились от него.§!"

 #危道豐
 LEP_wei_daofeng: "Вэй Даофэн"
 LEP_wei_daofeng_bio: "Провалив императорский экзамен в юном возрасте, Вэй Даофэн отправился в Гуанчжоу, чтобы учиться в школе Шиву (буквально - Школа текущих дел), а затем, в 1902 году, отправился в Японию, чтобы учиться в колледже Хунвэнь, а позже - в токийской Синбу Гакко. Ненадолго вернувшись в Китай, Вэй поступил в 5-й класс Академии императорской японской армии, чтобы изучать инженерное дело. Вернувшись в Китай в 1910 году, он сдал инженерный и императорский военный экзамены в Пекине и служил офицером гарнизона в Хунани.\n\nПо личной просьбе Ли Юаньхуна, он стал консультантом Юань Шикая. Служа в качестве преподавателя тактики в Пекине и наставника инженерных войск Армии участия в войне, Вэй вернулся в Хунань в 1917 году, чтобы служить заместителем начальника канцелярии военного губернатора при Фу Лянчжуо. Покинув родную провинцию в 1919 году, когда Фу был изгнан, Вэй в 1922 году был тайно отправлен на юг, чтобы смягчить напряженность между северными и южными военачальниками. \Получив в 1923 году звание генерал-майора и отправившись в 1924 году на Тайвань, находящийся под японской оккупацией, Вэй в 1925 году стал местным магистратом ряда уездов под эгидой Сунь Чуаньфана, а после размолвки между Лю Хайсу и Сунем по поводу значения обнаженных моделей, продолжал служить губернатором уезда Шанхай вплоть до Северного похода. В то время как Сунь Чуаньфану удавалось удерживать свои территории Лиги, Вэю удавалось сглаживать напряженность между Южным Чжили и Фэнтянем во время последующих войн Чжифэна, отчасти благодаря его личным связям с Чжан Сюэляном. Умелый и харизматичный сладкоречивый собеседник, Вэй то и дело использовался Суном в последние пару лет, чтобы сгладить часто очень колючие отношения между соотечественниками."
 LEP_wei_daofeng_advisor_desc: "§YОписание советника\nРодился:§! §g1884, Цяньян, Хунань, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YПолитическая карьера:§! §g$LEP_wei_daofeng_bio$§!"

 #湯爾和
 LEP_tang_erhe: "Тань Эрхэ"
 LEP_tang_erhe_bio: "Прославленный интеллектуал, знаменитый "Старик Люсун" - довольно необычный человек в окружении Сунь Чуаньфана. Изучая классику и получая частную опеку, он был одаренным учеником. В 1903 году Тан Эрхэ отправляется в Японию, где изучает военное дело в школе Чэнчэн, участвует в антицинских и антиимпериалистических акциях, вступает в Тунмэнхуэй. Работая преподавателем музыки в Чжэцзянском университете в 1904 году, Тан вернулся в Японию через 3 года, чтобы изучать медицину в Медицинском колледже Канадзавы, а затем отправился в Берлин для получения степени доктора медицины.\n\n Вернувшись и работая на различных должностях в качестве врача и медицинского директора, он основал Чжэцзянскую больницу и присоединился к Синьхайской революции. Основав Национальный пекинский медицинский колледж, он стал его директором, а в 1915 году инициировал создание Медицинского общества Китайской Республики. Отправленный в 1920 году изучать европейскую медицину, Тан вернулся в Китай в 1922 году и стал заместителем министра образования.\n\nПриглашенный на должность министра образования в "Правительстве добрых людей" У Пейфу и Ван Чонхуя, Тан служил посланником Общества Красного Креста Китая в Японии после Великого землетрясения Канто в 1923 году. В 1925 году Тан ненадолго ввязался в спор с Ван Цзинвэем по поводу того, чем лечить болезнь доктора Суня - традиционной или западной медициной, и встал на сторону западной медицины. В 1926 году Тан был назначен генеральным директором Министерства внутренних дел, а в 1927 году стал министром финансов.\n\nВ 1929 году Тан получил степень доктора медицины в Токийском императорском университете, а после возвращения работал на различных должностях в правительстве Южной Чжили. Совсем недавно Тан занял должность профессора в Академии Цзиньлин."
 LEP_tang_erhe_advisor_desc: "§YОписание советника\nРодился:§! §g1878, Ханчжоу, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YПолитическая карьера:§! §g$LEP_tang_erhe_bio$§!"

 #厲爾康
 LEP_li_erkang: "Ли Эркан"
 LEP_li_erkang_bio: "Ли Эркан, чьи предки были учеными, родился в семье ученых, научился читать в возрасте двух лет и в детстве изучал классические китайские сочинения. Его карьера военного началась в 1903 году, когда он был переведен из частной средней школы в Чжэцзянскую военную академию. Как выдающийся ученик, вместе с такими знаменитостями, как Янь Сишань, Тан Цзяо, Чжао Хэнти и, самое главное, Сунь Чуаньфань, он был направлен в 6-й класс Академии императорской армии Японии, где Ли изучал пехоту. После возвращения в Китай в 1909 году этот блестящий офицер был принят на службу в Императорскую гвардию, так как талант Ли был признан Цайтао, он стал одним из немногих ханьцев, занимавших высокий пост в Императорской гвардии Цин.\n\n Когда вспыхнула Синьхайская революция, оставив сожалеющее письмо Цайтао, Ли Эркан присоединился к революционной армии в качестве воспитателя и после этого остался в своей родной провинции, служа военным писателем, штабистом и воспитателем в губернаторстве Чжэцзян. После того как Сунь Чуаньфан вошел в Чжэцзян, Ли был нанят Сунем и в 1923-1924 годах был отправлен в Японию. После возвращения он провел большую часть времени, завершая и публикуя свои наблюдения о самом опасном враге Китая и помогая Сунь Чуаньфану в обучении новых офицеров. Хотя Ли не одобряет концессионистский характер Лиги, он остается за значительные издательские ресурсы в Чжэцзяне и идеальные условия для военных академических дискуссий и обмена мнениями с державами, особенно с Германией, которую Ли считает самой передовой в военном отношении державой.\n\n§YПримечания: Как плодовитый военный интеллектуал, Ли Эркан, редактор нескольких военных журналов в Чжэцзяне, опубликовал и перевел бесчисленное количество военных работ, среди которых наиболее заметными являются "Новая военная тактика, изученная в европейской войне" (1916), "Токсичный газ и токсичный дым" (1928), "Национальная оборона и снабжение" (1929), "Военное понимание Японии после европейской войны" (1929) и "Курс военной подготовки молодежи" (1931). Некоторые считают, что часть военной мысли Цзян Байли была вдохновлена Ли, поскольку Цзян высоко оценил идеи Ли в предисловии к "Национальной обороне и снабжению", где Ли призывает к всеобъемлющей национальной, экономической и социальной мобилизации против неизбежной японской агрессии. Будучи наставником Чэнь Чэна и заклятым братом Чэнь Лифу, Ли Эркан также имеет хорошие связи в правом элементе Гоминьдана, и он пытался убедить Суня сотрудничать с Гоминьданом в Северном походе.§!"
 LEP_li_erkang_advisor_desc: "§YОписание советника\nРодился:§! §g1888, Ханчжоу, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YПолитическая карьера:§! §g$LEP_li_erkang_bio$§!"

 #楊文愷
 LEP_yang_wenkai: "Ян Вэнькай"
 LEP_yang_wenkai_bio: "В 1902 году Ян Вэнькай поступил в ускоренную военную академию армии Бэйяна для изучения пехоты, получив официальную стипендию для обучения в Японии. Выбрав обучение в токийской школе Синбу Гакко, Ян затем поступил в 6-й класс Императорской японской военной академии для изучения пехоты и стал близким одноклассником и другом Сунь Чуаньфана. Вернувшись в Китай в 1919 году, Ян служил старшим офицером Императорской гвардии Цин, начальником отдела по военным делам в канцелярии губернатора Чжили, а также занимал ту же должность у губернатора Хубэя.\n\nНедолго прослужив начальником Ханьянского арсенала, Ян стал сотрудником военачальника Южной Чжили Ван Чжанюаня. В 1921 году Ян переходит на службу к Сунь Чуаньфану и вместе с ним отправляется в Фуцзянь, чтобы служить советником в канцелярии губернатора провинции Фуцзянь. В 1925 году Ян стал генеральным советником штаба армии Лиги пяти юго-восточных провинций, а в следующем году - генеральным директором сельского хозяйства и торговли в кабинетах Янь Хуэйцина, Ду Сигуя и Гу Вэйцзюня.\n\nПерейдя в кабинет Пань Фу, Ян переехал в Тяньцзинь, а после Чжифэнских войн вернулся в Лигу. Предоставив свои знания и опыт Сунь Чуаньфану, своему близкому школьному товарищу, Ян стал авторитетным собеседником маршала Лиги."
 LEP_yang_wenkai_advisor_desc: "§YОписание советника\nРодился:§! §g1883, Юнцин, Чжили, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YПолитическая карьера:§! §g$LEP_yang_wenkai_bio$§!"

 #歐陽武
 LEP_ouyang_wu: "Оуян Ву"
 LEP_ouyang_wu_bio: "С ранних лет Оуян Ву изучал наньцюань, фехтование и другие боевые искусства, тренируя свое тело, чтобы стать воином. Поступив в Военную академию Цзянси, он усердно учился и окончил ее с отличием. В 1905 году он был принят на обучение пехоте в 6-й класс Академии императорской армии Японии, а в 1909 году вернулся в Китай, где в 1911 году был назначен командиром артиллерийского батальона в Цинской армии. После Синьхая Оуян служил командиром цзянсийской гвардии под командованием Ли Лицзюня, а затем стал военным губернатором провинции Цзянси в 1913 году.\n\nНенадолго арестованный за воздержание от своих обязанностей ради проповеди буддизма, но не ушедший официально в отставку, Оуян был восстановлен в военном звании в 1916 году. Попросив назначить его специальным посланником на переговорах между Севером и Югом, У Пэйфу заметил его возможный обман и заставил отозвать Оуяна. В 1925 году Цао Кунь отказался нанять Оуяна в качестве консультанта, но губернатор Цзянси Цай Чэнсюнь, услышав о печально известном буддисте-воине, тут же взял его на работу. Дэн Жучжуо также нанял Оуяна.\n\nСлужа советником в правительстве провинции Цзянси, Оуян в 1933 году становится председателем Комитета по экономическому обзору провинции Цзянси, но в остальном послушно служит своей провинции."
 LEP_ouyang_wu_advisor_desc: "§YОписание советника\nРодился:§! §g1881, Цзишуй, Цзянси, Империя Цин§!\n§YСимпатизирует:§! §mЮжное Чжили§!\n§YПолитическая карьера:§! §g$LEP_ouyang_wu_bio$§!"

 #李承幹
 LEP_li_chenggan: "Ли Чэнган"
 LEP_li_chenggan_bio: "Посещая частную школу и получая традиционное имперское экзаменационное образование, Ли Чэнган впоследствии учился в провинциальной промышленной школе Чанша. Получив новые научные и технологические знания того времени, Ли через своих учителей стал общаться с такими людьми, как Хуан Син. Революционная мысль оказала на Ли большое влияние, и у него появилось стремление увеличить промышленный потенциал Китая, чтобы победить иностранных империалистов.\n\nВыбранный Чжан Чжидуном для обучения в Японии, Ли посещал подготовительную школу в Осаке и младшую среднюю школу Кансай, а затем поступил в среднюю школу Токио Дайити и шестую среднюю школу Окаяма. Во время учебы в школе Ли бросил учебу во время Синьхайской революции и присоединился к революционной армии Хуан Сина, сражаясь на линии фронта Ханьян.\n\n Продолжив учебу, Ли поступил на электротехнический факультет Токийского императорского университета и окончил его с отличием. Служил начальником секции в промышленном отделе канцелярии губернатора провинции Хунань, а затем в Ханьянском арсенале и инструктором в Ханьянской оружейной школе.\n\nКогда прибыл Северный поход, Ли служил начальником инженерной секции в Цзиньлинском производственном бюро, полностью посвятив себя производству оружия. Став в 1929 году директором производственного отдела Цзиньлинского арсенала, Ли поставил перед собой задачу обучать своих сотрудников, чтобы вырастить новое поколение специалистов по производству вооружений."
 LEP_li_chenggan_advisor_desc: "§YОписание советника\nРодился:§! §gАвгуст 1888, Чанша, Хунань, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YПолитическая карьера:§! §g$LEP_li_chenggan_bio$§!"

 #陳棲霞
 LEP_chen_qixia: "Чэнь Цися"
 LEP_chen_qixia_bio: "В 1930 году Чэнь Цися был принят в первый класс Юньнаньской авиационной школы в Куньмине. Окончив годичный курс, Чэнь был направлен в Шанхайские военно-воздушные силы. В 1932 году он отправился в Парижскую авиационную школу для продолжения обучения, а в 1934 году вернулся в Китай и стал летчиком-инструктором в авиационной школе Ханчжоу, где и работает по сей день."
 LEP_chen_qixia_mhc_desc: "§YОписание адмирала\nРодился:§! §g1901, Цинтянь, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_chen_qixia_bio$§!"

 #王天祥
 LEP_wang_tianxiang: "Ван Тяньсян"
 LEP_wang_tianxiang_bio: "Сын из купеческой семьи, Ван Тяньсян был назван своим отцом исключительно из-за его личного уважения к честности национального героя Вэнь Тяньсяна. Смышленый, обучаемый, восторженный и щедрый, Ван преуспел в учебе, окончив среднюю школу в 1927 году. Поступив в Нанкинскую военную академию, он перевелся в ее авиационную школу, которую окончил в 1932 году с отличными результатами и был назначен во вторую эскадрилью второй бригады китайских ВВС. Менее чем через два года Ванг становится заместителем командира эскадрильи Первой истребительной эскадрильи и одновременно работает инструктором в своей прежней авиационной школе. В 1935 году Ванг получил звание капитана Седьмой эскадрильи ВВС, а затем заместителя капитана Третьей бригады."
 LEP_wang_tianxiang_mhc_desc: "§YОписание адмирала\nРодился:§! §g26 ноября 1909, Хуанъян, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_wang_tianxiang_bio$§!"

 #李寶章
 LEP_li_baozhang: "Ли Баочжан"
 LEP_li_baozhang_bio: "Ранняя жизнь Ли Баожана, окончившего 1-й класс Баодинской военной академии и обучавшегося пехоте, остается полной загадкой. Окончив среднюю армейскую школу Цинхэ в Пекине, а затем Баодинскую военную академию, Ли был направлен во 2-ю дивизию армии Бэйян. Последовательно служа командиром роты, штабным офицером и командиром батальона под командованием Сунь Чуаньфана, Лу Сянтина и Янь Цзинцзуна, Ли принял активное участие в войне за помощь Чжэцзянской армии.\n\n В 1923 году он стал личным командиром гвардии Сунь Чуаньфана, а в следующем году участвовал в Цзянсу-Чжэцзянской войне, став главнокомандующим Цзянсу-Чжэцзянских союзных сил Сунь. В 1926 году Ли стал командиром бригады в союзных войсках Пяти провинций, а также главнокомандующим и главой бригады охраны Суна.\n\nКомандуя войсками во время различных подавляющих движений, Ли дослужился до командира дивизии после Северного похода, сражаясь в Фуцзяни и Цзянси. В 1929 году, взяв с собой двадцать тысяч солдат, Ли вступает в Молодую китайскую партию. Сразу же разрешив младокитайцам мобилизовать и политизировать свою армию, он установил прекрасные отношения с Цзэн Ци в Пекине, практически превратив отряд Ли в партийную армию младокитайцев. Обладая мощным влиянием в Лиге, он всегда на слуху у маршала Лиги и является лидером младокитайцев на территории страны."
 LEP_li_baozhang_advisor_desc: "§YОписание советника\nРодился:§! §g1890, in Qingyuan County, Чжили, Империя Цин§!\n§YСимпатизирует:§! §NМладокитайцы§!\n§YПолитическая карьера:§! §g$LEP_li_baozhang_bio$§!\n\n$LEP_li_baozhang_notes$"
 LEP_li_baozhang_notes: "§YПримечания: Он необычайно жесток даже по меркам военачальников. За обезглавливание наряду с другими видами казни он получил прозвища "Генерал-гильотина" и "Машина для отрубания голов".§!"

 LEP_hermann_kriebel: "Герман Крибель"
 
 ###- Theorists -###
 LEP_german_trained_officers_theorist: "Офицеры, прошедшие немецкую подготовку"
 LEP_german_trained_officers_theorist_desc: "§LРожденные в результате "особых отношений" между китайской нацией и Германской империей, наши офицеры, прошедшие немецкую подготовку, оказались одним из самых полезных результатов нашего сотрудничества. Обученные современным тактикам мобильной войны, они прошли обучение у победителей Вельткрига и являются одними из самых передовых военных теоретиков Китая. Однако обучение в Берлине принесло с собой и фракционность немецких военных.\n\nРазделяясь между Ли Жэньтао с его обожанием химической войны, Сюй Пейгеном "Мольтке Востока" с его настаиванием на небольшой, элитной, современной армии, и многочисленными военными промышленниками, вдохновленными Максом Бэром, они почти полностью похожи на своих наставников. Хотя их теориями и гениальностью можно восхищаться, некоторые аспекты совершенно неприемлемы в Лиге. В первую очередь, это полная автономия офицеров, поскольку многие из младших офицеров... радикальны и выступают против маршала Лиги."
 LEP_zhejun_officers_theorist: "Офицеры Чжэцзюнь"
 LEP_zhejun_officers_theorist_desc: "§LПожалуй, самая большая конкурирующая клика военных теоретиков с Баодинской кликой Цзян Бэйли, "Офицеры Чжэцзюнь" излагают свою военную теорию в "Национальной обороне и поставках", книге известного военного интеллектуала Ли Эркана. Уроженец Чжэцзяна, его труды полюбились молодым, революционно настроенным и радикально настроенным младшим офицерам Чжэцзянской клики. В своих различных работах Ли Эркан излагает теорию, не слишком похожую на теорию Цзян Байли, и многие ссылаются на то, что Цзян был вдохновлен Ли.\n\nОсновные постулаты военной теории Ли сосредоточены на мобилизации китайской нации, чтобы она была готова войти в состояние национальной осады. Борясь с пацифизмом перед лицом растущего милитаризма Японии, Ли утверждает, что современные войны требуют полных усилий нации и ее народа, не только в мобилизации, но и в подготовке к развитию военных исследований, материальной независимости и установлению военных протоколов, таких как система рационов на продовольствие и топливо. Аналогичным образом Ли настаивает на милитаризации молодежи и общества, уделяя особое внимание использованию химического оружия, которое, по мнению Ли, может появиться в следующей крупной войне в Китае, несмотря на то, что оно запрещено на международном уровне. Офицеры "Чжэцзюнь" также пропагандируют использование тактики легкой пехоты, современного вооружения и фокусируются на обучении и координации, а не на духе. Они считают, что использование "бусидо" по примеру Японии и Вампоа приводит к пренебрежению научными методами ведения войны.§!"
 LEP_nanjing_clique_theorist: "Нанкинская клика"
 LEP_nanjing_clique_theorist_desc: "§LВ военном аппарате Лиги нет более распространенной клики, чем "логово улыбающегося тигра". Как сама Лига родилась благодаря связям, дружбе и военному мастерству Сунь Чуаньфана, так и армия Лиги. Функционально служа оплотом старой гвардии против радикалов из школы Ли Эркана и обученных в Германии юниоров, собственная клика Улыбающегося Тигра сосредоточена на уникальных и блестящих качествах гениальных соратников Суня. Среди них Се Хунсунь, Ма Юрэн, Чжоу Иньрен и Лю Цзунцзи. Они используют в своей работе опыт, накопленный ими, и знания, полученные в старые времена в Баодине.\n\n Поэтому они довольно устойчивы, упрямы и сосредоточены на проверенных и верных методах военной победы, благодаря которым они до сих пор занимают свое положение. Однако из-за этого их часто называют ископаемыми, реликтами или кумовьями их более радикально настроенные подчиненные. Тем не менее, их опыт и мастерство огромны и представляют собой традиционную характеристику армии Лиги.§!"
 
