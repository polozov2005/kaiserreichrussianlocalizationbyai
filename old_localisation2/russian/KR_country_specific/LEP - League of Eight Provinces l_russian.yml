 LEP_governor_contacts_missions: "Спасти губернаторов"
 LEP_governor_contacts_missions_desc: "Губернаторы Цзянси, Цзянсу и Чжэцзяна потеряли или прекратили связи с новой администрацией Маршала Лиги в Нанкине. Наши враги берутся за оружие и восстают, а значит возвращение губернаторов и их армий под наше командование необходимо.\n\nК сожалению, ситуация напряжена, а ресурсы ограничены – вернуть всех, возможно, не удастся..."

