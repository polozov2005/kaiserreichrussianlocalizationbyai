#Промышленные проблемы
 cfhi: "CFHI"
 cfhi_desc: "CFHI или China First Heavy Industry Group Co. Ltd, является крупным производителем оборудования в Китае. Управляется непосредственно националистическим правительством и в значительной степени стоит за военной промышленностью, металлургическим и горнодобывающим оборудованием страны."
 national_railway_corporation: "NRC"
 national_railway_corporation_desc: "Национальная железнодорожная корпорация управляется Министерством железных дорог и Министерством связи националистического правительства и эффективно национализировала ранее принадлежавшие иностранцам железные дороги и занимается строительством новых транспортных сетей по всей стране."
 cetc: "CETC"
 cetc_desc: "CETC или China Electronics Technology Corporation - корпорация, управляемая Министерством связи националистического правительства с целью обеспечения связи и гражданской электроники для нужд Национально-революционной армии."
 sinopec: "Sinopec"
 sinopec_desc: "Sinopec или China Petroleum & Chemical Corporation - корпорация, организованная Министерством внутренних дел и управляющая нефтяными и нефтегазовыми запасами страны, а также стимулирующая добычу нефти и химических веществ по всей стране."
#Материальные проблемы
 norinco: "Norinco"
 norinco_desc: "Norinco, что расшифровывается как China North Industries Group Corporation Limited, - это корпорация, которая должна управлять бывшими промышленными предприятиями северокитайских клик, таких как клика Фэнтянь и клика Чжили. Организованная Министерством торговли и внутренних дел, Norinco управляет в основном военными отраслями промышленности для нужд Национальной революционной армии."
 faw_motors: "Faw Motors"
 faw_motors_desc: "При содействии европейских производителей автомобилей из Британского союза и Французской коммуны компания Faw Motors, или First Automobile Works, заложила первый в Китае государственный автомобильный завод. Он предназначен для производства современных автомобилей как для гражданского, так и для военного использования."
#Авиаконструкторы
 china_aviation_corporation_CHI: "CNAC"
 china_aviation_corporation_CHI_desc: "Китайская национальная авиационная корпорация была организована по распоряжению Исполнительного Юаня под руководством как Министерства железных дорог, так и Министерства связи. CNAC создавалась при содействии Британского союза и Французской коммуны и при ее создании столкнулась с сопротивлением военных кликсов Китая, имеющих свои собственные ВВС. Таким образом, CNAC была создана для того, чтобы контролировать и национализировать все воздушные перевозки и авиапочту"
 central_aircraft_manufacturing_company: "ЦАНК"
 central_aircraft_manufacturing_company_desc: "Центральная авиастроительная компания была разработана националистическим министерством авиации как средство производства самолетов военного и гражданского назначения как для ВВС Китайской Республики, так и для гражданских перевозок."
 central_air_transport: "CAT"
 central_air_transport_desc: "Центральный воздушный транспорт организован Министерством связи для облегчения воздушных сообщений и перевозок как гражданского, так и военного назначения по всей стране"
#Военно-морской конструктор
 csic: "CSIC"
 csic_desc: "Китайская корпорация судостроительной промышленности - государственное судостроительное предприятие, организованное Министерством торговли и Министерством военно-морского флота с целью использования бывшей северной военно-морской промышленности клики Фэнтянь и Чжили для строительства нового националистического флота."
 china_state_shipbuilding_corporation: "CSSC"
 china_state_shipbuilding_corporation_desc: "Китайская государственная судостроительная корпорация была создана по приказу Министерства военно-морского флота для содействия строительству и производству боевых кораблей с привлечением европейских конструкторов и консультантов в качестве средства модернизации растущей военно-морской промышленности Китая."
#Танковые концерны
 sinotruk: "Синотрук"
 #Да, видимо, пишется truk
 sinotruk_desc: "Sinotruk или China National Heavy Duty Truck Group Co., Ltd - государственный производитель грузовых автомобилей, созданный на базе бывшего Цзинаньского автомобильного завода. Она известна тем, что производит собственные китайские грузовики, а также импортирует разработки зарубежных производителей грузовиков как для военных, так и для гражданских нужд."

#Политические идеи
 KR_CHI_popular_support_desc: "Гоминьдан может иметь демократические и популистские идеалы, но ему еще предстоит пройти долгий путь воплощения этих идеалов в жизнь. Для крестьян и рабочих Китая многие мечтатели приходили и уходили со своими утопическими обещаниями, и лишь немногие их выполняли. Победы на полях сражений могут доказать стойкость Гоминьдана и, возможно, объединить Китай под его знаменем, но если он хочет по-настоящему завоевать сердца людей, он должен прежде всего избавить от вечных трудностей простых людей.\n\nПотребуется длительный период государственного строительства и тщательного проведения политики, чтобы простые люди увидели в националистическом правительстве легитимность, не считая надменных заявлений и парадных шествий. Пока же многие видят в гоминьдановцах не более чем военачальников или опасных прихлебателей далеких синдикалистских держав"

