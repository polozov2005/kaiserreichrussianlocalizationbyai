 CHI_towards_devolution_tt: "§SWe dream of a world without borders, without class, without differences, without hate - only the concept of love and unity binds us together. As such. As part of creating an idealised world of federations aligned with Dr. Sun Yat-sen's ideals, we will have unique §YLand Reform Decisions§! that will raise §YSocial Conservative§! support - strengthening our end spirit §Y"True Love"§!§!"

