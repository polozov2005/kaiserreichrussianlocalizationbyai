###- Лидеры вкуса -###.
#王明 - Ван Мин, в КРТЛ проходит под именем 陈绍禹 (Чэнь Шаоюй)
 CHI_chen_shaoyu: "Чэнь Шаоюй"
 CHI_chen_shaoyu_leader_desc: "§YОписание лидера\nРодился:§! 23 мая 1904 г. в Цзиньцае, провинция Аньхой, империя Цин.§YПолитическая карьера:§! Чэнь Шаоюй родился в бедной крестьянской семье и поступил в начальную школу Чжичэн в уезде Гуши. Затем он поступил в Сельскохозяйственную школу провинции Аньхой, основанную революционером Чжу Юньшанем, который оказал глубокое влияние на учеников школы, познакомив их со многими прогрессивными журналами и книгами. Большое влияние на него оказал и его учитель Цянь Синьчунь, который рассказывал Чэнь Шаою о таких известных лидерах, как мученик Владимир Ленин и Чэнь Дусю. В школьные годы он активно участвовал в политическом движении, возглавлял бойкоты против японских и немецких товаров и коррумпированных выборов. Летом 1924 г. он официально вступил в Синдикалистскую партию Китая и принял участие в движении 30 мая накануне Северного похода.\n\nПосле провала экспедиции вновь организованная Союз синдикалистов Китая направила Чэнь Шаоюя на учебу в Университет Сунь Ятсена в Монтаржи (Франция), где он смог овладеть французским языком и увлекся движением\"ультрасиндикализма\" в Коммуне Франции. Именно здесь он стал лидером более радикальных членов китайской синдикалистской революции, тех, кто считал, что революция должна осуществляться рабочими и профсоюзами в ее истинно ортодоксальной форме. Радикальный тон этих политически амбициозных и молодых китайских синдикалистов заслужил прозвище \N "радикальной\Nфракции", и их присутствие отражает некоторые из напряжений, которые пронизывали как Союз синдикалистов Китая, так и хрупкий единый фронт с Гоминьданом.\После бурного открытия Всекитайского собрания народных представителей радикалы СПК устроили мягкий переворот, который позволил им вытеснить своих более умеренных \"ортодоксальных\" соперников, создав условия для того, чтобы Чэнь взял под контроль формирующееся правительство."

#易培基
 CHI_yi_peiji: "И Пэйцзи"
 CHI_yi_peiji_leader_desc: "§YОписание лидера\nРодился:§! 28 февраля 1880 года в Чанша, провинция Хунань, империя Цин\n§YПолитическая карьера:§! Сын цинского военного офицера, И был вдохновлен волной национализма и антиконцессионизма, поднявшейся после крупных поражений Цин в Боксерском восстании и китайско-японской войне. Одноклассник Чжао Хэнти, И впоследствии учился в Японии и стал преподавателем в политической обстановке после Синьхая. В надежде свергнуть хунаньское правительство он вступил в Гоминьдан и стал советником Сунь Ятсена. Он подружился с Ли Шицзэном, который рос вместе с парижскими анархистами \"(Новое) Всемирное общество\" И стал их рупором в Союзе синдикалистов Китая, надеясь привлечь анархистов и синдикалистов к сотрудничеству с гоминьдановским истеблишментом и в то же время предотвратить слишком близкое приближение партии к авторитаризму.\n\nПосле бурного открытия Всекитайского собрания народных представителей ловкие маневры Всемирного общества позволили им объединить анархистов, недовольных членов Лиги и остатки Гоминьдана, чтобы вырвать контроль над LCS из-под контроля CSP. "

#顧孟餘
 CHI_gu_mengyu: "Гу Мэнъюй"
 CHI_gu_mengyu_advisor_desc: "§YОписание советника\nРодился:§! §g18 октября 1888 года в Ваньпине, провинция Чжили, империя Цин§!\n§YПринадлежность:§! §gРАТ§!\n§YПолитическая карьера:§! §gGu представляет собой интересного члена окружения Вана. Несмотря на близость к Вану, он часто дистанцируется как от фракции резидентов во главе с Чэнь Бицзюнем, так и от \"радикалов\" в РАТ во главе с Чэнь Гунбо. Свободно владея английским, французским и немецким языками, он работал в Пекинском университете, а затем был введен в Гоминьдан Цай Юаньпэем и Ли Шицзэном. После провала Северного похода он бежал вместе с ЦК в Париж.\n\nГу, плодовитый писатель по вопросам социализма, критический редактор газеты "Цяньцзинь" (\n\"Продвижение\"), противостоит убеждениям Чэнь Гунбо в области марксизма. По мнению Гу, в Китае отсутствуют классы индустриального общества, и поэтому классовая война бессмысленна. В частности, он считает, что необходимо провести земельную реформу, организовав крестьянство в ассоциации. Отсюда они смогут развивать политическую власть и способствовать росту местного самоуправления.\n\nНесмотря на приверженность идее развития местной демократии, Гу, тем не менее, яростно выступает против революции в массах. Революционный сброд толпы не приведет к успеху; вместо этого необходимо сильное руководство, которое поведет их за собой, - сильное руководство Гоминьдана. Несмотря на разногласия, Гу и Чэнь вместе создали Реорганизованную ассоциацию товарищей в поддержку реорганизации Гоминьдана в 1924 г. и таким образом сформировали доминирующий блок в гоминьдановской левой партии на протяжении более десяти лет.§!\n\n§YNotes: Лидер и наиболее влиятельный член РАТ \"Умеренных\", Гу часто разрывается между своей лояльностью к Вану и симпатиями к КПК.§!"

 CHI_assorted_leaders: "Избранные лидеры"
 CHI_assorted_leaders_desc: "§YОписание лидера\n§YПолитическая карьера:§! Перестаньте просматривать код и играйте в игру!!!"

#国民党四大元老
 CHI_four_elders: "Четыре старейшины"
 CHI_four_elders_advisor_desc: "§YОписание советника\nРодился:§! §g1906, в Монтаржи, Франция§!\n§YПринадлежность:§! §gВсемирное общество§!\n§YПолитическая карьера:§! §Четыре старейшины Гоминьдана - так называли Чжан Жэньцзе, Ли Шицзэна, У Чжихуэя и Цай Юаньпэя, друзей из Чжэцзяна, познакомившихся в эмиграции в Париже в начале века. Недовольные правительством Цин и находившиеся под влиянием анархистских идей, они предсказали, что новый мир не за горами, и вместе основали \"(Новое) Всемирное Общество\", первую в Китае анархистскую организацию. Они также стали членами-основателями "Тонгменгуй" Сунь Ятсена, поддержав Синьхайскую революцию.\n\n Их предсказания об изменении мира подтвердились в результате синдикалистских революций в Европе, одновременно с подъемом Гоминьдана. За десятилетия своей карьеры они сыграли ключевую роль в формировании китайского социализма, став наставниками и воспитателями тысяч людей благодаря движению "Усердный труд - бережливая учеба" и сыграв ключевую роль в новообразованном Гоминьдане.\n\nНесмотря на то, что вначале они потеряли поддержку в анархо-синдикалистском движении из-за своей готовности принять авторитаризм, присущий политической опеке, а "Всемирное общество" было оттеснено на второй план с появлением Синдикалистской партия Китая, с тех пор "Четыре старейшины" вновь стали ведущими лидерами китайского синдикалистского дискурса. Расставшись со своим бывшим протеже Ван Цзинвэем, они тесно сблизились с таким же идеалистом Сун Цинлингом и Временным комитетом действий, поднявшись вместе с ними до национального лидерства.§!\n\n§YNotes: В соответствии со своими анархистскими принципами "четыре старейшины" отказались от официальных государственных должностей. Тем не менее, они сыграли значительную роль в формировании Республики, став генсеком партии и дав руководящую руку новому правительству.§!"

#宋子文
 CHI_song_ziwen: "Сун Цзывэнь"
 CHI_song_ziwen_desc: "§YОписание советника\nРодился:§! §g4 сентября 1894 года в Шанхае, Шанхайское международное поселение§!\n§YПринадлежность:§! §gНезависимый§!\n§YПолитическая карьера:§! §gПотомок семьи Сун и брат сестер Сун, Сун Цзывэнь получил степень бакалавра экономики в Гарвардском университете в 1915 году. Затем он работал в Международной банковской корпорации и одновременно защищал докторскую диссертацию в Колумбийском университете.\n\nВ 1924 г. его новый шурин Сунь Ятсен создал революционное правительство в Гуандуне и предложил Сунь Цзывэню занять пост министра финансов. Во время его пребывания на этом посту с 1924 по 1926 гг. экономика Гуанчжоу значительно выросла, и в этом большая заслуга Сонга, который ввел современное управление экономикой. Он также помог создать Центральный банк гоминьдановского правительства, роль которого до сих пор остается значительной. Это обеспечило его вхождение в состав Центрального исполнительного комитета в 1926 г.\n\nПосле провала Северного похода он бежал в город легатов. Он не хотел поддерживать левый поворот в партии, но, тем не менее, обеспечил повстанческое движение Мингана своей сестры тайным шанхайским финансированием. С возвращением Гоминьдана к власти, на этот раз на богатом восточном побережье Китая, его опыт был востребован, и он вновь стал известен. Однако, будучи одним из лиц буржуазии, он часто становится легким козлом отпущения для левых радикалов - несмотря на его личные связи. Этому не способствуют рассказы о его высокомерии, нетерпении и утилитаризме, когда он готов использовать нечестные методы, чтобы добиться своего.§!\n\n§YNotes: Брат Сун Цинлина и сводный дядя Сун Фо, по идеологии он более близок к последнему, но воздерживается от участия во фракции Реконструкции. Вместо этого он предпочитает компанию коллег-банкиров и технократов, замкнутую и недоверчивую клику.§!"

###- Заместитель командира -###.

#廖仲愷
 CHI_liao_zhongkai: "Ляо Чжункай"
 CHI_liao_zhongkai_advisor_desc: "§YОписание советника\nРодился:§! §g23 апреля 1877 года в Сан-Франциско, Калифорния, Соединенные Штаты Америки§!\n§YПринадлежность:§! §gНезависимая§!\n§YПолитическая карьера:§! §gПосле возвращения ЦК в Фуцзянь сразу же были предприняты усилия по слиянию правительства Мингана и вернувшегося из Парижа ЦК. Для дополнения руководства Вана не нашлось другого подходящего человека, кроме Ляо Чжункай, уважаемого государственного деятеля, личного друга Суня и одного из основателей Гоминьдана.\n\nПосле унизительного поражения Китая в китайско-японской войне Ляо посвятил себя изучению Запада и в 1897 г. женился на единомышленнице-революционерке Хэ Сяннин. Супруги отправились в Японию, где были глубоко тронуты революционными убеждениями доктора Сунь Ятсена и стали членами его "Тунмэнхуэй"\n\nПо возвращении в Китай он увлекся социалистическими идеями и писал о них в газете "Тунмэнхуэй" Ляо оставался на стороне Суня на протяжении многих лет, став членом ЦК. Он стал злейшим врагом правых сил партии из-за своей твердой поддержки крестьянского и рабочего движений, что отразилось и на его работе в качестве представителя партии в военной академии Вампоа. Его усилия по искоренению коррупции в армии едва не стоили ему жизни в 1925 г., когда он попал в засаду, устроенную различными убийцами.\n\n В эпоху после Северного похода он часто ездил туда-сюда, выполняя функции связного между Парижем и Минганом. Благодаря этому он завоевал доверие и Вана, и Суна, что помогло ему стать важным посредником в делах партии.§!\n\n§YNotes: В последние годы его здоровье заметно ухудшилось, в частности, из-за ранений, полученных во время покушения в 1925 г.§!"

#邓演达
 CHI_deng_yanda: "Денг Янда"
 CHI_deng_yanda_birth_info: "Родился:§! §g1 марта 1895 года в Хуэйчжоу, провинция Гуандун, империя Цин§!\n§YПринадлежность:§! §gPAC§!"
 CHI_deng_yanda_bio: "Дэн Яньда происходил из рода образованных и интеллектуалов; его отец был ученым в период правления Гуансюя. Под руководством отца молодой Дэн попал под влияние новых либеральных идей, пришедших с Запада. Решив изменить дряхлеющую династию Цин, он присоединился к Синьхайской революции в 1911 г. и вместе с Хуан Цисяном и Е Тином в 1916 г. поступил в Баодинскую военную академию.\n\n Когда Сунь был изгнан из Гуандуна в результате восстания Чэнь Цзюнмина, Дэн остался верен идеям Сунь и принял участие в возвращении Гоминьдана в Гуандун в 1923 г. Будучи заместителем директора учебного отдела Военной академии Вампоа, Дэн также поехал учиться в только что провозглашенную Коммуну Франции. Находясь за границей, он получил известие о смерти Суня и в 1926 г. вернулся в Китай, чтобы занять пост директора по образованию в Вампоа, готовясь к славной Северному походу.\n\nСеверный поход, однако, не удалась, но Дэн сохранил решимость. Считая, что успешная революция должна начинаться с масс, он тайно вернулся на родину в повстанческую зону Минган. Он стал надежным посредником между Сун Цинлин и Ли Цзишэнем, а также восходящей звездой в партии и армии"
 CHI_deng_yanda_advisor_desc: "§YОписание советника\n$CHI_deng_yanda_birth_info$\n§YПолитическая карьера:§! §g$CHI_deng_yanda_bio$ Он сыграл важную роль в развитии Временного комитета действий, выступая в качестве его официального лидера, в то время как его лучший друг Сун Цинлин официально выступает в качестве \n\n§YNotes: Мускулы, стоящие за PAC, не стоит недооценивать его идеологические убеждения и политические связи.§!"
 CHI_deng_yanda_mhc_desc: "§YОписание офицера\n$CHI_deng_yanda_birth_info$\n§YВоенная карьера:§! §g$CHI_deng_yanda_bio$ С годами он собрал многих своих товарищей и бывших учеников по НРА во фракцию, известную как Революционная ассоциация однокашников Военной академии Вампоа, господствующую в военных сетях Гоминьдана.§!\n\n§YNotes: Назначение его начальником Генерального штаба закрепило бы господство его фракции АРОВАВ в военных делах.§!"
 CHI_deng_yanda_commander_desc: "§YОбщее описание\n$CHI_deng_yanda_birth_info$\n§YВоенная карьера:§! §g$CHI_deng_yanda_bio$ Он оттачивал свои навыки командования партизанским отрядом, одновременно создавая мощную репутацию среди своих товарищей и бывших учеников в NRA.\n\n§YNotes: Харизматичный и сильный лидер, он имеет неприятную склонность к столкновениям с другими членами партии, что вызывает частые обвинения в бонапартизме.§!"

#賀衷寒
 CHI_he_zhonghan: "Хэ Чжунган"
 CHI_he_zhonghan_birth: "Родился:§! §g5 января 1900 года, в Юэяне, провинция Хунань, империя Цин§!\n§YПринадлежность:§! §gCRS§!"
 CHI_he_zhonghan_bio: "§gВ юности он был заядлым читателем и поглощал статьи Лян Цичао, видя в его идеях план создания современного Китая. Когда во Франции произошла революция, он обратился к марксизму, вступив в Общество изучения марксизма Дун Биву в Ухане. Вначале он вступил в Синдикалистскую партию Китая, но затем был исключен из нее из-за личных конфликтов. Он работал учителем в средней школе, пока его бывший наставник Дун Биву не пригласил его в Гуандун.\n\nСун Ятсен и его последователи накануне создания Военной академии Вампоа, и Хэ Чжунган с готовностью вступил в ряды ее первого класса. Хэ Чжунган, а также Чэнь Гэн и Цзян Сяньюнь стали \"тремя выдающимися выпускниками Вампоа"\. Он получил высшие баллы по политической и военной теории и увидел в Whampoa новую форму революционного духа: только с помощью меча и тех, кто присягнул своей партии и народу, страна может быть объединена. Более того, в первом директоре школы, великом Чан Кай Ши, он видел образцового, если не выдающегося лидера, который должен был возродить бодрость Китая и положить конец многовековому унижению.\n\n Однако Северный поход потерпела неудачу, Чан был убит, а сам он был вынужден бежать в Европу. Здесь он воссоединился с несколькими своими бывшими однокашниками по Whampoa, в частности, с Ху Цзуннанем и Дэн Вэньи. С новой силой Хэ Чжунган изучал зарождающиеся революции в Великобритании и Франции, подписывался на газету Maximist \"Action\" и пристально следил за возвышением Освальда Мосли. Вернувшись из изгнания, он надеется привнести в Национально-революционную армию тот же революционный дух, что и Вампоа.§!"
 CHI_he_zhonghan_advisor_desc: "§YОписание советника\n$CHI_he_zhonghan_birth$\n§YПолитическая карьера:§! $CHI_he_zhonghan_bio$\n\n§YПримечания: Помогая организовать вторую национальную революцию и перехитрив своих соперников в новом правительстве, Хэ Чжунган стал главным заместителем и теоретиком нового режима генералиссимуса.§!"
 CHI_he_zhonghan_commander_desc: "§YГенеральное описание\n$CHI_he_zhonghan_birth$\n§YВоенная карьера:§! $CHI_he_zhonghan_bio$\n\n§YПримечания: Один из ведущих членов Общества возрождения Китая, он часто рассматривается как \"мозг\" и идеологический теоретик этой операции, хотя лично он гораздо менее популярен, чем Ху Цзуннань.§!"

#力行社
 CHI_lixingshe: "Лисингше"
 CHI_lixingshe_advisor_desc: "§YОписание советника\nРодился:§! §g1933, в Бирмингеме, Британский Союз§!\n§YНаправление:§! §gОбщество возрождения Китая§!\n§YSummary§! §gЛисингше - это так называемый внутренний круг или внутреннее кольцо в иерархии организации, которую исповедует Общество возрождения Китая. Всего около 528 членов составляют этот так называемый \"новый\" Центральный исполнительный комитет. Центральный исполнительный комитет, центром которого является сам Ху Цзуннань. Однако истинным сердцем Lixingshe является еще один внутренний круг, состоящий из пяти членов постоянного комитета. Эти пять должностей или отделов: исполнительный секретарь (Хэ Чжунган), секретариат (Дэн Вэньи), отдел общих дел (Лю Бутун), отдел пропаганды (Кан Цзэ), организационный отдел (Чжэн Цзэминь) и секретная служба (Дай Чуньфэн).\n\n§YNotes: Лисингше, отличающиеся высокой степенью секретности, считаются самыми высокопоставленными членами Общества возрождения Китая и известны тем, что принимают решения по вопросам политики и деятельности Гоминьдана. Внутренний круг внутри внутреннего круга, однако только те, кто входит в постоянный комитет, постоянно пользуются вниманием генералиссимуса.§!"§!"

###- Командиры -###.

#李济深
 CHI_li_jishen: "Ли Цзишэнь"
 CHI_li_jishen_birth: "Родился:§! §g5 ноября 1885 года в Вучжоу, провинция Гуанси, империя Цин§!\n§YПринадлежность:§! §gНейтральный§!"
 CHI_li_jishen_bio: "В юности он поступил в среднюю школу г. Учжоу, где стал учеником Ху Ханьмина, будущего лидера правого крыла Гоминьдана. Его военная карьера началась в 1904 г., когда он поступил в ускоренную армейскую академию цинской армии Лянгуан в Гуандуне. После ее окончания он отправился на север, в Пекин, в Бэйянскую армейскую офицерскую академию, ставшую впоследствии престижной Баодинской военной академией. Когда в 1911 г. вспыхнула Синьхайская революция, он присоединился к революционной армии в Цзянсу, а после революции вернулся в Пекин для завершения учебы.\n\nЛи был приглашен в Гуандун в 1922 г. бывшим однокурсником Дэн Кэном, командиром 1-й дивизии Гуандунской армии. В последующие годы, несмотря на смерть Денга, он продвинулся по служебной лестнице и стал заместителем директора школы Уампоа при Чан Кай-ши. К моменту начала Северного похода Ли был губернатором Гуандуна и исполняющим обязанности директора Вампоа.\n\n Но когда экспедиция провалилась, его обвинили в том, что он не удержал Гуанчжоу, который, несмотря на все его усилия, перешел в руки немцев. Когда большая часть партии бежала во Францию, Ли остался, чтобы организовать остатки НРА. Несмотря на неудачу восстания 1932 года, он остается уважаемой фигурой среди военного истеблишмента"
 CHI_li_jishen_commander_desc: "§YОбщее описание\n$CHI_li_jishen_birth$\n§YВоенная карьера:§! §g$CHI_li_jishen_bio$\n\n§YПримечания: Официально являясь \"беспартийным\" офицером, он сделал все возможное, чтобы сохранить политическую нейтральность NRA, но это не защитило его от обвинений в правых взглядах.§!"
 CHI_li_jishen_mhc_desc: "§YОписание офицера\n$CHI_li_jishen_birth$\n§YВоенная карьера:§! §g$CHI_li_jishen_bio$§!\n\n§YПримечания: Официально являясь \"беспартийным\" офицером, он часто занимал пост военного министра и является естественным выбором для начальника Генерального штаба. Однако, несмотря на его декларируемую беспартийность, многие члены "молодой гвардии" выражают свое недовольство, обвиняя его в \"правых"\N§ симпатиях к так называемой \"индийской клике"\N§.

#叶挺
 CHI_ye_ting: "Е Тин"
 CHI_ye_ting_birth: "Родился:§! §g10 сентября 1896 года в Гуйшань, провинция Гуандун, империя Цин§!\n§YПринадлежность:§! §gPAC§!"
 CHI_ye_ting_bio: "В возрасте пятнадцати лет Е Тин обрезал свою косу (стиль, обязательный в маньчжурскую эпоху) в знак патриотического неповиновения, за что был исключен из школы. После окончания школы отец заставил его жениться на девушке на два года старше его, надеясь остепенить неугомонного Е Тина, но Е отправился на север в Хубэй изучать военные знания. В подготовительной школе Хубэйской армии ему рекомендовали поступить в Баодинскую военную академию. Здесь он увлекся новыми левыми идеями, проникшими в Китай, особенно идеями, изложенными в книге Чэнь Дусю "Новая молодежь"\n\nПосле окончания Баодина лидер Старой Гуансийской клики Лу Жунтин предложил ему занять должность магистрата Хуэйяна. Он отказался и последовал за Сунь Ят-сеном в Гуандун, где вступил в Гоминьдан, стал командиром батальона в Национально-революционной армии и прославился как способный командир на поле боя. В 1924 г. он вступил в Синдикалистскую партию Китая из-за своих твердых марксистских убеждений.\n\n Когда началась Северный поход, Е Тин возглавил передовые отряды в таких значимых сражениях, как битвы у моста Тинси и Вучан, завоевав в ходе войны репутацию одного из самых способных командиров НРА. Однако после провала экспедиции он решил присоединиться к Сун Цинлин и Ли Цзишэню в повстанческой зоне Минган"
 CHI_ye_ting_commander_desc: "§YОбщее описание\n$CHI_ye_ting_birth$\n§YВоенная карьера:§! §g$CHI_ye_ting_bio$ За это время он стал выдающимся инструктором, требующим от новобранцев высоких результатов и выступающим в роли ветерана-наставника для многих молодых офицеров, надеясь, что однажды воскресший NRA отомстит за своих погибших товарищей.§!\n\n§YNotes: Член повстанческой зоны МинГан, он симпатизирует, но не является убежденным членом PAC.§!"
 CHI_ye_ting_mhc_desc: "§YОписание офицера\n$CHI_ye_ting_birth$\n§YВоенная карьера:§! §g$CHI_ye_ting_bio$ Опыт работы в Зоне научил его ценить специализированные, элитные подразделения для нанесения целевых ударов.§!\n\n§YNotes: Член повстанческой зоны МинГан, он симпатизирует, но не является ярым приверженцем ВКД"

#張治中
 CHI_zhang_zhizhong: "Чжан Чжичжун"
 CHI_zhang_zhizhong_birth: "Родился:§! §gОктябрь 27, 1890, в Чаоху, провинция Аньхой, империя Цин§!\n§YПринадлежность:§! §gRCA§!"
 CHI_zhang_zhizhong_bio: "Военная карьера:§! §gЧжан Чжичжун родился в уезде Чаоху и в 1916 г. окончил пехотное отделение третьего класса Баодинской военной академии вместе с такими генералами, как Бай Чунси. Затем он служил в Юньнаньской, Гуансийской и Сычуаньской армиях, но по приглашению Чан Кайши вступил в Национально-революционную армию. Он был принят на должность инструктора и преподавателя в Военную академию Уампоа, где был членом комитета по военным исследованиям, работая вместе с иностранными советниками из Третьего Интернационала.\n\nЧжан входил в состав генерального штаба во время Восточной экспедиции, давая советы по разгрому армии Чэнь Цзюнмина. Во время Северного похода 1926 г. он проявил себя как один из самых талантливых офицеров НРА, но неудачи экспедиции заставили его бежать за границу в Европу. После смерти своего наставника он постепенно перешел на левые позиции, но вначале ему не доверяли из-за его лояльности к Чангу. За свои способности и верность левому ЦК он был вознагражден назначением на должность заместителя директора Вампоа в изгнании, а поскольку титулярный директор Ли Цзишэнь сражался в Мингане, это дало ему возможность оказывать значительное влияние на воспитание молодого поколения гоминьдановских офицеров.§!"
 CHI_zhang_zhizhong_commander_desc: "§YОбщее описание\n$CHI_zhang_zhizhong_birth$\n$CHI_zhang_zhizhong_bio$\n\n§YПримечания: Время, проведенное в Европе, и поддержка со стороны ЦК сделали его стойким приверженцем РАТ и объектом подозрений со стороны старой гвардии, в которой доминирует PAC.§!"
 CHI_zhang_zhizhong_mhc_desc: "§YОписание офицера\n$CHI_zhang_zhizhong_birth$\n$CHI_zhang_zhizhong_bio$\n\n§YПримечания: Время, проведенное в Европе, сделало его стойким приверженцем RCA и открыло ему глаза на новые способы военного мышления. Он надеется подготовить новое поколение НРА по современным принципам.§!"

 #柏文蔚
 CHI_bai_wenwei: "Бай Вэньвэй"
 CHI_bai_wenwei_commander_desc: "§YОбщее описание\nРодился:§! §gJune 8th 1876, in Shou County, Fengyang Prefacture, Anhui Province.§!\n§YПринадлежность:§! §gRCA§!\n§YMilitary Career:§! §gBai Wenwei has always been one to gravitate towards revolutionary concerns as when he dropped out of his schooling in 1899 due to his rebellious nature after protesting the then Qing Government's humiliating treaty with Russia. During the Guangxu Era, Bai Wenwei participated in military training and it was around this time that he met Chen Duxiu, another prominent anti-Qing activist in Anhui.\n\nDuring his revolutionary period in Zhejiang, he also grew close to other revolutionaries such as Chen Qimei and Huang Xing. An early member of Sun Yat-sen's Chinese Revolutionary Party, he would grow to be quite close to the top leadership in the revolutionary movement. When Yuan Shikai betrayed on the promises of the revolution, Bai Wenwei would end up joining Sun Yat-sen's revived Kuomintang in order to ensure the revolution's survival.\n\nDuring the reorganization of the Kuomintang, Bai Wenwei supported the alliance with the LCS as well as the support for the Third Internationale against Germany's capitalist imperialism. When the Northern Expedition failed, Bai decided to flee with Wang Jingwei's Central Committee - seeing it as the true remaining bastion for Sun's ideals. Since exile, he has contiuned to remain a senior member of the RCA and is loyal to their efforts of effectively reorganising the Chinese Nationalist Party and truly achieving China's liberation.§!\n\n§YNotes: A senior member of the Kuomintang due to his age, Bai is respected by many within the NRA although pledges loyalty to the Reorganised Comrades Association, seeing them as the best means of maintaining steady leadership akin to Dr. Sun's visions.§!"

#周恩来
 CHI_zhou_enlai: "Чжоу Эньлай"
 CHI_zhou_enlai_birth: "Родился:§! §gПятого марта 1898 года в Хуайане, провинция Цзянсу, империя Цин§!\n§YПринадлежность:§! §gRCA§!"
 CHI_zhou_enlai_bio: "Чжоу родился в семье чиновников-ученых, но экономический спад конца правления династии Цин научил его, что значит быть бедным. В юности он учился в академии Нанкай, где под влиянием статей Чэнь Дусю в журнале "Новая молодежь" стал красноречивым марксистским активистом. Влюбившись в Дэн Инчао (на которой он женился в 1925 г.), он отправился во Францию, чтобы наблюдать за монументальной революцией века.\n\nПо возвращении из Европы в 1924 г. он поступил на преподавательскую работу в недавно созданную Военную академию Вампоа. Он быстро поднялся до должности заместителя директора политического факультета, разъясняя курсантам "три принципа" Гоминьдана и ведя активную работу по привлечению в академию левых. Это позволило ему установить широкие связи в Гоминьдане и Синдикалистской партия Китая.\n\n Когда Северный поход провалилась, он вместе с женой принял участие в раннем повстанческом движении Гоминьдана, где начал организовывать разведывательную группу, известную как \n "Красный отряд\n" В 1932 г., едва не погибнув во время Шанхайского восстания, он был успешно вывезен из Китая в Европу в ходе дерзкой операции, где его приняли как героя. Восходящая звезда, он был назначен директором политического департамента Whampoa в изгнании"
 CHI_zhou_enlai_commander_desc: "§YОбщее описание\n$CHI_zhou_enlai_birth$\n§YВоенная карьера:§! §g$CHI_zhou_enlai_bio$ Вернувшись на родину, он полон решимости помочь спасти национальную революцию.§!\n\n§YNotes: Влиятельный член \"Политического департамента\", поддерживающий РАТ в борьбе со Старой гвардией, поддерживающей PAC компании Whampoa, его политическая смекалка обеспечивает РАТ столь необходимый противовес влиянию Дэн Яньда. Международная военная миссия особенно любит его, видя в нем скромного, хорошо говорящего и просвещенного офицера.§!"
 CHI_zhou_enlai_advisor_desc: "§YОписание советника\n$CHI_zhou_enlai_birth$\n§YПолитическая карьера:§! §g$CHI_zhou_enlai_bio$ С помощью своего "Красного отряда" Чжоу надеется расширить свою деятельность и сохранить внутреннюю целостность национального правительства.§!\n\n§YNotes: Имея хорошие связи, образование и преданность революционному делу, Чжоу с недоверием относится к все более нелояльной Революционной ассоциации однокурсников Военной академии Уэмпоа и другим диссидентским группам в армии.§!"
 CHI_zhou_enlai_mhc_desc: "§YОписание офицера\n$CHI_zhou_enlai_рождение$\n§YВоенная карьера:§! §g$CHI_zhou_enlai_bio$§!\n\n§YНоты: Влиятельный член \"Политического департамента\", выступающий на стороне РАТ против "Старой гвардии", поддерживающей PAC, возглавляемой Whampoa, он играет важную роль в создании высокого морального духа и тщательной индоктринации Национально-революционной армии."

#李之龙
 CHI_li_zhilong: "Ли Чжилун"
 CHI_li_zhilong_birth: "Родился:§! §gДесятого декабря 1897 года в городе Мяньян, провинция Хубэй, империя Цин§!\n§YПринадлежность:§! §gLCS§!"
 CHI_li_zhilong_bio: "Военная карьера:§! §gРеволюционная карьера Ли Чжилуна началась с его участия в восстании хукоу в 1913 г. Будучи студентом Яньтайской военно-морской академии, в 1918 г. он присоединился к забастовке, после чего бежал на юг.\n\nБежав от ордера на арест, он стал социалистом и вступил в Синдикалистскую партию Китая, познакомившись с единомышленником-революционером Дун Биву. После этого он также вступил в Гоминьдан и учился в первом классе Академии Вампоа. Он участвовал в Восточной экспедиции и сделал карьеру военно-морского политработника, после чего стал исполняющим обязанности директора военно-морского бюро. Вице-адмирал, он был самым высокопоставленным членом СПК в Национально-революционной армии.\n\nБежав вместе с ЦК после провала Северного похода, Ли отправился в эмиграцию во Францию и одновременно занялся изучением военно-морской доктрины. В Париже он приобрел опыт капитана нескольких вооруженных торговых судов и стремился применить полученные навыки после возобновления революции. Он сыграл важную роль в организации флотилии, которая уклонилась от вражеских патрулей и позволила изгнанникам вернуться на материк.§!"
 CHI_li_zhilong_desc: "§YОписание адмирала\n$CHI_li_zhilong_рождение$\n$CHI_li_zhilong_биография$\n\n§YПримечания: Высокопоставленный член Синдикалистской партия Китая и Союза синдикалистов Китая, он является, пожалуй, одним из самых надежных и непоколебимо социалистических офицеров в военно-морском штабе.§!"
 CHI_li_zhilong_mhc_desc: "§YОписание офицера\n$CHI_li_zhilong_birth$\n$CHI_li_zhilong_bio$\n\n§YПримечания: Высокопоставленный офицер, долгое время занимавший социалистическую позицию, в эмиграции оказался на хорошем счету. Обученный военно-морской тактике Интернационала, он также надеется сохранить поставки в Китай"

#陈绍宽
 CHI_chen_shaokuan: "Чэнь Шаокуань"
 CHI_chen_shaokuan_birth: "Родился:§! §gОктябрь 27, 1889, в Фучжоу, Провинция Фуцзянь, Империя Цин§!\n§YПринадлежность:§! §gНейтральный§!"
 CHI_chen_shaokuan_bio: "Военная карьера:§! §В 15 лет Чэнь Шаокуан был принят в христианский колледж Фучжоу, основанный церковью Фучжоу. Благодаря тому, что колледж был связан с американскими миссионерами, он с детства прекрасно владел английским языком. Окончив военно-морскую школу с наивысшим баллом в классе, он поступил на службу в военно-морской флот и начал свою служебную карьеру. В 1916 г. он был направлен в США для изучения самолетов и подводных лодок, а также для наблюдения за ходом войны в Европе.\n\nВо время Северного похода, все больше разочаровываясь в тираническом правлении Сунь Чуаньфана, он едва не перешел на сторону чжилийцев, но его удержали неоднократные неудачи гоминьдановцев в их продвижении. Однако события, приведшие к распаду Лиги в 1936 г., оказались для него слишком тяжелыми, и когда гоминьдановцы двинулись на Фуцзянь, он с готовностью перешел на их сторону, помог пробить брешь в береговой обороне и обеспечить приток международной помощи в Сямэнь.§!"
 CHI_chen_shaokuan_desc: "§YОписание адмирала\n$CHI_chen_shaokuan_рождение$\n$CHI_chen_shaokuan_биография$\n\n§YПримечания: Патриот и сочувствующий целям Гоминьдана, он, тем не менее, вызывает подозрения в рядах национал-революционеров. Тем не менее, как опытный офицер он может оказать неоценимую помощь в будущем.§!"
 CHI_chen_shaokuan_mhc_desc: "§YОписание офицера\n$CHI_chen_shaokuan_birth$\n$CHI_chen_shaokuan_bio$\n\n§YПримечания: Многолетний офицер ВМС и влиятельный в военно-морском сообществе Фуцзяни, Чэнь поддерживает асимметричный подход к противодействию иностранным угрозам на побережье.§!"

#陳季良
 CHI_chen_jiliang: "Чэнь Цзилянь"
 CHI_chen_jiliang_birth: "Родился:§! §g1887, в Фучжоу, провинция Фуцзянь, империя Цин§!\n§YПринадлежность:§! §gНейтральный§!"
 CHI_chen_jiliang_bio: "§Военная карьера:§! §Адмирал ВМС Китайской Республики Чэнь Цзилянь начал свою военно-морскую карьеру в 1897 г. в Нанкинско-Цзяннаньской военно-морской академии. После окончания академии он служил на крейсере \"Хай Жун"\, а во время Синьхайской революции поддержал революционеров. В 1921 г. он стал капитаном патруля на реке Янцзы, а к 1924 г. получил звание контр-адмирала.\n\nСочувствуя националистическому и революционному делу Гоминьдана, Чэнь Цзилян надеялся перейти на сторону Национально-революционной армии во время Северного похода, но по мере нарастания поражений гоминьдановцев удержался.\Регулярное недофинансирование властями Лиги даже базового флота береговой обороны, финансовая эксплуатация Германии и неправильное управление Сунь Чуаньфаном подтолкнули Чена к переходу в лагерь гоминьдановских повстанцев, и до 1936 г. он поддерживал контакты с ними. Он помог убедить высокопоставленного офицера Чэнь Шаокуаня дезертировать во время войны Лиги, что позволило обеспечить поступление в Сямэнь международных поставок.§!"
 CHI_chen_jiliang_desc: "§YОписание адмирала\n$CHI_chen_jiliang_birth$\n$CHI_chen_jiliang_bio$\n\n§YПримечания: Этот опытный морской офицер, давно связавшийся с Гоминьданом и прошедший проверку на революционность, вызывает у некоторых подозрение, но, тем не менее, имеет большие мечты о реформировании китайского флота.§!"
 CHI_chen_jiliang_mhc_desc: "§YОписание должностных лиц\n$CHI_chen_jiliang_birth$\n$CHI_chen_jiliang_bio$\n\n§YПримечания: Будучи националистом, Чэнь признает необходимость наличия мощного флота для сохранения суверенитета Китая от империалистической угрозы. Он надеется обеспечить постоянную защиту китайских связей с внешним миром от вражеских набегов"

#黃琪翔
 CHI_huang_qixiang: "Хуан Цицян"
 CHI_huang_qixiang_birth: "Родился:§! §g17 июля 1898 года в Мэйсяне, провинция Гуандун, империя Цин§!\n§YПринадлежность:§! §gPAC§!"
 CHI_huang_qixiang_bio: "Военная карьера:§! §Хуан Цицян родился в обедневшей фермерской семье. Его отец работал за границей, поэтому воспитывал его в основном дядя, который отдал его в частную школу. В 1912 г. Хуан поступил в Гуанчжоускую нормальную школу, где впервые познакомился с революционными идеями. Он учился в Баодинской военной академии и служил в артиллерийском полку Армии обороны границы. Все больше симпатизируя идеалам Сунь Ятсена, Хуан вернулся в Гуандун в 1922 г. и через два года вступил в Гоминьдан.\n\nПервой должностью Хуана в НРА было командование батальоном в кампании против войск Чэнь Цзюнмина. Во время Северного похода Хуан служил в Четвертой \"Железной\" армии вместе с Е Тином и Чжан Факуем. Хотя они храбро сражались, Четвертая армия в конце концов была разбита кликой Чжили, и Хуан последовал за руководством КМТ в изгнание.\n\n Во Франции он все больше сближался с Дэн Яньда и в 1932 г. вернулся с ним в Китай для участия в Шанхайском восстании. Несмотря на неудачу восстания, они бежали в зону Минган, чтобы продолжить борьбу, и Хуан стал свидетелем составления \"Декларации к революционному народу Китая и мира"\, на основании которой был создан Временный комитет действий.§!"
 CHI_huang_qixiang_desc: "§YОбщее описание\n$CHI_huang_qixiang_birth$\n$CHI_huang_qixiang_bio$\n\n§YПримечания: Как близкий друг и доверенное лицо Дэн Яньда, он является видным членом PAC.§!"
 CHI_huang_qixiang_mhc_desc: "§YОписание офицера\n$CHI_huang_qixiang_birth$\n$CHI_huang_qixiang_bio$\n\n§YПримечания: Артиллерийский командир по образованию, благодаря влиянию Дэнга он является фаворитом на должность генерального инспектора.§!"

#張發奎
 CHI_zhang_fakui: "Чжан Факуй"
 CHI_zhang_fakui_desc: "§YОбщее описание\nРодился:§! §g2 сентября 1896 года в Шаогуане, провинция Гуандун, империя Цин§!\n§YПринадлежность:§! §gРФ§!\n§YВоенная карьера:§! §Чжан Факуй, выходец из народности хакка, после частной школы отправился в Гуанчжоу, где стал подмастерьем, а затем вступил в местное ополчение. В 1912 г. он поступил в Гуандунскую военную академию, а затем служил личным телохранителем Сунь Ятсена. Во время учебы в военной академии среди его однокурсников были Сюэ Юэ и Е Тин. В 1922 г., когда Чэнь Цзюнмин сместил Суня, Чжан продемонстрировал свою преданность Суню, отказавшись сдаться и продолжая сражаться в Гуанси.\n\n Когда Сунь вернулся в 1923 г., Чжан поднял войска, чтобы изгнать Чэнь Цзюнмина, и помог создать новое революционное правительство. Во время Северного похода он руководил Четвертой армией, в которой преобладали кантонцы, и получил репутацию \n\n "героя Железной армии"\n\n\n Когда гоминьдановцы проиграли экспедицию, он был вынужден отступить, но вместо того, чтобы отправиться в Европу, присоединился к Сунь Фо и его правоцентристской фракции "Реконструкция" за границей, что укрепило его дружбу с Сунем и Сюэ Юэ. В 1934 г. в рамках сделки с центральным комитетом Ван получил должность руководителя китайского военного атташе в Калькутте, наладил связи с индийскими командирами и сблизился с членами индокитайской ВНКД, которых он инструктировал. В то же время он собирал китайских патриотов за границей, никогда не забывая о своей мечте вернуться на родину, чтобы отомстить за Северный поход.§!\n\n§YNotes: Его офицерская клика объединилась в нечто неофициально известное как \"Индийская клика\", симпатизирующее фракции Реконструкции. Как главный главарь и лицо этой фракции, его действия подвергаются тщательному анализу со стороны партии и восхваляются прессой.§!"

#陈赓
 CHI_chen_geng: "Чэнь Гэн"
 CHI_chen_geng_desc: "§YОбщее описание\nРодился:§! §g27 февраля 1903 года в Сянсяне, провинция Хунань, империя Цин§!\n§YПринадлежность:§! §gРАТ§!\n§YВоенная карьера:§! §gРодился в богатой сельской семье, дед Чэня был успешным генералом в армии Сяна. Несмотря на сказочное богатство, Чэнь решил избежать брака по расчету и в 13 лет бежал в армию. Испытывая отвращение к военачальникам, он сначала оставил военную службу и стал работать железнодорожным секретарем, а затем поступил в военную академию Whampoa.\n\nСчитаясь одним из \N "трех самых выдающихся выпускников Whampoa\N" наряду с Хэ Чжунганом и ныне покойным Цзян Сянюнем, Чэнь стал протеже Чан Кай-ши. Он возглавил роту, отвечавшую за личную охрану маршала. Во время Восточной экспедиции в 1925 г. Чэнь отговорил Чанга от самоубийства после крупного поражения, пронеся генерала на спине почти 10 км. Это снискало ему неизменное уважение Чэна, несмотря на их политические разногласия.\n\n Провал Северного похода привел к новому повороту в карьере Чэна. Отправленный в Европу для подготовки разведчиков, он вернулся, чтобы принять участие в восстании в Шанхае в 1932 г., где был ранен. Скрываясь под именем Ван Юн, он был успешно эвакуирован. Помимо обычных обязанностей по руководству обычной армией, Чэнь активно работал в военной разведке, сблизившись с Чжоу Эньлаем. Он показал себя эффективным засадчиком, быстро перемещая свои войска и атакуя противников в ключевых слабых местах.§!\n\n§YNotes: Один из главных заместителей Чжоу Эньлая в "Красном отряде", Чэнь тесно связан с так называемой \"кликой политического отдела"\, связанной с РККА.§!"

#萧劲光
 CHI_xiao_jinguang: "Сяо Цзиньгуан"
 CHI_xiao_jinguang_desc: "§YОбщее описание\nРодился:§! §g4 января 1903 года в Чанша, провинция Хунань, империя Цин§!§gПринадлежность:§! §gКПСС§!\n§YВоенная карьера:§! §gРодившись в бедной семье ремесленника в окрестностях Чанши, он успел окончить среднюю школу, после чего в 1920 г. присоединился к зарождающемуся китайскому социалистическому движению. С помощью Лю Шаоци ему удалось в следующем году уехать в изменившуюся Францию, недавно освободившуюся от буржуазного гнета. Он недолго участвовал в конце старого движения "Прилежный труд - бережливая учеба", а затем поступил в Федеральную военную школу (переименованную в Сен-Сир). К 1922 г. он официально вступил в основанную за два года до этого партию китайских синдикалистов.\n\nСяо вернулся на родину в изменившийся Китай. К 1924 г. эпоха военачальников была в самом разгаре, и первым заданием Сяо была помощь в организации забастовки рабочих Анюаньской дороги и шахт, одной из первых революционных акций СПК. После этого он стал политическим офицером и участвовал в обреченной на провал Северного похода.\n\nПосле ее окончания его сначала отозвали в Европу для продолжения учебы, чтобы подготовить к работе в качестве старшего офицера. В 1932 г., после Шанхайского восстания, он был тайно переправлен в зону Мингана и проявил себя как эффективный партизан - дошло до публикации статей на эту тему. Он также является талантливым организатором, способным вопреки всему поддерживать повстанческое движение. Обладая непредвзятым мышлением, он также избежал ненужных трений с какой-либо из враждующих группировок Национально-революционной армии. Не удивительно, что после возобновления работы Whampoa Сяо стал одним из первых кандидатов на должность независимого командира.§!\n\n§YNotes: Сяо, возможно, самый высокопоставленный командир, не являющийся членом Гоминьдана, уникален тем, что практически не связан со старой Whampoa, что дает ему определенную степень независимости, но в то же время делает его аутсайдером в политике НРА.§!"

 #彭雪楓
 CHI_peng_xuefeng: "Пэн Сюэфэн"
 CHI_peng_xuefeng_desc: "Пэн Сюэфэн родился в бедной крестьянской семье, но его стремление учиться и семейные связи позволили Пэну получить вполне нормальное образование. Несмотря на то, что финансовые проблемы мешали дальнейшему продвижению, Пэн все же попал под влияние своих учителей-социалистов, в результате чего юный Пэн стал изучать такую литературу, как "Новая юность", "Коммунистический манифест" и "Дусю Вэньцунь". После бойни 30 мая Пенг был послан в шторм, организовал своих одноклассников в своего рода студенческое ополчение, сражался против своего учебного заведения и победил.\n\nПосле знакомства с Тан Цзуном, Пен вступил в Синдикалистскую молодежную лигу в 1925 году. Несмотря на отсутствие подготовки в Академии, Пенг быстро поднялся в статусе. Исключительный, целеустремленный и молодой, Пэн Сюэфэн многообещающе смотрит в будущее."
 CHI_peng_xuefeng_notes: "§YПримечания: Он по-прежнему поддерживает связи с СПК в Шанхае."
 CHI_peng_xuefeng_commander_desc: "§YОписание генерала\nРодился:§! §g9 сентября 1907, Чжэньпин, Хэнань, Империя Цин§!\n§YСимпатезирует:§! §RРеволюционеры§!\n§YВоенная карьера:§! §g$CHI_peng_xuefeng_desc$§!\n\n$CHI_peng_xuefeng_notes$"
 CHI_peng_xuefeng_mhc_desc: "§YОписание офицера\nРодился:§! §g9 сентября 1907, Чжэньпин, Хэнань, Империя Цин§!\n§YСимпатезирует:§! §RРеволюционеры§!\n§YВоенная карьера:§! §g$CHI_peng_xuefeng_desc$§!\n\n$CHI_peng_xuefeng_notes$"
 CHI_peng_xuefeng_advisor_desc: "§YОписание советника\nРодился:§! §g9 сентября 1907, Чжэньпин, Хэнань, Империя Цин§!\n§YСимпатезирует:§! §RРеволюционеры§!\n§YПолитическая карьера:§! §g$CHI_peng_xuefeng_desc$§!\n\n$CHI_peng_xuefeng_notes$"

#徐向前
 CHI_xu_xiangqian: "Сюй Сянцянь"
 CHI_xu_xiangqian_desc: "§YОбщее описание\nРодился:§! §g8 ноября 1901 года в Вутае, провинция Шаньси, империя Цин§!\n§YПринадлежность:§! §gРАТ§!\n§YВоенная карьера:§! §gСу Сянцянь родился в относительно богатой семье в Шаньси, где его отец служил ученым чиновником династии Цин. К сожалению, состояние семьи стало ухудшаться, и Сюй был вынужден собирать навоз, дрова и дикорастущие овощи, чтобы помочь семье выжить. Весной 1919 г. Сюй поступил в Национальную нормальную школу провинции Шаньси, где и получил образование. Узнав в 1924 г. о недавно созданной Сунь Ят-сеном Военной академии Вампоа, он вместе с другими уроженцами Шаньси отправился из Шанхая на юг, чтобы принять участие в первом выпуске Вампоа.\n\nСлужба Сюя в Национально-революционной армии началась в качестве одного из телохранителей Сунь Ят-сена, и он участвовал в усмирении Торгового корпуса. Он также служил в Восточном походе против Чэнь Цзюнмина и последующем неудачном Северном походе. После поражения НРА в Северном походе он вместе с другими генералами левого крыла Гоминьдана бежал в повстанческую зону Минган, где познакомился с десятилетней партизанской войной Гоминьдана.\n\nПосле провала Шанхайского восстания 1932 г. он едва выжил, чтобы быть извлеченным из него и отправиться в Европу. Там он связался с политическим отделом Чжоу Эньлая и вернулся с ним на родину во время войны за Лигу. Будучи членом одной из "старых гвардий"\ Гоминьдана, Сюй пользуется уважением многих членов Национально-революционной армии.§!\n\n§YNotes: Сюй разумно воздерживается от слишком тесной связи с каким-либо лидером или фракцией, что дает ему возможность гибко работать как с ВКД, так и с военными фракциями, связанными с РАТ. При этом он выражает растущее недоверие к Старой гвардии.§!"

#林彪
 CHI_lin_biao: "Линь Бяо"
 CHI_lin_biao_bio: "Сын преуспевающей купеческой семьи, Лин в юности наблюдал, как его отец потерял большую часть своего богатства из-за эксплуатации военачальниками. Будучи левым активистом, он участвовал в различных студенческих забастовках и акциях протеста, после чего бежал на юг и поступил в новую Военную академию Уампоа.\n\n Будучи молодым курсантом, Лин восхищался личностью директора Уампоа Чан Кай-ши и демонстрировал исключительные успехи в учебе. Во время Северного похода он всего за несколько месяцев прошел путь от заместителя командира взвода до командира батальона и даже в случае ее провала последовал за Е Тином и большей частью остатков НРА в подполье, где вел партизанскую войну. Он продолжал выделяться и прославился в горах Мингана"
 CHI_lin_biao_desc: "§YОбщее описание§!\n§YРодился:§! §g5 декабря 1907 года в Хуангане, провинция Хубэй, империя Цин§!\n§YПринадлежность:§! §gCRS§!\n§YВоенная карьера:§! §g$CHI_lin_biao_bio$§!\n\n§YNotes: Многие считают его политически "чистым листом", но он разочаровался в руководстве Дэн Яньда, возможно, испытывая горечь от того, что его обошли в предыдущем руководстве. По слухам, он влился в толпу других недовольных, амбициозных и молодых выпускников Whampoa.§!"
 CHI_lin_biao_mhc_desc: "§YОписание должностного лица§!\n§YРодился:§! §g5 декабря 1907 года в Хуангане, провинция Хубэй, империя Цин§!\n§YПринадлежность:§! §gCRS§!\n§YВоенная карьера:§! §g$CHI_lin_biao_bio$§!\n\n§YNotes: Считается одним из лучших пехотных командиров Национально-революционной армии, проявляет интерес к реорганизации пехоты и политического образования в армии.§!"
 CHI_lin_biao_advisor_desc: "§YОписание советника§!\n§YРодился:§! §g5 декабря 1907 года в Хуангане, провинция Хубэй, империя Цин§!\n§YПринадлежность:§! §gCRS§!\n§YПолитическая карьера:§! §g$CHI_lin_biao_bio$§!\n\n§YNotes: Найдя свое место в "Молодой гвардии НРА", Линь греется в статусе героя революции и пользуется покровительством самого президента.§!"
 CHI_lin_biao_leader_desc: "§YОписание лидера§!\n§YРодился:§! 5 декабря 1907 года в Хуангане, провинция Хубэй, империя Цин\n§YПолитическая карьера:§! Уничтожение большей части первоначального руководства ЦРС оставило значительный вакуум в экстремистских кругах, который первоначально был заполнен гражданскими радикалами из ЦСП. Однако установление нового режима в Китае потребовало более сильной руки, и "Беркут" Красной Армии встал на путь спасения разрушенной страны"

#王耀武
 CHI_wang_yaowu: "Ван Яову"
 CHI_wang_yaowu_birth: "Родился:§! §g1904, в Тайане, провинция Шаньдун, империя Цин§!\n§YПринадлежность:§! §gPAC§!"
 CHI_wang_yaowu_bio: "Военная карьера:§! §gДетство Ван Яову, родившегося в крестьянской семье, прошло в бедности и трагедии после потери отца и старшего брата. До совершеннолетия он воспитывался матерью-одиночкой и работал лавочником, когда узнал, что Сунь Ятсен открывает в Гуанчжоу военную школу - Военную академию Вампоа. Он тут же занял денег у своего работодателя и отправился на юг, став членом третьей очереди Вампоа.\n\nВо время Северного похода он прославился тем, что стойко командовал под огнем и уделял особое внимание обороне. В войсках Бэйяна ходил известный анекдот о том, что \N "лучше встретиться с царем ада, чем с царем Яову\N" (так как в китайском языке иероглифы "ван" и "царь" совпадают). Когда экспедиция провалилась, он присоединился к Сун Цинлину и остаткам Национально-революционной армии в повстанческой зоне Минган, став фаворитом для продвижения по службе среди старой гвардии.§!"
 CHI_wang_yaowu_desc: "§YОбщее описание\n$CHI_wang_yaowu_Рождение$\n$CHI_wang_yaowu_Био$\n\n§YПримечания: Член АРОВАВ, в целом пользуется хорошей репутацией среди командиров гоминьдановской \"старой гвардии"\N , связанных с Дэн Яньда и ВКД.§!"
 CHI_wang_yaowu_mhc_desc: "§YОписание офицера\n$CHI_wang_yaowu_Рождение$\n$CHI_wang_yaowu_Био$\n\n§YНоты: Один из лучших оборонительных командиров в NRA, также является членом WMARCA Денга.§!"

#薛岳
 CHI_xue_yue: "Сюэ Юэ"
 CHI_xue_yue_birth: "Родился:§! §g26 декабря 1896 года в Шаогуане, провинция Гуандун, империя Цин§!\n§YПринадлежность:§! §gРФ§!"
 CHI_xue_yue_bio: "Военная карьера:§! §Сюэ Юэ родился в крестьянской семье хакка в Гуандуне и в 1909 г. в возрасте тринадцати лет вступил в "Тунмэнхуэй" Сунь Ятсена, после чего поступил в Гуандунскую военную начальную школу. В 1917 г. он был принят в шестой класс Баодинской военной академии. В 1918 г. он вернулся в Гуандун, где участвовал в армии, созданной Сунь Ят-сеном и Чэнь Цзюнмином, а затем перешел на сторону Сунь во время раскола между Сунь и Чэнь и помог спасти Сун Цинлин от федералистского военачальника.\n\nВо время Северного похода он был настроен против Чан Кай-ши, а после ее провала покинул первую армию и уехал за границу в изгнание. Он объединился с Чжан Факуем и Сунь Фо на Гавайях, а в 1932 г. был направлен в качестве атташе в Индию. После триумфального возвращения Гоминьдана из изгнания он успешно занял пост в высшем командовании.§!"
 CHI_xue_yue_desc: "§YОбщее описание\n$CHI_xue_yue_birth$\n$CHI_xue_yue_bio$\n\n§YПримечания: Близкий друг и протеже Чжана Факуи, он считается вторым представителем так называемой \"индийской клики"\nbsp- правоцентристских командиров. Когда его спрашивают, он заявляет, что политическая свобода, экономическая демократия и военная самооборона должны быть главными приоритетами для нации.§!"
 CHI_xue_yue_mhc_desc: "§YОписание офицера\n$CHI_xue_yue_birth$\n$CHI_xue_yue_bio$\n\n§YПримечания: Сюэ Юэ продемонстрировал значительные способности в окружении и быстром маневрировании, проявляя некоторый интерес к механизированной войне.§!"

#邓文仪
 CHI_deng_wenyi: "Дэн Вэньи"
 CHI_deng_wenyi_birth: "Родился:§! §g18 декабря 1905 года в Лилинге, провинция Хунань, империя Цин§!\n§YПринадлежность:§! §gCRS§!"
 CHI_deng_wenyi_bio: "Военная карьера:§! §В возрасте двадцати двух лет Дэн Вэньи отправился из своего родного города Хунань, чтобы поступить в первый класс армейской лекторской школы при базовом лагере в Гуанчжоу, открытой его соотечественником Чэн Цянем. Школа открылась в 1924 году, но уже в конце года ученики первого класса перешли в новейшее военное учебное заведение Китая - Военную академию имени Сунь Ятсена "Вампоа" Зачисленный в первый класс, он прославился после ранения в Восточной экспедиции против Чэнь Цзюнмина.\n\n С согласия директора школы Чан Кай-ши Дэн взял годовой отпуск для обучения в Коммуне Франции. Однако его поездка была недолгой, так как началась Северный поход. Вернувшись на родину, он занял пост директора политического отдела в Вампоа, наставляя новобранцев в справедливости их дела и в том, что Гоминьдан - это партия, равной которой нет. Но Северный поход провалилась.\n\nКак и многие другие, Денг бежал в Европу, где томился в изгнании. Встретившись с другими людьми, оказавшимися вдали от родины, в первую очередь с Хэ Чжунханом, они образовали группу, объединенную радикальным мнением, что революция не проиграна, а предана. Чтобы добиться успеха, нужен великий лидер, способный возглавить более сильную, возрожденную Национально-революционную армию, такого же уровня, как покойный Чанг. Примерно в это время он получил должность в Британском Союзе, где пристально следил за развитием максимализма как за образцом.\n\nКогда Центральный комитет вернулся в Фуцзянь, он снова одним из первых бросился в бой, готовый подвергнуть свою жизнь опасности ради успеха революции. Но очевидно, что его амбиции были гораздо выше, чем просто мученическая смерть в бою.§!"
 CHI_deng_wenyi_desc: "§YОбщее описание\n$CHI_deng_wenyi_birth$\n$CHI_deng_wenyi_bio$\n\n§YПримечания: Тихий, наблюдательный тип - Дэн служит фактическим секретарем Общества возрождения Китая, ведя тщательные записи для своих более энергичных единомышленников.§!"
 CHI_deng_wenyi_mhc_desc: "§YОписание офицера\n$CHI_deng_wenyi_birth$\n$CHI_deng_wenyi_bio$\n\n§YПримечания: Неразговорчивый, основательный штабной офицер, Денг разбирается в логистике.§!"

#粟裕
 CHI_su_yu: "Су Ю"
 CHI_su_yu_birth: "Родился:§! §gПятого марта 1904 года в Хуйтуне, провинция Хунань, империя Цин§!\n§YПринадлежность:§! §gPAC§!"
 CHI_su_yu_bio: "Военная карьера:§! §Су Юй, этнический дун, имел относительно образованное, но бедное детство, будучи третьим ребенком среди шести братьев и сестер в сельской местности Хунань. Убежав из дома в 1924 г., он участвовал в различных студенческих движениях во время учебы во 2-й нормальной школе провинции Хунань в Чандэ. Будучи активным членом студенческого союза, он с увлечением читал новости о социалистических революциях в Европе и надеялся, что в Китае произойдет такая же революция, которая приведет к свержению военачальников.\n\n Свой шанс он получил, встретив Е Тина, который накануне Северного похода призвал его вступить в ряды Гоминьдана. Однако экспедиция провалилась, и Су Юй отправился за своим новым делом в повстанческую зону Минган, где отличился как один из самых умелых партизан в повстанческой зоне, служа не только верным солдатом революции, но и энергичным наставником новобранцев.\n\n Во время Шанхайского восстания 1932 г. он служил начальником штаба авангардного отряда под командованием Фан Чжимина, но из-за критических ошибок его отряд был практически уничтожен. Несмотря на то что Фанг пал, а Су Юй едва не лишился руки, он прославился тем, что успешно возглавил прорыв, спасший остатки его отряда. Су Юй присоединяется к другим старым командирам Мингана и получает должность командира в быстро развивающемся отряде NRA.§!"
 CHI_su_yu_desc: "§YОбщее описание\n$CHI_su_yu_рождение$\n$CHI_su_yu_био$\n\n§YПримечания: В отличие от многих командиров Мингана, Су Юй не был связан с Whampoa или WMARCA. Тем не менее, он по-прежнему слабо связан с аграрными интересами КПК.§!"
 CHI_su_yu_mhc_desc: "§YОписание офицера\n$CHI_su_yu_birth$\n$CHI_su_yu_bio$\n\n§YПримечания: Опытный партизан и пионер своего рода асимметричной войны, Су Юй стал ведущим теоретиком этой доктрины.§!"

#聂荣臻
 CHI_nie_rongzhen: "Nie Rongzhen"
 CHI_nie_rongzhen_desc: "§YОбщее описание\nРодился:§! §g29 декабря 1899 года в Цзянцзине, провинция Сычуань, империя Цин§!\n§YПринадлежность:§! §gРАТ§!\n§YВоенная карьера:§! §g Будучи с юности заядлым студентом, Ни Жунчжэнь читал труды Чарльза Дарвина, Теодора Хаксли и "Новую молодежь"\, а в 1920 г. покинул Китай из-за нестабильной обстановки в стране. Вместо этого он отправился за границу, в только что провозглашенную Коммуну Франции, где познакомился с такими левыми, социалистами и синдикалистами, как Цай Хэсэнь, Цай Чанг и Дэн Сяопин. Затем он принял участие в программе Work-Study, в рамках которой работал на французских заводах, но в 1921 г. покинул Францию и поступил на факультет химического машиностроения в Университет труда в Бельгии. Во время пребывания в Бельгии он постепенно повернул влево и вступил в Синдикалистскую партию Китая.\n\nВ 1924 г. он вступил в Гоминьдан Китая и занимал должность директора отдела связи Гоминьдана в Париже. В это время он учился в военной школе в Сен-Сире, а в 1925 г. вернулся в Китай с французской помощью и оружием для участия в Северном походе. Он служил под началом Чжоу Эньлая в политическом отделе, где, по сути, был его протеже.\n\n Когда Северный поход провалилась, Ние служил под началом Чжоу на начальных этапах повстанческого движения, а после восстания 1932 г. был эвакуирован в Европу. После этого он стал главным заместителем Чжоу в политическом отделе компании Whampoa в изгнании. После их триумфального возвращения из изгнания и перехода НРА на сторону "Молодой гвардии"\ Ни имел все шансы перейти под самостоятельное командование.§!\n\n§YNotes: Друг и протеже Чжоу Эньлая, получивший обширное образование в Европе, Ни во многом представлял собой идеальный вариант следующего генеральского офицера Политического управления - преданный революционер, умелый руководитель и хорошо разбирающийся в социалистической идеологии.§!"

#张云逸
 CHI_zhang_yunyi: "Чжан Юньи"
 CHI_zhang_yunyi_desc: "§YОбщее описание\nРодился:§! §gДесятого августа 1892 года в Вэньчане, провинция Гуандун, империя Цин§!\n§YПринадлежность:§! §gПАС§!\n§YВоенная карьера:§! §Чжан Юньи родился в бедной крестьянской семье, в шестнадцать лет поступил в начальную школу Гуандунской армии, а на следующий год вступил в "Тунмэнхуэй" Сунь Ятсена. После участия в Национальной защитной войне он некоторое время служил в армии Гуандуна, а затем присоединился к националистическому правительству Сунь Ятсена в Гуанчжоу. В это время он вступил в Национально-революционную армию и участвовал в Восточных походах против Чэнь Цзюнмина. Он получил звание генерала как раз во время неудачного Северного похода, участвуя в неудачной осаде Вучана.\n\nПосле поражения гоминьдана Чжан ушел в подполье вместе со своими соратниками генералами Е Тином и Сюй Сянцянем. Деятельность гоминьдановских повстанцев завершилась неудачным восстанием 1932 г., в результате которого они были вынуждены отступить в новообразованную повстанческую зону Минган. К этому времени Чжан уже достаточно отличился, чтобы войти в состав вновь созданного высшего командования Мингана, завоевав репутацию харизматичного и достойного партизанского лидера. Кроме того, он был весьма изобретателен и организовывал различные военные предприятия, чтобы поддерживать повстанческое движение на плаву. Все это делало его естественным кандидатом на должность независимого командира в расширяющейся НРА.§!\n\n§YNotes: Многолетний командир Мингана, он известен своими симпатиями к Временному комитету действий Сун Цинлина.§!"

 #羅榮桓
 CHI_luo_ronghuan: "Ло Жунхуань"
 CHI_luo_ronghuan_desc: "§YОбщее описание\nРодился:§! §gNovember 26th, 1902, in Hengshan County, Hunan, Qing Empire§!\n§YAlignment:§! §gLCS§!\n§YMilitary Career:§! §gLuo had the opportunity of education that many of his childhood friends couldn’t share. At the age of 17, he enrolled in the Xiejun Middle School in Changsha. Five years later, he was accepted into the Qingdao Private College, where he completed a preparatory course in Industry in Commerce in 1926. Fueled by both the content of his education and also disgusted by the corruption and oppression rampant in the Shandong Clique, Luo would seek a solution for the problems in China in the form of the rising tide of Syndicalism. In April 1927, Luo joined a local youth group heavily involved with the League of Chinese Syndicalists. Later that year, he would officially enroll himself into the LCS proper. Since then, Luo has traveled between his home province of Hunan, his educational home base of Shandong, and everywhere in between, offering himself to those who are willing to eradicate warlord tyranny and implement socialism in his motherland, whatever the odds may be. With the Kuomintang now hailing victorious over the Southeast, Luo now finds his loyalties to the NRA.§!"
#杜聿明
 CHI_du_yuming: "Ду Юмин"
 CHI_du_yuming_birth: "Родился:§! §g28 ноября 1904 года в Мичжи, провинция Шэньси, империя Цин§!\n§YПринадлежность:§! §gPAC§!"
 CHI_du_yuming_bio: "Военная карьера:§! В 1924 г. Ду Юмин готовился к экзаменам в Пекинский университет и Пекинский нормальный университет, когда ему на глаза попалась статья в журнале "Новая молодежь"§, призывавшая китайскую молодежь подавать заявления и поступать в новое военное училище на юге страны. После этого он оставил учебу и по рекомендации Юй Юнаня поступил в первый класс Военной академии Вампоа. Затем он служил под началом Хэ Инциня, участвовал в подавлении Купеческого корпуса и сражениях с Чэнь Цзюнмином в составе Восточной экспедиции. Во время осады города Тамсуй он одним из первых в отряде "смельчаков" преодолел городскую стену, выдержав сильный огонь противника и заслужив себе имя.\n\n Отчасти благодаря этим подвигам в 1925 г. он был отправлен на север и в числе тех, кто присутствовал у смертного одра доктора Сунь Ятсена в Пекине. В следующем году началась Северный поход, и Ду Юмин отправился из Пекина на юг, чтобы присоединиться к своим товарищам. Однако он попал в плен к войскам Сунь Чуаньфана, хотя ему удалось бежать. Ему удалось присоединиться к гоминьдановским войскам под командованием Дэн Яньда в Ухане, но к тому времени экспедиция была обречена. Вместе с ЦК и своими одноклассниками из первого класса Вампоа он отправился в изгнание в Европу.\n\nВ Европе он восхищался новейшими военными достижениями. В частности, его привлекли труды и доктрина британского командира механизированных войск Б.Х. Лиддел Харта, и он стремится однажды сформировать бронетанковый корпус для Национально-революционной армии.§!"
 CHI_du_yuming_desc: "§YОбщее описание\n$CHI_du_yuming_birth$\n$CHI_du_yuming_bio$\n\n§YПримечания: Выпускник компании Whampoa, впоследствии вступил в WMARCA и сблизился с кликой Дэн Яньда. Тем не менее, говорят, что он готов выслушать мнение других фракций в армии.§!"
 CHI_du_yuming_mhc_desc: "§YОписание должностного лица\n$CHI_du_yuming_birth$\n$CHI_du_yuming_bio$\n\n§YПримечания: Несмотря на принадлежность к WMARCA, по доктрине он не считается членом Старой гвардии. Возможно, отчасти в ответ на свое отсутствие в разгар Северного похода, Ду стал главным сторонником модернизации УНР по европейскому образцу.§!"

#戴安澜
 CHI_dai_anlan: "Дай Анлан"
 CHI_dai_anlan_birth: "Родился:§! §g25 ноября 1904 года в городе Увэй, провинция Аньхой, империя Цин§!\n§YПринадлежность:§! §gCRS§!"
 CHI_dai_anlan_bio: "Военная карьера:§! §Дай Аньлан, первоначально носивший имя Биньян, родился в семье крестьянина. Став свидетелем коррупции в правительстве Бэйяна, он решил переименоваться в Аньлань (что означает "успокаивающий волны"), чтобы показать свои цели, и посвятил себя революции под руководством Гоминьдана. Затем он отправился на юг, в Гуанчжоу, чтобы принять участие в третьем классе Whampoa.\n\nВ одном из сражений Северного похода он был тяжело ранен, получив пулю в живот. Несмотря на ранение, его неуклонное руководство на фронте и другие подвиги заслужили похвалу, и он стал любимцем своих командиров. Когда Северный поход потерпела неудачу, Дай отступил вместе с Центральным комитетом и в конце концов бежал в Коммуну Франции.\n\nВо время выздоровления Дай вдохновился теорией современной бронетанковой войны Шарля Делестрена, которая подтолкнула его к изучению мобильной войны. Надеясь стать пионером применения танков и механизированной пехоты на китайском поле боя, он вошел в состав комиссии по планированию гипотетической \"200-й дивизии\" Назначенный генералом Ду Юмином, Дай получил повышение, чтобы помочь возглавить растущий механизированный корпус Китая.§!"
 CHI_dai_anlan_desc: "§YОбщее описание\n$CHI_dai_anlan_Рождение\n$CHI_dai_anlan_Био$\n\n§YПримечания: Являясь членом \"Молодой гвардии"\N, Дай не примыкает к какой-либо фракции. Однако многие из его подчиненных оказались в рядах CRS.§!"
 CHI_dai_anlan_mhc_desc: "§YОписание офицера\n$CHI_dai_anlan_рождение$\n$CHI_dai_anlan_био$\n\n§YПримечания: Один из ведущих членов китайской комиссии по изучению механизированной войны, Дай надеется получить ресурсы, необходимые ему для превращения зарождающегося механизированного корпуса в силу, с которой нужно считаться.§!"

 #王凌雲
 CHI_wang_lingyun: "Ван Линъюн"
 CHI_wang_lingyun_desc: "Окончив начальную школу, Ван Линъюнь в 1917 году присоединился к армии Чжэн Гоханя, сначала поднимаясь по карьерной лестнице в армиях военачальников, а в 1925 году ушел в отставку из Северной армии и поступил в офицерскую академию в Баодине. Окончив ее в 1925 году, Ван Линьюнь был назначен правительством провинции Хэнань на должность командира бригады по подавлению бандитов в уездах Линьжу, Иян, Либерти и Пинпин. Достигнув звания командира бригады, Ван Линъюнь продвигался по служебной лестнице благодаря конфуцианской семейной структуре клики Чжили, которая продвигала тех, кто находился внутри клики, или "семьи", в отличие от свободно аполитичных офицеров, таких как Ван.\n\nПосле завоевания Национально-революционной армией центрального правительства Ван Линъюнь отличился, перейдя со всей своей бригадой на сторону гоминьдановской революции. Помогая во взятии Лояна, Ван Линьюнь был повышен армейской комиссией до командира дивизии."
 CHI_wang_lingyun_commander_desc: "§YОписание генерала\nРодился:§! §g27 сентября 1899, Лоян, Хэнань, Империя Цин§!\n§YВоенная карьера:§! §g$CHI_wang_lingyun_desc$§!"
 CHI_wang_lingyun_mhc_desc: "§YОписание офицера\nРодился:§! §g27 сентября 1899, Лоян, Хэнань, Империя Цин§!\n§YВоенная карьера:§! §g$CHI_wang_lingyun_desc$§!"

#蔣緯國
 CHI_chiang_wei_kuo: "Чан Вэй-куо"
 CHI_chiang_wei_kuo_desc: "§YОбщее описание\nРодился:§! §g6 октября 1916 года в Токио, Японская империя§!§gНаправление:§! §gКРС§!\n§YВоенная карьера:§! §gЧан Вэйкуо родился в Японии как биологический сын Дай Цзитао и японской девушки Дай Цзитао. Будучи ведущими членами Гоминьдана, Дай Цзитао и Чан Кай-ши (которые были настолько близки, что практически являлись братьями) были вынуждены бежать в Японию, чтобы избежать влияния правительства Бэйян. Юный Вэй-куо, по сути, воспитывался Чангом и наложницей Чанга Яо Ечэн, и таким образом он был принят в семью Чанга, тем более что мать Чанга очень скучала по своему покойному младшему сыну Чанг Руицину. В знак национальной преданности оба сына покойного маршала были названы в честь нации (kuo): Вэй означает широту, а Чинг (его брат) - долготу.\n\nМолодой Чан Вэйкуо рос рядом с Уампоа вместе со своим отцом. Однако после краха Национально-революционной армии во время Северного похода в семье Чанга произошла трагедия. После убийства Чанга Вэй-куо бежал за границу, чтобы присоединиться к своему брату Чанг Чинг-куо в Европе, который в то время учился в парижском университете Сунь Ятсена.\n\nЗа границей он и его брат получили широкую поддержку от многих бывших студентов и друзей отца, причем младший был особенно очарован этой все более радикально настроенной кликой выпускников Уампоа. В 1935 г. он поступил на военную службу, пройдя первоначальную подготовку в качестве пехотного курсанта в альпийских шассерах (chasseurs alpins). Когда началась война Лиги, он, используя свои связи, получил должность унтер-офицера в танковом корпусе британских республиканцев.\n\n Вернувшись домой, он официально вступил в НРА, надеясь использовать навыки и идеи, полученные за границей, чтобы помочь проложить путь к созданию первых механизированных дивизий НРА. Хотя очевидно, что он получил свое высокое звание в столь юном возрасте благодаря своей фамилии, его амбиции и специальность не следует преуменьшать.§!\n\n§YNotes: Его биологический отец, Дай Цзитао, до сих пор остается семейной тайной. Неизвестно, знает ли сам Вэй-куо всю правду о своем \"дяде\" Любимец CRS, Чанг был образцовым курсантом и офицером молодой гвардии.§!"

###- Political Advisors -###

#Стартовые консультанты

#蔡元培
 CHI_cai_yuanpei: "Цай Юаньпэй"
 CHI_cai_yuanpei_desc: "§YОписание советника\nРодился:§! §g11 января 1868 года в Шаньине, провинция Чжэцзян, империя Цин§!\n§YПринадлежность:§! §gНезависимый§!\n§YПолитическая карьера:§! §gПочтенный член Гоминьдана, считающийся одним из \"четырех старейшин"\, Цай Юаньпэй обладает значительным влиянием в партии, а также является известным в Китае педагогом. В возрасте 26 лет Цай был назначен в Императорскую академию Ханьлинь. В 1904 г. он основал антиманьчжурскую организацию "Гуанфухуэй", а затем вступил в "Тунмэньхуэй" Примерно в это же время он учился в Германии, подружился с анархистами У Чжихуэем и Ли Шицзэном, и они вместе с Чжан Жэньцзе основали Всемирное общество.\n\nПосле того как Цай стал президентом Пекинского университета, он привлек к работе таких известных интеллектуалов, как Ли Дачжао, Чэнь Дусюй, Ху Ши и Сюй Бэйхун. В 1922 г. он оставил свой пост и уехал во Францию, но вернулся обратно в 1926 г. накануне Северного похода.\n\nМодель образования Цая основана на французской, и он является сторонником китайского эстетического воспитания, которое он связывает с традиционными ценностями и считает, что и то и другое совместимо в политике и образовании. Применяя такую методологию, студенты смогут создать нравственное и справедливое общество, свободное от хаоса военачальников. Кроме того, он является убежденным сторонником женского образования, отмены связывания ног и прекращения наложничества.§!\n\n§YNotes: Один из основателей Всемирного общества, он надеется сблизить синдикалистское движение с Гоминьданом. С тех пор он и другие старейшины порвали с Ван Цзинвэем и РАТ из-за их авторитаризма, а также вступили в соперничество с СПК.§!"

#施存统
 CHI_shi_cuntong: "Ши Цуньтун"
 CHI_shi_cuntong_advisor_desc: "§YОписание советника\nРодился:§! §g12 ноября 1899 года в Юаньдуне, провинция Чжэцзян, империя Цин§!\n§YПринадлежность:§! §gРАТ§!\n§YПолитическая карьера:§! §gВ молодости, учась в Чжэцзянской провинциальной нормальной школе, Ши Цуньтун стал активистом и участником движения "Новая культура" Будучи автором газеты "Чжэцзян синьчао", он опубликовал статью \"Неистовое благочестие\", в которой подверг резкой критике традиционную конфуцианскую семейную систему. В Пекине он познакомился с другими учеными из круга Цай Юаньпэя и Чэнь Дусю и стал симпатизировать их марксистским и либертарианским взглядам.\n\n Примерно в это же время он познакомился с Чжоу Фохаем, участвовал в создании Гоминьдана в Гуанчжоу и поддерживал постоянные контакты с синдикалистскими группами, такими как Всемирное общество и растущая Синдикалистская партия Китая. Будучи ученым, редактором и преподавателем в многочисленных социалистических организациях, таких как Шанхайский университет, Гуандунский университет Сунь Ятсена, Военная академия Вампоа и Университет Сунь Ятсена в Париже, Ши Цуньтун стал одним из главных сторонников радикальных перемен. Это привело его в ряды радикального крыла фракции RCA, а его последним проектом, для которого он надеется получить финансирование, стала Китайская культурная ассоциация спасения.§!\n\n§YNotes: Ши Цуньтун - один из ведущих просиндикалистских теоретиков в РАТ, он является важнейшим связующим звеном между радикалами РАТ и СПК.§!"

#王法勤
 CHI_wang_faqin: "Ван Фацинь"
 CHI_wang_faqin_desc: "§YОписание советника\nРодился:§! §g1870, в Гаояне, провинция Хэбэй, империя Цин§!\n§YПринадлежность:§! §gРАТ§!\n§YПолитическая карьера:§! §g Будучи студентом, учившимся за границей в Японии, Ван был очарован прогрессом Японии и недоволен застоем в Цинской империи. После запрета Японии на въезд китайских студентов он вернулся в Китай и стал одним из первых членов партии "Тунмэньхуэй" Во время Синьхайской революции он организовывал революционную деятельность в Северном Китае и даже был избран на несколько государственных постов в Хэбэе.\n\n Однако с началом Движения в защиту конституции он отправился на юг, чтобы присоединиться к революционному правительству Гоминьдана в Гуанчжоу. Он стал членом первого Центрального исполнительного комитета и с тех пор сохранил этот пост. Будучи решительно левым членом Гоминьдана, лояльным к Ван Цзинвэю и РАТ, он также курирует пенсионный комитет.§!\n\n§YNotes: Член радикальной фракции РАТ, он считается частью "старой гвардии" Гоминьдана, являясь ее членом с самых ранних времен.§!"

#陳璧君
 CHI_chen_bijun: "Чэнь Бицзюнь"
 CHI_chen_bijun_desc: "§YОписание советника\nРодился:§! §g5 ноября 1891 года в Пенанге, Британская Малайя§!\n§YПринадлежность:§! §gРАТ§!\n§YПолитическая карьера:§! §gРожденная в богатой китайской семье за границей, она познакомилась с молодым, страстным революционером Ван Цзинвэем во время его визита в Пенанг в 1908 году. Ван, бывший в то время членом партии "Тонгменгуй", предложил молодой Чэнь вступить в партию, и в 1908 г. она встретилась в Сингапуре с Сунь Ят-сеном и стала его секретарем. После неудачного покушения на Цайфэна и последующего тюремного заключения Ван отправился в Гонконг, чтобы спланировать его побег.\n\n Когда началась Синьхайская революция, Ван был освобожден из тюрьмы, и в 1912 г. супруги наконец-то поженились. Они отправились учиться во Францию, а в 1917 г. вернулись, чтобы помочь движению Сунь. После того как Сунь был изгнан из Гуандуна и бежал в Шанхай, супруги присоединились к нему, оставшись верными преданными уважаемому премьеру. Она присутствовала при триумфальном возвращении Суна в Гуандун в 1921 г., а также на его смертном одре, ухаживая за тяжело больным Суном.§\n\nПосле провала Северного похода Чэнь Бицзюнь вместе с мужем бежала во Францию, где прилагала усилия для сохранения международной поддержки мужа и поддержания положительного общественного имиджа сгорбленного председателя.§\n\n§YNotes: Формально воздерживаясь от прямого участия в политике, энергичная и решительная первая леди является одним из важнейших организаторов так называемой "Резидентской фракции", состоящей из сторонников Ван Цзинвэя. Она также является известным соперником Чэнь Гунбо, отказываясь от официального членства в его РАТ, несмотря на совпадение их интересов.§!"

#褚民誼
 CHI_chu_minyi: "Чу Миньи"
 CHI_chu_minyi_desc: "§YОписание советника\nРодился:§! §g17 января 1884 года в Вучэне, провинция Чжэцзян, империя Цин§!\n§YПринадлежность:§! §gРАТ§!\n§YПолитическая карьера:§! §gВ семье ученого-чиновника во времена упадка империи Цин родился известный врач Чу Цзитянь. Получив традиционное образование, он изучал английский язык и науку политологию. Он присоединился к движению "Усердный труд - бережливая учеба", организованному Цай Юаньпэем и будущими \"старейшинами\" Всемирного общества, где также вступил в "Тунмэньхуэй"\n\nПознакомившись с соратниками-революционерами Ван Цзинвэем и Чэнь Бицзюнем, он женился на сводной сестре Чэнь Бицзюня Чэнь Шуньчжэнь. Разочарованный формированием авторитарного Гоминьдана в ситуации после Синьхая, он уехал в Европу изучать медицину и стал одним из основателей Китайско-французского университета.\n\nВ 1924 г. он вернулся в Китай и примирился с Гоминьданом. Он также работал преподавателем в медицинских колледжах Гуандуна и сыграл важную роль в пропаганде здорового образа жизни. Действительно, он серьезно относился к своему здоровью, иногда называя себя \"фанатиком тайцзи\" (Tai-chi), и был известен своими физическими достижениями. Избранный в качестве альтернативного члена Центрального исполнительного комитета, он, несмотря на высокий авторитет Ванга, с тех пор не продвигался по службе, в чем Чу винит его плохие отношения с Чэнь Гунбо и высшим руководством РККА.§!\n\n§YNotes: Один из основных лидеров так называемой "Фракции резидентов"\, состоящей из родственников и личного персонала Вана, базирующихся в президентском дворце, Чу враждует с РАТ (членом которой он не является), что привело к междоусобице в стане РАТ.§!"

#刘不同
 CHI_liu_butong: "Лю Бутонг"
 CHI_liu_butong_desc: "§YОписание советника\nРодился:§! §g11 февраля 1905 года, Чжуанхэ, провинция Фэнтянь, империя Цин§!\n§YПринадлежность:§! §gКПСС§!\n§YПолитическая карьера:§! §gОкончив Шаньдунский коммерческий колледж Ивэнь, в 1926 г. он поступил в четвертый класс Вампоа в качестве офицера-политика. В то время он был еще незначительным офицером, но травматическая неудача Северного похода врезалась в его память.\n\nВ эмиграции он поступил в Лондонский университет, где познакомился с официальной социалистической идеологией и растущим движением максималистов в Британском союзе. Он, как и многие его сокурсники в эмиграции, чувствовал себя преданным неудачей Экспедиции и искал виноватых. Вступив в подпольную группу выпускников-единомышленников под руководством Ху Цзуннаня, он попал в более узкий лагерь, возглавляемый Хэ Чжунханом и Дэн Вэньи. Они возлагали вину за неудачу экспедиции не только на реакционные силы севера и немецких империалистов, но и на повальную дезорганизацию и некомпетентность гоминьдановской бюрократии, которая, по их мнению, саботировала Национально-революционную армию изнутри.\n\nОдин из наиболее интеллектуально ориентированных членов Общества возрождения Китая, экстремистские труды Лю, вобравшие в себя идеи европейской Тоталистической хартии, сделали его объектом полемики, но также и любимцем СМИ для тех, кто выступает за гораздо более милитаризованную революцию.§!\n\n§YNotes: Член CRS и более мелкой Ассоциации товарищей революционной армии, он во многом является рупором скрытной CRS. Популяризация его деятельности может помочь революции добиться успеха, но сможет ли гоминьдановское руководство сохранить контроль над бурей в бутылке - это уже другой вопрос.§!"

#陳友仁
 CHI_chen_youren: "Чэнь Юрен"
 CHI_chen_youren_desc: "§YОписание советника\nРодился:§! §g2 июля 1878 года в Сан-Фернандо, Тринидад и Тобаго, Британская империя§!\n§YПринадлежность:§! §gPAC§!\n§YПолитическая карьера:§! §gЕвгений Чен - уникальный член китайского Гоминьдана, поскольку не владеет ни китайским языком, ни грамотой. Родившись в семье заморских китайцев в Тринидаде и Тобаго, Чен редко говорил по-китайски и предавался литературному миру английских писателей. Тем не менее, его детский опыт и красноречие в английском языке сделали его важной фигурой в поддержании отношений с международными союзниками Гоминьдана - Французской коммуной и Британским союзом.\n\nПосле учебы в университете он стал барристером и посетил Лондон, где услышал выступление Сунь Ятсена против маньчжурского правительства Китая. Вдохновленный революционным лидером, он решил посвятить свою жизнь делу китайской революции. По Транссибирской магистрали он отправился в Китай и столкнулся с малазийским врачом У Лиен-те. Узнав, что у Чэня нет китайского имени, Лиен-тэ дал ему имя \"Юрен\", как эквивалент имени Евгений.\n\n Тактичный дипломат, Чэнь сыграл важную роль в обеспечении признания Третьим Интернационалом Гоминьдана в качестве конкурирующего революционного правительства Китая в 1920-х годах, а также его дальнейшей поддержки после Северного похода. После возвращения в ЦК он пользуется значительным влиянием в качестве гибкого министра иностранных дел.§!\n\n§YNotes: Будучи личным другом Сун Цинлинь, во внутрипартийной политике он встал на сторону ВКД.§!"

#章伯钧
 CHI_zhang_bojun: "Чжан Боцзюнь"
 CHI_zhang_bojun_desc: "§YОписание советника\nРодился:§! §g17 ноября 1895 года в Хоуфане, провинция Аньхой, империя Цин§!\n§YПринадлежность:§! §gPAC§!\n§YПолитическая карьера:§! §Сын помещика из семьи Аньхой, отец Чжана умер, когда ему было всего шесть лет, и его воспитывали дяди. Он был отличным учеником, но плохо успевал по математике, однако его способности к сочинительству высоко оценивались. Будучи студентом-радикалом в Вучане, он, тем не менее, на короткое время стал учителем английского языка в престижной обычной школе. Благодаря поддержке губернатора провинции Аньхой ему удалось получить стипендию для обучения за границей в Германии, где он познакомился с революционерами Чжу Дэ и Сунь Бинвэнем.\n\n Он стал социалистом и членом Гоминьдана. В 1925 г. в Берлине он познакомился с Дэн Яньда, с которым сблизился из-за схожих убеждений. По возвращении на родину Чжан стал профессором факультета искусств Гуандунского университета имени Сунь Ятсена. Он также стал сотрудником отдела пропаганды и председателем Объединенного военно-аграрного комитета Министерства сельского хозяйства. Уйдя в подполье в Мингане, он стал членом Временного комитета действий и часто рассматривается как гражданский лидер фракции, способствующий аграрному уклону ВКД.§!\n\n§YNotes: Один из наиболее публичных лидеров ВКД, он отстаивает предложение \nbsp- "покончить с правлением партии, создать конституционное правительство, завоевать сердца людей и продвигать власть народа, чтобы обеспечить успех национальной революции.§!§!"

#Среднеигровые разблокировки

#戴春風
 CHI_dai_chunfeng: "Дай Чуньфэн"
 CHI_dai_chunfeng_desc: "§YОписание советника\nРодился:§! §g28 мая 1897 года в Цзяншане, провинция Чжэцзян, империя Цин§!\n§YПринадлежность:§! §gОВК§!\n§YПолитическая карьера:§! §gРожденный в небольшой деревне и воспитанный волевой матерью-одиночкой, Дай Чуньфэн начал свою жизнь не сразу. Одновременно и драчун, и дебошир, и отличник (первый в классе), он учился на учителя, но был исключен за воровство. Затем он стал азартным игроком, но был пойман на мошенничестве и жестоко избит. Он также пробовал себя в различных профессиях, затем попытался стать милиционером, но и это ему не удалось.\n\n Затем он попытался стать шанхайским гангстером, познакомился с Ду Юэшэном и Ян Ху и служил в качестве низкопробного служащего, часто оставаясь без работы. В возрасте 30 лет он, казалось, был бы неудачником,\b-"живущим за счет земли\b-" (и за счет своего двоюродного брата), если бы не внезапная встреча с небольшой группой революционеров. В эту \"шанхайскую группу"\ входили чжэцзянцы Чан Кай-ши, Дай Цзитао и Чэнь Гофу. Возможно, благодаря им или своим связям в организованной преступности, он стал студентом университета Уэмпоа.\n\n Будучи дубинкой для Чанга, он пытался сделать себя полезным, впитывая информацию от своих однокурсников. Будучи кавалерийским курсантом, он так много времени уделял шпионажу, что так и не закончил свою курсовую работу. Он отказался от своей яркой личности в пользу молчания.\n\nЭто сослужило ему хорошую службу после провала Северного похода. Оставшись без работы и потеряв хозяина, он решил создать свою собственную сеть - Лигу Десяти. Опираясь на многих ныне безработных выпускников Whampoa, а также на старые связи Дая в шанхайском подполье, они стали мощной (хотя и небольшой) силой.§!\n\n§YNotes: Было бы неразумно считать Дая обычным гангстером. Амбициозный, националистически настроенный и братски настроенный, он настаивает на строжайшей дисциплине для своих агентов... и для своих хозяев тоже.§!"

#董必武
 CHI_dong_biwu: "Дун Биву"
 CHI_dong_biwu_desc: "§YОписание советника\nРодился:§! §gПятого марта 1886 года в Хуанъяне, провинция Хубэй, империя Цин§!\n§YПринадлежность:§! §gССК§!\n§YПолитическая карьера:§! §gРожденный в бедной семье учителя, Дун, тем не менее, преуспел в учебе. Он участвовал в революции 1911 г., отправившись в Вучан, чтобы помочь свергнуть угасающую династию Цин. Он интенсивно изучал русскую, а затем и французскую революции, стал преподавателем и писателем. Примерно в 1920 г. он стал членом недавно основанной Синдикалистской партия Китая и помог создать ее уханьское отделение.\n\nВ 1922 г. Сунь Ятсен вступил в союз с Интернационалом и, соответственно, образовал Объединенный фронт с зарождающейся СПК. Дун Биву стал одним из важнейших координаторов этого Объединенного фронта, с энтузиазмом выступая за сотрудничество между левыми партиями и способствуя созданию Союза синдикалистов Китая для объединения под одним знаменем социалистов, не входящих в Куоминьтан. Он также являлся альтернативным членом ЦК Гоминьдана, а затем был переведен в разряд полноправных членов.§!\n\n§YNotes: Хотя он продолжает настаивать на том, чтобы ССК действовала как независимая партия, он также быстро сглаживает разногласия между ней и родственной ей партией Гоминьдан. §!"

#何香凝
 CHI_he_xiangning: "Хэ Сяннин"
 CHI_he_xiangning_desc: "§YОписание советника\nРодился:§! §g27 июня 1878 года в Гонконге, Британская империя§!\n§YПринадлежность:§! §gВКД§!\n§YПолитическая карьера:§! §gРожденная в преуспевающей кантонской купеческой семье, Хэ Сяннин первым актом бунтарства было сопротивление тому, что отец связал ей ноги. Получив образование вместе с братьями, она стала одной из первых китайских феминисток и вышла замуж за Ляо Чжункай - китайца американского происхождения, который не хотел иметь жену, связанную по ногам.\n\nНа свои деньги она отправила себя и мужа в Японию для продолжения учебы, где они вместе с Сунь Ят-сеном стали членами партии "Тонгменгуй" Пропагандистка и революционерка, она участвовала в Синьхае и последовала за движением в Гуанчжоу. Она также стала личной подругой Сун Цинлин, жены доктора Суня, и вместе с ней собирала деньги для партии и связанных с ней благотворительных организаций.\n\nНа Втором съезде она была вознаграждена за свои усилия должностью в Центральном исполнительном комитете, возглавив вместе с Сун Цинлин женский отдел. Она также руководила созданием Красного Креста.\n\nВ период мятежа она попеременно ездила в Гонконг, где проводила художественные выставки (возглавляя поддерживаемую Гоминьданом Ассоциацию китайских художников) для сбора средств на нужды дела, и в Париж (ее муж также мотался между континентами в качестве связного). Она продолжает оставаться активисткой феминистского движения, а кроме того, умеет рисовать цветущие сливы, сосны, львов и тигров.§!\n\n§YNotes: Друг и соратник Сун Цинлин, она не является членом ВКД, но ожидается, что в большинстве споров в ЦИК она будет на их стороне.§!"

#RCA Endgame Advisors
 #周佛海
 CHI_zhou_fohai: "Чжоу Фохай"
 CHI_zhou_fohai_desc: "§YОписание советника\nРодился:§! §g24 мая 1897 года в провинции Хунань, империя Цин§!\n§YПринадлежность:§! §gРАТ§!\n§YПолитическая карьера:§! §Чжоу Фохай, ранний марксист, с самого начала своей революционной карьеры стал близким соратником и членом-учредителем Синдикалистской партия Китая. Во время краткого отпуска Чэнь Дусю после окончания Первого съезда Синдикалистской партии Китая именно Чжоу был назначен исполняющим обязанности секретаря Шанхайской организации труда. Близкий друг Чэнь Дусю, Чжоу изучал экономику в Японии, участвуя в революционной деятельности вместе с китайскими и японскими левыми, такими как Ши Цуньтун. Затем он окончил экономический факультет Киотского университета в Японии.\n\nВ 1924 г. он вернулся в Китай накануне Северного похода и стал секретарем Центрального отдела пропаганды при Дай Цзитао, вышел из состава Синдикалистской партии Китая и перешел на службу в Гоминьдан. Там он стал членом левой фракции Ван Цзинвэя, а после провала Северного похода вошел в состав ЦК в изгнании в Париже.§!\n\n§YNotes: Несмотря на то, что Чжоу заявляет о своей принадлежности к РАТ, он известен тем, что не имеет особых взглядов на руководство Чэнь Гунбо и Гу Мэнъюя, ставя собственные политические амбиции превыше партийных разногласий.§!"

#李士群
 CHI_li_shiqun: "Ли Шицюнь"
 CHI_li_shiqun_desc: "§YОписание советника\nРодился:§! §g24 апреля 1905 года в Суйчане, провинция Чжэцзян, империя Цин§!\n§YПринадлежность:§! §gРезидентская фракция§!\n§YПолитическая карьера:§! §gРодившись в 1905 г. в Суйчане, Ли в раннем возрасте был отдан в частную школу для обучения чтению. Затем он поступил в Академию изящных искусств и Шанхайский университет, славившийся своим умом и трудолюбием. Именно в Шанхае, с его активным рабочим движением и профсоюзами, Ли Шицюнь познакомился с ССК и стал членом Синдикалистской партия Китая. По указанию партии после провала Северного похода в 1927 г. он был направлен в Британский Союз, где был принят курсантом в C.I.C., разведывательную организацию социалистической Великобритании.\n\n В 1928 г. Ли Шицюнь вернулся в Шанхай, где ему удалось установить контакты со многими подпольными и криминальными структурами города. Кроме того, в соответствии с политикой Объединенного фронта он вступил в Гоминьдан. Когда была сформирована Служба специальных операций ЦК ("Красный отряд"), Ли стал членом текинцев Чжоу Эньлая и быстро продвигался по служебной лестнице. Благодаря своей эффективности он был назначен в охрану Ван Цзинвэя, где благодаря своей безжалостности завоевал расположение Ван. Доверяя Вангу во всех вопросах безопасности, Ли стал отвечать за охрану всего дома Ванга, а его разведывательную сеть по всей стране сравнивали с сетью Дай Чуньфэна. §!\n\n§YNotes: Безжалостный, жестокий и грубый - методы Ли - это уроки, полученные им во время службы в Теки и обучения в Европе. Он является близким членом фракции резидентов, учитывая его близость к Вану и собственные амбиции.§!"

#谷正鼎
 CHI_gu_zhenggang: "Гу Чжэнган"
 CHI_gu_zhenggang_desc: "§YОписание советника\nРодился:§! §g30 апреля 1902 года в Аньшане, провинция Гуйчжоу, империя Цин§!\n§YПринадлежность:§! §gРадикальная фракция РККА§!\n§YПолитическая карьера:§! §gВ 1922 г. Гу Чжэнган и его младший брат Гу Чжэндин отправились на учебу в Германию и поступили в Берлинский университет - после окончания Великой войны. Во время учебы за границей братья Гу вступили в контакт с гоминьдановскими ячейками и стали зарегистрированными членами партии. В 1925 г. братья и Ван Чжунъюй получили разрешение на учебу в Коммуне Франции в Китайско-французском университете в Лионе при поддержке Гоминьдана.\n\n Хотя первоначально он планировал вернуться в Китай, чтобы присоединиться к Северному походу, неудача экспедиции убедила Гу Чжэнгана продолжить исследования в Европе, и, находясь за границей, он стал членом Реорганизованной ассоциации товарищей и связался с радикальным крылом клики. Когда после войны Лиги гоминьдан вернулся в Китай, Гу продолжал хранить верность Чэнь Гунбо и РККА.§!\n\n§YNotes: Будучи членом радикального крыла РККА, Гу Чжэнган и его брат Гу Чжэндин являются убежденными сторонниками Чэнь Гунбо и РККА. Гу Чжэнган, однако, является самым ярким из них и часто выступает с красноречивыми и юмористическими речами, чтобы заручиться поддержкой РАТ.§!"

#郭春濤
 CHI_guo_chuntao: "Го Чунтао"
 CHI_guo_chuntao_desc: "§YОписание советника\nРодился:§! §g1898, в Линьсяне, провинция Хунань, империя Цин§!\n§YПринадлежность:§! §gРАТ-Радикалы§!\n§YПолитическая карьера:§! §gГуо Чунтао начал свое образование в средней школе №1 города Чанша (провинция Хунань), где, будучи председателем студенческого союза, познакомился с социалистами Цай Хэсэном и Ли Вэйханом. В 1918 г. он вместе со своими друзьями был принят в Пекинский университет, где под влиянием социалистических взглядов Ли Дачжао стал председателем Ассоциации выпускников Хунани. В 1919 г. в рамках программы Work-Study вместе с Цай Хэсэном и Ли Вэйханем он отправился во Францию, где помог основать общество \"Инженерный мир\" Когда правительство Бэйяна обнаружило, что студенты программы Work-Study имеют антиправительственные настроения, оно потребовало немедленной репатриации этих студентов, однако новое революционное правительство Франции отказалось выполнить это требование. Тем не менее, Го Чунтао вместе с другими революционерами в 1923 г. уехал в Китай, где вступил в Гоминьдан.\n\n В 1926 г., во время Северного похода, Го был членом Центрального комитета - однако, по иронии судьбы, неудача экспедиции привела его обратно во Францию. В эмиграции Го нашел союзников и товарищей в Реорганизованной ассоциации товарищей, особенно благодаря тому, что многие из них имели схожее рабочее и синдикалистское происхождение. Во Франции он также женился на Цинь Дэцзюнь, а после возвращения Гоминьдана в Китай Го принял правительственное поручение и занял пост заместителя министра по делам правительства в Министерстве промышленности.§!\n\n§YNotes: Будучи активным социалистом и марксистом, Го является одним из самых ярых сторонников единого фронта Гоминьдана с синдикалистскими движениями. Один из основателей Реорганизованной ассоциации товарищей, он, тем не менее, в высшей степени лоялен к руководству радикалов.§!"

#秦邦憲
 CHI_qin_bangxian: "Цинь Баньсянь" #Бо Гу
 CHI_qin_bangxian_advisor_desc: "§YОписание советника\nРодился:§! §g14 мая 1907 года в Уси, провинция Цзянсу, империя Цин§!\n§YПринадлежность:§! §gСПК-Радикалы§!\n§YПолитическая карьера:§! §gПотеря отца в раннем возрасте, а также тяжелое детство оказали большое влияние на молодого и рано созревшего Цинь Бансяна. Выходец из относительно обеспеченной семьи, Цинь был принят во Вторую промышленную школу провинции Цзянсу, где познакомился с новыми идеями, такими как социализм. В 1924 г. студентами из Уси было создано общество "Си", а Цинь Бансянь возглавил Сучжоуский комитет общества "Си" Когда в Шанхае произошла бойня 30 мая, Цинь лично возглавил демонстрацию 1925 года, в которой приняли участие более 3 тыс. студентов, протестующих против несправедливости иностранного империализма. Организация студенческого движения истощила Цинь, и вскоре он бросил колледж.\n\nВ сентябре этого года он был принят на факультет социологии, учился у синдикалиста Цюй Цюбая и к ноябрю вступил в Синдикалистскую партию Китая. В это время Гоминьдан и Союз синдикалистов Китая организовывали Первый объединенный фронт, и Цинь Бансянь был отправлен в Шанхай для участия в организации революции. Однако неудача экспедиции привела к изгнанию многих из них, и Цинь Бансянь бежал во Францию, чтобы избежать преследований.\n\nБлагодаря своему отличному французскому языку Цинь Бансянь стал переводчиком в недавно созданном парижском университете Сунь Ятсена. Он и группа более радикальных синдикалистов стали тяготеть к идеям ортодоксального марксизма и отвергли руководство ортодоксальной фракции Синдикалистской партия Китая. В 1930 г. Цинь вернулся в Китай, где служил офицером по пропаганде во время Шанхайского восстания 1932 г. от имени Всекитайской федерации профсоюзов.§!\n\n§YNotes: После победы РАТ-радикалов Цинь получил видный государственный пост, чтобы укрепить союз Гоминьдана с Синдикалистской партией Китая.§!"

#曾醒 - сестра Цзэн Чжунмина
 CHI_zeng_xing: "Цзэн Син"
 CHI_zeng_xing_desc: "§YОписание советника\nРодился:§! §g1882, в Фучжоу, провинция Фуцзянь, империя Цин§!\n§YПринадлежность:§! §gРабочая фракция:§!\n§YПолитическая карьера:§! §Старшая сестра Цзэн Чжунмина, Цзэн Синь не чужда революционному делу: она участвовала в "Тонгменгуй" (Китайском революционном союзе) доктора Сунь Ятсена. Поскольку семья Цзэн была довольно известной и обеспеченной, Цзэн Синь смогла позволить себе получить образование в Японии, где она училась в школе для девочек в Токио. Именно женщина Цзэн Син помогла подготовить неудачное убийство регента Цайфэна, и именно тогда Цзэн Син смогла установить длительные отношения с динамичным и харизматичным Ван Цзинвэем.\n\nПосле возвращения в Китай она работала директором школы Чжисинь, а после первого пленума ЦК заняла пост заведующей женским отделом Центрального комитета партии. Она известна своими выступлениями в защиту женского движения и, наряду с другими видными феминистками, такими как Хэ Сяннин и Сун Цинлин, является одной из самых ярых сторонниц освобождения женщин в партии.§!\n\n§YNotes: Несмотря на то, что Цзэн Син и ее брат не состоят в кровном родстве с Ваном, они являются незаменимыми членами его окружения и считаются, пожалуй, его самыми близкими друзьями. Действительно, в отношении Цзэн Ван часто сравнивает ее с женщиной-воином Мулан и приводит работы Цзэн Син в качестве доказательства того, что женщины являются важным аспектом китайской национальной революции.§!"

#PAC Endgame Advisors

#彭澤湘
 CHI_peng_zexiang: "Пэн Цзэсян"
 CHI_peng_zexiang_desc: "§YОписание советника\nРодился:§! §g1899, в Юэяне, провинция Хунань, империя Цин§!\n§YПринадлежность:§! §gПолитическая карьера:§!\n§YПолитическая карьера:§! §В 1918 г. Пэн Цзэсян окончил Хунаньскую объединенную среднюю школу № 3, а в следующем 1919 г. поступил в Пекинскую школу права и политики. После синдикалистской Французской революции 1920 г. он увлекся социализмом и стал одним из первых его сторонников в Китае, рано вступив в Синдикалистскую партию Китая. В начале 1920-х гг. он ездил на учебу в Коммуну Франции, где получил знания по организации рабочего движения.\n\n В 1924 г. он вернулся в Китай и стал работать организатором рабочего движения в Ухане, одновременно занимаясь пропагандой союза Гоминьдана с китайскими синдикалистами в рамках Первого объединенного фронта. Во время Северного похода Пэн служил в Политическом отделе, будучи одним из самых молодых его членов. В 1926 г. вновь созданная Союз синдикалистов Китая поручила ему помочь в организации союза с Ян Сеном из Сычуаньской клики, однако эти усилия не увенчались успехом. После провала Северного похода Пэн вместе с союзниками Сун Цинлина и Ли Цзишэня бежал в повстанческую зону Минган, где благодаря близости к Шанхаю смог сохранить рабочие контакты и связи с Гоминьданом. С укреплением власти ВКД в партии и созданием Революционного комитета Пэн занял позицию рабочего организатора и посредника между восстановленными связями Гоминьдана и китайскими синдикалистами.§!\n\n§YNotes: Хотя он питает большие симпатии к Синдикалистской партия Китая, известно, что он в хороших отношениях с Ли Цзишэнем - он твердо стоит в лагере КПК против авторитаризма РАТ.§!"

#張雲川
 CHI_zhang_yunchuan: "Чжан Юньчуань"
 CHI_zhang_yunchuan_desc: "§YОписание советника\nРодился:§! §g18 марта 1904 г. в поселке Шоулоу, Сяосянь, провинция Цзянсу, империя Цин§!\n§YПринадлежность:§! §gПартия:§!\n§YПолитическая карьера:§! §В 1919 г. в возрасте пятнадцати лет Чжан Юнчуань был принят в Седьмую нормальную школу провинции Цзянсу в Сюйчжоу. После окончания школы он вернулся в родной город и стал работать учителем и директором, а в пятнадцатом году Китайской Республики (1926 г.) был принят в четвертый класс Военной академии Вампоа. Он был известен тем, что во время учебы в Вампоа враждовал с Чан Кай Ши, критикуя правые организации, сформировавшиеся в училище.\n\n Во время Северного похода Чжан служил в Первой армии курсантов Вампоа, но неудача экспедиции заставила его бежать вместе со многими левыми членами партии в повстанческую зону Минган. Он был официально уволен из Национально-революционной армии и стал учителем и политическим инструктором в зоне Миньган, где смог использовать свой предыдущий опыт для обучения и воспитания крестьян повстанческой зоны. Вместе с Дэн Яньда он участвовал в создании Временного комитета действий во время войны Лиги и был одним из его главных, ярых сторонников во время партийной борьбы между ВКД и РАТ. После укрепления власти в партии и создания Революционного комитета Чжан стал одним из ведущих членов РК и недавно завершил одну из своих лучших работ: \"Опыт в Северной Цзянсу"\, отчет о своем пребывании в зоне восстания.§!\n\n§YNotes: Как один из основателей Временного комитета действий, входящего в окружение Дэн Яньда, он твердо стоит в лагере ВКС.§!"

#CRS Endgame Advisors

#毛人鳳
 CHI_mao_renfeng: "Мао Ренфэн"
 CHI_mao_renfeng_desc: "§YОписание советника\nРодился:§! §g5 января 1898 года в Цзяншане, провинция Чжэцзян, империя Цин§!\n§YПринадлежность:§! §gКПСС§!\n§YПолитическая карьера:§! §О ранней карьере Мао Жэньфэна известно немного, кроме рассказов о том, что в раннем возрасте он был знаком с теневым лаобаном Дай Чуньфэном. Ведь именно Мао рекомендовал Дай поступить в Whampoa и впоследствии помог ему добиться зачисления в школу.\n\nМао Жэньфэн в раннем возрасте окончил Шанхайский университет Хуцзян и был принят на четвертую ступень Военной академии Whampoa. Однако из-за болезни он прервал учебу и не смог принять участие в Северном походе. Тем не менее амбициозный Мао отправил Дай Чуньфэна в ссылку в Шанхай, где тот участвовал в преступной деятельности лаобана. После восстановления ЦК и возрождения гоминьдана Мао занимает высокий пост в составе \"Цзунтун\" или Национального бюро расследований и статистики Дай Чуньфэна. Когда в союзе с "Хунтун" было создано Общество возрождения Китая, Мао получил место в зловещем совете "Лисингше"§!\n\n§YNotes: Давний соратник и друг Дай Чуньфэна, говорят, что во всем Китае нет человека, которому Дай Чуньфэн доверял бы больше, чем Мао Ренфэну.§!"

#蕭贊育
 CHI_xiao_zanyu: "Сяо Цзаню"
 CHI_xiao_zanyu_desc: "§YОписание советника\nРодился:§! §g1905, в Шаояне, провинция Хунань, империя Цин§!\n§YПринадлежность:§! §gОбщество возрождения Китая§!\n§YПолитическая карьера:§! §Сяо Цзаню родился в 1905 г. в эпоху революции, когда Синьхайская революция разразилась, ему было всего шесть лет. После окончания начальной школы он получил военное образование в японском университете Мэйдзи, что оказало большое влияние на его политическое мировоззрение и позволило ему связаться с другими единомышленниками - китайскими революционерами, которые рассматривали модернизацию Японии и, в частности, армейскую культуру как средство успешной модернизации.\n\n В 1924 г. Сяо поступил и окончил первый этап Военной академии Уэмпоа и принял участие в Северном походе. После провала экспедиции он вместе со многими членами Гоминьдана бежал в Европу, где поддерживал тесные связи с другими недовольными студентами Вампоа, такими как Хэ Чжунган и Дэн Вэньи. Для повышения уровня своего образования, особенно в области революционных и социалистических вопросов, Сяо учился в Университете Сунь Ятсена во Франции, а затем иммигрировал в Англию, чтобы учиться вместе с единомышленниками - выпускниками Вампоа. По возвращении в Китай он стал незначительным, но влиятельным сотрудником Центрального комитета в Обществе возрождения Китая.§!\n\n§YNotes: Несмотря на то, что Сяо занимает незначительное место в руководстве Общества возрождения Китая, он является влиятельным пропагандистом среди масс во внешнем Фусиньшэ, а также политиком, помогающим добиться политической легитимности ОВК.§!"

#蔣經國
 CHI_chiang_ching_kuo: "Чан Чинг-Куо"
 CHI_chiang_ching_kuo_desc: "§YОписание советника\nРодился:§! §g27 апреля 1910 года в Фэнхуа, провинция Чжэцзян, империя Цин§!\n§YПринадлежность:§! §gОбщество возрождения Китая§!\n§YПолитическая карьера:§! §В детстве у Чанга были прекрасные отношения с матерью и бабушкой, но скандальные - с гораздо более авторитарным отцом. Отец долгое время оставлял за ним тень, пока они переезжали, и в 1924 г. идеалист Чан Чинг-Куо смог представить своему отцу, тогдашнему директору Военной академии Уампоа, предложение по организации сельского населения Хайкоу. Чинг-Куо увлекся идеей стать так называемым \"прогрессивным революционером"\, и в качестве вдохновения обратился к недавно созданной Коммуне Франции.\n\n С помощью получившего французское образование старейшины партии У Чжихуя, Чанг получил от отца разрешение на поездку за границу. Во Франции Чан получил прекрасное революционное образование и вступил в молодежную синдикалистскую лигу вместе со своим однокурсником Дэн Сяопином. Однако, к сожалению, в феврале 1927 г. молодой Чан получил известие о провале Северного похода и убийстве отца.\n\nНе имея дома, Чан Чинг-Куо остался с китайской эмигрантской общиной во Франции, где он также встретил вернувшихся с войны военных курсантов из Whampoa, сильно недовольных парламентской политикой. Эти выпускники с увлечением следили за такими европейскими течениями, как сорелианство и максимализм, и вскоре отправились в Британский Союз для продолжения учебы. Многие из них были учениками его отца и взяли младшего Чанга под свое крыло, где он еще больше радикализировался, став членом Общества возрождения Китая.§!\n\n§YNotes: Формально являясь членом РАКА, Чан является одним из неофициальных лидеров CRS. Будучи комиссаром, но не солдатом, он получил от руководства партии задание следить за ростом числа членов и обучением новобранцев.§!"

#LCS Advisors

#李立三
 CHI_li_lisan: "Ли Лисан"
 CHI_li_lisan_advisor_desc: "§YОписание советника\nРодился:§! §g18 ноября 1899 года в уезде Лилин, Чанша, провинция Хунань, империя Цин§!\n§YПринадлежность:§! §gЦП-ортодокс§!\n§YПолитическая карьера:§! §gРодился под именем Ли Лунчжи, в раннем возрасте отец обучал его традиционным китайским стихам и классике. В 1915 г. он приехал в Чанша (Хунань) для обучения в средней школе, а затем, в 1918 г., Ли поступил на службу в армию Чэн Цяня. Отношения между этими двумя людьми продолжались десятилетиями, так как Чэн Цянь помог Ли получить спонсорскую помощь для учебы в Пекине, а позже вместе с Ли занимался организацией единства Гоминьдана и ССК. По достижении Пекина он подал заявку на обучение во Франции и прибыл туда в 1920 г., накануне революции. Работая помощником котельщика, Ли попал под влияние синдикализма благодаря своему начальнику на работе - так Ли начал бороться за права китайских рабочих во Франции. В 1922 г. Ли вернулся в Шанхай, где по предложению Чэнь Дусю вступил в Синдикалистскую партию Китая. Партия поручила ему организацию рабочей деятельности на угольной шахте Анюань, где организационные методы Ли помогли значительно увеличить число членов профсоюза.\n\n Во время движения 30 мая Ли помогал организовывать забастовки, но неудача экспедиции заставила Ли и других членов LCS организовывать рабочее движение тайно. Будучи членом ортодоксального крыла Синдикалистской партия Китая, Ли придерживается линии Союза синдикалистов Китая на номинальное сотрудничество и дружбу с КМТ. Будучи давним организатором рабочего движения, Ли твердо убежден, что революцию могут совершить только рабочие, и придерживается ортодоксального марксизма, считая, что крупномасштабные восстания и забастовки рабочих в городах станут ключом к национальной революции.§!\n\n§YNotes: Как член старой гвардии ЦСП, Ли в своей политике как организатор рабочих организаций известен своей относительно авторитарной позицией и вызывает враждебность и раздражение со стороны молодой гвардии ЦСП и радикалов.§!"

#刘少奇
 CHI_liu_shaoqi: "Лю Шаоци"
 CHI_liu_shaoqi_advisor_desc: "§YОписание советника\nРодился:§! §g24 ноября 1898 г. в поселке Хуаминлоу, Нинсян, провинция Хунань, империя Цин§!§gПринадлежность:§! §gЦП-ортодокс§!\n§YПолитическая карьера:§! §Лю родился в умеренно богатой крестьянской семье, проживавшей в Хуаминлоу, Нинсян, Хунань, хотя его родовой дом находился в уезде Цзишуй в Цзянси. Он учился в средней школе Нинсяна Чжушэн, после чего ему, как и многим другим левым китайским студентам, было рекомендовано посещать курсы в Шанхае, который в то время был ульем новой и революционной активности, чтобы подготовиться к учебе во Франции. В 1920 г. он вместе со своим сверстником Рен Биши вступил в Социалистический молодежный корпус, а в 1921 г. Лю был завербован для обучения в Коммуне Франции.\n\nВ 1921 г. он вступил в только что созданную Синдикалистскую партию Китая, а в 1922 г. вернулся в Китай в качестве секретаря Всекитайского рабочего синдиката. Именно в это время Лю приобрел репутацию неутомимого организатора труда и возглавил несколько забастовок железнодорожников в долине реки Янцзы. В 1925 г. он переехал в Гуанчжоу, чтобы принять участие в реорганизации Синдикалистской партия Китая, в результате которой СПК была объединена в большую Союз синдикалистов Китая. В течение последующих нескольких лет он возглавлял многочисленные кампании и забастовки, в том числе 16-месячную забастовку Кантон-Гонконг. К 1927 г. он вошел в состав Центрального комитета ССК и был назначен руководителем отдела труда. С созданием вновь провозглашенной китайской синдикалистской страны сложившаяся репутация и связи Лю с Синдикалистской партией Китая обеспечили ему видное место в Исполкоме партии, и он готов вести Китай по социалистическому пути вне гоминьдана.§!\n\n§YNotes: Будучи давним членом СПК, Лю относится к старой гвардии партии и придерживается мнения, что Китай должен развиваться естественным путем за счет расширения рынков, материального стимулирования трудящихся и увеличения финансирования потребительских отраслей.§!"

###- Высшее командование -###.

#周至柔
 CHI_zhou_zhirou: "Чжоу Чжироу"
 CHI_zhou_zhirou_desc: "§YОписание офицера\nРодился:§! §g30 ноября 1899 года в Линьхай, провинция Чжэцзян, империя Цин§!\n§YПринадлежность:§! §gPAC§!\n§YВоенная карьера:§! §gРодившись в чжэцзянской семье, Чжоу в 1919 г. поступил в Баодинскую военную академию в качестве пехотного офицера. Там он познакомился и стал заклятыми братьями с курсантами Чэнь Чэном и Ло Чжуоином. После окончания академии в 1922 г. он вместе с Чэнь и Ло отправился на юг и стал инструктором в Военной академии Уампоа. Он стал тесно общаться с выпускниками академии, но его карьера резко изменилась после провала Северного похода.\n\nВ эмиграции за границей он заинтересовался европейскими военно-воздушными разработками и начал посещать занятия. На родину в Китай он вернулся знающим специалистом в этой области, с намерением создать воздушный флот для борьбы за китайское небо и дать Национально-революционной армии решающее преимущество перед войсками военачальников.§!\n\n§YNotes: Давний и уважаемый член Ассоциации революционных однокашников Военной академии имени Вампоа (WMARCA), он, как ожидается, будет поддерживать Дэн Яньда и PAC в партийных делах.§!"

#毛邦初
 CHI_mao_bangchu: "Мао Бангчу"
 CHI_mao_bangchu_desc: "§YОписание должностного лица\nРодился:§! §g5 марта 1904 года в Шанхае, Шанхайское международное поселение§!\n§YПринадлежность:§! §гКРС§!\n§YВоенная карьера:§! §gВступление Мао Банчу в Гоминьдан было отмечено его ранним отвращением к иностранным империалистам. Его отец работал на американскую нефтяную компанию Standard Oil Company, а близость к иностранным концессиям в Шанхае способствовала тому, что Мао рано проникся неприязнью к империалистам, стремившимся расчленить Китай. Связанный с тогдашним директором школы Чан Кай-ши через свою родственницу, бывшую жену Чан Кай-ши Мао Фумэй, Мао поступил в только что созданную военную академию Вампоа в Гуанчжоу.\n\nВ 1927 г. он окончил третий класс военной академии Вампоа, где французские советники преподавали ему основы военной подготовки и темы. К сожалению, он слишком поздно присоединился к Северному походу, которая потерпела крах и вынудила его бежать за границу. В изгнании у него появился интерес к полетам и воздушной войне, и он обучался в британских воздушных академиях. С помощью этих навыков молодой и амбициозный человек надеется создать революционные и современные военно-воздушные силы для возрожденного Гоминдана.§!\n\n§YNotes: Широко распространено мнение, что он был втянут в экстремистские братские общества вместе со своими дальними кузенами.§!"

#陳昌祖
 CHI_chen_changzu: "Чэнь Чанцзу"
 CHI_chen_changzu_desc: "§YОписание офицера\nРодился:§! §g1904, в Пенанге, Малайя, Британская империя§!\n§YПринадлежность:§! §gRCA§!\n§YВоенная карьера:§! §gРодившись в богатой семье в британской Малайе, в 1912 г. он вместе с семьей переехал во Францию. В Марселе его старшая сестра Чэнь Бицзюнь вышла замуж за известного революционера Ван Цзинвэя, недавно освобожденного из тюрьмы после начала Синьхайской революции. В 19 лет, вскоре после окончания Великой войны, Чэнь изучал морскую архитектуру и авиационную технику в Германии.\n\n Он был еще в Европе, когда Северный поход потерпела крах, и был вынужден продолжить образование во Франции, так как его шурин поднялся в статусе. Во Франции он начал изучать авиацию и получил назначение в инженерный отдел авиационного бюро ВВС Китая. Несмотря на довольно очевидное кумовство (его сестра была намерена создать в НРА фракцию, лояльную своему мужу, чтобы противостоять Чангу и другим военным группировкам), он искренне стремится помочь созданию современных китайских ВВС.§!\n\n§YNotes: Приехав в Китай впервые в жизни, Чэнь, тем не менее, является энергичным офицером, хотя и не лучшим вариантом для командования всеми ВВС. Тем не менее, в условиях относительно новой технологии он оказывается в сравнительно молодом, ровном игровом поле с точки зрения кандидатов, не считая политических связей.§!"

###- Теоретики -###.
 CHI_MMIC_theorist: "МВМК"
 CHI_MMIC_theorist_idea_desc: "§YМеждународная военная миссия в Китае§!\n§gПоставленная в Китай Третьим Интернационалом после войны Лиги, МВМК является развитием предыдущих усилий социалистов по оказанию помощи китайской революции. Первоначально состоявшая из русских эмигрантов-красноармейцев, спасавшихся от гражданской войны в Китае, направленных в 1924 г. на помощь доктору Суну, она с тех пор привлекает офицеров со всего социалистического мира для участия в международной деятельности, подобающей ее спонсорам.\n\n В настоящее время главой Миссии является француз Андре Мальро, который выполняет двойную роль - консультирует Национально-революционную армию и продвигает ее на родине. Среди других фигур - Дэвид Рамсей из Великобритании, Манабендра Натх (М.Н.) Рой из Индии, Жан Фонтенуа из Франции, Ингвальд Берентин Аасе из Норвегии и Якоб Рудник (Павел Рюгг) из Украины.\n\nСмешение политических и военных офицеров, их мотивы неоднозначны. Кого-то влекут приключения на другом конце света, кого-то манящая перспектива славы и продвижения по службе, которых они не смогли бы добиться на родине. Некоторые просто хотят выполнить интернациональный долг, а другие испытывают симпатию к ориентализму.\n\nМногие молодые офицеры NRA, особенно прошедшие обучение за рубежом или симпатизирующие синдикализму, очень любят своих инструкторов МВМК. Однако они подвергаются критике за готовность участвовать в китайской политике, что многие представители старой гвардии считают излишним вмешательством во внутренние дела. С другой стороны, МВМК считает себя необходимым противовесом реакционному влиянию в высшем командовании НРА.§!"

###- Другие - ###

#BIS
#郑介民
 CHI_zheng_jiemin: "Чжэн Цзэминь"
 CHI_zheng_jiemin_leader_desc: "§YОписание лидера\nРодился:§! 18 сентября 1897 г. в Вэньчане, провинция Гуандун, империя Цин\n§YПолитическая карьера:§! Чжэн Цзэминь, ранний гоминьдановский революционер, учился на третьем этапе военной академии Вампоа, а затем поступил в Парижский университет Сунь Ятсена. Из-за провала Северного похода он вернулся на родину только через десять лет, став во время изгнания политическим офицером при Хэ Чжунхане. Член RACA и CRS, он устроился на работу в Национальное бюро расследований и статистики (BIS), получив престижную должность начальника участка в Гуандуне. Он известен своей любовью к французским офицерам, идеологическим фанатизмом и безжалостной эффективностью в разведывательной работе - олицетворение двух крыльев CRS"

#唐纵
 CHI_tang_zong: "Тан Цзун"
 CHI_tang_zong_leader_desc: "§YОписание лидера\nРодился:§! 1905, в Люйюане, провинция Хунань, империя Цин\n§YПолитическая карьера:§! Плодовитый читатель, Тан Цзун был одним из лучших учеников на теоретических занятиях, но регулярно проваливал практические экзамены по пехоте на шестом этапе Вампоа, за что его дразнили сокурсники. Однокурсник Дай Чуньфэна, Тан стал одним из первых членов Лиги десяти после провала Северного похода. После возвращения Гоминьдана в Китай Тан присоединился к своему несколько отдалившемуся от него хозяину и поступил на службу в CRS и новообразованное Бюро расследований и статистики Комиссии по военным делам (BIS), получив задание возглавить отделение в Хунани. Известно, что он предпочитал офицеров, получивших британское образование, и, как говорят, любил изучать западные политические системы на стороне"

#沈醉
 CHI_shen_zui: "Шэнь Цзуй"
 CHI_shen_zui_leader_desc: "§YОписание лидера\nРодился:§! 3 июня 1914 г. в Сянтане, провинция Хунань, империя Цин\n§YПолитическая карьера:§! Сын богатого помещика, он уже в раннем возрасте попал под влияние революционного национализма и приводил своих одноклассников домой, чтобы крикнуть отцу \N "долой местных тиранов и злых дворян\N" Во время Шанхайского восстания 1932 г. Шен был исключен из университета Чанша за подстрекательство к беспорядкам в поддержку Гоминьдана. После возвращения гоминьдана в Восточный Китай он вместе с братьями и сестрами переехал в Шанхай, где его брат помог ему вступить в ряды CRS. Неизвестно, когда именно он привлек внимание Дай Чуньфэна, но после создания Бюро расследований и статистики Комиссии по военным делам (BIS) он быстро стал одним из самых видных руководителей шанхайских разведывательных ячеек, маскируясь под репортера хунаньского информационного агентства Xiangguang по имени Чэнь Цан"

#馬漢三
 CHI_ma_hansan: "Ма Хансан"
 CHI_ma_hansan_leader_desc: "§YОписание лидера\nРодился:§! 1906 г., в Ванпине, провинция Чжили, империя Цин.§YПолитическая карьера:§! Ранний член 11-й дивизии Фэн Юйсяна (предшественницы Гоминьдана), Ма Ханьсань находился под влиянием социалистов, таких как Сюань Сяфу и Гоминьдан. Сюань Сяфу, выпускник Whampoa, ввел Ма Хансаня в широкую сеть выпускников Whampoa, благодаря чему он оказался в контакте с CRS и недавно созданным Бюро расследований и статистики Комиссии по военным делам (BIS). В BIS не хватало офицеров с северным происхождением (в Whampoa преобладали курсанты южного происхождения), и Ма охотно назначили начальником северного участка. Однако обвинения в коррупции преследуют его, и он продолжает наживать себе врагов в Бюро"

#胡天秋
 CHI_hu_tianqiu: "Ху Тяньцю"
 CHI_hu_tianqiu_leader_desc: "§YОписание лидера\nРодился:§! 1901, в Суцяне, провинция Цзянсу, империя Цин\n§YПолитическая карьера:§! Ху Тяньцю был кавалерийским курсантом 6-го этапа Военной академии Вампоа. После провала Северного похода он вместе со своим однокашником Дай Чуньфэном основал в Шанхае "Лигу десяток"\. После создания Бюро расследований и статистики при Комиссии по военным делам (BIS) Ху было поручено наблюдать за их теневыми операциями в Шаньдуне."

#曾擴情
 CHI_zeng_kuoqing: "Цзэн Куоцин"
 CHI_zeng_kuoqing_leader_desc: "§YОписание лидера\nРодился:§! 1895, в Вэйюане, провинция Сычуань, империя Цин\n§YПолитическая карьера:§! Цзэн Куоцин был офицером сычуаньской армии, после чего поступил в Пекин на юридический факультет. Позже он учился на второй ступени Военной академии Вампоа, служил политическим комиссаром и инструктором. Дружил с Ху Цзуннанем и Дай Чуньфэном, а в период эмиграции присоединился к РАКА, возглавляемой Хэ Чжунханом и Дэн Вэньи. Плодовитый писатель и редактор, он был направлен вместе с Ляо Хуапином в Сычуань для организации операций CRS при поддержке Национального бюро расследований и статистики (BIS)"

#邱開基
 CHI_qiu_kaiji: "Цю Кайцзи"
 CHI_qiu_kaiji_leader_desc: "§YОписание лидера\nРодился:§! 1905, в Цзиндуне, провинция Юньнань, империя Цин\n§YПолитическая карьера:§! Цю родился в дворянской семье, но в юности был жестоко избит курсантами местной военной академии, что воспитало в нем глубокую ненависть к военачальникам, и он принял близко к сердцу лозунг Whampoa \"Daodao junfa\" (долой военачальников!). Окончив третью ступень Военной академии Whampoa, Цю прошел путь от рядового до рядового в Национально-революционной армии вплоть до Северного похода. Он уехал за границу, в Британию, в изгнание, присоединившись к вновь образованной РАКА. Вернувшись на родину вместе с гоминьдановцами, Цю связался с недавно созданным Бюро расследований и статистики Комиссии по военным делам (BIS) и был направлен в свою родную провинцию Юньнань в качестве начальника участка и руководителя полевых агентов"

#Teke Agents
#阎宝航 - помощник Чжана Сюэляна, если его однажды переманит FNG, скорректируйте соответствующим образом
 CHI_yan_baohang: "Янь Баохан"
 CHI_yan_baohang_leader_desc: "§YОписание лидера\nРодился:§! 6 апреля 1895 г. в Хайчэне, провинция Фэнтянь, империя Цин.\n§YПолитическая карьера:§! Во время недолгого правления Юань Шикая Янь Баохан участвовал в антиюаньской деятельности в провинции Фэнтянь и стал членом Фэнтяньского YMCA, где познакомился с Чжан Сюэляном, сыном главного военачальника провинции. В 1924 г. Янь и многие его сверстники получили предложение от Синдикалистской партия Китая помочь в создании партийных сетей в северной провинции, однако, несмотря на свои левые симпатии, Янь отказался. После провала Северного похода Янь ушел в подполье, а после возрождения Гоминьдана - Чжоу Эньлай обратился к нему с предложением создать филиал ТЕК в провинции Фэнтянь."

#龚昌荣
 CHI_gong_changrong: "Гун Чанжун"
 CHI_gong_changrong_leader_desc: "§YОписание лидера\nРодился:§! 1903 г., в Лунхуанли, поселок Шуйнань, Синьхуэй, провинция Гуандун, империя Цин\n§YПолитическая карьера:§! Гун Чанжун родился под фамилией Ли и попал в бедную семью слуг, пока его не усыновила Гун Фули, заморская китаянка, проживавшая в США. Когда он стал взрослым, то иммигрировал обратно в Китай и стал работать в Гуанчжоу, участвовал в крестьянском движении в 1925 г., в июне 1925 г. помогал участвовать в возглавляемой Синдикалистской партией Китая Кантон-Гонконгской забастовке. После провала Северного похода Гун оставался подпольным активистом, выступая от имени Союза синдикалистов Китая. Когда Чжоу Эньлай организовал Текинскую партию, он обратился к этому давнему ветерану революционной деятельности с просьбой помочь организовать деятельность Текина в Гуандуне"

#刘道衡
 CHI_liu_daoheng: "Лю Даохэн"
 CHI_liu_daoheng_leader_desc: "§YОписание лидера\nРодился:§! 1892, в Хэнъяне, провинция Хунань, империя Цин\n§YПолитическая карьера:§! В ранние годы Лю Даохэн вместе со своим братом Лю Сунхэном вступил в хэнчжоуское отделение "Тунмэньхуэй", а затем участвовал в восстании в Вучане. В те революционные времена братья участвовали в революционном движении в Хунани против Юань Шикая - к сожалению, Лю Сунхэн был замучен по приказу Тан Янкай. Лю бежал в ссылку в Японию и Шанхай, а в Шанхае заинтересовался набирающим популярность синдикализмом и принял участие в работе \"Союза социальных ученых\", который был периферийной организацией Союза синдикалистов Китая. Его предшествующая революционная деятельность привлекла внимание Чжоу Эньлая, который после создания "Теке" поручил Лю создать отделение "Теке" в Хунани"

#谭忠余
 CHI_tan_zhongyu: "Тань Чжунъюй"
 CHI_tan_zhongyu_leader_desc: "§YОписание лидера\nРодился:§! 1909, в Баошань, Шанхай, Шанхайское международное поселение\n§YПолитическая карьера:§! В юности Тан Чжунъюй не мог позволить себе учебу в школе, поэтому решил работать подмастерьем в рисовой лавке. В 1920-х гг. он стал членом Синдикалистской партия Китая и получил должность организатора забастовок. Благодаря своему шанхайскому происхождению и связям в городе Чжоу Эньлай предложил ему возглавить отделение Тэйкэ в Шанхае"

#王石坚
 CHI_wang_shijian: "Ван Шицзянь"
 CHI_wang_shijian_leader_desc: "§YОписание лидера\nРодился:§! 1911, в Венденге, провинция Шаньдун, империя Цин\n§YПолитическая карьера:§! Ван Шицзянь начал свою политическую карьеру как китайский синдикалист, которому было поручено помочь организовать секретную радиостанцию для ведения националистической и социалистической пропаганды против Чжили и их маньчжурских союзников. Он быстро поднялся по служебной лестнице и стал партийным секретарем Антиимпериалистической лиги провинции Хэбэй, периферийной организации Союза синдикалистов Китая. Поскольку Гоминьдан и ССК не имели значительного присутствия на Центральных равнинах Китая, Ван был быстро выбран кандидатом для участия в недавно созданной Чжоу Эньлаем организации "Чжунъян теке"

#康生
 CHI_kang_sheng: "Канг Шенг"
 CHI_kang_sheng_leader_desc: "§YОписание лидера\nРодился:§! 4 ноября 1898 г. в Датайчжуане, уезд Чжучэн, провинция Шаньдун, империя Цин\n§YПолитическая карьера:§! В детстве Кан Шэн учился в немецкой школе в Циндао, что вызвало у него стойкую ненависть к Германской империи. После окончания немецкой школы Канг преподавал в сельской школе в Чжучэне, а в 1924 г. уехал в Шанхай. В Шанхае он поступил в Шанхайский университет, который в то время возглавляла Синдикалистская партия Китая, а затем вступил в Молодежную лигу СПК. После официального вступления в партию он участвовал в февральской забастовке 1925 г., которая вылилась в Движение 30 мая, а также участвовал в реорганизации СПК в Союз синдикалистов Китая.\n\nПосле провала Северного похода Кан остался в Китае в качестве организатора труда и сотрудника службы безопасности ССК. Он женился на уроженке Шаньдуна Цао И'оу и поступил на работу к Юй Цяцину, чьи связи с Гоминьданом помогли Кангу связаться с КМТ. После возвращения КМТ в Китай Чжоу Эньлай предложил Кангу возглавить службу внутренней безопасности вновь созданного Чжунъян теке в Шаньдуне. Именно здесь, в Шаньдуне, Кан заработал печальную репутацию садиста-дознавателя, его методы вызывали недовольство ЦК партии и Чжоу Эньлая. Он известен тем, что обвинял соратников по ССК и даже членов КМТ в симпатиях к Германии, и как только они под тяжелыми пытками признавались в этом - это приводило к лавине арестов и чисток."

#胡春浦
 CHI_hu_chunpu: "Ху Чунпу"
 CHI_hu_chunpu_leader_desc: "§YОписание лидера\nРодился:§! 1913, в Цюй, провинция Сычуань, империя Цин\n§YПолитическая карьера:§! После учебы в начальной школе города Саньхуэй Ху Чуньпу поступил в среднюю школу уезда Цюй в 1927 г., примерно в то время, когда Северный поход потерпела крах. Летом 1931 г. он был принят в Шанхайскую частную школу, где стал участвовать в студенческих мероприятиях под руководством синдикалистов. В феврале 1935 г. он познакомился с Синдикалистской партией Китая и стал ее членом. Чжоу Эньлай предложил ему возглавить новое отделение "Чжунъян теке" в Сычуани, поскольку он работал в Сычуани"

#吴鸿宾
 CHI_wu_hongbin: "У Хунбинь"
 CHI_wu_hongbin_leader_desc: "§YОписание лидера\nРодился:§! 1903, в Тяньшуй, провинция Ганьсу, империя Цин\n§YПолитическая карьера:§! У Хунбинь по национальности хуэй, в 1923 г. поступил на юридический факультет Пекинского университета, где под влиянием революционных настроений в университете в 1926 г. вступил в Синдикалистскую партию Китая. Он был назначен секретарем Сичэнского районного комитета СПК под руководством Союза синдикалистов Китая и после окончания университета в 1929 г. отправился преподавать в Яньань. В силу своей этнической принадлежности к народности хуэй он был естественным кандидатом на пост руководителя революционной охранной деятельности Чжунъянь теки в северо-западных провинциях Китая"

