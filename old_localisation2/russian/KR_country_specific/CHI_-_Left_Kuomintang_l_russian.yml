 CHI_country_intro_header: "Миньганьское повстанческое движение"
 CHI_country_intro_content: "В конце зимы 1927 г. Национальная революция Китайской националистической партии (Гоминьдан) оказалась на грани краха после ряда крупных военных поражений и гибели командующего экспедицией §PЧана Кайши§!. После уничтожения Национально-революционной армии (НРА) Гоминьдана §lгенерал Ли Цзишень§! убедил часть НРА продолжить революцию, ведя затяжную войну сопротивления против §Pчжилийских военачальников§! и их немецких лакеев. К нему присоединились §SСун Цинлин§!, а позже §SДэн Яньда§!, которые после провала их §rШанхайского восстания 1932 г.§! решили бежать в глухие горные деревни и леса юго-восточной Цзянси и северо-западной Фуцзяни, надеясь когда-нибудь нанести ответный удар. Тем временем §RЦентральный комитет Гоминьдана§!, в котором преобладало левое крыло партии, бежал в Европу, надеясь организовать правительство в изгнании, которое, возможно, когда-нибудь освободит Китай.\n\nЗдесь, в глухой сельской глубинке Южного Китая, популистское правительство §SСун Цинлин§! создало уникальное движение, окутанное тайной, - движение, связанное с ячейками и союзными городами региона. Крестьяне (как мужчины, так и женщины) проходят подготовку и обучение у офицеров НРА, надеясь вдохновить новое поколение революционеров, способных выполнить миссию национального спасения. Их учат, что в свободном гоминьдановском Китае не будет сословий и цепей. Им помогает обширная сеть шпионов, информаторов, партийных ячеек и товарищей по левому движению в Шанхайской нейтральной зоне - по слухам, §oдаже преступные организации§! играют роль в контрабанде и поставках оружия.\n\nВ 1932 году китайские синдикалисты, социалисты и члены Гоминьдана провели массовые забастовки по всему восточному побережью Китая, надеясь сломить презрённую §PЛигу восьми провинций§!. Хотя эта акция была жестоко подавлена, она вселила в китайцев надежду и веру - возможно, Гоминьдан ещё вернется"

 CHI_country_intro_header_1: "Основные фракции Гоминьдана"
 CHI_country_intro_content_1: "Несмотря на провозглашённое прежде всего "единство" как истинных наследников революции доктора Сунь Ятсена, Гоминьдан с преобладанием левых сил становится всё более фракционной партией. Годы дистанцирования и личного недоверия между членами партии привели к созданию двух значительных фракций внутри партии.\n\nДоминирующей фракцией в Центральном комитете является §RРеорганизованная ассоциация товарищей (РАТ)§!, представляющая собой коалицию §Rрадикальных§! и §Sумеренных§! социалистов, бежавших в Европу вместе с §Rпредседателем Ваном Цзинвэем§!. Изначально тайная организация, имевшая ячейки в китайско-европейской эмигрантской общине, а также в городах-концессиях, РАТ получила своё название от \"Реорганизации\" партии в 1924 году - когда ГМД черпала вдохновение в социалистических революциях, произошедших после Великой войны. Они считают, что партия должна быть очищена и реорганизована, чтобы создать новую революционную НРА, состоящую из рабочих и крестьян, и что Гоминьдан действительно будет авангардом в грядущей материалистической \"классовой борьбе.\" Для этого, по мнению РАТ, революция должна быть обеспечена сверху; образованные и патриотически настроенные кадры должны вести массы к революционному триумфу.\n\nВторой по численности фракцией в Гоминьдане, где доминируют левые, являются те, кто бежал вместе с §SСун Цинлин§! в зону повстанцев Миньганя. Объявив себя §SВременным комитетом действия (ВКД)§!, они заявили, что наилучшим решением бедственного положения Китая будет скорейшее применение прямых действий. ВКД считает, что революция должна начинаться снизу вверх и что \"исключительные\" личности, такие как §Sгенерал Дэн Яньда§!, должны помочь массам достичь революционного сознания - однако это ставит их в противоречие с европейскими репатриантами."

 CHI_country_intro_header_2: "Малые фракции Гоминьдана"
 CHI_country_intro_content_2: "Исключая две основные клики Гоминьдана, в которых доминировали левые, претензии левых на политическую легитимность как истинного Гоминьдана, тем не менее, привели их к включению различных \"незначительных\" фракций и организаций в общий зонтик националистической революции.\n\nСреди китайских изгнанников в Европе небольшая группа недовольных офицеров Военной академии Вампоа была вдохновлена растущими радикальными движениями в Европе - §NНРПР Савинкова§!, §oфранцузским сорельянским движением§! и §oдвижением максимистов Освальда Мосли§! в Британском Союзе. С тех пор как §o\"тотализм\"§! стал популяризироваться среди элементов европейских левых, он завоевал небольшую, но, безусловно, растущую популярность среди молодых §орадикальных военных офицеров§! - которые считают, что демократии нет места в Китае, свободном от империализма.\n\nНе все члены Гоминьдана выбрали изгнание в Европе и Китае, заметное количество центристов и других единомышленников \"либералов" бежало в Юго-Восточную Азию или США (особенно на Гавайи). Номинальным главой этой §l\"Зарубежной китайской комиссии\" (ЗКК)§! является §lСунь Фо§!, сын основателя партии. Тем не менее, по имеющимся сведениям, ЗКК пользуется поддержкой офицеров НРА, направленных в [HND.GetNameDef] для политической и военной подготовки.\n\nВ рамках политики \"Единого фронта\" и в обмен на получение помощи и признания Третьего Интернационала Гоминьдан также вынужден сотрудничать с другими социалистическими группами в Китае, не связанными с ГМД. Эти разрозненные союзы, партии и организации слабо объединены под названием §r\"Союз синдикалистов Китая\"§! и включают в себя советских коммунистов, анархо-синдикалистов, анархистов и других социалистов. Наиболее доминирующей среди них является §r\"Синдикалистская партия Китая"§!"

 CHI.introgame.003.t: "Год крысы"
 CHI.introgame.003.d: "Новый год приходит в Китай, давно ожидающий перемен. Прошло четыре года после неудачного Шанхайского восстания на восточном побережье и почти десять лет после краха Северного похода. Но, подобно зодиаку, те же циклы нищеты и эксплуатации продолжаются. И как крысы, гоминьдановские повстанцы прячутся в подполье, гноясь в своем убожестве.\n\nНо тем не менее они продолжают выживать. Неоднократные "кампании окружения", проводимые Лигой восьми провинций и их немецкими советниками, сводятся к нулю, несмотря на материальное превосходство, из-за повсеместной коррупции, хитрости повстанческих лидеров и упорства партизан. Хотя им не удалось остановить контроль Лиги над крупными населенными пунктами, они препятствовали ее усилиям по установлению контроля над внутренними районами.\n\nПока приближается Новый год (новый год начинается 24 января по традиционному календарю, которым до сих пор пользуются многие простые люди), повстанцам Миньгана практически некуда отступать. При всех неудачах окруженческих кампаний, они в значительной степени изолировали значимое восстание в регионе Фуцзянь-Цзянси, вдали от центров власти. Социалистические ячейки часто остаются разобщенными, и даже в самом сердце Миньгана "контроль народного правительства" часто иллюзорен.\n\nЛидеры Мингана прекрасно знают, что восстания не было бы, если бы не жертвы народа, который часто оказывает большую и малую поддержку, позволяющую Мингану идти вперед. Являясь узловым пунктом социалистического сопротивления, Минган представляет собой центр, спицы которого тянутся вглубь Китая, соединяясь с различными сетями, протянувшимися в такие сочувствующие города, как Гуанчжоу, Шанхай и Сямынь. Но с годами поставки стали более сложными благодаря усилению патрулей Лиги и репрессиям Легации. Планируя следующую операцию по контрабанде оборудования, Миньган обращается к..."
 CHI.introgame.003.a: "Криминальной Лига десяти в Шанхае"
 CHI.introgame.003.b: "Богатым благотворителям из ОКК в Гуанчжоу"
 CHI.introgame.003.c: "Городским синдикалистским ячейкам в Сямэне"

 CHI.introgame.004.t: "Последствия покупки Чжэганской железной дороги"
 CHI.introgame.004.d: "При всех грехах империалистов и концессионеров, лень не входит в их число. Используя дешевую китайскую рабочую силу (и символическое китайское представительство среди инженеров), Aufsichtsrat der Ostasiatischen Generalverwaltung (ОАК) построил большую железную дорогу от Шанхая до Наньчана. ОАК - это продолжение немецкого концессионизма, рука корпоративных конгломератов, рассчитывающих на освоение китайских ресурсов. Их приход в Цзянси (сердце Мингана), многочисленные взятки и наши попытки остановить их привели к отчаянию, так как они отбросили саботаж и коррупцию.\n\nНо во многих отношениях, возможно, та же самая решительная алчность и есть гибель капиталистов. Предав своих местных партнеров и обещания более равноправного будущего, AOG разразилась скандалом, когда неожиданно объявила о своем решении объединить контрольные пакеты акций различных китайских железных дорог в один от имени Schantung-Eisenbahn-Gesellschaft (дочерней компании ОАК)\n\nЭтот шаг, направленный на закрепление немецкого господства и принуждение китайских менеджеров к подчинению немецкому совету директоров, обернулся крахом, вызвав всеобщий гнев по всей Лиге. Железная дорога Чжеган, некогда широко разрекламированный знак прогресса, теперь стала символом продолжающегося унижения китайского народа. Похоже, немцы забыли свою историю - не так давно аналогичный железнодорожный спор в Китае привел к падению империи..."
 CHI.introgame.004.a: "Наша родная страна стонет под тяжестью империализма!"
 CHI.introgame.004.b: "Капитализм должен быть изгнан из нашей страны раз и навсегда!"

 CHI.introgame.005.t: "Надвигающаяся буря"
 CHI.introgame.005.d: "Гоминьдан, некогда находившийся на задворках на фоне наступления Лиги, вдохнул новую жизнь в свои легкие. Пресловутый проект строительства железной дороги Чжеган пробудил десятилетиями копившийся гнев многострадального китайского народа. Волны осуждения, исходящие от обеспокоенной интеллигенции, социалистических фабричных брошюр и националистических изданий всех мастей, похоже, что скандал глубоко задел нервы широких слоев китайского общества.\n\nИскра сопротивления распространилась как лесной пожар. В городах, как в Лиге, так и в других странах, прошли массовые акции протеста и бойкоты против ОАК. На железные дороги совершались нападения и саботаж, а власти Лиги (которые, как говорят, сами в ярости от предательства немцев) не спешили их остановить. Различные чиновники и иностранные граждане, связанные с Чжеганом, подвергались нападениям толпы, а некоторые были убиты в ходе антиконцессионного безумия.\n\nХотя Гоминьдан и другие социалистические повстанцы могут претендовать на некоторые из них, они даже не приближаются к большинству. Похоже, что этот всплеск общественного гнева вызван подлинным низовым, народным возмущением. Партия готова принять в нем участие, даже если у ее руководства остаются сомнения в том, что это будет иметь большое значение. Ожидается, что развертывание партией своих агентов окажет наибольшее влияние на южные районы Лиги, где их влияние остается сильным (хотя и ослабевает). На фоне вспышек насилия в Миньгане возрождается надежда"
 CHI.introgame.005.a: "На полях Цзянси поднимется народ"
 CHI.introgame.005.b: "Призвать к всеобщей забастовке в Фуцзяне!"

 CHI.introgame.006.t: "Резня в Уху"
 CHI.introgame.006.d: "200 убитых. 800 раненых. Новости быстро дошли до Наньчана и Сямэня, распространились по Фуцзяни и Цзянси, прежде чем власти Лиги успели попытаться подвергнуть их цензуре. По мере того как бастующие рабочие собирались на немецких заводах в провинции Аньхой, к их демонстрациям присоединялось все большее число протестующих, которые заполонили улицы. Полиция, усиленная обученными немецкими солдатами, открыла огонь по толпе.\n\nКаждый раз, когда эта история пересказывается от человека к человеку, цифры множатся, а рассказы о том, что немецкие советники намеренно отдавали приказы о расстрелах, также распространяются. В итоге результат один и тот же: протесты становятся все более многочисленными, а кризис практически не ослабевает. То, что начиналось как протест против экономического засилья Германии, переросло в более широкие призывы к социальным изменениям - от отмены монархии до ликвидации концессий, свержения военачальников, объединения страны и конца капитализма.\n\nМногие протестующие кричат, обращаясь ни к кому конкретно, выражая свое недовольство, хотя и не надеются, что в застойном и разделенном Китае удастся многое сделать. Но для Гоминьдана момент настал. Пороховая бочка взведена, и не только для борьбы с концессией. Пропагандистское наступление уже идет полным ходом, выставляя их героями в трудный для Китая час. Но в воздухе витает множество обещаний, и гоминьдановцы вряд ли единственные, кто их дает"
 CHI.introgame.006.a: "Умеренная позиция привлечёт народ"
 CHI.introgame.006.b: "Жёсткая позиция покажет искреннюю самоотдачу"

 CHI.introgame.007.t: "Черный понедельник и красный прилив"
 CHI.introgame.007.d: "Совсем в другом мире последствия экономического краха в Германии (уже прозванного "черным понедельником") быстро докатились до Китая благодаря обширному немецкому экономическому присутствию. Биржевые маклеры и трейдеры с ужасом наблюдали за тем, как Шанхайская фондовая биржа начала закрываться с рекордными показателями, невиданными с тех пор, как Шанхай потрясла финансовая катастрофа 1925 г.\n\nДля многих лидеров Гоминьдана в Париже, особенно таких фигур, как Чэнь Гунбо и Ши Цуньтун, финансовый хаос Черного понедельника - это именно то, что предсказывал Маркс: начало, возможно, нового порядка, свободного от ненасытной жадности капитализма. Ячейки Гоминьдана и ССК кипят активной деятельностью, мобилизуя сочувствующие профсоюзы и другие рабочие организации в крупных городах. Авторитет Лиги восьми провинций стремительно ослабевает, примером чему служит разрыв Аньцина с Нанкином. Недавний морской мятеж в Фуцзяни также вызвал интерес в Париже, а Ван Цзинвэй приказал наращивать ресурсы в Индии.\n\nСпрятавшись в холмах и лесах повстанческой зоны Минган, Сун Цинлин и ее правительство добились значительной независимости от Центрального комитета в Париже. Связь между двумя гоминьдановскими правительствами ограничена, и большинство повседневных операций повстанцев осуществляется под руководством лейтенантов Сун Цинлин. Среди ее наиболее доверенных военачальников - генералы Ли Цзишэнь и Дэн Яньда, которые считают, что кошмару власти Чжили над Восточным Китаем наконец-то пришел конец.\n\nПолагая, что время пришло, Дэн выступает за быстрое наступление, выставляя хорошо подготовленные и надежные колонны ополченцев для нанесения хирургического удара с минимальной задержкой. Ли Цзишэнь и другие, однако, выступают за то, чтобы потратить некоторое время на координацию действий с группами, более лояльными Парижу, а также на объединение ранее разочарованных или спящих ячеек. Время не терпит отлагательств, хотя наиболее подходящий момент неясен. Руководство Миньгана взвешивает свои возможности..."
 CHI.introgame.007.a: "Потратьте время на консолидацию наших сил"
 CHI.introgame.007.b: "Наконец-то оно наступило!"

 CHI.introgame.008.t: "Улыбающийся тигр повержен"
 CHI.introgame.008.d: "Нет ничего более благородного и патриотичного, чем поступок Ши Цзяньцяо, отомстившей за смерть своего отца Ши Кунбина. Замаскировавшись под служанку, юная Ши Цзяньцяо тремя пулями из пистолета Браунинг застрелила подлого милитариста со спины. О ее судьбе после ареста телохранителями Суня ничего не известно, но бывший лидер Лиги лежит в коме, и становится ясно, что хрупкое единство Лиги восьми провинций окончательно распадается. Срочные сообщения из Миньгана долетают до Шанхая, а затем и до Парижа: восстание началось.\n\nПосле задержки связи ждать ответа осталось недолго. Обсуждается вопрос о том, стоит ли отправлять всех людей на передовую в предстоящем сражении или оставить часть в резерве. Хотя партизаны доказали свою эффективность в нарушении контроля Лиги над Минганом, они не всегда были особенно эффективны в полевых условиях, особенно в обычных сражениях. Планировщики утверждают, что если оставить часть отрядов в качестве летучих колонн, то это позволит обеспечить гибкость логистики и подкрепления по ходу кампании.\n\n Другие же предупреждают, что эта кампания - "сделай или умри", и, скорее всего, это последний шанс для социализма укорениться в Китае. Сдерживание части войск побудит все разрозненные ячейки отступить, чтобы занять воображаемую запасную позицию, которая вряд ли будет существовать в случае провала операции. От этого судьбоносного выбора может зависеть, удастся ли наконец реализовать задуманное доктором Суном"
 CHI.introgame.008.a: "Нам нужны все руки для борьбы"
 CHI.introgame.008.b: "Нам нужен мобильный резерв"

 CHI.introgame.009.t: "$comfrance.999.t$"
 CHI.introgame.009.d: "$comfrance.999.intro$\n\nДля нас, особенно для нас, это подходящее время. Революция уже началась, и сотрясения, вызванные крахом капитализма, откроют путь к нашей победе. Уже сейчас империалисты в Шанхае и Тяньцзине дрожат от страха, а их лакеи-военачальники сталкиваются с пробуждающимся гневом крестьян и рабочих Китая. Нельзя терять времени! Сегодняшний день знаменует собой начало освобождения китайских масс, которое, когда оно завершится, станет переломным моментом для грядущей мировой революции"
 CHI.introgame.009.a: "$comfrance.999.a$"

#Early Game Events Triggered By Time (000-099)
 CHI.earlygame.000.t: "Миньганское повстанческое движение"
 CHI.earlygame.000.d: "Покойный лидер доктор Сунь Ятсен никогда не сдавался после всех этих лет, будучи изгнанным в ссылку большее количество раз, чем он мог сосчитать. Он нес в себе неугасимую страсть и любовь к своей стране, и его мечты о национальной революции дошли до нас. И действительно, именно с таким пылом мы начали Северный поход, и только благодаря вмешательству германских империалистов этим мечтам был положен конец.\n\nПодобно великому учителю, мы тоже никогда не сдавались. В течение многих лет мы бьёмся, возрождая революционный дух, яростно пылавший в 1924 году, и готовясь к дню освобождения. Сейчас, когда капиталистический строй Германии рушится, а власть Чжили погрузилась в хаос, настал удобный момент для удара. Наша цель - полное объединение восточного побережья Китая под революционной властью. Только тогда можно осуществить мечты о Втором Северном походе и национальном объединении.\n\nЭто будет нелегко. Но, как напоминают многим нашим дорогим ветеранам слова на воротах Вампоа, "если боишься смерти, уходи немедленно." Отбросьте смерть и сомнения и посвятите себя делу национального спасения.\n\n§oВ связи с ошибкой пользовательского интерфейса ваниллы, кнопки назначения дивизий в армиях изначально будут недоступны. Чтобы исправить это, обновите карту, нажав F2 (режим военно-морской стратегии), а затем F1 (режим карты по умолчанию)§!"
 CHI.earlygame.000.a: "Фу чжан!"

 CHI.earlygame.001.t: "Урожай 1936 года"
 CHI.earlygame.001.d: "До начала Национальной революции солдаты, проживавшие в повстанческой зоне Цзянси-Фуцзянь, помогали местным крестьянам в осеннем сборе урожая риса. Помимо практической функции (уменьшение бремени повстанцев в районах, контролируемых Гоминьданом), это выполняло и идеологическую функцию - подчеркивало общность связей между партией и крестьянством.\n\nНо теперь, когда Национально-революционная армия мобилизована для ведения обычной борьбы, в сердце революции меньше, чем обычно, людей, способных помочь в сельском хозяйстве. Необходимо принять непростое решение о том, как наилучшим образом удовлетворить нужды деревни"
 CHI.earlygame.001.a: "Им придется привыкнуть к этим изменениям ради общего блага"
 CHI.earlygame.001.b: "Направить новобранцев на моральную подготовку в поле"

 CHI.earlygame.003.t: "Шпионы и секреты в войне за Лигу"
 CHI.earlygame.003.d: "После катастрофы Северного похода многие разочарованные выпускники Вампоа разбежались - вернулись в свои деревни, стали искать работу в армиях военачальников или даже нашли другие... менее приятные источники занятости. Лишь немногие остались верны своему делу в Миньгане, и еще меньше тех, кто не искал других способов увеличить свой доход. В дни восстания границы между революционерами и преступниками часто стираются.\n\n "Лига десяти" - небольшая, но растущая банда гангстеров, состоящая из бывших студентов Вампоа, отколовшаяся от шанхайской "Зеленой банды" Во главе с Дай Чуньфэном, как и многие китайские банды этой эпохи, они отличаются братством, национализмом и скрытностью. Однако, в отличие от других, они сохраняют некоторую приверженность делу Гоминьдана, часто являясь важнейшей тайной сетью для поддержания связи нашего Мингана с внешним миром.\n\nЭто не означает, что нас не обманывали раньше, или что Лига не может играть на обеих сторонах. Тем не менее, похоже, что Дай добился определенного авторитета после падения власти Сунь Чуаньфана - теневые агенты начали передавать подробную (хотя иногда и преувеличенную или устаревшую) информацию из Нанкина на наши линии."
 CHI.earlygame.003.a: "Интересно послушать"
 CHI.earlygame.003.b: "Выбросьте отчет в мусорную корзину"

 CHI.earlygame.005.t: "Друзья по ту сторону"
 CHI.earlygame.005.d: "Много лет назад недалеко от храма Линьинь в окрестностях Ханчжоу на берегу Западного озера купался нагишом молодой человек. Стайка школьников бросилась к нему, чтобы забрать сброшенную одежду, но их остановил учитель, заметивший, что на купальщике нет плавок. Купальщик поблагодарил учителя, и оба мужчины охотно подружились - оба выросли в Чжэцзяне, получили образование педагогов и, прежде всего, разделяли стремление добиться большего в жизни.\n\n Такова причудливая история, которую рассказывает Дай Чуньфэн, о том, как его спас от позора Ху Цзуннань. Хотя после этого каждый из них пошел своей дорогой, они случайно нашли друг друга через несколько лет в Вампоа, как протеже другого уроженца Чжэцзяна: Чан Кайши. Ху окончил университет, Дай так и не завершил обучение, и оба расстались после 1927 г., чтобы вновь встретиться после распада Лиги.\n\n Время забрало у обоих мужчин почти год разлуки. Ни один из них не считает, что получил заслуженное уважение после войны с Лигой. Особенно Дай взбешен тем, что, несмотря на его опасную разведывательную работу до и во время войны, никто не хочет с ним сотрудничать за исключением, похоже, генерала Ху Цзуннаня. Будучи директором учебного отдела, Ху сумел задним числом добиться для Дая диплома Вампоа и официального членства в Гоминьдане. Амбициозный генерал принял Дая в свой личный штат, предоставив ему убежище от репрессий за работу с Ци Сюэюанем. Эти два человека поклялись стать братьями по крови, вынашивая закулисные планы на будущее"
 CHI.earlygame.005.a: "Теневой договор"

#Ранние игровые события, запускаемые фокусом (100-199)
 CHI.earlygame.100.t: "Революционные времена, революционные женщины"
 CHI.earlygame.100.d: "Роль китайской женщины в национальной революции долгое время была предметом дискуссий в руководстве Гоминьдана, даже с самых первых дней существования партии. Несмотря на сопротивление консервативных элементов, некоторые женщины были зачислены в классы Вампоа и даже сформировали отряд "Смело на смерть" во время Северного похода. Аналогичным образом был создан Женский институт политического обучения, официально возглавляемый Сун Цинлин, призванный содействовать участию женщин в становлении будущей китайской демократии.\n\nВ результате драматических событий Национально-революционная армия официально организовала новый Красный отряд женщин, одно из первых крупных подразделений такого типа. Являясь детищем различных военачальников и феминистских деятелей, он, в отличие от аналогичных проектов, выполняет исключительно пропагандистскую роль и, как ожидается, примет участие в реальных боевых действиях. Менее известна, но также жизненно важна для революции неустанная работа других женщин, выполняющих различные функции как гражданских, так и военных в революционном аппарате"
 CHI.earlygame.100.a: "Наша революция несет социальное освобождение!"
 CHI.earlygame.100.b: "Настоящее освобождение требует крови и стали!"

 CHI.earlygame.101.t: "Амбивалентность Гавайев"
 CHI.earlygame.101.d: "За морем, в Гонолулу, находится, пожалуй, самая несговорчивая фракция, все еще верная центральному комитету Вана. Возглавляемая Сунь Фо, эта фракция гоминьдановских "либералов" остается в стороне, отказываясь принимать непосредственное участие в нынешнем восстании и лишь едва признавая лидерство Вана. Отношения между основными левыми фракциями и так называемой Гавайской кликой давно охладели, поскольку "Революционный критик" давно обменивается колкостями с гавайской "Реконструкцией" в язвительных статьях.\n\nНесмотря на взаимную неприязнь, Ван Цзинвэй взял на себя инициативу попытаться преодолеть разногласия. Несмотря на престижное имя Сунь, контроль над Комиссией по делам зарубежных китайцев (КЗК) дает Гавайям обширные контакты с китайской диаспорой в Юго-Восточной Азии. Кроме того, их либеральное, умеренное лицо дает им свободный доступ к богатым, националистически настроенным бизнесменам и интеллектуалам в прибрежных городах Китая. Однако следует задаться вопросом, насколько стоит уступать, чтобы протянуть оливковую ветвь без ущерба для наших революционных идеалов"
 CHI.earlygame.101.a: "Мы берем то, что можем получить"
 CHI.earlygame.101.b: "Конечно, мы можем больше!"

 CHI.earlygame.102.t: "Гоминьдан просит помощи!"
 CHI.earlygame.102.d: "С тех пор как Национально-революционная армия потерпела крах от рук поддерживаемой империалистами клики Чжили, мы, безусловно, с интересом рассматриваем возможность революции в Китае. Китай, хотя и не является ни капиталистической, ни индустриальной страной, обладает потенциалом для антиимпериалистической и социалистической революции, о чем свидетельствует роль китайского массового движения в Северном походе.\n\nЕсли китайские социалисты и Гоминьдан пытались организовать смелое, но неудачное восстание в 1932 году, то после краха капиталистического мирового порядка после Черного понедельника, похоже, китайский Гоминьдан и НРА вновь поднялись, чтобы разорвать свои цепи. Мы получили срочное коммюнике от наших китайских связей, таких как председатель Ван Цзинвэй и посол Юджин Чен, с просьбой к нашей стране направить военное оружие и советников, чтобы помочь Гоминьдану в его возобновленной революционной борьбе. Мы, конечно, можем поддержать их, но, учитывая дальность конфликта и ограниченность наших ресурсов, мы можем послать им либо только советников, либо и советников, и винтовки. С другой стороны, некоторые члены нашего правительства утверждают, что вместо этого мы должны послать им только наши мысли и молитвы"
 CHI.earlygame.102.a: "Мы пришлем им советников и оружие!"
 CHI.earlygame.102.b: "Мы пошлем им только советников"
 CHI.earlygame.102.c: "Мы ничего не будем им посылать"

 CHI.earlygame.103.t: "Государство [From.GetNameDefCap] отправляет советников и оборудование"
 CHI.earlygame.103.d: "Наши крики о помощи не остались без ответа: государство [FROM.GetNameDefCap] заявило, что пришлет военных советников, а также свое современное оружие, чтобы помочь нам в нашей революционной борьбе. Благодаря этой милости мы, несомненно, сможем добиться победы в продолжающейся войне Лиги и раз и навсегда освободить Янцзы от империалистов"
 CHI.earlygame.103.a: "Мы благодарим наших европейских товарищей!"

 CHI.earlygame.104.t: "Государство [From.GetNameDefCap] отправляет советников"
 CHI.earlygame.104.d: "Наши крики о помощи не остались без ответа: государство [FROM.GetNameDefCap] заявило, что пришлет военных советников для помощи нам в нашей революционной борьбе. Хотя мы, конечно, огорчены тем, что не получим винтовок и боеприпасов, мы, безусловно, признательны им за помощь в обучении наших солдат. Благодаря этой милости мы, несомненно, сможем добиться победы в продолжающейся войне Лиги и раз и навсегда освободить Янцзы от империалистов"
 CHI.earlygame.104.a: "Мы благодарим наших европейских товарищей!"

 CHI.earlygame.105.t: "Государство [From.GetNameDefCap] осталось в стороне"
 CHI.earlygame.105.d: "Наши крики о помощи, к сожалению, остались без ответа, поскольку государство [FROM.GetNameDefCap] заявило, что будет нейтрально наблюдать за продолжающимся конфликтом в Китае. В связи с этим оно отказались прислать нам военных советников и оружие, сославшись на свои собственные потребности в подготовке к нарастающему конфликту в Европе. Нам придется обходиться без их помощи"
 CHI.earlygame.105.a: "Трагично, но объяснимо"
 CHI.earlygame.105.b: "Мы сами освободим Китай!"

 CHI.earlygame.106.t: "Крах НРА"
 CHI.earlygame.106.d: "В течение многих лет НРА вела войну сопротивления против коррумпированных капиталистических империалистов из Лиги восьми провинций после провала Северного похода. Хотя в 1932 г. НРА подняла второе неудачное восстание, для многих - новая возможность появилась с крахом Лиги во время наступления Черного понедельника в Китае.\n\nНесмотря на доблестные попытки НРА победить своих врагов в хаотичной войне Лиги, похоже, что сила и моральный дух Национально-революционной армии были фактически раздавлены на поле боя. Поскольку с каждым днем все большее число бойцов покидает поле боя, председатель [CHI.GetLeader] должен срочно предпринять реорганизацию своих сил для последней попытки, чтобы Гоминьдан не оказался навсегда разгромленным."
 CHI.earlygame.106.a: "Ситуация скверная!"

#Ранние игровые события, запускаемые On-Actions (200-299)
 CHI.earlygame.200.t: "Возвращение ЦК"
 CHI.earlygame.200.d: "После долгого и напряженного плавания флотилия кораблей Интернационала наконец-то прибыла в Китай. В ходе смелой операции, используя смесь ухищрений и продуманного планирования, они успешно избежали перехвата вражескими кораблями, отчасти благодаря продолжающимся последствиям мятежа в Мавэе и недавнему дезертирству критически настроенных фуцзяньских военных во главе с Чэнь Шаокуанем и Чэнь Цзиляном.\n\nПосле изгнания в 1927 году Центральный комитет наконец-то смог вновь ступить на китайскую землю. В связи с продолжающимися боями в районе недавно захваченного порта Сямэнь Ван Цзинвэй выступил с кратким и не слишком помпезным заявлением, хотя настроение на церемонии было очень возбужденным. Он и другие члены парижского комитета быстро встретились с лидерами Миньгана, чтобы создать рабочее правительство, и, несмотря на сохраняющиеся разногласия, были на удивление дружелюбны друг с другом.\n\n Также высадилось и подразделение китайских войск, прошедших европейскую подготовку, с внушительным количеством успешно перевезенной артиллерии. Во главе с заместителем директора школы Чжан Чжичжуном, директором политического департамента Чжоу Эньлаем и директором учебного департамента Ху Цзуннанем они проходят обучение за границей в изгнании. Последний офицер - адмирал Ли Чжилун, получивший высокую оценку за умелое руководство флотом на протяжении всей операции"
 CHI.earlygame.200.a: "С возвращением, председатель Ван!"

 CHI.earlygame.201.t: "Происшествия в Вэньчжоу"
 CHI.earlygame.201.d: "Планы оккупации Вэньчжоу и других портов ОАК были крайне неудачными по сравнению с тщательно проработанными шагами и линиями продвижения вокруг Сямыня. Когда войска НРА заняли город Вэньчжоу, по всему городу начались стихийные антииностранные беспорядки, приведшие к убийствам многочисленных немецких жителей и разграблению большей части центральных районов города. В разграблении участвовали и небольшие передовые отряды националистических войск, пока в город не прибыли более дисциплинированные части. В настоящее время Вэньчжоу значительно пострадал от гражданских беспорядков"
 CHI.earlygame.201.a: "Еще одна неразбериха, которую нам предстоит разгребать"

 CHI.earlygame.202.t: "Трагедия в Наньтуне"
 CHI.earlygame.202.d: "Порт Наньтун был передан Лигой восьми провинций в аренду ОАК, и его положение в устье Янцзы позволяло ему выступать в качестве эксклюзивной для Германии альтернативы международному городу Шанхай. Продвижение НРА к договорному порту вызвало массовую панику и волнения среди его жителей. Массовые грабежи со стороны китайского населения в сочетании с тактикой "выжженной земли" со стороны немецких сил безопасности привели к тому, что небо над Наньтуном загорелось, а возникшие пожары уничтожили многие текстильные фабрики. Паромы, направлявшиеся на юг, к Шанхаю, были переполнены и не приспособлены для поездок за пределы Янцзы, в результате чего несколько судов опрокинулись, а число погибших исчислялось сотнями. Прежде чем НРА смогло что-либо предпринять для контроля ситуации, стало ясно, что Наньтун - это зона бедствия. Наньтун, который долгое время считался примером модернизации китайских городов, был фактически разграблен"
 CHI.earlygame.202.a: "Большая потеря для страны"

 CHI.earlygame.203.t: "Фуцзяньцы в Ханчжоу"
 CHI.earlygame.203.d: "Большинство первых частей Национально-революционной армии были сформированы в провинции Фуцзянь из местных крестьян и редких городских жителей, и мало кто из этих регулярных войск знаком со стандартным мандаринским диалектом, если вообще знаком. Вчера группа фуцзяньских солдат, находившихся в отпуске в Ханчжоу, устроила скандал, когда языковые трудности и пьянство привели к драке с местными жителями. Несмотря на то, что Китай рассматривается как единая нация, языковые трудности и резкий контраст между сельским и городским образом жизни сделают размещение большинства подразделений за пределами их родных мест затруднительным"
 CHI.earlygame.203.a: "Это неизбежная проблема национального объединения"

 CHI.earlygame.204.t: "Новый рассвет в Нанкине"
 CHI.earlygame.204.d: "Нанкин освобожден. Ушли в небытие милитаристы Сунь Чуаньфань и Ци Сеюань, тираны, обкрадывавшие народ и продававшие город империалистам. Наконец-то над городом парит Белое солнце - мечта Северного похода почти десятилетней давности. В сегодняшней речи после взятия города на торжественной церемонии чествовали покойного основателя партии и всех павших за эти годы революционных мучеников.\n\nВ практическом плане ясно, что гоминьдановцы намерены превратить Нанкин в свою временную столицу на время национальной революции. Уже сейчас бывший дворец генерал-губернатора (и то самое здание, где в 1911 г. доктор Сунь принес присягу в качестве временного президента) превращен во временный президентский дворец.\n\nСоздается также временный Исполнительный Юань, подчиненный Центральному исполнительному комитету, с Ван Цзинвэем в качестве председателя Национального правительства. Ляо Чжункай был назначен премьером Исполнительного юаня - новой должности главы гоминьдановского правительства. Похоже, что гоминьдановцы начали первые шаги по управлению организованным государством"
 CHI.earlygame.204.a: "Восстала новая республика!"

 CHI.earlygame.205.t: "Шаньдунская угроза"
 CHI.earlygame.205.d: "Продвижение гоминьдановцев на север до сих пор было очень успешным, они захватывали важные города в восточных провинциях. Тем временем, [SQI.getLeader] и его войска продвигаются на юг. В разных местах уже происходят стычки между нашими силами. Однако серьезных атак, которые могли бы спровоцировать одну из сторон на начало боевых действий по всему фронту, пока не было. Однако обе стороны знают, что война между двумя группировками неизбежна, поскольку обе стороны опасаются растущей угрозы с их стороны.\n\n[SQI.getName] находится под управлением человека по имени [SQI.getLeader] и базируется в Шаньдуне, провинции, известной своими запасами угля. Несмотря на потенциал к процветанию, в провинции царят коррупция и нестабильность. Тем не менее, война против государства [SQI.getName] в данный момент может оказаться губительной для Гоминьдана. Их силы сосредоточены на уничтожении оставшихся врагов, а война с новым врагом может растянуть их силы, и противник будет подбирать их по мелочам. Теперь руководство Гоминьдана должно сделать выбор: атаковать Шаньдун сейчас или подождать, пока наши силы не будут в полном порядке, чтобы продолжить свой марш на север."
 CHI.earlygame.205.a: "Мы подготовим ответ..."
 CHI.earlygame.205.b: "Мы идем на Цзинань"
 
 CHI.earlygame.300.t: "Изгнанники из Гоминьдана прибывают в Шэньси"
 CHI.earlygame.300.d: "В течение последних четырёх лет силы Гоминьдана под командованием реорганизованной Национально-революционной армии вели жестокую партизанскую войну против Лиги восьми провинций в повстанческой зоне Миньгань между регионами Фуцзянь и Цзянси. Несмотря на мужественное восстание, последовавшее за новым годом, складывается впечатление, что Гоминьдан снова оказался в бегах и что вторая НРА не смогла выполнить миссию, поставленную её предшественниками.\n\nВ то время как по всей стране политики и офицеры Гоминьдана бегут за границу, что стало вторым по величине изгнанием после провала Северного похода, остатки повстанческой зоны, в том числе несколько хорошо подготовленных офицеров, таких как Линь Бяо и Сюй Сянцянь, сумели пересечь страну и добраться до границы провинции Шэньси в поисках убежища и присягнули на верность местным армиям. Они также присоединились к политикам и интеллектуалам РАТ, которые давно имели связи с революционными кадрами Шаньси и, без сомнения, будут стремиться продолжить наследие доктора Суня в их новой малой родине. Хотя присоединение этих доблестных солдат к нашим силам могло бы пополнить наши ряды опытными офицерами-ветеранами, существует также опасение, что эти изгнанники из Гоминьдана могут нести радикальные учения, и, возможно, было бы целесообразно обеспечить безопасность наших границ и нашего народа от радикализма."
 CHI.earlygame.300.a: "Наши революционные товарищи!"
 CHI.earlygame.300.b: "Отошлите их подальше отсюда."

 CHI.earlygame.301.t: "Влияние РАТ в провинции растёт"
 CHI.earlygame.301.d: "Похоже, что даже повторной неудачи в войне Лиги было недостаточно, чтобы разрушить мечту Гоминьдана. После распада второй НРА среди тех, кто пережил их хаотическое отступление и добрался до провинции Шаньси, было несколько политиков и политических деятелей РАТ. Однако с тех пор, как они вошли в пределы провинции, они начали заявлять о своем присутствии благодаря уже существовавшим связям в политическом подполье, симпатизирующим РАТ.\n\nС момента прибытия эмигрантов в Тайюань в периодических изданиях появилось всё больше газет и таблоидов, таких как "Миньцзу жибао", авторы статей, как утверждается, анонимны, но, тем не менее, содержат тексты, в значительной степени симпатизирующие движению Гоминьдана. Поступает всё больше сообщений о том, что ячейки РАТ и партийные отделения возникли в таких городах, как Сиань, Яньань и Тайюань, и всё большее число социалистов заявляют о том, что они следуют платформе Чэня Гунбо по реорганизации партии Гоминьдана. В Тайюане деятельностью Гоминьдана руководит недавно созданный "Объединённый офис провинциальных, муниципальных и зарубежных партийных отделений Гоминьдана". Даже из таких отдалённых мест, как Ганьсу и Суйюань, поступают сообщения о партийных ячейках Гоминьдана, отчаянно ожидающих последнего шанса проявить себя в политике."
 CHI.earlygame.301.a: "Дело доктора Суня продолжает жить..."

###- События в середине игры -###
 CHI.midgame.000.t: "Победа в Войне Лиги"
 CHI.midgame.000.d: "Для многих сторонних наблюдателей бурной политической ситуации в Китае после Синьхайской революции 1911 г. стремление Националистической партии Китая к национальному объединению было окончательно подорвано неудачей Северного похода. Движение Гоминьдана, распавшееся на конкурирующие фракции, казалось, было обречено на провал.\n\nПосле краха власти Чжили в Лиге восьми провинций, последовавшего за Черным понедельником, кажется, что Гоминьдан преодолел эти трудности и вновь стал активной политической силой. Многолетнее ожидание в Европе и повстанческой зоне Миньгана принесло свои плоды: партизаны и ополченцы возрождающейся Национально-революционной армии одерживают одну победу за другой над своими противниками. С завершением конфликта в Восточном Китае наступило время восстановления провинций и залечивания шрамов войны. Наблюдателям из Интернационала кажется, что их спонсорская поддержка Гоминьдана наконец-то принесла свои плоды, поскольку раздаются призывы вновь сплотить гоминьдановское движение, чтобы объединить и спасти Китай от раздоров."
 CHI.midgame.000.a: "Второй шанс для национальной революции"

###Секция 2a (000-199): Политическое содержание

#Цепь мероприятий 1-го Конгресса
 CHI.midgame.001.t: "Открытие Первого репатриантского съезда Гоминьдана"
 CHI.midgame.001.d: "Вытесненный из политической жизни Китая более чем на десять лет, Гоминьдан в результате недавней победы над своими противниками в войне Лиги вновь возродил идею Сунь Ятсена о национальной революции. Временный президентский дворец, некогда бывший резиденцией императоров династии Мин (в нем находилась резиденция самодержавного Сунь Чуаньфана, правившего Восемью Провинциями), теперь переоборудован в штаб-квартиру Национально-революционного правительства. Весть о Первом съезде репатриантов Гоминьдана начинает распространяться по всему Китаю, объединяя революционеров-единомышленников в стремлении осуществить мечту Северного похода и создать современную и справедливую Китайскую Республику.\n\nНа съезде также будет присутствовать делегация Третьего Интернационала. Центральный комитет, давно обещавший поддержку Гоминьдану, начиная с момента реорганизации партии в 1924 г., долгое время находился в изгнании в Париже и своими выдающимися успехами был обязан поддержке двух крупнейших синдикалистских государств Европы. Сердечное окружение включает французских советников-синдикалистов Андре Мальро и Жана Фонтенуа, британского советника Дэвида Рамсея, индийского социалиста М.Н. Роя, норвежского синдикалиста Ингвальда Берентина Аасе, а также различных добровольных советников из числа прежде всего французских и британских военных, которые обязались оказывать свои услуги по созданию Национально-революционной армии. Тем не менее, иностранные наблюдатели, безусловно, видели, что в рядах съезда начинают формироваться заметные "фракции" или "клики" - те, кто боролся за популистское правительство Сун Цинлина, и те, кто вернулся домой из синдикалистского нового порядка.\n\n Председатель Ван Цзинвэй стоял за грандиозным портретом Сунь Ятсена в окружении флага партии и флага НРА, когда он начал свою речь об открытии съезда. Возможно, признавая отсутствие правого крыла партии, он начал свою речь со страстного призыва к тому, что с революционной антиимпериалистической точки зрения настоящие революционеры должны прийти из левого крыла Гоминьдана. Таким образом, Первый съезд репатриантов начал свою работу всерьез - восторженное революционное настроение Нанкина напомнило многим о том же патриотическом запале, который захватил Гуанчжоу в 1924 году."
 CHI.midgame.001.a: "Давайте начнем прямо сейчас!"

 CHI.midgame.002.t: "Определение классовой базы партии"
 CHI.midgame.002.d: "Первый постулат съезда заключался в том, что гоминьдан считает своим долгом поднять угнетенных рабочих и крестьян Китая. В духе первой реорганизации Гоминьдан должен был пробудить массы и объединить крестьян, рабочих, купцов и студентов для победы над их общими врагами - империалистами и милитаристами.\n\nВ консервативных элементах, особенно среди старейшин партии, Гоминьдан должен представлять "весь народ" во время национальной революции, а старейшина У Чжихуэй даже утверждал, что хорошие помещики и купцы могут присоединиться к революции вместе с массами. После выступления Ванга члены РАТ Чэнь Гунбо и Ши Цуньтун выступили с трибуны, утверждая, что классовый вопрос является "самым важным вопросом революции", и что классовая борьба - это необходимое развитие китайской революции. Ссылаясь на усилия крестьян Сун Цинлин в ходе восстания Миньгана и забастовок 1932 г., Ши и Чэнь обвинили У в том, что он ссылается на высказывание Суна, в котором основатель партии говорит, что национальная революция должна привести к социализму.\n\nХотя и популисты Суна, и растущая фракция РАТ Вана определили классовую основу Гоминьдана: отныне он действительно должен стать партией рабочих и крестьян, иностранные наблюдатели, конечно, заметили, что под фасадом партийного единства нарастают фракционные противоречия. В конце концов, РАТ считает, что революционные кадры должны вести за собой массы, что вызывает обиду у многих членов Временного комитета действий Сун Цинлина - они не видят революции масс под руководством претенциозной элиты"
 CHI.midgame.002.a: "Гоминьдан - партия рабочих и крестьян!"

 CHI.midgame.003.t: "Возвращение фракции реконструкции"
 CHI.midgame.003.d: "Репутация Центрального исполнительного комитета Гоминьдана с преобладанием левых сил как "законника" и "наследника" китайской националистической партии, потерпевшей крах в ходе Первого Северного похода, тем не менее, вызывает интерес у различных центристов и либералов. Эти люди, которые до провала экспедиции колебались между правым и левым крылом Гоминьдана, с недоверием относятся к внешне социалистическому развитию партии в последнее десятилетие.\n\nМногие из этих республиканцев предпочли бежать за границу, в США, на Гавайи и в Юго-Восточную Азию, где они составили Зарубежную комиссию Гоминьдана, расширявшую его интересы вдали от самого Китая. Во главе с Сунь Фо, сыном основателя партии, эти центристы были приглашены к участию в Первом съезде репатриантов, а Сунь Фо было любезно предложено место в Центральном исполнительном комитете.\n\nК ним также присоединились военные, служившие в Индии во время изгнания Гоминьдана, генералы Сюэ Юэ и Чжан Факуй, которые заявили о своей аполитичности, хотя они, конечно, рассматривали синдикалистов как постоянную потенциальную угрозу. Таким образом, сочетание этой индийской клики и бывшей комиссии по делам заморских китайцев привело к образованию так называемой "Фракции реконструкции", которая, по словам самого Сунь Фо, призвана восстановить или реконструировать партию Гоминьдан, не прибегая к радикальным методам реорганизации."
 CHI.midgame.003.a: "Интересно..."

 CHI.midgame.004.t: "Напряженность в Союзе синдикалистов Китая"
 CHI.midgame.004.d: "Провозглашение нового революционного и социалистического правительства Китая вызвало рост воодушевления и патриотизма среди китайских левых. Конгломерат социалистических мыслителей, интеллектуалов и писателей, не являющихся членами партии Гоминьдан, образовал хрупкую коалицию под именем Союза синдикалистов Китая (ССК), крупнейшей фракцией которой является Синдикалистская партия Китая.\n\n Между ССК, тем не менее, стали возникать противоречия. Идеологически не все социалисты в ССК придерживаются мнения относительно капитализма в Китае. Молодое поколение радикальных социалистов, называемое "Радикальной фракцией" ССК, заявило, что китайское общество уже находится в капиталистическом способе производства и что и крестьяне, и рабочие скованы системой капитализма, которая должна быть уничтожена революцией. Более старые консервативные члены ССК, такие как Дун Биву и Линь Боцюй, возглавляющие "ортодоксальную фракцию", выступают за сотрудничество с Гоминьданом, и многие из них придерживаются мнения, что Китай все еще остается полуфеодальным государством.\n\nОтдельно от радикального и ортодоксального крыла СПК стоит "Всемирное общество", поколение старых и идеалистичных анархистов, верящих в прудоновские идеалы классового примирения и всеобщей гармонии. Представленные такими старейшинами партии, как Ли Шицзэн, У Чжихуэй, Чжан Жэньцзе и Цай Юаньпэй, они абсолютно не приемлют и боятся классового конфликта, разжигаемого радикальными членами РАТ или членами ССК"
 CHI.midgame.004.a: "Под социалистическим флагом мы освободим Китай!"

 CHI.midgame.005.t: "Вопрос об этнической автономии"
 CHI.midgame.005.d: "Этнические отношения в Китае не всегда были мирными. Но именно великий доктор Сунь Ятсен пришел к выводу, что понятие "Минцзы" из "Трех принципов народа" необходимо для того, чтобы предотвратить падение нации в беспорядок и хаос. Интересно отметить, что в своих ранних высказываниях он, казалось бы, поддерживал идею о доминировании этноса хань. Но, как видно из его заявления на реорганизации Гоминьдана в 1924 г., Сунь провозгласил, что антиимпериалистическая миссия Гоминьдана включает также обеспечение самоопределения для всех "внутренних минцзы." Однако само понятие "минцзы" является спорным, поскольку Сунь считал великие расы цинского Китая (помимо ханьского большинства) - тибетцев, монголов, маньчжуров и хуэй - лишь реликтами древней социальной структуры.\n\n Позиция покойного премьера заключалась в том, что все минцзы Китая подчиняются этнически доминирующему "ханьцзы" (ханьскому этносу). Поэтому удел более культурных и утонченных ханьцев - вести минцзы к эволюционному формированию единого ханьского чжунхуа-минцзы. В Национальной революции все понятия о самоопределении должны были быть отменены до тех пор, пока не пройдет период опеки, поскольку минцзы просто неспособны управлять страной самостоятельно.\n\n Конгресс репатриантов, в частности фракция Ван Цзинвэя, в основном поддерживает принципы Сунь. Тем не менее, Временный комитет действий открыто заявлял, что будет рад пообещать меньшинствам определенную автономию, если они, конечно, поддержат Гоминьдан. Была создана Комиссия по делам Монголии и Тибета, официальной доктриной которой является подготовка этих народов к восприятию революционного духа превосходящего ханьцзу Гоминьдана. Но до тех пор, пока военачальники и империалисты не будут окончательно разгромлены, на вопрос об этнических меньшинствах будет бесспорно отвечать только гоминьдан"
 CHI.midgame.005.a: "Мы подумаем над этим"

 CHI.midgame.006.t: "Закрытие конгресса"
 CHI.midgame.006.d: "После нескольких недель долгих обсуждений Первый репатриантский съезд Гоминьдана официально объявил о своем закрытии. Несмотря на то, что многое было решено, многое осталось нерешенным, и между сторонниками Вана и его разделенной оппозицией начали образовываться тонкие трещины. А пока делегаты и представители готовятся к отъезду домой, они решили поручить управление партийными делами третьему, последнему по счету Центральному исполнительному комитету.\n\nВо главе с председателем Ван Цзинвэем и заместителем председателя Ляо Чжункаем к ним присоединились еще двадцать два человека: Бай Юньти, Чэнь Гунбо, Чэнь Юрен, Дэн Яньда, Дун Биву, Гу Мэнъюй, Ли Цзишэнь, Линь Боцюй, Лян Ханьцао, Пань Юньчао, Пэн Цзэминь, Ши Куньтун, Сун Цинлин, Сун Цзывэнь, Сунь Фо, Ван Фацинь, У Чаошу, Сюй Дэхэн, Чжан Боцзюнь, Чжан Юньчуань, Цзэн Син и Чжу Цзицин.\n\nДисциплинарные полномочия и контроль над финансовыми делами возложены на Центральный контрольный комитет, в состав которого входят известные представители Гоминьдана Цай Юаньпэй, Ли Шицзэн, У Чжихуэй, Сюй Цянь и Чжан Жэньцзе. Оба комитета также имеют обширные и тщательно согласованные списки альтернативных членов.\n\nУстановлен хрупкий баланс власти, Ван и его РАТ осторожно движутся к консолидации своего правительства, не вызывая чрезмерной реакции со стороны тех, кого все больше раздражают его попытки утвердить свою власть. Пожалуй, лучше всего характеризует зарождающиеся игры за власть решение Вана назначить Сунь Фо вице-премьером Исполнительного юаня (новая престижная, но довольно бесправная должность), чтобы помочь устранить конкурента в борьбе за пост премьера Законодательного юаня со стороны лоялиста Чэнь Гунбо. Хотя полный состав кабинета еще не сформирован, Сун Цинлин и ее союзники по КПК, как говорят, уже ропщут на недостаток представительства, чувствуя себя заведомо отстраненными, однако маловероятно, что они могут оспорить назначения президента"
 CHI.midgame.006.a: "Или могут?..."

 CHI.midgame.007.t: "Общество возрождения Китая"
 CHI.midgame.007.d: "Пока представители Гоминьдана собирались в Нанкине и занимались политикой, многие, оставшиеся за столом переговоров, находили время для самостоятельных встреч. Вдали от общественного внимания витали иные идеи и идеалы.\n\nМногие недовольные выпускники Whampoa, прозябавшие в изгнании вдали от дома на протяжении последнего десятилетия, собрались в тесно переплетенных сетях академии. Наиболее идейные и радикальные из них обращаются к Хэ Чжунхану и Дэн Вэньи, офицерам среднего звена, которые отстаивают националистическую, тоталистическую и антиистеблишментскую линию. Вернувшись, они с гордостью стали называть свое тайное братство Ассоциацией товарищей революционной армии (АТРА)\n\n Тайный круг внутри большого тайного круга, они нервно представили свои идеи Ху Цзуннану, директору учебного отдела Whampoa, и другим сочувствующим командирам на встрече в подсобном помещении. Несмотря на невысокий рост, Ху - один из самых старших в первом выпускном классе Вампоа (28 лет в 1924 г.) и любимец бывшего директора школы (который предпочитал выходцев из Чжэцзяна), чем он и воспользовался для создания атмосферы авторитета над многими своими сверстниками и учениками.\n\n К радости собравшихся, Ху одобрил программу АТРА перед своими товарищами - "молодой гвардией"\n\n и официально принял свою роль Линьцзю. В своей речи генерал поклялся, что китайская революция никогда больше не станет жертвой иностранных империалистов или мелких междоусобиц. Объединив АТРА, Лигу десяти и других радикально настроенных офицеров в единое боевое движение, родилось Общество возрождения Китая"
 CHI.midgame.007.a: "Революция изнутри?"

 CHI.midgame.008.t: "Смерть Ляо Чжункая"
 CHI.midgame.008.d: "На прошлой неделе в Гоминьдане произошла трагедия: ушла из жизни одна из его ключевых фигур. Ляо Чжункай был одним из основателей Гоминьдана и, по крайней мере, по титулу вторым по рангу членом партии-государства. Пользуясь большим уважением среди левых, он продолжал лечить раны, нанесенные ему жестоким покушением в 1925 году. Похоже, что он окончательно скончался от этих ран, хотя, к счастью, прожил достаточно долго, чтобы увидеть возвращение партии из изгнания.\n\nНа похоронах, проходящих под Нанкином, делят не только его личные вещи. По традиции, заложенной самим доктором Сунем, его место в Центральном исполнительном комитете заняла жена Хэ Сяннин (сама известная революционерка). Должность заместителя председателя ЦИК, специально созданная для него в период изгнания, перешла к Сун Цинлин, что позволило сохранить баланс сил в партии.\n\nПо-прежнему остается спорным звание премьера Исполнительного Юаня. Номинальный глава исполнительной власти, он был создан во время войны Лиги как замена старому премьер-министру Бэйяну. Однако Ляо практически не успел им воспользоваться, оставив исполнительную власть в руках номинально слабого президентства. Для Вана эта должность была средством личного признания заслуг Ляо. Для его соперников в PAC она представляла собой необходимый противовес председателю, поскольку Ляо считался более примирительным.\n\nВан твердо намерен избежать разделения исполнительных прерогатив, опасаясь опасностей, связанных с бессильным президентом, уязвимым для политических махинаций. Как президент Республики, он имеет право назначить премьер-министра, и Чэнь Гунбо - наиболее логичная кандидатура. Преданный ставленник, друг и лидер РАТ, его кандидатура вызывает сомнения из-за его личного радикализма и того, что он нужен Вану в другом месте. Альтернативный вариант - упразднение премьерства и включение его в состав президентства - наверняка вызовет тревогу. Что бы он ни решил, его выбор бросит длинную тень, создав прецедент для будущих отношений между президентом и премьером в Республике"
 CHI.midgame.008.a: "Назначить на его место Чэнь Гунбо"
 CHI.midgame.008.b: "Совместить премьерство с президентством"

 CHI.midgame.009.t: "Гнев партии"
 CHI.midgame.009.d: "Ответная реакция на "тиранию" Ван Цзинвэя была быстрой и неожиданно жестокой. Фракции, представляющие весь политический спектр, осудили шаг Вана по поглощению премьерства Исполнительным Юанем. Его промах подчеркивается тем, что не только ВКД и РФ осудили этот шаг - многие умеренные фракции РАТ были разгневаны и перешли в лагерь ВКД. Даже среди радикалов РАТ возникли некоторые волнения: по слухам, Чэнь Гунбо в ярости от того, что Ван решил обойти его стороной.\n\nПодобные казусы в Гоминьдане не имеют четкого определения, поскольку государство официально является однопартийным и фракционность де-юре запрещена. Но это, безусловно, не пошло на пользу лагерю Вана - в условиях, когда в бочку мёда подлили дёгтя, сам председатель впервые выглядит уязвимым, многие вышли на улицы, чтобы сбить с него спесь. Любые попытки заставить его уйти в отставку вряд ли будут успешными на данном этапе, но он поспешил попытаться спасти ситуацию, предварительно предложив назначить Гу Мэнъюя, самого видного лидера умеренных из СПК, своим премьером в обмен на политическое перемирие.\n\n Теперь дело за РАТ, который должен сделать свой ход. Слухи об этом предложении быстро просочились и распространились, однако для Сун Цинлин и ее союзников этого может оказаться недостаточно. Занять должность премьера - это победа для председателя, и с его государственным мышлением он, скорее всего, быстро примирит умеренных. Но открытое ожидание кандидата из их квазинелегального оппозиционного лагеря может вызвать отвращение у колеблющихся умеренных, переключить их гнев на обструкционизм РАТ и подтвердить опасения Вана по поводу их партийной лояльности. Будущее партии висит на волоске"
 CHI.midgame.009.a: "Утверждение Гу на посту премьера успокоит людей"
 CHI.midgame.009.b: "Удвоить хулу против загнанного в угол председателя"

 CHI.midgame.010.t: "Пределы власти"
 CHI.midgame.010.d: "С тех пор как доктор Сунь объявил себя генералиссимусом, а Гоминьдан перешел на авангардистские рельсы, вопросы конституционализма, сдержек и противовесов, а также разделения власти всегда были больным местом якобы демократической партии. Его часто ссорящиеся преемники не помогли им в этом деле, пытаясь сохранить партию даже с такими внеконституционными полномочиями.\n\nВан Цзинвэй - последний, кто утвердил свою бесконтрольную власть на весь срок политической опеки. Кризис премьерства не удалось тихо разрешить в кабинетах власти, и он стал достоянием общественности. По мере того как скандал продолжает преследовать партию, ее поддержка в основном достигла дна, поскольку люди вернулись к своей обычной апатии – Гоминьдан оказался немногим лучше дрязжащих бэйянских политиков.\n\n В ЦИК продолжается противостояние между фракциями, ориентированными на РАТ и ВКД. Сунь Фо и фракция реконструкции, то ли в силу политической проницательности, то ли опасаясь нестабильности, предложили выйти из забастовки, возглавляемой СПК. Сунь Фо, уже занимающий пост вице-премьера исполнительного юаня (созданный для него), "великодушно" предложил стать премьером, назначив Гу Мэнъюя в качестве своего заместителя. Это вряд ли решит основные проблемы, выявленные в ходе спора, но, поскольку СПК не проявляет никаких признаков ответной агрессии, это, по крайней мере, позволит Вану пока двигаться дальше.\n\nУпускать такой шанс "выпустить партийный пар" тоже не лучший вариант. На протяжении всего кризиса Ван был вынужден признать, что премьерство - это, по крайней мере, отдельная должность, хотя и с неопределенными полномочиями, и отказаться от прямого его упразднения. Чэнь Гунбо, оскорбленный, но сохранивший верность, при неохотном согласии умеренных, уставших от непрекращающегося кризиса, разработал план. Ван назначит себя премьером и будет одновременно занимать президентский и премьерский посты во время опеки. РАТ применит все имеющиеся в их арсенале грязные приемы, чтобы протащить его через временное законодательное собрание, а Ван использует свои полномочия главнокомандующего, чтобы подавить инакомыслие. Если их блеф будет доказан, то СПК будет вынуждена сдаться ради блага нации"
 CHI.midgame.010.a: "По крайней мере, сейчас мы можем попытаться исправить ситуацию..."
 CHI.midgame.010.b: "Слишком поздно, ущерб уже был нанесен..."

#Phase 2 События политического нарратива (полугодовые, пока действует BOP) - How Low Can You Go?
 CHI.midgame.011.t: "Взгляд на лагерь Ван Цзинвэя"
 CHI.midgame.011.d: "Несмотря на то, что лагерь председателя Гоминьдана Ван Цзинвэя называют автократической кликой, он может похвастаться одной из самых крупных фракций в партии. В число тех, кто составляет его базу поддержки в правительстве, входят как Резиденция, так и Реорганизованная ассоциация товарищей. Фракция резиденции (критики Вана называют ее "дворцовой фракцией") - это те, кто проживает вместе с председателем в его особняке. Главным их рупором является жена Вана, амбициозная и волевая Чэнь Бицзюнь, которую в РАТ прозвали "Ван Фурэн" (мадам Ван) или "Лаотайпо" (старуха, так как она выглядит старше своего мужа). Любящая супруга, она часто прислушивается к мнению мужа и защищает его интересы даже тогда, когда он сам не желает этого делать. К этой фракции также относятся Чу Миньи (женат на приемной сестре Чэнь Бицзюнь), Цзэн Чжунмин (самый доверенный секретарь Вана), Цзэн Син (сестра Цзэн Чжунмина), Ван Вэньсюнь (третья дочь Ван Цзинвэя) и Чэнь Яоцзю (брат Чэнь Бицзюня). К ним также присоединяются Ван Ци и Ван Цзунцзунь (племянники Вана) и Чэнь Чуньпу (племянник Чэнь Бицзюнь)\n\nЯро противостоит жене председателя его любимый друг Чэнь Гунбо, который де-факто является выразителем интересов РАТ - политических сторонников Вана в Гоминьдане. Тем не менее, Чэнь и его последователи составляют радикальное крыло РАТ, его проавторитарные материалистические позиции сочетаются с убежденностью в неизбежности классовой войны в Китае. К нему присоединяются такие последователи, как Ши Цунтун, Ван Фацинь, Лю Каньюань, Гу Чжэнган и Гу Чжэндин.\n\nТе, кто отказывается принять марксистское мировоззрение Чэня и в целом более сдержаны в своих рассуждениях, - это умеренные во главе с Гу Мэнъюем. Хотя эта фракция значительно меньше по численности, Гу, тем не менее, пользуется влиянием как один из самых любимых писателей Вана, а сами умеренные согласны с тем, что для очищения революции необходима реорганизация Гоминьдана. К Гу в лагере умеренных присоединились Пань Юнчао, Ван Липин, Линь Бошэн и Чжу Цзицин"
 CHI.midgame.011.a: "Отдать предпочтение радикалам"
 CHI.midgame.011.b: "Отдать предпочтение умеренным"
 CHI.midgame.011.c: "Отдать предпочтение Резиденции"

 CHI.midgame.012.t: "Нарастающая оппозиция"
 CHI.midgame.012.d: "'Мы должны следовать принципам доктора Суня. Сейчас нам нужны действия и люди, которые будут действовать', - объявила Сун Цинлин на церемонии создания Временного комитета действий (ВКД). Являясь логичным развитием прежнего популистского правительства Миньгана, ВПК предан делу создания социалистического и свободного Китая, лишенного империализма, милитаристов и алчных помещиков.\n\n По мнению ВПК, китайская революция является комплексной, с революционными характеристиками военного восстания, гражданских прав, демократии и социализма. Члены ВКД придерживаются марксистских идей исторического материализма, они убеждены, что Китай движется к социалистическому будущему и что лидерство в этом новом строе будет принадлежать простому народу (пинмин). Общество будущего будет построено на активном участии широких народных масс. В силу сложного характера убеждений РАТ поддерживает непрочные отношения с Фракцией реконструкции, Всемирным обществом, Синдикалистской партией Китая и даже с членами Реорганизованной ассоциации товарищей Ван Цзинвэя.\n\nХотя члены РАТ согласны с Фракцией реконструкции в отношении природы возможной демократии, для них она является не более чем представителем буржуазных интересов, которые запятнают реальную революцию, которую должны возглавить китайские простолюдины. Они видят в РАТ лишь лакеев авторитарного председателя, и хотя они действительно придерживаются тех же низовых и социалистических взглядов, что и их коллеги-синдикалисты и анархисты, более консервативные члены РАТ имеют сомнения относительно роли Третьего Интернационала в мировой революции.\n\nПод руководством энергичного Дэн Яньда и харизматичной вдовы мадам Сун Цинлин, ВКД выступает не за ортодоксальный сунизм, а за совершенствование и развитие "Трех принципов народа", чтобы сделать их более конкретными и практичными для удовлетворения потребностей народа. Интеллектуальная гибкость позволяет им поддерживать отношения с различными фракциями, от синдикалистов до либералов, и в то же время сохранять свою собственную цель - демократический и социалистический Китай"
 CHI.midgame.012.a: "Ориентироваться на крестьянский, аграрный элемент"
 CHI.midgame.012.b: "Ориентироваться на широкий, демократический элемент"
 CHI.midgame.012.c: "Акцентировать внимание на милитаристском, революционном элементе"

 CHI.midgame.013.t: "Разделенная партия сестер"
 CHI.midgame.013.d: "Будучи крупнейшей фракцией и движением в Союзе синдикалистов Китая, Синдикалистская партия Китая может похвастаться наибольшим количеством членов и последователей в Китае. Вдохновляясь славными революциями Великобритании и Франции после Великой войны, старая гвардия китайских синдикалистов, в число которой входят Чэнь Дусю, Ли Лисань и Лю Шаоци, считает, что для того, чтобы произошла пролетарская социалистическая революция, необходимо сначала победить в национальной революции. При реорганизации Гоминьдана в 1924 году синдикалисты и Гоминьдан объединились в так называемый Единый фронт.\n\nИдеально ортодоксальные синдикалисты СПК представляют себе систему, подобную французской коммуне, с профсоюзами и советами, работающими в тандеме. Однако продолжающиеся гражданские и политические потрясения во французском государстве заставляют сомневаться в лидерстве ортодоксальной СПК. Внутри ССК критика в адрес сотрудничества с китайским Гоминьданом исходила от самых разных групп - от анархистов до радикальной фракции СПК. По мнению Чэнь Дусю, 'всеклассовая' революция является единственной формой революции, возможной для пролетариата на данном этапе.\n\n Политика Объединенного фронта была успешной в организации как неудачного Шанхайского восстания 1932 года, так и успеха НРА в войне Лиги. Тем не менее, ортодоксальная фракция оказалась в ситуации, когда фракционная борьба в Гоминьдане расколола напряженную коалицию ССК. Несомненно, старейшины Всемирного общества по своим убеждениям ближе к ВКД, а радикалы СПК находят общий язык с радикалами РАТ. В условиях, когда ССК вновь начинает распадаться из-за междоусобиц, перед ортодоксальной фракцией встает выбор: встать на сторону одной из основных фракций Гоминьдана или продолжить свой курс на независимость от политики националистических партий."
 CHI.midgame.013.a: "Они на стороне ВКД"
 CHI.midgame.013.b: "Они на стороне РАТ"
 CHI.midgame.013.c: "Они сохраняют свою независимость"

 CHI.midgame.014.t: "Полуночная встреча"
 CHI.midgame.014.d: "В полутьме ночи к неприметной вилле подходит молодой и немного нетрезвый офицер. Это безликий человек, намеренно одетый в однообразную драную одежду, чтобы не выделяться, пока он занимается "трудом гончей и лошади", как он это называет. Он везет с собой предложение от своего хозяина.\n\nВнутри находится один из самых видных деятелей зарождающейся Республики, возможно, третий по влиянию деятель старого Миньганского мятежа. Обстоятельства мрачные, и он выпроваживает из зала заседаний своих охранников. Его не обманывает поведение гостя, и он наблюдает за тем, как волчьи глаза человека рыщут по сторонам в поисках слабины, пока тот говорит.\n\nВ параноидальной атмосфере, пронизывающей страну, заговоры и тайные встречи - слишком обычное дело. Но этот, пожалуй, затмевает все остальные по своим масштабам - заговор против лидера той самой партии, которой они, по их словам, служат. Гость Дай Чуньфэн начинает с напоминания генералу Дэн Яньда об их совместной борьбе с повстанцами, которое вскоре переходит в разглагольствования о том, как Парижский комитет, несмотря на то, что он почти десять лет скрывался в безопасности, нагрянул сюда и присвоил себе всю славу. Он настаивает, что он и другие офицеры готовы сражаться, чтобы защитить революцию от безрассудства Вана, и предлагает союз с неопределенными условиями против него. Он уже вооружен потенциальными сферами координации между их фракциями.\n\nДен быстро выказывает свое раздражение тем, что Дай приравнивает его усилия к усилиям повстанцев, едва скрывая свое презрение к бывшему бандиту. Он прекрасно понимает, кому служит Дай - Ху Цзуннань и его клика уже давно подрывают авторитет Дэна в армии. Но по мере роста власти председателя над страной нависает угроза тирании, и возникает соблазн использовать "специальные методы", чтобы держать РАТ в узде. Генерал-ветеран с презрением смотрит на "офицеров", не сумевших выпуститься из Вампоа, и тем не менее размышляет о своем собственном труде гончей и лошади для Сун Цинлин и РАТ"
 CHI.midgame.014.a: "Во тьме ночи было заключено соглашение"
 CHI.midgame.014.b: "Экстремизм – это не наш метод"

 CHI.midgame.015.t: "Перемещения и контрперемещения"
 CHI.midgame.015.d: "Гончая давно сорвалась с поводка, о чем многие в центральном руководстве Гоминьдана уже успели пожалеть. Национально-революционная армия, созданная специально для защиты партии от милитаристов и военных, постепенно обрела собственный разум, и слухи о военных заговорах ходят по стране, а каждая фракция переманивает к себе сочувствующих офицеров.\n\nВан Цзинвэй также стал жертвой этой угрозы, как и его приближенные. Хотя Ван имеет значительный контроль над бюрократией, пользуется поддержкой, по крайней мере, множества интеллектуалов, а Чэнь Гунбо превратил свою РАТ в дисциплинированную (хотя и неофициальную) фракцию, его положение на вершине партии никогда не казалось ему вполне надежным.\n\nУ его жены, Чэнь Бицзюнь, есть план. Решительная женщина с болезненными воспоминаниями о борьбе за власть, которую ее муж вел с Чан Кайши, хорошо знает, что власть военных диктует партийные приоритеты. Она самостоятельно начала работу по созданию военной фракции, поддерживающей председателя, о чем, наконец, подробно сообщила Вану. С помощью Чжан Чжичжуна, Чжоу Эньлая и советников МВМК она составила список сотрудников Политического управления, офицеров-синдикалистов, прошедших европейскую подготовку, и других сторонников молодой гвардии для назначения на ключевые посты в иерархии НРА.\n\n Такое откровенное вмешательство в дела армии может оказаться достаточным, чтобы поставить военных на колени, сломить их независимый политический дух. С другой стороны, Ван, несмотря на радужные перспективы Чэнь, сомневается, отмечая, что многие офицеры НРА искренне аполитичны и такие открытые требования политической лояльности могут привести к обратному результату, заставив их перейти в оппозицию. Открытые усилия Чэнь по назначению своего брата Чэнь Чанцзу генералом военно-воздушных сил уже не раз вызывали ответную реакцию. Имидж респектабельного государственного деятеля, стоящего выше таких мелочных разборок, может оказаться лучшим способом сохранить власть. С другой стороны, революция - дело грязное, и как президент и верховный главнокомандующий он вправе назначать военные комиссии. Возможно, лучше бояться, чем свергать"
 CHI.midgame.015.a: "Ван одобряет упреждающие меры"
 CHI.midgame.015.b: "Ван колеблется, опасаясь фракционности"

 CHI.midgame.016.t: "Четверо старейшин осуждают Вана"
 CHI.midgame.016.d: "Четверо старейшин Гоминьдана, давно пользующиеся уважением среди китайских левых за организацию китайских рабочих и студентов в рамках программы "Усердный труд - обучение", придерживаются эклектичного взгляда на анархизм и его роль в Гоминьдане. Ли Шицзэн, один из старейшин Всемирного общества, предложил Гоминьдану принять принципы федерализма, основанные на идеях Прудона, которые представляли бы собой сочетание местных и центральных органов власти с целью её децентрализации в пользу региональных органов. Однако, учитывая политическую ситуацию в Китае, определенная часть центральной власти (военная мощь, финансы, тяжелая промышленность) будет оставаться в руках правительства до достижения анархизма.\n\nАнархисты Гоминьдана ставят перед собой задачу создания Университета труда, подобного европейским, где будет создан новый тип рабочего лидера и интеллектуала - легендарных организаторов, способных преобразовать не только партию, но и нацию. С помощью своей газеты 'Революционный еженедельник' они будут пропагандировать анархистские идеалы и утверждать, что 'Три принципа народа' Суня по умолчанию являются способом создания анархизма.\n\nВ последней статье "Революционного еженедельника" пламенный старейшина У Чжихуэй осудил председателя Вана и РАТ за "разжигание классовой борьбы", утверждая, что революция доктора Суня призывала весь Китай к восстанию - об этом свидетельствует заявление, сделанное на I съезде в 1924 году. По мнению У, революция в Китае была 'цюаньмин гэмин' (революцией для всего народа). Однако члены РАТ осудили эту терминологию, сославшись на то, что она используется контрреволюционной Партией китайской молодежи на Севере. По мнению РАТ, используя контрреволюционную терминологию, У тем самым подтверждает отказ от социальных преобразований как части Национальной революции, что для анархиста является иронией.\n\nДальнейшая критика исходила от Чэнь Гунбо, который решил составить открытое письмо в "Революционный еженедельник" В своем письме он утверждал, что члены Всемирного общества, похоже, наслаждались своим официальным положением старейшин в партии и проводили большую часть времени, ухаживая за влиятельными военными лидерами Временного комитета действий. В отношении У и Ли Шицзэна, которых он когда-то, возможно, боготворил, у него растут сомнения в их приверженности революции - особенно в том, что они не верят в классовую борьбу. Единственным выходом, по его мнению, является их немедленная отставка с занимаемых постов и отказ остальных членов Гоминьдана от их идей как от глупости"
 CHI.midgame.016.a: "Старейшины высказывают справедливые соображения!"
 CHI.midgame.016.b: "Они должны идти в ногу со временем"

 CHI.midgame.017.t: "Свежий выпуск"
 CHI.midgame.017.d: "Внутри партии одним из наиболее распространенных средств межфракционной борьбы являются газеты и брошюры соответствующих клик, призванные продемонстрировать их якобы лучшее понимание китайского общества и истории. Среди наиболее популярных газет, которые читают члены партии, - "Революционный критик" Чэнь Гунбо, "Продвижение" Гу Мэнъюй и "Обзор реконструкции" Сунь Фо.\n\n "Революционный критик" Чэнь Гунбо - это совместная работа писателей наиболее радикального крыла РАТ: Ши Цунтуна, Го Чунтао и Сюй Дэхэна. Их работы в основном посвящены стремлению к новой реорганизации и реструктуризации партии, более полной, чем реорганизация 1924 года. По их мнению, во главе революции должны стоять кадры революционной интеллигенции, а массы должны быть привлечены, так как именно они являются подлинным авангардом национальной революции. В работах "Критика" используются в основном научные и марксистские термины, причем такие авторы, как Чэнь, часто используют такие слова, как материализм, чтобы диктовать свои мысли.\n\n'Продвижение' показывает, что Гу и его последователи были хорошо начитаны в области марксизма, но они отвергали представление о том, что марксизм является научным или историческим - вместо этого они призывают к такой же реорганизации, как Чэнь и его последователи, но с использованием менее радикальных средств. По мнению Гу, нет необходимости в "классовой базе" партии, поскольку китайское общество еще не превратилось в классовое, вместо этого Гоминьдан должен представлять "все угнетенные народы”.\n\n"Обзор реконструкции" Сунь Фо отличается от других изданий тем, что его авторы утверждали, что Гоминьдан должна быть не просто реорганизован, а скорее полностью реконструирован. По мнению этих авторов, Гминьдан был испорчен после создания Объединенного фронта, а радикалы из РАТ лишь слепо повторяют постулаты марксизма, не придерживаясь ортодоксальной теории Сунь Ятсена. Кроме того, они не согласны с ВКД, видя в их популизме и гибкой в работе с синдикалистами потенциальную угрозу успеху национальной революции"
 CHI.midgame.017.a: "'Критик' продолжает свое интеллектуальное доминирование"
 CHI.midgame.017.b: "У "Продвижения" шокирующий всплеск продаж!"
 CHI.midgame.017.c: ""Обзор реконструкции" набирает популярность!"

 CHI.midgame.018.t: "Интрига Игуаньдао"
 CHI.midgame.018.d: "В последнее время члены Гоминьдана находятся в напряжении, поскольку годы идут, а революция продолжается. Междоусобица среди партийных кадров уже давно стала политической реальностью, хотя порой она доходит до паранойи. Обвинения в реакционности мышления или подрыве "трех принципов" - это, к сожалению, обычная практика, но сейчас, похоже, начинается новый виток истерии.\n\nХотя движение Игуаньдао может ассоциироваться с провинцией Шаньдун, его приверженцев можно найти по всему Китаю. На партийном съезде 1929 г. Гоминьдан постановил, что никто из его членов не может также принадлежать к каким-либо духовным движениям, главным из которых был культ безумного мистика Чжана Тяньжаня. Подстегнутая слухами, обширная контрразведывательная операция вывела на чистую воду одного тайного милленария с высоким партийным статусом: Чжоу Фохай.\n\n Чжоу - друг и близкий соратник Ван Цзинвэя, и иногда говорят, что его правительство работает на 'устами Чэнь Гунбо, пером Чжоу Фохая и ногами Чу Миньи' Несмотря на это, сам он непопулярен в лагере Вана, не является приверженцем РАТ и отстранен от Резиденции, а также, как говорят, разочаровался в социализме. По мере распространения слухов РАТ старается обернуть их в свою пользу, утверждая, что Ван позволил процветать измене прямо у себя под носом.\n\nЧжоу, со своей стороны, тщательно отрицает любые правонарушения и утверждает, что прекратил свои связи с Игуандао много лет назад. Он умолял председателя защитить его и вскользь пригрозил, что объявит своего соперника Чу Миньи еще одним членом Игуандао и тем самым усугубит скандал. По его словам, агенты Дай Чуньфэна уже сделали несколько заманчивых предложений защитить его и дать ему работу по "исследованиям" для них. Но он знает, что Ван сделает все правильно и замнёт расследование, публично оправдав его перед партией. В обмен на это он готов на ближайшее время скрыться от внимания"
 CHI.midgame.018.a: "Переназначить и защитить его"
 CHI.midgame.018.b: "Пусть получает по заслугам"

 CHI.midgame.019.t: "Долги и расплата"
 CHI.midgame.019.d: "Между Чжоу Фохаем и другими членами окружения Вана не было никакой любви, но, тем не менее, он все равно был одним из них. И после того, что с ним произошло, Ван и его союзники уже давно планировали свою месть - ждали, пока скандал исчезнет из поля зрения общественности, чтобы нанести ответный удар. И они нанесли ответный удар.\n\nРАТ не стала медлить, когда начала отслеживать информацию о финансовых нарушениях, связанных с Центральным банком Китая. Следователи утверждают, что в результате предварительной проверки, проведенной Сун Цзывэнем и его кликой, были обнаружены значительные расхождения в бухгалтерском учете, и уже была начата серия арестов. Продолжая расследование, Сун на закрытых слушаниях в ЦИК оправдывал действия своих соотечественников тем, что они были необходимы для погашения различных незаконных долгов, накопленных партией за время восстания, - революционная необходимость. Более того, он отмечает, что продолжение расследования подорвет хрупкую стабильность Центрального банка.\n\nНикто пока не обвинил самого Суна, члена ЦИК и брата Сун Цинлинь, в каких-либо правонарушениях. Но по мере того, как гончие приближаются, становится все более очевидным, что эта охота на ведьм - месть за кризис Игуаньдао. В частности, говорят, что Чу Миньи уже метит на место Суна, что свидетельствует о растущем влиянии фракции Резиденции. Столкнувшись с перспективой быть публично опозоренным, Сун предпочел тихо уйти со своего поста в ЦИК (сохранив при этом свои обязанности в финансовом мире), пока союзники его сестры пытаются обыграть ситуцаию."
 CHI.midgame.019.a: "Сун уходит в отставку, чтобы сохранить лицо"
 CHI.midgame.019.b: "Песня доживает свой век"

 CHI.midgame.020.t: "Столкновение титанов"
 CHI.midgame.020.d: "Хотя многие в Гоминьдане, где доминируют левые, благодарны Интернационалу за помощь и поддержку, которую он оказывал на протяжении всего времени, некоторые не забыли, что Гоминьдан - это действительно Китайская националистическая партия. Многие члены партии были свидетелями событий Боксерского восстания 1900 года и выросли в Китае, долгое время подвергавшемся избиениям со стороны западных держав.\n\nФранцузский журналист и член военной миссии Интернационала в Китае Андре Мальро недавно вернулся из Китая в отпуск, чтобы доложить европейскому социалистическому сообществу о ходе китайской национальной революции. Тепло отзываясь о членах Ассоциации товарищей по реорганизации, он в то же время с опаской пишет об интенсивной политизации Национально-революционной армии - понятии, незнакомом для французской системы милиции и национальной гвардии. Более того, он представляет Дэн Яньда в нелестном и востоковедческом свете, называя его бонапартистом.\n\nВ ответ на эти обвинения Дэн утверждает, что МВМК вмешивается в существующую структуру НРА, продвигая таких людей, как Чжоу Эньлай, среди прочих конфликтов. Он утверждает, что МВМК ведет себя безрассудно и готов тратить китайских солдат, как свою собственную версию сипаев или аскари.\n\nЭта тирада заставила задуматься о политизации НРА, поскольку более националистически настроенные члены НРА встали на сторону Дэна. В отличие от них, офицеры, прошедшие европейскую подготовку, встали на сторону Мальро и решений, принятых МВМК. Столкнувшись с таким потенциальным faux de pas, руководство Гоминьдана должно действовать быстро, решая, приструнить ли надменного Наполеона или приструнить иностранного сеятеля раздора"
 CHI.midgame.020.a: "Объявить выговор Дэн Янда"
 CHI.midgame.020.b: "Объявить выговор Андре Мальро"

#Мероприятия по повышению радикализма
 CHI.midgame.021.t: "Выход из тени"
 CHI.midgame.021.d: "Когда дело доходит до революции, вполне естественно, что появляется радикальная энергия - особенно среди молодежи и недовольных старым порядком. При этом гоминьдановцы, несмотря на свое революционное наследие, часто стремятся сохранить атмосферу порядка и авторитета, присущую авангардистской партии. Гоминьдан также известен своим прагматизмом и готов идти на сотрудничество с другими группами, если это необходимо для достижения поставленных целей.\n\nПомимо этого, в национальный интеллектуальный диалог вступают новые группы. Общество возрождения Китая и фракция "Радикал" Синдикалистской партия Китая оседлали успехи более массовых социалистических групп. Однако с ростом националистических и иконоборческих настроений они обрели больше сторонников, что позволило им создавать собственные газеты и издания.\n\nСогласно СПК, газета Цянь Ту (дословно "Будущее", "Перспективы") является одной из самых популярных. В то же время многие радикалы СПК стали подписываться на газеты "Горячая кровь" Цюй Цюбая (названную так за веру в то, что горячая кровь угнетенных победит холодное железо сильных) и "Дунфан цзачжи" ("Восточный вестник"), в которых часто публикуются статьи, посвященные противоречиям между марксизмом и утопическим социализмом.\n\nПартия располагает достаточно мощным аппаратом безопасности, способным при необходимости подвергать цензуре нежелательные мнения, особенно те, которые противоречат гоминьдановской ортодоксии. Тем не менее, загнав эти группы в подполье, можно лишь замедлить их развитие, если не бороться с первоисточником радикализма"
 CHI.midgame.021.a: "Запретить!"
 CHI.midgame.021.b: "Это просто революционная лихорадка"

 CHI.midgame.022.t: "Поляризация НРА"
 CHI.midgame.022.d: "Национально-революционная армия была создана как военная армия Гоминьдана, непосредственно преданная партии и революции и тем самым освобождающая Гоминьдан от зависимости от региональных военачальников. Под руководством военного министра Ли Цзишэня высшее командование НРА стремилось к относительному политическому нейтралитету, воздерживаясь от вмешательства в гражданские дела и по мере сил занимая ту или иную сторону в партийных политических дебатах.\n\nОднако этот статус-кво становится все более напряженным. Ли Цзишэнь в частном порядке доложил председателю Вангу, что все больше офицеров присоединяются к радикальным группировкам внутри армии. Тревожно, что главным спонсором является не "обычные подозреваемые", а Дэн Яньда и его АРОВАВ. Хотя Дэн слишком горд, чтобы признаться в этом публично, в частном порядке он признался своим близким союзникам в опасениях, что АРОВАВ теряет уважение среди молодых офицеров и курсантов-новобранцев.\n\nГлавным бенефициаром этого сдвига, похоже, является Общество возрождения Китая, группа тоталитарных националистов, возглавляемая генералом Ху Цзуннанем и другими недовольными офицерами. Не доверяя военной "старой гвардии", многие радикалы в СПК стали организовывать военизированные формирования независимо от НРА, все чаще, не подчиняясь указаниям ортодоксальной фракции СПК и советников Интернационала. Их решение организовать забастовки "дикарей" и попытки разогнать их под руководством СПК ухудшили атмосферу в основных опорных пунктах Гоминьдана"
 CHI.midgame.022.a: "Рабочие радикализируются!"
 CHI.midgame.022.b: "Солдаты радикализируются!"

 CHI.midgame.023.t: "Дерзкое покушение!"
 CHI.midgame.023.d: "Шокирующая, но в какой-то мере ожидаемая новость: сегодня президент Ван Цзинвэй едва не был убит в результате жестокого покушения, совершенного недовольным революционером. В то время как представители СМИ фотографировали выступление Вана у президентского дворца, стрелок с криком "долой предателей" открыл огонь и едва не убил Вана. Наемник был задержан, а Ван (который по иронии судьбы начал свою революционную карьеру как неудавшийся убийца) был поспешно доставлен в больницу для лечения незначительных ранений на щеке и руке. Однако больший урон был нанесен СМИ, распространившим фотографии с места преступления. Хотя большинство из них опубликовали заявления с осуждением нападения и пожеланиями скорейшего выздоровления председателю, многие отметили, что это лишь последнее сообщение о насилии в отношении политиков.\n\nДля инсайдеров преступник является открытой тайной, даже когда полиция допрашивает его. Радикально настроенные офицеры НРА, связанные с СПК, часто действовали безрассудно, что свидетельствует о неспособности Гоминьдана справиться с растущим радикализмом внутри собственного движения, слишком занятого борьбой между собой, чтобы обеспечить стабильное руководство. Тревожно, что многие люди, не входящие в СПК и даже выступающие против нее, отреагировали на это равнодушно или даже с одобрением.\n\nЭто нападение, однако, зашло слишком далеко. Кто-то должен быть привлечен к ответственности, вопрос лишь в том, как глубоко заглянуть"
 CHI.midgame.023.a: "Мы должны докопаться до сути!"
 CHI.midgame.023.b: "Я боюсь того, что мы можем найти"

 CHI.midgame.024.t: "Был найден расстрельный список СПК!"
 CHI.midgame.024.d: "Когда начиналось расследование, было хорошо известно, что результаты будут не очень красивыми. Но оказалось, что все еще хуже, чем предполагалось ранее. В результате проведенной многочисленными агентствами тщательной работы, в ходе которой были взяты клятвы молчания, внутренние уговоры и даже насилие в отношении следователей, было установлено, что нападавший является членом более широкого заговора. Небольшая ячейка, в которую он входил, была хорошо организована и, несмотря на попытки скрыть это, входила в состав более крупных ячеек.\n\nСлед простыл, прежде чем удалось предъявить кому-либо убедительные доказательства, хотя он определенно был связан с кругами безопасности и разведки. В ходе рейда был обнаружен тревожный "расстрельный список", в котором в качестве целей фигурировали десятки имен крупных гражданских и военных руководителей. Насколько список представляет собой тщательно отобранные цели, а не фантазии, не имеет значения, учитывая его ужасающий характер.\n\nВ силу тайного характера ситуации, маловероятно, что будут пойманы самые высокопоставленные преступники, по крайней мере, на этот раз. Однако проведение крупных арестов позволит, по крайней мере, предотвратить видимость безнаказанности СПК и послужит немедленным сигналом для других военных клик, которые попытаются совершить нечто подобное. Однако скандал будет большой, и вместо того, чтобы раскачивать лодку, некоторые предлагают вместо этого публично обвинить в покушении реакционеров и империалистов"
 CHI.midgame.024.a: "Требуется тщательная чистка! Пусть никто не уйдет от закона"
 CHI.midgame.024.b: "Прикройте это. Ради единства мы замнём дело"

 CHI.midgame.025.t: "Тени над деревней"
 CHI.midgame.025.d: "Когда в конце войны Лиги Гоминьдан впервые освободил Пять провинций, крестьяне и рабочие были вне себя от радости. Многие выходили на улицы, чтобы приветствовать наступающую Национально-революционную армию, и ликовали, когда лидеры Гоминьдана говорили о национальной революции.\n\nДо сих пор революция принесла лишь смерть и страдания. Переполненные радикальными настроениями, фанатичные отряды СПК и их радикального крыла устраивают шествия и драки на улицах, угрожая людям как высшего, так и низшего сословия, считающихся реакционными. Высшее командование с трудом сдерживает их, хотя их действия становятся все более и более вопиющими.\n\nВ сельской местности, вдали от столицы, ситуация гораздо хуже. В деревнях и селах, некогда бывших оплотом РАТ и идеалов аграрных кооперативов, царит страх. Многие отворачиваются от Суна и ВКД, ища защиты от беспредела, царящего в регионе.\n\nПо всей стране радикально настроенные крестьяне обращаются к радикалам из РАТ и СПК, организуя отряды милиции, которые часто выезжают на борьбу с 'реакционерами'.\n\nДругие живут в страхе перед безымянным 'Лаобаном', влияние которого, похоже, растет с каждым днем, а военизированные формирования СПК покидают свои гарнизоны НРА, чтобы уничтожить коммуны, которые они считают слишком автономными. В ответ на это появились тревожные сообщения о том, что некоторым помещикам было позволено вернуться, поскольку население устало от политического радикализма.\n\nВ свете этих событий РАТ удвоила свои опорные пункты, лишив различные отряды НРА охраны присоединенных деревень, что усиливает беспорядок. В условиях хаоса в деревне необходимо что-то делать, и делать быстро, потому что революционная мечта умирает."
 CHI.midgame.025.a: "Сдерживать фанатиков СПК"
 CHI.midgame.025.b: "Прижать радикалов"
 CHI.midgame.025.c: "Необходимы решительные действия, иначе революция обречена!"
#LCS Mechanic Events
 CHI.midgame.026.t: "Триумф Всемирного общества"
 CHI.midgame.026.d: "В 1906 году, через два года после основания Тунменхуэй и задолго до синдикалистской революции, в Париже четырьмя друзьями Чжан Жэньцзе, Ли Шицзэн, У Чжихуэй и Цай Юаньпэй было основано Общество "Новый мир" ("Шицзе ши"). Они верили, что наступает новый мир, мир освобождения и свободы для каждого человека - не только политической, но и социальной. Молодые, интеллектуальные и анархистски настроенные в то время, они стали наставниками многих будущих социалистов в Гоминьдане благодаря своей революционной деятельности, включая газеты, движение 'Усердный труд - бережливое обучение' и бесчисленные сочинения.\n\nК сожалению, несмотря на то, что синдикалистское движение было одобрено европейскими революциями, они остались позади при создании Синдикалистской партия Китая. Вынужденные играть второстепенную роль в Союзе синдикалистов Китая, к их огорчению, их ярая защита политической опеки сделала их непопулярными в кругах либеральных социалистов - Ли Шицзэн, например, цитировал, что 'китайская революция четвертого порядка - это революция для всего населения, адаптированная к сложным требованиям ситуации'. Тем не менее, их мощные связи в доминирующей партии Гоминьдан (они фактически контролируют Центральный наблюдательный совет) дали им критическое преимущество в синдикалистской политике и вновь выдвинули их в центр внимания. Хотя Союз синдикалистов Китая распалась под тяжестью междоусобиц, Всемирное общество (возглавляемое их протеже И Пэйцзи) пользуется уважением большинства синдикалистов в Китае.\n\nПротивники утопической интерпретации прудоновского примирения классов и всеобщей гармонии, они осуждают ненужное, по их мнению, разжигание классового конфликта при создании синдикалистской нации. Они стали жестко выступать против Ван Цзинвэя и авторитарного руководства РАТ, перейдя на сторону оппозиции."
 CHI.midgame.026.a: "Старая гвардия возвращается"

 CHI.midgame.027.t: "Восхождение радикалов СПК"
 CHI.midgame.027.d: "Синдикалистская партия Китая под руководством Чэнь Дусю и Ли Лисаня часто довольствовалась младшей, покорной ролью в Объединенном фронте. Впредь такого не будет, по крайней мере, на этом настаивают Чэнь Шаоюй и другие радикалы, такие как Цинь Бансянь и Цюй Цюбай. В их состав входят многие молодые синдикалистские активисты и интеллектуалы, которые страдают от компромиссного руководства ортодоксальной фракции СПК. По их мнению, гораздо более циничному, чем ортодоксальная фракция, хаос в Китае - это не просто продукт империализма или военачальства, а самого капитализма. Империализм, бизнес, помещики, дворянство и капитализм должны быть уничтожены полностью и немедленно - и здесь мало места для компромисса, даже в рамках ныне не существующей Союза синдикалистов Китая.\n\nТакой радикализм привел к тому, что многие тяготели к РАТ, особенно к крылу Чэнь Гунбо, видя в них естественных союзников в деле внедрения синдикализма как в городах, так и в деревне. Однако на практике, когда Гоминьдан ревниво охраняет свой контроль над профсоюзами, а Международная военная миссия поддерживает политическую опеку (видя в них более выгодные инвестиции), они борются за будущее. Однако это не лишило их рвения. Не прибавило им и друзей среди умеренных в Гоминьдане."
 CHI.midgame.027.a: "СПК всё больше радикализируется"

 CHI.midgame.028.t: "Ортодоксальное крыло СПК вновь утверждают свое господство"
 CHI.midgame.028.d: "Первое поколение руководства Синдикалистской партия Китая уже давно объединилось в так называемую "ортодоксальную фракцию", группу пожилых интеллектуалов, получивших образование за рубежом. В ее состав вошли многие бывшие анархисты и рабочие организаторы, и, как и во Франции, был выработан компромисс между советскими марксистами (во главе с бывшим анархистом, ставшим членом совета Чэнь Дусю, который с тех пор отказался от анархистского движения) и профсоюзными синдикалистами (во главе с Ли Лисанем). Они были прагматиками - пошли на компромисс с Гоминьданом, образовав Объединенный фронт, и с другими левыми, не принадлежащими к Гоминьдану, образовав Синдикалистскую партию Китая.\n\nЭтот критический компромисс сохранил дух синдикализма, даже после катастрофического Северного похода и поглощения многих революционных ниш Гоминьданом. Будучи преимущественно городскими представителями, они считают, что пролетариат и крестьянство должны работать вместе, чтобы победить империализм, и полагают, что для достижения подлинного синдикализма Китай должен сначала стать индустриальным. В то же время они надеются отвести свою родственную партию от авторитаризма.\n\nНепостоянный характер синдикалистского движения, к сожалению, оказался его гибелью. Союз синдикалистов Китая фактически прекратила свое существование, многие из них оказались отчужденными в результате борьбы за власть, возникшей в ее рамках. Даже когда ортодоксальная фракция СПК восстановила свое руководство, собрать ее воедино не удается. Тем не менее, Чэнь и Ли полны решимости продолжить ее наследие, обеспечив стабильный, но неуклонный переход к синдикалистскому будущему Китая."
 CHI.midgame.028.a: "Возврат к статус-кво"

#RF Mechanic Event
 CHI.midgame.029.t: "Гавайская пятая колонна?"
 CHI.midgame.029.d: "У центристской, гражданской фракции Гоминьдана всегда были сложные отношения с левыми. Когда впервые была проведена конференция Западных холмов в знак протеста против реорганизации и союза покойного доктора Суня с Интернационалом, Сунь Фо и его клика первоначально были готовы объединиться с другими правыми, но в итоге были подавлены растущим влиянием Ван Цзинвэя. С тех пор они в основном действуют в стороне, выступая в качестве более податливой внутренней оппозиции РАТ, с которой Ван может пойти на компромисс, демонстрируя свою государственную мудрость и сдерживая СПК.\n\n Тем не менее, это не мешает Сунь Фо открыто критиковать правительство и продолжать отстаивать свои относительно либеральные взгляды, сформировавшиеся под влиянием его образования в США. ВКД неоднократно делала предложения фракции Реконструкции, но с ростом внутреннего влияния ФР, похоже, старый "железный затылок" стал летать слишком близко к солнцу и считать себя действительно главной альтернативой руководству Вана. Если это так, то вскоре ему предстоит суровая проверка реальностью - за пределами правительственных кабинетов и партийных старейшин ФР находит очень мало поддержки в народе и все больший хор оппонентов, осуждающих ее за 'продажу революции буржуазии' Вопрос лишь в том, потянет ли это осуждение за собой и остальную часть партийного руководства."
 CHI.midgame.029.a: "Пусть пока все идет своим чередом"
 CHI.midgame.029.b: "Мы за ними следим"

 CHI.midgame.030.t: "Заговор индийской клики?"
 CHI.midgame.030.d: "Несмотря на ранние предупреждения о том, что растущее влияние Фракции реконструкции было иллюзорным, Сунь Фо и другие гоминьдановские либералы продолжали опасно укрепляться в государственном аппарате. Будь то их собственная инициатива, стремление РАТ к контролируемой оппозиции или попытка РАТ создать широкую оппозицию Вану, институциональная сила ФР дала обратный результат.\n\n Хотя ФР не обязательно реакционна, она явно правее и идет не в ногу с Гоминьданом в целом. В определенной степени, похоже, их руководство признает это, и 'Индийская клика' (прозванная так за свою службу в Индии) стала более смелой в общении с высокопоставленными офицерами Национально-революционной армии.\n\nГенералы Чжан Факуи и Сюэ Юэ были названы лидерами этих усилий и являются давними личными друзьями семьи Сун. Скандал еще больше подрывает позиции военного министра Ли Цзишэня, бывшего соотечественника по Четвертой армии. Поскольку нейтралитет Национально-революционной армии теперь под вопросом, авторитет маршала Ли снизился в пользу его врагов, что позволило офицерам "Молодой гвардии", недовольным его руководством, добиваться перемен."
 CHI.midgame.030.a: "Политический отдел воспользуется ситуацией"
 CHI.midgame.030.b: "Все больше офицеров попадают в руки СПК"

#Общеполитические события
 CHI.midgame.031.t: "Законодательный Юань"
 CHI.midgame.031.intro: "Хотя Гоминьдан в авангардистской манере утверждает, что партия имеет приоритет над государством в течение всего срока политической опеки, завоевание Нанкина означает, что партия вынуждена столкнуться с реалиями управления. Чтобы заложить основу для реализации концепции доктора Суня, был создан временный Законодательный юань. Несмотря на младший статус, этот однопалатный законодательный орган не совсем бессилен: он регулярно собирается (в отличие от партийного съезда) и апеллирует к интеллигенции. Естественно, что члены Гоминьдана имеют подавляющее большинство мест (хотя и разделенных между радикалами и умеренными). Остальные места в Гоминьдана достались ВКД и фракции Реконструкции, а также нескольким представителям старой гвардии. Значительно меньше мест получил Объединенный фронт, крупнейшим представителем которого является СПК, к которому присоединились несколько независимых союзников (Данвай)."
 CHI.midgame.032.ending: "Оказавшись перед лицом проницательной РАТ, фракция во главе с Чжан Боцзюнем и Пэн Цзэсяном попыталась собрать неофициальный оппозиционный блок, чтобы предотвратить полное доминирование РАТ. Для этого необходимо было объединиться с СПК и отбросить часть умеренных членов РАТ, а также заключить соглашение с РФ и старой гвардией. После серии тайных полуночных встреч..."
 CHI.midgame.031.d.1: "$CHI.midgame.031.intro$\n\nПремьером Законодательного Юаня является Чэнь Гунбо, фактический лидер РАТ. Благодаря тщательному торгу, Реконструкция заключила ключевые соглашения, обеспечив себе другие высокие посты в юане (уступив все претензии на премьерство), в частности, обеспечив давним сторонникам Сунь Фо Ван Куньлуну пост вице-премьера, а Лян Ханьцао - генерального секретаря.\n\n$CHI.midgame.032.ending$"
 CHI.midgame.031.d.2: "$CHI.midgame.031.intro$\n\nПремьером Законодательного юаня является Ван Фацинь, один из высокопоставленных лидеров РАТ. Благодаря тщательному торгу, Реконструкция заключила ключевые соглашения, обеспечив себе другие высокие посты в юане (уступив при этом все претензии на премьерство), в частности, добилась назначения давних сторонников Сунь Фо Ван Куньлуна вице-премьером и Лян Ханьцао генеральным секретарем.\n\n$CHI.midgame.032.ending$"
 CHI.midgame.031.d.3: "$CHI.midgame.031.intro$\n\nПремьером Законодательного Юаня является Пань Юнчао, умеренный, но уважаемый член РАТ. Благодаря осторожному торгу, Реконструкция заключила ключевые соглашения, обеспечив себе другие высокие посты в юане (уступив при этом все претензии на премьерство), в частности, добилась назначения давнего сторонника Сунь Фо Ван Куньлуна вице-премьером, а Лян Ханьцао - генеральным секретарем.\n\n$CHI.midgame.032.ending$"
 CHI.midgame.031.a: "..соглашение достигнуто"
 CHI.midgame.031.b: "..согласие остается недостижимым"

 CHI.midgame.032.t: "Принятие органического закона [GetYear]-го года"
 CHI.midgame.032.d: "В условиях, когда до принятия окончательной Конституции еще далеко (она предполагается только после объединения), Национальный конгресс поручил рабочей группе разработать проект органического закона, дополняющего практически утратившую силу Временную конституцию 1912 года. Он разработан по образцу трудов Сунь Ятсена, который представлял себе правительство с пятью ветвями власти и слабым президентом над ними.\n\n Первые три ветви - это традиционные исполнительный, законодательный и судебный юани. К ним примыкает Экзаменационный юань, занимающийся выявлением и учетом квалифицированных кандидатов на должности государственной службы как на национальном, так и на провинциальном уровне, и в некотором роде представляющий собой модернизированный экзамен на императорскую службу. Второй - Контрольный юань, наделенный полномочиями аудита, надзора и импичмента.\n\nС учетом обстоятельств эти два небольших юаня фактически являются синекурами, предназначенными для того, чтобы с уважением отстранять от работы старейшин, некомпетентных получателей покровительства и слишком амбициозных новичков туда, где они могут нанести минимальный ущерб. Соответственно, существовали опасения по поводу коррупции и "бюрократизации", однако Ван решил бросить кость фракции Реконструкции. То ли из искреннего идеализма, то ли просто из желания возразить, но Реконструкция настаивает на том, чтобы новое правительство было сформировано "правильно" с их точки зрения и следовало конституционной теории Суня.\n\n Теперь, когда законодательство наверняка будет одобрено, остается только вопрос о том, как распределить должности. Имея перед собой список претендентов, президент и его ближайшие советники принимают решение о выдвижении своих кандидатур..."
 CHI.midgame.032.a: "..тщательно сбалансированы по фракциям"
 CHI.midgame.032.b: "..на основе лояльности к председателю"
 CHI.midgame.032.c: "..по существу каждого претендента"

 CHI.midgame.033.t: "Судебный Юань"
 CHI.midgame.033.d: "Судебный Юань - это ветвь власти, контролирующая Верховный суд, Верховный административный суд, Дисциплинарный суд, а также Министерство юстиции и администрации. Учитывая многочисленные конституционные неясности периода политической опеки, а также то, что Временная конституция, действовавшая несколько десятилетий, до сих пор официально не заменена, конкурирующие фракции Гоминьдана заинтересованы в том, чтобы во главе страны стояла фигура, вызывающая симпатию. Хотя на практике последнее слово в конституционных вопросах остается за Центральным исполнительным комитетом, окончательный кандидат, вероятно, будет задавать тон для юаня в целом в годы его становления.\n\nВвиду доминирующего положения РАТ в правительстве до сих пор, широко ожидается, что Ван назначит кого-то из своей клики. Ведущими кандидатами являются Го Гуаньцзе и Ву Чаошу. Го Гуаньцзе - профессор права с французским образованием, преподавал в Университете Сунь Ятсена в Гуанчжоу. Обладая высокой квалификацией, он также является высокопоставленным членом PAC - фракции, которую Ван хотел бы держать в узде. У Чаошу был первым китайским юристом в Гонконге, получил образование в Великобритании и был председателем судебного комитета в правительстве Гуанчжоу 1925 года. Однако его открытая принадлежность к Реконструкции вызвала недоверие в социалистических кругах.\n\nКонечно, всегда есть третий вариант. Оба они - давние члены Гоминьдана, но, возможно, нужна свежая кровь. Молодой Гу Чжэндин - выходец из RCA, получивший образование в парижском университете имени Сунь Ятсена. Конечно, это будет не лучший вариант для председателя, но он пережил и не такое"
 CHI.midgame.033.a: "Го Гуаньцзе - опытный юрист"
 CHI.midgame.033.b: "У Чаошу как компромиссный кандидат"
 CHI.midgame.033.c: "Гу Чжэндин немного встряхнет ситуацию"

 CHI.midgame.034.t: "Столкновение за Кантон"
 CHI.midgame.034.d: "Гуанчжоу, да и вся провинция Гуандун в целом, во многом были местом рождения гоминьдановской революции. Многие революционеры - кантонцы или имеют глубокие связи с этим регионом, поэтому неудивительно, что его освобождение вызвало большое торжество в партии. Президент Ван Цзинвэй произнес торжественную речь перед собравшимися на старом месте расположения Вампоа, повторив речь доктора Суня на церемонии открытия академии в 1924 г.\n\nНо как только ликующее настроение отступает, начинаются проблемы. Официально предполагается, что губернаторы (ныне переименованные в председателей провинциальных правительств) будут избираться местными партийными провинциальными съездами. Однако на практике, когда местные ячейки все еще находятся в беспорядке, управление осуществляется на разовой основе. Учитывая символическое значение Гуандуна, решение о новом председателе провинции, скорее всего, будет принимать Центральный исполнительный комитет.\n\n Фракция Резиденции сделала ставку на Чэнь Яоцзу, государственного служащего Лянгуана 1920-х годов и младшего брата Чэнь Бицзюня. Им удалось убедить неохотно соглашающуюся РАТ поддержать его кандидатуру, но Ван, смущенный их бессовестным кумовством, выразил готовность выслушать других кандидатов. Сунь Фо и фракция Реконструкции поддерживают Лян Ханькао, законодателя с опытом работы секретарем партии в Гуанчжоу. Обе фракции преследуют одну и ту же цель - заставить своего соратника взять под контроль плодотворные патронажные сети региона и построить крепость для своего лагеря.\n\nСунь Цинлин и Дэн Яньда, со своей стороны, имеют туз в рукаве. Генерал Чэнь Миншу, лицо "Продуктивной народной партии" (раскольнической группировки Гоминьдана в Гуанчжоу во время правления Чэнь Цзюньмина), по-прежнему остается бастионом региональной политики. Несмотря на свое неоднозначное прошлое, связанное с противниками партии, он попытался вернуться в ее ряды вместе с ПНП. Руководство Миньгана утверждает, что оно сыграло важную роль в снабжении повстанцев контрабандным оружием и должно быть вознаграждено. Другие протестуют против того, что разрешение военным занимать этот пост приведет к размыванию гражданского руководства нашей революцией"
 CHI.midgame.034.a: "Лян Ханьцао, правая рука"
 CHI.midgame.034.b: "Чэнь Яоцзу, зять председателя"
 CHI.midgame.034.c: "Чэнь Миншу, генерал провинции"

 CHI.midgame.035.t: "Судьба офицеров Лиги"
 CHI.midgame.035.d: "Национальная революция в самом разгаре, а вместе с ней и революционные настроения. Для того чтобы победить в этот раз, необходимо использовать мощь массового движения, и вопрос о том, как это сделать, по-прежнему актуален для ведущих представителей нашего правительства. Дун Биву, пожалуй, самый известный член Гоминьдана и СПК с двойным членством, регулярно выступает с докладами о правилах наказания местных деспотов. Другой радикал, Лин Пин, говорит о том, что крестьяне должны иметь собственную охрану и право по собственной инициативе подавлять "контрреволюционеров" Этих радикалов из СПК часто поддерживают члены Международной военной миссии в Китае (МВМК), в частности М.Н. Рой, которые выступают за радикальные аграрные восстания для продвижения революционного дела. В целом, радикалы в СПК (и даже некоторые представители ортодоксальной фракции) считают своим долгом перенести идею классовой борьбы с городского пролетариата в сельскую местность.\n\nНе все с этим согласны. На другом конце революционного спектра есть немало тех, кто подчеркивает националистическую составляющую революции в ущерб социалистической. Они часто находят свой голос во фракции Реконструкции, которая утверждает, что сейчас не время наживать врагов и что есть много "почетных" руководителей Лиги, которые просто заблуждались при выборе своей позиции. Они хотят объявить широкую амнистию "реформированным" реакционерам, а партия должна смягчить свои формулировки и перейти к просто "размеренным" реформам"
 CHI.midgame.035.a: "Мы сметаем старый порядок!"
 CHI.midgame.035.b: "Мы объединяемся под единым государственным знаменем!"

 CHI.midgame.036.t: "Примирение братьев Гу"
 CHI.midgame.036.d: "Братья Гу - политическая семья гоминьдановцев из Гуйчжоу. Два молодых брата, Гу Чжэнлун и Гу Чжэнган, в юности учились за границей в парижском Университете имени Сунь Ятсена, а затем присоединились к РАТ на этапе ее изгнания. Они стали видными организаторами Реорганизованной ассоциации товарищей (РАТ), часто выполняли грязную работу для Чэнь Гунбо и во многом являются восходящими звездами Радикальной фракции.\n\n Старший брат (родившийся более чем за десять лет до Гу Чжэнгана) пошел по другому пути. Гу Чжэнлун поступил в военное училище примерно через четыре года после рождения своего первого младшего брата, учился в Японии и участвовал в Синьхайской революции. Воевал под началом Сунь Ятсена в Войне за защиту конституции, был ведущим членом правой фракции Гоминьдана. Он прославился тем, что организовал жандармерию (военную полицию) в Юньнани, дав ей девиз "Не лги, не обманывай, соблюдай долг и помни свой долг" После завоевания Гуйчжоу младшие Гу активно лоббировали не только амнистию, но и назначение своего брата на пост командующего. В частном порядке они отмечали, что в РАТ не хватает лояльных военных, и наличие своего рода преторианской гвардии, состоящей из фанатично храбрых жандармов Гу Чжэнлуна, может дать им преимущество в предотвращении любого переворота. Естественно, есть и те, кто считает, что, допустив в наши ряды не только реакционера, но и предателя партии, мы поставим под угрозу всю революцию"
 CHI.midgame.036.a: "Узы семьи нельзя стереть"
 CHI.midgame.036.b: "Лояльность к нации превыше всего"

 CHI.midgame.037.t: "Доминирование реорганизованных товарищей"
 CHI.midgame.037.d: "Сильное руководство может объединить и укрепить дело, но, когда слишком много власти концентрируется вокруг одного лидера и его клики, это часто приводит к серьезным последствиям. Ванг и его союзники неуклонно наращивали власть в правительстве, пользуясь своим положением председателя все более слабеющего ЦИК и президента Республики.\n\n Эта почти абсолютная власть над соперниками, однако, также подавила внутреннюю дискуссию и затруднила даже законные претензии к его политике. РАТ и Фракция Резиденции стали более смелыми и высокомерными, и, возможно, еще хуже, чем самоуверенность, то, что они уже начали борьбу за трофеи в основных институтах.\n\nСоперники Вана вряд ли исчезли. Недовольные и уже не чувствующие, что могут добиться перемен по законным каналам, многие склоняются к другим способам отстранения Вана. Если Председатель хочет сделать шаг вперед и проявить себя как мудрый государственный деятель, то сейчас самое время - на карту поставлена стабильность республики"
 CHI.midgame.037.a: "Давайте немного ослабим напряжение"
 CHI.midgame.037.b: "Давайте давить на наше преимущество, пока есть такая возможность!"

 CHI.midgame.038.t: "Доминирование комитета действий"
 CHI.midgame.038.d: "Уничтожение Ван Цзинвэя и его подхалимов - достойное дело для предотвращения тирании в революционном правительстве, но, возможно, в последнее время все зашло слишком далеко. Пока идет борьба между сторонниками Председателя и растущим списком его противников, по всей стране продолжают страдать и гибнуть отважные солдаты Национально-революционной армии и миллионы других людей. Временный комитет действий не стремится уничтожить Гоминьдан вместе с его тщеславным руководством РАТ, напротив, он хочет возродить его изнутри и восстановить законные ценности партии.\n\nТем не менее, яростные нападки на председателя Вана не прекращаются, дестабилизируя правительство в целом и угрожая его делу. Это вызвало недовольство как тех, кто защищает председателя, так и тех, кто провозглашает необходимость сильного лидера для защиты нации. Многие радикалы отказываются от политического плюрализма, осуждая его как способствующий подрывной деятельности, а некоторые прибегают к насилию, чтобы добиться выполнения того, что они считают "порядком""
 CHI.midgame.038.a: "Давайте сбавим обороты атак на председателя"
 CHI.midgame.038.b: "Давайте удвоим наши усилия!"

#LCS Mechanic
 CHI.midgame.039.t: "Когда центр не выдерживает..."
 CHI.midgame.039.d: "По мере роста рядов синдикалистов Союз синдикалистов Китая становится все более расколотой. Изначально Лига была основана Синдикалистской партией Китая как средство консолидации негоминьдановских социалистов в рамках Объединенного фронта, как часть продуманной стратегии сохранения рычагов влияния на переговоры со своим старшим партнером. Это означает, что разрозненная коалиция марксистов, анархистов, синдикалистов и других левых, которые в противном случае не имели бы никаких шансов на власть в первоначальном составе Объединенного фронта, была собрана под шатким знаменем. Теперь Лига страдает от собственного успеха - вся их тяжелая работа и жертвы могут быть сведены на нет, если Лига не сможет в ближайшее время найти направление развития.\n\nКак и Гоминьдан, их либертарианские обещания утопии на время опеки в основном ограничились пустой риторикой. Ортодоксальный истеблишмент СПК фактически построен на совместимости с Объединенным фронтом, готовности к тесному, но независимому сотрудничеству с Гоминьданом. Они представляют себе будущую компромиссную систему, включающую как профсоюзную, так и советскую демократию, что становится все более актуальным по мере выявления недостатков французской системы. Молодое поколение СПК, часто называемое радикалами, по своей ориентации является марксистским. Менее озабоченные, чем их ортодоксальные коллеги, демократией в ближайшей перспективе, они рассматривают профсоюзы как средство достижения цели - способ расширения прав и возможностей пролетариата, от которого в конечном итоге придется отказаться в пользу системы представительства на основе советов.\n\nЗа пределами СПК находится Всемирное общество, продолжение старого китайского анархистского движения. Утописты по своей природе, их члены в значительной степени интегрированы в Гоминьдан и видят будущее, когда Лига войдет в состав их старшей партии. По их мнению, эта опека временна, и впоследствии Гоминьдан (под влиянием Всемирного общества) двинется по направлению гармоничного, свободного будущего"
 CHI.midgame.039.a: "Примите независимый дух радикалов!"
 CHI.midgame.039.b: "Поддерживать устойчивый компромисс ортодоксов"
 CHI.midgame.039.c: "Культивировать идеализм Всемирного общества"

 CHI.midgame.040.t: "Младшая сестра подрастает!"
 CHI.midgame.040.d: "Рост влияния Союза синдикалистов Китая не остался незамеченным Гоминьданом. Хотя в теории они объединяются в единый фронт против империализма и реакционеров, на практике они часто конкурируют за влияние среди схожих по силе студентов, профсоюзов и интеллигенции. Поэтому власть Лиги растет, а вместе с ней растут и ряды ее противников, опасающихся узурпации роли Гоминьдана.\n\nВ качестве доказательства недовольства высшего партийного руководства официальные газеты перестали сообщать об успехах Лиги, преуменьшая ее роль в деятельности Объединенного фронта, а в некоторых случаях даже представляя ее в негативном свете. Заметно охладились дискуссии между конкурирующими лидерами, особенно в условиях, когда молодые активисты начинают проявлять собственную инициативу, чтобы выйти из тени Гоминьдана.\n\nСтолкнувшись с такой ситуацией, лидеры Лиги начали расходиться в подходах. Независимость имеет свои преимущества, позволяя утвердить синдикалистское движение не только как декорацию, но и как сдержки - особенно в условиях, когда власть начинает смещаться. С другой стороны, слишком тесная связь с Гоминьданом вызывает критику за чрезмерную подчиненность - отказ от обещаний синдикалистов в пользу укоренившихся партийных интересов, а не нужд народа"
 CHI.midgame.040.a: "ССК контролирует свое членство"
 CHI.midgame.040.b: "ССК радуется своей независимости!"

###Раздел 2b (200-399): Военное содержание

 CHI.midgame.200.t: "Фракции в Академии"
 CHI.midgame.200.d: "Когда на завершающем этапе Северного похода Национально-революционная армия распалась, ей пришлось пережить потерю любимого преподавателя академии - ныне скандально известного Чан Кайши. Когда остатки НРА, верные левому крылу партии, бежали в зону Миньган, они выдвинули способного генерала Ли Цзишэня на роль директора Вампоа.\n\nСтав титулярным директором и военным министром Гоминьдана, Ли преобразовал и подготовил НРА к освобождению востока Китая. Однако с тех пор круг его обязанностей значительно расширился, и он заявил о своем желании передать ответственность за восстановленную академию кому-то другому. Тем временем в рядах НРА появились штабные офицеры, отличившиеся во время войны Лиги, которые были повышены в звании и заняли новые должности, в частности Хуан Цицян, Чжан Факуй и Сяо Цзиньгуан.\n\nНесмотря на обилие новых вакансий, конкуренция была острой, особенно внутри растущей Академии в отношении преемника Ли. Члены "старой гвардии" НРА, включая офицеров с большим стажем партизанской службы, объединились в Революционную ассоциацию однокурсников Военной академии имени Вампоа (АРОВАВ). Их лидером является Дэн Яньда, бывший начальник политического отдела Вампоа и один из руководителей РАТ.\n\n Им противостоит "Молодая гвардия" армии, состоящая в основном из тех, кто прошел обучение за рубежом в Вампоа в изгнании. Эти офицеры, прошедшие европейскую подготовку, выступают за современный подход к НРА, стремясь превратить ее в действительно подчиненную партии вооруженную силу, опираясь при этом на западную тактику и технологии. Возглавляемые заместителем (и часто исполняющим обязанности) директора школы Вэампоа в период эмиграции Чжан Чжичжуном (сторонником РАТ), их сторонники обмениваются обвинениями со старой гвардией за их "устаревшие" взгляды и терпимость к предполагаемым реакционерам. В свою очередь, офицеры АРОВАВ часто подозревают молодую гвардию в том, что она укрывает в своих рядах ультрарадикалов с потенциально гнусными идеями на будущее."
 CHI.midgame.200.a: "Скоро потребуется новый директор школы..."

#Мероприятия на военной елке
 CHI.midgame.201.t: "Старая гвардия побеждает!"
 CHI.midgame.201.d: "После долгих дебатов в высших эшелонах Национальной революционной армии, НРА решила следовать руководству нового директора школы Вампоа Дэн Янда и его Революционной ассоциации одноклассников Военной академии Вампоа. Поэтому официальная военная доктрина НРА предполагает быстрые боевые действия, направленные на нанесение удара по противнику и его внезапное нападение, с упором на грандиозные окружения против потенциально более многочисленного противника. Многие офицеры, служившие в партизанской зоне, такие как Чжан Юньи, Ван Яову и Сюй Сянцянь, получили повышение по службе.\n\nПосле возвращения Гоминьдана в мир китайской политики АРОВАВ Дэн Янда значительно выросла в численности - в основном за счет выпускников Академии ВАМПА, а также тех, кто лично предан Дэна. Организованная в небольшие ячейки, АРОВАВ ставит своей целью вдохновлять и вербовать новых и бывших членов Вампоа, чтобы они могли укреплять лояльность Временному комитету действий.\n\nКогда НРА раскололась, фракция, лояльная левому Центральному комитету, была отправлена ждать и наблюдать за националистической революцией, происходившей в Индии. Так называемая "Индийская клика" известна в ЦК тем, что она симпатизировала националистической революции, но не всегда была привержена идеалам социализма. Пока Дэн находился за границей, ему удалось установить связи с сочувствующими индийскими ушами, и, что любопытно, офицеры НРА, дислоцированные в Индии, предложили свое членство в АРОВАВ. Учитывая связи Дэна с бывшей 4-й армией НРА и их уважение к генералу, работа с этими офицерами может способствовать дальнейшей поддержке ВКД в НРА"
 CHI.midgame.201.a: "Пригласить Индийскую клику"
 CHI.midgame.201.b: "Мы не можем доверить им руководство революцией"

 CHI.midgame.202.t: "Красный Наполеон"
 CHI.midgame.202.d: "Красноречивый, харизматичный, красивый, дальновидный - такими словами в памфлетах РАТ и АРОВАВ часто описывают директора компании Вампоа Дэн Янда. По мнению некоторых наблюдателей, благодаря своему военному гению и учебе в Европе он заслужил прозвище "Тухачевский Востока" или даже "Красный Наполеон" благодаря значительному влиянию, которое он приобрел в Гоминьдане и Национально-революционной армии. Генерал имеет связи среди гуандунских милитаристов, таких как Чэнь Цзюнмин, Чэнь Миншу и Дэн Кэн, а также среди представителей ССК и консервативного крыла Гоминьдана. Дэн не только солдат, но и, благодаря многолетней учебе и партийной работе, прекрасно разбирается в политике и марксизме. Гордый человек, Дэн считает себя инструментом в большом вращающемся колесе судьбы - революция в Китае является неизбежной частью мировой истории.\n\nХотя немногие утверждают, что в Китае мало таких исключительных людей, как генерал Дэн Яньда, есть и те, кто относится к его высокомерию с большим отвращением. В своих выступлениях перед членами АРОВАВ он уподоблял СПК двенадцати апостолам Иисуса Христа, а себя - Христу, готовому пойти на крестную жертву ради спасения страны. Его частое участие в критике Ван Цзинвэя вызвало яростную ненависть со стороны членов РАТ, таких как Чэнь Гунбо и фракции Резиденции. Среди более радикальных членов НРА ходят слухи, что Дэн - просто романтический глупец, который может довести Китай до хаоса.\n\nНесмотря на это, Дэн пользуется большим уважением в АРОВАВ и у многих так называемых "старых гвардейцев" НРА. И хотя наличие собственного "красного Наполеона", безусловно, поднимает боевой дух, возможно, нам стоит сбавить обороты в риторике подобных восхвалений - чтобы не раскалывать единство партии еще больше."
 CHI.midgame.202.a: "Такого, как наш генерал, больше нет!"
 CHI.midgame.202.b: "Может быть, мы можем немного сбавить тон"

 CHI.midgame.203.t: "Триумф молодой гвардии"
 CHI.midgame.203.d: "После долгих дебатов в высших эшелонах Национально-революционной армии НРА решила назначить Чжан Чжичжуна в качестве нового директора Военной академии Вампоа. В этом плана НРА будет следовать предложению Чжана и "Молодой гвардии" о создании НРА по образцу армий Запада с упором на скорость, сокращение сил и высокоцентрализованную структуру военного командования. Несколько ведущих офицеров из Европы также получили повышение, включая Ни Жунчжэня и Ду Юмина (последний фактически является членом АРОВАВ Дэн Яньда, но, тем не менее, пообещал сотрудничать с новым директором из-за своего интереса к бронетехнике). Любопытно, что в ходе последних назначений были выдвинуты члены Общества возрождения Китая, в том числе Хэ Чжунган и Дэн Вэньи. Хотя они выглядят как армейские реформаторы и модернисты, ходят слухи, что у них гораздо более радикальные планы относительно направления развития НРА.\n\n Кроме того, любопытен интерес к растущей значимости Общества возрождения Китая и "европейских репатриантов" Для некоторых в зоне Миньган руководство в последнее десятилетие было, мягко говоря, децентрализованным, а некоторые члены Миньгана предпочитали ностальгировать по ушедшей эпохе, когда Академию возглавлял любезный директор, чьи слова подкреплялись непрерикаемым авторитетом. В результате некоторые из тех, кто был в НРА во время мятежа, все же начали идеологический поворот в сторону растущего влияния так называемой Молодой гвардии. Конечно, Молодая гвардия принесёт новую жизнь в Вампоа, а новоназначенный директор уже провозгласил, что при нём НРА станет самой соверменной армией мира. Тем не менее, в последнее время стали появляться и распространяться более радикальные идеи - идеи, связывающие революцию с максимализмом, Савинковым и Сорелем. Только время покажет, реальна ли эта угроза радикализма"
 CHI.midgame.203.a: "Для победы нам нужны свежие идеи"
 CHI.midgame.203.b: "Их идеи ужасно радикальны"

 CHI.midgame.204.t: "Объединенный фронт и Вампоа"
 CHI.midgame.204.d: "Несмотря на политику единого фронта Гоминьдана с Союзом синдикалистов Китая, политика партии "данго" теоретически выделяла только тех, кто состоял в Гоминьдане, для обучения в залах Вампоа. Тем не менее, в духе первой политики единого фронта Академии, членам Синдикалистской партии Китая разрешено поступать в Вампоа, несмотря на членство как в СПК, так и в Гоминьдане.\n\nМеждународная военная миссия в Китае (МВМК), тем не менее, предложила Гоминьдану смягчить свою жесткую политику в отношении выращивания членов партии в Вампоа. Они утверждают, что если Гоминьдан действительно хочет стать авангардом свободного Китая, то он должен быть открыт к идее приема в ряды академии других патриотически настроенных китайских революционеров. Более того, они хотели бы иметь возможность спонсировать отдельных членов ССК для обучения в Вампоа в соответствии с предлагаемой ими реформированной политикой.\n\n Хотя этот шаг был тепло встречен Го Моруо (членом ССК в политическом отделе Гоминьдана) и более радикальными членами Лиги, которые не имеют совместного членства, а в основном верны Синдикалистской партия Китая, это предложение также было встречено с недовольством, особенно среди более консервативных членов партии. По их мнению, привлечение новобранцев из социалистических лиг или профсоюзов, не входящих в Гоминьдан, приведет к размыванию идеалов как партии, так и армии. В связи с этим был предложен компромисс - допустить в новые ряды только определенное количество синдикалистов из СПК"
 CHI.midgame.204.a: "Разрешить вступать в партию любому представителю Национальной революции"
 CHI.midgame.204.b: "Разрешить только ограниченное представителсьтво СПК"
 CHI.midgame.204.c: "Строго придерживаться однопартийной позиции"

 CHI.midgame.205.t: "Отдел пропаганды"
 CHI.midgame.205.d: "В мае 1924 года первые курсанты Вампоа прошли политическую подготовку в недавно созданном политическом отделе Академии, вдохновленном революционными тенденциями в мире. В это время официальным руководителем отдела был назначен Ляо Чжункай. В то же время такие видные члены партии, как Дай Цзитао, Ван Цзинвэй и Ху Ханьмин, читали лекции по политическим дисциплинам. С этим первым классом регулярно проводились политические беседы, так как они были организованы в Образцовый полк - предшественник Первой армии НРА.\n\ С восстановлением Вампоа политический отдел был восстановлен, а генерал Чжоу Эньлай вновь занял пост главы политического отдела. При поддержке некоторых представителей РАТ и ССК Чжоу занимает должность, которая позволяет студентам читать о социализме, истории французской и британской революций, марксизме. Тем не менее, на лекциях процветают и другие идеи - известно, что генерал Дэн Яньда часто призывал своих солдат искать крестьян в сельской местности и жить среди них. На других занятиях обыгрывается идея исполнения воли покойного доктора Суня с обещанием, что, возможно, на этот раз Гоминьдан добьется успеха. Были и лекции более националистически настроенных и радикально настроенных офицеров, которые вместо этого делали упор на возрождение революции против истинных внутренних и внешних врагов Китая"
 CHI.midgame.205.a: "Восхвалять защиту крестьян"
 CHI.midgame.205.b: "Сделайте акцент на социалистической революции"
 CHI.midgame.205.c: "Подчеркнуть националистическое начало"
 CHI.midgame.205.e: "Обыграть наследие Сунь Ятсена"
 CHI.midgame.205.f: "Обратите внимание, что мы не одиноки в этой борьбе"

 CHI.midgame.206.t: "Фуцзяньское военно-морское сообщество"
 CHI.midgame.206.d: "Фуцзянь является домом для процветающего военно-морского сообщества благодаря своему стратегическому положению и прибыльной прибрежной торговле на протяжении многих лет. Например, в Фучжоу находятся такие крупные военно-морские учреждения, как Фучжоуское бюро судоходства, Фучжоуская академия судоходства и Мавэйская военно-морская академия. Даже с учетом того, что города-легионеры установили дальнейший контроль над регионом, фуцзяньцы часто доминируют в военном и гражданском флоте. Расположенный дальше к северу регион Цзяннань также конкурирует как центр военного и торгового судоходства. Цзяннаньская верфь и военно-морская академия Усун в Шанхае, а также Цзяннаньская военно-морская академия вблизи Нанкина поставляют корабли и моряков для развивающейся страны.\n\nПосле победы революционеров, ранее базировавшихся в Фуцзяни, и создания временной столицы в Нанкине, вполне естественно, что оба региона доминируют в нашем небольшом флоте. Однако, как и в большинстве случаев при новом правительстве, ситуация быстро разделилась на фракции. Ли Чжилун, выпускник Усуна и учившийся за границей в период эмиграции, объединил группу офицеров, прошедших обучение в Интернационале, и офицеров, получивших образование в военно-морской академии Вампоа, и потребовал создания строго социалистического, революционного флота. Они утверждают, что при ограниченном количестве офицерских мест их вполне можно заполнить преданными революционерами, и в любом случае иностранные офицеры обладают более высоким качеством.\n\nЧэнь Шаокуан и Чэнь Цзилян, уроженцы Фуцзяни и выпускники Цзяннаньской военно-морской академии, выступают за более широкий прием таких же бывших сотрудников Лиги, как они сами. Они мечтают о гораздо большем флоте и призывают к мягкой программе политической реабилитации, требующей лишь проверки известных сторонников Гоминьдана. Учитывая переменчивый характер лояльности в период мятежа и тесные семейные связи в регионе, это даст существенное преимущество старому руководству Миньгана"
 CHI.midgame.206.a: "Сохраните чистоту революции"
 CHI.midgame.206.b: "Большой флот - наш щит"

 CHI.midgame.207.t: "Центральная военно-морская академия"
 CHI.midgame.207.d: "Море и реки - это жизненная сила для большей части Пяти Провинций, и в нашей революции мы зависим от доступа к международным поставкам помощи и регулярных пожертвований от магнатов компрадорской буржуазии. В течение большей части эпохи поздней Цин военно-морской флот был сильно децентрализован и находился в ведении региональных руководителей, а координация действий практически отсутствовала. Эта проблема усугублялась урезанием финансирования флота в эпоху милитаристов, что еще больше ослабило наш военно-морской потенциал.\n\nНо медленно и верно ситуация, похоже, готова измениться. Высшие офицеры ВМС предложили заложить основу для восстановления китайского флота, чтобы он соответствовал по мощи империалистическим державам. Этот процесс может занять годы, но основные приготовления можно начать практически сразу. Они заняли здание старой военно-морской академии Цзяннань, превратив его в штаб-квартиру ВМС Китайской Республики.\n\n Однако их рвение и грандиозные планы вскоре натолкнулись на противодействие высшего руководства Национально-революционной армии, которое потребовало полной модернизации флота в рамках централизованной структуры управления. Однако вместо того, чтобы предоставить флоту равное место за столом переговоров, очевидно, что их концепция предполагает подчинение нового флота армии, что подтверждается планом НРА по созданию собственного военно-морского училища под юрисдикцией сухопутных войск. Офицеры ВМФ протестуют против того, что генералы просто не понимают военно-морского дела, и флот должен быть отдельной отраслью, расширяя головную боль, которую теперь вынуждена решать комиссия по военным вопросам."
 CHI.midgame.207.a: "Революция совершается на суше, все остальное вторично"
 CHI.midgame.207.b: "Адмиралы лучше всех знают, как защитить побережье от захватчиков"

#Цепь разведки
 CHI.midgame.208.t: "Внутренняя безопасность партии"
 CHI.midgame.208.d: "Несмотря на то, что революция вначале была успешной благодаря недавним победам НРА в войне Лиги, для многих в партии все еще остается много империалистов, военачальников, раскольников, контрреволюционеров и реакционеров, которые скрываются даже среди самой партии. В связи с этим ЦК собрался на краткое экстренное совещание, чтобы определить будущее аппарата внутренней безопасности партии.\n\nПо инициативе Реорганизованной ассоциации товарищей Политический отдел под руководством выдающегося генерала Чжоу Эньлая предложил создать "Отдел специальной службы Центрального комитета" (Чжунъянь тэке). Вместе со своими главными лейтенантами Гу Шуньчжаном, Сянь Чжунфа и Сюн Сяньхуэем "Тэке" призван обеспечивать соблюдение социалистической ортодоксии партии, а также эффективно искоренять сопротивление на местах. Члены организации, получившей прозвище "Красный отряд", в основном проживают в Городах-концессиях и имеют связи с большим количеством людей, от синдикалистских профсоюзов до бандитов.\n\n В то же время члены Национально-революционной армии стремились продвинуться вперед, используя наработанные Дай Чуньфэном связи в шанхайском подполье для создания Национального бюро расследований и статистики "Цзунтун" Выросшая из подпольной тайной деятельности, имеющая обширные связи с криминалом и "националистическими" бандами, Цзунтун известна некоторым братским и полуэзотерическим поведением - со своей собственной теневой "Лигой Десяти", которая исповедует только абсолютную преданность своему Лаобану, Дай Чуньфэну.\n\nВ качестве компромисса члены партии предложили объединить обе планируемые организации в единое Министерство Государственной Безопасности. Этот план, все более обеспокоенный растущей фракционностью внутри Гоминьдана, предполагает передать руководство государственной безопасностью Дай Чуньфэну, предоставив при этом значительные полномочия Чжоу и Политическому департаменту в решении внутренних дел."
 CHI.midgame.208.a: "Усилить Тэке Чжоу Эньлая"
 CHI.midgame.208.b: "Проспонсировать Цзунтун"
 CHI.midgame.208.c: "Объединить обе службы в МГС"

 CHI.midgame.209.t: "Героизм тэкинцев налицо!"
 CHI.midgame.209.d: "Прозванный "Чжунъянь теке", Отдел специальных операций ЦК является детищем главы политического отдела - генерала Чжоу Эньлая. В состав организации входят в основном молодые добровольцы, люди, связанные с синдикалистскими профсоюзами, и некоторые шанхайские бандиты. Организация состоит из четырех отделов: Первый отдел (Отдел общей службы) занимается охраной членов ЦК, второй (Разведывательный отдел) - сбором разведданных о внешних и внутренних врагах, третий (Оперативный отдел, известный также как Красный отряд) - убийствами, четвертый - Отдел связи, отвечающий за секретные коды и коммуникации.\n\nОдин из последних подвигов организации связан с освобождением видного китайского синдикалиста Жэня Биши. Жэнь был предан Бай Синем, бывшим выпускником Вампоа, который разочаровался в своем деле. На подпольном синдикалистском митинге в Шанхае представители Городов-концессий, получив информацию от Бай Синя, ворвались в зал собрания и арестовали Жэня на месте. Когда его везли в полицейском грузовике в особняк Фань Чжэнбо (капитана полиции Шанхая), сотрудники оперативного отдела устроили засаду с пистолетами и автоматами. В хаосе боя Бай Синь попытался скрыться с места происшествия, но был пойман и впоследствии ликвидирован в ходе операции.\n\nОперация была оценена как полностью успешная с минимальными потерями со стороны партии, а также Союза синдикалистов Китая за поддержку своих коллег-социалистов. Поскольку операция проводилась на территории Городов-концессий, она также рассматривается как победа над иностранным империализмом. Члены ЦК предлагают использовать силу Тэке и дальше, утверждая, что она может быть использована либо для внутреннего укрепления партии, либо для подавления внутреннего инакомыслия, либо для привлечения поддержки среди социалистических групп и организаций-единомышленников."
 CHI.midgame.209.a: "Усилить партию"
 CHI.midgame.209.b: "Пресечение деятельности партийных диссидентов"
 CHI.midgame.209.c: "Умиротворение Объединённого фронта"

 CHI.midgame.210.t: "Цзунтун на марше!"
 CHI.midgame.210.d: "Получив финансирование для реализации своих планов, Лига Десяти приступила к основанию Цзунтун (Национального бюро расследований и статистики). Созданное на основе теневых связей Дай Чуньфэна с шанхайским националистическим подпольем и существующим аппаратом военной разведки, это новое ведомство готовится к наступательным действиям - проникновению и дестабилизации противоборствующих группировок в Китае. Дай поставил перед своими агентами три приоритетные задачи, которыми они должны руководствоваться в ближайшие годы.\n\n1.) Обеспечить безопасность лидера. Несмотря на то, что теперь они официально независимы от личного штаба Ху Цзуннаня, очевидно, что Дай остается важным помощником генерала и его клики офицеров-экстремистов.\n\n2) Не секрет, что они считают Вана недостойным лидером и хотят его сменить.\n\n2) Наказание за коррупцию. Лига была известна спартанской, братской рабочей средой, в которой смешивались конфуцианство и революционный национализм, чтобы стать, как они говорят, современными рыцарями-эррантами (по иронии судьбы, Дай осознает, что у него нет прямого военного опыта по сравнению с его одноклассниками из Вампоа). Цзунтун непреклонно стремится к искоренению внутренней коррупции и ксенофобски воспринимает и Реконструкцию, и СПК как иностранных лакеев.\n\n3.) Уничтожить все контрреволюционные силы. Цзунтун полностью предан националистическому делу и с головой погрузился в выполнение поставленной задачи. По всей стране создаются ячейки, агенты внедряются в общество. Священнослужителей, политиков, представителей прессы склоняют, подкупают или принуждают к службе, а Дай уже начал завязывать связи с кинозвездами, плейбоями и оперными артистами. Даже множество китайцев за границей были завербованы в эту растущую разведывательную службу"
 CHI.midgame.210.a: "Для настоящего лидера безопасность превыше всего!"
 CHI.midgame.210.b: "Измена в партии будет искоренена!"
 CHI.midgame.210.c: "Мы ускорим падение реакционерства!"

 CHI.midgame.211.t.juntong: "Сформировано агентство Цзунтун"
 CHI.midgame.211.t.teke: "Сформировано агентство Теке"
 CHI.midgame.211.intro: "Агенты Гоминьдана в действии! После победы над Лигой Гоминьдан и его союзники стали более многочисленными, а их сторонники разбросаны по всей стране. Некоторые из них - истинно верующие, воспитанные на обещаниях социализма и недовольные существующим положением вещей. Некоторые - ветераны различных республиканских армий Китая, связавшие свою судьбу с новой надеждой. Многие - выпускники Whampoa, чей националистический или революционный дух был возрожден возвращением партии. Но многие - просто мужчины или женщины, имеющие свои личные обиды или, возможно, подкупленные перспективой социальной мобильности"
 CHI.midgame.211.d.CHI.juntong: "$CHI.midgame.211.intro$\n\nДай Чуньфэн тщательно организовал свои отряды, выбирая лидеров, часто из людей, которых он знал еще по временам работы в Whampoa. Чжэн Цзэминь был отправлен на юг, чтобы разбить лагерь в Гуандуне, а отделение в Хунани было поручено Тан Цзуну. Далее на запад в горах были созданы ячейки под руководством Цю Кайцзи в Куньмине и Цзэн Гуанцина в Чэнду. В северном направлении были возобновлены действия прекративших существование ячеек под руководством Цяо Цзяцая и Ма Ханьсаня, установлены контакты с маньчжурскими борцами за свободу под руководством Гуань Сяньина. В различных городах легации были назначены различные начальники станций, среди которых особенно выделяется начальник станции в Шанхае Шэнь Цзуй. Ближе всех к центру власти находится друг детства Дая - Мао Ренфэн, назначенный на восток. Помогает им координировать работу Вэй Дамин, видный офицер связи.\n\nЭти люди и сотни их подчиненных отправились в чрево зверя, подвергая свою жизнь опасности ради дела. Мы можем только надеяться, что однажды их жертвы будут оправданы"
 CHI.midgame.211.d.juntong: "$CHI.midgame.211.intro$\n\nКак бы то ни было, источник достаточно очевиден. [CHI.Capital.GetCapitalVictoryPointName] санкционировало создание скромно названного Национального бюро расследований и статистики (также известного как "Цзюньтун") для координации существующих тайных сетей. Во главе со скрытным Дай Чуньфэном отряды, организованные доверенными лицами Дай, были развернуты по всей стране для создания "спящих ячеек" в различных провинциях. Он воспользовался своими связями в криминальной среде на побережье, что стало результатом деятельности его старой \"Лиги Тен\", но он не обычный гангстер - его люди отличаются фанатичным национализмом и преданностью делу. Их практическая способность подорвать наше правительство сомнительна, и большая часть их деятельности была сведена к пустой болтовне, но мы должны быть бдительны в любом случае"
 CHI.midgame.211.d.CHI.teke: "$CHI.midgame.211.intro$\n\n Чжоу Эньлай усердно работал над созданием своего агентства, в котором собраны люди из самых разных слоев общества. Многие старшие офицеры - выходцы из \"Красного отряда"\ и давние партийные функционеры, однако Чжоу тщательно отбирал агентов, не имевших длительного социалистического стажа, позволяя им вписаться как внутри партии, так и за ее пределами. Были созданы четыре оперативные секции: секция общих дел, секция информации, секция радиосвязи и секция действий. Учитывая занятость Чжоу в других сферах деятельности, его главные лейтенанты Чэнь Гэн, Гу Шуньчжан и Сян Чжунфа часто занимались повседневным руководством "Теки""
 CHI.midgame.211.d.teke: "$CHI.midgame.211.intro$\n\nКак бы то ни было, источник достаточно очевиден. [CHI.Capital.GetCapitalVictoryPointName] санкционировал создание Отдела специальных операций Центрального комитета (также известного как "Теке") для координации существующих подпольных сетей по всей стране. Во главе с выдающимся революционером, пропагандистом и координатором разведки Чжоу Эньлаем, сформировавшим ядро оперативных сотрудников, известных как "Красный отряд"\, эти агенты были направлены даже в самые отдаленные уголки страны. Безжалостные и ретивые, они, тем не менее, вряд ли смогут напрямую подорвать наше правительство. Однако очевидно, что национальные амбиции Гоминьдана растут"
 CHI.midgame.211.a: "Что произойдет, если они проснутся?"
 CHI.midgame.211.b: "Вперед, рыцари революции"
 CHI.midgame.211.c: "Нас так просто не запугаешь"
 CHI.midgame.211.d: "Мужественные люди в тяжелые времена"

 CHI.midgame.212.t: "Неполноценность МГБ"
 CHI.midgame.212.d: "Красные отряды и Лига десяти, как масло и вода, плохо сочетаются друг с другом. Находясь в ведении Министерства государственной безопасности, эти конкурирующие группировки почти постоянно враждовали, несмотря на первоначальные попытки объединить революционные ведомства. В результате была предпринята попытка разделить их по разным ведомствам: "Красный отряд" занялся внутренними делами, а "Лига" - внешними.\n\n Это тоже не принесло успеха. Как ссорящиеся дети, они борятся за контроль над многими прибыльными функциями, такими как сбор налогов и тарифов, поддержание контрабандных сетей, тайная полиция и сбор внешней разведки. Поверхностный аудит выявил множество параллельных организаций, и значительные ресурсы тратились на шпионаж друг за другом, а не на выполнение своей работы. Однако последней каплей для многих членов ЦИК стало решение сторонников Дай Чуньфэна и Чжоу Эньлая выступить в прессе, обвиняя друг друга в краже заслуг и подрыве МГБ.\n\nПосле того как Дай выставил себя на всеобщее обозрение и терпение его иссякло, Дэн Яньда наконец сделал свой ход. Он предложил уволить Дая с поста и.о. главы министерства и ограничить влияние Чжоу, создав вместо него новую должность министра внутренних дел. Он выдвинул Чжана Юнчуаня, офицера АРОВАВ, который пообещал реконструировать МГБ с нуля, фактически отодвинув на второй план и "Красный отряд", и "Лигу десяти"\n\n Некоторые задаются вопросом, не этого ли все время добивалась ВКД - возможности поставить своего человека в кабинет министров. Столкнувшись с этой угрозой, обе фракции МСС не раз клялись, что откажутся от междоусобиц и что все возникающие проблемы - это всего лишь проблемы роста. Это не слишком правдоподобное утверждение, но, с другой стороны, что бы мы ни выбрали, дальше все равно может быть только вверх"
 CHI.midgame.212.a: "Мы разберемся с этим"
 CHI.midgame.212.b: "Начнем с нуля"

#ЧемпионскиеМеханическиеСобытия
 CHI.midgame.213.t.deng: "Чемпион для рабочих и крестьян?"
 CHI.midgame.213.t.zhou: "Превосходство политического департамента"
 CHI.midgame.213.t.hu: "Восходящая звезда новой НРА"
 CHI.midgame.213.t.zhang: "Герой Железной армии"
 CHI.midgame.213.t.xiao: "Генерал-синдикалист"
 CHI.midgame.213.t.li: ""Беспартийный" бастион НРА"
 CHI.midgame.213.d.deng: "Если бы у Национально-революционной армии было лицо после безвременной кончины генерала Чана, то это был бы Дэн Янда. Его богатая карьера привела его в залы Вампоа, в города Европы, на холмы Цзянси, а теперь и на поля сражений по всему Китаю. С каждым успехом его известность растет, создавая мощное ядро для тех, кто ищет альтернативу правлению Вана. Но по мере роста его престижа иногда даже его ближайшие союзники опасаются, что он летит слишком близко к солнцу, и быстро появляются уничижительные отзывы о "красном Наполеоне" Однако на данный момент общественное мнение остается на его стороне, как и армия, которая греется в лучах воинской славы."
 CHI.midgame.213.d.zhou: "Если кто и может спасти Национально-революционную армию от коррупции, так это Чжоу Эньлай. Дипломатичный и скромный, но при этом убежденный приверженец социалистической идеологии, он является давним фаворитом Международной военной миссии в Китае как образец красного офицера. Хотя многие сомневались в том, что политический офицер, инструктор Вампоа и мелкий партизан сможет эффективно действовать в полевых условиях, доверие оправдалось благодаря его решительному руководству в бою. Ожидается, что его престиж, находящийся на пике, будет способствовать приближению Национально-революционной армии к его лагерю, помогая отбиваться от нелояльных военных кабалов, угрожающих национальной стабильности."
 CHI.midgame.213.d.hu: "Созданные для того, чтобы создать силу, полностью лояльную Гоминьдану, выпускники Вампоа мужественно сражались за партию. Но иногда Национально-революционная армия может жить своей собственной жизнью, требуя революции даже внутри партии. Ху Цзуннань - ветеран одних из самых ранних походов Гоминьдана, но в 1927 году он был лишен шанса на славу. Тем не менее он наверстал упущенное время своими последними достижениями на полях сражений. Его успехи трудно оспорить, но возникает вопрос, действительно ли эти победы идут на пользу партии. Рвение и жестокость людей Ху вызывают серьезную озабоченность в ЦИК, хотя у них нет иного выбора, кроме как восхвалять его на публике."
 CHI.midgame.213.d.zhang: "Чжан Факуй был личным телохранителем доктора Суня и сражался за Гоминьдан на протяжении всей эпохи милтаристов. Во время Северного похода он стал командующим легендарной Четвертой "Железной" армии, но в период изгнания был отодвинут на второй план и отправлен в Индию для консультирования их войск. Однако после возвращения он охотно перехватывает инициативу на поле боя и добивается многочисленных успехов. С каждой победой он повышает влияние своей "индийской клики", состоящей из правоцентристских офицеров, тесно связанных с Фракцией Реконструкции. Насколько это может успокоить неспокойную обстановку в армии, а не обострить существующие противоречия, пока не ясно."
 CHI.midgame.213.d.xiao: "Во многих отношениях Сяо Цзиньгуан - маловероятный военный герой китайской революции. Он родился в неблагополучной семье в Хунани, его отец и дед скоропостижно скончались. Тем не менее, он добился известности, вступил в только что созданную СПК и уехал за границу изучать военную теорию во Франции. Посторонний человек в армии, не получивший образования и не преподававший в Вампоа, его путь к командованию был очень тернист. Но, получив шанс, он одержал множество побед на поле боя. Руководство ССК ставит его в пример молодому поколению офицеров-синдикалистов, пытающихся пробиться в высшие эшелоны, где доминируют члены Гоминьдана и выпускники старого Вампоа."
 CHI.midgame.213.d.li: "Ли Цзишэнь - человек с богатой карьерой, которому пришлось выполнять нелегкую работу военного министра, политического посредника и действующего генерала Национально-революционной армии. Его недавние победы способствовали созданию образа \"беспартийности\" в высшем командовании, избегая враждебных ссор политического руководства Гоминьдана. При этом Ли обязан своей работой не только военному делу, но и политике: в прошлом он сотрудничал с различными политическими группировками Лянгуана - Ху Ханмином, Чэнь Цзюньмином и даже с кликой 'Новый Гуанси'. Он использовал эти связи, чтобы выставить себя в качестве посредника, но некоторые задаются вопросом, не скрывает ли это его истинную лояльность правым... или самому себе."
 CHI.midgame.213.a: "Герой-социалист? Или бонапартист?"
 CHI.midgame.213.b: "Молодое лицо для новой НРА"
 CHI.midgame.213.c: "Бесстрашный командир, но иногда он пугает..."
 CHI.midgame.213.d: "Похоже, его карьера еще не закончена"
 CHI.midgame.213.e: "Кто-то должен бороться за пролетариат"
 CHI.midgame.213.f: "Голос разума в эти нестабильные времена..."

 CHI.midgame.215.t: "Изгнанники из Лянгуана"
 CHI.midgame.215.d: "С момента прихода к власти в Лянгуане генерал правого Гоминьдана Ли Цзунжэнь открыто заявлял о своей враждебности к левым в своей провинции, особенно к членам Синдикалистской партия Китая. Теперь, когда он наконец-то централизовал власть вокруг себя, Ли начал репрессии против левых в армии и правительстве, что привело к тому, что многие бежали от преследований к более дружественному правительству.\n\nСегодня некоторые из них прибыли в город [CHI.Capital.GetCapitalVictoryPointName], присягая на верность Гоминьдану и предлагая свою помощь в наших революционных усилиях. Среди них - генерал Е Цзяньин из Гуандуна, который, будучи убежденным членом СПК, после предательства Чэнь Цзюнмина взял в руки оружие и помог Сунь Ятсену бежать из Гуанчжоу. Вместе с ним идет генерал Лю Фэй. Бывший офицер Гуанси и член Гоминьдана, он, тем не менее, стал объектом преследования со стороны правых, вероятно, из-за подозрений в синдикалистских симпатиях. Последний - Тань Пиншань. Бывший член Тунмэньхуэй и ведущий деятель гуандунского отделения СПК, он, несомненно, стремится довести революцию в Китае до конца. Тан также выражал симпатии к Дэн Яньда и, несомненно, был бы компетентным посредником, работающим на нашу коалицию, если бы ему предоставили такую возможность.\n\n Тем не менее, некоторые несогласные предлагают нам отказаться от их предложения. Действительно, опасения, что их заявления о преследованиях на самом деле являются ложью и попыткой шпионов получить доступ к высшим эшелонам власти и армейского командования, вызывают тревогу."
 CHI.midgame.215.a: "Мы приветствуем наших товарищей по революции"
 CHI.midgame.215.b: "Мы не можем им доверять"

#Другие события в Средней Азии
 CHI.midgame.218.t: "Комиссия по военным делам"
 CHI.midgame.218.d: "Комиссия по военным делам (КВД) была первоначально создана в Гуанчжоу как средство контроля, надзора и управления Национально-революционной армией в период ее становления. Первоначально она состояла из 64 человек, но к моменту смерти доктора Суня ее состав был сокращен до 26 человек, а затем и до совета, в который вошли Ван Цзинвэй, Сюй Чунчжи, Ляо Чжункай, Ху Ханьмин, Тан Янкай, Чан Кайши, Михаил Бородин и У Чаошу. В последующие годы в состав штаба вошли Чэн Цянь, Ли Цзишэнь и Чэнь Гунбо, а также союзные военачальники Ли Цзунжэнь, Хуан Шаохун, Фэн Юйсян, Ли Фулинь и Гу Инфэнь.\n\n Междоусобица в КВД не принесла ей пользы во время Северного похода, когда Чан пытался силой заставить Вана уступить ему пост председателя, обвиняя Вана в некомпетентности в военных делах. С тех пор большинство его старых членов тоже ушли - Тан и другие милитаристы ушли, Ху и Сюй были казнены, Бородин отозван и заменен Мальро, Чан был убит во время экспедиции.\n\nПосле недавнего восстановления координации действий новой Национально-революционной армии многие опасаются повторения прежних сражений за контроль над КВД. Военное руководство винит в своих прежних неудачах вмешательство гражданских и посторонних лиц, требуя назначать только президента и старших командиров. Это оспаривается теми, кто считает, что НРА должен быть подотчетен, осуждает независимую линию, поощряемую Чангом, и настаивает на дальнейшем гражданском контроле со стороны Центрального исполнительного комитета. Объединенный фронт при поддержке МВМК также настаивает на справедливом мнении, что еще больше усложняет ситуацию - он настаивает на присутствии в комиссии представителей ССК и советников. Однако ситуация на местах требует скорейшего принятия решения о численности и составе этого органа"
 CHI.midgame.218.a: "Военные должны заниматься военными вопросами"
 CHI.midgame.218.b: "Разрешить гражданский контроль только ЦИК"
 CHI.midgame.218.c: "Широкий спектр мнений всегда полезен"

 CHI.midgame.220.t: "Корейская национально-революционная партия"
 CHI.midgame.220.d: "В рамках стремления китайского Гоминьдана не только к национальной революции, но и к освобождению остальных азиатских народов от империализма, между Гоминьданом и Корейской национально-революционной партией (КНРП)\n\nОснованная корейскими эмигрантами в Китае и возглавляемая Ким Вонбоном (корейским революционером, вступившим в академию Вампоа незадолго до Северного похода), КНРП претендует на роль \"сестры\" партии КМТ. Будучи корейской националистической партией, КНРП в целом является социалистической партией, которая также исповедует адаптацию и следование "Трем принципам народа" Поскольку корейский народ, как и китайский, угнетен и живет под гнетом японского империализма, связи между этими двумя народами очень сильны. Поскольку конфликт между Японской империей и Китаем, возглавляемым националистами, кажется неизбежным, многие корейские эмигранты считают, что, сотрудничая с китайцами, они смогут однажды добиться независимости с китайской помощью.\n\nТакже, согласно официальному приказу НРА, звание и статус Ким Вонбона были восстановлены в качестве официального солдата НРА. Он командует Освободительной армией Кореи, батальоном, состоящим из таких же патриотичных корейских добровольцев, включая молодого Чан Чхоль Бу, с великой целью - однажды вернуться домой в Корею в качестве освободителей"
 CHI.midgame.220.a: "Мы приветствуем наших корейских товарищей!"

 CHI.midgame.221.t.india: "Приветствую вас из [CHI.Capital.GetCapitalVictoryPointName]"
 CHI.midgame.221.t.china: "Миссия в [HND.Capital.GetCapitalVictoryPointName]"
 CHI.midgame.221.d.india: "На всем континенте антиколониальные настроения охватили китайскую нацию. Среди них - Гоминьдан Китая, националистическая, авангардистская партия, построенная на "трех принципах" Сунь Ятсена. Гоминьдан, в котором преобладают левые, изгнал различных полевых командиров, захвативших восточное побережье, а недавно начал работу с правительствами своих единомышленников.\n\n Будучи одним из крупнейших революционных правительств, добивающихся освобождения своей страны от колониальных оков, Гоминьдан считает нас родственными душами. В некотором роде эта работа началась еще в 1907 г., когда китайские революционеры в изгнании совместно с индийскими и японскими революционерами создали \n\n "Азиатское гуманитарное братство"\n\nВремена, однако, сильно изменились. Неудача Северного похода в 1927 г. разрушила первоначальные шансы китайцев на объединение нации, и они продолжили дрейфовать влево. Небольшой отряд китайских советников был послан нам на помощь в 1934 г., но с тех пор вернулся домой, однако китайцы не преминули отметить это как доказательство возможности плодотворного сотрудничества.\n\n Даже если они вернулись, нет никакой гарантии их успеха. И даже если бы они добились успеха, мощь Японии продолжает расти, и она, так или иначе, может вступить в конфликт с китайцами. Кроме того, остаются споры о китайско-индийских границах и статусе Тибета, поскольку гоминьдановцы уходят в реваншизм.\n\nПоскольку китайцы предлагают взаимно признать друг друга, мечта о паназиатском сотрудничестве кажется туманной. Но, может быть, мы еще мечтаем?"
 CHI.midgame.221.d.china: "На всем континенте освободительная лихорадка охватила Индию, и народ восстал против своих британских угнетателей! В результате Индийский национальный конгресс и его союзники основали правительство [HND.GetNameDef], которое служит постоянным свидетельством непрекращающегося призыва к свободе.\n\n Часто работая параллельно с нашими собственными усилиями в 1920-е годы, [HND.GetAdjectiveCap]ы часто рассматриваются как родственные души с нашими. В некотором роде этот обмен идеями начался еще в 1907 г., когда изгнанные китайские революционеры совместно с индийскими и японскими революционерами образовали \n\n "Азиатское гуманитарное братство"\n\nПока мы работаем над освобождением своей родины, нам необходимо помнить и о других странах Азии, нуждающихся в освобождении. Прямым примером такого паназиатского партнерства, не зависящего от заблуждений Японии, стала китайская военная миссия, направленная в Индию в 1934 году под командованием Чжан Факуи. Конечно, в дальнейших связях остается немало препятствий, таких как вопрос о границах и противостоянии японской угрозе. Но пока мы приветствуем наших революционных товарищей, идущих к свободе (и будем надеяться, что они пойдут туда же)!"
 CHI.midgame.221.a: "Мы будем наблюдать за ними с большим интересом"
 CHI.midgame.221.b: "Просто еще одна будущая проблема региона"
 CHI.midgame.221.c: "Мы выражаем надежду на плодотворное будущее!"
 
 CHI.midgame.222.t: "Оружие для индокитайской революции"
 CHI.midgame.222.d: "Храбрые повстанцы стран Индокитая мужественно сражаются против подлых [GEA.GetAdjectiveCap]их империалистов, и поскольку наши позиции в Восточном Китае надежно защищены, самое время поддержать наших революционных товарищей. В конце концов, немецкая интервенция в 1927 году как ничто другое показала, что наша борьба взаимосвязана.\n\nВьетминь - это коалиция разрозненных социалистических групп, объединенных под одним знаменем, и на протяжении многих лет существовали различные точки соприкосновения. Например, несколько человек учились в Вампоа, а несколько десятков даже сражались с нами во время Минганского восстания. Другие проходили обучение у наших офицеров в Индии в период изгнания. На гражданском уровне их отделения разбросаны по всей Юго-Восточной Азии, подобно нашим собственным диаспорным сетям, и между ними часто происходят контакты.\n\n Практический элемент поддержки представляет собой более сложную задачу. У [INC.GetAdjective]их революционеров есть сочувствующие контакты среди гражданского судоходства, что позволяет им частично обходить морскую [GEA.GetAdjective]ую блокаду, обычно сначала отправляя оборудование в Бангкок, а затем контрабандой доставляя его по суше на удерживаемые повстанцами территории. Если мы объединим наши ресурсы с нашими контактами в OCC в Юго-Восточной Азии, мы сможем провести несколько грузов, хотя это будет опасно и не все успеют.\n\n Владение портами ближе к региону было бы большим преимуществом, особенно Гуанчжоу. Учитывая обширную торговлю, которая идет туда и обратно, было бы гораздо проще и дешевле провозить оборудование, и мы могли бы отправлять его гораздо больше. Доступ к [SIA.GetAdjective]ой территории через границу с Юньнань также был бы выгоден - ее пористая природа в сочетании с [SIA.GetAdjective]им презрением к своим соседям позволила проложить сухопутные контрабандные тропы в Индокитай с севера.\n\nВ целом, наш долг - поддержать наших революционных товарищей, хотя, возможно, сейчас просто не подходящее время."
 CHI.midgame.222.a: "Контрабанда оружия, какое только возможно."
 CHI.midgame.222.b: "Предусмотрите возможность длительной поставки."
 CHI.midgame.222.c: "Разрешить отправку тяжелой техники."
 CHI.midgame.222.e: "Мы должны дождаться лучшей возможности."

 CHI.midgame.223.t: "Контрабандные поставки из Китая"
 CHI.midgame.223.d: "Наши китайские товарищи в [CHI.Capital.GetCapitalVictoryPointName] начали небольшую, но не менее дерзкую операцию по снабжению нас оружием вопреки [GEA.GetAdjectiveCap]ой блокаде. Координируя свои действия с нашими собственными сетями снабжения по всей Юго-Восточной Азии, как по суше, так и по морю, оборудование было доставлено сначала в Сиам, а затем по суше в дружественные районы. Таким образом, мы сообща подрывали [GEA.GetAdjectiveCap]ие усилия по прекращению иностранной поддержки.\n\n$CHI.midgame.223.closer$"
 CHI.midgame.223.a: "Мы благодарны им за помощь."
 CHI.midgame.223.b: "Им это нужно больше, чем нам."

 CHI.midgame.223.closer: "Наши связи зародились много лет назад, когда наши антиимпериалистические и социалистические движения сходились вокруг схожих целей в этом регионе. Многие из наших революционеров учились в Вампоа или жили в Гуанчжоу во времена раннего революционного правительства Гоминьдана, а несколько десятков даже вызвались помочь китайцам в их Минганьском мятеже. К настоящему времени большинство из них вернулись домой, хотя их усилия, безусловно, принесли свои плоды.\n\nЕсли повезет, это партнерство принесет свободу как их родине, так и нашей, а возможно, и освобождение всего континента!"

 CHI.midgame.224.t: "Тяжелые грузы из Китая"
 CHI.midgame.224.d: "Наши китайские товарищи в [CHI.Capital.GetCapitalVictoryPointName] начали крупномасштабную операцию по снабжению нас в нашей войне против империализма, напрямую бросая вызов [GEA.GetAdjectiveCap]им усилиям по предотвращению поступления помощи в [INC.Capital.GetCapitalVictoryPointName]. Используя основные маршруты поставок из южного Китая в Бангкок, а также горные тропы на [SIA.GetAdjectiveCap]ой границе, сети сухопутной контрабанды работают сверхурочно, героически пытаясь поддержать наши армии.\n\n$CHI.midgame.223.closer$"
 CHI.midgame.224.a: "Мы благодарны им за помощь."
 CHI.midgame.224.b: "Им это нужно больше, чем нам."

 CHI.midgame.225.t: "Добровольцы из Страны восходящего солнца"
 CHI.midgame.225.d: "Сегодня Министерство иностранных дел получило официальное уведомление о приёме на службу любопытного человека и горстки добровольцев из Японской империи. Носака Сандзо, бывший профсоюзный деятель, журналист и член Третьего Интернационала, долгое время сотрудничал с миньганьскими повстанцами, с тех пор как его отправили в Китай после неудавшегося восстания 1932 года. Убеждённый марксист, преданный делу освобождения и революции японских рабочих и крестьян, он с тех пор был выслан из своей родной страны и действовал как агент Третьего Интернационала.\n\nНесмотря на напряжённые отношения Японии с Китаем, особенно в том, что касается эксплуатации ими Северо-востока нашей страны, Носака и его последователи заявили о своей приверженности китайской национальной революции, утверждая, что их дело стоит на одном уровне с нашим в совместной паназиатской борьбе не только против империализма, но и против капитализма. В результате Национальная революционная армия приняла решение полностью назначить Носаку офицером Национальной революции."
 CHI.midgame.225.a: "Мы работаем как единое целое!"

###Section 2c (400-599): Economic Content
CHI.midgame.400.t: "Основы земельной реформы"
CHI.midgame.400.d: "Главная цель революции — освобождение крестьян от гнётущей их аренды и помещиков. Земельная реформа стала боевым кличем партии, а широко разрекламированные успехи в Мингане привлекают множество сторонников. Однако реальность управления далека от идиллии. Повторить достижения Мингана оказалось сложно и разделительно, несмотря на общую цель — кооперативы, управляемые крестьянами.\n\nЧэнь Гунбо, ведущий идеолог РКА, утверждает, что Китай — полуфеодальное государство, требующее политической организации прежде, чем возможна социальная революция. Хотя классовая борьба неизбежна, он считает, что массовое движение требует иного подхода, чем в Европе. Чэнь Дусу и ортодоксальное КСП приняли эту позицию, тогда как многие радикалы КСП продолжают настаивать, что проблема Китая не в феодальных институтах, а в господстве городских капиталистов, требующих пролетарской социалистической революции.\n\nГу Мэнюй и многие умеренные РКА считают, что классовая борьба не неизбежна, а Китай — зарождающаяся капиталистическая страна, где господствуют феодалы. Они, Общество мира и другие призывают к ненасильственной земельной реформе с контролем арендной платы и умеренным перераспределением. Обычные крестьяне, мало знакомые с марксизмом, синдикализмом или национализмом, зачастую цепляются за традиции и суеверия — диссонанс, характерный для авангардной политики.\n\nС запуском пилотных программ реформы в Цзянсу эти противоречивые философии выходят на первый план. До сих пор перераспределение земли осуществлялось стихийно различными командирами и комиссарами, создавая неэффективный и разрозненный механизм. ПАК выступает за организацию крестьян с самого начала с последующей координацией партией. РКА настаивает на введении магистратов для организации земли до передачи крестьянам и осуждает, по их мнению, подрывную деятельность ПАК. Некоторые радикалы тайно требуют полной национализации до конца периода опеки, считая это военной мерой."
CHI.midgame.400.a: "Пока оставить разрозненную систему как есть."
CHI.midgame.400.b: "Отправить магистратов для упорядочивания процесса."

CHI.midgame.401.t: "Встряхнуть лодку"
CHI.midgame.401.d: "Все левые в Китае сходятся в одном: крайняя нищета и бедность крестьян фактически поддерживают феодализм, усугублённый нестабильностью эпохи военных губернаторов. Освободить их от (часто отсутствующих) помещиков, иностранных интересов, деспотичных военачальников и их банд — главная революционная задача. Гоминьдану удаётся мобилизовать сельский энтузиазм и почти спонтанные восстания крестьянских милиций на своём пути.\n\nНо почему бы не быть по-настоящему революционными? Не просто свергать старых тиранов и менять их, а строить совершенно новую систему. К сожалению, прогресс требует разбивать несколько яиц, и это не всегда просто, даже когда речь идёт о вытеснении реакционеров.\n\nКогда магистраты (часто связанные с РКА) были направлены в окрестности Нанкина для помощи в организации новых кооперативов и разрешении конфликтов, многие сообщали о запугивании и даже обстрелах со стороны местных милиций. Тревожно, что многие из них были вооружены НРА и опасаются, что магистраты хотят забрать их землю.\n\nВскоре начались обвинения в измене. На слушаниях представителей ПАК обвинили в том, что они умышленно разжигают страхи крестьян, чтобы сорвать реформы РКА, используя своё влияние в недавно созданных сельских советах для подрыва партии. ПАК ответил свидетельствами жестокости и коррупции комиссаров, однако кажется, что процесс уже необратим.\n\nМногие милиции получили приказ разоружиться или отступить, а репутация Дэн Янды была подорвана. По мере того как скандал утихает благодаря цензуре и тактическому отступлению ПАК, остаётся лишь решить вопрос подхода. Вторую волну комиссаров инструктируют..."
CHI.midgame.401.a: "..придерживаться взвешенного и справедливого подхода."
CHI.midgame.401.b: "..жёстко пресекать изменников."

 CHI.midgame.402.t: "Национальный трудовой союз"
 CHI.midgame.402.d: "Индустриализация Китая была неравномерной и в значительной степени сосредоточена в прибрежных городах, но это был длительный процесс, которому отчасти способствовали внешние инвестиции. Однако накопленное богатство было крайне неравномерным - большая его часть утекала из страны, а остальное оседало в карманах компрадорской буржуазии, коррумпированных судей и армий военачальников. Мало что доходило до городской бедноты, но многие встали на сторону социалистов, когда они освободили страну.\n\nГоминьдан спонсировал многие профсоюзы под знаменем своей контролируемой партией федерации "Национальный трудовой союз" в надежде вдохновить городской пролетариат на их дело и под "сговорчивым" руководством. Однако эти гибкие отношения были подорваны рвением, с которым многие рабочие и организаторы проявляли себя. Подобно буре в бутылке, завоевания Гоминьдана были встречены высвобождением значительного количества сдерживаемого разочарования со стороны рабочего класса.\n\nСиндикалистские группы ухватились за шанс продвинуть своё основополагающее дело, сначала с некоторой неохотой, но вскоре с заметной энергией. Рабочие являются ключевой опорой власти Гоминьдана, и его Центральный исполнительный комитет, безусловно, должен действовать быстро, чтобы сформировать движение до того, как наступит подходящий момент. Либо они ещё теснее привязывают рабочих к партии, либо работают над пересмотром их отношений с братской партией."
 CHI.midgame.402.a: "Держать китайский юнионизм в ежовых рукавицах."
 CHI.midgame.402.b: "Назначить интеллектуалов из СПК в руководство НТС."
 CHI.midgame.402.c: "Поощрять радикальные действия работников."

 CHI.midgame.403.t: "Синдикалисты тренируют мышцы"
 CHI.midgame.403.d: "Усиление риторики Гоминьдана, направленной на то, чтобы подстегнуть пролетариат, не осталось незамеченным. Разговоры о классовой борьбе и освобождении вызвали у рабочих революционный пыл, который превзошёл ожидания даже вдохновлённых марксизмом лидеров партии. Хотя многие члены "молодой гвардии" в восторге от этой демонстрации, считая её доказательством успеха Гоминьдана в донесении голоса угнетённых, не все так убеждены в этом.\n\nОсобенно одиозными для растущего хора голосов внутри партии являются независимые действия радикалов из СПК, которые взяли на себя организацию рабочих с убеждённостью, которая иногда превосходит даже фракцию Чэня Гунбо. Всё чаще звучат разговоры о забастовках даже против государственной промышленности (которая, по мнению Гоминьдана и даже некоторых лидеров ортодоксалов СПК, работает на благо всего Китая). Что ещё хуже, радикалы СПК начали организовывать собственные вооружённые формирования.\n\nВ свою защиту Чэнь Шаоюй и другие лидеры настаивают на том, что коррумпированные судьи являются причиной этой напряженности и что, если Гоминьдан действительно хочет завоевать сердца людей, им нужно сделать лучше. Многие аграрные, либеральные и националистические элементы потребовали, чтобы ими управляли ради сохранения единства, надеясь, что Дэн Яньда выступит в их защиту. Если он и ВКД потерпят неудачу, есть опасения, что в условиях растущей напряжённости они обратятся за решением к другим, что ещё сильнее расколет партию и доведёт её до крайности.\n\nПредставляя своё решение председателю Центрального исполнительного комитета, Дэн тщательно взвешивает свои следующие слова."
 CHI.midgame.403.a: "Выработать разумный компромисс."
 CHI.midgame.403.b: "Насильственно разоружить ополченцев."

 CHI.midgame.404.t: "Проект закона об отчуждении имущества повстанцев"
 CHI.midgame.404.d: "Трофеи достаются победителям, и с победой Гоминьдана в Пяти провинциях они захватили огромное количество сокровищ у побеждённых военачальников и убегающей буржуазии, даже если значительное количество было заранее украдено, эвакуировано или спрятано за границей. В дополнение к ликвидным активам, таким как золото, драгоценности и наличные деньги, Гоминьдан национализировал инфраструктуру капитала, такую как железные дороги, заводы и порты, особенно нацелившись на ненавистные иностранные инвестиции ВОАК.\n\nНо, как всегда после победы, встаёт вопрос о разделе акций. Командиры Национальной революционной армии и различные партийные комиссары проявили удивительную дисциплинированность в защите и каталогизации захваченных активов, насколько это было в их силах, несмотря на то, что подсчет продолжается и выявляются случаи мошенничества. Но на более высоком уровне в сети развернулась бурная дискуссия о том, как наилучшим образом распределить новоприобретённую награду революционеров. Ожидается дальнейшее обсуждение, но для начала необходимо наметить общее направление."
 CHI.midgame.404.a: "Вернуть людям."
 CHI.midgame.404.b: "Использовать для стабилизации правительства."

 CHI.midgame.405.t: "Потребности народа"
 CHI.midgame.405.d: "The Kuomintang's decision to redistribute seized property has proven broadly popular, and the discussion within the halls of power has turned towards how to best enact such a plan. Despite the socialist revolutionaries' egalitarian principles, unfortunately there has already been plenty of backdoor lobbying on where to best spend the influx of League riches. Cases of outright misallocation have been punished, but a focused direction becomes more and more necessary.\n\nAs a general trend, the RCA and their allies in the CSP have pushed for an injection of cash towards urban renewal. In their eyes, winning the urban proletariat is critical for jump-starting industry and giving the production base to win the Kuomintang's future wars. They point out that focusing spending in densely populated areas is more efficient for the limited resources available on hand. The PAC and affiliated factions have called for a distribution of aid for the farmers, who they argue are the backbone of the revolution thus far. With many facing famine conditions thanks to the disruption of war, greater spending there is the only way to bring peace to the countryside and consolidate Kuomintang bastions in the area.\n\nPlenty of moderates would like to do both, and have pushed for relatively even spending - even if it curtails the efficacy of either. They have been joined by a divergent voice coming from the Four Elders, who have stressed also the need for funding museums, conservatories, and other cultural institutions. In their eyes, the poor need not only material assistance but also to be able to appreciate the culture and beauty of their nation if they are to look forward to a new future."
 CHI.midgame.405.a: "Focus on empowering the urban worker."
 CHI.midgame.405.b: "Focus on alleviating rural poverty."
 CHI.midgame.405.c: "Keep things balanced."

 CHI.midgame.406.t: "Потребности государства"
 CHI.midgame.406.d: "По общему мнению, колеблющемуся правительству Гоминьдана требуются все возможные средства для его поддержки. Поскольку правительство представляет народ и работает на его благо, предоставление денег государству равносильно их предоставлению людям. И, конечно же, вливание богатства - это масло, необходимое для смазки винтиков бюрократии, и топливо для запуска машины.\n\nЕсли отбросить метафоры, ведущие финансовые эксперты в правительстве призвали к выплате непогашенных долгов и привлечению финансирования для новой правительственной бюрократии. Даже в социалистической стране первое важно для поддержания веры в способность правительства выполнять обязательства, как внешние, так и внутренние, в том, что касается заработной платы. Последнее жизненно важно для продолжения революции.\n\nДругие призывают к возобновлению работы заводов и продвижению индустриализации в стране. Они утверждают, что отдача от инвестиций будет высокой, а мощная промышленность важна не только для получения преимущества над конкурентами, но и для окончательного успеха китайского социализма.\n\nЧлены высшего военного командования лоббируют выделение дополнительных ресурсов на свои собственные передовые проекты, надеясь способствовать внедрению современных технологий из-за рубежа для победы в своих войнах. По их мнению, все остальные государственные органы могут подождать до объединения, чтобы получить по заслугам."
 CHI.midgame.406.a: "Сосредоточиться на банках и бюрократии."
 CHI.midgame.406.b: "Сосредоточиться на индустриализации страны."
 CHI.midgame.406.c: "Сосредоточиться на модернизации армии."

###Section 2d (600-799): Flavour Content

#Advisor Triggered Events
CHI.midgame.600.t: "Доклад МММС"
CHI.midgame.600.d: "В 1927 году китайская революция внезапно остановилась, когда германское вмешательство склонило чашу весов в пользу реакционных сил, разрушив надежды идеалистов и социалистов по всей стране. Гоминьдан и Лига китайских синдикалистов были рассеяны, а Национально-революционная армия (НРА) — разбита.\n\nОднако это был не конец. НРА проявила доблесть на поле боя, став дисциплинированной армией, обученной опытными социалистическими офицерами и воспитанной в духе социалистической доктрины. Первоначально под руководством красных эмигрантов из России, Международная военная миссия в Китае (МММС) со временем пополнилась офицерами со всего Интернационала.\n\nС 1927 по 1936 год МММС продолжала обучать силы НРА в изгнании, создав небольшую, но элитную профессиональную армию китайских революционеров. Китайские агенты тайно переправлялись в страну и из неё, присоединяясь к подпольным движениям сопротивления.\n\nБлагодаря неизбежной нестабильности, вызванной капиталистической эксплуатацией, китайский народ получил новый шанс сбросить свои цепи. В дерзком и молниеносном восстании революционеры захватили значительную часть восточного побережья Китая и восстановили Национально-революционное правительство, чтобы бросить вызов реакционному правлению. МММС была направлена для поддержки революционного пути, и её офицеры с нетерпением пишут домой, преисполненные надежд на будущее Китая — и своё собственное."
CHI.midgame.600.FRA: "$CHI.midgame.600.d$\n\nБудучи давним лидером Интернационала, Франция направила в миссию значительное число офицеров. Во главе МММС стоит Андре Мальро — авантюрист и писатель, чья революционная деятельность на Востоке сделала его ранним кандидатом на этот пост. Он — человек действия, мыслитель и искусный публицист: его статьи о ситуации в Китае получили широкое признание. Его заместитель по боевой подготовке — Жан Фонтенуа — порой воспринимается как теневая копия Мальро: другой левый писатель-революционер, бесспорно храбрый, но подверженный опиумной зависимости и проявляющий тревожные симпатии к тоталитаризму."
CHI.midgame.600.ENG: "$CHI.midgame.600.d$\n\nЗаместителем главы миссии выступает Дэвид Рамзи — пропагандист и организатор труда. Он целиком погрузился в свою работу, надеясь избежать повторения событий 1927 года и русской катастрофы. Британские офицеры в составе миссии часто занимают ключевые командные должности, включая молодого Джорджа Харди-младшего, идущего по стопам отца в качестве советника НРА."
CHI.midgame.600.NOR: "$CHI.midgame.600.d$\n\nСреди наших представителей в миссии — Ингвальд Берентин Осe, известный своей критикой норвежской экстерриториальности в Китае. Он сыграл ключевую роль в укреплении связей между нашими странами. В своих отчётах на родину он выражает надежду на окончание эпохи уступок в Пяти провинциях."
CHI.midgame.600.HND: "$CHI.midgame.600.d$\n\nК МММС присоединился контингент индийских советников, как часть наших усилий по поддержке азиатских борцов с империализмом. Руководит ими Манабендра Натх Рой (М.Н. Рой), проявляющий особый интерес к аграрной революции и выступающий за немедленную ликвидацию полуфеодальной системы."
CHI.midgame.600.a: "Победа социализма на Востоке!"

CHI.midgame.601.t: "Белое солнце восходит на Востоке"
CHI.midgame.601.d: "Если у кого-то ещё оставались сомнения в неизбежности исторического течения, то почти неудержимый успех социалистических сил в Китае развеял их окончательно. Национально-революционная армия проявила несгибаемую волю и захватила северный Китай, включая Пекин. Это позволило [CHI.GetLeader] выступить с речью на площади Тяньаньмэнь — символ растущей силы [CHI.GetNameDef].\n\nОднако даже на фоне этих успехов советники из МММС не теряют из виду реалии, с которыми сталкивается партия. С каждым днём [CHI.GetNameDef] всё чаще признаётся законным правительством Китая, что накладывает тяжкое бремя. Реакционные милитаристские группировки могут нанести удар до того, как Гоминьдан укрепит власть, а империалистические державы уже взвешивают свои варианты. Сам Гоминьдан сталкивается с проблемами национального управления и растущими ожиданиями народа.\n\nВнутри партии нарастают разногласия. Ван Цзинвэй окружён врагами, желающими его свергнуть. Советники из МММС сообщают о всё более ожесточённой борьбе между главой миссии Андре Мальро и генералом НРА Дэн Яндой, которого обвиняют в создании подрывной офицерской группировки. И Дэн — далеко не единственный, кто готов бросить вызов власти Вана или укрепить собственную."
CHI.midgame.601.a: "Тяжела корона, на челе вождя."

CHI.midgame.602.t: "План Реклю"
CHI.midgame.602.d: "Растущее влияние Международной военной миссии в Китае (МММС) внутри Национально-революционной армии открывает новые возможности — но и риски. Помощь [CHI.GetNameDef] ограничена из-за удалённости и наших собственных нужд, но даже скромные поставки могут значительно повысить боеспособность китайских частей.\n\nСоветники МММС всё чаще говорят о возможном перевороте, хотя и не могут прийти к согласию, откуда он может исходить. Личная вражда между Андре Мальро и Дэн Яндой вызывает подозрения к фракции ВМАСА (Ассоциации революционных однокашников Военной академии Вампу), которая доминирует в «старой гвардии», наряду с так называемой «индийской кликой». Многие офицеры МММС поддерживают «Политический департамент», связанный с гражданским аппаратом и «молодой гвардией» НРА. Другие считают, что лучше поддержать независимых синдикалистских офицеров ради долгосрочной демократии в революции.\n\nЖак Реклю, французский анархист, присоединившийся к миссии как переводчик, предложил план по тайной переброске оружия в части, лояльные синдикалистам. Хотя синдикалистское движение в Китае разделено, большинство его представителей вытеснялись армейским руководством. Поддержка таких частей укрепит синдикалистов, но вызовет гнев «старой гвардии».\n\nВ ответ на этот план другие предложили направить помощь в пользу Политического департамента — более надёжного выбора, который, вероятно, получит одобрение Вана Цзинвэя."
CHI.midgame.602.a: "Поддержать Политический департамент."
CHI.midgame.602.b: "Поддержать китайских синдикалистов."

CHI.midgame.603.t: "Подъём Политического департамента"
CHI.midgame.603.d: "Офицеры, связанные с фракцией «Политического департамента», в последнее время добились значительных успехов, чему немало способствовало покровительство МММС. Большинство из них — представители «молодой гвардии», обученные в изгнании по последним военным теориям. Им поручают важные задания и снабжают ограниченными западными поставками.\n\nЭто дало Вану Цзинвэю повод продвинуть их на ключевые посты, оттеснив офицеров, связанных со «старой гвардией». Тем самым он усилил позиции РКА (Революционного китайского альянса) в армии и ослабил расчёты тех, кто хотел воспользоваться слабостью армии в корыстных целях.\n\nЧжоу Эньлай и его протеже Nie Rongzhen оказались в числе главных бенефициаров. Нье, в частности, стал часто появляться на публике, пожимая руки влиятельным гражданским и военным лицам. Их соперники злятся, но пока не могут ничего сделать."
CHI.midgame.603.a: "Новое поколение китайских офицеров."

CHI.midgame.604.t: "Дело Реклю"
CHI.midgame.604.d: "У Национально-революционной армии и её интернациональных советников долгая история сотрудничества — не всегда позитивная. Во времена Гуанчжоу они поддерживали левое крыло против фракции Чан Кайши. Даже после чисток правых элементы напряжённости сохраняются.\n\nЖак Реклю — французский анархист и поздний участник МММС. Более преподаватель и мыслитель, чем стратег, он, по-видимому, попытался замышлять… неудачно. Один из служащих в тыловой службе сообщил, что Реклю направлял западные поставки в части, лояльные синдикалистам, чтобы предотвратить переворот со стороны «старой гвардии».\n\nВместо этого он оказался в центре конфликта между армейским командованием и советниками. Дэн Янда воспользовался шансом, чтобы подорвать авторитет Андре Мальро (его причастность не доказана) и обрушился на непрофессионализм МММС. На несанкционированном публичном выступлении он даже поставил под сомнение необходимость самой МММС, обвинив её в политизации армии.\n\nИрония этого заявления ускользнула от Дэна, но это — наименьшая из проблем Вана Цзинвэя. Его власть подорвана тем, что план был реализован в обход его круга. Очевидным решением было бы выдворить Реклю, несмотря на протесты его друзей-анархистов. С другой стороны, Дэн, возможно, зашёл слишком далеко — самое время поставить его на место."
CHI.midgame.604.a: "Выгнать Реклю."
CHI.midgame.604.b: "Унизить Дэна."

CHI.midgame.605.t: "Ассоциация революционных однокашников Вампу"
CHI.midgame.605.d: "Вампу была не просто школой. Построенная на островке в Гуанчжоу, она служила местом, где молодые революционеры обучались военному делу и идеологии. Дух товарищества и преданности, зародившийся в этих стенах, до сих пор жив. Неудивительно, что Вампу породила множество братств — тесных сетей выпускников и инструкторов, связанных на всю жизнь.\n\nГраницы между «левыми» и «правыми» внутри этих сообществ размыты. Даже директор Чан Кайши пользовался уважением у многих левых курсантов за свою решимость. Но его эпоха прошла, и новое лицо движения — генерал Дэн Янда, бывший преподаватель академии.\n\nОн возглавляет крупнейшую выпускную сеть — Ассоциацию революционных однокашников Военной академии Вампу (ВМАСА). Несмотря на связи со «старой гвардией», в неё входят и молодые офицеры, такие как Хуан Цисян, Ван Яову и Ду Юмин. Их влияние в верхушке повстанческого движения МинГан значительное, и они обвиняются в продвижении «своих». ВМАСА считает себя истинными наследниками духа Вампу — защитниками революции, народа и Трёх народных принципов."
CHI.midgame.605.a: "Братство, преданность, искренность."

CHI.midgame.606.t: "Что представляет собой Гоминьдан"
CHI.midgame.606.d: "После утверждения на посту премьер-министра Чэнь Гунбо официально объявил о публикации своего нового трактата — «Что представляет собой Гоминьдан». В нём он критикует Дэн Янду, Суня Фо, Четырёх старейшин и других за разжигание фракционной борьбы, которая, по его мнению, ослабила способность партии вести национальную революцию. В духе реорганизационистской риторики он призывает к «чистке» партии, но отвергает идею о создании новой партии или отделении от старой.\n\nВ своей работе Чэнь определяет три миссии Гоминьдана: национальную революцию, мировую революцию и культурную революцию. Ведь Китай — это не просто колония и не просто нация: он является международной колонией — с утраченной финансовой, территориальной и судебной независимостью. Как экономист, он считает потерю финансового суверенитета самой болезненной слабостью Китая. По его мнению, поражение Британии в Великой войне подорвало империализм, но победа Германии привела к возрождению капитализма и реакции. Именно поэтому, утверждает он, Германией теперь правят консерваторы, а она сама стала оплотом реакции в Европе. Интервенция Германии в Северный поход — это попытка реакционных империалистов задушить ход истории.\n\nОднако враги Китая — не только германский орёл. Чэнь также предостерегает от агрессивных амбиций Японской империи и подчёркивает, что присутствие Японии в Маньчжурии — это оскорбление, с которым нужно покончить в рамках национальной революции. Пока обе эти державы остаются в Китае, не может быть и речи о свободе от экономического империализма и завершении века унижений. Противостоя этим врагам — вот в чём, по мнению Чэня, заключается миссия Гоминьдана."
CHI.midgame.606.a: "Не зря его называют правой рукой!"

CHI.midgame.607.t: "Всеобщая демократическая женская федерация Китая"
CHI.midgame.607.d: "Ранняя феминистка и революционерка Хэ Сяннин вошла в Центральный комитет как одна из старейшин партии благодаря своей связи с покойным доктором Сунем и личной дружбе с Сун Цинлин. Несмотря на смерть любимого мужа, она заявила, что не закончила свою революционную работу и остаётся активной участницей партийной жизни.\n\nСовместно с другими феминистками и соратницами — Цзэн Син, Сун Цинлин, Дэн Инчао и Цай Чан — Хэ недавно заняла пост председательницы новообразованной Всеобщей демократической женской федерации Китая (ВДЖФК). Цель федерации — объединить региональные женские организации для строительства социалистического Китая и повышения статуса женщин. Кроме того, ВДЖФК участвует в создании больниц и школ для женщин в [CHI.GetNameDef], а также организует отряды Красного Креста из женщин рабочего класса, помогающие Национально-революционной армии, чтобы и мужчины, и женщины могли бороться за свободный Китай вместе."
CHI.midgame.607.a: "Женщины Китая жаждут освобождения!"

CHI.midgame.608.t: "Революционные три народных принципа"
CHI.midgame.608.d: "Хотя в молодости он флиртовал с анархизмом, мало кто так предан марксизму и материализму, как Ши Цунтун (также известный как Ши Фулян). Один из основателей китайского синдикалистского движения, он поддерживал связи с японскими левыми. Однако со временем разочаровался в руководстве Китайской синдикалистской партии под Чэнь Дусю и вступил в Гоминьдан.\n\nКак представитель радикального крыла РКА и один из её главных публицистов, Ши даже радикальнее Чэнь Гунбо. Он пишет, что партия должна быть демократизирована и тесно связана с массами — вплоть до введения выборности на всех уровнях. Именно слепая вера в бонапартистов вроде Дэн Янды и идеалистов вроде Сунь Фо, по его мнению, привела к деградации национальной революции. Победа революции возможна только при переосмыслении трёх народных принципов с материалистических позиций.\n\nШи уверен, что классовая борьба — неизбежна. Китайское общество, по его мнению, остаётся феодальным и патриархальным, с правящей верхушкой из милитаристов и помещиков, сотрудничающих с империализмом. Буржуазия же уже стала экономически подчинённой империалистам и не готова участвовать в революции. Основываясь на восстании 1932 года, Ши утверждает, что именно рабочие должны стать авангардом национального спасения Китая."
CHI.midgame.608.a: "Да будет услышан!"

CHI.midgame.609.t: "Торг и сделки в Шанхае"
CHI.midgame.609.d: "Шанхай — сердце китайской экономики и пристанище самых разных слоёв общества. Здесь торгуют, спорят и заключают сделки как националисты, так и социалисты. Несмотря на существование Международного мандата, Гоминьдан давно действует в Шанхае — и хотя легационные власти иногда мешают, в этом мегаполисе всегда можно найти союзника.\n\nЧэнь Южэнь, известный также под западным именем Юджин, искусно ориентируется в этом мире революции, преступности и элит. Как министр иностранных дел правительства, редко признаваемого за рубежом, он держится подальше от подпольных ячеек и банд, но ищет союзников среди националистически настроенных представителей буржуазии.\n\nХотя у таких людей разные цели, многие из них патриотично настроены и республиканцы по убеждениям. Даже разочаровавшись в партии, они не прочь поддержать её из прагматизма или ностальгии. Умелыми словами и оптимизмом Чэнь способен завоевать их симпатии. Особенно интерес вызывает растущий поток желающих «бежать с волками» — людей, стремящихся оказаться на стороне победителей. После наших побед всё больше членов Комиссии по делам зарубежных китайцев и Общества Багрового Перста обращаются к Чэню с просьбами о встрече."
CHI.midgame.609.a: "С крепким рукопожатием и яркой улыбкой!"
CHI.midgame.609.b: "С вежливым тоном и расчётливой сдержанностью."

CHI.midgame.610.t: "Клика Наследного Принца"
CHI.midgame.610.d: "Сунь Фо нельзя считать праздным наследником, лишь пользующимся отцовской славой. Хотя он действительно живёт в тени Сунь Ятсена, сам он — опытный политик, учёный и законотворец. Часто отступая от партийной ортодоксии, он собрал вокруг себя союз тех, кто считает себя хранителями «истинного» учения Доктора Сунь.\n\nСвою самостоятельную карьеру он начал как мэр Гуанчжоу — бывшего штаба революции. Там он не только поставлял ресурсы для армии отца, но и проводил реформы: строил инфраструктуру, модернизировал законы, реформировал бюрократию и даже вводил местную демократию (хоть и под контролем).\n\nХотя ему и не удалось воплотить все свои мечты, его идеализм привлёк сторонников — образовавших клику «Наследного Принца», в которую вошли иностранные выпускники и интеллигенты: Лян Ханьцао, Хуан Ханьлян, Ван Куньлунь, У Чаошу. Теперь, став «фракцией реконструкции», они всё ещё остаются аутсайдерами внутри партии. Но ради спасения своей страны и партии Вечного Премьера они не сдадутся."
CHI.midgame.610.a: "Теперь они точно не на Гавайях."

CHI.midgame.611.t: "Национальный трудовой университет"
CHI.midgame.611.d: "Давняя мечта Общества мира — создание института, подобного основанному в 1902 году в Шарлеруа, Бельгия. Этот университет должен был стать местом обучения рабочих, преодолевая классовые разделения путём сочетания труда и образования для создания «трудящегося интеллектуала». Их девиз — «превратить школы в фабрики и поля, а фабрики и поля — в школы», что отражает высокие идеалы мирного перехода к анархистскому государству.\n\nГлава комитета по подготовке университета — Цай Юаньпэй, ведущий китайский педагог и один из «Четырёх старейшин» Общества мира. Вместе с протеже И Пэйцзи, ныне ректором университета, они надеются сделать Национальный трудовой университет продолжением старой программы «Бережливой учёбы и труда» во Франции, которая воспитала многих нынешних идеалистов партии.\n\nХотя университет сталкивается с трудностями, включая финансирование и политические разногласия, государственная поддержка и интерес даже со стороны соперников партии внушают оптимизм. Однако стремление преподавать анархистскую интерпретацию Трёх народных принципов вызывает вопросы. В ответ они ссылаются на лекции доктора Сунь, восхваляющие Прудона и Бакунина вместо Маркса. Остаётся лишь ждать, примут ли такие идеи преподаватели, но старейшины уверены, что анархизм — это неизбежность, даже если понадобится три тысячи лет."
CHI.midgame.611.a: "Ведём народ к свободе!"

CHI.midgame.612.t: "Труд собаки и коня"
CHI.midgame.612.d: "Дай Чуньфэн вырос в семье одинокой матери, которая привила ему неустанное стремление к власти и чувство конфуцианской сыновней преданности — верности, которая, похоже, распространяется и на его хозяев. Его последняя работа может стать пропуском к вершинам власти в Китае. Дай сравнивает свои отношения с генералом Ху Цзуннанем с древними классическими примерами, выполняя «работу собаки и коня» с абсолютной преданностью.\n\nПодобно героям древности, его верность порождает ожидания почти феодальной лояльности от подчинённых и соответствующего вознаграждения от хозяина. В личной жизни он живёт с охраной и слугой, часто переезжая, поэтому местонахождение неизвестно. Он лично руководит, делая упор на военную дисциплину, опираясь на выдающуюся память, энергию и ум. Иногда работает днями без отдыха.\n\nО нём также говорят как о человеке эксцентричном, параноидальном и склонном к алкоголю. Он не делегирует полномочия и конфликтует с помощниками Ху. Говорит о смирении и покорности, но не боится публично демонстрировать жестокость, создавая образ безжалостного исполнителя приказов. Немногие осмеливаются перейти «Лаобань», и Ху Цзуннань считает его ценным союзником."
CHI.midgame.612.a: "Безликий парень с опасным умом."

CHI.midgame.613.t: "Финансовая корпорация развития Китая"
CHI.midgame.613.d: "Во время изгнания Сон Цзивэнь занимался в Шанхае сбором средств для революции своей сестры, а также планировал будущее. Он путешествовал по миру, поддерживал связи с экономистами и планировщиками. Немногие могли представить возвращение Гоминьдана к такой силе, так что его работа — либо проявление дальновидности, либо самонадеянности.\n\nОсобое знакомство он завёл с французом Жаном Моне через Лудвика Райхмана. Вместе они разработали идею канала иностранного финансирования Китая, чтобы привлечь инвестиции и стабилизировать экономику. Однако после инцидента в Уху 1936 года было решено финансирование осуществлять только изнутри страны.\n\nС помощью обширных связей семьи Сон и поддержки партийных лидеров, включая Ли Шыцзэна, была основана Корпорация развития Китая. При поддержке крупнейших банков корпорация финансирует инфраструктурные и ресурсные проекты — первый шаг национального восстановления.\n\nИспользуя модель государственно-частного партнёрства, они сталкиваются с трудностями войны, но помогают Гоминьдану уменьшить зависимость от империалистов. Если планы Сон сработают, это станет основой для государственно-капиталистической программы партии."
CHI.midgame.613.a: "Работа по восстановлению Китая начинается."

###Section 2e (800-999): Misc

#Cultural Event Chain
 CHI.midgame.800.t: "Интерпретация нового культурного движения"
 CHI.midgame.800.d: ""Общество искусства ради искусства", - говорят левые писатели, которые утверждают, что Национальная революция в Китае - это не просто революция против империализма или общества, а скорее революция культуры. Поначалу этих так называемых "новых писателей" привлекал романтизм в противовес натурализму - они защищали искусство ради искусства и подчеркивали индивидуальность, но после трагедии Шанхайской бойни 30 мая левые журналисты, художники, писатели начали тяготеть к пролетарскому движению - искусство должно было стать инструментом в естественном диалектическом марксистском развитии социальной революции.\n\nПод руководством таких представителей творческой интеллигенции, как Го Можо, Чан Фанву и Юй Дафу, они объединились в художественный кружок, известный как "Общество созидания", вместе с другими видными социалистами, чтобы писать о китайском обществе и критиковать его, а также обсуждать будущую пролетарскую революцию. К ним также присоединяются такие группы, как Союз левых писателей в городах-представительствах, причем города-представительства являются заметным очагом левой литературной и кинематографической активности из-за предполагаемого капиталистического гнёта иностранного империализма.\n\nВнутри Гоминьдана более радикальные марксисты в партии, такие как члены РАТ, требовали празднования дня рождения Карла Маркса, Первого мая и годовщины Парижской коммуны. Однако, что касается Временного комитета действий, то, хотя клика открыто поддерживает левое искусство и культуру, они, тем не менее, демонстрируют оппозицию и страх перед идеологами, такими как Чэнь Гунбо, которые выступают за необходимость культурной революции. Ссылаясь на то, что социальная революция и революция против империализма важнее здесь и сейчас, они осудили предложения Чэня о революции против существующих культурных институтов."
 CHI.midgame.800.a: "Революция против старой культуры необходима!"
 CHI.midgame.800.b: "Как всегда, на первом месте стоит Национальная революция."

 CHI.midgame.801.t: "Яркая левая культура"
 CHI.midgame.801.d: "Поскольку бедный крестьянин стал символизировать у революционных левых природу угнетенного китайского соотечественника, левые художники стали создавать произведения революционного искусства, чтобы изобразить их борьбу, бедность и потенциал для величия.\n\nПреобладающей в художественном сообществе является группа резчиков по дереву, поощряемая уважаемым левым писателем Лу Сюнем. Лу Сюнь публично одобрял резьбу по дереву, поскольку считал, что мазки традиционной китайской живописи и красноречие западной масляной живописи не слишком заботятся о социальной реальности, в то время как резьба по дереву близка к жизни и легко воспринимается массами. Более того, это объясняется еще и тем, что "резьба по дереву проста в исполнении." В 1931 году в Шанхае прошла художественная выставка, на которой были представлены работы молодых левых художников,\n\nПосле бурной победы Гоминьдана в войне Лиги резчики по дереву стали изображать борьбу крестьянства. Это видно по названиям их работ, которые в основном посвящены наводнениям и голоду; например, художник Дуань Ганьцин создал две работы: "Жизнь после великого бедствия", "Где наш дом"" и "Голод"". В то же время, написав о неурожае в Сычуани, он создал произведения в ответ на убожество голодных условий: "Симфония голода" (Чжан Ин), "Крах на дороге из-за голода" (Чжан Хуэй), "Голодная толпа" (Ло Цинчжэнь)."
 CHI.midgame.801.a: "Очаровательно!"
 
 CHI.midgame.802.t: "Либеральный форпост"
 CHI.midgame.802.d: "Несмотря на то, что левое руководство Гоминьдана в значительной степени отстранило его от принятия важных политических решений из-за его правых убеждений, это не помешало Суню Фо посвятить всю свою жизнь продвижению учения своего отца (через призму его собственной интерпретации завещания доктора Суня). В некотором смысле, взваливание на себя бремени сохранения и распространения работ своего отца является средством, с помощью которого младший Сунь соединяется со своим далёким родителем за могилой.\n\nПомимо своей деятельности в правительстве, законодательном органе и партийной политике, Сунь Фо также был известным спонсором в области культуры. Его помощники Чжун Тяньсинь и Хуан Шэньчжи основали Китайскую культурную ассоциацию, которая издаёт журнал \"Созидание\", однако их последнее начинание намного превосходит по амбициям мелкий журнал. Институт развития культуры и образования имени Сунь Ятсена ставит своей целью изучение идей доктора Суня в их взаимосвязи с общей китайской культурой.\n\nНесмотря на то, что он получил похвалу (хотя и приглушённую) от партийных лидеров, его реальная программа объединения либеральных учёных и мыслителей вызвала подозрения в отношении амбиций Суня. В частном порядке он выразил желание отвлечь молодёжь от того, что считает марксистским влиянием, и вернуть её к Трём принципам. Институт объявил о планах выпускать англоязычный журнал под названием Tianxia Monthly, который, несомненно, должен повлиять на мнение иностранцев, а также ориентированную на внутренний мир \"Подборку текущих событий.\"\n\nОднако сдерживание его влияния, в конечном счёте, может заключаться просто в игнорировании его. Хотя Сунь настаивает на том, чтобы институт финансировался за счёт частных пожертвований в качестве средства поддержания репутации беспристрастного и независимого от правительства учреждения, на практике он использует своё влияние на Исполнительный Юань и муниципальные органы власти для получения пожертвований. Эти деньги позволили институту обеспечить вклад известных учёных, и тихое перекрытие крана привело бы к прекращению их деятельности."
 CHI.midgame.802.a: "Молодой человек, почитающий своего отца..."
 CHI.midgame.802.b: "..должен делать это в свободное от работы время."

 CHI.midgame.803.t: "Цензура и искусство"
 CHI.midgame.803.d: "По мере того, как революция продолжается, скрежещущие механизмы государственной машины часто принимают репрессивную форму. Гоминьдан привыкший избегать реакционной цензуры, теперь, когда наступил другой момент, без колебаний подавляет средства массовой информации, неугодные его делу. Постепенно вводилось множество ограничений, как официальных, так и неофициальных, и на соответствующих телеграфных станциях были установлены цензоры. Поскольку многие сельские жители неграмотны, гоминьдановский контроль за информацией может быть сосредоточен в городах.\n\nЦентральный исполнительный комитет утвердил пересмотренные стандарты цензуры новостей, предоставив Центральному информационному агентству значительные полномочия по установлению руководящих принципов для всех газет. Цензоры часто имеют широкую свободу действий в толковании ограничений, что заставляет издателей искать способы обойти их. Что, возможно, также интересно, так это то, что такие агрессивные действия правительства против \"контрреволюционных\" произведений, похоже, отразились на студентах, которые также регулярно нападают на критическую прессу по собственной инициативе.\n\nВ мире культуры было много художников всех мастей, сочувствовавших революции. Однако многие были недовольны этими ограничениями и жаловались, что гоминьдановцы немногим лучше своих предшественников. Действительно, многие издательские компании начали проводить самоцензуру из-за боязни оскорбить чувства правительства. Хотя на данный момент большинство из них отказались от попыток помешать правительству подавлять общественную критику, видные интеллектуалы настаивают на том, что искусство требует хотя бы некоторой свободы творчества, особенно то, которое соответствует революционным ценностям."
 CHI.midgame.803.a: "Небольшая свобода самовыражения - ключ к искусству."
 CHI.midgame.803.b: "Революция - не оправдание непристойностям!"

#Цепочка событий революционной литературы
 CHI.midgame.805.t: "Революция и мышление"
 CHI.midgame.805.d: "В рамках Реорганизованной ассоциации товарищей мало кто может оспаривать тот факт, что основной идеологической позицией этой клики руководит не кто иной, как Чэнь Гунбо, динамичный социалист-революционер, изучавший экономику в Колумбийском университете в 1922-1924 годах. Связанный с синдикалистами в начале своей политической карьеры и являющийся одним из основателей Синдикалистской партии Китая, Чэнь проявил страстный интерес к марксизму, находясь за границей. Интеллектуально он описывает себя как верующего в \"историзм\", распространённый эвфемизм для обозначения материализма Маркса - как и все ортодоксальные марксисты, Чэнь считает, что политика и институты являются всего лишь отражением экономических структур.\n\nЧасто публикуемый в журнале Революционный критик, Чэнь недавно опубликовал свой главный труд - \"Революция и мысль\". В этой работе он ввёл выражение \"динамический материализм\", чтобы описать своё мировоззрение, согласно которому материя и движение являются основными составляющими мира.\n\nВ заключительных абзацах своей работы Чэнь отмечает, что изначально он придирался к работам Маркса касательно того, что капитализм приведёт себя к разрушению. В конце концов, он отметил, что, хотя Германия пережила Великую войну и стала сильнее, эксплуатация своих колоний укрепила капитализм, чего Маркс никогда не предполагал. Однако в связи с недавним крахом немецкой экономики, последовавшим за "чёрным понедельником", Чэнь пишет, что для того, чтобы Китай стал свободным, он должен следовать своему собственному независимому революционному курсу, а партийный орган Гоминьдана должен быть реорганизован таким образом, чтобы он мог проводить такую антиимпериалистическую политику. С падением капитализма во всём мире, размышляет Чэнь, у Национальной революции наконец-то появился шанс на успех."
 CHI.midgame.805.a: "Блестящий писатель этот Чэнь Гунбо!"
 CHI.midgame.805.b: "Это интересно, но нам предстоит вести войну."

 CHI.midgame.806.t: "Об историческом материализме"
 CHI.midgame.806.d: "Гу Мэнъюй, которого называют вторым по значимости интеллектуалом в Реорганизованной ассоциации товарищей и фактическим лидером \"умеренных\" членов РАТ, никогда не был интеллектуалом, ориентированным на марксизм, как его коллеги-радикалы. До вступления в Гоминьдан в начале 1925 года Гу был регистратором и заведующим экономическим факультетом Пекинского университета. Хотя он хорошо разбирается в марксизме, он не придерживается материализма и не считает, что экономические структуры являются основным фактором в понимании истории.\n\nВ своей новой работе \"Об историческом материализме\" он оспаривает обоснованность диалектического и исторического материализма, что вызывает резкую критику и горестное освистывание со стороны радикальной фракции РАТ. Гу пишет, что доказательства, представленные Марксом и Энгельсом, были чисто метафизическими и что диалектический материализм, раскрывающий логику природы, был всего лишь формой метафизики, поскольку он не опирался на эмпирические основания. Что касается исторического материализма, Гу не считал, что экономические структуры в конечном итоге определяют надстройку. Он утверждает, что человеческие знания, наука, образование и этика играют столь же важную роль в экономическом развитии.\n\nРаботы Гу, осуждающие ортодоксальный марксизм как \"религиозную доктрину\", заслужили признание немарксистов в Гоминьдане и тех членов РАТ, которые не разделяют идей материализма. Несмотря на похвалу со стороны его окружения, продажи книги \"Об историческом материализме\", тем не менее, не дотягивают до популярности последней работы Чэнь Гунбо."
 CHI.midgame.806.a: "Гу высказал отличную мысль!"

 CHI.midgame.807.t: "Мысли о 8 марта"
 CHI.midgame.807.d: "Несмотря на своё "буржуазное" происхождение, будучи дочерью дворянской семьи, Дин Лин, урождённая Цзян Бинчжи, училась в прогрессивной средней школе №1 провинции Хунань для девочек, где она стала одноклассницей своего будущего товарища по революции Сян Цзинъюй. Вдохновлённая своей матерью, Дин Лин с раннего детства нашла своё призвание в политике национальной и социальной революции.\n\nБудучи вовлечённой в левые круги и знакомой с такими фигурами, как Цюй Цюбай и её будущий муж Ху Епинь, Дин, тем не менее, придерживалась своей феминистской позиции, даже поначалу отклоняя предложения Ху выйти замуж, чтобы продемонстрировать свою свободную волю. Связанная в литературе с так называемым \"Новым женским движением\", её книга \"Дневник госпожи Софии\" произвела сенсацию в китайском литературном мире своей провокационной сексуальностью и эмоциональными желаниями. Несмотря на своё пребывание в Шанхае, Дин Лин сама посетила повстанческую зону Миньгань, чтобы понаблюдать за положением и ролью женщин в национальной революции; по итогам своего путешествия она недавно опубликовала свой главный труд \"Мысли о 8 марта\", посвящённый женщинам в зоне Миньгань.\n\nПредваряя своё эссе, она подчёркивает, что женщины в зоне Миньгань живут лучше, чем женщины в других провинциях Китая - женщинам в зоне Миньгань ещё предстоит полностью освободиться от своих убеждений, что они должны рожать детей и вступать в брак. Будучи самопровозглашённой \"синдикалисткой\", она освещает такие спорные темы, как право оставаться незамужней, право на развод и право на аборт. Затем она описывает, как женщины могут улучшить своё психическое и физическое благополучие в качестве средства расширения прав и возможностей феминисток, а затем говорит, что женщины не должны ждать, пока их спасут, а должны сами совершить революцию, даже если для этого придётся пойти против Гоминьдана и других революционных партий. Несмотря на признание феминисток, работа Дин Лин, несомненно, вызвала раздражение и критику со стороны более консервативных элементов революции."
 CHI.midgame.807.a: "Женская революция грядёт!"

 CHI.midgame.808.t: "Датун в социалистической мысли"
 CHI.midgame.808.d: "Термин и понятие датун восходят к Лицзи (Книге обрядов), где они обозначают мир гармонии и всеобщего благополучия, основанный на бескорыстном поведении всех членов общества. На протяжении веков китайской цивилизации эта идея датуна возрождалась, и к концу 19-го века она была включена в концепции китайских революционеров и реформаторов.\n\nРаспространённый термин в анархистских, социалистических и даже марксистских текстах - датун - использовался для описания будущего социалистического общества. Писатель-марксист и синдикалист Го Можо в своём эссе \"Маркс входит в конфуцианский храм\" представляет себе встречу Конфуция и Маркса, во время которой философы соглашаются, что их идеи совместимы. Термин, популярный среди членов Временного комитета действий, которые ссылаются на то, что сам доктор Сунь использовал слово датун в партийном гимне, также популярен среди анархистских старейшин партии во Всемирном обществе. Согласно Ли Шицзэну, история движима революциями, первой из которых была монархическая революция, затем революция за народный суверенитет, классовая революция и заключительная революция за датун. Из этих революций: установление архаичных династий Шан и Чжоу соответствовало первой революции; американская, французская и Синьхайская революции относились ко второму типу; синдикалистские революции во Франции и Великобритании относились к третьему типу, и грядёт последняя революция - революция, за которую ратовал Прудон и которая осуществляет идеалы Миньшэн, по словам доктора Суня.\n\nДля Синдикалистской партии Китая, хотя датун представляет собой идеальное общество, лишённое нынешних проблем, он также вдохновлён Французской коммуной, первым государством, осуществившим социализм на практике. В целом, эти авторы сходятся во мнении об индустриализированном Китае, основанном на \"массах\", управляемом профсоюзами и с социальными и культурными удобствами, доступными для всех. В этом мире должны быть экономическое планирование, индустриализация, коллективизация сельского хозяйства, обобществление собственности, социальная инфраструктура, права и обязанности всех на труд и равные политические статусы. Французский метод вдохновит города по всему Китаю на создание роскошных и зелёных кварталов \"городов-садов\" - идеальной утопии для истинно синдикалистского Китая."
 CHI.midgame.808.a: "Нас ждёт удивительный мир..."

#Movie Event Chain
 CHI.midgame.809.t: "Создание ЦСРК"
 CHI.midgame.809.d: "После успешного проведения Первого Конгресса репатриантов и завершения войны Лиги, националистическое правительство немедленно предприняло усилия по установлению своей власти над умами и сердцами китайцев. Делегаты, входящие как во Временный комитет действий, так и в Реорганизованную ассоциацию товарищей, с готовностью согласились с тем, что необходимо широко использовать радиовещание для пропаганды \"данхуа\" - "партийности\" китайского общества.\n\nОдним из первых достижений Министерства до сих пор было возрождение \"Миньго жибао\" или \"Республиканской газеты\." Основанная еще в 1923 году, когда в Шанхае базировалась Националистическая партия, газета была вынуждена бежать за границу после провала Северного похода. Написанный на китайском наречии "Миньго жибао" должен стать одним из столпов националистической пропагандистской системы, созданной под руководством Центральных ежедневных новостей и Центрального информационного агентства.\n\nТем временем Министерство связи открыло новое административное учреждение под названием "Управление телекоммуникаций", которое будет заниматься вопросами радиосвязи и радиовещания. Первоначальные планы, разработанные с помощью западных инженеров, предусматривали установку 500-ваттного передатчика, охватывающего территорию между Нанкином и Шанхаем. Усилия по улучшению коммуникаций по всей стране, направленные на облегчение организации партийной работы на местном уровне, а также на создание данхуа, на сегодняшний день превзошли все ожидания.\n\nС растущим энтузиазмом тех, кто свободно и грамотно владеет нанкинским диалектом мандаринского языка, приглашают работать техническими специалистами на растущее число радиостанций по всей стране, что подчеркивает расширяющийся охват радиостанции. Признавая успехи этих усилий, президент [CHI.GetLeader] проведёт сегодня специальную церемонию переименования националистической радиостанции в Центральную систему радиовещания Китая."
 CHI.midgame.809.a: "Мы будем ждать вечернего эфира!"

 CHI.midgame.810.t: "Мулан Кун Цзюнь"
 CHI.midgame.810.d: "Сегодня состоялась премьера одного из первых художественных фильмов, созданных во времена правления Гоминьдана. Фильм "Мулан Кун Цзюнь (Мулан вступает в армию)", снятый режиссером Бу Ванканом, с молодым Чэнь Юнчаном в главной роли, - это историческая драма, основанная на легенде о Хуа Мулан. В знак сыновней почтительности она вступает в армию вместо своего отца (переодевшись мужчиной) и отважно помогает отбиваться от вторгшихся кочевников-варваров. На протяжении всего фильма она демонстрирует свой героизм, мужество и смирение.\n\nВоспевая традиционные добродетели чести и доблести, фильм имел немедленный успех и поднял патриотические чувства во всей стране. Он побил рекорды по продолжительности показа в кинотеатрах и вызвал неизбежный поток сравнений с нынешней ситуацией в Китае, где страна все еще переживает многолетние нарушения иностранцами ее суверенитета. Другие темы феминизма и долга также оказались популярными и вызвали постоянные дискуссии о том, какую роль должны играть женщины в меняющемся китайском обществе."
 CHI.midgame.810.a: "Увлекательный фильм..."
 
 CHI.midgame.811.t: "Перекрёстки"
 CHI.midgame.811.d: "На экраны кинотеатров вышла новая комедия-фарс от режиссера Шэня Силина с Бай Яном и Чжао Данем в главных ролях. Несмотря на комедийный характер, критики отметили, что фильм, похоже, приобретает политический подтекст в связи с нестабильностью китайской политики и растущей угрозой со стороны Японии.\n\nВсё начинается на скамье подсудимых в Шанхае, где выпускник колледжа Сюй подумывает о самоубийстве, когда его друг Чжао (его играет известный Чжао Дань) приводит его обратно в их квартиру. Узнаётся, что эти друзья остались без работы в Шанхае в результате финансового фиаско \"Чёрного понедельника\", которое серьёзно подорвало экономическую мощь города. Тем временем выпускница Ян (её играет Бай Ян) переезжает жить к Чжао, когда Чжао устраивается на работу в гоминьдановскую Миньго жибао. Между двумя соседями вспыхивает лёгкая вражда.\n\nОднако то, что превратилось в лёгкий роман между Чжао и Ян, внезапно заканчивается, когда Ян однажды объявляет Чжао, что уезжает из Шанхая, так как фабрика, на которой она работала, закрылась. Чжао пытается убедить Ян остаться, но она всё равно решает уйти. Друг Яна, который знает об их романе, уговаривает Ян остаться в Шанхае.\n\nЧжао обнаруживает, что сам остался без работы. Он встречает Ян, и они оба читают в газете, что его друг Сюй действительно покончил с собой. Пообещав не быть \"слабыми\", как Сюй, они уходят в закат, полные оптимизма в отношении обнадёживающего будущего."
 CHI.midgame.811.a: "От души посмеялся..."

 CHI.midgame.812.t: "Смерть Лу Сюня"
 CHI.midgame.812.d: "Сегодня в китайском литературном мире произошла трагедия: внезапно умер великий левый писатель Лу Сюнь, возможно, в результате его давней привычки много курить. В прошлом году у него развился хронический туберкулез, и в течение последних нескольких недель его здоровье ухудшалось. Националистическое правительство официально выразило свои соболезнования.\n\nЛу Сюнь начал свою литературную карьеру, как и любой другой китайский интеллектуал дореспубликанской эпохи, с изучения конфуцианской классики в рамках подготовки к гражданским экзаменам. Отец и дед Лу Сюня были замешаны во взяточническом скандале, в результате которого дед попал в тюрьму, а отец стал жертвой жестокого пристрастия к опиуму. После посещения школы, где он познакомился с западными идеалами, Лу Сюнь в 1902 году отправился в Японию по правительственной стипендии и начал переводить известные западные произведения на простой китайский язык.\n\nПосле того как он увидел фотографию китайского мирного жителя, обезглавленного японским солдатом во время русско-японской войны, и увидел полное безразличие в глазах китайских прохожих, Лу Сюнь был убежден, что Китай нуждается в спасении. К 1911 году, когда произошла Синьхайская революция, он занял ученый пост в Пекине. В 1917 году он начал писать для журнала Чэнь Дусю "Новая молодежь", где опубликовал свой успешный рассказ "Дневник сумасшедшего". После этого успеха в 1927 году он опубликовал свое грандиозное произведение "Правдивая история А Кью".\n\nСочувствуя Гоминьдану, Лу Сюнь служил приглашенным лектором в Вампоа и Чжуншаньском университете накануне Северной экспедиции. После провала экспедиции он бежал в Шанхай, хотя по-прежнему симпатизировал партизанской войне Сун Цинлина в Фуцзяни. После возвращения гоминьдановцев в Нанкин после войны Лиги он отправил Суну телеграмму, в которой поздравил Национально-революционную армию с успехом."
 CHI.midgame.812.a: "Мы посылаем наши соболезнования..."
 
 CHI.midgame.813.t: "Сун в полночь"
 CHI.midgame.813.d: "В китайских кинотеатрах появился новый фильм! Этот новый кинематографический шедевр, который был объявлен первым фильмом ужасов в Китае, снят режиссёром левого толка Ма-Сюй Вэйбаном. В нём прослеживается влияние американского фильма 1923 года "Горбун из Нотр-Дама" и французского романа 1910 года "Призрак оперы".\n\nКритики фильма отметили, что тревожные нотки жанра ужасов, похоже, отражают ту самую тревогу, которую испытывает китайский народ в связи с постоянно меняющимся политическим ландшафтом страны. Более того, левые и националистические уклоны фильма привели к тому, что Гоминьдан официально одобрил фильм.\n\nДействие фильма разворачивается тёмной и ненастной ночью 1926 года. В главных ролях - красивый актер Цзинь Шань в роли Суна Даньпина и прекрасная актриса Ху Пин в роли Ли Сяося (возлюбленной Суна Даньпина). Группа актёров прибывает в разрушенный театр и начинает репетировать своё представление. Однажды вечером исполнитель главной роли в пьесе Сунь Сяооу просит разыграть его роли самостоятельно, но у него возникают проблемы с репликами. По мере того как он продолжает репетировать, у актёра внезапно начинает звучать таинственный голос, который помогает ему выучить реплики. Актёр решает разыскать этого доброжелательного ангела и обнаруживает, что голос принадлежит не кому иному, как знаменитому актеру Суну Даньпину, который считался умершим.\n\nВ воспоминаниях Даньпин рассказывает, что до того, как стать актёром, он был революционером во время Второй революции против Юаня Шикая. После провала революции он скрылся и влюбился в Ли Сяося. Соперник Даньпина Тан Цзюнь, однако, подвергает Даньпина пыткам и обливает кислотой. Смущённый и стыдящийся своих внутренних шрамов, Даньпин снова скрывается, что доводит Сяося до безумия. Он проводит ночи в театре, один и скрытый, утешая психически неуравновешенную Сяося.\n\nВ наши дни актёрская труппа приезжает на своё шоу и представляет его не кому иному, как владельцу театра Тану Цзюну. Тан испытывает симпатию к девушке Суна и пытается овладеть ею, но Сун сопротивляется. В ходе борьбы возлюбленный Сун погибает, но Даньпин выходит из укрытия, чтобы сразиться с Таном Цзюном. Зрители в театре видят в Даньпине монстра из-за его изуродованного лица и пытаются преследовать его с факелами. Фильм заканчивается тем, что Даньпин разбивается насмерть, а Сяося наконец-то приходит в себя."
 CHI.midgame.813.a: "Кто-нибудь, передайте мне салфетку..."

 CHI.midgame.814.t: "Новая женщина"
 CHI.midgame.814.d: "В Шанхае вышел новый фильм левого режиссёра Цая Чушэна, который быстро становится сенсацией - "Новая женщина", посвящённый так называемым "новым женщинам" в китайском обществе. Основанный на истории левой актрисы Ай Си, фильм многими описывается как проблемный, в то время как многие члены Гоминьдана хвалят его за прогрессивные идеалы.\n\nВ центре сюжета фильма - образованная и современная молодая женщина Вэй Мин (её играет красавица Жуань Линъюй), которая живёт в Шанхае в 1920-х годах. Она работает учительницей музыки в школе для девочек, хотя и мечтает стать писательницей. Её сосед Айин работает на фабрике, и Вэй Мин учит заводчан патриотическим песням, поднимая их дух и вдохновляя на мечту об освобождении. Доктор Ван (его играет Ван Найдун) - директор школы Вэй Мин, который без ума от молодой женщины и хочет, чтобы она стала его наложницей. Тем не менее, она отворачивается от него - вместо этого она преследует незаинтересованного редактора Ю Хайчоу. Разгневанный доктор Ван увольняет Вэй Мин как раз в тот момент, когда незаконнорождённая дочь и сестра Вэй Мин прибывают в Шанхай, выпрашивая деньги.\n\nДочь Вэй Мин заболела пневмонией, но сёстры не могут оплатить больничный. Не имея дохода в качестве учительницы, Вэй Мин пытается запросить предоплату за свой роман \"Гробница любви\", но издатель отказывается. Обезумевшая и не имеющая выбора, она занимается проституцией, и неожиданно её первым клиентом становится доктор Ван. После насмешек директора она бьёт его, а затем убегает, чтобы посмотреть, как умирает её дочь. Потеряв надежду, Вэй Мин принимает передозировку таблеток - умирая на руках у своих друзей, она кричит: \"Я хочу жить, я хочу отомстить!\" Фильм торжественно заканчивается тем, что рабочие покидают фабрику."
 CHI.midgame.814.a: "Какая трагедия!"

 CHI.midgame.815.t: "Революционер и монархист"
 CHI.midgame.815.d: "Благодаря сохраняющемуся влиянию Ван Цзинвэя в [CHI.GetName], многие члены его обширной семьи оказались на властных позициях по мере развития революции. Эта тенденция вызывает разную степень озабоченности, презрения и подражания со стороны членов партии по мере формирования так называемой "резиденции". Но не все его родственники присоединятся к нему в президентском дворце.\n\nВан Чжаоюн недавно скончался в Макао в возрасте 78 лет. Старший сводный брат Ван Цзинвэя, он был искусным поэтом, ученым и даосом, черпавшим вдохновение в различных путешествиях по стране до Синьхайской революции. Когда разразилась революция, он посетил гору Луофу и некоторое время жил в храме Сумао, а затем уединился в Макао.\n\nНесмотря на попытки Ван и других членов Гоминьдана завербовать его, он неоднократно отклонял их приглашения, утверждая, что его верность принадлежит монархии Цин. Он утверждал, что питает неизменное уважение к императору Пуйи, даже когда его дети искали работу в правительстве своего дяди. На протяжении всей ранней эпохи военачальников он и другие ученые утверждали, что являются наследием старой империи, писали ностальгические и традиционалистские работы. Он был вознагражден признанием со стороны восстановленного императора, что он очень ценил, переименовав свой дом в "Зал благословения"\n\n Старший Ванг решил остаться в Макао, даже когда Гоминьдан пронесся по всей стране, занимаясь своими работами и воздерживаясь от серьезных комментариев о политике. Ожидается, что на его похороны соберется много людей, учитывая его статус выдающегося ученого-старожила, хотя пока неясно, будут ли присутствовать его родственники."
 CHI.midgame.815.a: "Еще одна семья, разорванная войной"
 
 CHI.midgame.816.t: "Национальный цветок"
 CHI.midgame.816.d: "На протяжении веков "Prunus Mume", или китайская слива, ассоциируется с цветением в конце зимы и начале весны, предвещающим окончание зимних месяцев, и долгое время была почитаемым цветком в странах, расположенных в орбите Китая. Во времена правления династий Мин и Цин мудань (пион древовидный) считался национальным цветком, и действительно, его изображения до сих пор можно найти среди изодранных знамён побеждённых армий Чжили и Бэйяна.\n\nХотя также были озвучены такие предложения, как использование хризантемы, гоминьдановская Комиссия по церемониям и униформе при Министерстве внутренних дел предложила, чтобы цветок сливы стал национальным цветком молодой республики. Цветок сливы, известный как мэйхуа, является символом предельной стойкости перед лицом невзгод, потому что цветки сливы особенно ярко распускаются даже в суровую снежную зиму. Этот образ находит отклик у многих членов Гоминьдана, поскольку за последнее десятилетие партийного руководства партия прошла путь от разрозненного и расколотого движения к окончательному национальному объединению. Сливовое дерево также может расти очень долго, и многие сторонники мэйхуа как национального цветка отмечают его долговечность, что свидетельствует о приверженности партии осуществлению революции доктора Суня и её долголетии. Три тычинки символизируют три принципа Сунь Ятсена, в то время как пять лепестков символизируют пять ветвей власти.\nВ сотрудничестве с Министерством финансов (чтобы напечатать банкноты с изображением цветка сливы) Центральный исполнительный комитет объединил усилия и официально утвердил цветок сливы в качестве символа новой молодой цветущей социалистической республики."
 CHI.midgame.816.a: "Расцвет молодой страны..."

 CHI.midgame.817.t: "Белое солнце над Китаем"
 CHI.midgame.817.d.chi: "Люди в Лунъяне были удивлены, когда появился молодой американец и стал ходить по столице нашей революции, задавая местным жителям вопросы о жизни и нашей борьбе.\n\nХотя его любопытное поведение казалось совершенно спонтанным и привлекло множество любопытных взглядов и диких сплетен, на самом деле это было результатом напряженной работы нашего отдела по связям с общественностью. Иностранец, о котором идет речь, - Эдгар Сноу, американский журналист из Шанхая, который приехал в Лонгян, чтобы стать первым западным писателем, увидевшим наши принципы на практике. С помощью наших опытных разведчиков он благополучно преодолел линию фронта. Здесь он взял интервью у руководителей, включая мадам Сунь и Ван Цзинвэя, а также у рядовых солдат и простых людей на улицах. Он уже симпатизировал нашему делу, и мы постарались, чтобы он убедился в справедливости нашей борьбы.\n\nСегодня его книга появилась в западных магазинах и уже названа некоторыми сенсацией века. Она, несомненно, окажет положительное влияние на наш имидж в глазах людей всего мира, несмотря на то, что подлые клеветники или апологеты империализма могут говорить о предвзятости."
 CHI.midgame.817.d.other: "Прошло несколько месяцев с тех пор, как Лига восьми провинций распалась, а Гоминьдан захватил контроль над Восточным Китаем. В условиях хаоса, царящего в раздробленной стране, достоверные новости было получить сложнее, чем когда-либо прежде. Несмотря на цензуру, введенную военачальниками и цинским правительством, молодой журналист с умом и смелостью пробирался через разоренные войной земли бывшей Лиги на юг, в горы Фуцзяньского базового района Гоминьдана. Эдгар Сноу, приехавший в Шанхай в 1928 году из США, работает в одной из английских газет города. Его смелость перейти линию фронта и открытое сочувствие делу Гоминьдана открыли ему путь к интервью с руководством восстания. Сегодня его наспех отпечатанная книга "Белое солнце над Китаем" появилась в магазинах и вызвала большой интерес у западных читателей. Помимо бесед с партнерами по интервью, он рисует яркую картину жизни в контролируемых Гоминьданом частях Китая, отличную от правления военачальников, но не лишенную раздоров. Его рассказы, хотя и подвергаются критике за романтизацию китайских революционеров, все же вызывают симпатию к борьбе Гоминьдана во всем мире, особенно в левых кругах."
 CHI.midgame.817.a: "Мы донесли информацию до людей"
 CHI.midgame.817.b: "Довольно интересное приключение"
 CHI.midgame.817.c: "Заблуждающийся дурак"
 
#Warlord Subjugation Events
 CHI.midgame.851.t.lkmt: "Новая сила левых в партии?"
 CHI.midgame.851.t.rkmt: "Правые взгляды в партии?"
 CHI.midgame.851.t.rep: "Новое республиканское товарищество"
 CHI.midgame.851.t.other: "Прагматичное революционное партнерство"
 CHI.midgame.851.d.lkmt: "The return of the [FROM.FROM.GetRulingParty] into the Kuomintang revolutionary fold was not unexpected given their common political roots and open sympathy for the [ROOT.Capital.GetCapitalVictoryPointName] government. But [FROM.FROM.GetLeader]'s submissions to our cause has been a two-way street, not only have we influenced [FROM.FROM.GetAdjective] local politics, they have also begun to exert their influence on us.\n\nThe primary beneficiary of this renewed alliance have been the Provisional Action Committee, with delegates of [FROM.FROM.GetLeader] already beginning to side with Song Qingling and her faction in domestic affairs. Their populist, agrarian platform has won them many friends among local leftist groups, often marginalised from the urban centre of national politics.\n\nThe regional nature of [FROM.FROM.GetNameDef] rule should not be overlooked as well. Although they, like all Kuomintang factions, promote a generally centralist and nationalist agenda, the realities of taking power in [FROM.FROM.Capital.GetCapitalVictoryPointName] often required military might and regional connections, lending them more amenable to opposition politics over Wang Jingwei's centralised power-base."
 CHI.midgame.851.d.rkmt: "The submission of [FROM.FROM.GetRulingParty] back into the Kuomintang revolutionary fold is a promising, if challenging development for the party. The two share a common root in Sun Yat-sen's 1924 iteration of the Nationalist party, but have since diverged only to apparently coalesce again under Wang Jingwei's leadership. But this has hardly been a unilateral affair, despite what the central authorities in [ROOT.Capital.GetCapitalVictoryPointName] might say.\n\n[FROM.FROM.GetLeader] has thrown his [FROM.FROM.GetAdjective] influence behind existing rightist factions in the central government, leading to an upswing in support for the Reconstruction Faction. Sun Fo has been happy to absorb his new allies, securing them important posts where he could. This has destabilised the party somewhat, reminding many of the old divisions that once sundered the party's hopes of unification.\n\nMoreover, there remain plenty of divisions between the primarily intellectual, civilian Reconstruction Faction which have always tended to remain towards the centre of power and their new-found friends in [FROM.FROM.Capital.GetCapitalVictoryPointName]. Still, as long as we recognise [FROM.FROM.GetLeader] and his allies as the governor of [FROM.FROM.GetName], their influence is likely here to stay."
 CHI.midgame.851.d.rep: "Возвращение [FROM.FROM.GetRulingParty] обратно в лоно революции Гоминьдана напоминает о старом Союзе защиты конституции Сунь Ятсена, объединявшем разрозненные и якобы демократические группы для противостояния общему реакционному врагу-военачальнику. Однако это не обошлось без взаимного переплетения политических течений.\n\nПризнание лидерства Ван Цзинвэя со стороны [FROM.FROM.GetLeader] знаменует собой большую победу для находящегося в тяжёлом положении председателя, позволяя ему проявить свои давно зарекомендовавшие себя дипломатические навыки. Его союзники по Реорганизованной ассоциации товарищей использовали это, чтобы укрепить его позиции в борьбе с врагами, продвигая идею о том, что он является новым Сунь Ятсеном - одним из немногих людей, способных сохранить единый фронт республиканцев перед лицом суровых ветров реакционерства.\n\nРеальность на местах более приземленная. [FROM.FROM.GetLeader] и его правительство в [FROM.FROM.Capital.GetCapitalVictoryPointName] вряд ли торопятся внедрять партийно-государственное правление Гоминьдана или подчинять свои собственные убеждения социалистической интерпретации трёх принципов партии. Скорее всего, они ведут выжидательную игру, рассчитывая на то, что очевидная сила [ROOT.GetNameDef] делает их наиболее выгодным союзником на данный момент."
 CHI.midgame.851.d.other: "The capitulation of [FROM.FROM.GetLeader] to the Kuomintang revolutionary fold was a pleasant, if not necessarily unexpected surprise to [ROOT.Capital.GetCapitalVictoryPointName]. The reactionary warlords that make up the [FROM.FROM.GetRulingParty] tended to be a pragmatic sort, and this latest change in uniform is probably only natural - switching from one master to a newer, redder one. This wise decision to accept the Kuomintang ultimatum has probably saved thousands of lives, at least for now, though that fact (widely publicised by the party's propaganda machine) could hardly wash the taste of disgust from the mouthes of party hardliners.\n\nIndeed, underneath the pomp and ceremony of the recent \"changing of the flags\" in [FROM.FROM.GetNameDef], the political reality will likely remain largely unchanged in [FROM.FROM.Capital.GetCapitalVictoryPointName]. Life will go on, probably under a hiearchy of local reactionary autocrats, who may at best adopt Kuomintang regalia as a fashion statement and play lipservice to the ideals they represent, but otherwise will disgrace our party's message.\n\nWang Jingwei and other authorities that brokered this agreement promise that they will provide adequate oversight into [FROM.FROM.GetAdjective] affairs and ultimately [FROM.FROM.GetName]'s \"unorthodoxy\" will be rendered moot upon national unification. But even if they race to integrate their new-found conquest, it remains to be seen whether or not the sacrifices of the people living there will be worth it."
 CHI.midgame.851.a: "Необходимое зло, я полагаю..."
 CHI.midgame.851.b: "Неужели товарищи по революции?"
 CHI.midgame.851.c: "Ради блага партии?"
 CHI.midgame.851.d: "В защиту конституции?"
 CHI.midgame.851.e: "Мы должны свести к минимуму их развращающее влияние!"

 CHI.midgame.852.t: "Ярость Хардлайнера"
 CHI.midgame.852.d: "После того как ультиматум Гоминьдана был предъявлен и отменен, надвигающаяся война с [FROM.FROM.GetNameDef] привела к всплеску националистического гнева против [FROM.FROM.GetLeader] и его [FROM.FROM.GetRulingParty]. Гнев эхом разносится по залам власти в [ROOT.Capital.GetCapitalVictoryPointName], поскольку радикалы воспользовались моментом, чтобы отомстить реакционерам - не только за их исторические преступления против Гоминьдана, но и за их продолжающееся угнетение народа.\n\nЭто, однако, имеет побочный эффект ослабления позиций истеблишмента. Приглушенные, но все еще присутствующие вопросы о том, почему [FROM.FROM.GetLeader] недостаточно боятся партии-государства и почему против них еще не были приняты более жесткие меры, вошли в общий политический дискурс. Вероятно, по мере того как будут приходить успехи на полях сражений, эти голоса будут уходить на задний план, но это не значит, что они вообще исчезнут."
 CHI.midgame.852.a: "Волна гнева захлестнула партию."
 CHI.midgame.852.b: "Преуменьшите эти истерические настроения."

 CHI.midgame.853.t: "Возобновление соперничества"
 CHI.midgame.853.d: "Похоже, мы не единственная фракция Гоминьдана, вернувшаяся в Китай. В [FROM.Capital.GetCapitalVictoryPointName] под эгидой [FROM.GetLeader] собрались делегаты правого \"Гоминьдана\", чтобы сформировать конкурирующий центральный комитет. Они прямо объявили нас социалистическими предателями, утверждая, что мы служим интересам Парижа, а не китайского народа.\n\nГоминдан снова разделился на левых и правых, повторив старое разделение до Северного похода. Они уже начали отделять многих правоцентристских членов нашего правительства, и в их лагерь постоянно перетекают дезертиры. Сунь Фо, к счастью, пока остается с нами, хотя и утверждает, что работает над достижением компромисса между нашими правительствами."
 CHI.midgame.853.a: "Нам не нужны реакционеры и предатели."
 CHI.midgame.853.b: "Попросите их остаться в нашем правительстве."

#Outsider Negotiation Events
CHI.midgame.901.t: "Республиканский пакт?"
CHI.midgame.901.d: "Гоминьдан и федералисты имеют общие корни в Гуанчжоу: многие из первых членов обеих групп участвовали в Войне за защиту Конституции против тирании самозваного императора Юань Шикая. Однако альянс между Сунь Ятсеном и Чэнь Цзюнмином быстро распался из-за усиливающегося авторитаризма Сунь Ятсена и готовности Чэня пойти на переговоры с правительством Бэйян после смерти Юаня. Последовавший за этим переворот оставил глубокую вражду между двумя фракциями, которая сохраняется по сей день.\n\nС возвращением Гоминьдана в восточные провинции Китая он вновь становится влиятельной силой в национальной политике, соперничающей с нашими устремлениями. Однако их взоры направлены на север, где они надеются возобновить Северный поход и свергнуть бэйянских милитаристов. Используя личные контакты и каналы связи внутри федералистского движения, председатель Ван Цзинвэй направил эмиссаров с предложением о договоре о ненападении между нашими правительствами ради борьбы с северной угрозой.\n\nС учётом идеологических различий и тяжёлого наследия прошлых конфликтов, такой пакт вряд ли продержится долго. В Гоминьдане найдётся немало противников любого соглашения с нами. Но в китайской истории бывали союзы и постраннее, а эпоха милитаристов — не обычное время."
CHI.midgame.901.a: "Коррумпированные милитаристы Бэйяна должны пасть! Мы согласны."
CHI.midgame.901.b: "Гоминьдан — почти те же красные тираны."

CHI.midgame.902.t: "[FROM.GetNameDefCap] принимает наш пакт!"
CHI.midgame.902.d: "После секретных переговоров между представителями [FROM.GetLeader] и Ван Цзинвэя, председатель наконец получил телеграмму, которую с таким волнением ждал: федералисты приняли наше предложение о договоре о ненападении. Это развяжет нам руки на юге и позволит сосредоточиться на возобновлении Северного похода.\n\nВан Цзинвэй представил этот договор Центральному исполнительному комитету внезапно, врасплох застав Переходный комитет действий. Он хорошо знает, как отреагируют их члены — слепая ненависть к Чэнь Цзюнмину и его сторонникам давно затмила их суждения. Все помнят, как предатель Чэнь отвернулся от доктора Сунь Ятсена ради пустых переговоров с милитаристами и позже стал марионеткой Чжилийской клики. Говорят, Сун Цинлин винит артобстрелы федералистов при перевороте Чэня за свой выкидыш.\n\nНесмотря на сомнения даже в рядах ПАт, добиться принятия соглашения до голосования в ЦИК было необходимо. Единственными, кто оказался готов поддержать временное перемирие, стали Реконструкционисты, обеспечившие минимальное большинство. Ван утратил немалую поддержку, но если это обеспечит успех Второго Северного похода — это было необходимо."
CHI.midgame.902.a: "Неприятная сделка, но необходимая."

CHI.midgame.903.t: "[FROM.GetNameDefCap] отвергает наш пакт!"
CHI.midgame.903.d: "После нескольких дней тайных переговоров между представителями [FROM.GetLeader] и Ван Цзинвэя председатель получил именно то, чего так боялся: федералисты отказались от предложения о ненападении. То ли из-за старых обид времён Движения защиты Конституции, то ли по идеологическим причинам, то ли из-за конкуренции — соглашения не будет.\n\nВан изо всех сил пытался скрыть факт переговоров, но безуспешно. Очевидно, в президентском дворце хватает шпионов, и подробности утекли в руки радикальной прессы, раскрутившей крайне негативный нарратив.\n\nPR-команда Вана старается опровергнуть слухи, но факт, что он был готов говорить с врагами Сунь Ятсена, делает его слабым и беспринципным в глазах публики. Неудача не спасла его имидж: репутация переговорщика разрушена. Похоже, революционные настроения на юге закалились — выживет лишь одно видение будущего Китая."
CHI.midgame.903.a: "Чего ещё ждать от милитаристов и предателей?"

CHI.midgame.911.t: "Пакт с Гоминьданом?"
CHI.midgame.911.d: "Оригинальный Гоминьдан был основан доктором Сунь Ятсеном как преемник широкого союза Тунмэнхуэя. Однако его успехи были омрачены тем, как Юань Шикай и его клика милитаристов Бэйян извратили дело революции. Двусмысленность в трактовке Трёх народных принципов и левый поворот Сунь Ятсена после его начального либерального национализма стали одной из главных (хоть и замалчиваемых) причин будущего раскола партии после его смерти.\n\nСконцентрировав вокруг себя колоссальную власть и культ личности, Сунь собрал разнородную коалицию, которая после его смерти разлетелась на левое, правое, центристское и военное крыло. Последний удар по единству партии нанёс провал Северного похода. После этого осколки Гоминьдана рассеялись — большинство решило, что лучше действовать в одиночку.\n\nТеперь судьба вновь сталкивает нас: два конкурирующих правительства Гоминьдана — в [FROM.Capital.GetCapitalVictoryPointName] и [ROOT.Capital.GetCapitalVictoryPointName]. Идеологическая пропасть между нами слишком велика, но бывшие однокурсники по Хуанпу и сослуживцы из НРА пытаются организовать временный пакт о ненападении ради борьбы с милитаристами Бэйян на севере. Ведь если даже единый НРА не смог победить в 1927, то в одиночку это и подавно невозможно."
CHI.midgame.911.a: "Мы должны объединиться ради партии и нации!"
CHI.midgame.911.b: "[FROM.GetLeader] — не более чем лакей французов."

CHI.midgame.912.t: "[FROM.GetNameDefCap] принимает наш пакт!"
CHI.midgame.912.d: "После нескольких дней негласных переговоров между представителями [FROM.GetRulingParty] и верховным командованием НРА заключено соглашение о перемирии между конкурирующими правительствами Гоминьдана на неопределённый срок. Подписи под ним поставили [FROM.GetLeader] и Дэн Яньда. Оно позволит обеим сторонам сосредоточиться на будущем возобновлении Северного похода и, наконец, похоронить Бэйян.\n\nЭто соглашение с правыми в партии, давно скатившимися в милитаризм и идейное предательство, вызвало негодование у многих. Жёсткие социалисты и даже умеренные осудили его как извращение и критикуют, как оно было заключено. Хотя Ван Цзинвэй и Центральный комитет дали молчаливое согласие, ПАт выразили резкое недовольство, обвиняя военных в том, что те ставят старую дружбу выше нужд народа.\n\nТем не менее, поддержка Председателя и партийной ортодоксии укрепилась в ответ на критику. ПАС и Реконструкционисты молчат, отмежёвываясь от действий союзных генералов. Но если это нужно для освобождения Китая — значит, так тому и быть."
CHI.midgame.912.a: "Нужно прикрыть фланг, во что бы то ни стало."

CHI.midgame.913.t: "[FROM.GetNameDefCap] отвергает наш пакт!"
CHI.midgame.913.d: "Несмотря на дни тайных переговоров между представителями [FROM.GetRulingParty] и командованием НРА, ожидаемое перемирие между конкурирующими правительствами Гоминьдана не состоялось. Все разговоры о товариществе и воспоминания о Хуанпу разбились о недоверие между лагерями. Похоже, мира между Центральными комитетами не будет.\n\nХотя провал был ожидаем, реакция оказалась ожесточённой. Обман со стороны [FROM.GetAdjective] руководства и готовность стольких людей из НРА и Гоминьдана вообще рассматривать возможность переговоров разочаровала убеждённых социалистов. Гоминьдан выступает против милитаристов на словах, но легко идёт с ними на компромиссы.\n\nТеперь многие видят в партии слишком замкнутую структуру, неспособную оторваться от личных интересов и связей с предателями. Всё больше людей обращаются к радикалам из Синдикалистской партии Китая, надеясь на будущее без коррупции и наследия эры милитаризма."
CHI.midgame.913.a: "Чего ещё ждать от милитаристов и еретиков?"
###- Late Game Events -###

### Section 3a (000-199): Political Content

 CHI.lategame.000.t: "Завершение Северного похода"
 CHI.lategame.000.d: "Около десяти лет назад Чан Кайши обратился к своим офицерам накануне Северного похода:\n\n\"Важность этой борьбы заключается не только в том, что она решит судьбу полевых командиров. Но вопрос о том, сможет ли китайская нация и народность восстановить свою свободу и независимость, висит на волоске. Другими словами, это борьба между нацией и военачальниками, между революцией и контрреволюционерами, между Тремя народными принципами и империализмом.\"\n\nТогда Гоминьдан был повержен, но борьба так и не закончилась. Сегодня голубое небо, белое солнце и совершенно красная земля наконец-то взошли над изменившимся Пекином, и члены партии (как те, кто был свидетелем первой экспедиции, так и те, кто присоединился к ней в промежуточный период) приветствовали их. Пока [CHI.GetLeader] и другие члены партии произносили свои речи, солдаты маршировали, а эксперты размышляли о будущем, не оставалось сомнений в значимости момента: победы.\n\nДа, именно победы. Победы над военачальниками. Победы над контрреволюционерами. Победы над империализмом. Чан Кайши и многие другие не дожили до этого момента, но их наследие сохранено. Гоминьдановцы доказали, что способны на большее, чем просто слова, свергая институты, которые они так ненавидели.\n\nДаже если сопротивление продолжится и вражеские очаги будут зачищены, нация изменится. Социализм всё больше и больше выглядит как надежное будущее для Китая, а Гоминьдан больше не просто маргинальная партия. Но угрозы остаются. Тяжела голова, на которой корона, и вновь обретённая легитимность партии привлекла внимание множества врагов как внутри страны, так и за рубежом. Тем временем партия борется за то, чтобы не потерпеть краха из-за притока оппортунистов, разногласий и новых обязанностей. Люди теперь ожидают, что они будут руководить, а это зачастую гораздо сложнее, чем свергнуть."
 CHI.lategame.000.a: "Нам предстоит много работы."

#Цепочка событий Второго съезда
 CHI.lategame.001.t: "Созыв Второго съезда репатриантов Гоминьдана"
 CHI.lategame.001.d: "Поскольку флаг с изображением белого солнца, голубого неба и совершенно красной земли теперь развевается над воротами Тяньаньмэнь над недавно установленным портретом покойного вечного премьера доктора Сунь Ятсена, по всей стране раздаются призывы созвать специальную чрезвычайную сессию Всекитайского съезда. В то время как традиционно ортодоксальная партийная доктрина требовала проведения таких собраний каждые четыре года, события национальной революции вместо этого приостановили эту процедуру в пользу созыва заседаний по мере необходимости.\n\nПредседателю [CHI.GetLeader] вновь была оказана честь открыть съезд в ознаменование успеха Северного похода, но наблюдатели за съездом отмечают, что настроение делегатов значительно более напряжённое, чем на первом съезде. Конечно, ходят слухи, что в темноте точат ножи, особенно среди тех, кто выступает против стремления председателя Вана к авторитаризму. В то время как [CHI.GetNameDef] контролирует бывшую имперскую столицу Пекин, укрепляя свою легитимность в качестве объединителя нации; предстоит ещё многое сделать, чтобы завоевать сердца и умы людей и раз и навсегда изгнать японских империалистов из Китая.\n\nСъезд также стал свидетелем более активного участия женщин-революционерок в рядах Гоминьдана. Наиболее заметными из них являются Дэн Инчао, Цзэн Син, Цай Чан и Сян Цзинъюй (все они имеют давние связи с китайским социалистическим движением), а также новички, такие как жена уйгурского политика Бурхана Шадиди и заместитель директора Федерации женщин Синьцзяна Рашида. Кроме того, на мероприятии присутствуют члены Военной миссии Интернационала в Китае, что является ещё одним напоминанием о решительной поддержке Интернационалом успеха социалистической революции в Китае. И без дальнейших церемоний заключительные замечания Вана о важности единства вызвали лишь вежливые аплодисменты, когда делегаты съезда начали брать слово."
 CHI.lategame.001.a: "Ну что ж, приступайте!"

 CHI.lategame.002.t: "Грандиозные амбиции Новой Республики"
 CHI.lategame.002.d: "Первым пунктом повестки дня съезда было преобразование массовой партийно-государственной бюрократии в более широкую национальную форму. Гоминьдан должен стать не только политическим органом в течение следующих решающих лет политической опеки, но и руководящей силой для воспитания революционного сознания масс, чтобы сам китайский народ смог, наконец, противостоять империализму. Таким образом, почти единогласным голосованием были одобрены предложения о создании официального Министерства образования и Национальной администрации здравоохранения.\n\nМинистерство образования возглавит один из четырёх старейшин Гоминьдана и член Всемирного общества Цай Юаньпэй. Он пользуется большим авторитетом благодаря своей работе по реформированию Пекинского университета почти десятилетием ранее, сам является философом-анархистом и выступает за сочетание труда и обучения в сфере образования. Основой концепции нового революционного образования является привлечение студентов и рабочих в систему образования, что положит конец монополизации образования богатыми. Наряду с планируемым строительством Академии Синика, здесь также появятся колледж промышленного труда, колледж сельскохозяйственного труда и колледж социальных наук (третий вариант, отражающий анархистские идеалы о неразрывности социальных наук и социальной революции).\n\nМедицинские условия в сельской местности Китая по меркам современной медицины крайне плачевны, и в некоторых случаях акушеры прибегают к использованию коровьего навоза или грязи, чтобы остановить кровотечение во время родов. Укрепление общественного здравоохранения рассматривается не только как продолжение Миньшэн (народного благосостояния), но и отражает убеждение доктора Суня в том, что физически сильных людей не так-то легко покорить. В результате Министерство внутренних дел создало Национальную администрацию здравоохранения; его целями являются создание мобильных клиник и пунктов общественного здравоохранения, обеспечение проведения вакцинации и обучение местных акушеров/медсестёр современным медицинским методам. Под давлением ВКД первые экспериментальные медицинские клиники администрации будут созданы в бывшей зоне Миньгань."
 CHI.lategame.002.a: "Мы превращаем мечты в реальность."

 CHI.lategame.003.t: "Проблема языка"
 CHI.lategame.003.d: "По мере того как съезд продолжается, одним из главных вопросов, требующих ответа, становится вопрос о языке. В Китае почти 300 миллионов человек являются носителями северного диалекта путунхуа (мандаринского языка). На юге страны 37 миллионов человек говорят на у (диалекте Чжэцзяна), 22 миллиона - на кантонском диалекте, 20 миллионов - на хакка и несколько миллионов - на фуцзяньском диалекте. Во время войн за объединение, несомненно, имели место инциденты, когда незнание языка приводило к хаосу в вооруженных силах и по всей стране.\n\nВ то время как северокитайский диалект путунхуа продолжает преобладать в качестве официального языка правительства, между теми, кто настаивает на стандартизации китайского языка и его использовании в культурных, официальных и образовательных целях, разгорается спор. Есть те, кто поддерживает культурную защиту многих языков Китая. Сторонники радикальной языковой реформы, особенно среди радикальных социалистов, утверждают, что система иероглифов должна быть упрощена для распространения массовой грамотности по всей стране. Однако против них выступают традиционалисты из Гоминьдана. Они утверждают, что такое значительное упрощение языка лишит символы и слова их первоначального значения и культурной утончённости.\n\nОднако был достигнут компромисс: Министерство образования сначала опубликовало список "Общеупотребительной лексики гойинь", который включает популярные упрощённые иероглифы и определяет стандартную фонетическую систему. Кроме того, было предложено создать комитет по унификации национальных языков, чтобы использовать упрощённые иероглифы, которые уже используются, в качестве стандартных иероглифов. Однако это далеко не радикальная реформа иероглифов и не направлено на изменение многих существующих иероглифов в китайском ханьцзи."
 CHI.lategame.003.a: "Так или иначе, Китай должен быть единым."

 CHI.lategame.004.t: "Национальная реконструкция"
 CHI.lategame.004.d: "Годы экономической стагнации и провала правительства превратили китайскую экономику в посмешище в глазах модернизированного и промышленно развитого Запада. Если Китай хочет восстановить своё историческое положение ведущей державы в Азии, то, как и Япония до неё, он должен взять на себя задачу быстрой индустриализации и модернизации.\n\nВедущими дискуссии о национальном восстановлении являются не кто иные, как члены Центрального комитета Чэнь Гунбо и Сун Цзивэнь. И Сун, и Чэнь рассматривают Китай как экономически колонизованную страну, вынужденную позволять иностранным державам добывать её сырьё и вторгаться на её рынок, что препятствует промышленному развитию Китая. На Чэня и Суна оказали влияние международные события во Французской коммуне, Британском союзе и, что интересно, даже российские свободники, которые разработали концепцию автаркической индустриализации, или переориентации экономики на принципы дирижизма и корпоративизма.\n\nОни планируют создать Национальный экономический совет, который будет стремиться использовать централизованное экономическое планирование, развитие с помощью централизованно управляемых производственных групп, мобилизацию сельского хозяйства в поддержку индустриализации городов и корпоративные отношения между правительствами и частным бизнесом (разумеется, за счёт государства). Чэнь Гунбо утверждал, что, национализировав и монополизировав внешнюю торговлю, государство получит дополнительные средства для наращивания капитала. Конечной целью этой государственно-капиталистической модели является развитие китайской экономики, а также предотвращение скатывания новой Китайской республики к буржуазному капитализму. Конечно, могут найтись капиталисты, которые разбогатели бы в процессе использования частного капитала, но, по словам Чэня Гунбо, они не набрали бы достаточной силы, чтобы подорвать экономическую систему партии-государства."
 CHI.lategame.004.a: "Для борьбы с капитализмом необходимо новое направление."

 CHI.lategame.005.t: "Национальный гимн"
 CHI.lategame.005.d: "С объединением собственно Китая под мечом и флагом Гоминьдана были предприняты усилия по укреплению националистического правления с помощью надлежащего китайского гимна. Предыдущий гимн Бэйянской Республики \"Песня благоприятному облаку\" и другие гимны были осуждены как отсталые и не имеющие отношения к современной китайской революционной борьбе. Кроме того, Комиссии по национальным гимнам было поручено создать патриотическую песню, которая объединила бы миллионы людей, составляющих китайскую нацию, с целью укрепления национализма в рамках стремления партии к \"Миньцзу\".\n\nВ то время как некоторые радикальные социалисты из Гоминьдана и Союза синдикалистов Китая предложили Интернационал (переведённый на китайский язык синдикалистом Цюй Цюбаем), этот шаг вызвал негативную реакцию со стороны членов Центрального комитета, которые считают, что текст национального гимна должен отражать принципы, которыми дорожил наш покойный премьер-министр доктор Сунь Ятсен. Поэтому многие выступают за то, чтобы перенять "Три народных принципа" профессора Чэн Маоюня, текст которого восходит к речи Сунь Ятсена, произнесённой в 1924 году. В качестве альтернативы, предложение поступило от китайского музыканта Хуан Цзы, слова которого взяты из стихотворения, написанного известным идеологом правого крыла Гоминьдана Дай Цзитао. Хотя эта песня и не так популярна, как два других варианта, её также предлагали исполнять при подъёме и опускании национального флага."
 CHI.lategame.005.a: "Три народных принципа!"
 CHI.lategame.005.b: "Предложение Хуана Цзы!"
 CHI.lategame.005.c: "Интернационал"

 CHI.lategame.006.t: "Марш к объединению!"
 CHI.lategame.006.intro: "Поскольку Пекин и Нанкин впервые в истории партии оказались в руках Гоминьдана, партия, безусловно, добилась большей степени легитимности, чем когда-либо прежде. Тем не менее, военачальники все еще остаются либо в неопределенных свободных союзах с [CHI.GetNameDef], либо открыто выступают против претензий Гоминьдана на национальное лидерство."
 CHI.lategame.006.concessions: "С городами-концессиями в Китае также следует поступить сурово, поскольку, по мнению Гоминьдана, эти регионы являются неотъемлемыми китайскими землями, незаконно украденными в результате унижений, позорных договоров и жестоких вторжений. Как только Гоминьдан успешно завершит процесс национального объединения и этап политической опеки, нет никаких сомнений в том, что [CHI.GetNameDef] будет стремиться потребовать восстановления всех китайских территорий, принадлежащих иностранцам."
 CHI.lategame.006.d.copro: "$CHI.lategame.006.intro$\n\nМаньчжурская проблема продолжает беспокоить Гоминьдан, и Национально-революционная армия обдумывает свои шансы на освобождение этой неотъемлемой китайской территории от фэнтяньских военачальников. Жители Северо-востока стали жертвами этих бандитов, и позиция Фэнтяня укрепляется благодаря его статусу лакея в империалистической Сфере сопроцветания Японии. В ближайшие дни не будет неожиданностью, что [FNG.GetLeader] мобилизует свои силы в отчаянной попытке положить конец Второму Северному походу или что Япония выступит против Гоминьдана из-за открытой антиимпериалистической позиции последнего.\n\n$CHI.lategame.006.concessions$"
 CHI.lategame.006.d.war: "$CHI.lategame.006.intro$\n\nWith war having broken out over the Manchuria problem, the National Revolutionary Army has been tasked with liberating this integral Chinese territory from the corrupt regionalist warlords. The people of the Northeast have fallen victim to these bandits and the Fengtian clique's position was shored up by their lackey status to Japan's imperialistic Co-Prosperity Sphere. Now, as Kuomintang forces battle the [716.owner.GetAdjectiveCap] host the Congress has reaffirmed their commitment to the liberation of all of China.\n\n$CHI.lategame.006.concessions$"
 CHI.lategame.006.d.nocopro: "$CHI.lategame.006.intro$\n\nМаньчжурская проблема продолжает беспокоить Гоминьдан, и Национально-революционная армия обдумывает свои шансы на освобождение этой неотъемлемой китайской территории от фэнтяньских военачальников. С исчезновением Сферы сопроцветания они представляют гораздо меньшую угрозу, хотя Маньчжурия по-прежнему сильно индустриализирована и сама по себе является объектом империалистических амбиций.\n\n$CHI.lategame.006.concessions$"
 CHI.lategame.006.a: "Мы должны освободить Китай, несмотря ни на что!"

 CHI.lategame.007.t: "Закрытие съезда"
 CHI.lategame.007.d: "Председатель [CHI.GetLeader] выступил в последний раз на заключительном заседании второго съезда партии, произнеся красноречивую речь, восхваляющую мучеников и жертвы, принесённые во время Второго Северного похода. От войны Лиги до взятия Пекина многие товарищи-революционеры пали на этом пути, и борьба ещё далека от завершения. До тех пор, пока в Китае сохраняется империализм, Китай не может называть себя свободным - для Гоминьдана пришло время принять своё естественное предназначение и стать настоящим революционным авангардом, который поведёт китайский народ в новую эру уважения и престижа.\n\nТем не менее, завершение Второго съезда вызвало некоторые всё более ожесточающиеся дебаты между членами Временного комитета действий и Реорганизованной ассоциацией товарищей. Шаткий единый фронт между основными фракциями партии, а также другими второстепенными периферийными группировками национальной революции начинает распадаться, поскольку больше нет такого доминирующего призыва к единству. В адрес Вана поступает всё больше критики, поскольку многие в ВКД опасаются, что он просто попытается установить опекунство или просто передать власть своим друзьям и семье кумовским путём. Чэнь Гунбо вовсе не был безжалостен в своих оскорблениях в адрес Дэна Яньды, когда сравнивал генерала и его военные круги с бонапартистами и утверждал, что ВКД приведёт не к демократии, а к многолетнему военному правлению. Всё это время в некоторых экстремистских кругах НРА значительно усилилось то, что когда-то было просто молчанием - разговоры о назревающем радикализме, если руководство партии не сможет само с этим справиться.\n\nТем не менее, многое ещё предстоит сделать, прежде чем Гоминьдан сможет по-настоящему успокоиться. Национальная революция должна продолжаться, и фаза опеки не может закончиться до тех пор, пока империализм не будет окончательно изгнан из страны."
 CHI.lategame.007.a: "Нам предстоит проделать большую работу."

#Phase 3 Political Narrative Events (040-059) - fire every 6 months

 CHI.lategame.040.t: "Сюй Цянь скончался"
 CHI.lategame.040.d: "После падения династии Цин в 1911 году появилось много потенциальных законодателей, которые стремились восстановить справедливость в реформированном Китае. Немногие были такими честными и влиятельными, как Сюй Цянь, отец-основатель судебной системы нашей республики. Родившийся в Наньчане, он успешно сдал императорский экзамен и в 1907 году поступил на работу в министерство юстиции. Он был членом партии Тунмэнхой, когда стал заместителем министра юстиции в кабинете Тана Шаои, но подал в отставку в знак протеста против захвата власти Юанем Шикаем. С тех пор он занимал различные посты в Гоминьдане, включая место в Центральном исполнительном комитете.\n\nПотеря такого выдающегося члена старой гвардии - большая трагедия для партии, даже если ему повезло, что он умер от старости и прожил достаточно долго, чтобы увидеть наше освобождение Пекина. И всё же борьба за власть уже началась. В качестве компенсации за потерю места в ЦИК Ван Цзинвэй назначил его министром юстиции в революционном правительстве. Сюй склонился на сторону ВКД, и от тех же подозреваемых посыпались обычные жалобы на расстановку сил. У Вана не хватает терпения на очередной виток театральности, когда он вспоминает грохот, поднявшийся после смерти Ляо Чжункая.\n\nЦай Юаньпэй, бывший наставник Вана и один из уважаемых \"старейшин\" партии, проявил инициативу, предложив занять эту должность. Педагог по образованию, в том, что бывший анархист стал министром юстиции, есть определенная ирония, но, возможно, это отчасти является компромиссом между РАТ, ВКД и ССК.\n\nВ лагере Вана Ло Цзюньцян стал ведущим кандидатом по рекомендации Чжоу Фохая. Ло - бывший радикал из СКП, бывший подполковник при Чжане Чжичжуне и имеет опыт работы редактором газеты.\n\nХотя теоретически кандидатура министра юстиции выдвигается премьером судебного юаня, ЦИК провела закрытое заседание, чтобы решить, какую кандидатуру \"предложить\" премьеру."
 CHI.lategame.040.a: "Цай Юаньпэй - это надежный выбор."
 #羅君強
 CHI.lategame.040.b: "Ло Цзюньцян, чтобы отправить послание."

CHI.lategame.041.t: "Инцидент с Чэнь Бицзюнь"
CHI.lategame.041.d: "Чэнь Бицзюнь, или, как её многие насмешливо называют, Ван Фужэнь (мадам Ван) — это сила сама по себе. Пока Ван доминирует на политической сцене Нанкина, она создала множество собственных опорных пунктов для укрепления позиций своего мужа. В доказательство своей власти она якобы однажды заявила недавно назначенному мэру: «Город — мой. Ты туда поедешь, но никем не будешь управлять. Ты просто представляешь меня». Однако такой активный образ жизни заставляет её часто путешествовать, делая её уязвимой для врагов.\n\nИли так они думали. С помощью местных (по слухам, бывших милитаристов) командиров её кортеж попал в засаду на параде, на котором она должна была присутствовать. Попытка похищения была быстро пресечена благодаря плотной охране.\n\nПравительство начало расследование, и вскоре начались взаимные обвинения. Чэнь публично обвинила армию в организации покушения, в то время как её оппоненты утверждают, что всё было инсценировано для получения сочувствия и предлога к арестам. Несмотря на очевидную вину нападавших, сторонники Чэнь навредили её делу своими грубыми действиями в первые часы после инцидента.\n\nНеоспоримо одно — Китай становится всё более небезопасным, даже в давно «освобождённых» регионах под контролем Гоминьдана. Насилие против политиков стало нормой, и не у всех есть вооружённая охрана повсюду. Чжоу Эньлай предложил выждать, утверждая, что месть — блюдо, которое подаётся холодным. Ван, разгневанный нападением на свою любимую жену, обратился за советом к Ли Шицюню.\n\nЛи, бывший член Красного отряда, ныне возглавляющий службу безопасности семьи Ван, предложил жёсткий подход: проводить обыски по домам и выявлять подозреваемых. Его влияние во фракции Резиденции, несомненно, возрастёт после успешной защиты Первой Леди."
CHI.lategame.041.a: "Арестовать всех, кто хоть как-то причастен!"
CHI.lategame.041.b: "Пропустить мимо ушей и точить ножи."

CHI.lategame.042.t: "Анархизм и партийное государство"
CHI.lategame.042.d: "В своей бесконечной борьбе за контроль над синдикалистским движением в Китае Четверо старейшин попытались втянуть в него анархистских мыслителей и интеллектуалов. Когда-то бывшие анархистами, а также главными покровителями «Мирового общества», они вступили в Гоминьдан в 1920-х годах — на осмеяние со стороны «истинных верующих».\n\nУ Чжихуэй громче всех защищает это решение. Он утверждает, что Гоминьдан, Мировое общество и анархисты имеют общего врага — милитаризм, и, как Кропоткин поддержал Великую войну, так и анархистам иногда стоит поддерживать схожие по духу движения. Более того, с возвращением Гоминьдана в Китай он заявляет, что партия с 1927 года значительно изменилась, искренне стремится к революции, а если и собьётся с пути — её можно направить обратно, если анархистов будет достаточно.\n\nУбедить удалось не всех. Мао Ибо, например, обвиняет Гоминьдан в коррупции и служении интересам военных и карьеристов. Шэнь Чжунцзю, анархо-синдикалист из Чжэцзяна, некогда работавший с партией, но с тех пор отдалившийся, повторяет свои опасения, высказанные ещё в 1924 году в журнале «Свободный народ».\n\nДля него идея общего врага — лишь предлог для любых союзов, а анархист — это не «рыцарь-странник» из классики, обязанный помогать каждому. Современный анархист должен быть верен принципам и думать о последствиях. Он также резко осудил поддержку Четырёх старейшин опеки, демократии и диктатуры пролетариата — всех систем, сохраняющих государство и частную собственность. Следовать таким путём к анархизму, который исключает и то и другое — «всё равно что идти на юг, чтобы попасть на север».\n\nТем не менее, Шэнь и другие раньше сотрудничали с Гоминьданом. Но по мере того как партия становится всё более авторитарной, одного красноречия уже недостаточно, чтобы завоевать сердца."
CHI.lategame.042.a: "Четверо старейшин меняют нарратив."
CHI.lategame.042.b: "Анархисты остаются подозрительными."

CHI.lategame.043.t: "Убийство Ван Лэпина!"
CHI.lategame.043.d: "Сегодня в Нанкине было совершено жестокое убийство. Хотя многие уже привыкли к насилию и смертям, даже среди политиков, эта смерть вызвала сильные эмоции. Ван Лэпин был давним социалистическим революционером из уезда Улянь, провинции Шаньдун. Плодовитый писатель, прогрессист и активист, он часто служил связующим звеном между лагерем Ван Цзинвэя и другими социалистами.\n\nК 1926 году он стал первым альтернативным членом Центрального исполнительного комитета, а также работал под началом Дэн Яньда и Фэна Юйсяна. Обычно его уважали (если не любили), он отошёл от Чэня Дусю и марксизма, примкнув к умеренному крылу Перестроенной ассоциации товарищей, где вместе с Гу Мэньюем редактировал газету «Вперёд». Подозреваемых в преступлении множество, а мотивы — неясны.\n\nХарактер и жестокость преступления указывают на Дай Чунфэна и его людей, обладающих широкой сетью в районе Цзяннани с времён Лиги Десяти. ПАт обвинили в случившемся всю армию, считая это кульминацией долгой кампании давления на сторонников ПАт. В ответ политики из ПАС утверждают, что Ван Лэпин едва не примкнул к ним, а Красный отряд Чжоу Эньлая ничем не уступает Лиге в жестокости, когда дело касается устранения предателей.\n\nМаловероятно, что настоящие преступники будут пойманы. В лучшем случае — арестуют нескольких мелких козлов отпущения. Но по мере нарастания подозрений, скорее всего, одна версия победит в общественном сознании, даже если в неё поверят не все."
CHI.lategame.043.a: "Во всём виноваты Дай Чунфэн и армия!"
CHI.lategame.043.b: "Это дело рук Чжоу Эньлая и теневого государства!"

CHI.lategame.044.t: "Церковь в Националистическом Китае"
CHI.lategame.044.d: "«Религия учит послушанию, а это — моральный код рабов! Религия пропагандирует суеверия, мешающие поиску истины.»\n\nТакие лозунги можно увидеть в Пекине, распространяемые возрождающейся Великой федерацией антирелигиозников. Федерация объединяет китайских интеллектуалов, как входящих в Гоминьдан, так и вне его. Антиклерикализм в Китае имеет множество корней — особенно в отношении христианства, которое интеллигенция считает отсталой и связанной с иностранным империализмом. Эта общая неприязнь объединяет социалистов, анархистов и националистов, протестующих, к примеру, против Всемирной федерации христианских студентов, собравшейся в Цинхуа. Ранее во главе движения стояли Ли Шицзэн, Чэнь Дусю, Цай Юаньпэй, Ли Дачжао и Ван Цзинвэй.\n\nОднако не все в партии враждебно относятся к религии или даже к христианству. Патриарх семьи Сун, Сун Цзясу, был методистским пастором и воспитал своих детей в вере. Доктор Сунь Ятсен и Сун Фо также приняли христианство. Многие другие балансируют между конфуцианским воспитанием и христианской проповедью. Чжан Факуй и его жена, например, частично связаны с католицизмом, хотя и не приняли веру официально.\n\nОсторожно избегая конфликта в столь щекотливом вопросе, Ван Цзинвэй и Сун Цинлин в основном воздерживаются от заявлений, ограничиваясь общими призывами к миру и взаимному уважению. Но зачастую лозунги революции о социальном переустройстве больно задевают нерв общества в быстро меняющемся Китае."
CHI.lategame.044.a: "Церковь подрывает государство."
CHI.lategame.044.b: "У церкви есть своё место."

 CHI.lategame.045.t: "Декларация..."
 CHI.lategame.045.d: "По мере того, как революция затягивается, партия сталкивается с трудной задачей. Движение, которое, несмотря на все свои разногласия, когда-то было сосредоточенным, хотя и находилось на последнем издыхании, теперь достигло критической точки. Поскольку [CHI.GetName], поглотившее большую часть Китая, всё больше и больше несоциалистов присоединяются к якобы демократической партии. Тем временем, чувствуя победу и не желая отказываться от обещаний, ради которых они стольким пожертвовали, многие левые радикализировались. Многие опасаются, что вскоре члены партии снова вцепятся друг другу в глотки, как в 1924 году.\n\nЭта проблема нашла отражение в противоречивых рабочих документах, принятых в связи с Законодательным Юанем. В первом из них утверждается, что главная проблема Китая заключается в бедности крестьянства, и что они бедны из-за нехватки земли. Поэтому он призывает недавно созданное Министерство сельского хозяйства и труда провести долгожданную земельную реформу. Кроме того, ряды Гоминьдана должны пополняться растущим числом пролетариата в индустриализирующихся городах страны. Поэтому партия должна поддерживать создание профсоюзов и разрыв как внешних, так и внутренних связей. Вполне уместно, что проект посвящен союзу "крестьян и рабочих".\n\nДругой, менее популярный проект направлен на устранение растущих опасений раскола в партии-государстве. Если партия представляет нацию, то она не может позволить себе вернуться к состоянию квазигосударственной войны, как в Гуанчжоу. В документе содержится призыв к примирению как с бывшими правыми гоминьдановцами, так и с другими революционерами-демократами для построения нового, представительного Китая. Хотя в нем также упоминается о выполнении социальных и экономических обещаний, в нём также содержится призыв к умеренности и прощению прошлых проступков.\n\nВ конечном счёте, представленные законопроекты - это всего лишь слова относительно бессильного законодательного органа. Но, поскольку свобода выражения мнений часто подавляется (де-юре или де-факто), зачастую эти залы являются одними из немногих мест, где допускается свободное обсуждение. Декларация, которая в конечном итоге будет принята, продемонстрирует силу различных фракций."
 CHI.lategame.045.a: "...рабочим и крестьянам!"
 CHI.lategame.045.b: "...единстве внутри партии!"

 CHI.lategame.046.t: "Создание Лиги гражданских прав"
 CHI.lategame.046.d: "Гоминьдановская революция вызвала разговоры о более свободном Китае, но не всегда в положительном ключе; многие интеллектуалы заметили несоответствие между обещаниями Гоминьдана и реальностью партийно-государственного устройства. Подобно вспышкам на сковороде, большинство попыток высказаться ни к чему не привели, за исключением, пожалуй, одной.\n\nЛига гражданских прав Китая, первоначально созданная по инициативе иностранных журналистов левого толка, живущих в Шанхае, была создана в 1932 году как средство сбора либеральной поддержки Шанхайского восстания. Эта "новая линия действий" включала в себя создание разительного контраста между чжилийским угнетением и гоминьдановским освобождением.\n\nИх манифест включал три цели: освобождение политических заключённых, оказание юридической помощи политическим заключённым и содействие в борьбе за гражданские права, включая свободу организации, слова, печати и собраний. Они привлекли внимание как либералов на международном уровне, так и истеблишмента Бэйяна, хотя и не добились успеха в освобождении ни одного узника.\n\nВан был недоволен, когда в прошлом месяце Сун Цинлин, Цай Юаньпэй и Ян Синфо отправили в ЦИК очень публичную телеграмму от имени Лиги. В письме содержалось требование прекратить произвольные аресты, и его подписали десятки видных деятелей партии, научных кругов и прессы. Опасность существует в изобилии, и есть сомнения в его долговечности. Сун и Цай уже получили строгие предупреждения за то, что вышли за рамки партийной ортодоксии, и поступают анонимные угрозы расправой (хотя их высокий ранг защищает их от любого реального вреда). Другие, однако, не так сильно. Вчера днем Ян был застрелен перед зданием Академии Синика, от чего по всей Лиге пробежал холодок.\n\nЛига также пошатнулась из-за междоусобиц. Новые деятели культуры, такие как Ху Ши и Лю Ютан, неохотно вступали в неё, если Лига не обязалась использовать только легальные каналы. Из-за существовавшего ранее соперничества внутри ССК, СПК не решалась присоединиться к Всемирному обществу в поддержке Лиги. Многие из первоначальных членов пошли на крайние меры, подорвав авторитет Сун и Цай. В конечном счёте, это была довольно элитарная организация, которая также изо всех сил пыталась заручиться поддержкой населения."
 CHI.lategame.046.a: ""Особые методы" и междоусобицы делают Лигу бессильной."
 CHI.lategame.046.b: "Сун и Цай превращают Лигу в движущую силу перемен."

 CHI.lategame.047.t: "Благотворительность и хитрость в Китае"
 CHI.lategame.047.d: "Если и есть что-то светлое в хаосе и трагедии войны, так это то, что сообщества и нации становятся ближе друг к другу в знак солидарности. Учитывая, что войны и революции разрушают жизни стольких людей, зачастую правительственных инициатив просто недостаточно, чтобы помочь страждущим. Когда магистраты перегружены работой, часто остаётся место для скромных героев, которые могут протянуть руку помощи.\n\nСун Цинлин, вдова Сунь Ятсена, привлекла всеобщее внимание благодаря своим многочисленным благотворительным акциям. Являясь президентом Китайского благотворительного фонда (первоначально основанного как Лига защиты Китая), они собирают деньги за счёт иностранной помощи и частных пожертвований на широкий спектр целей, включая помощь беженцам, медикаменты и уход за сиротами. Возглавляемые семьями Сун и Ляо, они отчасти обязаны своей известностью своим связям с Центральным исполнительным комитетом, а также благоприятному освещению в прессе таких фигур, как Эдгар Сноу.\n\nК сожалению, хотя мало кто хотел бы публично признать это, благотворительность часто является ещё одним средством ведения войны. В прошлом партия использовала свою заботу о бедных как инструмент пропаганды против правительств-диктаторов. Даже в организациях, которые кажутся нейтральными, часто есть члены партии, стратегически назначенные в их советы директоров, включая Китайского Общество красного креста.\n\nСторонники, связанные с Временным комитетом действий, воспользовались возможностью представить Сун (и, в меньшей степени, Хэ Сяннин) в качестве разительного контраста с первой леди Чэнь Бицзюнь, как, возможно, двух самых выдающихся женщин в стране. Хотя оба они происходили из богатых купеческих семей и долгое время были революционерами, газеты, поддерживающие ВКД, изображали Чэня интриганом и мегерой-макиавеллистом, одержимым больше властью, чем помощью народу. Ван гневно потребовал от цензоров немедленно удалить подобные публикации, а Сун опровергла любую подобную разобщённость, но клеветническая кампания, вероятно, приведёт к длительной вражде между группировками."
 CHI.lategame.047.a: "Усилия г-жи Сун высоко оцениваются по всей стране."
 CHI.lategame.047.b: "Но она по-прежнему находится в центре внимания."

 CHI.lategame.048.t: "Меняющееся подполье"
 CHI.lategame.048.d: ""Законы бесполезны, когда люди чисты, и неисполнимы, когда люди порочны."\n\nВзаимодействие Гоминьдана с подпольем - дело сложное, но, безусловно, не вечное. Хотя националистические банды оказывали серьёзную помощь на протяжении десятилетий, предоставляя республиканцам убежище и финансирование в самые тяжелые времена, они также оказывали паразитическое влияние, когда партия вновь набирала силу. Теперь, когда партия успешно объединила нацию, их бывшие союзники выступили с инициативой \"объединения\".\n\nНе всегда просто отличить преступные группировки от революционных ячеек. В революционные времена они часто используют общие тактики, такие как вымогательство, тайный сбор информации и насилие. Многие гангстеры искренне придерживаются республиканских взглядов и уже получили в награду высокие посты на местах, которые придают им видимость законности в их действиях. Они становятся столпами общества, приспосабливаясь к постреволюционной атмосфере. Но коррупция, махинации и кумовство, несомненно, оказали разрушительное воздействие, запятнав наш имидж как силы, борющейся за более равноправное будущее.\n\nКонечно, есть и такие, которые являются отъявленными преступниками или оппортунистами. Именно они были главной мишенью недавних инициатив по борьбе с преступностью. Но сейчас раздаётся призыв к пресечению неправомерных действий, повсеместному изгнанию этих сомнительных элементов. По мере того как наше правительство расширяется, а революционный энтузиазм ослабевает в пользу обретения стабильности, многие опасаются, что сопротивление партийно-государственной системы внешней критике делает её уязвимой для институционализированной коррупции и злоупотреблений. Определение разницы между обладателем местной власти с хорошими связями и гнусным гангстером в чистом костюме вполне может повлиять на будущее нашей страны."
 CHI.lategame.048.a: "Давно пора избавиться от этих паразитов!"
 CHI.lategame.048.b: "Они всё ещё могут быть адаптированы к нашим интересам!"

 CHI.lategame.049.t: "Культ председателя"
 CHI.lategame.049.d: "На протяжении всей истории, особенно во времена великих раздоров, люди часто цеплялись за миф о сильном человеке: могущественном, дальновидном лидере, способном защитить простого человека и спасти нацию. И в зарождающемся новом Китае таким лидером может быть только Ван Цзинвэй. Красивый, харизматичный и хорошо образованный Ван - прирождённый лидер. Он был революционером ещё до Синьхая, рискуя своей жизнью во время дерзкой попытки покушения на регента династии Цин. Популярный миф гласит, что он был спасён от казни, потому что попался на глаза маньчжурской аристократке.\n\nВан, как утверждает партийная машина, был человеком, который провёл партию через все трудности. Прошёл через позорное изгнание, а затем стал лидером страны. Ван - героический демократ, который выполнит демократические обещания Синьхайской революции. Ван - государственный деятель, способный объединить враждующие фракции партии, устранить разногласия внутри Гоминьдана, а также навести мосты с внешним миром. Ван - дальновидный революционер, человек, который действительно может построить равноправный, свободный и процветающий Китай. Ван - тот человек, лидер, который объединит Китай, изгонит империалистов и военачальников и положит конец унижениям.\n\nСам Ван стремился поддерживать скромный имидж на публике. Над воротами Тяньаньмэнь был вывешен портрет Сунь Ятсена, с которого открывался вид на площадь. Ван обязательно присутствовал на торжественной речи и произнёс эмоциональную речь в честь вечного премьера партии. Однако Сунь Фо обрушивался с критикой на все публикации, которые ему удавалось найти, желая бросить вызов авторитету председателя. Надеясь остановить или, по крайней мере, приостановить попытки Вана включить себя в более широкий культ личности и мифологию Сунь Ятсена, он написал серию публикаций, в которых использовал свой статус эксперта по творчеству своего отца. Он утверждает, что наследие покойного основателя партии не было марксистским и, несомненно, включало в себя множество язвительных замечаний в адрес Вана. Его обличительные слова были рассчитаны на то, чтобы едва не попасть в поле зрения цензоров, и уже вызвали политическую бурю."
 CHI.lategame.049.a: "Отец и сын нового Китая!"
 CHI.lategame.049.b: "Его настоящий сын хотел бы поговорить..."

 CHI.lategame.050.t: "Лю Шаоци в Фуцзяне"
 CHI.lategame.050.d: "Лю Шаоци родился в зажиточной хунаньской семье, имевшей связи с Цзянси, и ему посчастливилось уехать учиться за границу. В 1920 году некоторые его предшественники приняли его в Синдикалистскую партию Китая, и опыт, полученный в послереволюционной Франции, открыл ему глаза. В 1921 году он официально вступил в новообразованную СКП, а в 1922 году вернулся домой, чтобы помогать организовывать различные забастовки рабочих в районе Цзянси-Хунань. Он также познакомился с Ли Лисанем, став всё более заметным членом СКП и, как следствие, Союза синдикалистов Китая.\n\nСеверный поход был трудным временем как для Гоминьдана, так и для Лиги. Вынужденный уйти в подполье, он служил младшим политическим офицером в миньганьском повстанческом движении. Несмотря на то, что он считался ортодоксальным членом СКП и в целом поддерживал линию Чэня Дусю-Ли Лисаня, связи, которые он приобрел в Миньгане, могли оказаться ключевыми в попытках ССК расширить своё движение за пределы городского пролетариата.\n\nЛю был назначен партийным секретарём синдпартии Фуцзяни, надеясь завоевать друзей в самом сердце аграрного движения Национального революционного правительства. Будучи сильным писателем, он опубликовал серию статей, в том числе одну, в которой восхваляется массовое движение, утверждается, что революция должна стремиться к свободе масс, завоёвывать их великую веру и применять полностью демократические методы работы и организации. Он призвал как партийные кадры, так и лидеров быть дисциплинированными и демократичными, публичными в своей организации, чтобы обеспечить демократическую форму руководства. Более того, он также призвал к проведению земельной реформы.\n\nМногие не впечатлены, полагая, что это всего лишь слова. Но искренность его проповеди тронула, по крайней мере, некоторых, особенно тех, кто считает, что нынешнее руководство региона, в котором доминирует ВКД, стало слишком стагнирующим. Успехи СКП в налаживании более тесных связей с сельскими жителями, возможно, в такой же степени являются фактором того, насколько самодовольным стал ВКД, и его сотрудники уже выражают обеспокоенность по поводу назревающей напряженности."
 CHI.lategame.050.a: "Преодоление разрыва между городом и деревней."
 CHI.lategame.050.b: "В Фуцзяни и так достаточно героев."

#Phase 3 Assorted Political Events (060-079)

 CHI.lategame.061.t: "Расширить Объединённый фронт?"
 CHI.lategame.061.d: "Так было не всегда. Много лет назад, когда в конце Синьхайской революции к власти впервые пришла Тунмэнхой, была надежда на многопартийную демократическую республику. Но даже когда они прибыли в Пекин для переговоров, зловещие махинации уже были в разгаре, а мечта о мирной передаче власти рухнула.\n\nПосле этого огорчённый доктор Сун основал Гоминьдан. Партия неоднократно вступала в союзы с военачальниками и республиканцами, в частности, с Движением в защиту конституции, но в конечном итоге это ни к чему не привело, и доктор Сун понял, что нам лучше действовать в одиночку. Объединённый фронт Китая и Союз синдикалистов Китая были единственным исключением из этого правила, и решение обратиться к синдикалистским силам раскололо партию на фракции - ещё одно болезненное воспоминание о движении усталых. Однако, в конце концов, именно этот альянс сейчас торжествует в Пекине.\n\nСегодня вопрос заключается в том, что делать с остальными: десятками других фракций, которые сотрудничали с коррумпированной системой Бэйяна. Многие центристские фракции обратились к нам в надежде получить место в нашем новом правительстве. У этих политиков самые разные мотивы: одни из-за патриотизма, другие из-за совпадения целей, а третьи из-за неприкрытого оппортунизма.\n\nХотя Гоминьдан и заявляет о необходимости создания однопартийного государства во время своей опеки, это не следует понимать так буквально, как может подтвердить ССК. В качестве альтернативы можно разрешить отдельным политикам баллотироваться в качестве Данвай (буквально \"внепартийный\" или \"независимый\"). Чтобы эта схема сработала, для этих независимых кандидатов должно быть выделено разумное количество мест, хотя этого явно недостаточно, чтобы бросить вызов правлению Гоминьдана. Другой вариант - просто принять определённые элементы непосредственно в партию, в конце концов, есть много людей, которые когда-то присягали на верность широко распространённой партии Тунмэнхой.\n\nОднако имейте в виду, что не все будут рады, если мы унизим нашу партию, даже если это будет способствовать достижению нашей конечной цели - демократии. Но это даст понять всей стране, что мы не сборище социалистических радикалов, а разумное движение, достойное наследия доктора Суня."
 CHI.lategame.061.a: "Позволить им баллотироваться в качестве Данвай."
 CHI.lategame.061.b: "У партии есть куда расти."
 CHI.lategame.061.c: "Во время опеки они нам не нужны."

 CHI.lategame.062.t: "Федералистские принципы в движении?"
 CHI.lategame.062.d: "Федерализм в его нынешнем виде был в значительной степени дискредитирован в кругах Гоминьдана. Это произошло из-за его связей с Чэнь Цзюнмином, гуандунским генералом, который порвал с доктором Сунем в 1922 году после серии ожесточённых взаимных столкновений. Многие члены партии почувствовали себя лично оскорблёнными (во многих случаях в буквальном смысле) из-за этого предательства, и последовавшая за этим вражда испортила отношения между южными республиканскими группировками.\n\nНо у федерализма как концепции есть свои партийные предшественники. Ли Шицзэн, например, утверждал, что федерализм - это продолжение прудоновского \"Принципа федерации\", необходимый шаг на пути к окончательному внедрению анархизма в Китае. По его мнению и по мнению других представителей Всемирного общества, надлежащая форма федерализма потребовала бы разделения полномочий между центральными и местными подразделениями. Это сотрудничество будет осуществляться между деревнями, районами, провинциями, региональными советами и вплоть до центрального правительства, что он назвал \"фэньчжи хэцзуо\" и отождествил с французскими концепциями регионализма и федерализма. В конце концов, есть надежда, что будет создана всемирная федерация и власть будет постепенно передаваться по нисходящей, пока государство не будет упразднено.\n\nЭта линия мышления подверглась критике не только со стороны марксистских фракций в партии, но и со стороны многих националистических фракций. В начале 1920-х годов произошёл заметный поворот: термин \"самоуправление\" был постепенно вытеснен из гоминьдановской пропаганды в пользу \"местной администрации\". Для Гоминьдана самоуправление стало меньше ассоциироваться с демократией и больше ассоциироваться с продолжением режима военного диктатора - факт, что Чэню Цзюнмину не помогло решение принять правление У Пэйфу.\n\nТем не менее, если бросить кость остаткам федералистов в стране, это помогло бы сгладить процесс объединения. Но эти краткосрочные компромиссы могут сохраняться очень недолго. Но может ли их быть достаточно надолго?"
 CHI.lategame.062.a: "Укрепим этот союз."
 CHI.lategame.062.b: "Поглотить остатки федералистов."
 CHI.lategame.062.c: "Усилить централизацию."

 CHI.lategame.063.t: "Примирение с правыми силами Гоминьдана?"
 CHI.lategame.063.d: "Одной из самых острых тем дня в [CHI.Capital.GetCapitalVictoryPointName]е, но, возможно, наиболее распространенным компромиссом внутри партии-государства является реабилитация многих "правых" в партии. Или, по крайней мере, выдавали себя за членов партии. На практике различия между левыми, правыми, центристскими и военными фракциями старого Гоминьдана всегда были гораздо более размытыми, чем на самом верху. В то время как такие деятели, как Ван Цзинвэй, Ляо Чжункай, Ху Ханмин, Сунь Фо, Дай Цзитао и Чан Кайши, спорили из-за наследия Сунь Ятсена, для большинства рядовых членов партия представляла собой единое революционное движение.\n\n\\"Левые\" и \"правые\" часто вместе ходили на занятия в Вампоа, бок о бок сражались в окопах и часто вместе погибали от рук реакционеров. Неудивительно, что даже после всех этих лет, когда вражда становилась всё более ожесточенной, включая взаимную клевету, убийства и даже открытые военные действия, многие офицеры более низкого ранга помогли своим старым друзьям найти место в нашем новом правительстве.\n\nДля более информированных членов партии, которые заседают в ЦИК, реальность кардинально отличается. Большинство "правых" фракций Гоминьдана на данный момент являются полевыми командирами, в лучшем случае имитацией революционного духа, а в худшем - насмешкой над нашими усилиями. ЦИК смотрит на примирение свысока, считая, что оно зашло слишком далеко. Принятие в наши ряды этих партийных отступников - верный путь к государственной измене, обману или, что ещё хуже, коррупции, а такого рода подрывная деятельность опасна в наше время.\n\nНа самом деле очень сложно законодательно закрепить какой-либо официальный запрет или даже регулировать его. И всегда трудно идти против правил. Но даже несколько слов ведущих членов ЦИК могут заметно изменить настроение партии в целом."
 CHI.lategame.063.a: "Товарищи снова!"
 CHI.lategame.063.b: "Они настоящие патриоты."
 CHI.lategame.063.c: "Мы уже не те, что были раньше."

 CHI.lategame.064.t: "Исцеление отравленной нации"
 CHI.lategame.064.d: "Опиум долгое время был чумой для нации и во многих отношениях символом вырождения некогда гордого китайского народа. Подобно наркоману, впавшему в немилость, Китай пал жертвой массовой зависимости, навязанной ему беспринципными иностранными капиталистами и их империалистическими покровителями. Теперь, если Гоминьдан хочет спасти душу своей нации, он должен искоренить коррупцию в её истоках.\n\nУчитывая, что многие полевые командиры, чиновники и, к сожалению, даже социалисты, подобные нам, наживаются на торговле наркотиками, борьба с ней была трудной задачей. Это надёжный источник прибыли, несмотря на связанные с этим человеческие жертвы, и за это время в страну поступило множество других наркотиков. Бюро, агентства и неправительственные реформаторы - все они пытались это сделать, но безуспешно, хотя с нашим недавним усилением контроля на этот раз есть надежда на подлинные перемены.\n\nЧтобы остановить это, различными юридическими, медицинскими и социальными экспертами был представлен ряд далеко идущих предложений. К ним относятся различные меры по реабилитации, жёсткие аресты и наказания дилеров, а также целенаправленное уничтожение/пересадка регионов, производящих опиум. Однако, с другой стороны, возможно, что государственная монополия на эти \"особые товары\" - это то, что на самом деле необходимо в данный момент революционному правительству для выживания. Что бы ни было решено, скорее всего, пройдёт не менее десяти лет, прежде чем опиум будет уничтожен."
 CHI.lategame.064.a: "Необходимое зло для объединения."
 CHI.lategame.064.b: "Всенародный порок, который должен быть искоренён."
 CHI.lategame.064.c: "Медицинская проблема, требующая лечения."

 CHI.lategame.065.t: "Судьба Пу И"
 CHI.lategame.065.d: "В 1912 году, когда он был свергнут в детстве и фактически заключён под домашний арест в Запретном городе, мало кто думал, что Пуи когда-либо будет представлять угрозу. В конце концов, монархия была крайне непопулярна, и у молодой республики были гораздо более насущные проблемы, чем проблемы незадачливого малыша. Но, увы, сильные мира сего приходили и уходили, начиная с Юаня Шикая, и многие по неведению пытались навязать народу монархию. Немцы, при всем своём высокомерии, настаивали на восстановлении Пуи в его так называемом \"праве по рождению\" так, если бы уничтожение синьхайской мечты могло быть более полным.\n\nНо мечта республиканцев о свободе не умерла с окончанием Северного похода. И теперь, когда наша республика, наконец, восстановлена по всему Китаю, остаётся ещё один вопрос, которым мы должны заняться, переворачивая страницу истории Китая. Пуи вырос в мерзкого, инфантильного, садистского и просто порочного человека, которого не научили практическим навыкам. По крайней мере, так утверждает наша пропаганда. Реальность такова, что этот человек всю свою жизнь был марионеткой, и [CHI.GetLeader] уже исключил публичную казнь свергнутого императора как чрезмерную. Наше правительство мало что выиграет, кроме ненужных сравнений с Лениным. Таким образом, остаётся несколько вариантов.\n\nПервым вариантом было бы просто выслать его в любое государство, которое пожелает его принять. Хотя это фактически умыло бы руки нашему правительству в этом вопросе, некоторые задаются вопросом, не создаст ли это серьезной угрозы безопасности. Другая возможность состоит в том, чтобы поместить его под домашний арест в Запретном городе и держать вне поля зрения до тех пор, пока он не умрёт забытым. Однако многие считают, что это слишком похоже на непопулярные статьи, написанные после первого отречения Пуи, а также позволяет эффективному воплощению реакционного зла оставаться безнаказанным за свои изменнические деяния. Последним и, возможно, самым радикальным предложением была бы попытка реабилитировать Пуи. Это потребовало бы значительных усилий по переучиванию этого человека жить как его сограждане, в качестве ещё одного участника более масштабной революции."
 CHI.lategame.065.a: "Выслать его из страны."
 CHI.lategame.065.b: "Поместить Пуи под домашний арест в его собственном дворце."
 CHI.lategame.065.c: "Покажем ему истинную славу социализма."

 CHI.lategame.066.t: "Старый садовник"
 CHI.lategame.066.d: "Популярной достопримечательностью города [GetVictoryPointName_9843] является некогда закрытый Запретный город, резиденция императоров династии Мин и маньчжурской Цин, а ныне общественный музей, посвящённый демонстрации великолепия китайской цивилизации. Если вы придёте в дворцово-музейный сад пораньше после обеда, то можете наткнуться на довольно тощего садовника в штатском, ухаживающего за цветами, который с удовольствием расскажет вам о сокровищах дворца и вещах, которыми он пользовался в юности. Зрители и туристы были несказанно удивлены, когда поняли, что старый садовник - это не кто иной, как сам бывший император Сюаньтун* - Пу И.\n\nПосле того как он был захвачен силами НРА на завершающем этапе Второго Северного похода, гоминьдановцы решили превратить его в образцового гражданина, соответствующего идеалам покойного доктора Сунь Ятсена. Бывший император, а также захваченные в плен фэньтяньские и японские солдаты были отправлены в лагерь для военнопленных во время Второй китайско-японской войны. Здесь было замечено, что бывший император не мог выполнять даже элементарные действия, такие как чистка зубов и завязывание шнурков на ботинках, к большому удовольствию его похитителей. Во время своего "перевоспитания" Пу И встречался с теми, кто пострадал от голода и экономического краха как в бывшей Лиге восьми провинций, так и в провинции Чжили, что свидетельствует о последствиях его сотрудничества с немцами.\n\nПосле нескольких долгих лет перевоспитания Центральный комитет партии официально проголосовал за отмену приговора Пу И и его освобождение как полезного члена нового Китая. Недавно он женился во второй раз на больничной медсестре по имени Ли Шусянь и, при поддержке партии, надеется завершить свою автобиографию. В эти дни он осуждает империализм, утверждает, что был трусом и предал свою страну, сотрудничая с немцами. Очень неуклюжий человек, всю жизнь заботившийся о своих потребностях, по слухам, сейчас он гораздо более счастлив, чем когда был императором Китая, и некоторые местные жители знают его как довольно доброго и скромного человека. Как он сам говорит, "Вчерашний Пу И - враг сегодняшнего Пу И".\n\n*Сюаньтун - использовался в качестве тронного имени, ведь настоящее имя (Пу И) было табуировано. (прим.пер.)"
 CHI.lategame.066.a: "Новый Пу И для нового Китая."

 CHI.lategame.067.t: "Развитие нашего правления в Монголии"
 CHI.lategame.067.d: "После того, как Национально-революционная армия ворвалась в Ургу и вытеснила оттуда всех, кто был у неё на пути, радость победы вскоре сменилась трудной реальностью управления такой обширной, малонаселённой территорией. Монголия имеет мало постоянных поселений и остаётся крайне бедной и аграрной страной. Несмотря на заявления о национальном объединении и равенстве пяти рас, многие монголы привыкли к независимости и с глубоким подозрением относятся к китайскому национализму.\n\nСэрэндонров (по-китайски Бай Юньти), давний член Гоминьдана и член РАТ, назначен председателем правительства Монголии. Комиссия по делам Монголии и Тибета якобы готовит этнические меньшинства в партии к тому, чтобы взять их под свою опеку в их родных регионах, однако их ряды остаются очень редкими. Монгольская народно-революционная партия Сэрэндонрова имела ограниченное влияние во Внутренней Монголии на юге.\n\nПоскольку ранее существовавшее членство в Гоминьдане было столь ограниченным, штат нового правительства был пополнен членами существующих социалистических и левых групп в Монголии, в первую очередь членами Монгол Ардын Нам (Монгольская народная партия), базирующейся в основном в Западной Монголии. Их лидеры настаивали на значительных уступках со стороны центрального правительства, в котором доминировали ханьцы, хотя они часто ссорились и боролись между собой за власть.\n\nАльтернативы тоже не слишком привлекательны. В то время как большинство поддерживаемых Россией полевых командиров бежали, бывшая монгольская знать и другие консервативные круги во главе с Юнэнбаяном и принцем Дэмчигдонровом остаются активными. Более умеренные элементы в Урге, такие как Юнэнбаян, выразили готовность присоединиться к Гоминьдану, вероятно, в надежде сохранить своё укоренившееся влияние в этом регионе.\n\nЕсть некоторые сомнения относительно того, имеют ли эти обсуждения значение для простого народа, особенно учитывая, что сопротивление, как ожидается, продолжится. Генералу Уланьфу, одному из высокопоставленных монгольских офицеров НРА, было поручено поддерживать порядок. Предположительно, он был сокурсником Цзяна Цзинго во время учебы в Интернационале и имел связи с военной разведкой, поэтому некоторые сомневаются в его лояльности. Говорят, что его семья уже приобрела значительную власть среди местных жителей."
 #白雲梯
 CHI.lategame.067.a: "Пойдём за председателем и гоминьдановскими кадрами."
 CHI.lategame.067.b: "Расширить возможности бывших региональных лидеров из МНП."
 CHI.lategame.067.c: "Предоставить этническую автономию местным представителям власти."
 CHI.lategame.067.e: "Реальная власть остаётся за военным губернатором."

CHI.lategame.068.t: "Ситуация в Тибете"
CHI.lategame.068.d: "Завоевание Лхасы Национально-революционной армией поместило самое большое и возвышенное плато в мире под контроль Китайской Республики, однако уже сейчас в новой тибетской администрации возникают проблемы. Пользуясь де-факто независимостью от Китая в течение десятилетий и ведя множество войн за её сохранение, многие тибетцы с подозрением относятся к амбициям китайского национализма.\n\nПоскольку Комиссия по монгольским и тибетским делам не смогла создать значительное число членов Гоминьдана тибетского происхождения, партия обратилась к союзной Партии улучшения Тибета, основанной в Индии при поддержке изгнанных офицеров Гоминьдана. Про-китайский 9-й Панчен-лама (Туптэн Чёкьи Нима) был назначен председателем, хотя за его спиной стоит множество китайских «советников».\n\nЭто вызвало жалобы, что чиновники, направленные Гоминьданом, лишь вредят формированию устойчивого и гармоничного правления в высокогорье. Многие из них обходят председателя, докладывая напрямую в [CHI.capital.getcapitalvictorypointname]. Лидеры Партии улучшения Тибета, такие как Пандатсанг Рапга и Гендун Чопхел, обратились к [CHI.GetLeader] и Центральному исполнительному комитету с просьбой о большей свободе действий, утверждая, что ПУТ уже давно является верным сторонником Трёх народных принципов и модернизации.\n\nНасколько это верно — спорно, однако в своих усилиях свергнуть реакционное правление они, похоже, объединились с «демократическими» группами различных направлений, пообещав провести выборы. Эти группы требуют проведения временных выборов в ходе периода опеки, что лишь усиливает нестабильность в регионе.\n\nНа фоне растущего вакуума власти всё больше решений ложится на плечи генерала Хуан Мусуна, назначенного Гоминьданом много лет назад советником по Тибету и временным главой Комиссии по монгольским и тибетским делам. Он предложил создать Тибетскую улучшенческую милицию и получил контроль над силами НРА в регионе, став кульминацией десятилетий службы."
CHI.lategame.068.a: "Мы доверим нашим экспертам реализовать опеку."
CHI.lategame.068.b: "Дадим ПУТ автономию, необходимую для легитимности."
CHI.lategame.068.c: "Позволим провести обещанные местные выборы."
CHI.lategame.068.e: "Военный губернатор сохраняет твёрдую руку."

CHI.lategame.069.t: "Интриги в Синьцзяне"
CHI.lategame.069.d: "Марш Национально-революционной армии в Дихуа сделал Китайскую Республику последним правительством ханьцев, пытающимся распространить свою власть на запад. Охватывая огромную территорию, включая большую часть пустыни Такла-Макан, Синьцзян испытывает значительную нестабильность по мере разрушения ханьской администрации. Сопротивление продолжается со стороны местных реакционеров и недовольных националистов, а контроль Гоминьдана ослаблен расстоянием: говорят, что человеку из Сингапура добраться до Берлина быстрее, чем из Пекина в Дихуа.\n\nВынужденный предоставить некоторую автономию местному правительству, [CHI.GetLeader] назначил региональным председателем Бурхана Шахиди. Этот уйгурский политик, свободно говорящий на нескольких языках, окончил военную академию в Баодине. Переведя Три народных принципа Сунь Ятсена на уйгурский, он и его татарская жена Рашида, по слухам, сочувствуют Гоминьдану.\n\nИмея мало надёжных союзников, Гоминьдану пришлось собирать администрацию по частям. В Аксу осели многие недовольные члены старой синьцзянской клики Ян Цзэнсиня, включая Шэн Шицая. Этот ханьский генерал стремится войти в нашу милость, рекламируя свои «марксистские» убеждения и прошлое в НРА и Гоминцзюне. Получив амнистию от отчаявшейся Республики, он был назначен на реструктуризацию местных сил безопасности — решение, о котором нам пока не пришлось пожалеть.\n\nНадвигается противостояние между генералом Шэном и председателем Шахиди, и [CHI.Capital.GetCapitalVictoryPointName] слишком далека и плохо осведомлена, чтобы вмешаться. Тао Чживэй, близкий друг генерала Чжан Чжичжуна, назначен военным губернатором провинции, но жалуется, что его власть ограничена лишь несколькими дивизиями в Дихуа. Он умоляет прислать подкрепление, иначе, по его словам, он будет бессилен остановить дальнейшее ухудшение ситуации.\n\nПо мере усугубления кризиса некоторые предлагают «умыть руки» и договориться с местными партизанами, оставив регион в значительной степени автономным. Это, вероятно, оставит будущее социализма в Синьцзяне на милость алчных до власти людей, но зато позволит Китаю сохранить контроль с минимальными затратами."
CHI.lategame.069.a: "Похоже, Бурхан Шахиди знает, что делает."
CHI.lategame.069.b: "Шэн Шицай кажется достойным командиром."
CHI.lategame.069.c: "Приказать генералу Тао Чживэю навести порядок."
CHI.lategame.069.e: "Примем «отстранённый» подход."

CHI.lategame.070.t: "Тайваньская дилемма"
CHI.lategame.070.a: "Укрепить правление Цзяна на Тайване."
CHI.lategame.070.b: "Приказать создать с СПТ Объединённый фронт."
CHI.lategame.070.c: "Настаивать на создании широкой националистической коалиции."
CHI.lategame.070.e: "Возможно, необходим более тщательный надзор."

CHI.lategame.071.t: "Возрождение Рюкю"
CHI.lategame.071.a: "Укрепить правление нашей «сестринской партии» и принести революцию свободным Рюкю!"
CHI.lategame.071.b: "Поощрять сотрудничество с местными партиями в ожидании будущего протектората."
CHI.lategame.071.c: "Приказать нашим людям готовиться к длительному пребыванию, а союзникам — к ассимиляции."
CHI.lategame.071.e: "Нам важны только базы — пусть японские союзники занимаются местными."

CHI.lategame.072.t: "Разбитая семья революции"
CHI.lategame.072.a: "Он умер, чтобы Национальная революция могла жить…"
CHI.lategame.072.b: "Нет трагедии в смерти предателя."

### Раздел 3б  (200-399): Цепь событий 3 съезда

##Вступление (200-250)

 CHI.lategame.200.t: "Белое солнце восходит"
 CHI.lategame.200.d: "Китай был объединён, но дорогой ценой. С начала эры "полевых командиров" погибли тысячи, если не миллионы людей, семьи были разделены, а бесчисленное множество людей были вынуждены покинуть свои дома. И всё же, в конце концов, Гоминьдан вышел единственным победителем, уничтожив или пережив около полудюжины других фракций, которые когда-то осмеливались бороться за национальное лидерство. Партия Сунь Ятсена - это всё, что осталось сейчас, доказательство морального превосходства их революции.\n\nПравда, как всегда, оказывается более мрачной. Партия яростно сплотилась против иностранных захватчиков и внутренних врагов, объединённая национализмом и революционными обещаниями. Но даже на пике их достижений в этом Едином фронте были трещины, и с уменьшением внешних угроз партия по-прежнему разделена.\n\nЛюди тоже устали от произвола военного правления де-факто, от непоследовательного применения гражданской политической опеки и военного управления по всей стране. Конечно, массы благодарны за объединение и празднуют возвращение империалистов на родину, но они также ясно дали понять, что не желают приносить дальнейшие жертвы без чёткого видения будущего.\n\nСитуация набирает обороты, и наблюдатели опасаются дальнейшей нестабильности в будущих политических событиях. В то время как партийно-государственное руководство работает над подавлением разрозненного сопротивления, всё громче раздаются голоса, требующие проведения Гоминьданом ещё одного специального всекитайского съезда, на этот раз с полным представительством всей страны."
 CHI.lategame.200.a: "Очередной съезд нас ждёт..."

 CHI.lategame.201.t: "Созыв Третьего съезда репатриантов"
 CHI.lategame.201.d: "RРеагируя на давление общественности, Ван Цзинвэй объявил от имени Центрального исполнительного комитета о планах проведения специального национального съезда в Нанкине примерно через три недели. Формально мероприятие известно как "Третий всекитайский съезд репатриантов Гоминьдана", несмотря на его название, ожидается, что в нём примут участие члены Союза синдикалистов Китая и других республиканских объединений.\n\nУже подготовлен маршрут с перечнем тем для обсуждения, однако главной темой обсуждения является судьба самого Ван Цзинвэя. Многолетний председатель партии и президент Республики оставил неоднозначную репутацию, несмотря на его попытки представить себя компрометирующей фигурой. Многие видят в нём формирующегося диктатора, который всё больше отдаляется от коллективного руководства ЦИК.\n\nСписок его врагов растёт по мере того, как он и его союзники работают над консолидацией власти. Главным из этих врагов является Временный комитет действий, внутрипартийная фракция, возглавляемая Сун Цинлин. Она работала над тем, чтобы объединить соперников Вана в работоспособную коалицию. Хотя известно, что большая часть военных предпочитает, чтобы Ван ушёл, мало кто готов поддержать прямой государственный переворот.\n\nВместо этого, похоже, что обе фракции приступают к Третьему съезду с заточенными ножами. Лишь немногие избранные знают в полной мере о планах обеих сторон, но несомненно, что они будут стремиться к доминированию в процессе. Третий съезд станет крупнейшим партийным съездом за всю историю, на него будут в спешном порядке приглашены более тысячи представителей из каждой провинции и округа. И всё же кажется, что судьбы миллионов будут решаться очень немногими..."
 CHI.lategame.201.a: "Судьба манит!"

 CHI.lategame.202.t: "Оккупация Ханькоу"
 CHI.lategame.202.d: "Факелы ярко сияли, когда процессия шествовала сразу после наступления сумерек. В городе Ханькоу, одном из трёх, входящих в состав Уханя, находилась немецкая концессия, основанная в 1895 году в обмен на поддержку Германии в борьбе с Японией. Внутренние концессии в Китае являются пережитком ужасной системы международных мандатов, от которой страдает Китай, и постоянным напоминанием о столетии унижений.\n\nСтолкнувшись с наступлением Гоминьдана, большинство иностранцев бежали, оставив концессию фактически заброшенной. Однако из-за опасений международного осуждения города остались нетронутыми во время второго Северного похода. Националистическое правительство решило пока уважать их суверенитет, решив дождаться более благоприятного времени для переговоров.\n\nОднако для многих солдат и студентов даже это было слишком. После того, как японцы были изгнаны из Китая в результате кровопролитной войны, в стране начался подъём национализма. Этой энергией пользуется Общество возрождения Китая, ультранационалистическая группа офицеров, которые осудили концессию в Ханькоу как недействительную в контексте антиимпериалистической политики Гоминьдана.\n\nПодстрекаемый Хэ Чжунханем, большой отряд офицеров ОВК прошёл маршем по концессионным районам города, нацелившись, в частности, на немецкую концессию в отместку за их роль в первом Северном походе. Первоначально это был дисциплинированный отряд, но вскоре к ним присоединились толпы местных жителей, которые начали бить окна и поджигать чужие здания в ходе беспорядков. Но, пожалуй, ещё более поразительным для прессы было изображение того, как европейские флаги срывали и сжигали, а вместо них изображали белое солнце, голубое небо и полностью красную землю."
 CHI.lategame.202.a: "Долгожданная месть."

 CHI.lategame.203.t: "Мстя за унижения"
 CHI.lategame.203.d: "Последствия беспорядков в Ханькоу отразились на всём Китае, поскольку в воздухе витают жаркие дискуссии о их последствиях. Многие в ужасе от насилия толпы, в то время как многие другие группы завидуют тому вниманию, которое было оказано ОВК, полагая, что они ставят себе в заслугу антиимперские усилия всей партии. Как бы то ни было, Ван хранил стратегическое молчание, пока страна готовилась к появлению подражателей.\n\nЗа последние несколько дней Китай захлестнула очередная волна нестабильности, поскольку в крупных городах Китая, особенно вблизи портов, вспыхнули массовые беспорядки. Тревожные сообщения об антиконцессионном насилии заполнили радиоэфиры и привели в замешательство полицию, что усугубилось широким привлечением сил безопасности. Ожидается, что нестабильность будет наблюдаться даже в районах, всё ещё находящихся вне контроля Гоминьдана.\n\nПо мере распространения насилия толпы начали распадаться на фракции. Толпы социалистов расширили кампанию против капиталистических угнетателей, терроризируя буржуазные кварталы и коммерческие районы. Националистические группировки выставляют даже наших советников в МВМК иностранными империалистами, выступая в резких антиевропейских и антииностранных тонах. Многие, особенно ОВК, обвиняют ССК в том, что они являются марионетками иностранного контроля.\n\nСитуация выходит из-под контроля, и военные наконец-то были задействованы для восстановления порядка. После объявления комендантского часа и отправки более дисциплинированных подразделений хаосу был положен конец. Но не раньше, чем был найден мёртвым офицер МВМК."
 CHI.lategame.203.a: "Наше движение разваливается на части!"

 CHI.lategame.204.t: "Последствия Нанкинского инцидента"
 CHI.lategame.204.d: "После нескольких дней беспорядков было много жертв, но ни одна из них не нанесла такого ущерба, как советник Международной военной миссии в Китае. Хотя большинству сотрудников МВМК удалось спастись целыми и невредимыми, во время беспорядков их штаб-квартира подверглась налету и разграблению, и, по-видимому, была оставлена китайскими силами безопасности в разгар беспорядков. Трое были ранены во время эвакуации, один был убит.\n\nБезвременно погибший Жан Фонтенуа, глава учебного отдела. Офицер, получивший награды во время Великой войны и Французской революции, он был направлен в Китай в рамках первоначальной миссии. Говорили, что писатель, плейбой и опиумный наркоман, он одно время рассматривался на пост главы миссии, но был отстранён из-за его растущей зависимости и симпатий к сорелианскому движению. Это качество и его практический подход, похоже, привлекли внимание некоторых членов ОВК, которые пришли отдать последние почести перед отправкой его тела домой.\n\nАндре Мальро, глава миссии, возмущён смертью своего бывшего соперника и выступил против того, что, по его мнению, является преднамеренным покушением на жизнь его людей. На гневной встрече с Центральным исполнительным комитетом он обвинил то, что он назвал \"Индийской кликой\" правых офицеров, в том, что они возглавляют заговор против правительства, надеясь перехватить революцию на пороге своей революционной победы. Он указал пальцем на генералов Чжана Факуя и Сюэ Юэ, руководителей старой китайской консультативной группы в Калькутте, как на центр этой гнусной клики. Он зашёл так далеко, что заявил, что у него есть очевидцы, готовые дать показания о том, что эти двое лично возглавляли толпу.\n\nЧлены ЦИК, поддерживающие фракцию реконструкции включая Сунь Фо, немедленно встали на защиту Чжана, гневно осудив то, что они называют необоснованными слухами. Но очевидно, что либеральная фракция партии находится под давлением, и, вероятно, многие сотрудники, связанные с ВКД, пойдут на попятную вместе с ними. Когда Мальро выводят с заседания, в ЦИК разгорелась жаркая дискуссия."
 CHI.lategame.204.a: "А теперь подождите минутку..."

 CHI.lategame.205.t: "Инструкции [GetMonth] месяца"
 CHI.lategame.205.d: "Как будто ситуация не могла стать намного хуже, серия документов, получивших название "Инструкции [GetMonth] месяца" попали на первые полосы газет в крупных городах. Информаторы, пожелавшие остаться неизвестными, утверждают, что они были похищены из офиса ведущего консультанта МВМК М.Н. Роя. В них содержится серия телеграмм, по-видимому, из Парижа, в которых содержится ряд требований, которые должны быть переданы Вану Цзинвэю при подходящей возможности, якобы для того, чтобы помочь ему укрепить власть и заручиться поддержкой Интернационала:\n\n1.) Всекитайская федерация труда (связанная с СКП) должна быть легализована, и все китайские профсоюзы должны быть подчинены ей.\n2.) В армию должен быть набран приток синдикалистов, а офицеры, поддерживающие синдикализм, должны продвигаться по службе. Офицеры \"Старой гвардии\" также должны быть уволены, при необходимости принудительно.\n3.) Точно так же партия должна быть очищена от тех, кто придерживается \"старых взглядов\", и заменена молодыми социалистами, прошедшими обучение за границей.\n4.) Должны быть созданы революционные военные суды для наказания реакционеров.\n\nПервоначальная \"утечка\" была обнаружена в газетах, связанных с ОВК, в частности, в Цяньту (букв. \"Будущее\", \"Перспективы\"), но её быстро подхватили газеты, связанные с ВКД и ФР. Широко распространённый всего за день или около того, контент фактически подразумевает, что МВМК надеется спонсировать государственный переворот СПК.\n\nВыбор времени крайне подозрителен, а содержание было названо Роем подделкой. Рой отмечает, что он был с революцией с самого начала и у него тесные связи с обеими фракциями партии. Но поскольку МВМК заняла оборонительную позицию, Ли Цзишэнь воспользовался моментом, чтобы нарушить своё молчание после инцидента в Нанкине. В своей громогласной речи он потребовал немедленной ликвидации военной миссии Интернационала, заявив, что они хотят воспользоваться гибелью своего товарища, чтобы начать захват власти.\n\nОн подготовил длинный список офицеров, которые пригрозили уйти в отставку в знак протеста, если \"предвзятое\" расследование в отношении предполагаемой \"Индийской клики\" продолжится, и его имя стоит в начале списка. Однако, с другой стороны, если МВМК будет исключён, ожидается, что многие из тысяч офицеров, которых они обучали, уйдут в отставку в знак солидарности."
 CHI.lategame.205.a: "Немедленно исключить МВМК!"
 CHI.lategame.205.b: "Распустить индийскую клику!"

 CHI.lategame.206.t: "Вступительная речь Вана"
 CHI.lategame.206.d: "Третий всекитайский съезд Гоминьдана официально был созван в великой столице [CHI.Capital.GetCapitalVictoryPointName], что ознаменовало начало новой эры для [CHI.GetNameDef]. Наконец-то великая война сопротивления японским империалистам была завершена, и Маньчжурия вернулась в состав китайской нации. Председатель [CHI.GetLeader] снова занял своё место под грандиозным портретом доктора Сунь Ятсена а флаги партии развевались по его бокам. Однако, что было необычным, так это недавно заказанный портрет председателя, который был стратегически размещён справа от вечного премьера - шаг, который был отмечен презрительными и гневными взглядами членов ВКД.\n\nВан начал свою речь с того, что поблагодарил партию за верность принципам доктора Суня и мученикам, отдавшим свои жизни во время Войны сопротивления. В то время как революционная фаза военного правления, таким образом, завершается недавней победой НРА над японцами, правление революционной партии должно продолжаться, поскольку Ван предупреждал о реакционерах в рядах партии, которые угрожают её дестабилизации. Тем не менее, в связи с ожидаемыми выборами нового Центрального исполнительного комитета и председателя в партии неизбежно произойдут кадровые перестановки.\n\nХотя он долгое время оставался аполитичным в отношении разногласий между РАТ и ВКД, в своём вступительном слове он пришёл к выводу, что, по его мнению, необходима новая реорганизация партии, чтобы повторить те же изменения, которые произошли в партии в 1924 году. Он осудил консерваторов из Индийской клики и фракцию реконструкции как \"дегенеративные силы\", подавляющие дух реорганизации. Этот дух победил во Втором Северном походе. Ван завершил своё выступление твёрдым признанием того, что, хотя политика Единого фронта с китайскими синдикалистами не была одним из аспектов первой реорганизации, было бы серьёзной ошибкой, если бы осуждение этой политики привело к отказу от духа реорганизации.\n\nВ то время как со стороны делегатов РАТ и членов СПК раздались многочисленные одобрительные возгласы, со стороны секции ВКД были слышны только вежливые аплодисменты, в то время как члены Всемирного общества и Фракции реконструкции хранили молчание."
 CHI.lategame.206.a: "Неблагоприятное начало..."

 CHI.lategame.207.t: "Союз разделённый..."
 CHI.lategame.207.d.LCS: "В течение многих лет Союз синдикалистов Китая перенимал французскую политическую методологию "синдикалистского компромисса" с её многочисленными фракциями и профсоюзами, объединяющимися в рамках общего союза пролетарской борьбы. Сотрудничая с китайским Гоминьданом в таких забастовках, как забастовки в Гонконге и Гуанчжоу в 1925 году, а также в Шанхайском восстании 1932 года, китайские социалисты, не входящие в Гоминьдан, долгое время руководствовались политикой удобства - особенно благодаря указаниям Парижа и Лондона.\n\nПосле победы Гоминьдана во Втором Северном походе и в Войне сопротивления влияние Союза заметно возросло, и теперь Временный комитет действий и Реорганизованная ассоциация товарищей пытаются заручиться поддержкой Союза в их борьбе за господство в партии."
 CHI.lategame.207.d.ORT: "$CHI.lategame.207.d.LCS$\n\nСреди фракций ССК за прошедшие годы значительно окрепла ортодоксальная фракция Синдикалистской партии Китая, члены которой Чэнь Дусю, Ли Дачжао и Ли Лисань контролируют большую часть функций и направлений деятельности ССК. Теперь им предстоит принять решение о том, поддерживать или нет новое заявление председателя Вана о реорганизации - с их влиянием они, несомненно, могут склонить чашу весов как в пользу ВКД, так и в пользу РАТ."
 CHI.lategame.207.d.RAD: "$CHI.lategame.207.d.LCS$\n\nСреди фракций ССК за прошедшие годы значительно окрепла радикальная фракция Синдикалистской партии Китая и молодая гвардия, члены которой Цинь Бансянь, Цюй Цюбай и Чэнь Шаоюй контролируют большую часть функций и направлений деятельности ССК. Новая школа синдикалистской мысли, несомненно, разделяет убеждения радикалов РАТ. Столкнувшись с новым призывом председателя Вана к реорганизации, они объединяются для защиты революции."
 CHI.lategame.207.d.WRD: "$CHI.lategame.207.d.LCS$\n\nСреди фракций ССК, старая гвардия анархистов и анархо-синдикалистов значительно окрепла за эти годы, приняв форму Всемирного общества. Хотя изначально они были намного слабее других социалистических и синдикалистских движений, их влияние значительно возросло, особенно благодаря их лидерам, которые считаются четырьмя старейшинами Гоминьдана. Сочувствуя своим коллегам-социалистам-утопистам из ВКД, они укрепили свою поддержку перед лицом новой декларации председателя Вана о реорганизации; они всеми силами поддерживают свержение красного тирана."
 CHI.lategame.207.a: "Мы выступаем против реакционной подрывной деятельности!"
 CHI.lategame.207.b: "Ван стал слишком опасен!"

 CHI.lategame.208.t: "Либералы наступают!"
 CHI.lategame.208.d: "Фракция Реконструкции сумела выжить во время провала первого Северного похода, периода изгнания и возрождения Гоминьдана. И всё же были некоторые сомнения в том, как долго они продержатся, прежде чем канут в лету, покинутые всё более социалистической партией. Многие полагали, что Третий съезд станет их последним выступлением перед тем, как они будут отстранены от дел - в лучшем случае, возможно, Сунь Фо и ещё несколько высокопоставленных членов смогут получить выгодную синекуру.\n\nОднако, если это и было так, то сегодня они этого не показали. Фракция реконструкции на своих неофициальных собраниях действовала так же оживлённо, как и всегда, воодушевленная тем фактом, что гражданское правление не за горами. По их мнению, окончание войны означает конец военного доминирования в приоритетах, что дает ФР, базирующейся преимущественно в гражданских целях, преимущество как над ВКД, так и над РАТ.\n\nСунь Фо стремился переосмыслить себя и свою клику как законченных либералов, сторонников конституционализма, борьбы с коррупцией и немедленного прекращения опеки. Изображая из себя героя-демократа, он осудил однопартийное государство как несовместимое с идеалами его отца, и с окончательным объединением Китая, по его словам, пришло время перемен. Его работы ясно дают понять, что его целевая аудитория - тысячи представителей умеренной республиканской интеллигенции, к которым сменявшие друг друга правительства долгое время относились как к ширме.\n\nПоскольку съезд был в самом разгаре, Сунь, несомненно, фотографировался и брал интервью практически при каждом удобном случае, искренне (некоторые сказали бы, что ошибочно) считая себя ведущей фигурой оппозиции Вану. Он открыто начал называть председателя диктатором в прессе, призывая его провести немедленные, свободные и справедливые выборы по всей стране, если это не так. Не обладая исключительной харизмой, Сунь, тем не менее, стал именем нарицательным, и рукопожатие за рукопожатием он превращается в угрозу."
 CHI.lategame.208.a: "В защиту конституционализма!"

 CHI.lategame.209.t: "Длинная тень"
 CHI.lategame.209.d: "За пределами конференц-залов действуют посредники и интриганы. Некоторые надеялись, что эти "лоббисты" будут действовать только в коррумпированных буржуазных "демократиях" и дегенеративном истеблишменте Бэйяна, но, к сожалению, они живы и здоровы в националистическом Китае. Используя тщательно подобранные "подарки", обещания перспективной работы и широкий спектр угроз (которые они могут подтвердить, а могут и не подтвердить), они вступили в переговоры с жёнами, "дядями" и "друзьями" делегатов.\n\nНо это, пожалуй, наименьшая из забот зарождающейся китайской демократии. Ещё более коварными методами действуют снующие агенты Лаобаня, которые бросают длинную тень на конвент. Политики хвастаются своими заговорами и планами, но мало кто может сравниться с абсолютной безжалостностью и насилием китайских шпионов, которые сражаются в темноте от имени своих группировок. Есть многочисленные сообщения о делегатах, которые решили отказаться от своего места до начала съезда по "состоянию здоровья", а также о многочисленных случаях внезапной смены взглядов.\n\nОднако, к сожалению, у нас очень мало времени и энергии для расследования этой эпидемии плохого здоровья, и все фракции сосредотачивают свои усилия на предстоящей конференции. Интересно, что наблюдатели отметили, что на этом съезде впервые появляется группа, ориентированная на ОВК. Во главе с бывшим студентом-радикалом и армейским офицером Лю Бутуном к ним присоединяется второстепенная партийная знаменитость Чан Цзинго, первенец Чан Кайши. Считается, что эта группа является источником многочисленных грязных слухов, ходящих по съезду о Ване, обвиняя его в предательстве, коррупции и даже убийстве - в частности, покойного директора школы."
 CHI.lategame.209.a: "Вы думаете, это плохо? Это балаган? Бывало и похуже!"

 CHI.lategame.210.t: "Голосование по импичменту"
 CHI.lategame.210.d: "В конце концов, этого было достаточно. Ещё до открытия Третьего съезда Временный комитет действий приступил к работе, направленной на то, чтобы китайская демократия не погибла из-за диктаторских устремлений Вана. Члены ВКД и АРОВАВ тайно угрожали, подкупали и уговаривали членов съезда проголосовать за попытку ВКД сместить Вана. Они обратились к членам Союза синдикалистов Китая, Фракции реконструкции и даже к некоторым умеренным членам РАТ, добиваясь каждого голоса, который они могут отдать в свою пользу.\n\nПолучив беспрецедентное количество голосов от членов съезда, высокопоставленные члены ВКД, такие как Дэн Яньда и Чжан Боцзюнь, представили Центральному наблюдательному комитету ЦК требование по "Делу о невыполнении Ваном Цзинвэем обязанностей исполняющего обязанности председателя". Поскольку все четыре старейшины Гоминьдана, кроме одного, входили в Центральный наблюдательный комитет, импичмент был неизбежен. Однако для вынесения обвинительного приговора требуется голосование всего съезда, и этот вопрос остаётся нерешённым. Без этого импичмент со стороны Наблюдательного комитета не будет иметь большого значения.\n\nПосле предъявления обвинений сама Сун Цинлин встала со своего места, чтобы осудить Вана от имени своего мужа. Хотя Ван, несомненно, был другом доктора Суня, Сун заявила, что Ван должен немедленно уйти в отставку, чтобы положить конец этапу опеки. Съезд ошеломлённо молчит, пока Ван Цзинвэй встаёт, чтобы защитить себя..."
 CHI.lategame.210.a: "Жребий брошен..."

#Additional 3rd Congress Events
CHI.lategame.211.t: "Национальный съезд Гоминьдана"
CHI.lategame.211.d: "С сокрушёнными или подчинёнными соперниками и, казалось бы, без преград к установлению единоличного господства в Китае, возглавляемый Гоминьданом [CHI.GetNameDef] созвал третий Национальный съезд расширенной партии, собрав делегатов из всех провинций страны. Соответственно, [ROOT.GetLeader] и члены [ROOT.GetRulingParty] были приглашены в Нанкин для обсуждения будущего Китая.\n\nПосле успешного объединения страны стало ясно, что Гоминьдан намерен расколоть её изнутри. Язвительные речи, бесконечные слухи и коварные политические игры — даже самые простодушные члены делегации почувствовали гнетущую атмосферу напряжённости. В центре конфликта — победоносный председатель Ван Цзинвэй, вокруг которого группируются как сторонники, так и оппоненты. Разрозненная оппозиция, похоже, сплотилась вокруг фигуры Сун Цинлин, хотя внутри антивановского лагеря царит раздор, способный подорвать все их усилия.\n\nАгенты обеих сторон пытаются втянуть [ROOT.GetAdjective]ую делегацию в свою орбиту, предлагая громкие обещания, щедрые взятки (в самых разных формах) и завуалированные угрозы. В удушающей атмосфере раскола становится всё труднее продвигать наши собственные интересы — их заглушают противоборствующие стороны. С каждым днём всё очевиднее: победа партии вовсе не гарантирует мир."
CHI.lategame.211.a: "Поддержать председателя."
CHI.lategame.211.b: "Поддержать оппозицию."
CHI.lategame.211.c: "У нас своя повестка."

CHI.lategame.fordelintro: "На Третий съезд съехались делегаты из ближнего и дальнего зарубежья, у каждого из них были свои планы. Но по мере приближения к Нанкину все они ощущали удушающий дух раскола между фракциями партии. Агенты председателя и его оппозиция играли в перетягивание каната за поддержку, полагаясь на всевозможные беспринципные тактики для победы.\n\nОдним из самых ценных призов стала [FROM.GetAdjective]ая делегация. Одно из наиболее автономных региональных правительств в нашей республике, они в определенной степени свободны от партийного патронажа, что делает их ценным подспорьем в партийных интригах."

CHI.lategame.212.t: "[FROM.GetAdjectiveCap]ие делегаты поддерживают председателя"
CHI.lategame.212.d: "$CHI.lategame.fordelintro$\n\nПохоже, люди председателя сумели склонить их на свою сторону — будь то из-за идейной близости, личных связей или стремления к стабильности, которую символизирует Ван Цзинвэй. Этого может оказаться недостаточно, ведь по мере продолжения съезда альянсы постоянно меняются, но на данный момент председатель заручился ценным союзником в борьбе за власть."
CHI.lategame.212.a: "Они выбрали знакомого дьявола."

CHI.lategame.213.t: "[FROM.GetAdjectiveCap]ие делегаты примыкают к оппозиции"
CHI.lategame.213.d: "$CHI.lategame.fordelintro$\n\nПохоже, они примкнули к оппозиции, найдя общую почву хотя бы с одной из разнородных фракций, объединённых лишь ненавистью к Ван Цзинвэю. Насколько долго оппозиция сможет удерживать их расположение — вопрос открытый, особенно в отсутствие чёткой стратегии на будущее. Тем не менее, пока они выиграли ценное пополнение в свою коалицию."
CHI.lategame.213.a: "Линии фронта очерчены."

CHI.lategame.214.t: "[FROM.GetAdjectiveCap]ие делегаты отстаивают регионализм"
CHI.lategame.214.d: "$CHI.lategame.fordelintro$\n\n[FROM.GetLeader] демонстрирует независимость, стараясь продвигать собственные интересы своего регионального правительства. Хорошо это или плохо, но власть [FROM.GetNameDef] уходит корнями в провинциальную автономию и слабо зависит даже от обширной сети патронажа Гоминьдана. В разгар националистического подъёма такой партикуляризм вызывает сильное раздражение."
CHI.lategame.214.a: "Они выбрали собственные интересы."
#Inform FRA and INT of the Fate of the MMIC
CHI.lategame.220.intro: "Гоминьдан давно пользовался нашей широкой поддержкой, в том числе благодаря Международной военной миссии в Китае (MMIC). Несмотря на такую щедрость, зависть националистов и внутренние распри в партии привели к вражде между старой гвардией Национально-революционной армии (НРА) и MMIC, поскольку офицеры НРА пытались найти козлов отпущения за свои всё более очевидные неудачи.\n\nДаже на пороге победы восточная пролетарская волна продолжает разрушаться из-за раздоров в рядах Гоминьдана. Разлад вылился в волну насилия по всей недавно освобождённой стране накануне важного партийного съезда. Три советника MMIC были ранены, один — убит линчеванием разъярённой толпой, сочувствующей реакционной «индийской клике» внутри НРА."
CHI.lategame.220.expelled: "Эта зловещая клика при активном участии старой гвардии НРА успешно раздула скандал — распространив ложь о вмешательстве MMIC и убедив руководство Гоминьдана в необходимости полного изгнания миссии. Этот шаг, осуждённый правительством [FRA.GetAdjective], вызывает серьёзные сомнения в рассудительности наших так называемых «товарищей»."
CHI.lategame.220.purged: "Эта зловещая клика, в состав которой входят бывшие офицеры, ранее направленные с советнической миссией на индийскую революцию, отстранена от должностей до окончания расследования. Это решение, принятое при неохотной поддержке старой гвардии, свидетельствует о всё более непредсказуемом поведении руководства Гоминьдана, потерявшего объединяющего врага и столкнувшегося со всплеском насилия."
CHI.lategame.220.bio: "Убитым оказался Жан Фонтенуа — в прошлом заслуженный солдат Великой войны и Французской синдикалистской революции. Родившись в бедности, он сумел благодаря уму, отваге и преданности социалистическому делу сделать карьеру в ранней армии Коммуны. Вскоре он был направлен на Восток в качестве советника перед Северным походом. Там он стал алкоголиком, пристрастился к опиуму и превратился в завсегдатая злачных заведений, однако активно писал о революции Гоминьдана. В своё время его рассматривали как кандидата на пост главы MMIC, но растущие пороки и симпатии к сорельянству привели к тому, что его место занял более популярный Андре Мальро. Тем не менее, он будет нам недоставать."
CHI.lategame.220.funeral: "Тело Жана Фонтенуа вернётся на родину только через несколько недель, однако [FRA.GetLeader] уже пообещал его семье государственные похороны и иные почести. Его личное дело было очищено от всех компрометирующих записей, а Мальро, его бывший соперник, направил на родину щедрую панегирическую речь — нация скорбит."
CHI.lategame.220.t: "[CHI.GetNameDef] изгоняет MMIC"
CHI.lategame.220.d.sorelian: "$CHI.lategame.220.intro$\n\n$CHI.lategame.220.expelled$\n\n$CHI.lategame.220.bio$\n\n$CHI.lategame.220.funeral$"
CHI.lategame.220.d.other: "$CHI.lategame.220.intro$\n\n$CHI.lategame.220.expelled$\n\n$CHI.lategame.220.bio$"
CHI.lategame.220.a: "Немыслимое возмутительство!"

CHI.lategame.221.t: "Атака на MMIC в Нанкине"
CHI.lategame.221.d.sorelian: "$CHI.lategame.220.intro$\n\n$CHI.lategame.220.purged$\n\n$CHI.lategame.220.bio$\n\n$CHI.lategame.220.funeral$"
CHI.lategame.221.d.other: "$CHI.lategame.220.intro$\n\n$CHI.lategame.220.purged$\n\n$CHI.lategame.220.bio$"
CHI.lategame.221.a: "Какая трагедия."

##Scenario 1: Wang carries the day (250-299)
CHI.lategame.250.t: "Победа Вана!"
CHI.lategame.250.d: "Поднявшись на ноги, Ван решительно отверг все выдвинутые против него обвинения. Он смело и дерзко заявил, что всего лишь исполнял наставления покойного Лидера. Разве не является сутью Реформированной партии то, что её долг — наставлять народ в духе Трёх народных принципов? Принципов, которые через своё распространение служат единственным путём спасения нации? Как может истинный член Гоминьдана утверждать, что партийцы не должны стремиться к воплощению этой доктрины? Если учения доктора Сун Ятсена должны быть претворены в жизнь, то партия как живой организм действительно должна быть реорганизована, чтобы укрепить общее дело, организацию и дисциплину!\n\nСвоими гипнотическими жестами и эффектными паузами Ван завершил речь под гром аплодисментов. Временный комитет действий оказался ошеломлён и унижен. В ходе драматического голосования поимённо Конгресс отказался признать Вана виновным, после чего он был переизбран на пост председателя партии. Вскоре он начал мстить — стремительно перетасовал правительство и назначил новый Центральный исполнительный комитет, набитый лоялистами из Реформированной клики и фракции резиденции.\n\nПоскольку большинство Конгресса осталось верно Реформированной клике, члены ВКА и политические оппоненты, включая фракцию Реконструкции, покинули столицу и направились в город Ухань, где генерал Дэн Яньда провозгласил мятеж во имя «спасения национальной революции». Пока офицеры НРА начинают занимать стороны, Общество возрождения Китая хранит молчание на фоне бурных событий — но от Ху и его теневого круга нельзя ожидать молчания вечно.\n\nУхань был объявлен свободным городом, и силы, выступающие против режима Ван Цзинвэя, должны собраться там, чтобы дать бой — всего в 550 км от столицы. Очевидно, что если Ван намерен сохранить власть, захваченную в Конгрессе, он должен быстро покончить с правительством Уханя."
CHI.lategame.250.a: "Гамбиты предателей провалились."

CHI.lategame.251.t: "Штурм Уханя"
CHI.lategame.251.d: "Получив прямой приказ от председателя, генерал Чжан Чжичжун возглавил несколько элитных и закалённых в боях дивизий НРА, чтобы подавить восстание в Ухане. Армия начала полномасштабный штурм города с применением тяжёлой артиллерии и лёгкой авиации; от мятежников требовалась только безоговорочная капитуляция.\n\nНа рассвете Ухань превратился в очередное поле битвы — над городом раздавался грохот артиллерии и ружейных выстрелов, когда правительственные силы ворвались в город. Однако стало ясно, что военное преимущество нанкинского правительства оказалось непреодолимым для милиции ВКА, и они начали планировать отступление в свой оплот народной поддержки — провинцию Фуцзянь.\n\nЛицо Сун Цинлин было залито слезами — она видела раненых и убитых товарищей, сражавшихся с ней ещё со времён Фуцзяньского восстания. Не желая бросать ещё больше жизней на алтарь революционной борьбы, она немедленно направила весть правительству Вана — с предложением о капитуляции всех сил ВКА и противников Вана. Несмотря на негодование своего ближайшего соратника генерала Дэна Яньда, который верил, что силы ВКА ещё могут собраться и сражаться, Сун Цзывэнь и другие гражданские лидеры ВКА предложили полную капитуляцию нанкинскому правительству. Борьба внутри партии и война, похоже, закончились… по крайней мере, пока."
CHI.lategame.251.a: "Мягкая рука для победителей."
CHI.lategame.251.b: "Железный кулак для побеждённых."
#Apply a Gentlehand (261-270)
CHI.lategame.261.t: "Неловкий мир"
CHI.lategame.261.d: "В [CHI.GetNameDef] вновь воцарилось хрупкое подобие мира — Временный комитет действий окончательно распался как политическая организация. По указанию НРА милиции ВКА подлежат расформированию, а Ассоциация революционных однокашников Академии Хуанпу запрещена как формальное объединение. Вечно прагматичный и изображающий смиренного лидера, председатель Ван Цзинвэй официально объявил амнистию для всех, кто сражался против него, заявив, что пришло время исцеления, а не новой войны.\n\nТем временем пресса Реформированной ассоциации товарищей вовсю распространяет публикации, дискредитирующие движение — заголовки с предполагаемыми романтическими отношениями между Дэном Яньда и Сун Цинлин стали обычным делом наряду с обвинениями в коррупции и запугивании избирателей. Сообщается, что Ван приказал прекратить публикации, порочащие вдову вечного премьера, однако такие обвинения всё же вызвали ярость у упрямого Дэна.\n\nВозможно, полагаясь на действие амнистии и свою позицию в Гоминьдане, Дэн в последние дни открыто критикует руководство нового правительства — утверждая, что оно ничем не отличается от реакционеров, с которыми сражались во Втором Северном походе. Поговаривают… шепчутся в темноте, что если Дэн не прекратит свои выступления, председатель может решиться на решительные меры."
CHI.lategame.261.a: "Он не может просто замолчать?"

CHI.lategame.262.t: "Успокоить партнёров"
CHI.lategame.262.d: "Председатель Ван направил своего верного товарища Чэна Гунбо для переговоров с китайскими синдикалистами о создании обновлённого единого фронта и привлечении поддержки Интернационала. Хотя Чэн твёрдо стоит на позициях Гоминьдана и Реформированной ассоциации товарищей, в прошлом он был влиятельным профсоюзным деятелем в Китайской синдикалистской партии — многие радикалы в КПС читали его труды и признают его видным социалистом. Пока Лига китайских синдикалистов погружается во фракционную борьбу, Чэн обратился напрямую к КПС и добился признания как от ортодоксов, так и от радикалов, признавших руководство Вана.\n\nТем временем председатель усердно работает над партийной реорганизацией. Только те, кто состоит в РАТ и поклялся в верности ей и самому Вану, получают места в Законодательном юане. Идеал РАТ о полностью объединённой партии с каждым днём всё ближе к реальности..."
CHI.lategame.262.a: "Предпочесть ортодоксов."
CHI.lategame.262.b: "Сотрудничать с радикалами."

CHI.lategame.263.t: "Блудный сын"
CHI.lategame.263.d: "По мере исчезновения оппозиции ВКА к Вану в Законодательный юань возвращается ощущение нормальности. Большинство членов фракции реконструкции получили свои места обратно без особых препятствий — хотя, как долго этот либеральный «пятый эшелон» будет терпим, остаётся открытым вопросом. Как мера предосторожности они находятся под плотным наблюдением, а собрания их фракции открыто отслеживаются.\n\nС утратой военной поддержки после поражения в Ухане максимум, на что они способны — это робко жаловаться на нарушение конституционных принципов. Если мы хотим сохранить этот формат, то «мягкой» рукой запугивания и шантажа можно держать их под контролем. Что касается самого «наследного принца», то на Сун Фо уже накопано немало компромата, включая его давнюю внебрачную связь с бывшей секретаршей Янь Айцзюань, от которой у него дочь. Сун, похоже, отстаёт по выплатам за молчание, разорённый своими политическими авантюрами. Это и ещё один роман — идеальный повод для утечки в прессу, о чём Сун уже получил предупреждение.\n\nНе все во фракции реконструкции хотят быть ручной оппозицией. Многие представители буржуазии, верившие, что Сун сможет остановить социалистический захват партии, сбежали за границу со всем имуществом. Возможно, они уже сыграли свою роль — и теперь лучше держать их подальше. Отправить Суна послом в Америку, в тур по Юго-Восточной Азии, или снова в Гонолулу во главе культурного общества — не важно. Главное, чтобы он исчез из поля зрения."
CHI.lategame.263.a: "Страх удержит их в повиновении."
CHI.lategame.263.b: "Теперь они нам не нужны."

CHI.lategame.264.t: "Последнее предупреждение"
CHI.lategame.264.d: "Дэн не прекращает нападок на председателя Вана. На недавнем собрании партии он назвал его ядовитым приспособленцем, змеёй в рядах, стравливающей товарищей вразрез с идеалами доктора Сун Ятсена. Ван — человек терпеливый, но его терпение на исходе. День за днём Дэн осыпает оскорблениями и самого Вана, и его семью — особенно жену, которую он презрительно называет «лаотайпо» (старой бабкой).\n\nНесмотря на вражду, между ними есть уважение: оба ветераны партии из Гуанчжоу, оба учились в Европе во времена изгнания. Однако фракция Резиденции (особенно Чэнь Бицзюнь) требует у председателя устранить угрозу раз и навсегда.\n\nПоздней ночью телохранитель Вана, Ли Шицюнь, получил вызов в кабинет. После недолгого разговора Ван спокойно приказал «заняться Дэном», прежде чем тот станет угрозой революции. Ли согласился. План уже готов: либо тайно похитить и задушить Дэна, либо застрелить его средь бела дня — в назидание остальным предателям Гоминьдана."
CHI.lategame.264.a: "Убить средь бела дня — назидание всем."
CHI.lategame.264.b: "В машине — тихо и безболезненно."

CHI.lategame.265.t: "Изгнание тени"
CHI.lategame.265.d: "Новости о смерти Дэна распространились медленно. Ван не особо старался притворяться удивлённым, а старшие члены партии и так всё поняли — но молчали. Послание было услышано. Даже ближайшие соратники Дэна к тому моменту от него отстранились, а внутренний круг оказался бессилен.\n\nСун Цинлин впала в глубокую скорбь, которой не испытывала со времён смерти мужа. Была ли между ней и Дэном любовь или лишь братская близость — теперь уже неважно: угрозой она больше не будет. Её просьбу об эмиграции отклонили, и, скорее всего, она проведёт остаток жизни под домашним арестом, под бдительным наблюдением агентов.\n\nЧто касается виновных — в гибели Дэна обвинили некие тёмные силы военного подполья. Дай Чунфэн был публично арестован и обвинён до того, как успел скрыться. Удобный козёл отпущения — одним выстрелом убиты сразу две цели. Его мольбам о невиновности в ходе показательного суда никто не поверит — достойный конец для чудовища.\n\nНо его соратники — другой вопрос. Ху Цзуннань и его клика остаются популярными и составляют большую часть «молодой гвардии», которая во время мятежа ВКА в основном осталась нам верна. Хотя они не подняли оружие, угроза всё ещё есть. Если их устранять — то сейчас."
CHI.lategame.265.a: "Они присоединятся к нему на эшафоте!"
CHI.lategame.265.b: "Задвинем их в политическое небытие."
#Bring Down the Iron Fist (271-280)
CHI.lategame.271.t: "Дворцовый переворот"
CHI.lategame.271.d: "Мирные переговоры зашли в тупик, а война продолжается. Чэнь Бицзюнь и фракция Резиденции не стали дожидаться исхода и начали действовать. Сверху донизу они укрепили контроль председателя над Исполнительным Юанем — требуя безоговорочной, догматичной преданности Вану Цзинвэю. Представители фракции Реконструкции, ВКА, независимые и даже некоторые сомневающиеся из Реформированной ассоциации товарищей и Лиги китайских синдикалистов были удалены из бюрократии и заменены покорной смесью отпрысков Резиденции и ярых членов РАТ.\n\nПодобная откровенная узурпация власти была бы немыслима ещё несколько месяцев назад, но сейчас некому ей противостоять. Любые разногласия между фракцией Резиденции и руководством РАТ, похоже, временно забыты: обе стороны встали на защиту своего общего лидера. Как и в старые времена патронажа, слепая верность вознаграждается, а в лагере про-ваньских политиков хватает желающих стать «клиентами». В некоторых случаях даже требуют формальных клятв лояльности — фракция Резиденции вполне оправдывает свою кличку «дворцовой».\n\nВсего за несколько недель дело было сделано. Чэнь Бицзюнь, Чу Минъи и Цзэн Чжунмин создали новую иерархию власти, где Ван занял непоколебимую вершину, а внизу уже гудит армия чиновников, готовая выполнять его каждое слово."
CHI.lategame.271.a: "Одна нация. Одно правительство. Одно видение."

CHI.lategame.272.t: "Предательство Гу Шуньчжана"
CHI.lategame.272.d: "Интриги в Нанкине не прекратились даже на фоне надвигающейся гражданской войны. За последние недели стало очевидно, что все фракции отчаянно ищут способы переиграть соперников. Нам повезло узнать — благодаря удачным источникам — о предательстве, которое могло обернуться катастрофой: Гу Шуньчжан переметнулся на сторону врага.\n\nГу Шуньчжан был основателем Красного отряда Чжоу Эньлая, его семья — известные революционеры, а сам он рассматривался как возможный кандидат в Центральный исполнительный комитет. Один из ближайших соратников Чжоу, он прославился своим умом, стойкостью под огнём, немногословием и сильным характером.\n\nИменно последняя черта, а также группизм внутри отряда, заставили Чжоу и Чэнь Гэна задуматься о его переводе. Возможно, Гу узнал об этом и потому предал. Или же решил, что Ван недолго продержится, и захотел перебежать к победителям. Может, его шантажировали. Так или иначе, он, через старые связи с Зелёной бандой, переметнулся к Дай Чунфэну и его Лиге Десяти.\n\nХу Цзуннань и Общество возрождения Китая воспользовались хаосом для своих целей, и Дай — ключевая фигура в их тайных операциях. Что именно он замышляет — остаётся тайной, но явно ничего хорошего. С таким ценным кадром, как Гу, они знают почти всё о наших агентах и планах — грозит катастрофа."
CHI.lategame.272.a: "Нужно действовать немедленно!"

CHI.lategame.273.t: "Триумф Красного отряда"
CHI.lategame.273.d: "Занятый другими делами, Чжоу Эньлай обычно передавал командование Красным отрядом своим помощникам, но из-за серьёзности ситуации решил вмешаться лично. К счастью, у него было своё тайное оружие — агент в самом сердце операций ОВК.\n\nСюн Сянхуэй был личным секретарём и начальником штаба Ху Цзуннаня. Его отец — влиятельный судья, сам он — перспективный офицер, завербованный Красным отрядом ещё в студенчестве для внедрения в «молодую гвардию». Каким-то образом он стал любимцем генерала Ху, всё это время передавая Чжоу важнейшую информацию.\n\nС его помощью удалось вычислить место следующей тайной встречи ОВК, на которую должен был прийти Дай Чунфэн. По приказу Чжоу отряд устроил засаду, обезглавив змею до её удара. Ху Цзуннань, Дай Чунфэн, Хэ Чжунхань, Дэн Вэньи и другие командиры ОВК были ликвидированы. Как раз вовремя — на встрече обсуждался их собственный переворот.\n\nМесть Гу Шуньчжану была столь же безжалостной. Он и вся его семья были уничтожены — более тридцати человек, застрелены или задушены. Выжили только его трёхлетняя дочь и двухлетний племянник — наказание, традиционно предназначенное для предателей. Говорят, Гу принял свою судьбу без сопротивления.\n\nТеперь, когда его соперник уничтожен, а Нанкин спасён, осталась лишь горстка беглецов от ОВК."
CHI.lategame.273.a: "Поглотить операции Дая Чунфэна."
CHI.lategame.273.b: "Уничтожить это гнездо гадюк."

CHI.lategame.274.t: "Фуцзянь пал!"
CHI.lategame.274.d: "Район Цзянси-Фуцзянь был базой операций гоминьдановского сопротивления — последним оплотом после Шанхайского восстания 1932 года. Благодаря пересечённой местности, поддержке населения и стойким бойцам, волна за волной кампаний окружения терпела поражение. Они держались почти десятилетие, невзирая на немецкую подготовку и финансирование Лиги Сунь Чунфана, даже отказывались подчиняться посланникам Гоминьдана. Под руководством Дэна Яньда они были готовы сражаться против бывших товарищей по НРА.\n\nКампания была ожесточённой. Многие офицеры ВМРАТ сочувствовали Дэну или дезертировали после падения Уханя, но оставшиеся оказались фанатиками с десятилетиями боевого опыта. Тайные склады, хорошо расположенные бункеры и старая сеть связи делали Фуцзянь трудной целью. Повстанцы устраивали засады, блокируя колонны правительственных войск.\n\nНо новая НРА — уже не фарс времён Сунь Чунфана. Эффективная логистика и современное снаряжение позволили правительственным войскам уничтожить мятежников. Моторизованные части уничтожили партизан, и Фуцзянь пал.\n\nДэн Яньда погиб в бою — вероятно, как и хотел, среди товарищей. Сун Цинлин захвачена в своей цитадели и отправлена под домашний арест в Нанкин. Командиры капитулировали один за другим после известий о гибели «Красного Наполеона». Сражения продолжаются, но надежда на победу мятежа угасла. Тем не менее, Фуцзянь остаётся очагом сопротивления."
CHI.lategame.274.a: "Ввести военное положение."
CHI.lategame.274.b: "Объявить амнистию сдавшимся."

CHI.lategame.275.t: "Наследный принц бежит"
CHI.lategame.275.d: "После падения Уханя Сун Фо и его сторонники разбежались. Не пригодные к партизанской жизни, они скрылись в портовых городах вроде Шанхая и Гуанчжоу. Мечты о свержении Вана рухнули, а надежды подменить социалистический путь страны канули в Лету. Видя это, лидеры фракции Реконструкции уехали за границу — в эмигрантские общины или буржуазные государства.\n\nСреди них — и сам Сун Фо, чьи стремления продолжить дело отца вновь потерпели крах. Разочарованный, он ушёл в отставку с оставшихся постов и заявил, что отправляется в зарубежное турне — якобы для укрепления «культурного диалога» с китайской диаспорой. По сути, он снова возглавил Комиссию по делам заморских китайцев.\n\nЕго решение об эмиграции снизило градус напряжения и избавило Вана от неловкости. Спросил он немного — лишь на покрытие личных расходов, чтобы выглядеть полезным. Тем не менее, всё громче звучат голоса за его полное исключение из партии. Для многих радикалов он — позор имени отца и умрёт, зная это."
CHI.lategame.275.a: "Назначить его послом нашего народа."
CHI.lategame.275.b: "Исключить из партии!"
##Scenario 1 Wrapup (290-299)
CHI.lategame.290.t: "Истинный наследник революции"
CHI.lategame.290.d: "Ван Цзинвэй наконец достиг своей мечты — к которой он шёл всю жизнь, сражаясь и цепляясь за каждую возможность. Теперь он — бесспорный наследник Сунь Ятсена, хозяин Китая, обладающий властью изменить страну к лучшему. Далеко он ушёл от сына неудавшегося учёного и неудачливого революционного убийцы.\n\nПока он купается в славе, политика страны всё больше принимает его облик. Фракция Резиденции, возглавляемая его женой Чэнь Бицзюнь, шурином Чу Минъи и секретарём Цзэн Чжунмином, захватила центральное место в правительстве, укрепив власть через контроль над Исполнительным Юанем. И всё это — за счёт их давних соперников внутри лагеря Вана, Реформированной ассоциации товарищей, которая столько лет верно ему служила.\n\nРАТ между тем раздираема внутренними спорами. Воодушевлённые собственной значимостью, радикалы во главе с Чэнь Гунбо, Ван Фацинем, Го Чуньтао и братьями Гу предложили широкие реформы по модернизации Китая. Они надеются переосмыслить Объединённый фронт и сблизиться с ЛКС, опираясь на про-КСП голосы, такие как Ши Цунтун, Сяо Цзаньюй, Сюй Дэхэн и Лю Каньюань.\n\nМалая фракция умеренных в РАТ теперь пополнилась многими бывшими членами ВКА. Под руководством Гу Мэньюя и Пань Юньчао, при поддержке Чжу Цзициня и Линь Бошэна, они выступают за примирение в партии и отказ от классовой борьбы. Некоторые даже предлагают наладить связи с несоциалистической левицей.\n\nВ Лиге китайских синдикалистов господствует Китайская синдикалистская партия — после того как Общество Мира оказалось вытесненным. Радикалы в партии усилились и тесно сотрудничают с фракцией Чэня Гунбо. Ясно одно: и внутри, и вне Гоминьдана, Китай шагает под музыку Председателя — и теперь он волен творить нацию по своему образу."
CHI.lategame.290.a: "Пора делить трофеи…"

CHI.lategame.291.t: "Восстание во Фуцзяне"
CHI.lategame.291.d: "До [ROOT.Capital.GetCapitalVictoryPointName] дошли известия о расколе в Гоминьдане, вызванном спором о лидерстве Вана Цзинвэя, особенно из-за его союза с федералистами. После неудачной попытки импичмента, военные радикалы организовали восстание в старых опорных районах — Цзянси и Фуцзяне. Оппозиция под предводительством Сун Цинлин собралась в Ухане в надежде на свержение Вана, но, похоже, их шанс упущен.\n\nПоложение Вана по-прежнему шаткое, и он обратился к нам, стремясь стабилизировать свою власть. Ван, как всегда, ловко выставил ситуацию в выгодном свете — как «доказательство» того, что большинство партии готово забыть старые обиды. Он утверждает, что Гоминьдан выполнил свои обязательства и теперь очередь за нами — принять интеграцию нашего движения. Устранение его соперников открыло путь к долгосрочному соглашению.\n\nУ Вана — серебряный язык, но насколько искренна его рука примирения? Гоминьдан действительно, похоже, готов к ограниченной демократизации на время «политического воспитания», а сам Ван проявил подлинную симпатию к федералистским принципам. Однако если мы сложим оружие, пока Гоминьдан рвёт сам себя на части — пути назад уже не будет. Если мы хотим уничтожить партийное государство, время действовать — сейчас."
CHI.lategame.291.a: "Пора подняться и нам!"
CHI.lategame.291.b: "Будем работать ради лучшего будущего!"

CHI.lategame.292.t: "Федералистский компромисс"
CHI.lategame.292.d: "После падения Уханя председатель Ван обратился к другой, не менее важной проблеме — пожалуй, к главной причине всех бед. Именно он выступил архитектором альянса между Гоминьданом и Федералистами, положив конец десятилетнему расколу. Это принесло немало головной боли — жёсткие гоминьдановцы осудили союз с «предателями Вечного премьера», а Федералисты сохраняли автономию, представляя постоянную угрозу революции.\n\nНо усилия Вана наконец увенчались успехом. После пламенной речи, главный федеральный оплот в [FROM.GetNameDef] согласился сложить оружие и начать процесс полной интеграции в государственный аппарат Гоминьдана. Вкупе с уничтожением ВКА и их кураторов из ВМРАТ, это даёт шанс на подлинное исцеление нации под общереспубликанским знаменем — на условиях Председателя."
CHI.lategame.292.a: "Будущее светло для наследников Синьхайской революции."

CHI.lategame.293.t: "Восстание во Фуцзяне!"
CHI.lategame.293.d: "До [ROOT.Capital.GetCapitalVictoryPointName] дошли известия, что Центральный исполнительный комитет, доминируемый левыми, расколот из-за лидерства Вана Цзинвэя. После провала импичмента, недовольные подняли восстание в Цзянси-Фуцзяне. Оппозиция под Сун Цинлин собралась в Ухане, надеясь на переворот, но их момент, похоже, ушёл. Увы, среди проигравших — и многие из наших бывших товарищей из НРА, что подрывает наш союз с Гоминьданом.\n\nПоложение Вана всё ещё нестабильно, и если мы хотим воспользоваться моментом, то он настал. Быстрая, хорошо организованная атака может смести все враждующие социалистические фракции и привести к националистическому порядку, свободному от французского влияния. Однако Ван уже успел укрепить власть, и свергнуть его будет непросто. Мы получили инструкции помочь ему в подавлении восстания, и есть слабая надежда, что это сохранит за нами влияние в качестве спутника."
CHI.lategame.293.a: "Левым не место у власти."
CHI.lategame.293.b: "Порядок необходим ради спасения нации."

CHI.lategame.294.t: "Правые становятся в строй"
CHI.lategame.294.d: "После падения Уханя председатель Ван отдал строгий и недвусмысленный приказ всем губернаторам и военным командирам страны — усмирить мятежников или лишиться власти. Эта мера положила конец эре полевых командиров и вечных переходов из лагеря в лагерь.\n\n[FROM.Getleader], лидер старого правого отколовшегося правительства Гоминьдана, подчинился приказу Вана: его войска разоружили ополченцев ВМРАТ, а сторонники ВКА были арестованы в [FROM.Capital.GetCapitalVictoryPointName]. Наши отношения, и без того прохладные, вряд ли улучшатся, но их мудрое решение склонить голову гарантирует быструю стабилизацию.\n\nГлавные бенефициары — умеренные в РАТ, их курс против классовой борьбы подтверждён объединением партии мирным путём. Фракция Реконструкции также, вероятно, получит временный импульс, но с её стремительным падением вряд ли она сможет этим воспользоваться."
CHI.lategame.294.a: "Порядок восторжествовал."
#Scenario 2: Wang is Impeached (300-349)
CHI.lategame.300.t: "Ван смещён с поста!"
CHI.lategame.300.d: "Ван вышел на трибуну и сразу пошёл в наступление. Он знал, что его враги что-то замышляют, и был готов к бою. С необычайным пылом и отточенной риторикой он начал, пожалуй, самую важную речь в своей жизни перед более чем тысячей товарищей. Но даже такой опытный политик, как Ван, не смог сдержаться, когда заметил, как на него смотрит зал.\n\nНенависть и отвращение в глазах множества делегатов были пугающими. Их ледяные взгляды выдавали гнев и решимость. Они уже всё решили задолго до съезда. Его время подошло к концу — и он это понял. Всё, что ему оставалось — уйти с достоинством, сохранив хоть тень уважения к себе.\n\nОн завершил свою речь тихо, поблагодарив слушателей за годы совместной борьбы, и покинул сцену с опущенной головой. Во время голосования он стоял спокойно и безмолвно, пока делегаты подавали свои голоса за его отставку. С небольшим, но решающим перевесом, многолетний Председатель Гоминьдана был смещён оппозицией.\n\nЗал был потрясён и двигался словно в полусне, пока избирали преемника. Сун Цинлин была выдвинута и избрана без противников. На следующее утро она принесла присягу как Президент Китая. Одним быстрым, скоординированным ударом ставка ВКА сыграла, а РАТ осталась в оцепенении, не успев ничего предпринять. Пока что."
CHI.lategame.300.a: "Тиран пал!"

CHI.lategame.301.t: "Растущая ответная волна"
CHI.lategame.301.d: "В Нанкине воцарилась тревожная тишина — затишье перед бурей. Ван Цзинвэй и его жена отступили в личную резиденцию и больше не появлялись на публике. По слухам, бывший Председатель впал в тяжёлую депрессию, ощущая предательство со стороны партии, которой он отдал всё, и теперь почти не встаёт с постели.\n\nОднако его союзники не так слабы. Чэнь Гунбо и другие решительно заявляют: РАТ не сдастся без боя. Они вышли в эфир, осудив события Третьего Конгресса как вооружённый переворот. Один за другим члены РАТ рассказывают в лояльных газетах и на радио о том, как их запугивали голосовать за импичмент. Ходят грязные слухи о романе между Дэн Яндой и новой президенткой, а оппозиция обвиняет Сун в том, что она — марионетка военных.\n\nИсполнительный Юань уже получил серию отставок от назначенцев Вана, парализовав работу правительства. В армии и госаппарате офицеры отказываются подчиняться новым властям и игнорируют приказы министра обороны Ли Цзишэня, назначенного Сун — одного из немногих её кадровых выборов. Руководство КСП медлит, но многие радикалы уже начали стихийные забастовки вместе с профсоюзами, связанными с РАТ, пока страна погружается в хаос."
CHI.lategame.301.a: "Это чрезмерная эскалация."

CHI.lategame.302.t: "Ответный удар РАТ!"
CHI.lategame.302.d: "У стен Президентского дворца протесты только усиливаются — РАТ и радикалы из КСП подстрекают народ против нового правительства. По всей стране вспыхивают бунты, усугубляемые жестокими действиями сил правопорядка. Хулиганы из СРС только подливают масла в огонь, нападая на бастующих и похищая тех, кого считают «врагами государства».\n\nСун Цинлин не этого хотела. Она — идеалистка, которая верила, что Вана можно свергнуть легальным путём — только так, по её мнению, возможна мирная передача власти. Но ей почти не дали шанса управлять: кабинет ещё не сформирован, премьер не назначен, а переговоры с бывшими союзниками затянулись.\n\nСитуация не только не стабилизируется — наоборот, всё становится хуже. Новый президент Китая столкнулась с тяжелейшим вызовом к своей власти. Конец Третьего Конгресса, похоже, не стал концом конфликта, раздирающего партийное государство."
CHI.lategame.302.a: "Это не входило в план!"

CHI.lategame.303.t: "Коалиция трещит по швам"
CHI.lategame.303.d: "С каждым днём, по мере углубления кризиса и отсутствия решений, трещины внутри победивших фракций становятся всё заметнее. Ужасающее насилие и постоянные споры внутри правящей коалиции вызывают тревогу у КСП и умеренных из РАТ, ранее перешедших из лагеря Вана. Даже Общество Мира — самые верные союзники ВКА — выражают обеспокоенность авторитарными методами подавления протестов.\n\nФракция Реконструкции во главе с Сун Фо воспользовалась моментом: он требует немедленного завершения периода опеки и проведения всеобщих выборов. По его мнению, только народное голосование способно разрешить кризис внутри партии — хотя именно это и пытался сделать Третий Конгресс. Он уже заигрывает с центристами и республиканцами, чтобы заручиться несоциалистическим электоратом.\n\nОбщее мнение в ЦИК таково: Сун Фо бредит, если думает, что правительство доживёт до выборов в текущем состоянии. Каждый день ситуация ухудшается, и всё больше партийцев может вернуться в лагерь РАТ и умолять Вана вернуться к власти. Между тем, правительство парализовано внутренними распрями. И что хуже — министр обороны Ли Цзишэнь бесследно исчез вчера, в самый критический момент."
CHI.lategame.303.a: "Где генерал Ли?"

CHI.lategame.304.t: "Точка невозврата"
CHI.lategame.304.d: "ЦИК потрясла трагическая новость: министр обороны Ли Цзишэнь был найден мёртвым патрулём — его похитили и убили радикалы. После более двух недель непрекращающегося хаоса это стало последней каплей. Сун Цинлин жёстко приняла решение: она назначила Дэн Янду главнокомандующим Национально-революционной армии и поручила ему возглавить Комиссию военных дел.\n\nПочти сразу были выданы ордера на арест Вана Цзинвэя, Чэнь Гунбо, Чжоу Эньлая, братьев Гу и других деятелей РАТ за измену. Предупреждённые верными сторонниками в Исполнительном Юане, почти все они бежали в южные оплоты — в Ханчжоу. При поддержке губернатора Чжэцзяна Мэй Сыпина и сочувствующих в армии, они начали отчаянное восстание. Военные гарнизоны по Пяти Провинциям сообщают о распрях и мятежах, другие — колеблются. Однако основная масса армии осталась верна Сун.\n\nПублично союзники ВКА сплотились вокруг президента Сун и её защитника, но за кулисами кипит недовольство. Её требуют сдержать авторитарные порывы и вернуться к консенсусу. Между тем, в рядах ВМРАТ слышны призывы к решительным мерам, а Центральная комиссия по делам предлагает помочь «обойти» партийную борьбу во имя стабилизации. Перед лицом надвигающейся гражданской войны Сун Цинлин принимает решение."
CHI.lategame.304.a: "Нужен правительство национального единства."
CHI.lategame.304.b: "Ввести чрезвычайное положение."
#We need a Unity Government (310-319)
CHI.lategame.310.t: "Чрезвычайная коалиция"
CHI.lategame.310.d: "В каждом правительстве национального единства хватает болтовни — и новый ЦИК не стал исключением. Сун Фо и его союзники из Фракции Реконструкции жалуются на социалистические излишества и попеременно вспоминают о конституционных принципах, когда им это выгодно. Го Мэньюй, Пань Юньчао и другие умеренные из РАТ пытаются найти себе место в новой республике — их считают предателями лагеря Вана, и потому они метаются в поисках опоры. Тем временем Лига китайских синдикалистов погрязла в расколе: ортодоксальная фракция КСП во главе с Чэнь Дусю и Ли Лисанем пытается сохранить контроль над партией. А Старейшины из Общества Мира словно витают в облаках, оторванные от реальности в своей башне из слоновой кости.\n\nКонтроль ВКА над армией дал им серьёзное преимущество, вынудив разрозненные фракции сесть за стол переговоров. Многолетние внутренние распри ослабляли усилия по ведению войны, и Сун Цинлин не намерена повторять ошибки. Тем не менее, гражданские лидеры ВКА — такие как Чжан Божун и Пэн Цзэсян — умоляют её прислушаться к союзникам и хотя бы частично удовлетворить их требования. И пусть многие претензии — просто дымовая завеса, всё же есть резонные вопросы: почему мы сделали то, что сделали? И не прав ли РАТ в своих обвинениях?\n\nДипломатичный Чэнь Южэнь, партийный старейшина Пэн Цзэмин и брат Сун — Сун Цзывэнь — предложили свою помощь в переговорах. Но в конечном счёте всё зависит от самой Сун Цинлин. Она понимает: те, кто выступил против Вана, сделали это по разным причинам. Кто-то ненавидел его авторитаризм и опасался диктатуры партии. Другие презирали коррупцию РАТ, использовавшего институты власти в личных целях. Чтобы сохранить союзников, она напоминает им, ради чего они боролись."
CHI.lategame.310.a: "Подчеркнуть борьбу с тиранией!"
CHI.lategame.310.b: "Подчеркнуть борьбу с коррупцией!"

CHI.lategame.311.t: "Конец мятежа"
CHI.lategame.311.d: "Битва с силами, лояльными Вану, была ожесточённой, но короткой. Благодаря блестящему командованию Дэн Янды и Хуан Цисяна, восставшие части Национально-революционной армии были окружены до того, как смогли соединиться в единую силу. Остальных загнали в укреплённые, но безнадёжные позиции, где они оказались в осаде значительно превосходящих войск, лояльных ВКА.\n\nМятежники надеялись на масштабное восстание: на поддержку офицеров, связанных с Политическим департаментом, выпускников ВММИК и независимых командиров, готовых выступить против узурпаторов. Но Ассоциация революционных однокашников академии Хуанпу осталась верна делу Сун, и Дэн Янда обеспечил стабильность фронта.\n\nС Ханчжоу и рядом других городов, оказавшихся в кольце, и без надежды на подкрепление, один за другим мятежники сдавались. Ван, не желая кровавой развязки, отдал приказ сложить оружие. Прежде чем город пал, Чэнь Гунбо, Чэнь Шаоюй и другие радикалы бежали за границу — флот, негласно, позволил им покинуть страну.\n\nКогда делегация ЦИК вновь встретилась с Ваном и его супругой, бывший Председатель выглядел измождённым. Он говорил вежливо, даже с Сун (хотя избегал встречаться глазами), но, казалось, смирился со своей судьбой. Этот сломленный человек вызвал сочувствие у некоторых бывших товарищей — особенно у фракции Го Мэньюя, которая присоединилась к Чэнь Бицзюнь и ходатайствует о милости. Они предлагают использовать международный авторитет Вана и отправить его за границу. Однако многие настаивают: это лишь хитрость опытного интригана, и он должен предстать перед судом."
CHI.lategame.311.a: "Поздравляем, посол Ван!"
CHI.lategame.311.b: "Показательный процесс для Вана!"

CHI.lategame.312.t: "Новая Эльба"
CHI.lategame.312.d1: "Прошло три года с тех пор, как бывший Председатель Гоминьдана Ван Цзинвэй отправился в то, что он сам называет «номинальной ссылкой» — в качестве посла в Коммуну Франции. Здесь он наблюдает за войной, еженедельно отсылая доклады о состоянии мировой революции. Несмотря на падение с вершины власти, он сохраняет уважение среди соратников времён великого восстания Гоминьдана. Но с момента своей отставки он и его приближённые, вроде Цзэн Чжунмина, без устали критикуют руководство партии, обвиняя его в создании военной диктатуры Дэн Янды и незаконном отстранении от власти.\n\nРазмышляя в одиночестве одной ночью, Ван ловит себя на мысли, что, возможно, однажды он вернётся в Китай. Но пока — он словно на новой Эльбе. Проведя значительную часть своей жизни в изгнании, сначала после Первого Северного похода, теперь вновь — он всё сильнее отождествляет себя с судьбой Сунь Ятсена. И, быть может, как и Вечный Премьер, он однажды вернётся триумфально. Пока же — он в изгнании."
CHI.lategame.312.d2: "Прошло три года с тех пор, как бывший Председатель Гоминьдана Ван Цзинвэй отправился в то, что он сам называет «номинальной ссылкой» — в качестве посла в Коммуну Франции. Здесь он наблюдал за войной, еженедельно отсылая доклады о состоянии мировой революции. Когда Франция пала, он бежал в Союз Британии — словно Наполеон, оказавшийся на острове в изгнании. Несмотря на это, он всё ещё пользуется уважением среди ветеранов революции, но с момента своей отставки он и его приближённые — вроде Цзэн Чжунмина — публикуют гневные памфлеты и речи против режима Дэн Янды, обвиняя его в узурпации власти.\n\nРазмышляя в одиночестве одной ночью, Ван ловит себя на мысли, что, возможно, однажды он вернётся в Китай. Но пока — он словно на новой Эльбе. Проведя значительную часть своей жизни в изгнании, сначала после Первого Северного похода, теперь вновь — он всё сильнее отождествляет себя с судьбой Сунь Ятсена. И, быть может, как и Вечный Премьер, он однажды вернётся триумфально. Пока же — он в изгнании."
CHI.lategame.312.a: "Сун, я живу в мирах, о которых ты и не мечтала!"
#Enact Emergency Powers (320-329)
CHI.lategame.320.t: "Падение Председателя"
CHI.lategame.320.d: "Мрачным было настроение в Законодательном Юане, когда по рукам пошёл роковой законопроект. Ожидалось сопротивление, особенно от ФР и ЛКС, но в итоге всё свелось к нескольким громким выкрикам — никакого серьёзного отпора не последовало. Альянс, некогда заявлявший, что борется за свободу, теперь лишь молча скрежетал зубами, единогласно голосуя за чрезвычайные меры.\n\nС принятием закона в четырёх провинциях (Чжэцзян, Цзянсу, Гуандун и Хубэй), где особенно сильны позиции РАТ и радикалов КСП, было введено чрезвычайное положение. Комиссии по военным делам под руководством Дэн Янды были даны обширные полномочия по обеспечению порядка и расширению зоны действия указа по мере необходимости. Хотя режим ЧП должен был длиться три года с возможностью продления, «Красному Наполеону» понадобилось менее трёх недель.\n\nС применением артиллерии части Национально-революционной армии штурмовали опорные пункты мятежников, разрушая наспех возведённые укрепления. Возмездие было жестоким: парамилитаристы ходили по домам, арестовывая подозреваемых в симпатиях к РАТ и КСП. Истории о зверствах и исчезновениях просочились в прессу быстрее, чем их успели цензурировать, создав Дэну репутацию мясника. Среди жертв, по сообщениям, оказались такие деятели РАТ, как Ши Цунтун и Чжоу Эньлай.\n\nХотя основную вину возлагают на боевиков СРС, масштаб расправы не позволяет снять ответственность и с ВМАРАТ. В случае, который не удалось замолчать, Ван Цзинвэй был схвачен и казнён, его тело выставили на всеобщее обозрение до вмешательства высших чинов.\n\nЭто насилие потрясло китайское общество до глубины души. Некоторые советники Сун Цинлин умоляют её отменить военное положение и обуздать ополченцев, пока не стало хуже. Другие требуют сохранять бдительность, ведь в стране всё ещё слышны выстрелы. Сун, поставившая на карту свою репутацию, поддержав план подавления мятежа, теперь должна обратиться к нации, сотрясаемой страхом."
CHI.lategame.320.a: "Трагический конец и ужасная ошибка."
CHI.lategame.320.b: "Достойный финал для предателя."

CHI.lategame.321.t: "День в суде"
CHI.lategame.321.d: "После смерти Вана был отдан приказ: никто из других «высокопоставленных» лиц его правительства не должен пострадать. Большинство сдались без сопротивления или были захвачены (в основном) невредимыми и помещены под охрану проверенных частей в Нанкине. Суд был организован в спешке, но попытка скрыть его от внимания общественности провалилась.\n\nПеред судом предстали ключевые фигуры режима Вана. Адвокаты защиты отчаянно пытались спасти их от обвинений в мятеже. Обвинение же добавило к делу ещё и старые обвинения в злоупотреблениях и бездарном управлении, пытаясь дискредитировать режим Вана с самого начала. Чэнь Гунбо не раскаялся, яростно защищая свои действия и поступки Вана. Чэнь Бицзюнь также выступила в защиту мужа, отказавшись признать вину даже в обмен на помилование. Цзэн Чжунмин и Чу Миньи в основном молчали, но изредка пытались вывести обвинение из равновесия.\n\nМелкие фигуранты дела, чья вина не была столь очевидной, защищались куда слабее. Генерал Чжан Чжичжун заявил, что всего лишь исполнял приказы, а цепочка командования была сомнительной, ведь Вана лишили лишь поста председателя партии, но не президента. Другие — такие как Чжоу Фохай и Ли Шицюнь — начали сливать соратников в обмен на снисхождение.\n\nПроцесс быстро приобрёл политический характер — возможно, неизбежно. Однако многие обвиняют суд в показушности. Умеренные из РАТ просят проявить снисхождение, но с учётом тысяч погибших кто-то должен понести ответственность."
CHI.lategame.321.a: "Смягчить приговоры."
CHI.lategame.321.b: "Наказать по всей строгости закона!"
#Scenario 2 Wrapup (340-349)
CHI.lategame.340.t: "День Действия наступил!"
CHI.lategame.340.d: "В конечном итоге Временный Комитет Действий Гоминьдана стал уже далеко не временным. Свергнув тирана Ван Цзинвэя, Сун Цинлин и её союзники теперь определяют судьбу обновлённого Китая. Они начали процесс ребрендинга, провозгласив себя Революционным Комитетом Гоминьдана — чтобы утвердиться в роли законных наследников партии.\n\nПоследствия Третьего Конгресса репатриантов оказались отнюдь не радужными. Политический ландшафт стремительно меняется: люди приспосабливаются к новой власти и к вакууму, образовавшемуся после краха РАТ. Многие фракции, поддержавшие ПКД, недовольны тем, как ВМАРАТ демонстрировали военную силу, и их верность новому комитету под вопросом.\n\nДэн Янда стал объектом всеобщей неприязни внутри партии — его считают слишком могущественным, а порой и опасным. Более молодые члены ПКД получили важные посты в правительстве РК-Гоминьдана. Из военного крыла особенно выделились Хуан Цисян, Чжан Юньчуань и Го Гуаньцзе, из гражданского — Чжан Божунь, Пэн Цзэсян, Чэнь Южэнь, Хэ Сяннин и Пэн Цзэмин. Второстепенные фигуры вроде Ли Сицзюй, Ли Шихао и Тао Сишэна также оказались у власти, а Сун консультируется с братом Сун Цзывэнем и зятем Кун Сянси по административным вопросам."
CHI.lategame.340.a: "Но день ещё не окончен..."

CHI.lategame.341.t: "Ван Цзинвэй свергнут в Нанкине!"
CHI.lategame.341.d: "Новым свидетельством кризиса в якобы победоносной партийной диктатуре Гоминьдана стало сообщение о том, что Ван Цзинвэй был смещён членами собственной партии. На его место была в спешке приведена Сун Цинлин при поддержке оппозиции, а верные Вану сторонники назвали это военным переворотом. Жестокое подавление протестов лишь усилило насилие и погрузило страну в хаос.\n\nНо не важно, кто виноват, если сама система угнетения стала причиной раздора. Очевидно, что столь расхваленная «стабильность» гоминьдановской диктатуры — лишь миф, прикрытие для недопуска иных голосов к власти, пока партийные вожди истребляют друг друга за неё. Сун Цинлин и её окружение с самого начала враждебно относились к федералистскому движению — зачастую по личным мотивам. А Ван и его приспешники, хотя и провозглашали себя архитекторами союза с Федералистами, в действительности лишь использовали договорённости для концентрации власти в своих руках.\n\nПока партия ослаблена внутренним конфликтом, у нас есть возможность — и долг — выступить за подлинную демократию. Мы должны маршем двинуться на Нанкин, объединяя оставшиеся фракции против отвратительного режима. Да, некоторые либеральные оппозиционеры, как Сун Фо, подают знак примирения, обещая ограничить социалистический диктат. Но трудно верить их словам, когда вся система, построенная гоминьдановской «республикой», неизбежно приведёт к новой тирании."
CHI.lategame.341.a: "Гоминьдан доказал свою неспособность к правлению."
CHI.lategame.341.b: "Мы должны верить в демократический исход."

CHI.lategame.342.t: "Федералисты встают на сторону Сун Фо"
CHI.lategame.342.d: "То ли устрашённые нашей военной мощью, то ли выдохшиеся от прежней войны, силы [FROM.GetNameDef] решили не предпринимать активных шагов, несмотря на возможности, открывшиеся после недавней нестабильности. [FROM.GetLeader] молча поздравил президента Сун с избранием, тем самым фактически признавая статус-кво и надеясь сохранить гоминьдано-федералистские договорённости, заключённые её предшественником и Реконструктивной фракцией.\n\nБудет ли история считать это мудрым решением — покажет время. Сун и ПКД всегда были против переговоров с федералистами, и альянс висит на волоске. Дальнейшая интеграция федералистских провинций может спровоцировать новый конфликт, но, похоже, [FROM.GetLeader] выбрал путь пацифизма.\n\nВместо восстания в разгар гоминьдановских раздоров он встал на сторону Сун Фо и либералов, надеясь, что федералистские ресурсы помогут им стать альтернативой правлению Сун и Вана. Будущее либеральной демократии в стране остаётся неясным — но борьба продолжается."
CHI.lategame.342.a: "По крайней мере, обойдётся без насилия."

CHI.lategame.343.t: "Победа оппозиции!"
CHI.lategame.343.d: "Новый поворот в истории партии: левый председатель Ван Цзинвэй был смещён на национальном съезде усилиями разношёрстной оппозиции, объединённой лишь ненавистью к нему. Сун Цинлин, вдова основателя партии, в спешке была приведена к власти заговорщиками, а сторонники Вана заявили о перевороте. Вслед за этим последовали кровавые репрессии против РАТ.\n\nВ условиях нового витка нестабильности Сун поспешила заручиться поддержкой других фракций, в том числе обратившись к [ROOT.GetLeader] — напрямую и через посредников. Помимо угроз и подкупа, она попыталась вызвать у нас чувство долга, напомнив о «успешном» слиянии партии и призвав использовать связи в армии для давления.\n\nЗа пределами громких слов, правая часть партии стремится заручиться нашей поддержкой, продвигая Сун Фо как лидера, способного очистить партию от социалистической заразы. Они надеются сформировать широкий правый фронт, чтобы остановить дальнейшее разрушение страны. И с растущим вакуумом власти..."
CHI.lategame.343.a: "...мы должны воспользоваться шансом на лидерство!"
CHI.lategame.343.b: "...похоже, и для нас теперь найдётся место."

CHI.lategame.344.t: "Разлом в Гоминьдане исцелён"
CHI.lategame.344.d: "Победа притягивает. Несмотря на разногласия, отколовшиеся от Гоминьдана фракции снова объединились под единым правительством — быть может, привлечённые соблазном власти. К широкому, но хрупкому антивановскому фронту присоединился и давно ожидаемый центральный комитет [FROM.GetAdjective], представляющий правых.\n\nЭто укрепило позиции Сун Фо и его сторонников, усилив его кампанию по созданию широкой правой коалиции и стремлению к председательству. Однако вместе с ним пришли и старые правые милитаристы — опасная сила, грозящая размыть целостность всей партийной системы.\n\nЭтот шаг можно считать либо последним шагом к единству, либо очередным компромиссом, который лишь отсрочит новые конфликты. Но пока что Гоминьдан снова един — по крайней мере, на время."
CHI.lategame.344.a: "Но принесёт ли это порядок?"
##Сценарий 3: Плохая концовка (350-399)
 CHI.lategame.350.t: "Хаос в конференц-зале"
 CHI.lategame.350.d: "Ван шагнул вперёд, к трибуне, не обращая внимания на насмешки и проклятия окружающих. Несмотря на шквал клеветы и обвинений в тирании, он начал свою речь, надеясь восстановить контроль над ситуацией. Многие из его союзников кричали в ответ, надеясь заглушить нападавших.\n\nВан был опытным политиком, но даже этого было слишком много - особенно после неоднократных обвинений толпы в том, что он организовал убийства различных политических оппонентов, чтобы подняться на вершину власти. Его речь, изящная по замыслу и первоначально произнесённая с отточенным красноречием, вскоре превратилась в бессвязную тираду, обрекающую съезд на провал. Он упрекал своих оппонентов, крича о присутствии среди них контрреволюционных предателей.\n\nОдин за другим члены съезда были приглашены на поимённое голосование. Набрав всего четыре голоса, Ван избежал импичмента в качестве председателя партии, хотя ВКД ясно дал понять, что намерен настаивать на своём в Контрольном Юане, чтобы отстранить его от должности президента. В конечном счёте, такие конституционные тонкости привлекли гораздо меньше внимания, чем когда последовавшее за этим голосование за следующего председателя партии превратилось в кулачную драку делегатов, поскольку победу на выборах оспаривали Ван Цзинвэй, Сун Цинлин и кандидат, выдвинувшийся в последнюю минуту, Сунь Фо.\n\nНе теряя времени, Ван, как действующий председатель партии, решил приостановить выборы и отменить судебное разбирательство, утверждая, что насилие сделало невозможным справедливое голосование. Он объявил предварительный состав правительства, в котором Чэнь Гунбо стал заместителем председателя ЦИК, а Сунь Фо - премьером исполнительной власти Юаня.\n\nЧувствуя себя преданными Фракцией реконструкции, которая, похоже, потеряла веру в оппозиционный альянс, Сун Цинлин и её союзники вышли из состава съезда, вместо того чтобы одобрить такую недемократическую меру. Опасаясь, что их арестуют, чтобы обеспечить кворум (и благоприятное голосование для Вана), они покинули столицу."
 CHI.lategame.350.a: "Может ли ситуация стать хуже?"

 CHI.lategame.351.t: "Фуцзяньское правительство"
 CHI.lategame.351.d: "В результате последнего всплеска внутрипартийной фракционности на юге страны сформировалось конкурирующее правительство. Возглавляемые Сун Цинлин и Временным комитетом действий Гоминьдана, они объявили правление Вана незаконным и противоречащим принципам, изложенным Сунь Ятсеном. Там собрались различные диссиденты, которые работают над созданием своего собственного центрального комитета, конкурирующего с Нанкинским. Наибольшую тревогу вызывает переход военного министра Ли Цзишэня на их сторону, что ещё больше усиливает опасения военного предательства.\n\nК этому моменту уже ясно, что возврата к статус-кво не будет, и ни одна из сторон не намерена мириться с очередным неэффективным соглашением о разделении власти. Гоминьдан расколот, и гарнизоны по всей стране взвешивают свои варианты, решая, на чью сторону встать.\n\nВернувшись в Нанкин, Фракция реконструкции заключила жёсткую сделку в обмен на свою поддержку. В качестве залога они назначили Суня Фо премьер-министром, что, по их мнению, даст им контроль над Исполнительным Юанем. Они настаивают на проведении дальнейших реформ в законодательной сфере, реконструкции и конституционных вопросах.\n\nОднако действующий президент Ван Цзинвэй вряд ли мог сосредоточиться на их мелкой политической игре. События, произошедшие на Третьем съезде, потрясли этого человека, обнажив его явную непопулярность. Вопреки совету Чэня Гунбо, он решил лично отправиться на юг, в Фуцзянь, в знак доброй воли, заявив, что у него есть опыт ведения переговоров, необходимый для заключения перемирия, прежде чем ситуация выйдет из-под контроля.\n\nДругие, однако, подозревают, что его истинные намерения заключаются в том, чтобы заручиться поддержкой в городах южного побережья, таких как Гуанчжоу, Ханчжоу и Сямынь. Они обвиняют его в том, что он связался с РАТ и радикальными членами СПК, чтобы укрепить свою власть и подготовиться к перевороту. Как бы то ни было, сегодня утром четыре бронированных автомобиля президентского кортежа выехали из Нанкина в южном направлении."
 CHI.lategame.351.a: "Счастливого пути, президент Ван."

 CHI.lategame.352.t: "Круговорот смерти"
 CHI.lategame.352.d: "Ван Цзинвэй так и не добрался до Фуцзяня. Вместо этого его кортеж был обнаружен на извилистой дороге в Чжэцзяне, примерно в четырёх километрах от ближайшего города, а путь был усеян трупами охранников и обслуживающего персонала. Президент и его супруга были опрокинуты в своей машине, а их высокомерный начальник службы безопасности Ли Шицюнь также оказался среди убитых. Ван - последняя жертва в череде смертей в Китае, преступник и жертва кровопролития в стране. Гоминьдан, возможно, и навёл порядок в своём объединении, но он не принёс мира.\n\nНикто точно не знает, кто организовал засаду. Предполагалось, что конкретный маршрут будет держаться в секрете, и, несмотря на обещания обеспечить безопасность во время переговоров, Ван привёл с собой вооружённую до зубов охрану. На данный момент это никого не волнует. Силы в Миньгане продолжали наращиваться, привлекая дезертировавшие армейские подразделения и сочувствующих губернаторов. Дэн Яньда, который был назначен командующим наземными силами повстанцев, двинулся на север с основной частью своей армии к Наньчану, захватив столицу провинции Цзянси.\n\nВ Нанкине центральное правительство с трудом сдерживало беспорядки, вспыхнувшие среди низших чинов. Чэнь Гунбо, будучи заместителем председателя партии, приступил к исполнению обязанностей председателя Гоминьдана и президента Республики. Сунь Фо оспорил свою кандидатуру, утверждая, что как премьер Исполнительного Юаня он был бы конституционным преемником. Раздосадованный, Чэнь согласился вынести этот вопрос на голосование.\n\nК его удивлению, голосование зашло в тупик. Фракция реконструкции должна была оказаться в меньшинстве, но, тем не менее, выступила единым фронтом. Фракция "Резиденция", обезглавленная смертью Чэнь Бицзюнь и пребывающая в полном беспорядке, отказалась подчиняться руководству Чэня, вместо этого решив поддержать Чу Миньи. Многие умеренные члены РАТ также потрясены известием о смерти Вана и выразили обеспокоенность тем, что Чэнь слишком радикален, чтобы разрядить напряжённость в партии. Нанкин парализован!"
 CHI.lategame.352.a: "Полная катастрофа!"

 CHI.lategame.353.t: "Чэнь Гунбо переигрывает свои карты"
 CHI.lategame.353.d: "Этот кошмар никак не прекращается. Каждый раз, когда Чэнь Гунбо, кажется, добивается прогресса в отношениях с Чу Миньи и Цзэн Чжунмином, что-то происходит, и они отступают. Тем временем Сунь Фо добивался успехов среди сторонников РАТ, в то же время не исключая возможности создания комиссии по установлению мира. Всё это время армия Дэна Яньды продолжала медленно набирать обороты, что делало эти обсуждения спорными. Без Вана Цзинвэя коалиция его сторонников распалась, и Чэнь из кожи вон лез, пытаясь собрать её воедино.\n\nПоэтому он попробовал другой путь. Глубокой ночью Чэнь обратился к ведущим военным офицерам, таким как Чжан Чжичжун и Чжоу Эньлай, надеясь с помощью военных вернуть ситуацию в прежнее русло. Помимо так называемой клики Чжоу из Политического департамента, Чэнь также вступил в ряды подготовленных МВМК офицеров-синдикалистов, таких как Сяо Цзиньгуан. Он верил, что в совокупности этой "Молодой гвардии" будет достаточно, чтобы переломить ситуацию. Более того, он установил контакт со всё более недовольными городскими профсоюзными деятелями, как входящими в РАТ, так и поддерживающими Чэнем Шаоюем и радикалов из СПК. Если дело дойдёт до драки, массовые забастовки приведут его к власти.\n\nК несчастью для него, его переиграли. Его сообщения долгое время отслеживались агентами Дай Чуньфэна, и его план был быстро раскрыт. Генерал Ху Цзуннань, соперник в борьбе за контроль над "Молодой гвардией", представил доказательства Центральному исполнительному комитету как "верный слуга революции". Чэнь был немедленно обвинён в подрывной деятельности и исключён из партии, хотя из-за личной хитрости он уклонился от участия в заседании ЦИК.\n\nЕго резидентской фракции и умеренно настроенным соратникам по РАТ часто не везло - Чу Миньи был арестован, а тысячи других были схвачены тайной полицией. Наиболее сообразительные члены РАТ, которым удалось скрыться, бежали из Нанкина, полностью разгромленные."
 CHI.lategame.353.a: "Вероломство! (играть нормально)"
 CHI.lategame.353.b: "Вероломство! (играть с подсказками)"

 CHI.lategame.354.t: "Заходящее солнце"
 CHI.lategame.354.d: "Всегда будьте осторожны в своих желаниях. Это урок, который исполняющий обязанности президента Сунь Фо слишком хорошо усвоил, в конце концов возглавив партию своего отца, но в самый мрачный для неё час. Появились сообщения о том, что Дэн Яньда и армии ВКД решили повернуть на запад, нанеся удар сначала по Уханю и Чанше, а затем двинуться на сильно укреплённый Нанкин.\n\nЧэнь Гунбо шокировал некоторых, отправившись на север, а не в традиционные оплоты РАТ на юге. Не теряя времени даром, он добрался до [Get Victory Point Name_9843]а, воспользовавшись влиянием РАТ на назначения на недавно завоёванных территориях, чтобы укрепить свою власть. С помощью генерала Чжана Чжичжуна они убедили большинство северных гарнизонов перейти на их сторону или, по крайней мере, какое-то время сохранять нейтралитет.\n\nВсё это время Нанкин остаётся фактически без управления. Наиболее доверенные офицеры Суня, Чжан Факуй и Сюэ Юэ, изо всех сил пытались взять ситуацию под контроль, и последний покинул Нанкин, чтобы принять командование гарнизоном Уханя. Большая часть интеллектуальной и деловой поддержки, на которую рассчитывала Фракция реконструкции, не смогла обеспечить ничего, кроме слов поддержки, и с каждой неделей ситуация становится всё более и более опасной.\n\nСунь Фо и его узкий круг советников были в затруднительном положении, пока им, наконец, не улыбнулась удача: тихие переговоры через посредников наконец увенчались успехом. Высокопоставленная делегация, включающая Суна Цзивэня, Чэня Южэня и "Четырёх старейшин", предложила выступить посредниками в переговорах между Нанкином и Фуцзянью, положив конец раздорам.\n\nНо лагерь Суня Фо - далеко не единственные, у кого на руках козыри в Нанкине. Революция приобрела сильный радикальный характер, и армейские офицеры Общества возрождения Китая призвали к крайним мерам, чтобы покончить с хаосом раз и навсегда. На встрече генералы Ху Цзуннань, Хэ Чжунхань и Дэн Вэньи обратились к Суню с предложением объявить военное положение. Они утверждают, что за государственную измену предусмотрено только одно наказание, и предложили сделать всё необходимое для спасения нации."
 CHI.lategame.354.a: "Начать переговоры с Фуцзянем."
 CHI.lategame.354.b: "Немедленно объявить военное положение!"

#Alignment Events (360-369)
CHI.lategame.360.t: "Гражданская война в Гоминьдане!"
CHI.lategame.360.intro: "После жаркого Третьего Конгресса репатриантов, казалось бы, победоносное национальное правительство Гоминьдана раскололось на враждующие фракции. Президент Ван Цзинвэй был убит неизвестными, а в хаосе возникли конкурирующие Центральные Исполнительные Комитеты в Нанкине, Фуцзяне и [GetVictoryPointName_9843].\n\nВ Нанкине держится остаток центрального правительства под руководством Сун Фо. Его колеблющаяся власть ослаблена разладом и слухами о попытке переворота со стороны Общества Возрождения Китая. На юге Сун Цинлин и её Временный Комитет Действий (ПКД) возродили старые базы повстанцев, чтобы бросить вызов тому, что они называют тиранией. Её поддерживают многие ветераны-гвардейцы и опытные партизанские командиры. На севере Чэнь Гунбо собрал бывших лоялистов Вана, объявив своё правительство в [GetVictoryPointName_9843] законным. Несмотря на поддержку радикалов, им всё труднее удерживать власть, так как местные гарнизоны могут перейти против них."
CHI.lategame.360.d.1: "$CHI.lategame.360.intro$\n\nПо всей стране губернаторы и военачальники взвешивают свои варианты. Многие медлят с выбором стороны, ожидая выявления более сильной силы. Представители каждого из соперничающих правительств умоляют нас о поддержке, и как один из более автономных губернаторств, наша поддержка может стать решающей. Конечно, с таким слабым Гоминьданом у нас есть шанс отстоять свою автономию или даже претендовать на национальное лидерство!"
CHI.lategame.360.d.2: "$CHI.lategame.360.intro$\n\nВ пределах китайской сферы союзные лидеры взвешивают свои варианты. Многие медлят с выбором, ожидая выявления более сильной силы. Представители всех соперничающих правительств просят нас о поддержке, и хотя мы не китайцы, наша поддержка может оказаться решающей. Конечно, с таким слабым Гоминьданом это может быть нашим шансом заявить о собственной автономии или даже независимости!"
CHI.lategame.360.a: "Встать на сторону ПКД."
CHI.lategame.360.b: "Встать на сторону РАТ."
CHI.lategame.360.c: "Встать на сторону правительства."
CHI.lategame.360.e: "Пора вырваться на свободу."

CHI_lategame_civ_war_alignment_intro: "Когда по стране распространяются слухи о грядущей гражданской войне, лидерам отдалённых провинций приходится сделать выбор. Многие делают это неохотно, опасаясь мятежа в своих рядах и страха ошибиться. Поэтому многие предпочитают пока оставаться «нейтральными», ожидая, пока одна из сторон не проявит своё превосходство."

CHI.lategame.361.t: "[FROM.GetLeader] поддерживает Фуцзянь"
CHI.lategame.361.d.1: "$CHI_lategame_civ_war_alignment_intro$\n\nДля [FROM.GetNameDef], одного из более автономных губернаторств, подчинённых нашему движению, выбор был проще. Они решили поддержать Сун Цинлин во Фуцзяне, предоставив ресурсы для поддержки её восстания. Но, возможно, ещё важнее, что слова поддержки [FROM.GetLeader] отозвались по всей стране, склоняя неопределённые гарнизоны к её стороне. Тем не менее многие ждут результатов боёв на восточном побережье Китая, прежде чем принять решение."
CHI.lategame.361.d.2: "$CHI_lategame_civ_war_alignment_intro$\n\nДля [FROM.GetNameDef], одной из наших союзных сестринских республик, выбор был проще. Они решили поддержать Сун Цинлин во Фуцзяне, предоставив ресурсы для поддержки её восстания. Но, возможно, ещё важнее, что слова признания [FROM.GetLeader] отозвались по всей стране, склоняя неопределённые внутренние гарнизоны на её сторону. Тем не менее многие ждут результатов боёв на восточном побережье Китая, прежде чем принять решение."
CHI.lategame.361.a: "Интересное развитие событий."

CHI.lategame.362.t: "[FROM.GetLeader] поддерживает [GetVictoryPointName_9843]"
CHI.lategame.362.d.1: "$CHI_lategame_civ_war_alignment_intro$\n\nДля [FROM.GetNameDef], одного из более автономных губернаторств, подчинённых нашему движению, выбор был проще. Они решили поддержать Чэнь Гунбо в [GetVictoryPointName_9843], предоставив ресурсы для поддержки его фракции. Но, возможно, ещё важнее, что слова поддержки [FROM.GetLeader] отозвались по всей стране, склоняя неопределённые гарнизоны к его стороне. Тем не менее многие ждут результатов боёв на восточном побережье Китая, прежде чем принять решение."
CHI.lategame.362.d.2: "$CHI_lategame_civ_war_alignment_intro$\n\nДля [FROM.GetNameDef], одной из наших союзных сестринских республик, выбор был проще. Они решили поддержать Чэнь Гунбо в [GetVictoryPointName_9843], предоставив ресурсы для поддержки его фракции. Но, возможно, ещё важнее, что слова признания [FROM.GetLeader] отозвались по всей стране, склоняя неопределённые внутренние гарнизоны на его сторону. Тем не менее многие ждут результатов боёв на восточном побережье Китая, прежде чем принять решение."
CHI.lategame.362.a: "Интересное развитие событий."

CHI.lategame.363.t: "[FROM.GetLeader] поддерживает Нанкин"
CHI.lategame.363.d.1: "$CHI_lategame_civ_war_alignment_intro$\n\nДля [FROM.GetNameDef], одного из более автономных губернаторств, подчинённых нашему движению, выбор был проще. Они решили поддержать Сун Фо в Нанкине, предоставив ресурсы для поддержки его слабеющего правительства. Но, возможно, ещё важнее, что слова поддержки [FROM.GetLeader] отозвались по всей стране, склоняя неопределённые гарнизоны на его сторону. Тем не менее многие ждут результатов боёв на восточном побережье Китая, прежде чем принять решение."
CHI.lategame.363.d.2: "$CHI_lategame_civ_war_alignment_intro$\n\nДля [FROM.GetNameDef], одной из наших союзных сестринских республик, выбор был проще. Они решили поддержать Сун Фо в Нанкине, предоставив ресурсы для поддержки его слабеющего правительства. Но, возможно, ещё важнее, что слова признания [FROM.GetLeader] отозвались по всей стране, склоняя неопределённые внутренние гарнизоны на его сторону. Тем не менее многие ждут результатов боёв на восточном побережье Китая, прежде чем принять решение."
CHI.lategame.363.a: "Интересное развитие событий."

CHI.lategame.364.t: "[FROM.GetNameDefCap] объявляет независимость!"
CHI.lategame.364.d.1: "$CHI_lategame_civ_war_alignment_intro$\n\nДля [FROM.GetNameDef], одного из более автономных губернаторств, подчинённых нашему движению, выбор был проще — они не станут поддерживать никого, кроме самих себя. Отвергнув все три правительства как нелегитимные, [FROM.GetLeader] поднял восстание — надеясь сохранить автономию провинции или даже претендуя на национальное лидерство. Слабость гражданского правительства, выявленная гражданской войной, радикализировала многих в Национальной Революционной Армии. Ху Цзуннань и Общество Возрождения Китая пообещали покарать всех предателей."
CHI.lategame.364.d.2: "$CHI_lategame_civ_war_alignment_intro$\n\nДля [FROM.GetNameDef], одной из наших союзных сестринских республик, выбор был проще — они не поддержат никого, кроме себя. Устав от статуса китайского сателлита, они отвергли все три правительства и выслали наших послов. Разорвав связи, они стремятся идти своим путём и при необходимости добиться независимости силой. Слабость гражданского правительства, выявленная войной, радикализировала многих в Национальной Революционной Армии. Ху Цзуннань и Общество Возрождения Китая обещали наказать всех предателей."
CHI.lategame.364.a: "Предатели!"

CHI.lategame.365.t: "В Китае началась гражданская война"
CHI.lategame.365.d: "Ситуация в Китае, обещавшая надежду, обернулась катастрофой под натиском радикализма и упрямства. После бурного Третьего Конгресса репатриантов противники Вана Цзинвэя добились его отстранения. По разным данным, покойный председатель был убит экстремистами, что усугубило кризис.\n\nВ последние недели возникли три соперничающих правительства. В Нанкине находится остаток центрального правительства под руководством несоциалиста Сун Фо, но его власть слабеет. В тени действует группа социалистических военных радикалов, готовых захватить власть. На юге Сун Цинлин и её Временный Комитет Действий Гоминьдана организовали восстание с поддержкой многих старых командиров повстанцев МинГань. На севере Чэнь Гунбо и бывшие соратники Вана собрались в [GetVictoryPointName_9843], заявляя о восстановлении законного правительства.\n\nМеждународная военная миссия в Китае — оплот Интернационала в стране, советники старой Национальной Революционной Армии и наставники многих кадетов. Решение оставить их в Нанкине или перебросить в другие регионы станет важным сигналом. С другой стороны, есть совет вывести их полностью, чтобы сохранить их жизни и дистанцироваться от конфликта."
CHI.lategame.365.a: "Отправить их в [GetVictoryPointName_9843]."
CHI.lategame.365.b: "Оставить их в Нанкине."
CHI.lategame.365.c: "Вывести МВМК."
CHI.lategame.365.e: "Поддержать Фуцзянь."

 CHI.lategame.366.t: "[FROM.GetNameDefCap] Supports [GetVictoryPointName_9843]!"
 CHI.lategame.366.d: "After hearing of the situation playing out in China, a decision was made to redeploy the Mission Militaire Internationale en Chine to [GetVictoryPointName_9843]. The forces in Nanjing could do little to stop them, hoping to avoid sparking an international incident. This was in many ways a natural choice, with many syndicalist-aligned officers feeling a natural affinity for the Reorganised Comrades Association. It has also bolstered Chen's legitimacy, with many young officers following their old mentors and teachers from the Mission north to the gathering armies of the RCA. Still, it is too early tell if this will be decisive, but in a show of strength every advantage counts."
 CHI.lategame.366.a: "A logical end to a fruitful partnership."
 
 CHI.lategame.367.t: "[FROM.GetNameDefCap] поддерживает Нанкин!"
CHI.lategame.367.d: "Услышав о событиях в Китае, было принято решение оставить Международную военную миссию в Китае (МВМК) в Нанкине. Сохраняя своё присутствие, они посылают сильный сигнал преемственности, подтверждая признание Нанкина законным лидером Китая. Это решение стало некоторым шоком, учитывая ожидания [CHI.GetLeader] их возможного перехода на другую сторону. Похоже, Интернационал выражает надежду на наш вклад в мировую революцию в будущем и на мирное разрешение конфликта."
CHI.lategame.367.a: "Вот как?"

CHI.lategame.368.t: "[FROM.GetNameDefCap] осуждает Нанкин"
CHI.lategame.368.d: "Услышав о событиях в Китае, было принято решение полностью вывести Международную военную миссию в Китае (МВМК). Таким образом, Интернационал умывает руки, эвакуируя свой персонал. Многие китайские союзники пытались покинуть страну вместе с ними, надеясь избежать худших последствий. Это не стало сюрпризом, но многие офицеры \"Молодой гвардии\" чувствуют себя преданными и оставленными на произвол судьбы. Многие перешли в ряды Общества Возрождения Китая, которое осудило МВМК как форму красного империализма, утверждая, что только китайцы могут спасти Китай."
CHI.lategame.368.a: "Как они могли так с нами поступить?"

CHI.lategame.369.t: "[FROM.GetNameDefCap] поддерживает Фуцзянь"
CHI.lategame.369.d: "Услышав о событиях в Китае, было решено перебросить Международную военную миссию в Китае (МВМК) во Фуцзянь. Силы в Нанкине не смогли им воспрепятствовать, надеясь избежать международного инцидента. Это было неожиданно, учитывая историю многочисленных столкновений между Старой гвардией ВМАРКА и МВМК. Тем не менее, это укрепило легитимность Сун, и многие молодые офицеры последовали за своими наставниками из Миссии на юг, в растущую армию ПКД. Пока слишком рано судить, будет ли это решающим, но в демонстрации силы важна каждая мелочь."
CHI.lategame.369.a: "Непредсказуемо, но приятно."

#Negotiations with the PAC Chain (370-379)
CHI.lategame.370.t: "Гарнизон Уханя"
CHI.lategame.370.d: "Напряжение было ощутимо в Ухане, где силы, поддерживающие Нанкин, спешно собирались. Генерал Сюэ Юэ был срочно отправлен на место и получил приказ подготовиться к наступлению. Этот важный город стоит на пересечении рек Янцзы и Хань, является сердцем провинции Хубэй и местом рождения Синьхайской революции. Гарнизон Уханя получил подкрепление от центрального правительства, но далеко не в достаточном количестве.\n\nВсего в нескольких километрах к югу стояли войска Фуцзяни, ожидая приказов из штаба. Под предводительством «Красного Наполеона» Дэн Янды он привёл несколько элитных дивизий для решающей кампании. Единственное, что мешало ему сделать решительный шаг — противоречивые сообщения о возможном перемирии, которым ни одна из сторон не доверяет.\n\nНа севере двигались армии [GetVictoryPointName_9843]. Осознавая слабость своей позиции и обладая, вероятно, наименьшей частью старой Национально-Революционной Армии, Чэнь Гунбо отправил свою дивизию вперёд в надежде застать противников врасплох. Никто точно не знает, где находится его армия — разведка сообщает противоречивые данные, лишь то, что они движутся на юг.\n\nКомандир гарнизона Уханя оказался в сложной ситуации. Ухань состоит из трёх районов. Учан — самый крупный, южнее реки, находится под угрозой наступления сил ПКД из Фуцзяни. Ханькоу — севернее реки, потенциально под угрозой армии РКА из [GetVictoryPointName_9843]. Ханьян — место расположения крупного арсенала на западном берегу, защищён с двух сторон. Лучший план Сюэ Юэ — укрепить позиции и сосредоточить силы на одной из сторон, вопрос лишь в том, на какой.\n\nНикто не может сказать, как долго продлится это предполагаемое \"перемирие\" с ПКД, и Учан, вероятно, самая ценная часть города. С другой стороны, армия Фуцзяни глубоко укрепилась, и неизвестно, насколько близко или даже какова конечная цель армии [GetVictoryPointName_9843]. После обсуждения со своим военным советом генерал Сюэ пообещал принять решение."
CHI.lategame.370.a: "Укрепить Учан на случай срыва переговоров с ПКД."
CHI.lategame.370.b: "Укрепить Ханькоу на случай наступления РКА."

CHI.lategame.371.t: "Штурм Уханя"
CHI.lategame.371.d: "Меньшая, более манёвренная и обладающая высоким боевым духом благодаря руководству Политического департамента Чжоу Эняля, армия РКА превзошла ожидания в южной кампании. Собравшись в Баодине, они воспользовались железнодорожной инфраструктурой, чтобы двигаться быстрее, чем ожидали противники. Избегая обнаружения и используя симпатичные контрразведывательные сети для запутывания вражеской слежки, армия [GetVictoryPointName_9843] под командованием Чжан Чжичжуна подошла к воротам Уханя практически без предупреждения.\n\nПоспешно они устроили засаду на слабо защищённый Ханькоу, застигнув нанкинские войска врасплох и приведя гарнизон в замешательство. Остальная часть Уханя капитулировала в панике, связи с армией ПКД из Фуцзяни практически не было до тех пор, пока не стало слишком поздно.\n\nДэн Янда, не желая подрывать переговоры между своими союзниками и нанкинским правительством, колебался с атакой Учаня, пока не стало ясно, что город сменил хозяев. Осознав ошибку слишком поздно, он попытался исправить ситуацию, подняв войска для штурма укреплений города.\n\nПередовые части армии Фуцзяни были храбры, но силы ПКД были слишком растянуты — многие подразделения были переброшены в Чанша во время перемирия. Их атака на значительно укреплённый Учан была отбита с большими потерями, и Дэн был вынужден отдать приказ отступить.\n\nК концу недели Чэнь Гунбо торжественно вошёл в Ухань. В своей речи он пообещал, что революция, начавшаяся в Учане, не будет предана.\n\nОднако, встречаясь с генералами, победоносная армия была вынуждена принять важное решение. Несмотря на близость к своим традиционным базам, их армия далеко от штаба в [GetVictoryPointName_9843]. С другой стороны, долгий путь к Нанкину сулит возможность быстрее закончить войну — если им это удастся. Высшее командование разделилось между решением нанести удар по, возможно, неподготовленному Нанкину или остаться в Ухане для консолидации позиций, и окончательное решение зависит от Чэня."
CHI.lategame.371.a: "Не повторять ошибки ПКД."
CHI.lategame.371.b: "Вперёд к освобождению!"

CHI.lategame.372.t: "Битва за Нанкин"
CHI.lategame.372.d: "Свежие после победы в Ухане, войска РКА были полны решимости захватить Нанкин у узурпаторов. Их наступление на Ухань уже перегрузило их логистику, и даже с рекой Янцзы они рисковали слишком много. Риск, который не оправдался.\n\nНанкинское правительство, долгое время страдавшее от нерешительности, оправилось после потери Уханя. Будучи временной столицей Куомитана с времён Лиги, город был хорошо укреплён. Атака армии [GetVictoryPointName_9843] была отражена с большими потерями силами, собранными в Нанкине, включая несколько выживших подразделений из Уханя, жаждущих мести.\n\nПосле нескольких упорных стычек и яростного контрнаступления войска Чэня Гунбо были разбиты. В кампании по Цзянсу и Аньхою нанкинские войска преследовали отступающих, поднимая боевой дух. Однако слухи о нестабильности в столице заставили командование задуматься. Похоже, что содержание переговоров с Фуцзяни было раскрыто, и многие недовольны представленными условиями. Генерал Ху Цзуннань советовал уничтожить войска РКА досконально, а генерал Чжан Факуй предпочитал выжидать подкрепления от переговоров с ПКД."
CHI.lategame.372.a: "Контратаковать отступающие войска РКА."
CHI.lategame.372.b: "Держаться и ждать подкрепления."

CHI.lategame.373.t: "Осада Ханькоу"
CHI.lategame.373.d: "Укрепив север, нанкинские войска Сюэ Юэ были готовы к внезапному появлению армии [GetVictoryPointName_9843], возглавляемой Чжан Чжичжуном. Хотя армия [GetVictoryPointName_9843] изначально имела преимущество, успешно устроив засаду на передовые позиции гарнизона Уханя, когда нанкинские войска отошли к подготовленным позициям ближе к городу, им удалось перейти к осаде.\n\nУслышав об этом, Дэн Янда и его армия Фуцзяни предложили перемирие (под определённым давлением) Сюэ Юэ, чтобы вместе отбить общих врагов из РКА. С некоторой нерешительностью генерал Сюэ согласился допустить войска Фуцзяни в город. Это позволило нанкинским войскам перебросить силы с Учана на Ханькоу, ослабив давление на северном фланге.\n\nК сожалению, совместное командование Нанкин-Фуцзянь не так сильно, как они думали. Многие войска Дэна были переброшены под прикрытием перемирия на взятие Чанша (который ещё не выбрал сторону), оставив армию Фуцзяни слабой. Несмотря на это, Дэн настоял на общем командовании, опираясь на свой старшинство и опыт. Это вызвало некоторое сопротивление, но Дэн обратился к своему бывшему соратнику из Четвёртой армии с просьбой доверять ему. В конечном счёте, исход войны может зависеть не столько от политиков в Нанкине и Фуцзяни, сколько от солдат в Ухане."
CHI.lategame.373.a: "Идём вместе к победе!"
CHI.lategame.373.b: "Внутренние разногласия ослабляют шансы."

CHI.lategame.374.t: "Прорыв из Уханя"
CHI.lategame.374.d: "Объединив силы, войска Фуцзяни и Нанкина прорвали осаду Уханя. Под прикрытием артиллерии они оттеснили армию [GetVictoryPointName_9843]. Противник оказался слабее, чем ожидалось, из-за перегруженности своей логистики во время быстрого южного наступления. В результате они были вынуждены отступить, едва сохраняя порядок, направляясь к Хэнани.\n\nСолдаты в Ухане ликуют после совместной победы, многие надеются, что их лидеры добьются успеха в переговорах. Значительное число офицеров тайно пообещали не брать оружие друг против друга.\n\nОднако в штабе командиры обдумывают дальнейшие действия. Сюэ Юэ, смелый и порой импульсивный офицер, настаивает на преследовании отступающих противников, пока есть возможность. Дэн Янда предпочитает остаться у Янцзы, чтобы укрепить контроль правительства, что вызывает подозрения в намерении удержать власть над Уханем. Учитывая, что войска Чэня Гунбо отбиты, в словах Дэна есть рациональное зерно — большинство нерешительных гарнизонов, вероятно, встанут на сторону правительства, если будет достигнуто соглашение."
CHI.lategame.374.a: "Преследовать войска РКА."
CHI.lategame.374.b: "В такие времена разумна осторожность."

CHI.lategame.375.t: "Битва вдоль побережья"
CHI.lategame.375.d: "Флоты Китая давно разделены на группировки, в значительной степени независимые от Куомитана. Несмотря на смену правительств и лидеров, лица в адмиралтействе остаются прежними. Несмотря на многочисленные разногласия, ВМС Китайской Республики в целом сохраняют целостность (хотя и внутренне разделены), оставаясь в стороне от гражданской войны на суше.\n\nЭто может измениться из-за последней затеи Чэня Гунбо, который хочет получить преимущество в войне. С помощью контактов в Юго-Восточной Азии и Интернационала он стремится обеспечить ключевые поставки помощи своим союзникам для столицы.\n\nАдмирал Чэнь Шаокуань получил приказ от Сун Фо остановить это, но количество боеспособных кораблей в нанкинском флоте ограничено, а Куомитановские судовладельцы опытны в прорывах блокад. К тому же сообщения о взяточничестве и искренней симпатии к [GetVictoryPointName_9843] ослабляют эффективность флота. Многие сомневаются, справится ли адмиралтейство с задачей."
CHI.lategame.375.a: "Блокадные суда проходят мимо!"
CHI.lategame.375.b: "Поставки перехвачены!"

CHI.lategame.376.t: "Беспорядки в Нанкине"
CHI.lategame.376.d: "Переговоры между правительствами Сун Фо в Нанкине и Сон Цинлинь во Фуцзяни долгое время были тайными и вызывали спекуляции. Их нежелание раскрывать подробности общественности и даже ключевым членам правительства вызывало раздражение у многих в нанкинской армии, которые боялись быть преданными. Многие слухи из переговоров намекают на приближение соглашения, более выгодного для Фуцзяни, слухи подогреваются агентами Дай Чунфэна, который, как считается, следит за ходом переговоров.\n\nВ тёмных уголках города, вдали от глаз переговорщиков, заговорщики ведут свои дела. В последней попытке добиться своего, военные радикалы пытаются похитить Сун Фо, захватить исполняющего обязанности президента и сорвать переговоры.\n\nРано утром вспыхнули беспорядки против «буржуазных» элементов, вызванные слухами о присутствии иностранных наёмников, якобы нанятых Комиссией по делам за границей. Переполненная полиция едва справлялась с толпами, в которых были хорошо вооружённые парамилитарные формирования, связанные с Обществом Возрождения Китая.\n\nСун Фо был вынужден прервать переговоры и эвакуироваться под охраной. Его кортеж, пытаясь добраться до укреплённого бункера, сталкивался с поисковыми группами ОВК. Город погрузился в хаос, власть переходила от одной фракции к другой. К закату..."
CHI.lategame.376.a: "..он благополучно достиг бункера."
CHI.lategame.376.b: "..ОВК захватывает контроль!"
#Declare Martial Law Chain (380-389)
 CHI.lategame.380.t: "Объявлено военное положение"
 CHI.lategame.380.d: "Сунь Фо понимал, что заключает фаустовскую сделку, когда соглашался на план Ху Цзуннаня, но скорость, с которой его Общество возрождения Китая перешло к консолидации контроля, была ошеломляющей. С безжалостным напором они устранили все препятствия, которые могли привести к неэффективности, в том числе, очевидно, и те немногочисленные демократические институты, которые ещё оставались в Нанкине. После минимальных дебатов и в быстром темпе Законодательный Юань проголосовал за предоставление Ху Цзуннаню чрезвычайных полномочий в качестве председателя Комиссии по военным вопросам.\n\nК большому удивлению Сунь Фо, Ху приказал приостановить действие Законодательного Юаня на неопределённый срок на время чрезвычайного положения, сконцентрировав власть вокруг КВВ. Он был уверен, что его друзья займут высокие посты: Хэ Чжунхань был назначен директором школы Вампоа, а Дэн Вэньи - военным министром. Конкретная должность Дай Чуньфэна формально не изменилась, но он скрывался в тени. Чжан Факуй был назначен директором штаб-квартиры Ху, но фактически остался бессильным, поскольку фракция Суня Фо оказалась в стороне от его собственного правительства.\n\nПремьер-министр с трагическим стоицизмом подумал о том, какими удивительно тупыми могут быть новые руководители ОВК, поскольку при всех их претензиях на то, что в конечном счёте все проблемы решаются с помощью грубой силы. Если это когда-нибудь не сработает, размышлял он, у них ничего не останется.\n\nСкоро наступит время проверить, получат ли эти молодые выскочки шанс править страной. Дэн Яньда и его армия вот-вот нападут на Ухань, обороняемый превосходящим по численности гарнизоном во главе с Сюэ Юэ. Решением съезда было бы использовать флотилию канонерок и речных транспортных средств для быстрого освобождения города. Но более смелые командиры предложили нанести удар по самому Фуцзяню, пока он уязвим, настолько они убеждены в своём идеологическом превосходстве, что считают, что ничто не сможет помешать им исполнить свою судьбу."
 CHI.lategame.380.a: "Перебросить войска на запад для защиты Уханя."
 CHI.lategame.380.b: "Марш на юг, чтобы уничтожить главную базу Дэна."

 CHI.lategame.381.t: "Битва при Ухани"
 CHI.lategame.381.d: "Быстро выдвинувшись на защиту Уханя, люди Ху Цзуннаня прибыли как раз вовремя, чтобы сразиться с войсками Дэна Яньды. К облегчению осаждённого городского гарнизона, по реке прибыло подкрепление, которое помогло захватить ключевые укрепления за пределами города, отразив различные пробные атаки фуцзяньской армии.\n\nОказавшись в осаде и вынужденный отозвать дивизии с запланированного штурма Чанши, Дэн бросил свои войска на штурм города, но изо всех сил пытался прорваться, поскольку его усталые и малообеспеченные люди часто терпели поражение, натыкаясь на вражеские укрепления. Всё это время основные силы Ху Цзуннаня продвигались на запад и, наконец, прибыли через несколько дней. Ударив по правому флангу Дэна, элитные дивизии Нанкина разгромили истощённые силы фуцзяньцев, обратив их в бегство. Поскольку его фланг был на грани поражения, у Дэна не было иного выбора, кроме как вывести остальную часть своей армии из Уханьской кампании и снять осаду.\n\nВ тот день генерал и его люди превзошли своих соперников, но теперь вынуждены принять трудное решение, поскольку их защитники Уханя и силы помощи Нанкину объединились. Сообщения с центральных равнин указывают на то, что армия Чжана Чжичжуна, объединившаяся с РАТ, выступила из [GetVictoryPointName_9843]а, а их разведчики искали эффективный пункт переправы через Янцзы. Преследовать отступающую фуцзяньскую армию означало бы потенциально предоставить стратегическое преимущество [GetVictoryPointName_9843]нцам, но отказ от этого позволил бы Дэну Яньде перестроить свои силы для потенциальной контратаки."
 CHI.lategame.381.a: "Держаться вдоль Янцзы."
 CHI.lategame.381.b: "Марш на юг, в Наньчан."

CHI.lategame.382.t: "Осада Наньчаня"
CHI.lategame.382.d: "Дэн решил дать бой у Наньчаня, оплота ПКД. Используя свои нерегулярные войска, чтобы замедлить наступление ОВК, его люди провели большую часть дня, укрепляя позиции возле речного города. Армия ПКД была гораздо лучше подготовлена, чем в Учане, но мораль его войск взлетела до небес после первоначальной победы. Подкреплённая частями гарнизона Уханя, армия Ху Цзуннаня настойчиво преследовала противника, и передовые отряды вскоре вступили в стычки на поле боя. Небольшие отряды штурмовиков ПКД ловко действовали за линиями врага, пытаясь обеспечить преимущество для своей артиллерии. Их противники ответили быстрыми механизированными подразделениями и авиаударами сверху.\n\nЭта битва, вероятно, войдёт в историю как решающее столкновение между «старой» и «молодой» гвардией Национально-Революционной Армии. Защищающиеся включают многие элитные колонны из Мингана — людей, сражающихся более десяти лет. Они искусно используют рельеф местности и владеют смешанным стилем боя — асимметричным и классическим. Нападающие — лучшие дивизии, обученные за рубежом, применяющие новейшие методы ведения войны. Они интегрировали комбинированные силы, используя смертоносное сочетание артиллерии, механизированных и воздушных подразделений.\n\nПод звуки взрывов артиллерии и клубы дыма угроза РКА кажется всё более отдалённой. В эпическом завершении кампании две армии сталкиваются возле этой важной базы снабжения — которая вполне может стать поворотным моментом войны."
CHI.lategame.382.a: "Фанатичные профессионалы Ху Цзуннаня одерживают победу!"
CHI.lategame.382.b: "Стойкие ветераны Дэна Янды выходят триумфаторами!"

 CHI.lategame.383.t: "Чжэцзянская кампания"
 CHI.lategame.383.d: "Чжэцзян был местом, где родился и вырос Ху Цзуннань, хотя, если он и хотел покрасоваться перед кем-то на родине, то не показывал этого. Вместо этого он и его элитные дивизии двинулись на юг в рамках амбициозной операции, надеясь отрезать пути снабжения Дэна Яньды от его корней. Малочисленным гарнизонам Уханя пришлось бы просто держаться самостоятельно, и как только операция в Фуцзяни увенчалась бы успехом, войска Дэна оказались бы зажатыми в тиски.\n\nВсё пошло не так, как планировалось. Партизаны, присоединившиеся к ВКД, с помощью сочувствующих крестьян бродили по сельской местности, на досуге собирая разрозненные отряды ОВК. Линии снабжения Нанкина были быстро перекрыты, и армия генерала Ху медленно продвигалась через холмы Чжэцзяна. Несмотря на их элитный статус и дорогое снаряжение, их боевые возможности были быстро подорваны напряжённой кампанией.\n\nТем временем люди Дэна быстро и решительно штурмовали Ухань, и многие солдаты не желали вступать в безнадёжную битву за жестяного деспота. Узнав, что его враг движется к его родной территории, "Красный Наполеон" и его люди не успели отпраздновать свою победу, как были вынуждены повернуть на юг, чтобы перехватить медленное наступление нанкинцев.\n\nОфицеры его штаба предложили ему два разных подхода к предстоящему сражению. Первый - встретиться с ним лицом к лицу в лобовом бою, подальше от центра Миньганя и его инфраструктуры, но также и поближе к Нанкину. Некоторые, однако, предлагали отложить решающий бой, заманить войска Ху поглубже в ловушку, а затем окружить его в Фуцзяни. Быстро взвесив все варианты, Дэн принимает решение."
 CHI.lategame.383.a: "Решительное сражение в Чжэцзяне выгодно."
 CHI.lategame.383.b: "Заманить их в ловушку недалеко от Фуцзяня."

 CHI.lategame.385.t: "Мятеж в открытом море"
 CHI.lategame.385.d: "Установление тоталитарной военной диктатуры в Нанкине не было хорошо воспринято флотом, будь то из-за их тоталитарных, экстремистских взглядов или из-за того, что они по натуре в основном армейские офицеры. Матросы, офицеры и даже целые корабли дезертировали большими массами, лишая все шансы на полноценную блокаду Восточного побережья.\n\nОднако многие команды столкнулись с общей проблемой: куда идти дальше? Многие моряки - уроженцы Фуцзяня, прошедшие обучение в местных академиях и, следовательно, связанные семейными узами с растущим восстанием в их родной провинции. С другой стороны, многие из них прошли обучение за границей и познакомились с марксистским мышлением. РАТ и их профсоюзы значительно улучшили свою жизнь или, по крайней мере, обещают это сделать. И, конечно, существуют бесчисленные столкновения между армейским руководством, которое олицетворяет АРОВАВ в Фуцзяни, и военно-морским истеблишментом, в результате которых флот всегда остаётся в проигрыше.\n\nВ конечном счёте, этот выбор часто делают отдельные лица, спасающиеся бегством под покровом ночи, или, возможно, небольшие, сплочённые команды. Но в совокупности их часто бывает достаточно, чтобы представлять целые флотилии ограниченных военно-морских сил Китая, что потенциально может изменить ход войны."
 CHI.lategame.385.a: "Фуцзяньские повстанцы - наши братья!"
 CHI.lategame.385.b: "Армейская старая гвардия нам не друзья!"

 CHI.lategame.386.t: "Продвижение вдоль Янцзы"
 CHI.lategame.386.d: "Генерал Чжан Чжичжун никогда не был особенно преданным сторонником Вана или членом РАТ, но у него была приверженность долгу, от которой он отказывался. Несмотря на то, что многие военнослужащие оказались в лагерях мятежников, Чжан оставался непоколебимым защитником правительства и опорой, на которую гражданский Ван и РАТ могли положиться в борьбе с бонапартизмом в армии. В разгар гражданской войны он и клика из Политического департамента были костяком, на который опиралась армия [GetVictoryPointName_9843]ского правительства Чэня Гунбо.\n\nМеньшие по численности, чем другие группировки, они, тем не менее, были полны решимости одержать верх, собравшись в Баодине. Благодаря ценным разведданным, собранным людьми Чжоу Эньлая, он узнал об успешном перевороте ОВК в Нанкине. Основываясь на этой информации, он пришёл к выводу, что армии Нанкина и Фуцзяня, скорее всего, устанут сражаться друг с другом, и поэтому Чжан решил подождать, прежде чем повести свою армию на юг.\n\nИх авангард, готовый к предстоящему сражению, достиг реки Янцзы, сражаясь с разбросанными гарнизонами в надежде помешать им переправиться. Нанкинские войска спешно взрывают мосты, чтобы задержать наступление, в то время как люди Чжана ищут слабое место. Чжан считает, что в случае успеха многие оставшиеся лоялисты, скрывающиеся в регионах Цзяннань и Аньхой (которые в течение многих лет были центром усилий РАТ по набору персонала и развитию), поддержат его. Судьба их кампании зависит от баланса сил."
 CHI.lategame.386.a: "[GetVictoryPointName_9843]ские  войска создают плацдарм."
 CHI.lategame.386.b: "Нанкинские войска удерживают реку."

#Scenario 3 Wrapup (390-399)
 CHI.lategame.390.t: "Пыль оседает на Востоке!"
 CHI.lategame.390.d.RCA: "В конце концов, несмотря на все махинации и клевету врагов Вана, народ поддержал наследие председателя. После нескольких неудач на этом пути войска Чэня Гунбо смогли собраться и продолжить наступление на юг, на Нанкин, взяв столицу в ходе нового наступления. Для армии, изначально оказавшейся в наихудшем положении, окружённой нелояльными гарнизонами и численно превосходящей своих собратьев, основная заслуга в окончательной победе может быть приписана только доброй воле, которую вызвал у народа их павший лидер.\n\nЧэнь признал это в своей речи в [GetVictoryPointName_9843]е. В пламенной речи, произнесённой вскоре после капитуляции гарнизона и восстания сторонников РАТ в пяти провинциях, он обещает продолжать революцию так, как хотел Ван, по-настоящему реализуя революционные цели Гоминьдана против капиталистической эксплуатации.\n\nПосле его успешной кампании против Нанкина большинство отдалённых провинций и командиров перешли на сторону фракции Чэня, изгнав представителей из Нанкина и Фуцзяня. Фуцзяньское восстание, осознав безнадежность ситуации, сдалось. Сун Цинлин сдалась мирно, хотя местонахождение Дэна Яньды неизвестно - он либо ушёл в подполье, либо бежал в изгнание.\n\nВ любом случае, это не имеет значения. Народ высказался, и заговорщики потерпели поражение. Чэнь Гунбо завершил церемонию, объявив Цзэна Чжунмина, бывшего секретаря Вана и представителя фракции "Резиденция", новым президентом страны и вступив в должность премьера Исполнительного Юаня. Позади новой президентско-премьерской пары тихо сидел Чу Миньи, выглядевший совершенно измученным тюремным заключением, что резко контрастировало с его некогда мускулистым телосложением. Ясно, у кого теперь все карты в руках."
 CHI.lategame.390.d.PAC: "Ни одна из сторон по-настоящему не готовилась к затяжной войне, однако спустя всего несколько недель стало ясно, кто одержал верх, развеяв страхи перед новой гражданской бойней. Дэн Янда, победоносный генерал и защитник Сун Цинлин и её Временного исполнительного комитета, вышел триумфатором, сметя всю оппозицию на своём пути. Хотя путь к победе не обошёлся без препятствий, именно опыт офицеров Революционного объединения выпускников Академии Хуанпу сыграл решающую роль в новом наступлении из Фуцзяни на север — к Нанкину.\n\nПо мере приближения к городу всё больше солдат переходили на их сторону, видя, куда склоняется чаша весов. Ли Цзишэнь сыграл важную, пусть и менее признанную, роль как военный министр — он склонил на свою сторону гарнизоны и губернаторов по всей стране, ещё колебавшихся в выборе. К моменту падения Нанкина большинство уже сделало ставку на Фуцзянь, доверившись опытному командиру. На севере, в Маньчжурии и Хэбэе, колеблющиеся части окончательно утратили доверие к Чэнь Гунбо. Они отвернулись от него, арестовали и сослали его, и таким образом страна была вновь объединена.\n\nТриумфально, Сун Цинлин была приведена к присяге как Президент Республики. Временный исполнительный комитет больше не временный — он начал переименовываться в Революционный комитет Гоминьдана. Тем не менее, трудности только начинаются. Её союзники из Всемирного общества, включая Цай Юаньпэя и Четырёх Старцев, которые поддерживали её в ходе гражданской войны, начали выражать недовольство растущей политической ролью армии. Также представители побеждённых фракций — Сун Фо из Реконструкционистской фракции, Гу Мэньюй из умеренных РКА и Чэнь Дусю из КСП — получив амнистию в обмен на сотрудничество, выразили обеспокоенность будущим страны."
 CHI.lategame.390.d.GOV: "Инерцию часто бывает трудно преодолеть. Многие гарнизоны отдалённых провинций в течение последних нескольких недель находились в изоляции под предлогом "мобилизации", развлекая аудиторию представителями различных правительств. Даже те, кто непосредственно находился в Нанкине, [GetVictoryPointName_9843]е или Фуцзяни, были подвержены некоторым колебаниям, зная, что неспособность быть на стороне победителя часто приводила к смертельным последствиям. Однако, в конце концов, существующая правительственная инфраструктура Нанкина оказалась притягательной силой, от которой было трудно избавиться.\n\nПосле серьёзных переговоров Сунь Фо и Сун Цинлин пришли к соглашению, укрепив шаткий оппозиционный альянс, который стремился свергнуть Вана. Сун взяла на себя роль президента и председателя партии, в то время как Сунь Фо согласился стать вице-председателем и премьером Исполнительного Юаня. Конкретный состав кабинета министров и другие вопросы остаются предметом постоянных дискуссий, однако на данный момент нация мирно объединена.\n\n[GetVictoryPointName_9843]ское правительство Чэня Гунбо было предано уставшими хэбэйскими и маньчжурскими гарнизонами, которые вошли в уязвимый город, в то время как армия Чжан Чжичжуна всё ещё рыскала по югу. Чэню и многим его союзникам было позволено мирно бежать за границу, в то время как войска Чжана вскоре после этого сдались Дэну на условиях амнистии. Общество возрождения Китая продолжает действовать, хотя ему сильно не доверяют из-за его роли в недавних беспорядках. Они получат по заслугам достаточно скоро.\n\nОднако на данный момент Сун Цинлин и Сунь Фо наслаждаются моментом, став победителями в борьбе с тиранией Вана. Однако в их союзе уже появились трещины, и, если переговоры не принесут существенных результатов в ближайшем будущем, возможен раскол. Всемирное общество, сыгравшее важную роль в том, чтобы помочь Сун прийти к власти, ждёт своего часа. Говорят, что умеренные члены СПК и РАТ были запуганы армией, хотя это ещё не конец для них."
 CHI.lategame.390.d.CRS: "Отчаянные времена часто требуют отчаянных мер, но всегда нужно задаваться вопросом: "Какой ценой?" Окружённое со всех сторон повстанцами, распадающееся правительство Суня Фо было вынуждено обратиться к военным экстремистам, чтобы спасти своё положение. Если их целью было остановить волну и предотвратить затяжную гражданскую войну, Ху Цзуннань не разочаровал их.\n\nТеснимые с севера и юга, солдаты Общества возрождения Китая доказали свою мощь в продолжительной кампании. Даже потерпев поражение, многие продолжали сражаться с "духом Вампоа" - неукротимой, фанатичной отвагой, которая одержала верх над врагами Нанкина. Кампания Чжана Чжичжуна на реке Янцзы в конце концов закончилась неудачей, так как они находились слишком далеко от своих северных баз снабжения, чтобы долго выдерживать столь ожесточённую кампанию. В ходе последовавших боёв многие из их подразделений были жестоко разгромлены, и они разбежались или даже дезертировали.\n\nНа юге новая попытка Дэна Яньды захватить Нанкин в конечном счёте закончилась неудачей. После нескольких недель борьбы с фанатичными сепаратистами Нанкина, большинству губернаторов отдалённых провинций это надоело, и они перешли на сторону центрального правительства. Гарнизоны в Хэбэе и Маньчжурии, пав духом, предали Чэня Гунбо и отправили его в позорное изгнание. Поскольку большая часть страны была настроена против них, Фуцзянь втянулась во внутренние распри и была вынуждена сдаться.\n\nХу Цзуннань теперь является эффективным лидером нации, мастерски оттеснив Суня Фо в сторону и предотвратив любые переговоры, которые могли бы подорвать революционные обещания Гоминьдана. На протяжении всей предвыборной кампании он с тревогой называл себя генералиссимусом, и это беспокойство в полной мере проявилось сегодня в Нанкине, когда он был утверждён в должности президента на период продолжающегося чрезвычайного положения. За ним стоит камарилья, состоящая из избранных, в первую очередь офицеров из ОВК. Некоторые, как Хэ Чжунхань, предпочитают быть в центре внимания (хотя и не допускаются дальше, чем сам Красный генералиссимус), в то время как другие, такие как Дай Чуньфэн и Дэн Вэньи, довольствуются махинациями на заднем плане."
 #Order it based on realistic likeliness
 CHI.lategame.390.a: "Правительство Сун Цинлин восторжествовало!"
 CHI.lategame.390.b: "Дэн Яньда уничтожает предателей!"
 CHI.lategame.390.c: "Ху Цзуннань одерживает победу над всеми!"
 CHI.lategame.390.d: "Чэнь Гунбо выходит победителем!"

CHI.lategame.391.t: "Конец союза Гоминьдана и федералистов"
CHI.lategame.391.d: "Терпение — добродетель, и хотя нам пришлось согласиться на возмутительные условия Гоминьдана ради мирного объединения, гражданская война между фракциями Гоминьдана обнажила неспособность социалистов справедливо управлять. Последствия бурного Третьего Воссоединённого национального конгресса Гоминьдана быстро проявились с внезапным убийством Ван Цзинвэя и бегством политиков как из поддерживающего Вана РКА, так и из ведущей оппозиции ПАК из Нанкина.\n\nУже идут ожесточённые стычки по самым важным провинциям Гоминьдана на востоке Китая, где возникли три соперничающих правительства в [GetVictoryPointName_9843], Нанкине и Фуцзяни. РКА сплотились под началом Чэнь Гунбо, одного из самых преданных и доверенных подчинённых Вана. В отличие от Вана, он проявляет мало интереса к сохранению нашего союза. На юге в Фуцзяни Сун Цинлин, Дэн Янда и Ли Цзишэнь восстановили старые базы повстанцев для борьбы за национальное лидерство. Нередко испытывая личную вражду к Чэнь Цзюнимингу и его федералистскому движению, они заняли жёсткую позицию против нас. В Нанкине правительство Сун Фо обычно внушало надежду на демократическую альтернативу, но широко подозревается, что скоро его слабоумное правительство падёт под натиском военных радикалов.\n\nТак зачем нам ещё один претендент? Если очевидно, что ни один из трёх претендентов не собирается реализовывать даже базовые федералистские идеи местной демократии, то любые наши соглашения ничтожны. Единственно справедливым курсом будет восстание против националистического тирана, используя момент слабости для свержения всех трёх самозванцев!"
CHI.lategame.391.a: "Это наш шанс! Восстанем!"

CHI.lategame.392.t: "Союз Гоминьдана и федералистов в руинах"
CHI.lategame.392.d: "Это было ожидаемо, но не менее разрушительно, когда телеграмма достигла стола Сун Фо. [FROM.GetLeader] осудил весь Гоминьдан и все три соперничающих правительства, возникших после Третьего национального конгресса, и вместо этого выступил с призывом к провинциям восстать против партийного правления. В ближайшие дни, учитывая отсутствие разрешения кризиса между тремя (теперь уже четырьмя) соперничающими правительствами, ожидается, что другие губернаторы начнут занимать стороны.\n\nОглядываясь назад, оставлять такую важную проблему всегда было опасно для Гоминьдана при переходе к мирному режиму опеки. Шансы были невелики, что даже в лучшие времена такое соглашение было бы устойчивым. Однако с дезорганизацией Национальной революционной армии из-за массовых дезертирств, если восстание распространится, оно может поглотить теперь необратимо расколотое партийное государство. Надвигается битва за судьбу нации."
CHI.lategame.392.a: "Мы похороним их!"

CHI.lategame.393.t: "Последствия Третьего конгресса"
CHI.lategame.393.d: "Хотя организация Гоминьдана разделяет долг и веру в принципы покойного доктора Сунь Ятсена, идеологическое разнообразие партии, охватывающее правое и левое крыло, привело к трениям. Со времени изгнания Первой Северной экспедиции и до нынешнего времени левое крыло доминировало в национальной политике и признаётся многими странами мира как истинное крыло Китайской националистической партии.\n\nПоследствия хаотичного Третьего Воссоединённого национального конгресса Гоминьдана стали очевидны после внезапного убийства председателя партии Ван Цзинвэя и бегства поддерживающих Вана сил РКА и оппозиции ПАК из Нанкина. Уже идут ожесточённые столкновения по важнейшим провинциям на востоке Китая, где возникли три соперничающих правительства в [GetVictoryPointName_9843], Нанкине и Фуцзяни. Силы РКА собрались под руководством Чэнь Гунбо, одного из самых верных и доверенных подчинённых Вана. В отличие от Вана, он мало заинтересован в сохранении нашего союза и называет нас реакционерами. В Нанкине слабое правительство Сун Фо даёт нам шанс восстановить старые связи и работать с ним ради объединения и чести воли покойного премьер-министра. Возможно, это шанс показать нашу силу и ценность в сохранении единства нации и вести более умеренную революционную политику.\n\nВ любом случае, у нас есть возможность окончательно порвать с контролем Нанкина и следовать собственной линии в духе доктора Сунь. Очевидно, что их разговоры о революции и синдикализме ни к чему не привели, и они не годятся для продолжения национальной революции."
CHI.lategame.393.a: "Шанс показать нашу силу."
CHI.lategame.393.b: "Укрепим центральное правительство."

CHI.lategame.394.t: "Соперничество возрождается!"
CHI.lategame.394.d: "Во время Второй Северной экспедиции ведущие генералы Национальной революционной армии пытались организовать союз между правыми милитаристами южных провинций, которые всё ещё клянутся в верности Гоминьдану доктора Сунь. Однако этот союз быстро распался, и сама армия впала в междоусобицу из-за политического кризиса после Нанкинского кризиса.\n\n[FROM.GetLeader] и его провинциальное правительство сегодня объявили полное отделение от национального правительства в Нанкине, заявив, что партия погрязла в хаосе и правительство Нанкина больше не легитимно. Осудив левое правительство Нанкина, [GetVictoryPointName_9843] и Фуцзяни как марионеток синдикалистов, они мобилизовали свои силы и готовятся атаковать нашу власть. Любые надежды на примирение полностью исчезли, и ясно, что это наш последний шанс раз и навсегда очистить Гоминьдан от реакционных правых."
CHI.lategame.394.a: "Ещё один претендент в борьбе."

CHI.lategame.395.t: "Правые мобилизуются"
CHI.lategame.395.d: "В попытке сплотить национальные силы во время Второй Северной экспедиции ведущие генералы Национальной революционной армии пытались создать союз между правыми милитаристами южных провинций, остающимися верными Гоминьдану доктора Сунь. Несмотря на Нанкинский кризис, правые выбрали нацию и партию, а не раскол, и выразили поддержку правительству Сун Фо в Нанкине.\n\n[FROM.GetLeader] и его провинция, ссылаясь на легитимность Сун Фо как сына покойного вечного премьер-министра, пообещали тысячи солдат для поддержки армии Нанкина в войне против [GetVictoryPointName_9843] и Фуцзяни. Несмотря на численное превосходство и слабость на бумаге, обещания [FROM.GetLeader] значительно подняли мораль в Нанкине и укрепили легитимность Сун Фо как компромиссного медиатора в кризисные времена."
CHI.lategame.395.a: "Сун Фо приобрёл ценного союзника."
###- Section 3c (400-599): Economic Content -###

 CHI.lategame.401.t: "Зерновая трясина"
 CHI.lategame.401.d: "Зерно является основным продуктом питания, источником жизненной силы китайского народа. Таким образом, дискуссии о зерне и налогах всегда вызывают головную боль, поскольку они связаны с интересами землевладельцев и волнениями крестьян. Правительство заинтересовано в том, чтобы урожайность была достаточной для того, чтобы прокормить нацию, чтобы адекватно (и, надеюсь, справедливо) облагать налогом этот важный компонент национальной экономики, а также запасать зерно, чтобы накормить обездоленных и подготовиться к голоду.\n\nПоскольку землевладельцы либо подчинены, либо экспроприированы, партия подчеркнула, что они отличаются от жадных полевых командиров, которые были до них. Но некоторые из них испортились из-за несоответствия обещаний нового правительства реальной ситуации на местах - большая часть зерна, которое должно было поступать в государственные амбары, была украдена коррумпированными бюрократами, а налогообложение в лучшем случае было неравномерным. Многие фермеры отказались вносить свой вклад, обвинив наших судей в воровстве. Без надлежащей документации очень трудно облагать фермеров налогом, а такого рода бюрократическая инфраструктура просто ещё не существует.\n\nБыли предложены альтернативные варианты, в том числе прямое налогообложение урожая зерновых и полная отмена других сельскохозяйственных налогов. Учитывая, как мало на практике собирается налогов, это помогло бы увеличить государственные доходы, но неизбежно будет непопулярно среди крестьян. Но с учётом войн и роста долгов, которые их сопровождают, это заманчивое предложение. Возможно, когда-нибудь промышленность и торговля займут место основных секторов экономики, но пока, похоже, земля обеспечивает жизнь и государству."
 CHI.lategame.401.a: "Обложите налогом зерно непосредственно на военные нужды."
 CHI.lategame.401.b: "Заказывайте ревизии, и зернохранилища будут заполнены."
 CHI.lategame.401.c: "Упростите налогообложение и снизьте его уровень."

 CHI.lategame.402.t: "Корпус налоговой полиции"
 CHI.lategame.402.d: "Налог на соль примерно такой же древний, как и китайское государство, и записи свидетельствуют о том, что династия Хань приказала, чтобы соль и железо стали государственными монополиями в первом веке до нашей эры. Учёные того времени полагали, что косвенный налог с населения лучше всего подходит для финансирования правительства, не рискуя навлечь на себя гнев народа. Спустя почти два тысячелетия соль остаётся основным источником богатства и власти, хотя даже до эры военачальников это была сильно разрозненная система.\n\nГоминьдан сохранил свою монополию на соль и сопутствующий ей габель (косвенный налог), и, по некоторым данным, на него приходится более трети общего дохода правительства. Получение доходов от продажи соли у полевых командиров было основным источником споров, напряжённости и дипломатии, хотя с завоеванием соляных заводов северного Китая перспектива получения новых доходов привлекла внимание многих правительственных органов.\n\nДля сбора этих налогов, сопровождения фондов и обеспечения соблюдения монополии нашими предшественниками и нашим новым центральным правительством были независимо сформированы целые полки. Эти подразделения часто хорошо обучены и оснащены, могут позволить себе более качественное снабжение, и им часто поручается подавление мятежных полевых командиров. Министерство финансов под руководством Сун Цзивэня было одним из первых, кто организовал свои бригады по заготовке соли и, следовательно, располагает крупнейшими специализированными подразделениями. Он настаивает на необходимости поддержки государственных банков и валюты.\n\nМинистерство внутренних дел, напротив, настаивает на том, что такие бригады находятся под их юрисдикцией, поскольку обеспечение правопорядка - это дело полиции, и у них больше опыта. Армия присоединилась к этому, полагая, что, возможно, при всей нестабильности только им можно доверить такую задачу.\n\nПрезидент Ван и ЦИК согласились с тем, что дублирование юрисдикций должно быть прекращено. Вопрос лишь в том, кто получит окончательный грант. Остаётся невысказанным, какие огромные суммы денег могут быть украдены."
 CHI.lategame.402.a: "Денежные вопросы относятся к сфере финансов."
 CHI.lategame.402.b: "Правоохранительные органы тесно связаны с органами внутренних дел."
 CHI.lategame.402.c: "Для защиты государства необходима армия."

### Раздел 3d (600-799): Военный контент

 CHI.lategame.601.t: "Формирование будущего Китая"
 CHI.lategame.601.d: "Хотя Гоминьдан и провозглашает себя революционным авангардом, это не означает, что он намерен оставить народ в стороне от революционной борьбы. На самом деле, он мобилизовал людей, мужчин и женщин, со всех уголков страны. И вряд ли он забыл о молодёжи.\n\nЛинь Бошэн, министр пропаганды, организовал Молодёжный корпус (Циннянь туань) для молодёжи в возрасте от 16 до 25 лет. Его члены поклялись в абсолютной верности партии и прошли военизированную подготовку. Корпус, преобразованный в Союз молодёжи (Циншаонянь туань), организует летние лагеря, посвящённые обучению публичным выступлениям, пропаганде и \"самооценке\".\n\nВКД и их военные союзники сформировали свой собственный Союз молодёжи новой демократии Китая, который является продолжением других молодёжных движений, созданных в эпоху династии Мин. Столь же авторитарные по своей сути, они стремятся создать полностью преданную делу и альтруистичную молодежь, призванную следовать догмам и организовывать массы для революционной борьбы.\n\nДругие пытались подражать им, но с меньшим успехом. Союз синдикалистов Китая создала Синдикалистский молодёжный союз Китая, выйдя за рамки своей якобы демократической идеологии. Общество возрождения Китая сформировало Союз молодёжи им. Трёх народных принципов, который почему-то ещё более экстремален в своём милитаристском тоталитаризме, чем другие.\n\nПо иронии судьбы, пожалуй, самой уникальной (из-за своей обыденности) организацией являются бойскауты Китая, которым покровительствуют семьи, связанные с Фракцией реконструкции. Основанный на международном движении Баден-Пауэлла, он представляет собой \"замкнутую\" форму молодёжного активизма, с акцентом на развитие личности, небольшой степенью аполитичного либерализма и привкусом военной дисциплины, идеально подходящей для ФР. Действительно, будучи мэром, Сунь Фо включил это в школьную программу Гуанчжоу."
 CHI.lategame.601.a: "Партия поддерживает ГМДСМ (Гомсомол)."
 CHI.lategame.601.b: "Партия поддерживает СМ-НДК."
 CHI.lategame.601.c: "Родители могут свободно записываться по своему усмотрению."

CHI.lategame.602.t: "Новое поколение пилотов"
CHI.lategame.602.d: "Военная академия Уханьпао была прежде всего армейской школой, хотя в ней обучались и несколько курсантов военно-морского флота и авиации. По мере расширения военно-воздушных сил Китайской Республики выяснилось, что в Уханьпао слишком мало курсантов с авиационной подготовкой, чтобы укомплектовать даже растущие воздушные силы. На самом деле, только совсем недавно Авиационный комитет Военного совета стал самостоятельным ведомством, и они усердно искали компетентных пилотов, обучавшихся как в Китае, так и за рубежом.\n\nЧтобы облегчить эту нехватку, планируется создать Центральную авиационную школу — возможно, первое крупное начинание военно-воздушных сил Китайской Республики. К сожалению, несмотря на небольшой размер, ВВС уже погрузились во внутренние распри, так как различные кланы борются за пост следующего Суперинтенданта ЦАШ.\n\nХотя их число далеко не покрывает все потребности, из Уханьпао вышло несколько выдающихся кандидатов. Тан Дуо — естественный выбор на эту должность, выпускник программы «Учёба и работа» во Франции, который учился в Уханьпао и помогал создать первый завод по производству самолётов Гоминьдана в Гуанчжоу. Он прошёл дополнительную подготовку во Франции во время периода изгнания и имеет непосредственный опыт обучения полётам.\n\nЛон Вэнгуан был пилотом восстания Минган, в основном летал на разведывательных самолётах и едва избежал пленения силами Лиги. Его героизм привлёк внимание многих в армии, что повысило его шансы на продвижение. Также Сюй Хуаньшэн — соратник по Уханьпао, известный своей личной храбростью. Он был личным пилотом Чан Кайши, прошёл дополнительную подготовку в Британии и стал авиационным инструктором. Кроме того, он имеет отдалённые связи с членами Общества Возрождения Китая.\n\nСоздание военно-воздушных сил, без сомнения, будет сложной задачей, но это необходимо для того, чтобы обеспечить Китаю по-настоящему современную и адекватную армию, позволяющую наконец догнать остальной мир."
CHI.lategame.602.a: "Тан Дуо, пионер авиации."
CHI.lategame.602.b: "Лон Вэнгуан, ас Мингана."
CHI.lategame.602.c: "Сюй Хуаньшэн, смелый воздушный герой."

 CHI.lategame.603.t: "Новая одежда председателя"
 CHI.lategame.603.d: "Начало войны и растущая неопределённость в отношении будущего подтолкнули националистическое правительство к действиям, направленным на то, чтобы убедить население в победе. Были написаны патриотические песни, напечатаны брошюры и составлены плакаты в рамках совместных усилий по воспитанию патриотического духа. Но, пожалуй, самым поразительным является новый гардероб президента: Ван Цзинвэя всегда фотографировали в военной форме, куда бы он ни пошёл, отказавшись от своей обычной гражданской одежды.\n\nСогласно правительственной прессе, это делается в знак солидарности с храбрыми солдатами гоминьдановской национально-революционной армии и для того, чтобы подчеркнуть тотальный характер предстоящей войны. Как с помощью визуальных, так и письменных средств массовой информации они стремились изобразить председателя как способного лидера военного времени, который находится в естественной компании с генералами.\n\nКритически настроенные комментаторы отмечают, что Ван долгое время был не в ладах с военными, включая покойного Чана Кайши и его нынешнего заклятого врага Дэна Яньду. По их мнению, ношение военной формы для того, чтобы подчеркнуть свою роль главнокомандующего, является не более чем мелкой попыткой утвердить своё превосходство в военных вопросах над другими членами Комиссии по военным вопросам. Возможно, больше всего критиков раздражают его обычные знаки отличия, якобы обозначающие его символическую должность великого маршала армии и флота.\n\nЕсли отбросить разногласия по поводу тщеславия, то надвигающаяся война вполне может определить будущее революции. Ещё предстоит выяснить, находится ли нация в надежных руках..."
 #陸海軍大元帥
 CHI.lategame.603.a: "О характере человека можно судить по его одежде и внешности. "

#Foreign Liberation Units (640-659):

 CHI.lategame.640.t: "Корейский добровольческий корпус"
 CHI.lategame.640.d: "Поскольку война между Китаем и Японией продолжается, корейские революционеры в изгнании обратились к Национально-революционной армии с просьбой о создании добровольческого батальона из корейцев для участия в совместной борьбе против японских империалистов. Министр иностранных дел Гоминьдана Чэнь Южэнь с энтузиазмом воспринял петицию, сославшись на давнюю совместную историю Кореи и Китая и их общее желание увидеть, как японцы действительно будут изгнаны из Азии.\n\nПосле некоторых переговоров, в результате которых руководство батальоном перешло к бывшему выпускнику Вампоа Киму Вонбону, был основан Корейский добровольческий корпус (КДК). Некоторые члены Добровольческого корпуса, такие как Чхве Чан Ик, даже работают в Комиссии по военным вопросам НРА, а последний работает в политическом отделе КВВ и известен своими симпатиями к радикальному РАТ Чэня Гунбо. Известно, что сам Вонбон симпатизирует революционным идеалам Временного комитета действий, и поэтому Вонбон и Чан Ик известны своими частыми столкновениями. КДК разделён на две команды: команду 1 возглавляет капитан Пак Хё Сам из провинции Хамгён-Намдо (а также личный друг Вонбона), а командой 2 руководит Ли Ик Сон из провинции Хамгён-Пукто - оба мужчины окончили Военную академию Вампоа.\n\nЧлены КДК свободно владеют корейским, китайским и японским языками, и некоторые из их тактических приемов включают в себя распространение антивоенных листовок, громкоговорителей для проведения антивоенной пропаганды, допросы и идеологическую обработку заключенных. Политический департамент Комиссии по военным вопросам выделил ежегодное пособие в размере 12 240 юаней на текущие расходы, а также предоставил бесплатное оружие и боеприпасы."
 CHI.lategame.640.a: "Да здравствует независимость Кореи!"

CHI.lategame.641.t: "Армия Бинтанг Тига"
CHI.lategame.641.d: "Национальная революционная армия продвинулась далеко от дома в своей борьбе с империализмом. Наступая в Малайзию, они быстро встретили местных борцов за свободу, стремящихся освободиться от колониального гнёта. Признав общие цели, министр иностранных дел Чэнь Южэнь предпринял шаги по установлению связей с местным населением.\n\nПосле добросовестных переговоров Гоминьдан и армия Бинтанг Тига вышли из переговоров как союзники. Бинтанг Тига, известная как Армия Трёх Звёзд, заявляет о своей приверженности многорасовому малайскому коммунарному движению — объединяющему малайцев, китайцев и индийцев. Несмотря на внутренние споры в их руководстве, с нашей помощью есть надежда превратить нашу оккупацию в освобождение.\n\nДля мобилизации местных жителей был создан 10-й малайский полк при поддержке китайских советников. Он назван в честь 10-го Зульхиджа, исламского праздника, посвящённого жертве Авраама — Исмаилу, и ожидается, что солдаты полка готовы к самопожертвованию во имя свободы. Созданный на основе китайских добровольцев, ранее известных как Армия Заграничных Китайцев (прозванная Двухзвёздной армией), 10-й малайский полк вырос до дивизии за счёт националистических боевиков, дезертиров из колониальной армии и полиции, а также различных местных социалистических добровольцев. Говорят, что [CHI.GetLeader] чрезвычайно доволен этим развитием и высоко оценивает их антикoлониальный энтузиазм."
CHI.lategame.641.a: "Вперёд, к освобождению!"

CHI.lategame.642.t: "Освобождение Индокитая"
CHI.lategame.642.d: "По мере того как китайские войска входят в Индокитай, их руководство прилагает большие усилия, чтобы отделить паназиатскую риторику освобождения от прикрытого империализма японцев — с переменным успехом на местах. Тем не менее, министр иностранных дел Чэнь Южэнь вместе с рядом симпатизирующих командиров, таких как Чжан Факуй, сделали своим личным проектом поддержку антиимпериалистических революционеров в Индокитае.\n\nЭтот проект, к сожалению, оказался гораздо сложнее, чем изначально предполагалось. После жестокого подавления колониальными властями Вьетминь распался из-за внутренних идеологических разногласий и региональных соперничеств. В результате не существует единого правительства в изгнании, и Чэнь отчаянно пытался собрать воедино уцелевшее руководство.\n\nБлижайшей к [CHI.Capital.GetCapitalVictoryPointName] фракцией была «Министерство за рубежом» под руководством Нгуен Тхай Хока, которая стала основой временного правительства, поддерживаемого Гоминьданом. Но вновь объединить индокитайские революционные группы оказалось нелегко. Несмотря на наши усилия, вьетнамские националисты и республиканцы остаются настороженными. Между тем, Хок оказался серьёзным препятствием для поддержания порядка из-за своей всё более ярой риторики и горячих на руку отрядов убийц VNQDD под его прямым контролем. Камбоджийцы и лаосцы также недружелюбно относятся к нашему проекту, подозревая восточного соседа из-за исторических конфликтов между тремя народами.\n\nВ сложившейся ситуации [CHI.GetLeader] предоставил местным командирам право решать проблемы по мере их поступления; похоже, окончательное соглашение придётся отложить до окончания войны. Тем не менее, Гоминьдан не остался вовсе с пустыми руками. Воодушевлённые успехами НРА и надеясь занять место за столом переговоров, повстанческие ячейки в оставшихся оккупированных территориях вновь активизировались. Будем надеяться, что это будет их последняя битва перед свободой."
CHI.lategame.642.a: "Ну, по крайней мере мы пытались?"

CHI.lategame.643.t: "Лига освобождения японского народа"
CHI.lategame.643.d: "По предложению японского революционера Носака Сандзо Центральный комитет Китайской националистической партии создал Лигу освобождения японского народа. В Лигу входят японские солдаты, решившие сдаться Гоминьдану, и беженцы, спасшиеся с наших земель. Китайское правительство приветствует Лигу как начало новой китайско-японской дружбы, провозглашая их авангардом грядущего «народного правительства» в Японии. Открытая для всех, Лига объединяет множество недовольных граждан нашей страны с обещанием нового рассвета в Японии, который положит конец милитаризму. Эта риторика подрывает мораль наших солдат, сражающихся в Китае, многие из которых в плену решают присоединиться к Лиге."
CHI.lategame.643.a: "Эти предатели нас не остановят!"

#Intelligence Related Events (700-719)

 CHI.lategame.701.t: "Ксенофобия в МГБ"
 CHI.lategame.701.d: "Министерство государственной безопасности, несмотря на усилия по его совершенствованию, никогда не испытывало особого давления с целью реформирования, что, возможно, является его самым большим недостатком в условиях военного времени. Ксенофобия пронизывает агентство, и его сотрудники с подозрением относятся к иностранцам и даже к национальным меньшинствам. В рамках усилий Китая по сотрудничеству с более широкими международными социалистическими организациями МВМК был усилен советниками во главе с Якобом Рудником (который известен под псевдонимом Ню Лань и также известен как Пол Рюгг), чтобы помочь в обучении и координации деятельности МГБ по сбору разведданных.\n\nОтношения были непростыми. Поскольку в МГБ преобладают бывшие военные и другие идеологически проверенные сотрудники, большинство из них с опаской относятся к своим британским и французским коллегам. Более опытные оперативники могут вспомнить случаи, когда их арестовывала колониальная полиция в представительствах, в том числе Дай Чуньфэна, которого однажды унизили в Гонконге. Для многих британцы и французы никогда не перестанут быть империалистами, социалистами или нет. Прибытие миссии 204, также известной как \"Силы тюльпанов\", состоящей из британских и австралазийских коммандос, только укрепило это мнение. В общей сложности около 180 сотрудников МГБ обратились к прессе с обвинениями в том, что они являются политиками и авантюристами, а не солдатами, и что они сродни шумной банде иностранных наемников. Пресса раздувала отвратительные слухи о воровстве, домогательствах к китайским женщинам и захвате местных домов, заимствуя образы более ранних империалистических мародеров.\n\nВысшее руководство МГБ, со своей стороны, бездействует, пытаясь управлять своими подчинёнными. Руководители министерств регулярно ссорятся со своими советниками, и их обвиняют в нежелании сотрудничать. Они выдвинули множество необоснованных, но часто принимаемых на веру обвинений - от того, что МВМК шпионила за МГБ, до того, что МВМК в обход руководства МГБ напрямую общалась с ЦИК. Это предубеждение и порождённая им дисфункциональная система вряд ли будут устранены в ближайшем будущем. Но МВМК попросила ЦИК вмешаться и отстранить от дел злостных нарушителей, что, по их мнению, поможет решить хотя бы некоторые проблемы."
 CHI.lategame.701.a: "Скажите чужакам, чтобы те ушли."
 CHI.lategame.701.b: "Нам всем нужно работать здесь сообща."

CHI.lategame.702.t: "Учебные лагеря Цзюньтун"
CHI.lategame.702.d: "Революционная молодёжь, быстро готовьтесь. Будьте мудры, человечны и храбры!\nПочувствуйте пульс этого этапа. Встаньте перед великим веком.\nНе поддавайтесь тяжёлым обстоятельствам. Не покоряйтесь угрозам силы!\nМы защитим безопасность нашей партии и охраним суверенную землю нашей нации.\nМы будем всегда непоколебимы и стойки, организованы и искренни.\nЧерез лишения и труд мы едины в стремлении!\nМы — Великая стена нации и авангард расы.\nРеволюционная молодёжь, быстро готовьтесь, будьте мудры, человечны и храбры!\nПочувствуйте пульс этого этапа. Встаньте перед великим веком!\n                      — Песня учебного класса Линли при БИС\n\nЦзюньтун активно действуют с момента Северного похода. По всей деревне они используют свою власть для создания учебных лагерей, официально для подготовки агентов, но часто для индоктринации большого числа новобранцев в Общество Возрождения Китая. Эти лагеря строятся далеко от посторонних глаз цивилизации, курсанты часто клянутся в личной верности Дай Чунфэнгу, а эти «запретные зоны» охраняются даже от старших партийных чиновников (с оружием).\nЖенщинам запрещено находиться там, чтобы избежать ловушек-соблазнительниц, а все агенты не имеют права вступать в брак во время службы.\n\nЛичная крепость Дая, как говорят, расположена в «Счастливой долине» (Гэлэшань), трёх долинах, окружённых кольцом холмов и полей. Любой глупец, попытавшийся приблизиться к электропроводам без пропуска, был убит. Единственными посторонними, кому позволен вход, были несколько доверенных советников ММИК, часто находящихся на периферии миссии. Ходят слухи о «Белом особняке» (Байгунгуань), где пытали и казнили диссидентов. С учётом расширения комплекса до почти тысячи зданий, стоит задуматься над сделанной нами фаустовской сделкой."
CHI.lategame.702.a: "Секретность рождает молчаливое братство."
CHI.lategame.702.b: "Что за культовая безумие это такое?"

CHI.lategame.703.t: "Особые методы в действии"
CHI.lategame.703.d: "Агенты иностранного империализма повсюду в стране, подвергшейся почти столетнему колониализму. Купеческая буржуазия, наёмники, шпионы и прочие коллаборационисты всех мастей остаются везде, угрожая подорвать революцию. Многие угрожают перейти на сторону внешних сил, опасаясь, что местные реакционные приспешники не в силах сдержать дух народа.\n\nУ всех есть оправдания при столкновении, но никто не может ускользнуть от параноидальных глаз Теке. С безжалостной решимостью и легендарной точностью они ликвидируют врагов революции. Эвфемизм «особые методы» стал синонимом тактики Теке, и, по-видимому, эти методы применяются всё чаще.\n\nКогда Теке приходят в действие, большинство партийцев достаточно благоразумны, чтобы не интересоваться подробностями и предпочитают смотреть в другую сторону. С другой стороны, растут беспокойства, сначала тихие, а теперь уже заметные. Среди убитых есть известные личности, не обязательно нелюбимые общественностью. Появились призывы к большей ответственности, поскольку Теке из небольшой революционной организации превращается в главный разведывательный орган Китая, с требованиями от Военной комиссии ограничить внесудебные расправы и ввести процессуальные нормы.\n\nКонечно, эти опасения, вероятно, преследуют скрытые цели. Похоже, что Чжоу Эньлай не боялся использовать Теке против внутренних оппонентов, особенно в своей борьбе с Дай Чунфэнгом. Даже вне внутрипартийных распрей «Лига убийц собак» (Дагоу тюань) вызывает споры, будучи ответственной за убийства предполагаемых партийных изменников. Интересно, кто станет следующей партией «контрреволюционеров»."
CHI.lategame.703.a: "Смерть ханцзяням!"
CHI.lategame.703.b: "Пожалуйста, проявите сдержанность."
### Section 3e (800-999): Flavour and Misc

CHI.lategame.801.t: "Ша Фэй, фотограф революции"
CHI.lategame.801.d: "Родившийся как Ситу Чуань в Гуанчжоу, провинция Гуандун, Чуань вступил в Национально-Революционную Армию в 1926 году во время Первого Северного похода в качестве телеграфиста. После провала похода он бежал к Минганскому восстанию Сун Цинлин, где увлёкся фотографией. Особенно его заинтересовали «реалистичные» фотографии в отличие от международных моделей, которые он видел в зарубежных журналах.\n\nОн часто путешествовал по Фуцзяню, снимая нищих детей и семьи, а также ездил в Шанхай, чтобы встречаться и фотографировать интеллектуалов, таких как Лу Сюнь. Во время активной фазы Северного похода он взял псевдоним Ша Фэй (что означает «летающий песок»), чтобы документировать революцию на передовой. Его фотографии запечатлели моменты военных действий, подчеркивая справедливость и праведность дела Гоминьдана, даже в обращении с пленными врагами.\n\nК сожалению, этот талантливый фотограф сейчас находится в психиатрической больнице. Недели съемок самых кровавых аспектов войны, изуродованных конечностей, военной жестокости и разрушений по всей Китаю сказались на молодом фотографе. Хотя ему поставлен диагноз психического расстройства и туберкулёза, есть надежда на его выздоровление."
CHI.lategame.801.a: "Запечатлевая лучшие моменты революции!"

 CHI.lategame.802.t: "Праздники и суеверия в новом Китае"
 CHI.lategame.802.d: "\"Искореним все религиозные и социальные предрассудки! Искореним предрассудки, чтобы очистить колыбель революции!\" В этом году отмечание праздника середины осени было прервано из-за множества плакатов и статей, осуждающих кажущуюся суеверной природу традиционных китайских мероприятий.\n\nВместо того чтобы присутствовать на празднествах и есть лунные пряники, некоторые революционно настроенные люди решили посетить собрания по борьбе с суевериями, организованные Комитетом по реформе общественных обычаев (КРОО). В Чжэцзяне, где есть много отделений, принадлежащих Реорганизованной ассоциации товарищей, члены партии чжэцзянского отделения РАТ призвали правительственных чиновников запретить традиционные праздники, такие как праздник середины осени, чтобы сохранить самобытность Нанкина как колыбели революции.\n\nПолитик из РАТ Чжоу Фохай, занимающий пост председателя местного отделения КРОО в Чжэцзяне, заявил, что в развитии человечества есть всего три этапа: "эпоха божественного, эпоха имперского суверенитета и, наконец, эпоха народного суверенитета (миньцюань)." Поскольку последняя является нынешней эпохой китайской революции, то, должно быть, верно, что люди должны отказаться от своего традиционного и суеверного поклонения Луне. Его комментарии были одобрительно встречены многими представителями радикальной фракции РАТ, некоторые из которых, например, Чэнь Гунбо, заявили, что для очищения от дегенеративных аспектов "Старого Китая" необходима тотальная "культурная революция".\n\nПоскольку такие усилия вызвали возмущение в местных деревнях и городах, которые протестуют против этого, казалось бы, навязчивого вмешательства в местную культуру, тамошние лидеры выразили своё несогласие с действиями Гоминьдана, обвинив РАТ в стремлении подорвать местную культуру и многовековые традиции. После значительных протестов национальное правительство в этом году пошло на уступки, хотя очевидно, что более масштабная борьба ещё не закончена."
 CHI.lategame.802.a: "Снимок строящегося нового Китая."

CHI.lategame.803.t: "Популярность костюма Чжуншань взлетает!"
CHI.lategame.803.d: "Когда в 1911 году с Синьхайской революцией была провозглашена Китайская Республика, стиль одежды в Китае был сильно под влиянием маньчжурских традиций. И ципао, и чаншань были навязаны ханьскому населению Цинской династией как средство социального контроля. В попытке модернизировать не только китайскую нацию, но и китайское общество в целом (аналогично эффекту реставрации Мэйдзи на японскую одежду), китайские интеллектуалы и элита начали сочетать элементы западного и китайского стиля одежды.\n\nКостюм Чжуншань стал продуктом такой культурной революции. Туника была введена самим основателем Гоминьдана, Сунь Ятсеном, и основана на форме японских курсантов. Четыре кармана на костюме символизируют четыре добродетели — благопристойность, справедливость, честность и чувство стыда, а пять пуговиц на тунике — пять ветвей националистического правительства.\n\nС момента возвращения националистического правительства на материк костюм взорвал популярность. Государственные чиновники часто надевают его как символ пролетарского единства и восточный аналог западному деловому костюму."
CHI.lategame.803.a: "Скромный наряд для великих перемен!"

 CHI.lategame.804.t: "Юный товарищ попадает на полки магазинов"
 CHI.lategame.804.d: "\"Юный товарищ\", прилагаемый в \"Минго жибао\", - это иллюстрированный сборник, пользующийся широкой популярностью среди молодёжи по всему Китаю. Он издан книжной компанией Лянъю под руководством Ву Ляньдэ, хотя последние издания были отредактированы Лианом Дэсо и Ма Голяном.\n\nПомимо изображения генералов Национально-революционной армии, таких как Чжан Факуй, картина примечательна своими девушками с обложек. Красивые женщины украшают обложки последних изданий, они, кажется, изображены "движущимися в движении" и участвующими в западных видах спорта, одетыми в западную одежду, что делает такие передовицы популярными среди солдат НРА. Тем не менее, эти женщины на обложках одеты не для того, чтобы искать мужчин, а скорее для того, чтобы жить своей жизнью и наслаждаться светской жизнью в Шанхае. Среди женщин, появляющихся на обложках, - такие актрисы, как Анна Мэй Вонг и Чэнь Боэр, а также женщины-офицеры Национальной армии США, такие как Ху Ланьци."
 CHI.lategame.804.a: "Солдатам это понравится!"

CHI.lategame.805.t: "Продвижение велосипеда"
CHI.lategame.805.d: "Велосипед — примитивное и широко распространённое средство передвижения, которое Министерство транспорта Националистического правительства активно продвигает. Хотя велосипед начал проникать в китайское общество уже к 1860 году, он не получил одобрения и не стал интегрированным в повседневную жизнь. Поскольку велосипед в основном использовали западные люди, его воспринимали лишь как инструмент и странное изобретение иностранных империалистов.\n\nКроме того, использование ног при езде на велосипеде казалось китайцам насмешкой над понятием роскошных путешествий, ведь многие китайцы, незнакомые с велосипедом, привыкли к рикше, где ноги оставались неподвижными. Велосипеды вызвали у китайцев любопытство — их вдохновляли выносливость велосипедиста и скорость, с которой можно было передвигаться.\n\nНационалистическое правительство стремится расширить транспортные возможности для тех, кто не может позволить себе автомобиль. Хотя изначально велосипед считался предметом роскоши, его цена стала настолько доступной, что планируется, что к 1949 году в Китае будет в обращении полмиллиона велосипедов."
CHI.lategame.805.a: "Многообещающее развитие!"

CHI.lategame.806.t: "История Цзэн Сяньчжи"
CHI.lategame.806.d: "Возможно, благодаря своему происхождению, она была рождена для великой жизни — удивительной жизни молодой \"Новой женщины\" в новую революционную эпоху китайской политики. Потомок знаменитого генерала поздней династии Цин Цзэн Гоцюаня (одного из братьев знаменитого Цзэн Гофана из армии Сян, помогавшей подавить восстание Тайпинов), Цзэн Сяньчжи родилась 23 января 1910 года в Байшутане, Чанша, Хунань.\n\nВ конце 1920-х — начале 1930-х годов школы по всему Китаю стали принимать больше девушек, и Цзэн была членом баскетбольной команды своей школы. Под влиянием китайского революционера и социалиста Сюй Тэли Цзэн активно включилась в национальную революцию, поступив на Северный экспедиционный поход в числе немногих женщин в Военной академии Ванпоу. После провала похода она бежала в восстание Минган, где стала политическим инструктором и координатором транспортировки для повстанцев.\n\nЕё преданность и самоотверженность идеалам национальной революции недавно получили признание в верхах партии, включая Сон Цинлин, которая описала её как идеальную китайскую женщину-революционерку. В последние дни она стала личным секретарём китайской государственницы и жены генерала Чжоу Эня, Дэн Инчао."
CHI.lategame.806.a: "Героическая женщина нашего времени!"

CHI.lategame.807.t: "Международная группа воздушных добровольцев"
CHI.lategame.807.d: "Оставшись без союзников, многие в партии боялись худшего, когда Япония объявила нам войну — возможно, в отчаянной попытке сохранить империализм над Китаем и разорвать нашу страну с Маньчжурией. В воздухе наши силы просто не сопоставимы с Императорским японским военно-воздушным флотом, обладающим одними из самых современных самолётов в мире и самой опытной авиацией в Азии.\n\nОбладая полной воздушной доминацией, японская авиация разрушает наши города, убивает наших людей и дестабилизирует наши военные операции контролём неба. Однако в наш час нужды [FRA.GetNameDef] и [ENG.GetNameDef] прислали нам эскадрилью добровольцев со всего мира под командованием французского пилота Андре Жапи — эксперта своего дела. Хотя большинство добровольцев — французы и британцы, там также немало итальянцев и даже, как сообщается, некоторых норвежских пилотов; все они прибыли в Китай тайно, выдавая себя за туристов. Эти добровольцы прилетели на самолётах Hawker Fury и призваны поднять мораль и обучить будущих пилотов, чтобы те тоже смогли сражаться в воздухе. С их помощью, возможно, мы сможем вернуть контроль над нашим небом в великой борьбе против империализма."
CHI.lategame.807.a: "Мы примем всю помощь, какую только можем получить!"

 CHI.lategame.808.t: "Драконьи лодки в националистическом Китае"
 CHI.lategame.808.d: "Писатель-социалист и член ССК, марксист Го Можо недавно закончил свою пьесу \"Цюй Юань\", основанную на известном поэте Цюй Юане, патриотичном поэте и политическом деятеле из царства Чу периода Сражающихся царств*. В пьесе традиционный китайский литературный герой сравнивается с \"народным поэтом\" и одним из первых социалистов-революционеров в истории Китая. Благодаря сравнениям с \"Гамлетом\" и \"Королём Лиром\" Шекспира, пьеса стала примером социального идеализма Цюй и его великого патриотизма как образца для подражания всем китайцам в эпоху национальной революции.\n\nСогласно легендам, Цюй Юань служил царству Чу, но неоднократно подвергался изгнанию из-за своих ревнивых соперников при дворе Чу и, таким образом, проводил время в изгнании, собирая легенды и переиначивая старинные предания. Кроме того, он также проводил время за написанием замечательных стихов и глубокими размышлениями о природе китайского государства. Однако его беспокойство приводило к тому, что его здоровье становилось всё хуже, и, как сообщалось, он совершал прогулки, чтобы увидеть своё измождённое лицо в отражении колодца. Примерно в 278 году до н.э., после того как столица его страны, город Ин, пала под натиском грозного полководца Бай Ци из царства Цинь, Цюй Юань написал глубокую скорбь по поводу краха своего государства. Затем он покончил с собой, войдя вброд в реку Мило с камнем в руках - возможно, из чистого патриотизма.\n\nПоявилась популярная легенда, что жители деревни пытались выплыть на озеро с клецками и своими лодками, чтобы спасти Цюй Юаня, но не смогли этого сделать. В отчаянии они били в барабаны и разбрызгивали воду веслами, чтобы рыбы и злые духи не съели его тело. Они также бросали рис в реку, чтобы отвлечь рыбу, но однажды ночью дух Цюй Юаня явился его друзьям и сказал им, что он давно умер и что они должны завернуть рис в шёлковые пакеты, чтобы отогнать драконов, которые съедят его. Эти продуктовые наборы стали знаменитыми "цзунцзы", а гонки на лодках в поисках тела Цюй стали краеугольным камнем традиции драконьих лодок.\n\nПьеса Го Можо имела оглушительный успех в китайском литературном мире левого толка, и националистическое правительство поспешило извлечь выгоду из этого успеха, заявив, что Цюй был одним из первых великих революционеров Китая. В то время как некоторые социалисты осуждают фестивали драконьих лодок как чистое суеверие, большинство авторов согласны с тем, что Цюй был истинным лидером народной революции. Его верность своей стране, его преданность народу и его произведения искусства навсегда останутся в памяти грядущих поколений.\n\n*Чу - одно из древнекитайских царств, существовавшее с 772 по 221 г. до н.э. (прим.пер.)"
 CHI.lategame.808.a: "Давайте съедим цзунцзы на обед!"

#Outsider Subjugation Events
CHI.lategame.901.t: "Республиканский альянс?"
CHI.lategame.901.d: "Когда мы изначально подписали соглашение с Гоминьданом, это было с целью свержения тиранических беяновских военных владык и обеспечения того, чтобы разделённые южные республиканские фракции могли противостоять сильным северным противникам. Похоже, что Центральный исполнительный комитет левого крыла Гоминьдана выиграл эту гонку, успешно захватив ключевые города в своём стремительном марше на север.\n\nНа пороге завоевания национального лидерства им противостоят две основные преграды. Одна — присутствие [716.owner.GetAdjectiveCap] в Маньчжурии. Другая — мы и наши претензии на более демократическое будущее. При помощи различных посредников, преимущественно ветеранов старой Четвёртой армии Гуандуна, кажется, что Ван пытается разжечь раскол между возможным союзом федералистов и [716.owner.GetAdjectiveCap] против него.\n\nВместо этого он предложил восстановить старый Альянс конституционной защиты с условиями, явно выгодными его лагерю. Опираясь на очевидную силу [CHI.GetName], он в общих чертах согласился принять ограниченные федералистские принципы и региональную автономию в обмен на подчинение нашего движения Гоминьдану. Его люди разжигают патриотические настроения в наших рядах, утверждая, что национальное единство для освобождения Маньчжурии — первоочередная задача.\n\nСтолкнувшись с такой сложной ситуацией, [ROOT.GetLeader] и его ближайшее окружение вынуждены тщательно взвешивать варианты. Учитывая нестабильность правительства Гоминьдана, возможно, лучше просто выждать и найти более выгодный момент для сопротивления. А если повезёт, удастся подтолкнуть партийно-государственную систему к более демократическому развитию. С другой стороны, слишком долгое ожидание ослабит наши позиции и обречёт надежду Китая на более демократическое будущее."
CHI.lategame.901.a: "Ради нашей нации и республики мы с неохотой принимаем."
CHI.lategame.901.b: "Ради свободы и демократии мы должны отказаться!"

CHI.lategame.902.t: "Обновлённый республиканский альянс"
CHI.lategame.902.d: "Благодаря поддержке многих бывших командиров Четвёртой армии, таких как Ли Цзишэнь, Чжан Факуй, Чэнь Миншу (и других), было заключено чрезвычайно выгодное соглашение с федералистами под руководством [FROM.GetLeader]. В обмен на символическое признание региональной автономии и другие демократические обещания, [FROM.GetNameDef] согласился подчиниться нам ради защиты Маньчжурии от иностранных империалистов.\n\nЭто большой дипломатический успех, который приближает нацию к объединению без единого выстрела. Мы предотвратили возможный союз северо-восточных военных владык и юга, избежав зажима. Однако ещё предстоит увидеть, примут ли это решение полностью внутри федералистского движения.\n\nВ нашем лагере уже возникли разногласия. Ван умело прячет свою позицию за фракцией Реконструкции, которая открыто приветствовала соглашение. Вместе с тем, он скрытно держит руку в делах, хотя многие уже отошли к радикальному Временном Комитету действий. Ван ясно даёт понять, что этот шаг не был лёгким, и он сделал это ради спасения страны. Теперь ему предстоит пережить грядущие испытания."
CHI.lategame.902.a: "Необходимый компромисс ради единства нации!"

CHI.lategame.903.t: "Федералистские переговоры зашли в тупик!"
CHI.lategame.903.d: "Несмотря на помощь многих бывших командиров Четвёртой армии, таких как Ли Цзишэнь, Чжан Факуй, Чэнь Миншу (и других), соглашение между Гоминьданом и федералистским правительством так и не было достигнуто. Противники в течение более десяти лет, [FROM.GetLeader] решительно отверг наше предложение признать региональную автономию и местные выборы в переходный период. Он не доверяет нашей способности выполнить обязательства. Вместо этого он обвинил нас в попытке использовать его движение против усиливающегося присутствия [716.owner.GetAdjectiveCap] на северо-востоке, надеясь отправить своих людей на верную гибель, пока мы сидим сложа руки.\n\nНеудивительно, что переговоры провалились. Ван Цзинвэй искусно скрывался за фракцией Реконструкции, открыто поддерживавшей переговоры. Он научился держать руку в тени, избежав прежних конфликтов по федералистскому вопросу. С учётом давления с северо-востока и юго-запада, Гоминьдану остаётся лишь ужесточить позицию и разгромить обе стороны для национального объединения. К их чести, офицеры Национально-революционной армии настроены решительно."
CHI.lategame.903.a: "Болтать с ними — пустая трата времени."

CHI.lategame.904.t: "[FROM.GetLeader] подчиняется [FROM.FROM.Capital.GetCapitalVictoryPointName]"
CHI.lategame.904.d: "После интенсивных переговоров между [FROM.FROM.Capital.GetCapitalVictoryPointName] и [FROM.Capital.GetCapitalVictoryPointName] два соперничающих правительства объединились в пользу Гоминьдана. [FROM.GetLeader] объявил о включении Объединённых провинций Китая в состав [CHI.GetName], что отражает растущую власть социалистического партийно-государственного аппарата.\n\nВ своей речи бывший лидер федералистов заявил о стремлении приблизить нацию к мирному объединению, подчеркнув ключевые уступки, достигнутые с [FROM.FROM.GetLeader] и Центральным исполнительным комитетом Гоминьдана. Он также осудил присутствие [716.owner.GetAdjectiveCap] в Маньчжурии, назвав его продолжением иностранного империализма и потребовав скорейшего возвращения под китайский контроль.\n\nОднако внутри нашего лагеря есть опасения. [FROM.GetLeader] не представляет всех федералистов, а условия сделки явно выгодны Гоминьдану. Он даже не получил места в ЦИК, довольствуясь представительством в Законодательном юане, хотя все знают, что реальная власть — в ЦИК.\n\nИз-за авторитарного и культа личности стиля правления появились призывы сопротивляться наступающему контролю. С другой стороны, поскольку большая часть старого федералистского центра вошла в состав Гоминьдана, у нас мало выбора, кроме как принять это."
CHI.lategame.904.a: "Федералистское движение должно оставаться единым..."
CHI.lategame.904.b: "Он продал федералистское движение!"

CHI.lategame.905.t: "[FROM.GetNameDefCap] принимает федералистский компромисс!"
CHI.lategame.905.d: "После серьёзных раздумий, [FROM.GetLeader] и его правительство решили присоединиться к мейнстриму федералистов. Это привело к вхождению [FROM.GetAdjective] сил под знамёна Гоминьдана и приблизило наше правительство к национальному объединению. Приход реакционеров в Законодательный юань (к счастью, их не допустили в Центральный исполнительный комитет партии) вызвал опасения проникновения реакционных элементов, но пока сделка держится."
CHI.lategame.905.a: "И правильно делают..."

CHI.lategame.906.t: "[FROM.GetNameDefCap] восстаёт против федералистского компромисса!"
CHI.lategame.906.d: "После размышлений [FROM.GetLeader] и его региональная клика решили отделиться от мейнстрима федералистов. [FROM.GetAdjective] силы начали открыто противостоять своим бывшим товарищам федералистам, резко разорвав связь с нашим правлением и надеждами на мирное объединение. Они рассчитывали на широкое восстание, но с учётом того, что старый федералистский центр уже принял соглашение как факт, им, к счастью, придётся действовать в одиночку. Тем не менее, это восстание стало серьёзным ударом по переговорным надеждам и подорвало поддержку в нашей партии."
CHI.lategame.906.a: "Мы же договорились!"

CHI.lategame.910.t: "[FROM.GetAdjectiveCap] измена!"
CHI.lategame.910.d: "Когда мы впервые добились соглашения с [FROM.GetNameDef], казалось, что это слишком хорошо, чтобы быть правдой. К сожалению, так оно и оказалось. [FROM.GetLeader] лишь выжидал, подыскивая момент нашей слабости для решительного удара. Скоординировано и с беспрецедентной скоростью его силы обратились против нас — стремясь уничтожить нас в самый уязвимый момент. В довершение всего, он попытался узаконить свой переворот, объявив нас будущими тиранами и оклеветав всевозможными ложными обвинениями о нарушенных обещаниях. Если наша революция должна выжить, восстание [FROM.GetAdjectiveCap] должно быть подавлено как можно скорее. Остаётся только узнать, сколько ещё присоединится к его измене."
CHI.lategame.910.a: "Предательство!"

CHI.lategame.911.t: "[FROM.GetAdjectiveCap] восстание!"
CHI.lategame.911.d: "После нарастания напряжённости между [FROM.GetNameDef] и их бывшими союзниками из Гоминьдана, похоже, [FROM.GetLeader] не выдержал. Приняв решительные меры, он поднял [FROM.GetAdjectiveCap] силы на восстание, выступив против [CHI.Capital.GetCapitalVictoryPointName] в смелом бунте. Он призвал все \"свободные\" китайские фракции сопротивляться социалистической тирании, надеясь создать широкий альянс повстанцев, который разрушит власть [CHI.GetLeader] прежде, чем Гоминьдан успеет укрепиться. По его словам, несмотря на текущую ситуацию, Гоминьдан доказал, что слишком опасен, чтобы оставаться у власти.\n\nПо мере того как титаны сталкиваются по всему Китаю, [ROOT.GetLeader] собирает свой штаб для решения дальнейших действий. Делать ставку на ту или иную сторону всегда рискованно, особенно если проиграешь. Хотя победа не гарантирует безопасность. Некоторых привлекает идея идти своим путём, независимо от соперничающих лидеров. С проблеском амбиций [ROOT.GetLeader] задумывается, не был ли бы он лучшим лидером, чем все остальные претенденты на Китай."
CHI.lategame.911.a: "Пора заявить о своих правах на славу."
CHI.lategame.911.b: "Оставаться верным центральному правительству!"
CHI.lategame.911.c: "Встать на сторону [UPC.GetNameDef]."
CHI.lategame.911.e: "Встать на сторону [RKT.GetNameDef]."

CHI.lategame.912.t: "[FROM.GetNameDefCap] объявляет нейтралитет!"
CHI.lategame.912.d: "После размышлений [FROM.GetLeader] объявил свою провинцию \"нейтральной\" в разгар развала правительства Гоминьдана. Таким образом он отверг призывы как повстанцев, так и центрального правительства, вызвав недовольство обеих сторон. Существует предположение, что [FROM.GetAdjective] армия готовит собственное наступление, хотя пока довольна укреплением границ. В нашем руководстве обсуждается, стоит ли продолжать конфликт, ведь сомнительно, что они навсегда останутся нейтральными. Как бы то ни было, это серьёзный удар по власти [CHI.GetLeader]."
CHI.lategame.912.a: "Они так легко не уйдут!"
CHI.lategame.912.b: "В конце концов нейтральных не бывает."

CHI.lategame.913.t: "[FROM.GetNameDefCap] остаётся лояльным!"
CHI.lategame.913.d: "После обсуждений [FROM.GetLeader] объявил свою провинцию лояльной правительству Гоминьдана под руководством [CHI.GetLeader], даже несмотря на распад из-за восстания. Будь то искренняя преданность революции партии, страх перед репрессиями или прагматизм, он отверг предложения повстанцев и поддержал центральное правительство. Это укрепило спорную легитимность [CHI.GetLeader], хотя остаётся неизвестным, хватит ли этого для перелома хода войны."
CHI.lategame.913.a: "Мы благодарны."
CHI.lategame.913.b: "Трусость и глупость."
CHI.lategame.914.t: "[FROM.GetNameDefCap] Присоединяется к федералистскому восстанию!"
CHI.lategame.914.d: "После некоторого обдумывания [FROM.GetLeader] объявил свою провинцию лояльной федералистскому правительству [UPC.GetLeader], которое борется с мощью правительства Гоминьдана. Будь то искренняя преданность федералистскому делу, страх пойти ко дну вместе с тонущим кораблём или иная форма прагматизма, он отверг предложения правительства и примкнул к их противникам. Это ослабило спорную легитимность [CHI.GetLeader], хотя пока неизвестно, будет ли этого достаточно, чтобы изменить ход войны."
CHI.lategame.914.a: "Мы отомстим предателям!"
CHI.lategame.914.b: "Правительство Гоминьдана разваливается."

CHI.lategame.915.t: "[FROM.GetNameDefCap] Присоединяется к правому восстанию!"
CHI.lategame.915.d: "После некоторого обдумывания [FROM.GetLeader] объявил свою провинцию лояльной правому расколу Гоминьдана под руководством [RKT.GetLeader], который борется с могуществом левого Центрального исполнительного комитета. Будь то искренняя преданность антисоциалистскому делу, страх пойти ко дну вместе с тонущим кораблём или иная форма прагматизма, он отверг предложения правительства и примкнул к их противникам. Это ослабило спорную легитимность [CHI.GetLeader], хотя пока неизвестно, будет ли этого достаточно, чтобы изменить ход войны."
CHI.lategame.915.a: "Мы отомстим партийным еретикам!"
CHI.lategame.915.b: "Правительство Гоминьдана разваливается."

CHI.lategame.931.t: "Альянс Гоминьдана?"
CHI.lategame.931.d: "Жестко разделённые в толковании Трёх принципов и под влиянием соперничающих политиков, кажется, что общее политическое наследие и китайский национализм вновь объединили партию против коррумпированных беяновских военных владык и их иностранных покровителей. Хотя было бы преувеличением сказать, что наши армии сражались как единое целое, похоже, что мы теперь разделяем давно желанную победу партии.\n\nК сожалению для нас, похоже, что наши левые \"товарищи\" первыми достигли Пекина, успешно захватив ключевые города в своём долгом марше на север. На пороге национального лидерства им противостоят две главные преграды. Одна — присутствие [716.owner.GetAdjectiveCap] в Маньчжурии. Другая — мы и наши претензии на наследие доктора Сунь.\n\nМы не испытываем симпатий к [716.owner.GetAdjective] бандитам, но [ROOT.GetLeader] мало хорошего говорит о [FROM.GetLeader]. Тем не менее, многие в партии и особенно в рядах Национально-революционной армии стремились расширить пакт, который сверг беяновцев, апеллируя к общему национализму против растущей угрозы Японии и других империалистов. Сунь Фо и его центристская фракция Реконструкции выступили с инициативой примирения долго враждовавших фракций Гоминьдана.\n\nПредложенные ими условия, якобы для защиты гражданского правления и смягчения революционного иконоборчества левых, явно выгодны правительству в [FROM.Capital.GetCapitalVictoryPointName]. Мы фактически подчиняем наши войска их Военной комиссии, сохраняя автономное управление в наших военных регионах. Тем не менее, с высоким уровнем патриотизма даже в рядах [ROOT.GetRulingParty], трудно отказаться от этого шанса мирного объединения нации. Возможно, позже мы сможем продвинуть партию к нашему видению будущего."
CHI.lategame.931.a: "Ради нашей нации и партии мы с неохотой принимаем."
CHI.lategame.931.b: "Ради республики и нации мы должны отказаться!"

CHI.lategame.932.t: "Раздор Гоминьдана исцелен?"
CHI.lategame.932.d: "Благодаря растущему призыву к единому фронту против иностранного империализма, особенно поддержанному Сунь Фо и фракцией Реконструкции, было достигнуто крайне выгодное \"примирение\" с правыми Гоминьдана под руководством [FROM.GetLeader]. В обмен на демократические обещания и участие в нашем процессе принятия решений, [FROM.GetNameDef] согласился подчиниться нам ради защиты Маньчжурии от иностранных империалистов.\n\nЭто отражает стойкую силу национализма в нашей партии, и хотя запланированное слияние соперничающих центральных комитетов потребует времени, пока необходимы время для выстраивания доверия и координации на индивидуальной основе.\n\nВ нашем лагере много разногласий. Главными сторонниками соглашения была фракция Реконструкции, которая публично обеспечила такое согласие. Их тихо поддержали члены Ассоциации однокурсников Революционной школы Военной академии Уанпха, хотя их обычные союзники из Временного Комитета действий старались дистанцироваться. Это не помешало им терять позиции слева, уступая место фракции Ван Цзинвэя и радикалам вне партии, которые пока стиснули зубы. В частных разговорах звучат обвинения в \"продаже\" революции."
CHI.lategame.932.a: "Наследники доктора Сунь объединяются!"

CHI.lategame.933.t: "Переговоры Гоминьдана зашли в тупик!"
CHI.lategame.933.d: "Несмотря на публичные призывы к единству перед лицом империалистической агрессии, включая активность Сунь Фо и фракции Реконструкции, кажется, что вечно разделённый Гоминьдан не смог достичь соглашения между правительствами Гоминьдана в [FROM.Capital.GetCapitalVictoryPointName] и [ROOT.Captial.GetCapitalVictoryPointName].\n\nНаши соперничающие расколы не смогли преодолеть накопившуюся за годы вражду — взаимные убийства, предательства и обвинения в измене подорвали единство партии. С другой стороны, возможно, наши цели всегда были несовместимы, и призывы к единству — лишь мечты.\n\nВ любом случае, обмениваясь взаимными обвинениями в том, кто является военным владыкой-реакционером, а кто социалистическим подрывным элементом, престиж Уанпха, которым партия гордилась долгое время, серьёзно пострадал. Хотя фракция Реконструкции была публичным лицом переговоров, офицеры Ассоциации однокурсников Революционной школы Военной академии Уанпха рассматривались как «мускулы» переговоров, и их неудача плохо отражается на них. Многие теперь сомневаются в их репутации как беспристрастной силы, а имидж Ли Цзишэня, который он тщательно создавал, подорван. В то время как Временный Комитет действий дистанцируется от своих союзников из Ассоциации, их отступление осложняется нарастающей антиустановочной радикальной волной даже в рядах армии."
CHI.lategame.933.a: "Партийным еретикам нельзя доверять."

CHI.lategame.934.t: "[FROM.GetLeader] подчиняется [FROM.FROM.Capital.GetCapitalVictoryPointName]"
CHI.lategame.934.d: "После интенсивных переговоров между [FROM.FROM.Capital.GetCapitalVictoryPointName] и [FROM.Capital.GetCapitalVictoryPointName], кажется, что два соперничающих правительства объединились в пользу левого раскола Гоминьдана. [FROM.GetLeader] объявил о слиянии обоих центральных комитетов под единым знаменем [CHI.GetName], что отражает растущую власть социалистического партийно-государственного аппарата.\n\nВ своей речи бывший председатель правой фракции заявил о желании приблизить нацию к мирному объединению, отметив ключевые уступки, достигнутые у [FROM.FROM.GetLeader]. Более того, он осудил присутствие [716.owner.GetAdjectiveCap] в Маньчжурии, назвав это продолжением иностранного империализма и потребовав скорейшего возвращения территории под китайский контроль.\n\nОднако внутри нашего лагеря много опасений. [FROM.GetLeader] должен был стать альтернативой социализму, сдерживая его распространение. Это соглашение лишь позволит синдикалистскому влиянию безнаказанно расширяться внутри наших границ, усиливая красное влияние. Кроме того, планы по слиянию центральных комитетов отложены до объединения, что подчёркивает явную слабость правых.\n\nПока неизвестно, будут ли мы включены в эти переговоры, [ROOT.GetLeader] воспринимается скорее как второстепенный участник. С другой стороны, поскольку большая часть старых правых Гоминьдана вошла в правительство, у нас мало выбора, кроме как принять это."
CHI.lategame.934.a: "Гоминьдан должен оставаться единым..."
CHI.lategame.934.b: "Он продал нас социалистам!"

CHI.lategame.935.t: "[FROM.GetNameDefCap] принимает компромисс Гоминьдана!"
CHI.lategame.935.d: "После серьёзных раздумий, кажется, что [FROM.GetLeader] и его правительство решили присоединиться к мейнстриму правого крыла Гоминьдана. Это привело к объединению [FROM.GetAdjective] сил под единым знаменем Гоминьдана и приблизило наше правительство к национальному объединению. Приход реакционеров в Законодательный юань (с возможностью их включения в Центральный исполнительный комитет после объединения) вызвал опасения проникновения реакционеров, но пока сделка держится."
CHI.lategame.935.a: "И правильно делают..."

CHI.lategame.936.t: "[FROM.GetNameDefCap] восстаёт против компромисса Гоминьдана!"
CHI.lategame.936.d: "После серьёзных раздумий, кажется, что [FROM.GetLeader] и его региональная клика решили отделиться от мейнстрима Гоминьдана. [FROM.GetAdjective] силы начали противостоять своим бывшим правым товарищам, резко порвав с нашим правлением и надеждами на мирное объединение. Они, видимо, рассчитывали на широкое восстание, но учитывая, что старый центр правого крыла уже принял соглашение как факт, им, к счастью, придётся действовать в одиночку. Тем не менее, это восстание стало ударом по надеждам переговорщиков и навредило принятию подобных соглашений в нашей партии."
CHI.lategame.936.a: "Мы же договорились!"

###- End Game Events -###

##Section 4a (000-199): Foreign Policy Events
CHI.endgame.001.t: "[CHI.GetFactionName] Восстаёт"
CHI.endgame.001.d.song: "Сегодня Министерство иностранных дел Китайской Республики объявило о новом направлении внешней политики Китая. Ссылаясь на успехи Китайской национальной революции и антиимпериалистическую позицию Китайской националистической партии — Китайская Республика официально заявила о намерении работать с новыми независимыми странами Азии в рамках Ассоциации дружбы Сино-Тихоокеанского региона.\n\nПланируемое направление ассоциации — сотрудничество с дружественными, в том числе социалистическими, странами Азии и Африки для содействия экономическому развитию и национальной самодостаточности в формирующемся новом мировом порядке, где страны стремятся дистанцироваться как от Рейхспакта, так и от Третьего Интернационала."
CHI.endgame.001.d.wang: "Сегодня Министерство иностранных дел Китайской Республики объявило о новом направлении внешней политики Китая. Ссылаясь на успехи Китайской национальной революции и антиимпериалистическую позицию Китайской националистической партии — Китайская Республика официально заявила о создании собственной «Интернационалы» в Азии.\n\nЦелями и направлением этой Интернационалы станет предоставление экономической и политической помощи всем азиатским странам вне зависимости от их идеологии и религии, чтобы дать им возможность участвовать в формирующемся новом мировом порядке, где недавно освобождённые страны смогут бросить вызов гегемонии Антанты и Рейхспакта."
CHI.endgame.001.d.chen: "Сегодня Министерство иностранных дел Китайской Республики объявило о новом направлении внешней политики Китая. Ссылаясь на успехи Китайской национальной революции и антиимпериалистическую позицию Китайской националистической партии — Китайская Республика официально заявила о создании собственной «Интернационалы» в Азии.\n\nКроме того, председатель [CHI.GetLeader] также объявил о создании «Народного кооперативного экономического партнёрства Миншэн» для развития экономического сотрудничества между странами Азии с одновременным продвижением Трёх принципов народа. Этот шаг значительно бросает вызов гегемонии Запада — кажется, что азиатские страны участвуют в формирующемся новом мировом порядке."
CHI.endgame.001.d.hu: "Сегодня Министерство иностранных дел Китайской Республики объявило, что правительство Китая намерено проводить жёсткую линию во внешней политике, и что дела Китая и его приграничных территорий отныне будут управляться самим Китаем.\n\nИностранные наблюдатели прозвали эту китайскую политику Синосферой, поскольку генералиссимус [CHI.GetLeader] и Общество возрождения Китая заявили, что намерены вести этно- и ультранационалистический курс в мировом раскладе."
CHI.endgame.001.a: "Угроза на Востоке!"
CHI.endgame.001.b: "Освободительная сила?"
CHI.endgame.001.c: "Китай демонстрирует свою мощь."

CHI.endgame.002.t: "Приглашение вступить в [FROM.GetFactionName]"
CHI.endgame.002.d: "Сегодня утром наш посол принял китайскую делегацию из [CHI.GetNameDef], возглавляемую послом Гоминьдана Чен Южэнем. Китайский посол известен по всему Азиатско-Тихоокеанскому региону своими усилиями по организации освободительных и антиколониальных движений во время пика Китайской национальной революции.\n\nПосол искренне выразил надежду на совместную работу с китайским правительством в духе солидарности международной антиколониальной революции против иностранного империализма. Наши ресурсы будут разделены, а военные силы активно сотрудничать в совместных учениях для укрепления паназиатского сотрудничества.\n\nХотя в нашем правительстве есть сторонники такого решения, другие относятся с подозрением к намерениям Китая и опасаются, что мы можем оказаться лишь марионетками в их новом азиатском порядке."
CHI.endgame.002.a: "Вместе ради паназиатизма!"
CHI.endgame.002.b: "Нет, нам это ничего не даст!"

CHI.endgame.003.t: "[FROM.GetNameDefCap] присоединяется к нам!"
CHI.endgame.003.d: "Похоже, что посол Чен вновь добился впечатляющего дипломатического успеха, сумев убедить [FROM.GetNameDef] сотрудничать с нами и участвовать в великой международной борьбе и революции против иностранного империализма. Надеемся, что эти отношения с [FROM.GetNameDef] продлятся вечно, пока мы решительно объявляем войну всем иностранным империалистам — за свободную Азию!"
CHI.endgame.003.a: "Вместе мы сильны!"

CHI.endgame.004.t: "[FROM.GetNameDefCap] отклоняет наше приглашение"
CHI.endgame.004.d: "К сожалению, несмотря на все усилия, посол Чен не смог убедить [FROM.GetNameDef] присоединиться к нашей общей антиимпериалистической борьбе. Похоже, народ [FROM.GetNameDef] либо усмотрел худшее в наших намерениях, либо просто не считает нашу силу серьёзной. Они выбрали стоять в одиночестве без нашей защиты и руководства, рискуя сами собой."
CHI.endgame.004.a: "Их потеря."

CHI.endgame.005.t: "Афро-Азиатская конференция"
CHI.endgame.005.nomafcollapse.d: "Старый мировой порядок Кайзергейха был потрясён после краха капиталистической глобальной экономики вследствие Чёрного понедельника. В Азии экономический крах [GER.GetNameDef] вызвал волну потрясений в колониальном мире, включая Восстание в Индокитае в 1936 году и распад Лиги восьми провинций. Недавнее завершение Северной экспедиции и Война сопротивления укрепили [CHI.GetNameDef] как первую азиатскую нацию, успешно разгромившую силы империализма.\n\nВ результате [CHI.GetLeader] и Министерство иностранных дел Гоминьдана решили организовать Афро-Азиатскую конференцию лидеров и послов развивающегося мира для обсуждения новых политических изменений. Хотя африканские страны ещё не получили независимость от немцев, китайцы с радостью приветствуют африканских революционеров как товарищей по борьбе в международной войне против империализма.\n\nДелегаты конференции решили утвердить ключевые принципы управления постколониальным Афро-Азиатским миром, включая установление доброй воли между всеми участниками, изучение социальных и культурных проблем и повышение международной видимости развивающегося мира. Наступает новая эпоха в Азии, и китайская нация под руководством [CHI.GetLeader] с радостью играет активную роль в продвижении общего будущего развивающихся стран."
CHI.endgame.005.mafcollapse.d: "Старый мировой порядок Кайзергейха был потрясён после краха капиталистической глобальной экономики вследствие Чёрного понедельника. В Азии экономический крах [GER.GetNameDef] вызвал волну потрясений в колониальном мире, включая Восстание в Индокитае в 1936 году и распад Лиги восьми провинций. Недавнее завершение Северной экспедиции и Война сопротивления укрепили [CHI.GetNameDef] как первую азиатскую нацию, успешно разгромившую силы империализма.\n\nВследствие драматического краха и распада немецкой Миттельафрики возрос африканский национализм, и китайцы с радостью приветствуют новые африканские государства как революционных товарищей в международной войне против империализма.\n\nДелегаты конференции решили утвердить ключевые принципы управления постколониальным Афро-Азиатским миром, включая установление доброй воли между всеми участниками, изучение социальных и культурных проблем и повышение международной видимости развивающегося мира. Наступает новая эпоха в Азии, и китайская нация под руководством [CHI.GetLeader] с радостью играет активную роль в продвижении общего будущего развивающихся стран."
CHI.endgame.005.a: "За новую эпоху!"
CHI.endgame.005.b: "Похвальная инициатива!"
CHI.endgame.005.c: "У нас свои планы."

CHI.endgame.006.t: "[FROM.GetNameDefCap] предлагает инвестиции"
CHI.endgame.006.d: "Сегодня утром мы получили известия от посла [FROM.GetNameDef], что их страна хочет инвестировать в наше новое молодое государство. Мы недавно завоевали и закрепили независимость, но наша промышленная и капитальная база уступает остальным индустриальным странам мира. [FROM.GetNameDef] предложила вложить инвестиции, чтобы ускорить процесс индустриализации и помочь нам противостоять капиталистическим тенденциям империалистических держав. Однако некоторые в нашем правительстве выступают против этого, опасаясь нежелательного влияния [FROM.GetNameDef] и возможной попытки воспользоваться нашим молодым государством."
CHI.endgame.006.a: "Мы с благодарностью принимаем."
CHI.endgame.006.b: "Мы вежливо отказываемся."

CHI.endgame.007.t: "[FROM.GetNameDefCap] принимает инвестиции"
CHI.endgame.007.d: "Мы получили отличные новости от нашего посла в [FROM.GetNameDef], что их страна приняла наши инвестиционные предложения. Вместе мы сможем укрепить экономическую мощь и помочь им стать новой восходящей силой, одновременно содействуя нашим промышленным и восстановительным усилиям. Пусть это станет началом долгого и плодотворного сотрудничества!"
CHI.endgame.007.a: "Начало плодотворного партнёрства."

CHI.endgame.008.t: "[FROM.GetNameDefCap] отвергает инвестиции"
CHI.endgame.008.d: "Мы получили разочаровывающие новости от нашего посла в [FROM.GetNameDef], что они отказались принять наше инвестиционное предложение и отвергли наш любезный жест. Возможно, они считают нашу инициативу угрозой или просто не доверяют, что наши намерения взаимовыгодны. Как бы то ни было, это их потеря, что они отвергли наше щедрое предложение."
CHI.endgame.008.a: "В любом случае, желаем им удачи. Им это пригодится."

 #Joining the INT has been moved to generic China decisions category

 CHI.endgame.012.t: "Нас приглашают вступить в МНКЭП"
CHI.endgame.012.d: "После объявления нового курса во внешней политике и международной торговле, [FROM.GetNameDef] объявила о создании «Народного кооперативного экономического партнёрства Миншэн» (МНКЭП). Посвящённое борьбе с угнетающими режимами капитализма и предоставлению молодым азиатским странам возможности модернизироваться в условиях недостаточной индустриализации, МНКЭП стремится объединить страны Азии в экономический союз под руководством Китая. В то время как многие в нашем правительстве поддерживают эту инициативу и верят, что она принесёт значительную пользу нашей экономике — есть и те, кто рассматривает это сотрудничество как акт китайского империализма, поскольку оно организовано и сосредоточено вокруг китайского лидерства."
CHI.endgame.012.a: "Тост за наших китайских товарищей!"
CHI.endgame.012.b: "Нет, спасибо."

CHI.endgame.013.t: "[FROM.GetNameDefCap] вступает в МНКЭП"
CHI.endgame.013.d: "Мы получили известия от посла [FROM.GetNameDef], что их страна рада объявить о решении вступить в Народное кооперативное экономическое партнёрство Миншэн. Мы аплодируем их мудрому решению и с нетерпением ждём совместной работы с нашими товарищами по созданию Азии, свободной от империализма."
CHI.endgame.013.a: "Да здравствует антиимпериализм!"

CHI.endgame.014.t: "[FROM.GetNameDefCap] отклоняет членство в МНКЭП"
CHI.endgame.014.d: "Мы получили известия от посла [FROM.GetNameDef], что их страна не желает вступать в Народное кооперативное экономическое партнёрство Миншэн. Возможно, они подозревают у нас скрытые намерения или сомневаются в справедливом распределении ресурсов, поэтому отказались участвовать в общем антиколониальном сопротивлении. Хотя это и огорчительно слышать, они пожалеют о своём решении, став жертвами капитализма и империализма. Только благодаря паназиатскому сотрудничеству угнетённые народы смогут объединиться и работать вместе."
CHI.endgame.014.a: "Жалко."

CHI.endgame.041.t: "Возвращение Временного правительства Республики Корея"
CHI.endgame.041.d: "В результате японской оккупации их страны в 1920-х годах, в Маньчжурии, Северной Корее и материковом Китае действовали различные корейские партизанские отряды. Получив военную и экономическую поддержку от китайского Гоминьдана, левая фракция Временного правительства Республики Корея теперь доминирует на политической сцене новой независимой революционной Кореи.\n\nЛевая фракция ВПРК, возглавляемая Ким Вонбоном, корейским революционером в изгнании и выпускником Вампоа, базируется в Шанхае с 1935 года. Эта так называемая Корейская национально-революционная партия разделяет многие политические ценности с китайским Гоминьданом и фактически выступает братской партией в потенциальном корейском государстве. После победы Китая над японцами во Второй китайско-японской войне Вонбон официально подал в отставку с поста генерала Национально-революционной армии, чтобы возглавить недавно освобождённую Республику Корея."
CHI.endgame.041.a: "Чудесно."

CHI.endgame.042.t: "Добровольцы Малайзии возвращаются домой"
CHI.endgame.042.d: "Когда наши войска взяли под контроль территории Малайзии, мы смогли заключить соглашения с местными революционерами, сочувствующими нашим антиимпериалистическим целям. Различные борцы за свободу вступили в ряды растущей армии Трёх звёзд, помогая нам изгнать угнетателей наших малайзийских братьев.\n\nПосле победы в войне мы сдержали обещания и поддержали создание [MAL.GetNameDef]. Основу армии нового независимого государства, вероятно, составят ветераны старой армии Трёх звёзд, обученные нашими офицерами и вооружённые нашей техникой. Мы можем только надеяться, что это обеспечит тесные связи на долгие годы, озаряя новую зарю для свободной Азии."
CHI.endgame.042.a: "Прощайте, товарищи!"

CHI.endgame.043.t: "Союзное собрание Папуа и Новой Гвинеи"
CHI.endgame.043.d: "После освобождения Папуа и Новой Гвинеи в городе Порт-Морсби был создан временный парламент. Сотни делегатов собрались на «Союзном собрании Папуа и Новой Гвинеи», именуемом просто Гунг (Совет). Образованная часть коренного населения островов невелика, а политическое сознание практически отсутствует. В отличие от многих других колоний, где европейцы пытались просветить местных жителей и вестернизировать их, интеллигенция Папуа и Новой Гвинеи состоит в основном из выпускников христианских миссионерских школ и немногих метисов, учившихся в европейских университетах.\n\nМы нашли подходящую фигуру для временного правительства — бывшего профсоюзного деятеля по имени Сумсума. Он приобрёл известность, основав современные трудовые движения Папуа и Новой Гвинеи в 1929 году, возглавив крупную забастовку в бывшей немецкой колониальной столице Рабауле. Сумсума был заключён в тюрьму за свои действия и после освобождения вел скрытный образ жизни, проживая на острове Боанг, одном из северных островов Танга.\n\nКогда колониальные власти Новой Гвинеи были вынуждены отступить, он был избран королём народа Танга и использовал эту позицию для создания нового политического движения. К моменту прихода наших войск в Порт-Морсби и Лае имя «Сумсума» уже пользовалось большим уважением, а его сторонники сформировали организацию под названием «Комитет тринадцати».\n\nЭтот комитет стал первой коренной политической партией бывшей колонии и активно продвигает так называемый «Национальный союз» всех этнических групп и рас островов. Благодаря опыту Сумсумы как профсоюзного активиста и одного из наиболее политически активных коренных жителей, он и его соратники восприимчивы к нашей антиимпериалистической риторике. Хотя он мало понимает в социализме и общем антиколониальном движении, даже если его взгляды на права рабочих, демократию и национальное освобождение несовершенны, он остаётся лучшим лидером для укрепления нашего контроля над Папуа и Новой Гвинеей."
CHI.endgame.043.a: "Желаем им удачи!"

CHI.endgame.044.t: "Сингапур под контролем Китая"
CHI.endgame.044.d: "После освобождения Малайского полуострова Общество Возрождения Китая начало создавать оккупационные зоны и заручаться поддержкой местного восточноазиатского населения. Особого внимания заслуживают два региона — Сингапур и Пенанг. Первый — самый развитый город Малайского архипелага и стратегический военный форпост, второй — крупное китайское поселение с историческим значением для Гоминьдана. Пенанг был передан британцам местным малайзийским султаном в XVIII веке, позже его заселили хоккиенские торговцы и рабочие, создавая уникальную китайскую диаспору с глубокими корнями в регионе. Наши родственники из Пенанга поддерживали Гоминьдан и его предшественников с дореволюционных времён, а остров даже служил убежищем великому Сунь Ятсену во время изгнания в 1910-х годах. В Сингапуре также проживает огромное китайское население — около 50–60% жителей, хотя не все поддерживают наши идеи панкитайской солидарности. Поскольку Сингапур и Пенанг находятся примерно в 5000 километрах от китайской территории, управление ими станет серьёзной задачей для правительства в [CHI.Capital.GetCapitalVictoryPointName].\n\nХотя мы можем опираться на инфраструктуру освобождённых союзников и достижения в области телекоммуникаций, очевидно, что оба региона нуждаются в создании автономных муниципальных органов власти для выполнения функций форпостов революции и её защиты.\n\nПредлагается создание «Тэбье Синчжэнцю» (Специальных административных районов) с местными правительствами, сформированными из коренного зарубежного китайского населения, а также под политическим руководством («Чжэнчжи Чжидао») назначаемых из [CHI.Capital.GetCapitalVictoryPointName] региональных бюро. Эта гибридная система предложена как временная мера («Линши Синчжэн Вэйюань» — Временный исполнительный комитет). Её эффективность должна быть проверена, чтобы избежать необходимости более радикальных решений для поддержания «революционных форпостов»."
CHI.endgame.044.a: "Новая эпоха для нового Сингапура."

CHI.endgame.045.t: "Новый социалистический рассвет для Японии"
CHI.endgame.045.d: "Из-за репрессий японского правительства многие японские социалисты бежали из страны и нашли убежище в китайском Гоминьдане. Теперь, когда родные острова Японии освобождены, эти социалисты сформировали временное правительство новой социалистической Японии. Во главе временного правительства стоит недавно созданная Японская национальная партия.\n\nЭта новая революционная партия переняла многие политические принципы китайского Гоминьдана и надеется повести Японию в новое левое направление. Лидером Японской национальной партии является Носака Сандзо, японский революционер, который присягнул на верность Национально-революционной армии Китая после её восстановления на материковом Китае. С падением Японской империи и созданием ЯНП Носака официально подал в отставку с поста генерала Национально-революционной армии, чтобы возглавить новую социалистическую Японию."
CHI.endgame.045.a: "Японские рабочие наконец-то свободны."

CHI.endgame.046.t: "Военный трибунал по Дальнему Востоку"
CHI.endgame.046.d: "Сегодня Республика Китай созвала Военный трибунал по Дальнему Востоку в Токио, чтобы привлечь к ответственности политическое и военное руководство Японии за развязывание Второй китайско-японской войны. В заседаниях участвуют ведущие адвокаты обеих стран, обвинение полагает, что добьётся признания виновными за тысячи жертв японских зверств во время войны. [FROM.FROM.Capital.GetCapitalVictoryPointName] также заинтересован в успехе процесса, считая его частью демилитаризации японского общества.\n\nХотя международные критики сомневаются в легитимности суда и вынесенных решениях, китайские СМИ с энтузиазмом освещают события, распространяя национальное сознание и патриотизм среди населения."
CHI.endgame.046.a: "Правосудие восторжествует."

CHI.endgame.050.t: "Окончательная победа над империализмом"
CHI.endgame.050.d: "Веками ветры великих морей Наньхай и Тихого океана дунули к Срединному царству, воздавая дань великой цивилизационной державе Китая. Эти ветры судьбы позволили десяткам тысяч китайцев эмигрировать и создавать диаспоры в Малайзии, Сингапуре, Вьетнаме и Таиланде — где бы они ни находились, они связывали китайские общины, несмотря на региональные и культурные различия. Истинное место Китая — в Азии.\n\nОднако в прошлом столетии этого не было. Нас унижали не только западные империалисты, разрывавшие страны Востока под знаменем колониализма, но и японские вокоу, которые воспользовались ослаблением Китая для своих империалистических амбиций. В наше отсутствие пламя восточноазиатской культуры едва не угасло, и тьма накрыла былую морскую благодать.\n\nТеперь всё иначе. Китайский Гоминьдан повёл народ Китая к спасению от империализма и смог провозгласить Китайскую Республику — новое революционное социалистическое государство, свободное от империалистического влияния. Благодаря этой силе армия, флот и авиация Китайской Республики освободили тысячи азиатских товарищей по Юго-Восточной Азии. Мы даже смогли принести революцию на дальние ледяные рубежи Внешней Маньчжурии, а наши войска освободили японских рабочих из цепей тирании их империи.\n\nНо это ещё не всё. Возрождённая мощь Китая, её славная история и престиж требуют от неё играть ещё более значимую роль в мире. Только Китай способен объединить многочисленные народы Азии под знаменем паназиатского антиимпериализма, и это не предел. Мы создали зону безопасности, простирающуюся от Гонолулу до Мельбурна, охватывающую каждую страну от островов Тихого океана до Индии. Пусть весь мир увидит и порадуется — кошмар и тьма империализма исчезли, и Белое Солнце Востока встаёт, навеки озаряя весь мир своим светом!"
CHI.endgame.050.a: "Ветер свободы дует через Тихий океан."
##Section 4b (200-399): Wang Endgame Events

#Wang Introduction Event Chain (200-219)
 CHI.endgame.201.t: "Три лица Вана Цзинвэя"
 CHI.endgame.201.d: "Право первородства теперь, несомненно, принадлежит ему. После смерти любимого покойного премьер-министра доктора Суня председатель обнаружил, что его право первородства оспаривается такими властолюбивыми лидерами, как Чан Кайши и Ху Ханьминь. Когда гоминьдановцы вернулись в Китай и помогли завершить Второй Северный поход, бонапартист Дэн Яньда и озлобленная вдова Сун Цинлин попытались лишить председателя принадлежащего ему по праву рождения поста партийного лидера.\n\nЭто было достигнуто, и добыча делится между некогда сплочённой группой последователей председателя. В настоящее время доминирует резидентская фракция, поскольку у них уже давно есть глаза и уши председателя, поскольку их неоспоримым лидером является не кто иной, как любимая жена председателя - Чэнь Бицзюнь. Они сразу же приступили к работе, назначив членов семьи Вана на руководящие посты в Исполнительном Юане - шаг, который члены Реорганизованной ассоциации товарищей осудили как кумовство. Губернаторские посты также распределялись между членами Резидентской фракции, на что Чэнь Гунбо с горечью заметил председателю, что он чувствует себя отодвинутым на второй план.\n\nТем не менее, радикалы по-прежнему являются доминирующей силой, поскольку РАТ контролирует большую часть Законодательного Юаня, и в РАТ по-прежнему доминирует её радикальная фракция. Сохранение контроля над РАТ, в то время как в нём доминируют радикалы, по-прежнему является предметом борьбы между Чэнем Гунбо и Гу Мэнъюем, которые представляют радикальное и умеренное крыло соответственно. Однако, учитывая, что амбиции Чэнь Бицзюнь высоки, как никогда, оба они опасаются, что влияние РАТ на правительство может ослабевать с каждым днём.\n\nЧэнь Гунбо был временно назначен премьером Исполнительного Юаня, хотя с каждым днём его положение становится всё менее прочным. Вскоре ожидается окончательное назначение, и Чэнь столкнётся с соперниками в лице Гу Мэнъюя и давнего секретаря Вана Цзэн Чжунмина. Окончательный выбор Вана, вероятно, станет судьбоносным в истории Китая."
 CHI.endgame.201.a: "Пришло время подраться за добычу..."

CHI.endgame.202.t: "Скорбь нации"
CHI.endgame.202.d: "Несмотря на то, что Ван сохранил лидерство в Партии и фактически занимает пост председателя Гоминьдана, в стране недавно вспыхнула волна протестов со стороны сторонников Временного исполнительного комитета, а также интеллигенции и студентов. В нескольких крупных городах Китая начались забастовки и демонстрации, осуждающие политические шаги Вана как диктаторские и нелегитимные.\n\nВнутри Гоминьдана партийцы, ранее связанные с Временным исполнительным комитетом, также осуждают политические захваты Вана и назначение членов Фракции Резиденции на государственные должности. Они призывают Вана уйти в отставку после многих лет руководства, но их требования изменений остаются без внимания из-за господства Фракции Резиденции в Партии. Тем не менее ясно, что укрепление власти Вана серьёзно раздражает народ. Пока продолжаются забастовки и волнения, положение Вана будет оставаться шатким, а недовольство среди Фракции Резиденции и самой Фракции может возрасти. Если доверие к Гоминьдану должно быть восстановлено, председатель должен быстро подавить волнения и доказать, что он достоин нести знамя доктора Сунь Ятсена раз и навсегда."
CHI.endgame.202.a: "Дни скорби продолжаются..."

CHI.endgame.203.t: "Опустошённая армия"
CHI.endgame.203.d: "В своих докладах в Париж и Лондон члены Международной военной миссии в Китае часто описывали фракционность в Гоминьдане как борьбу между «гражданским крылом» Ассоциации реорганизованных товарищей и «военным крылом» Временного исполнительного комитета. Вооружённые силы обновлённой Национально-революционной армии в зоне мятежа Мингана в основном контролировались офицерами и генералами, лояльными Ассоциации выпускников военной академии Вампоа Дэн Янды. Многие из них годами участвовали в революции в Минганской зоне, тогда как Ассоциация и председатель находились в изгнании.\n\nВ Национально-революционной армии также существовала Индийская клика, симпатизирующая идеалам Временного исполнительного комитета (многие её члены — близкие товарищи офицеров ВЕК) и Фракция реконструкции Сунь Фо. Председатель осудил милитаризм в партийной политике, заявив, что армия должна полностью подчиняться Партии. Он распорядился, чтобы, несмотря на оперативное руководство армией, все административные решения полностью контролировались партией.\n\nИз-за влияния Ассоциации реорганизованных товарищей в Политическом департаменте НРА, председатель приказал расширить этот департамент для усиления политической идеологической работы и полного завоевания лояльности армии. Методы идеологического воспитания и информированности о массовом движении должны помочь армии понять, что она — лишь слуга китайского народа в революции, а не самостоятельная структура.\n\nОднако эти меры не исправили ситуацию в армии. Выжившие после чисток предпочитают не высовываться, и армия в целом остаётся глубоко деморализованной. Пока председатель не предпримет шагов по реформированию и стабилизации, НРА фактически является лишь оболочкой своей военной силы времён войны."
CHI.endgame.203.a: "Армия поставлена на колени..."
#Wang Focus Tree Events (240-259)
CHI.endgame.241.t: "Три подхода к земельной реформе"
CHI.endgame.241.d: "Феодализм давно определяется политическими интеллектуалами и лидерами Ассоциации реорганизованных товарищей как система, в которой хозяйственная экономика Китая играет доминирующую роль в обществе. Эта система изначально несправедлива, поскольку помещики используют политическую силу для захвата земли и эксплуатации крестьян, грабя их продукты и заставляя выполнять бесплатный труд; оккупация земли помещиками приводит к полной монополии политической, военной и экономической власти. Правда, что прибрежные города уже вошли в капиталистическую стадию, однако отсталые северо-западные, юго-западные и сельские районы Китая всё ещё принадлежат к феодальной стадии — феодализм по-прежнему является доминирующей силой в Китае. Поскольку 70% населения Китая всё ещё связаны с феодальным обществом, задача Партии — вмешаться и освободить их от архаичного угнетения.\n\nБольшинство в Ассоциации реорганизованных товарищей поддерживают агрессивный подход национализации и проведение справедливой земельной реформы (за исключением крупных помещиков, военачальников и других местных хулиганов). Земли военачальников, местных тиранов, коррумпированных чиновников и злонамеренной знати подлежат конфискации и не могут быть проданы или куплены частным образом. В то же время умеренные выступают за более ортодоксальный подход — реформу земли на основе передачи земли тем, кто её обрабатывает.\n\nОднако среди радикалов Ассоциации, таких как Ши Цунтун, есть сторонники полной земельной реформы, которые стремятся разрушить социальный порядок, поощряя крестьянские восстания и добиваясь полной национализации всей земли государством."
CHI.endgame.241.a: "Проводить умеренную земельную реформу."
CHI.endgame.241.b: "Проводить радикальное перераспределение."
CHI.endgame.241.c: "Проводить полную земельную реформу."

CHI.endgame.242.t: "Лояльность испытывает новую армию"
CHI.endgame.242.d: "В рамках новой официальной партийной политики Председатель формально подчиняет армию Партии, фактически передавая под свой контроль все административные военные решения. Без возражений Центрального Комитета Гоминьдана этот шаг быстро одобрен и введён в закон. Отныне административные решения, такие как мобилизация войск, могут утверждаться только Центральным Комитетом Партии — а те, кто откажется подчиняться, немедленно арестовываются своими подчинёнными. Между тем, Политический департамент приступил к работе через лекции и другие методы политической идеологической обработки, чтобы выявить тех, кто останется лояльным Партии, и тех, кто подлежит чистке.\n\nПо приказу Председателя Политический департамент официально санкционировал \"Движение морального воспитания.\" Все солдаты и офицеры должны быть из производящих классов — то есть из угнетённых слоёв общества (по определению Вана это мелкая буржуазия, студенты, интеллигенция, рабочие и крестьяне). Кроме того, военнослужащих ежедневно учат, что их задача — служить народу, а народ должен понимать, что солдаты — такие же производящие классы, как и они. Солдатам предоставляют скромные условия жизни и суровые тренировки, чтобы народ видел, что солдаты не ведут роскошной жизни втайне от них. Если права народа нарушены армией, армия должна незамедлительно реагировать и проводить расследования, чтобы доказать свою подчинённость китайскому народу.\n\nНекоторые офицеры, выступавшие против руководства Вана, например генерал Е Тин, попросили восстановить свои комиссии и поклялись в верности новому режиму. Хотя Председатель щедр и великодушен, Фракция Резиденции и радикалы Ассоциации реорганизованных товарищей выступают за жёсткие меры против всех, кто противостоял его руководству. Тем не менее решение Председателя —..."
CHI.endgame.242.a: "Продвигать молодое поколение офицеров!"
CHI.endgame.242.b: "Восстановить некоторых расформированных из WMARCA"
CHI.endgame.242.c: "Применить широкую амнистию"

CHI.endgame.243.t: "Председатель и его раздробленная партия"
CHI.endgame.243.d: "Так ли должно было всё закончиться? Напряжённость между триумвиратом Ху Ханьмин, Ван Цзинвэем и Чан Кайши на Северном походе была очевидна, но с момента его провала партия не распалась так сильно, как во время Третьего съезда. Теперь Председателю предстоит собрать осколки разрушенного Белого Солнца и разобраться с антиреволюционным бывшим Временным исполнительным комитетом.\n\nСон Цинлинь с тех пор помещена под домашний арест. Её статус вдовы доктора Сунь Ятсена делает её практически неприкосновенной, несмотря на её тесную связь с Временным исполнительным комитетом. После её молчания многие лидеры ВЕК были исключены из Центрального исполнительного комитета и Исполнительного Юаня. Четыре Старейшины фактически замолчали и ушли из политики, а Фракция реконструкции была почти полностью очищена. Однако некоторых, таких как Сунь Фо, оставили на просьбы умеренных Ассоциации, которые считают присутствие Сунь Фо необходимым для придания партии легитимности.\n\nРадикалы Ассоциации настаивают на создании нового революционного руководства партии для восстановления единства и сплочённости. Они призывают к созданию нового руководства из числа китайских синдикалистов и собственных рядов. Это противопоставляется просьбам о снисходительности и даже амнистии для тех из ВЕК, кто потенциально готов участвовать в вновь организованном правительстве Председателя."
CHI.endgame.243.a: "Идеология превыше всего!"
CHI.endgame.243.b: "Опыт поможет сгладить острые углы."
CHI.endgame.243.c: "Прощение может строить мосты."

CHI.endgame.244.t: "Интриги в Лиге китайских синдикалистов"
CHI.endgame.244.d: "Лига китайских синдикалистов наконец распалась, поскольку различные социалистические фракции внутри лиги разорвали шаткий союз и встали на сторону либо Временного исполнительного комитета, либо Ассоциации реорганизованных товарищей. В хаосе Третьего съезда Гоминьдана Всемирное общество осудило Председателя Вана и попыталось помочь ВЕК разрушить революцию. Фракция Резиденции и Ассоциация реорганизованных товарищей объединились со своими союзниками-синдикалистами, чтобы восстановить порядок и единство в партии, однако будущее сотрудничество между теперь уже выделившейся Китайской партией синдикалистов и Гоминьданом остаётся под вопросом.\n\nРадикалы КПС имеют давние связи с радикалами Ассоциации. Некоторые основатели КПС, такие как Чэнь Гунбо и Ши Цунтун, занимают важные посты в Гоминьдане. В то время как радикалы и ортодоксы согласились в вопросе «отсутствия классовых различий» во время Единого фронта Второго Северного похода, их риторика обострилась после объединения. Теперь радикалы, такие как Цюй Цюбай и Цай Хсен, призывают к созданию революционного класса интеллигенции и лидеров, которые поведут крестьян к свободе; они нашли поддержку у своих единомышленников-марксистов в радикалах Ассоциации.\n\nОртодоксальная фракция под руководством Ли Лисаня и Чэнь Дусю получает поддержку умеренных Ассоциации, которые ценят отказ от классовой борьбы в пользу революции для угнетённых классов. Умеренные ориентируются на общественное мнение и предпочитают сотрудничество с ортодоксами КПС.\n\nНекоторые в Фракции Резиденции, например Чэнь Бицзюнь, считают, что альянс с синдикалистами больше не должен быть таким тесным, как до Второго Северного похода. Для них революция уже выиграна, и дальнейшие уступки китайским синдикалистам лишь подорвут истинное руководство Председателя Вана и ослабят идеологию доктора Сунь."
CHI.endgame.244.a: "Завоевывать радикалов."
CHI.endgame.244.b: "Работать с ортодоксами."
CHI.endgame.244.c: "Лига китайских синдикалистов выполнила свою роль..."

CHI.endgame.245.t: "Реорганизованная иерархия"
CHI.endgame.245.d: "Организация — ключ к успеху, считают радикалы Ассоциации, которые уверены, что настоящая революционная авангардная группа должна быть чётко организована, чтобы вести Национальную революцию рабочих и крестьян. Благодаря доминированию радикального крыла Ассоциации, ей удалось навязать жёсткие организационные методы всей партии.\n\nШтаб-квартира Ассоциации и главный центр операций Чэнь Гунбо — «Объединённое управление провинциальных, муниципальных и зарубежных партийных отделений», что позволяет премьеру Чэну контролировать деятельность Ассоциации внутри страны и за рубежом. Ей также помогает «Революционный союз защитников Китайской партии Гоминьдан», тайная организация Ассоциации, созданная в Шанхае для привлечения социалистов и синдикалистов.\n\nПриём в Ассоциацию — долгий процесс. Кандидат должен знать минимум двух членов Ассоциации. После испытательного срока от одного до трёх месяцев кандидат становится полноправным членом только после одобрения на следующем уровне иерархии. Члены организованы в ячейки по 3-9 человек, а структура делится на подотделения, районы, провинции и национальный уровень.\n\nРадикалы поддерживают жёсткий контроль Ассоциации для сохранения единства партии. Местные ячейки собираются каждую неделю, посещение обязательно. Все распоряжения премьера считаются инструкциями великого Председателя и должны выполняться без вопросов. Члены среднего и высшего звена ведут отчёты о деятельности, месте нахождения и проживании членов.\n\nУчебная программа Ассоциации подчёркивает необходимость следования единой идеологии, строгой дисциплины, повиновения Ассоциации, а не отдельных лиц, и работы с массами. Умеренные просят премьера ослабить контроль, считая, что без ВЕК нет нужды в таком строгом режиме, опасаясь распространения его на всю партию."
CHI.endgame.245.a: "Мы сохраним радикальную линию."
CHI.endgame.245.b: "Они правы, давайте немного ослабим контроль."

CHI.endgame.246.t: "Первая семья"
CHI.endgame.246.d: "Как и Гофу, Председатель был благословлён большой семьёй, но с укреплением позиции «первая семья» Вана продолжает привлекать внимание прессы по всей стране. Чэнь Бицзюнь, его дорогая жена, часто становится объектом таблоидных сплетен из-за своей воспринимаемой «уродливости» и преклонного возраста (хотя Ван старше её на десять лет). Даже ближайшее окружение Вана, включая Чэнь Гунбо, боится называть её девичьей фамилией, чтобы не быть отчитанными мадам Ван, которая говорит, что даже доктор Сунь не обращался к ней так. Чэнь Гунбо и другие часто жалуются на власть мадам Ван, но Ван говорит: «Она мой революционный товарищ, поэтому я не могу принимать решения, не посоветовавшись с ней.»\n\nЧто касается детей, старший сын Ван Вейин родился во Франции в 1913 году, изучал экономику и начал карьеру чиновника в военном снабжении. Известен как плейбой и редко участвует в политике. Старшая дочь Ван Вэньсинь симпатизирует Сон Цинлинь и открыто осуждает отца за раскол партии. Вторая дочь Ван Вэньбин, хотя и критикует Ассоциацию, учится на медсестру и не занимается политикой.\n\nТретья дочь — самая любимая, Ван Вэньсюнь, родилась в 1922 году, известна своей красотой и умом, работает секретарём отца и состоит во Фракции Резиденции. Младший и любимый сын — Ван Вэньти, родился в 1928 году. Слишком молод, чтобы заниматься политикой, но отец надеется, что он пойдёт по его стопам.\n\nМадам Ван активно заполняет государственный аппарат родственниками Вана, своей семьёй и семьёй Цзэн (премьер Цзэн Чжунмин и его сестра), образуя вместе с кланом Сунь-Сонг «Четыре великие семьи республики». Многие члены Ассоциации осуждают это как непотизм и призывают Председателя уделять внимание политическим заслугам, а не семейным связям."
CHI.endgame.246.a: "Семейные дела важны..."
CHI.endgame.246.b: "Но мы служим нации!"

CHI.endgame.247.t: "Теория демократии Ван Цзинвэя"
CHI.endgame.247.d: "Хотя большинство считает Ассоциацию реорганизованных товарищей авторитарной, сам Председатель проявляет большой интерес к продвижению демократии — создавая то, что можно назвать синтезом партийного государства (даньго) и местного самоуправления. Из-за его поддержки умеренных Ассоциации некоторые даже обвиняют Председателя в том, что он ставит Минцюань выше остальных трёх принципов. Ван считает, что без демократических сил принципы Миньцзу и Миншэн не могут быть реализованы в полной мере, поэтому Национальная революция должна завершиться демократией.\n\nДемократия в теории Вана должна отличаться от буржуазной демократии Запада (США, Германская империя) и от пролетарской демократии синдикалистских стран. В своих трудах и лекциях Председатель подробно пишет о партийном государстве как о необходимом инструменте для воспитания демократии. Во время революции Партия эффективно борется с антиреволюционерами и помогает управлять местным самоуправлением. Без руководства Гоминьдана массы не смогут реализовать свой революционный потенциал. Кроме того, народ Китая привык к автократии и без Партии не сможет сразу воспользоваться своими четырьмя базовыми правами.\n\nУмеренные Ассоциации поддерживают теории Вана, считая, что в период революции особый класс выдающихся личностей, как Председатель, должен сдерживать популизм и помогать массам осознать себя. Однако либеральные фракции внутри Гоминьдана выступают против политики Вана и требуют завершения периода наставничества. По их мнению, с окончанием Второго Северного похода и Войны сопротивления нет необходимости продолжать партийное правление."
CHI.endgame.247.a: "Период наставничества должен закончиться."
CHI.endgame.247.b: "Демократия — процесс, его нельзя форсировать."

CHI.endgame.248.t: "Строительство национального мавзолея"
CHI.endgame.248.d: "Национальный мавзолей для захоронения останков любимого Гофу близится к завершению — проект идёт намного опережая график. Толпы собрались у подножия Пурпурной горы, где мавзолей построен, чтобы почтить память Гофу. Ван Цзинвэй с семьёй и ведущими членами Ассоциации прошли по грандиозным ступеням, чтобы воздать честь Гофу (чей гроб был доставлен из [GetVictoryPointName_9843]) и положить его в вечный покой на мраморном саркофаге.\n\nКульт Сунь Ятсена чрезвычайно важен для режима Ван Цзинвэя и Гоминьдана. Анонимный член Ассоциации написал в одной из партийных газет: «В истории китайской революции господин Ван — самый долгоправящий последователь Сунь Ятсена, и можно сказать, что только он способен продолжить дело покойного премьера.» Председатель официально объявил важные даты, связанные с Сунем, национальными праздниками, а бронзовые статуи Сунь ставятся по всему Нанкину. Кроме того, Ван часто фотографируется и появляется в городе, демонстрируя преемственность воли покойного премьера в первой столице республики.\n\nВ попытке ещё больше связать свой режим с наследием доктора Сунь Ван лично распорядился перевезти в Нанкин внутренности Сунь (которые хранились в [GetVictoryPointName_9843]) для физического воссоединения тела. Хотя этот шаг может показаться мерзким, для Вана похоронить вечного премьера в Нанкине — значит узаконить своё законное руководство партией."
CHI.endgame.248.a: "Отец страны, теперь ты можешь покоиться."

CHI.endgame.261.t: "Расширенная партийная конференция"
CHI.endgame.261.d: "Укрепившись благодаря успешным переговорам с федералистским движением, Ван Цзинвэй уверенно идёт вперёд, консолидируя репутацию республиканского государственного деятеля — официально созвав \"Расширенную партийную конференцию\" с целью обсудить нерешённые вопросы с Третьего национального съезда возвращённых. Он пригласил руководство федералистов, включая Партии общественных интересов и их союзников из Китайской демократической лиги, чтобы выслушать их мнение о будущем страны.\n\nОднако федералисты были шокированы — Ван оказался куда более хитрым, чем они ожидали. Помимо ПИП и КДЛ, на конференцию были приглашены Лига китайских синдикалистов (теперь под контролем КПС), а также представители правого крыла Гоминьдана и Гоминьдуня Фэн Юсяна. Были приглашены и другие мелкие партии и независимые, вероятно, \"отфильтрованные\" секретной полицией.\n\nВ жестоком повороте судьбы Ван использовал требования федералистов о большей плюралистичности против них, разбавив их влияние множеством мелких конкурирующих фракций, которыми он может легче управлять.\n\nУ федералистов мало выбора, кроме как принять условия Гоминьдана, который контролирует большинство в Законодательной Юане и Национальном Собрании. В то же время Ван с триумфом укрепляет контроль над страной, произнося красочные речи, призывая к единству. Он поручил управление практическими политическими вопросами своему премьеру Гу Мэнъю. Пока мастер-оператор Ван у руля, Гоминьдан будет продолжать расставлять своих \"партнёров\" друг против друга."
CHI.endgame.261.a: "Нам предстоит много работы."
#Wang Epilogue Events (300-319)
CHI.endgame.301.t: "Основатели возрожденной нации"
CHI.endgame.301.d: "Как дерево, Партия — живой организм, её нужно постоянно взращивать и подпитывать, чтобы она могла выполнять свои истинные функции и вести массы к современному и демократическому обществу. Вторая реорганизация партии под руководством Ассоциации реорганизованных товарищей успешно проведена — буржуазные и дегенеративные элементы партии устранены. Теперь Председатель может эффективно управлять партией без вмешательства коррумпированных сил. Хотя Ван дистанцировался от АРТ, очевидно, что АРТ контролируется теми, кто придерживается более конкретного понимания саньминчжуи. Для них история материалистична; осмелятся ли они сказать, что теория доктора Сунь основана на материализме и что в полуфеодальном мире Китая есть классовый смысл.\n\nРазличий между организацией и кликой АРТ и самой партией Гоминьдан почти нет, поскольку многие аспекты организации и руководства АРТ были одобрены Председателем по совету его премьера Чэнь Гунбо. Прозванный \"правой рукой\" Председателя, некоторые считают, что отношения между Чэнем и Ваном связаны с амбициями Чэня влиять на Гоминьдан. Тем не менее, нельзя отрицать абсолютную преданность Чэня Председателю. Премьер Чэнь помог восстановить порядок по всей стране: АРТ тщательно подавлена, радикалы КРС очищены, Сон Цинлинь добровольно ушла из политики и выбрала тихую пенсию.\n\nПо всей стране молодые мальчики и девочки читают в учебниках историю — славные подвиги великих революционных героев Китая: Сунь Ятсена, Ляо Чжункая, Вана Цзинвэя и, конечно, Чэнь Гунбо. Портреты Сунь и Вана украшают каждый дом и класс, а членство в Молодёжном корпусе прославляется — плакаты призывают вступать как способ служения новой Китае. Но есть и опасения, что с ростом страны благодаря госсоциалистической политике вскоре возникнет экономический класс. Хотя АРТ отрицает, что такие меры приведут к открытому капитализму, только время покажет, ожидает ли Китайская Республика полноценное социалистическое будущее."
CHI.endgame.301.a: "Тост за Председателя и его верного Премьера!"

CHI.endgame.302.t: "Страж национального возрождения"
CHI.endgame.302.d: "По словам близких, одно из любимых занятий Вана — долгие прогулки у Национального мавзолея, когда он не работает допоздна в президентском дворце Нанкина. Известно, что он ходит туда один или с младшим сыном; возможно, размышляет о пути революции — хотя впереди ещё много работы.\n\nЭто был непростой путь. Бонапартист Дэн Янда и его клика реакционных офицеров пытались сорвать национальную революцию; их призывы к популизму могли привести Китай к анархии, а буржуазный Сунь Фо с Гавайев вернулся лишь для смуты в партии. Но это были не их права. В истории китайской национальной революции никто не был более предан учениям и указаниям вечного премьера доктора Сунь, чем Ван Цзинвэй. Разве не Ван присутствовал и написал завещание покойного лидера? И не Ван ли вел Гоминьдан к победе в Лиговой войне, Экспедициях объединения, Второй экспедиции и войне сопротивления?\n\nОднако он не мог сделать это один. Ван всегда был окружён близкими последователями — своим любимым воспитанником Цзэн Чжунмином, верной женой и революционной товарищей Чэнь Бицзюнь, а также Чу Мини, Ли Шицюнем и другими из Фракции Резиденции. С их помощью они смогли сдержать радикализм АРТ и спасти партию от антиреволюционеров.\n\nДля Председателя необходима лишь Партия, чтобы привести национальную революцию к победе. И с семьёй, расположенной на ключевых постах партии, нет сомнений, что когда придёт время уйти в отставку (или, не дай бог, умереть), пример Председателя продолжат его родственники, ведущие революцию дальше. До тех пор величайший государственный деятель Китая продолжит вести страну к национальной славе."
CHI.endgame.302.a: "Лидерство Председателя продолжится..."

CHI.endgame.303.t: "Реализация республиканского обещания Синьхая"
CHI.endgame.303.d: "В то время как некоторые в Гоминьдане, например радикалы Ассоциации реорганизованных товарищей, с ностальгией вспоминают реорганизацию 1924 года накануне Северного похода, Председатель больше тоскует по революционному духу накануне Синьхайской революции. В те дни товарищи боролись и умирали за свободный республиканский Китай. Когда страна погрузилась в эпоху военных губернаторов и хаос, многие потеряли надежду на осуществимость демократии.\n\nС возвращением Гоминьдана после Лиговой войны перспективы демократии наконец вернулись. По приказу Председателя созывается великая республиканская Национальная конвенция под руководством Гоминьдана. Эта конвенция — пример доктора Сунь Ятсена, которого генерал Фэн Юсян пригласил в октябре 1923 года встретиться с региональными лидерами и внедрить партийные идеалы демократии и массового движения. Хотя бейянские милитаристы отвергли планы Сунь, Ван уверен, что с полным контролем Гоминьдана над Китаем такая конвенция может наконец состояться, и региональные лидеры соберутся для обсуждения будущего демократии.\n\nПод руководством умеренных АРТ составлена временная конституция, которая будет действовать до завершения периода политического наставничества. Хотя АРТ-умеренные и Ван верят в рост демократии и роль самоуправления, именно под руководством партии-государства эти обещания могут быть реализованы. Демократия в Китае хрупка, и без ухода партии-государства она рискует распасться в военачальничество или радикализм.\n\nДо тех пор Гоминьдан эффективно контролирует все выборы и государственные функции. Но есть надежда, что по мере расширения голоса в национальном управлении четыре права народа на демократию будут наконец полностью реализованы."
CHI.endgame.303.a: "До тех пор..."

CHI.endgame.304.t: "Истинный республиканский государственный деятель"
CHI.endgame.304.d: "В 1911 году революционная волна прокатилась по Китаю. Народ восстал против угнетающего правительства, требуя демократии, прекращения национального унижения и выполнения социальных обязательств. На короткий, яркий миг революционеры Синьхая смогли разрушить старый порядок.\n\nОднако последующие события стали роком для этого обнадёживающего движения. Республиканские группы раз за разом терпели неудачи в 1910–1920-х, часто сражаясь друг с другом за влияние на юге. Доктор Сунь не смог удержать вместе неуклюжее Движение за защиту конституции, многие идеологи и военачальники предпочитали сделки с бейянскими узурпаторами, а не единство против угнетения.\n\nПредательство Чэнь Цзюньмина в 1922 году стало переломным моментом для Гоминьдана. Оно показало, как одинок был Гоминьдан — убедив доктора Сунь, что только они могут вести путь к будущему без военачальничества. Ван Цзинвэй был главным бенефициаром реорганизации 1924 года и естественным наследником движения Вечного Премьера.\n\nНо Ван пошёл дальше своего мастера. Он смело протянул руку республиканцам по всей стране, успешно преодолев, казавшуюся непреодолимой, пропасть между Гоминьданом и другими группами, унаследованными от Синьхая. С блестящими дипломатическими навыками серая eminence партии залечила трещины, разделявшие нацию, восстановив утраченное с 1911 года.\n\nЭто не значит, что он дурак или марионетка бандитских военачальников эпохи военного губернаторства. С правильной армией для поддержания порядка и искусным применением секретной полиции он удержал страну в рамках — чтобы не дать разрушить необходимое наставничество для реализации Трёх принципов.\n\nСо временем буржуазные партии, вовлечённые в революционное движение, будут обучены этим принципам, чтобы Китай смог реализовать по-настоящему национальное, демократическое и социалистическое будущее, за которое боролись мученики Учаня."
CHI.endgame.304.a: "Раны требуют времени, чтобы зажить."

CHI.endgame.305.t: "Размышления преемника"
CHI.endgame.305.d: "Ван Цзинвэй привык к поздним ночам в офисе, усердно работая в двойных ролях Председателя и Президента. Он уже не тот молодой революционер, что был прежде, и шрамы болят, тело выдаёт возраст. Тем не менее, гора отчётов не уменьшается, и Ван не собирается уходить на пенсию в ближайшее время.\n\nИногда он задумывается, что будет после него. Вероятно, место займет премьер Цзэн Чжунмин, хотя соперники из числа протеже Вана — Чэнь Гунбо и Чжоу Фохай — тоже есть. Цзэн моложе на поколение, немного плейбой, но сейчас формируется. Тем не менее Председатель любит думать наперёд, чтобы обеспечить мудрое руководство страной и сохранить своё наследие — и наследие доктора Сунь до него.\n\nЕсть и любимый младший сын Ван Вэньти, родившийся во Франции, который видел Китай лишь во время возвращения Центрального комитета. Пока он молод и должен расти, но уже помогает отцу в офисной работе и, как говорят, стремится к политической карьере.\n\nЕсть также любимая дочь Ван Вэньсюнь, секретарь Председателя. Хотя у Вана большие надежды на дочь, ей могут помешать оставшиеся предрассудки и сексизм.\n\nНаконец, есть Хо Манг Хан, зять Вана, с которым Ван знаком с детства. Выпускник Университета Цзиньлинь со степенью в агроэкономике, которого Ван рассматривает как потенциального преемника Председателя партии.\n\nВан ещё никому не делился этими мыслями, ни с женой, ни с премьером Цзэном. Вопрос преемственности в партии всегда сложен, и Ван знает это по опыту. Время решит, но сейчас он может лишь надеяться, что его преемники будут жить в лучшем Китае, чем он сам."
CHI.endgame.305.a: "И пусть помнят его с теплом..."
##Section 4c (400-599): Song Endgame Events

#Song Introduction Event Chain (400-419)
CHI.endgame.401.t: "Выстрел через нос"
CHI.endgame.401.d: "После недели напряжённых переговоров оптимизм по поводу быстрого и простого урегулирования между быстро расходящимися фракциями испарился. Коалиция, свергнувшая Вана, оказалась слишком большой и неуправляемой, а теперь, когда Временный исполнительный комитет (ныне известный как Революционный комитет) добился доминирования, усилились опасения, что они вскоре воспользуются своим влиянием в Национальной революционной армии как дубинкой против политических противников.\n\nСунь Фо не стал ждать. Сегодня утром он \"открыл огонь\", представив предложение под названием \"Основные принципы контроля политики в период политического наставничества и методы ведения китайской внешней политики\". В нём он выразил оптимизм по поводу окончания военной фазы революции, но также осудил, по его мнению, растущее влияние военных на партийные дела. Среди прочего, в документе говорится, что ни один действующий военный офицер не может входить в Центральный исполнительный комитет, а также не может занимать пост Президента Республики или Премьера любого из пяти юаней. Хотя большинство в ВИК могли бы согласиться с таким предложением, очевидной целью был их чемпион — генерал Дэн Янда.\n\nСунь не стал ждать ответа и сразу вышел с этими требованиями к общественности: 1) окончание периода политического наставничества 2) перераспределение (в основном военного) финансирования в пользу национального восстановления 3) немедленное составление конституции. Последнее требование имеет большое символическое значение — Фракция восстановления настаивала, что конституция не может быть введена до завершения наставничества и требует участия других партий.\n\nЭто фактически означает, что они стремятся завершить партию-государство гораздо раньше, чем ожидалось. Если их требования будут удовлетворены, разработка документа, скорее всего, пройдёт через Законодательный юань — давно ставший прибежищем партийных изгнанников и контролируемый Фракцией восстановления. Интеллектуалы по всей стране положительно отреагировали на требования Сунь, почувствовав смелость публично осуждать партийную диктатуру."
CHI.endgame.401.a: "Ну, это уж совсем нечестно..."

CHI.endgame.402.t: "Партия и её народ"
CHI.endgame.402.d: "После окончания Третьего съезда страна пребывает в подавленном состоянии — большинство боится высказаться. Несмотря на хаос последних недель, широкая публика была исключена из сведений о внутрипартийных разногласиях и оставлена разбираться самой, какую сторону поддержать. Многие, не сумевшие определиться, заперлись в домах, ожидая разрешения кризиса, пока по улицам патрулируют солдаты, и сами не зная, что будет дальше.\n\nПохоже, Сунь Фо не был единственным, кто сомневался в новом правительстве, и несколько групп договорились координировать оппозицию, но именно он сделал первый ход — либо из желания захватить лидерство, либо благодаря чувству безнаказанности, даруемому его статусом \"неприкосновенного\". Следующим действовал Всемирное общество. Цай Юаньпэй организовал смещение Сунь Цинлинь с поста Президента Китайской лиги гражданских прав, и Лига призвала студентов к дискуссиям против авторитаризма. Не желая уступать, ортодоксальная КСП предъявила свои требования, организовав забастовку Все-Китайской федерации профсоюзов.\n\nПротесты вышли на улицы, снова потрясая страну, пока молодая Республика ищет свой путь. Хотя Сунь Фо заручился поддержкой лучших умов страны, кажется, что другие также активно борются за сердца народа."
CHI.endgame.402.a: "Мы ещё можем это обсудить..."

CHI.endgame.403.t: "Жёсткие и компромиссные"
CHI.endgame.403.d: "Чтобы не допустить повторения прошлых столкновений, Президент Сон оказывает давление на переговорщиков для поиска благоприятного разрешения кризиса. Она также приказала армии проявлять сдержанность, хотя войска ещё не вернулись в казармы. Старый Временный исполнительный комитет всё ещё доминирует в центре политической дискуссии Гоминьдана, мешая лёгкому объединению правых Сунь Фо с различными левыми оппозиционными группами, настроенными против неё.\n\nВнутри Гоминьдана ситуация остаётся нестабильной. АРТ официально распущена, но неофициально сохранилась рудиментарная фракция. Оставшись только с Гу Мэнью и его умеренными, они пребывают в оборонительной позиции, их будущее неясно после арестов и изгнаний многих соратников. Пользуясь уязвимостью Революционного комитета Сон, они настаивают на амнистии для побеждённых и компромиссах с общественностью. К ним присоединились многие бывшие члены ВИК, призывающие Сон и Дэня принять решительные меры для снижения напряжённости и продвижения диалога.\n\nС другой стороны, существуют жёсткие сторонники, которые указывают, что бесконечные уступки приведут к неспособности партии удовлетворить кого-либо. Эти настроения выражают экстремисты внутри партии, в основном офицеры, лояльные КРС, но и многие из ВИК разделяют их в приватных разговорах. Это не значит, что солдаты хотят продолжения боёв — многие офицеры выступают против репрессий, а рядовые мечтают скорее вернуться домой."
CHI.endgame.403.a: "Разделённый дом не устоит..."

CHI.endgame.404.t: "Железная шея либерала"
CHI.endgame.404.d: "Сунь Фо — один из самых узнаваемых политиков, что он и использует по максимуму. Никогда раньше он не имел такого влияния, купаясь в славе защитника либеральной демократии среди социалистической бури. Его притязания делают переговоры с ним непростыми; многие насмешливо замечают, что он слишком любит внимание.\n\nЕго последняя лекция для кадетов Центрального учебного корпуса называлась \"Политическая демократия и экономическое планирование\". В ней он осудил Гоминьдан за превращение в отдельную касту, исполненную высокомерия и отдалённости от народа. Кажется, он не заметил иронии, что произносит речь с вершины башни из слоновой кости, построенной его отцом.\n\nКогда наконец начался очередной раунд переговоров, он предложил более конкретные требования. Во-первых, он настаивает на правиле \"один человек — одна должность\", чтобы прекратить практику совмещения множества постов в государстве и бюрократии. Далее он добивается подтверждения своего близкого друга Ляна Ханцао в качестве Премьера Законодательного юаня, а себя — в роли Премьера Исполнительного юаня (совмещая должность заместителя Председателя партии) с контролем над несколькими ключевыми портфелями. Также он требует масштабных конституционных и демократических реформ с сильным либеральным уклоном.\n\nПереговорщики надеются смягчить его чрезмерные требования, особенно по части постов в кабинете и продолжительности наставничества. Но с таким, кто так любит внимание, ясно, что он готовится стать ведущим несоциалистическим кандидатом на будущих выборах, что вероятно приведёт к расколу революции.\n\nПредложен и более циничный вариант — на стол Президента Сон попал конверт с \"полезной\" информацией. Включая скандальные детали о продолжающемся романе Сунь Фо с светской львицей Лань Ни во время болезни его жены. В сочетании с другим романом с женщиной на двадцать лет моложе, сохранение секрета может стать мощной козырной картой в \"агрессивных переговорах\"."
CHI.endgame.404.a: "Жёсткая, но справедливая сделка."
CHI.endgame.404.b: "Посмотрим, насколько он твёрд."

CHI.endgame.405.t: "Разделяй и властвуй"
CHI.endgame.405.d: "Основная идея политического наставничества возникла из признания отсутствия подлинного политического сознания среди масс Китая. Нижние классы, долго страдая от угнетения, часто не могут осознать корни своей боли — часто лишь наказывая своих непосредственных господ, не видя истинных причин своего рабства.\n\nРеволюционный долг Гоминьдана — не только защищать массы, но и вести и просвещать их. Народ должен быть защищён от недовольных, которые могут сбить их с пути — обратно к буржуазному угнетению или разрушительному радикализму. Множество групп пытались использовать население как оружие, но результатом было лишь больше войны. Многие просто жаждут стабильности и процветания.\n\nВременный исполнительный комитет всегда сочувствовал страданиям народа, включая демократию. Но широкое её внедрение в ближайшем будущем невозможно, и другие два принципа — народное благосостояние и национальные интересы — должны идти одновременно. Поскольку жандармерия укрепляется за счёт различных милиций ВИК, многие задаются вопросом, насколько далеко они готовы зайти ради её соблюдения.\n\nВсплеск народного энтузиазма, вызванный Лигой китайских синдикалистов, хоть и выглядит мощным, во многом является последним вздохом умирающей организации. Лига продолжает раскалываться — студенты, интеллектуалы и бюрократы составляют ядро Всемирного общества (и их прокси — Китайская лига гражданских прав), в то время как рабочие, трудящиеся и солдаты — популярную базу Китайской синдикалистской партии и Все-Китайской федерации профсоюзов.\n\nЧем дольше продолжается кризис, тем вероятнее протесты затухнут. Всемирное общество, вероятно, сольётся с ВИК, учитывая много общих ценностей, а КСП быстро конфликтует с ними. Но на короткий миг истинного энтузиазма вместе они будто отражают стремление народа к синдикалистским изменениям. Это учитывают Президент Сон и её правая рука Дэн Янда, готовя страну к наставничеству."
CHI.endgame.405.a: "..с протянутой рукой и открытым разумом."
CHI.endgame.405.b: "..с оружием в руках и обнажёнными зубами."

CHI.endgame.406.t: "Создание Революционного комитета"
CHI.endgame.406.d: "Дэн Янда во многом является главным архитектором новой системы \"Гуаньси\", основанной на личных революционных связях и общих идеалах, культивированных годами товарищества. Но эти связи работают в обе стороны, и генерал так же зависит от своей обширной сети гражданских и военных контактов, как и они от него.\n\nРазличия между АРТ и ВИК всегда были размыты из-за тесно переплетённых сетей. Посредине стоит блок, часто называемый \"умеренными АРТ\" за их центристские позиции, иногда отвергающие классовую борьбу. Во многом они даже правее, чем обе установленные группы ВИК и АРТ, связанных в основном личными связями с Ваном Цзинвэем и Чэнь Гунбо.\n\nТеперь, когда двое исключены, большинство готовы войти в новый \"Революционный комитет\", несмотря на оставшиеся сомнения. Дэн Янда осторожно собирает их мнения, встречаясь со многими умеренными для налаживания связей. Хотя по образованию он военный, он оказался искусным государственным деятелем мирного времени, успокаивая встревоженных фигур Гоминьдана, несмотря на то, что у них мало выбора, кроме как присоединиться.\n\nОднако чёткой грани между умеренными и радикалами в партии не существует, и многие продолжают плести интриги против Президента Сон. Одним из частых запросов генерала является амнистия для известных подрывных элементов и жёстких лоялистов Вана. Очевидно, что друзья и родственники продолжают ходатайствовать о них даже после арестов и изгнаний."
CHI.endgame.406.a: "Рука об руку строим общее будущее."
CHI.endgame.406.b: "Будем осторожны в выборе союзников."

CHI.endgame.407.t: "Храбрецы во тьме"
CHI.endgame.407.d: "Общество возрождения Китая было основано самыми ярыми националистическими офицерами, обучавшимися за границей после 1927 года. Они радикализировались до безумия, питаемые идеологией тоталитаризма от своих разочарованных западных коллег, многие заняли высокие посты благодаря своей смелости в боях и сомнительным сделкам с ВИК.\n\nОднако с окончанием вооружённой фазы революции они всё чаще теряют смысл существования. Гоминьдан радикален во многих отношениях и обещает широкие перемены, но даже этого мало, чтобы удовлетворить их жажду полного преобразования.\n\nИм не нравится служить в мирной армии, работать с бумажками и караулить, вместо тех героических действий, на которые они рассчитывали. Их не любят в военном истеблишменте ВИК, которые презирают их высокомерие \"Молодой гвардии\" и считают их методики террора страхом, а не уважением. Но с укреплением контроля ВИК над армией изменить курс уже невозможно.\n\nЕсли всё будет идти так и дальше, ожидается, что они постепенно, но болезненно уйдут в историю. Пока же они продолжают быть занозой в правительстве — их более тяжкие \"революционные\" преступления снизились, но их сменили мелкие преступления, связанные с рэкетом и хулиганством, когда молодые офицеры, пропустившие героические моменты революции, пытаются \"доказать себя\". Если их влияние достаточно ослабнет, появится шанс ликвидировать их."
CHI.endgame.407.a: "Пусть всё идёт своим чередом."
CHI.endgame.407.b: "Изолировать клику Ху Цзуннаня."
CHI.endgame.407.c: "Очистить их раз и навсегда!"

CHI.endgame.408.t: "Падение Лаобана"
CHI.endgame.408.d: "Для Дай Чунфэна, печально известного \"Лаобана\" (буквально \"босса\"), наступил конец. После вызова на встречу ему надели мешок на голову и арестовали, отправив в неизвестное место, откуда о нём больше не слышно. Тем временем люди Дая разошлись на раздираемые внутренними распрями группировки, теряя значение.\n\nНесмотря на ненависть Дая к фракционной борьбе в партии, его агенты сами часто разбивались на провинциальные сети. Он не брезговал играть их друг против друга, одновременно подчёркивая важность \"цзяфэна\" (семейной традиции). Это часто принимало буквальный смысл — набор детей, родственников, одноклассников и соотечественников из Чжэцзяна в ряды его агентства. Особенно он предпочитал \"крепких парней из рек и озёр\" из южных провинций (особенно Чжэцзян, Хунань и Гуандун).\n\nЭто стало основой для конкурирующих шпионских клик. Мао Жэньфэн, детский друг Дая из Чжэцзяна, возглавил клику \"Чжэцзян\" (а также меньшую, более камерную фракцию Цзяншань из их родного уезда). Клика Гуандуна самая крупная благодаря исторической связи партии с Гуандуном. Её возглавляет Чжэн Цземе́нь, среди агентов много обученных во Франции. Тан Цзун возглавляет меньшую клику Хунаня с агентами, обученными в Великобритании. Существует и нейтральная клика под руководством Вэй Даминя (\"душа\" операции Дая, отвечающего за коммуникации).\n\nЧжэн получил начальное преимущество, но почти никто не обращается к нему \"Лаобан\", что говорит о слабости преемников без Дая. Пока его заместители интригуют друг против друга, ВИК медленно забирает их полномочия, окончательно поставив военную разведку под контроль армии и положив конец теневому владычеству."
CHI.endgame.408.a: "Укротить бешеную собаку!"
#Song Focus Tree Events (440-459)
CHI.endgame.440.t: "Программа «Земля тому, кто пашет»"
CHI.endgame.440.d: "Феодализм давно определяется политическими интеллектуалами и лидерами Временного исполнительного комитета как система, в которой натуральное хозяйство играет доминирующую роль в китайском обществе. Эта система по своей сути несправедлива, поскольку землевладельцы используют политическую силу, чтобы занимать землю и эксплуатировать крестьян, грабя их продукты и заставляя выполнять бесплатный труд; занятие земли помещиками ведёт к тотальной монополии политической, военной и экономической власти. Верно, что прибрежные города уже вступили в капиталистическую стадию, однако отсталые северо-западные, юго-западные и сельские районы Китая всё ещё принадлежат феодальной стадии — феодализм по-прежнему является доминирующей силой в Китае. Некоторые из лидеров ВИК происходят из простых слоёв, как, например, генерал Дэн Янда. Поскольку 70% населения Китая всё ещё связаны феодальным обществом, роль партии — вмешаться и освободить их от архаичного угнетения.\n\nБольшинство лидеров ВИК поддерживают ортодоксальный подход доктора Сунь Ятсена к программе «Земля тому, кто пашет», которая позволяет крестьянам получать собственную землю в обработку, а правительство будет постепенно национализировать землю. Земли военачальников, местных тиранов, коррумпированных чиновников и злонамеренных помещиков подлежат конфискации, при этом земля не должна продаваться или покупаться частным образом. Те, кто работает на арендованной земле, должны иметь права на неё. Такой подход решит вопрос собственности на землю, не сводя революционный процесс к избыточному популизму.\n\nОднако есть и те, кто ставит под сомнение понятие «злонамеренных помещиков». Среди военных и интеллектуалов ВИК есть представители землевладельческих семей, которые выступают против радикальных реформ, но в то же время внутри ВИК есть те, кто считает необходимой гораздо более радикальную земельную реформу с элементами насильственной социальной революции для полного искоренения феодализма в Китае."
CHI.endgame.440.a: "Проводить умеренную земельную реформу."
CHI.endgame.440.b: "Проводить радикальную перераспределительную реформу."

CHI.endgame.441.t: "Отдел работы единого фронта"
CHI.endgame.441.d: "В окончательной сделке между Сон Цинлинь и Сунь Фо Лян Ханцао был вынужден уступить пост Премьера Законодательного юаня стороннику ВИК Чжану Боцзюню. Вместо этого он стал председателем Отдела работы единого фронта Центрального исполнительного комитета — менее престижной должностью, но важной для реализации якобы демократических обещаний партии.\n\nНекоалиционные республиканцы, не сумевшие войти в Лигу гражданских прав, часто вынуждены были участвовать как «Данвай» (вне партии). Эти независимые были лишены возможности организовываться на более высоком уровне, их крылья подрезали прежде, чем они могли серьёзно бросить вызов статус-кво. Их ряды были расширены по соглашению, что позволило увеличить представительство союзных республиканцев.\n\nОсобый интерес вызывает включение так называемых «Демократических партий» в Законодательный юань с выделенным числом мест на период политического наставничества. Им необходимо признавать доминирование Гоминьдана и присягать на верность Трем принципам, от них ожидается в основном консультативная роль. Большинство из них — маленькие, интеллектуальные и официально социалистические группы, хотя есть и несколько более умеренных партий.\n\nЧжан Цзюньмай сформировал «Китайскую демократическую лигу», объединяющую мелкие социал-демократические, либеральные и другие центристские левоцентристские партии. С политическим сдвигом страны влево CDL оказалась в правом фланге спектра, вынужденная объединяться ради сохранения влияния.\n\nАссоциация сельской реконструкции — давняя фракция Бэйян, ранее действовавшая под эгидой Ассоциации реформ Новой Китайской империи. Не являясь формальной партией, они выступают за сельскую реформу и программы грамотности, что сделало их политически приемлемыми для Революционного комитета.\n\nКитай ещё далеко от демократии, даже если на бумаге около трети мест Законодательного юаня занимают эти «Демократические партии». Насколько Лян Ханцао сможет (или захочет) учитывать интересы этих фракций — покажет время."
CHI.endgame.441.a: "Мы приветствуем их сердечно."
CHI.endgame.441.b: "Следим за их деятельностью."

CHI.endgame.442.t: "Народный конгресс"
CHI.endgame.442.d: "После возвращения Гоминьдана в китайскую политику после Лиги войны прошло три последовательных Национальных конгресса для координации деятельности и направления национальной революции. Однако после Третьего национального конгресса и консолидации власти Революционного комитета в партии такие лидеры, как Дэн Янда, призывают к новой форме конгресса.\n\nСледуя политике «Первого единого фронта» доктора Сунь Ятсена, Дэн призвал к продолжению единого фронта с китайскими синдикалистами и социалистами для содействия революционным изменениям, подходящим для Китая — в нынешних политических условиях. В рамках этой политики ВИК призвал созвать Народный конгресс — собрание товарищей-социалистов, включая коммунистов-советистов, анархистов, анархо-синдикалистов, синдикалистов и другие маргинальные социалистические группы, отдельные от Гоминьдана. Тем не менее, ВИК решительно отвергает синдикалистское руководство партией, и Народный конгресс всё ещё должен быть организован и возглавлен Гоминьданом как основным органом национальной революции.\n\nПервым пунктом повестки Конгресса стала реорганизация Гоминьдана в партию исключительно рабочих и крестьян (работники и крестьяне должны составлять 60% национальных органов, а остальные — другие профессиональные группы). Рабочие, крестьяне, женщины и солдаты (представляющие широкие социальные группы национальной и социальной революции) избирают представителей в иерархию собраний и советов для осуществления реальной власти. Считается, что это большой успех, и призывы к проведению Второго Народного конгресса одобрены — и второй состоится в ближайшие годы."
CHI.endgame.442.a: "Вместе мы стремимся к величайшим свершениям."
CHI.endgame.442.b: "Пусть мечтатели тратят своё время зря."

CHI.endgame.443.t: "Возрожденная партия"
CHI.endgame.443.d: "В итоге кажется, что Гоминьдан был воссоздан по образу и подобию Сон, больше не подвластен предательской фракции реконструкции, подрывной Китайской синдикалистской партии или тираническому аппарату Вана Цзинвэя. Вместо этого она объединила аграрных популистов Временного исполнительного комитета, анархистских идеалистов Всемирного общества и умеренных Революционной ассоциации товарищей в единый блок — Революционный комитет Гоминьдана.\n\nТаким образом, она стала партией, способной выполнить свои обещания. Партией, стоящей за угнетёнными простыми людьми Китая, дарящей им безопасность, стабильность и процветание. Партией, способной изгнать империалистов и дать отпор тираннам. Партией, которая способна обеспечить подлинную социалистическую демократию — от скромного кооператива до национального правительства.\n\nТаким образом РК-Гоминьдан утверждает, что он живёт в духе Трёх принципов основателя — в динамичной и живой манере его вечной воли. Однако некоторые сомневаются, не слишком ли партия едина, скреплена сильной рукой государственного аппарата. По мере продолжения политического наставничества звучат призывы ослабить контроль, чтобы позволить плодотворные дискуссии."
CHI.endgame.443.a: "Новая партия для нового Китая!"
CHI.endgame.443.b: "Но, безусловно, место найдётся и для других."

CHI.endgame.445.t: "Национальный мавзолей"
CHI.endgame.445.d: "В истории современного Китая, пожалуй, не было личности более исключительной, чем основатель партии — доктор Сунь Ятсен. Известный также как Сунь Вэнь или Сунь Чжуншань, покойный доктор Сунь был революционным мучеником, первопроходцем и философом, вдохновившим движение Гоминьдана. Доктор Сунь глубоко понимал социально-политическую реальность Китая и возродил идею Чжунхуа, создав революционную партию и армию — он заложил идеалы, которые помогли одержать победу во Второй северной экспедиции.\n\nВ этом году Национальное правительство официально присвоило покойному премьеру революции звание «Гуофу» — «Отец нации». Благодаря его бесконечной революционной борьбе, часто сопровождавшейся поражениями и изгнанием, вдохновлённая им революция продолжилась и в конечном итоге полностью объединила и освободила Китай после десятилетий борьбы.\n\nПогибший до начала Северной экспедиции, его тело несколько лет покоилось в Западных горах [GetVictoryPointName_9843]. Однако после успеха Второй северной экспедиции его останки были торжественно перенесены в Нанкин для вечного покоя. Национальное правительство поручило архитекторам Лу Янчжи и Хуан Танпу построить мавзолей в честь Сунь навсегда. Этот грандиозный проект сочетает традиционные стили императорских гробниц и современную архитектуру, а также трёхарочную ворота с надписью Сунь: «Что под небесами — принадлежит всем». В жертвеном зале потолок украшен великолепным флагом Гоминьдана, а тело Сунь находится под вечной охраной вооружённых стражей; память и наследие будут храниться веками."
CHI.endgame.445.a: "Отец нации, почивай с миром."

CHI.endgame.446.t: "Месть старейшин"
CHI.endgame.446.d: "С подъёмом Всемирного общества в руководстве Гоминьдана Четыре Старейшины всё больше влияют на партийные решения. Анархистские идеалы стали обычным явлением в партийной риторике, несмотря на ожидание продолжения наставничества. Продолжаются обсуждения между Старейшинами, которые по принципу избегают любых формальных (неакадемических) государственных постов, и Президентом Сон, но в одном они единодушны — Лига китайских синдикалистов выполнила своё назначение.\n\nСозданная по инициативе Китайской синдикалистской партии для противовеса власти Гоминьдана в Едином фронте, Всемирное общество с неохотой присоединилось, чтобы остановить угасание своего влияния в синдикалистской среде. Почти по определению нестабильное, с разными течениями марксистов, авангардистов, синдикалистов и анархистов, редко находящих общий язык, победа Всемирного общества, по иронии судьбы, стала его предвестником смерти.\n\nПосле лет горечи, заговоров и внутрипартийных распрей Четыре Старейшины наконец смогли отомстить. Ссылаясь на отчёты о продолжающемся несогласии радикальных членов КПС, они представили вопрос непосредственно Сон с требованием запретить КПС на время наставничества как контрреволюционную организацию. По их мнению, Гоминьдан уже на пути стать по-настоящему анархистской партией освобождения, и КПС может лишь служить ревнивой, разлагающей силой.\n\nПремьер Дэн Янда частично поддержал этот план, утверждая, что КПС представляет угрозу безопасности и является инструментом иностранного влияния в республике. Он надеется обезвредить оставшееся влияние ММИК в армии, хотя единый фронт с ЛКП (под руководством Всемирного общества) сохранится.\n\nМинистр иностранных дел Чэнь Южэнь советует проявлять осторожность. Работая день и ночь над восстановлением связей с международным социалистическим движением, он предупреждает, что репрессии могут нанести ущерб демократическому имиджу и подорвать доверие к нашему делу."
CHI.endgame.446.a: "Ликвидировать КПС и изгнать их лидеров."
CHI.endgame.446.b: "Арестовывать провокаторов, сохраняя единый фронт."
CHI.endgame.446.c: "Следить за радикалами, но сохранять спокойствие."

CHI.endgame.447.t: "Долг солдата"
CHI.endgame.447.d: "После лет сопротивления тысячи погибли. Остальные возвращаются домой изменёнными людьми, многие уходят со службы с постоянными физическими и душевными ранами. Даже те, кто избежал худшего, сталкиваются с неопределённым будущим. Многие задаются вопросом, как будет выглядеть жизнь после революции, как и их семьи, иждивенцы и опекуны.\n\nВ [CHI.Capital.GetCapitalVictoryPointName] попытки создать комплексные социальные программы в честь обещаний Гоминьдана застопорились из-за проблем с планированием и споров о финансировании. Ассоциация выпускников Революционного класса Военной академии Хуанпхо (WMARCA) лоббирует Центральный комитет, чтобы уделить приоритет солдатам, многих из которых ожидается демобилизовать в ближайшие годы. Они требуют широкий пакет пенсионных выплат ветеранам, стипендий и общественной поддержки для инвалидов. В публичных выступлениях премьер Дэн Янда и другие генералы настаивают, что солдаты, как служат командирам, так и командиры должны заботиться о своих людях.\n\nОднако возникает тихая оппозиция. Щедрость этих предложений вызывает вопросы об их устойчивости после старения большого числа ветеранов НРА. Другие сомневаются в намерениях WMARCA. В отличие от армий военачальников, НРА должны были сражаться за народ, а не только за офицеров, вознаграждающих их добычей. Для них такое политическое вмешательство недостойно народной армии. Неоспоримо, что им нужно вернуть лояльность, но они также боролись за справедливое обращение для всех.\n\nВ конечном счёте республика построена на жертвах почти целого поколения молодых мужчин. Но многие другие тоже жертвовали ради революции и продолжают страдать. Этот вопрос становится всё более публичным и чувствительным, ветераны собираются в своих старых мундирах у Законодательного юаня в знак протеста. Было предложено компромиссное решение — объединить с планами по упрощённой пенсии для госслужащих. Кто-то считает этого недостаточно, другие боятся возрождения старых классовых иерархий. Требуется решение."
CHI.endgame.447.a: "Сократить бюрократию и реализовать широкие предложения WMARCA."
CHI.endgame.447.b: "Сократить их предложения и расширить их на общую пенсию госслужащим."
CHI.endgame.447.c: "Они должны подождать, всем рано или поздно выплатят заслуженное."

CHI.endgame.450.t: "Новый флаг нации"
CHI.endgame.450.d: "Новообъединённая Китайская Республика использует Национальный флаг, на котором изображены Голубое небо и Белое солнце с партийного флага Гоминьдана, а также цельноземельный красный фон. Однако с недавнего Народного конгресса поступают предложения почтить крестьян, построивших эту страну, и отдать дань уважения Крестьянскому учебному институту Временного исполнительного комитета. Бывшие члены ВИК и синдикалисты предложили в Законодательный юань принять новый национальный флаг, который бы прославлял крестьян и включал бы характерный плуг на красном фоне. Другие предложили включить символы как работников, так и крестьян — плуг и зубчатое колесо вместе, поскольку ВИК выступал за всех угнетённых. Конечно, можно сохранить текущий национальный флаг в знак приверженности оригинальным идеалам революции доктора Сунь."
CHI.endgame.450.a: "Флаг для крестьян наконец-то."
CHI.endgame.450.b: "Флаг для работников и крестьян."
CHI.endgame.450.c: "Сохраним национальный флаг."
#Military Forgiveness Events (460-479)
CHI.endgame.460.t: "Наследие Индийской клики"
CHI.endgame.460.d: "Наследие так называемой «Индийской клики» вызывает споры в реформированной Национальной революционной армии, доминируемой ныне влиятельной Ассоциацией выпускников Военной академии Хуанпхо. В течение многих лет эти две группы представляли собой отдельные клики в НРА — Индийская клика включала офицеров, проходивших службу и обучение в Индии, тогда как вторая велась партизанскую войну в Минганском восстании. В руководстве Ассоциации выпускников Хуанпхо, безусловно, сильнее выражены социалистические симпатии, тогда как социалистические наклонности Индийской клики весьма расплывчаты, и их правильнее всего охарактеризовать как националистов прежде всего.\n\nТем не менее обе фракции имеют общую историю в Четвёртой армии (Гуандунской армии) в Первой Северной экспедиции Национальной революционной армии. Они были товарищами прежде и вновь стали таковыми во Второй Северной экспедиции. По мере того как Ассоциация выпускников Хуанпхо продолжает укреплять контроль и лояльность своих студентов, поступают частные сведения, что генералы, такие как Сюэ Юэ и Чжан Факуй, чувствуют свою маргинализацию. С окончанием военной фазы революции встаёт вопрос — насколько важно сохранять лояльность Индийской клики. Тем не менее старшие члены Ассоциации заступаются за этих генералов, ссылаясь на давнюю товарищескую связь в национальной революции."
CHI.endgame.460.a: "В конце концов, мы — товарищи."
CHI.endgame.460.b: "Им нужно присоединиться к программе."

CHI.endgame.461.t: "Разочарованная молодая гвардия"
CHI.endgame.461.d: "Со времени открытия Военной академии Хуанпхо нередко встречаются страстные революционные националисты, привлечённые европейским синдикализмом. Приход Международной военной миссии в Китай способствовал развитию тенденций европейского социализма, включая синдикализм и коммунизм советского типа. Это вызвало подозрения у более консервативных военных, особенно во время кризиса Третьего конгресса, поскольку считалось, что они предпочитают Маркса принципам Трёх народных начал.\n\nНационалистическое правительство в стремлении к легитимности и завершению сложного процесса национального объединения фактически предоставило амнистию всем младшим офицерам и солдатам, восставшим против Центрального правительства. Тем не менее многие из тех, кто был против нас, разочаровались в революционном деле и считают, что их карьерные перспективы серьёзно пострадали из-за прежних связей. Некоторые открытые офицеры в высшем командовании выступают за прощение и возвращение бывших товарищей в ряды партии с распростёртыми объятиями. Другие же требуют более жёсткой позиции, утверждая, что возраст — слабое оправдание предательству."
CHI.endgame.461.a: "Что было, то прошло, нужно идти вперёд."
CHI.endgame.461.b: "Юность — слабое оправдание предательству."

CHI.endgame.462.t: "Судьба клики Политического департамента"
CHI.endgame.462.d: "Созданный как инструмент для организации и внедрения доктрины партии в Национальной революционной армии, Политический департамент НРА подвергся жёсткой критике за своё поведение во время кризиса Третьего конгресса. Это был очаг революционной активности, кадры которого состояли из интеллектуалов и офицеров из Лиги китайских синдикалистов, и который часто ассоциировался с наиболее социалистическим крылом Хуанпхо.\n\nПобеда Временного исполнительного комитета привела к переоценке роли Политического департамента. Генерал Чжан Чжижун полностью взял на себя ответственность за позицию департамента в ходе беспорядков против законного Националистического правительства и пообещал, что департамент впредь останется лояльным Революционному комитету. Генерал Дэн Янда приказал полностью изменить учебную программу Политического департамента, потребовав от преподавателей делать упор на идею «единства всех революционных классов» и сосредоточиться исключительно на Трёх принципах народа доктора Сунь. Тем не менее в правительстве звучат призывы к полной ликвидации Политического департамента, аргументируя это тем, что его роль исчерпана после завершения Второй Северной экспедиции."
CHI.endgame.462.a: "Восстановить их в должностях."
CHI.endgame.462.b: "Их места уже заняты."

#Song Epilogue Events (500-519)

CHI.endgame.501.t: "Единство крестьян и рабочих"
CHI.endgame.501.d: "Жарким летним днём июля 1924 года в Гуандуне прошла Первая Все-гуандунская крестьянская конференция, на которую были приглашены тысячи крестьян для участия в массовом движении Гоминьдана. Г-жа Сунь Ят-сен, Сун Цинлин, не смогла сдержать слёз, наблюдая, как массы в лохмотьях шествуют ради национального спасения. Действительно, покойный вечный премьер однажды сказал, что успех революции начинается с народа; революция — это их долг ради обретения свободы.\n\nМного лет спустя национальная революция подошла к завершению. Ортодоксальная фракция Китайской синдикалистской партии возглавила курс Единого фронта с Лигой китайских синдикалистов. Этот союз, сотрудничество с европейскими синдикалистами, привёл к победе Китайской революции — никто не сможет остановить поступь рабочих и крестьян. Тем не менее, страной по-прежнему фактически управляет Гоминьдан — именно он организует профсоюзы и ассоциации, и именно он остаётся старшей сестрой в отношениях между партиями. Остаётся лишь вопрос — сохранится ли такое соотношение сил, растворится ли Китайская синдикалистская партия в более крупной структуре Гоминьдана, или же сам Гоминьдан постепенно потеряет свои принципы под влиянием синдикализма.\n\nНо несмотря ни на что, есть повод для радости. Долгие годы рабочие и крестьяне страдали под гнётом капитализма — империалистической системы, разделившей и разорившей страну. Теперь, с приходом к власти Революционного комитета, в который входят представители рабочих и крестьян — капитализм больше никогда не возродится в Китае. Вместе, рука об руку, на Востоке восходит новая социалистическая заря — и китайский пролетариат возглавляет её с гордостью!"
CHI.endgame.501.a: "Партнёрство навека."

CHI.endgame.502.t: "Нация, построенная мечтателями"
CHI.endgame.502.d: "Во Всемирном обществе и среди утопистов Временного исполнительного комитета искренне верят, что Три народных принципа приведут к состоянию спокойствия и мира — к пути, ведущему к анархии. История, как они утверждают, это подтверждает. Как писал уважаемый Ли Шицзэн, есть революции, определяющие путь человечества: монархические революции Шан и Чжоу, установившие понятие порядка; национальные демократические революции, такие как в Америке и Франции; и социалистические революции, примером которых служат Коммуна Франции и Союз Британии. Гоминьдан успешно провёл Китай через национальную и социалистическую стадии революции, и теперь страна готова к четвёртой — революции ради датун.\n\nУтописты Гоминьдана верят, что возможен мир без страданий и раздоров. Ненависть и гнев разрушают единство, и только под руководством Партии можно достичь общества без разделений — общества чистой любви. Революционный комитет Гоминьдана уже предпринимает шаги навстречу этой либертарной мечте: власть передаётся на местный уровень, рабочих и крестьян призывают самоорганизовываться в демократические ячейки и советы, и делается акцент на децентрализацию центральной власти. Эти идеалы, как считается, отражают мечты доктора Сунь Ят-сена, верившего, что народ Китая можно обучить их базовым правам и что демократия в конце концов расцветёт.\n\nАнархисты, однако, скажут вам, что никто не знает, когда наступит этот день. Некоторые с оптимизмом заявляют, что на это может уйти более 3000 лет — каждое новое развитие в истории человечества требует десятилетий, а то и столетий. Идея такой анархической федерации внутри Гоминьдана гибка и признаёт, что революция требует времени и терпения. Партия поведёт народ к полной свободе. А пока... мы будем мечтать — о будущем, о грядущем мире!"
CHI.endgame.502.a: "Утопия, пусть даже через 3000 лет."

CHI.endgame.503.t: "Честное наставничество"
CHI.endgame.503.d: "В 1911 году декадентская династия Цин была свергнута вспышкой революционного энтузиазма — её сгубили коррупция, равнодушие к нуждам народа и неспособность защитить страну от колонизаторов. Их правление, веками державшееся на мандате Неба, рухнуло менее чем за год.\n\nЗа ней последовала республика, полная надежд — но вскоре она была предана Юань Шикаем, а затем военачальниками, превратившими правительство Бэйяна в личную кормушку, осквернив его своими пороками. Партия попыталась изгнать этих стяжателей, но была предана уступчивыми изменниками и германскими империалистами.\n\nЗатем пришли Ван Цзинвэй и его РКА, заявлявшие, что борются за народ, но фактически позволившие продолжаться чуме коррупции, погрязнув в том же двуличии, что и вся китайская политика последних лет. Но благодаря смелости товарищей из Временного исполнительного комитета, Сун Цинлин и Дэн Янда смогли изгнать последних негодяев из властных коридоров.\n\nОни открыли новую эпоху идеализма, очистив столицу от скверны и приблизив Республику к народу. Наставничество по-прежнему необходимо — чтобы обучить бедняков и сравнять их с образованными слоями, но это не конец истории Китая. Вместе Гоминьдан построит китайский социализм — для народа, полностью воплотив Три народных принципа!"
CHI.endgame.503.a: "Да здравствует Чжунхуа Миньго!"

CHI.endgame.504.t: "Мечта наших отцов"
CHI.endgame.504.d: "Гоминьдан был не всегда циничной авангардной партией, выступающей за авторитарное государство. Он когда-то был полон надежд — группой, мечтавшей о светлом, демократическом будущем родины. Это было до предательства Сунь Ят-сена Юань Шикаем, затем военачальниками, а затем и красными империалистами из Интернационала. Ван Цзинвэй и синдикалисты исказили его видение — по крайней мере, так говорит новая партийная линия.\n\nСун Цинлин и Сун Фо, два самых близких к нему человека, утверждают, что вернули партию к её истокам — в леводемократическую силу на благо нации. Последний особенно мечтает повернуть время вспять — к довоенному 1924 году, до реорганизации и левоповорота партии. Он почти пытается переписать историю, игнорируя все события последующих десятилетий.\n\nМежду ними есть глубокие разногласия, хоть они и почти ровесники. Сун Цинлин считает, что заложила социалистический вектор, ведущий к демократическому социализму на основе крестьянских коммун. Приглашённые Суном буржуазные партии — лишь необходимое зло, которое ещё можно привести на путь служения народу.\n\nДля Сун Фо же революция, задуманная отцом, ещё может быть спасена — стоит лишь правильно оформить конституцию. Её проект переписывался уже несколько раз: сперва под его личным контролем, затем с помощью «Политического совета народа», а теперь и с многопартийным «Политическим консультативным советом». Он надеется притушить социалистический радикализм и построить парламентскую республику — с переносом власти от Исполнительной ветви к Законодательной.\n\nОн также добивается усиления премьерства Исполнительного юаня за счёт президентства — что может стать первым шагом в длинной череде политических баталий между наследниками доктора Сунь. Несмотря на это, многие надеются, что эти споры решатся не насилием, а в рамках мирной адаптации к многопартийной системе по окончании наставничества. И пока Китай поворачивает к новой эпохе — новое поколение продолжает мечтать."
CHI.endgame.504.a: "Шанс исправить ошибки прошлого."

##Section 4d (600-799): Hu Endgame Events
 CHI.endgame.601.t: "Тлеющие угли"
 CHI.endgame.601.d: "Фуцзянь лежит в руинах. Такие города, как Сямынь и Лунъянь, жестоко разрушены и разоряемы партизанами Временного комитета действий, которые оказали в Лунъяне последнюю отчаянную поддержку. Многое из того, что построило миньганьское правительство, лежит в руинах, а синерубашечники приступили к работе - добиваются капитуляции оставшихся повстанцев. В отчёте, отправленном верховному командованию, возглавляемому ныне генералиссимусом Ху Цзуннанем, генерал Дэн Вэньи сообщил в столицу, что регион фактически "умиротворён".\n\nВ то время как пепел всё ещё горит, а угли тлеют, Общество возрождения Китая, похоже, готово обезопасить остальную часть страны. Тем не менее, генералы-предатели Дэн Яньда и Чжоу Эньлай до сих пор не найдены, и предполагается, что они живы и, скорее всего, организуют дальнейшее сопротивление руководству ОВК. Существует также проблема и угроза появления новых повстанческих ячеек, связанных с ВКД, РАТ и даже СПК, в крупных городах и сельской местности по всей стране.\n\nК счастью, из-за того, что бывшие члены РАТ и ВКД так сильно настроены друг против друга, кажется маловероятным, что они объединятся в значимом качестве. Если уж на то пошло, бывшие фракции стали ещё более разобщенными, превратившись в ожесточённые, параноидальные повстанческие ячейки, возглавляемые местными главарями. Несмотря на это, беспорядки продолжаются, и генералиссимусу и руководству ОВК ясно, что до полного умиротворения ещё далеко."
 CHI.endgame.601.a: "Возможно, мы и выиграли войну, но не мир..."

 CHI.endgame.602.t: "Скоро грянет буря"
 CHI.endgame.602.d: "В то время как кампании по умиротворению продолжаются, а Общество возрождения Китая изо всех сил пытается сохранить ту малую легитимность, которую оно имеет по отношению к руководству Гоминьдана и китайской нации, республику ожидают ещё большие проблемы, поскольку экономика страны находится в полном упадке. Крупные городские центры и части сельской местности были разрушены из-за гражданской войны, а экономический рост страны, который, как считалось, был на подъёме после объединения, фактически прекратился.\n\nЧто ещё хуже, похоже, что внешняя торговля, даже с Третьим Интернационалом, в значительной степени прекратилась из-за открытой ксенофобии и националистической риторики ОВК. Жестокость руководства, особенно в том, что касается их антиимпериалистических и антиинтеграционных взглядов, привела к тому, что многие иностранцы просто покинули Китай, и любые потенциальные инвестиции из-за рубежа кажутся маловероятными. Иностранные банкиры и инвесторы ликвидировали свои активы почти за одну ночь после победы ОВК. Более того, многие богатые китайские эмигранты в таких местах, как Юго-Восточная Азия и Гавайи, также отказались от своей поддержки партии, многие из них осудили государственный переворот Ху Цзуннаня как незаконный и выразили сожаление по поводу раскола партии.\n\nУчитывая, что экономика возвращается к уровню разрушений и стагнации, вызванным войной Лиги, маловероятно, что экономика Китая сможет быстро восстановиться. Над Китаем сгустились грозовые тучи, и в стране становится всё неспокойнее; если кредиторы действительно хотят сохранить свои притязания на лидерство в Китае, то они должны действовать быстро в разрешении экономического кризиса."
 CHI.endgame.602.a: "Нацию постигает трагедия."

 CHI.endgame.603.t: "Угасающий свет миньцюаня (демократии)"
 CHI.endgame.603.d: "Сунь Фо не знал и никогда бы не подумал, что партия станет такой. Конечно, у его отца были авторитарные наклонности, но он покинул убежище на Гавайских островах не для того, чтобы принять участие в идеалистическом Втором Северном походе только для того, чтобы увидеть, как она рушится из-за крайностей тоталитаризма и тирании. Хотя он по-прежнему де-факто является премьером Исполнительного Юаня, какое это имеет значение теперь, когда Национально-революционная армия контролирует все парламентские и гражданские дела?\n\nОфициально Фракция реконструкции по-прежнему контролирует Законодательный Юань и другие гражданские органы правительства. Но это не имеет большого значения, поскольку руководство всей партией и военными операциями полностью находится в руках Ху Цзуннаня и его последователей. Под руководством товарища Ху чрезвычайное положение по-прежнему будет сохраняться на неопределённый срок. Действие Законодательного Юаня приостановлено на неопределённый срок, что ещё больше усугубляет неопределённость в отношении будущего партии.\n\nОфициально Общество возрождения Китая действительно стремится поддерживать три принципа доктора Суня (один из которых - миньцюань, права человека/демократия). Но многие радикалы, такие как Хэ Чжунхань, считают, что демократии просто нет места в современном обществе. Для них демократия - это яд, который отравляет жизнь партии и является её дегенеративным заболеванием. Хэ Чжунхань считает Законодательный Юань по своей сути буржуазным и стремится упразднить его, как и большую часть бюрократического аппарата, который позволяет правительству работать.\n\nТеперь почти каждый день Хэ Чжунхань и Сунь Фо сталкиваются в кабинете генералиссимуса Ху, споря о судьбе приостановленного законодательного органа. Несмотря на то, что этот комитет был бы бессилен, даже если бы он вновь открылся, он всё равно замедлил бы худшие проявления эксцессов нового режима и, следовательно, представляет угрозу для диких амбиций Хэ Чжунханя. Но на данный момент чрезвычайному положению, похоже, не видно конца..."
 CHI.endgame.603.a: "Тьма окутывает некогда яркую революцию."

 CHI.endgame.621.t: "Новый курс в Ганьнане"
 CHI.endgame.621.d: "Ганьнань, расположенный на юге провинции Цзянси, был одним из главных очагов беспорядков во время гражданской войны в Гоминьдане из-за того, что он был одним из ключевых районов правления популистского миньганьского правительства. Провинция долгое время была довольно сельской и бедной, а такие популярные пороки, как курение опиума и проституция, всё ещё были широко распространены среди местных жителей.\n\nОдин конкретный комиссар, посланный на юг для умиротворения региона, получил известность сам по себе. Цзян Цзинго, сын бывшего директора Военной академии Вампоа, получил широкую известность в газетах и журналах ОВК за свою работу по умиротворению местного населения. Сын директора школы бежал вместе со многими другими изгнанниками из Гоминьдана во время провала Северного похода и оказался в кругах Ху Цзуннаня и Хэ Чжунханя. По возвращении в Китай он ещё больше укрепился в Обществе возрождения Китая, в котором получил свою последнюю должность.\n\nВ Ганьнане Цзян изучал государственное управление и создал местное "бюро общественной информации", куда местные жители могли обращаться к нему со своими проблемами. Он ввёл суровые наказания за курение опиума, азартные игры и проституцию в соответствии с доктриной морали, которой придерживается ОВК. Что касается запрета на проституцию и публичные дома, то Цзян разработал программу, в рамках которой бывшие проститутки могут найти работу на фабриках.\n\nКроме того, Цзян также создал китайскую детскую деревню для сирот, созданную как во время гражданской войны, так и во время войны сопротивления. В этой деревне, созданной на окраине Ганьчжоу, есть такие объекты, как ясли, детский сад, начальная школа, больница и спортивный зал, хотя обучение в школах и спортзалах подчёркивает боевой дух идеологии ОВК."
 CHI.endgame.621.a: "Многообещающий ум с многообещающим будущим."
 CHI.endgame.621.b: "Его отец бы им гордился."

 CHI.endgame.622.t: "Игрушки в новой республике"
 CHI.endgame.622.d: "С помощью Министерства образования школы в Китайской Республике стремятся продвигать национальную образовательную политику, которая помогает воспитывать безответную любовь к нации и готовность пожертвовать даже своей жизнью ради неё. По словам анонимного автора от имени ОВК, "Дети, которых мы воспитываем, - это дети нации, а не дети семьи или клана."\n\nВ классе детей учат участвовать в групповых мероприятиях, групповом сотрудничестве и групповых дискуссиях, чтобы практиковать коллективное мышление и чтобы учащиеся в первую очередь научились отождествлять себя с нацией, а не с семейными узами.\n\nВоенная подготовка детей должна начинаться уже в детском саду. Маленьким детям в качестве игрушек следует раздавать оружие и военные корабли, а на стенах развешивать картинки с батальными сценами, "чтобы с детства у детей развивался интерес к военной технике и боевым ситуациям." Начиная с детского сада, дети должны получать образование в военной среде, а учащиеся средних школ должны записываться в "Союз молодёжи имени Трёх народных принципов" (который является единственной молодёжной организацией) с сильным военным уклоном. Упор делается на физическую подготовку и групповые соревнования - таким образом, хилые и заученные студенты прошлого должны быть заменены революционным авангардом будущего.\n\nОфициальное военное образование должно начинаться в средней школе, в которой юноши могли бы проходить военную подготовку, а девушки - обучаться на медсестёр. Гуманитарные науки не поощряются, в то время как практические и научные предметы, такие как физика, химия и инженерное дело, должны быть ориентированы на их применение в военное время. Например, на уроках химии особое внимание будет уделяться изучению таких вещей, как отравляющие газы и взрывчатые вещества."
 CHI.endgame.622.a: "Когда-нибудь из них получатся отличные солдаты!"
 CHI.endgame.622.b: "Они - революционные офицеры завтрашнего дня!"

 CHI.endgame.623.t: "Движение новой жизни"
 CHI.endgame.623.d: "Общество возрождения Китая стремится возродить культуру, которая является истинно китайской. События Третьего всекитайского съезда и гражданская война Гоминьдана показали распад национальной культуры. Таким образом, крайне важно осуществить культурную революцию, чтобы возродить национальную культуру и душу нации. Они не хотят отвергать западную модернизацию, а скорее считают, что деревенские традиции самодовольства, индивидуализма, пассивности и суеверий не подходят для "века науки", в то время как четыре традиции ли, и, лянь и чи были вечны (четыре кардинальных принципа конфуцианства), ОВК стремится исправить всё неправильное в "старой культуре".\n\nЭто не спонтанное движение, но, возможно, что-то, что глубоко резонирует с генералиссимусом Ху Цзуннанем. Ху, который провёл много лет в изгнании в Британском Союзе, часто сравнивал кадетов Вампоа с "круглоголовыми" и сравнивал себя с Оливером Кромвелем, сильным республиканским военным лидером, который сплачивал массы. Он считает, что его личный стиль жизни, заключающийся в воздержании от одного из пороков, должен стать примером для подражания массам, а в самом ОВК нет единого мнения о том, стоит ли черпать вдохновение в характере Линсю или лучше использовать революционную природу культурной революции.\n\nДвижение новой жизни было создано по приказу генералиссимуса как революция против реакционного либерализма и реакционной культуры. Западные либеральные книги запрещены, поскольку они рассматриваются как поощряющие декаданс и похоть. По настоянию комиссаров АТРА члены ОВК устраивают массовые митинги, на которых сжигают иностранные книги и осуждают их как иностранную и западную безнравственность. Курение в общественных местах и плевки на улицах были запрещены, поскольку они считаются отсталыми в культурном и моральном отношении, в то время как даже химическая завивка волос является обязательной, поскольку волосы должны быть прямыми. Даже относительно безобидные действия, такие как переход проезжей части, запрещены, чтобы создать впечатление, что Китай действительно является современной страной, пользующейся дорогами.\n\nНаньчан, прозванный одним из мест зарождения революции из-за боевых действий во время войны Лиги, должен послужить новым примером нового современного и нравственного Китая. Проститутки и нищие были изгнаны с улиц, а наркоманы отправлены на "реабилитацию". На месте разрушенных и полуразрушенных домов возводятся новые здания, расширяются улицы, открывается ряд новых парков и школ для развлечения и просвещения людей."
 CHI.endgame.623.a: "Двигаться в патерналистском направлении."
 CHI.endgame.623.b: "Мы стремимся к тотальной культурной революции."

 CHI.endgame.624.t: "После полуночи"
 CHI.endgame.624.d: "Над старым Гоминьданом сгущаются сумерки, поскольку эпоха подходит к концу. Старый порядок с его военачальниками и императорами давно канул в лету, низвергнутый второй волной победоносных революционеров. Но многих из тех революционных мечтателей, чьи голоса когда-то были так сильны, больше нет. Лидеры, которые были готовы править страной, теперь оказываются на обочине (или того хуже), когда к власти приходит новое поколение революционных лидеров.\n\nКлика Вана Цзинвэя в основном распалась, а Реорганизованная ассоциация товарищей была запрещена как подрывная. Её последователи разбежались кто куда, а Чэнь Гунбо бежал в изгнание. Его некогда могущественная оппозиция также распалась под тяжестью преследований. Сун Цинлин уже много недель не появлялась на публике, так как несколько недель назад была помещена под домашний арест. Официально она является членом правления нескольких благотворительных организаций, часто носящих имя своего мужа, хотя на практике ведет тихую уединённую жизнь. Дэна так и не нашли, неясно, жив ли он ещё, но надежда на то, что его подпольное сопротивление приведёт к чему-нибудь, угасла. Всякая надежда на успешный Объединённый фронт умерла вместе с ними, а враждующие группировки Союза синдикалистов Китая также бежали, на пути обвиняя друг друга.\n\nСунь Фо, похоже, единственный, кто остался в живых, даже несмотря на то, что большинство его богатых последователей сократили свои потери и либо изменили лояльности генералиссимусу, либо скрылись за границей. Будучи премьером Исполнительного Юаня, его власть становится всё более узконаправленной перед лицом наступающей Ассоциации товарищей революционной армии (АТРА). Хэ Чжунхан, лидер этого (ещё более радикального) крыла ОВК, стремился уничтожить бюрократию, вдохновлённый революционным учением сорелианцев об узком авангарде. На своих жарких встречах с генералом Ху, Сунь борется изо всех сил, настаивая на том, что слова его отца остаются главными даже в эту новую эпоху."
 CHI.endgame.624.a: "Слова доктора Суня по-прежнему заслуживают внимания."
 CHI.endgame.624.b: "Возможно, нам пора начать что-то новое."

 CHI.endgame.625.t: "Секреты и ритуалы в АТРА"
 CHI.endgame.625.d: "В то время как их общественным фронтом является Общество возрождения Китая, за подготовку и идеологическую обработку ОВК отвечают члены гораздо более закрытого движения - Ассоциации товарищей революционной армии Хэ Чжунханя (АТРА), военной группировки, популярной среди радикальных студентов Вампоа. Несмотря на то, что АТРА сравнивают с братской организацией, подобной Реорганизованной ассоциации товарищей и Ассоциации революционных одноклассников Военной академии Вампоа, АТРА действительно придерживается гораздо более эзотерических методов организации и секретности.\n\nНа самом деле, самым зрелищным из их ритуалов является сама церемония посвящения в члены АТРА. Потенциальные члены могут стать таковыми только по рекомендации старших членов, и их инструктируют изучать тайные знаки и эзотерический язык общества. На церемонии кандидаты клялись хранить секреты братства, а затем зачитывали клятвы с листа бумаги, который затем сжигали и смешивали в миске с куриной кровью, подкрашенной вином и сахаром. Затем новички становились кровными братьями, выдавив немного своей крови в чашу и выпив из неё. Эти церемонии сопровождаются тайными жестами тела и рук, а также мистическим танцем, который является средством, с помощью которого рядовые и офицеры идентифицируют друг друга.\n\nКонечно, есть сомнения по поводу этих суеверных ритуалов в духе триады, проводимых РАТ. В конце концов, такие меры кажутся ребяческими, а ОВК добилось лидерства во власти, действительно ли есть необходимость в такой секретности в движении? Но нет никаких сомнений в том, что братская организация АТРА действительно довольно популярна среди новых и состоявшихся офицеров Вампоа, и если генералиссимус решит расправиться с ними, это может привести к беспорядкам среди последователей Хэ Чжунханя."
 CHI.endgame.625.a: "Они так молоды и нуждаются в руководстве."
 CHI.endgame.625.b: "Юношеская энергия - это как раз то, что нужно стране."

 CHI.endgame.626.t: "Внутренние фракции ОВК"
 CHI.endgame.626.d: "Несмотря на свою ненависть к правительственной бюрократии и фракционности, Общество возрождения Китая состоит из трёх основных "колец", каждое из которых постепенно становится меньше предыдущего и представляет различные уровни власти в политической иерархии.\n\nВнутренним кругом является Лисиншэ, состоящий из 528 членов и считающийся новым Центральным исполнительным комитетом Гоминьдана. Внутренний круг даже не называет себя ОВК, но, скорее, ОВК является общественным фронтом для деятельности Общества. Их обсуждения и методы почти полностью являются частными и секретными, хотя ими руководит исполнительный секретарь Хэ Чжунхан. Для контроля за принятием политических и оперативных решений "внутреннему кругу" помогают секретариат (Дэн Вэньи) и четыре отдельных функциональных отдела, а именно: по общим вопросам (Лю Бутун), пропаганде (Кан Цзэ), организации (Чжэн Цземинь) и специальным службам (Дай Чуньфэн).\n\nВторое кольцо концентрических кругов - это Ассоциация товарищей революционной армии Хэ Чжунханя (АТРА), основанная выпускниками Военной академии Вампоа. Хотя их иногда ошибочно принимают за настоящее ОВК, АТРА отвечает за создание новых ячеек и внедрение в гражданское население, бюрократию и военных для привлечения членов ОВК.\n\nПоследнее и третье кольцо также является самым крупным и отражает политические аспекты ОВК, выступая в качестве массовой базы организации. Фусинше, или Общество возрождения Китая, является самым низким уровнем организации, но также состоит из четырёх отделений. Однако у них нет собственного прямого руководства, и всеми вопросами занимается АТРА. В рамках аналогичной системы комитетов в Гоминьдане дебаты допускались на более низких уровнях, но решения принимались на самом верху. Более того, у ОВК даже есть система надзора и контрольная комиссия для проверки и контроля за деятельностью Фусиншэ, а также для наблюдения за мыслями, поведением и поступками отдельных членов, чтобы убедиться в их верности национальной революции. Эта контрольная группа насчитывает более тысячи человек, возглавляемая наблюдательным комитетом во главе с ответственным секретарём, при этом контрольная группа в дальнейшем делится на отраслевые и подотраслевые уровни для поддержания контроля над общей силой и единством партии."
 CHI.endgame.626.a: "Генералиссимус обращается за советом к Лисиншэ."
 CHI.endgame.626.b: "Воля народа должна руководить национальной революцией!"

 CHI.endgame.627.t: "Наследие директора"
 CHI.endgame.627.d: "Для многих людей как в партии, так и за её пределами генерал Чан Кайши был в лучшем случае благонамеренным неудачником, а в худшем - реакционным бонапартистом, его наследие пошатнулось из-за провала Северного похода и усиления его политических соперников левого толка. После его убийства в 1927 году мало кто мог публично сказать что-то хорошее о бывшем директоре Вампоа, если вообще мог.\n\nВсё изменилось с появлением Общества возрождения Китая, которое восстановило позорную репутацию своего бывшего наставника, подняв его на новые высоты в революционном пантеоне. Почти за одну ночь государственные СМИ, которые ранее в большинстве случаев сдержанно признавали роль Чана Кайши, изменили своё мнение. Чан был выбран в качестве героической фигуры и отважного командира, который воспитал целое поколение революционеров, прежде чем был предан коварным Ваном Цзинвэем и убит злобными реакционерами. Чан стал символом вооружённых сил, образцовым солдатом и товарищем. Его личные слабости отошли в анналы истории, уступив место почти мифическому статусу.\n\nВсё это, конечно, имеет не только личное, но и практическое значение. Для многих молодых кадетов, ставших национальными лидерами, которые никогда не знали Сунь Ятсена лично, Чан Кайши служит связующим звеном между наследием вечного премьера и их собственным, укрепляя их притязания на легитимность. Но нет никаких сомнений в том, что здесь присутствует и подлинный элемент лояльности, учитывая любовь старого директора Вампоа к своим ученикам, которая с тех пор вернулась. Наследие Чана Кайши стало неотъемлемой частью культа личности самого Ху Цзуннаня, поскольку режим создаёт новых героев и легенды."
 CHI.endgame.627.a: "Доблестный герой, мудрый наставник, пример для всех будущих офицеров!"
 CHI.endgame.627.b: "Генералиссимус Ху Цзуннань действительно несёт свой революционный факел!"

 CHI.endgame.628.t: "Назначения в меняющейся армии"
 CHI.endgame.628.d: "Национально-революционная армия всегда отличалась братским мышлением, с глубоко укоренившимися узами личной преданности, подкреплёнными общим идеологическим рвением. Эти мощные сети социальных связей, часто выходящие за рамки партийной фракционности, были разорваны, когда последствия Третьего съезда репатриантов резко настроили подразделения и офицеров друг против друга. Это грозило разрушить то, что когда-то было могучей победоносной армией, которая давала отпор врагам, более многочисленным, лучше оснащённым и даже лучше управляемым, благодаря своей общей, упрямой революционной воле.\n\nТеперь, когда верные Нанкину подразделения Национально-революционной армии и военизированные формирования синерубашечников едва способны поддерживать порядок, новое правительство проявляет повышенный интерес к ограниченным программам массовой амнистии для избранных подразделений, чтобы армия не получила преимущества в борьбе с иностранными противниками. В рамках военной доктрины ОВК всегда рассматривался как часть более широкой организации "Молодая гвардия", прошедшей обширную подготовку по иностранным технологиям в Европе. Это заставило генералов Хэ Чжунханя и Дэна Вэньи с большей готовностью простить членов клики Политического департамента, которую теперь возглавляет Чжан Чжичжун. Несмотря на то, что Чжоу Эньлай находится на свободе, некоторые соперники Дая Чуньфэна из красных отрядов согласились вернуться в строй.\n\n"Старая гвардия" военных, однако, гораздо более актуальна и продолжает поддерживать престиж ныне мифологизированного миньганьского повстанческого движения, а также поддерживает тесные связи с братствами выпускников Вампоа. Считается, что благодаря лоббированию членов индийской клики, а также Линя Бяо, командира в миньгане, ставшего влиятельным лидером ОВК, правильными словами они могут склонить многих старых коллег Линя на сторону нового правительства. Однако в обоих случаях остается вопрос о том, насколько сильно могут измениться "старые взгляды" и можно ли по-настоящему простить им отсутствие дальновидности. Возможно, по-настоящему революционным шагом было бы продвижение нового поколения военных офицеров, в большей степени соответствующих целям генералиссимуса."
 CHI.endgame.628.a: "Молодая гвардия прокладывает путь вперёд."
 CHI.endgame.628.b: "Примирение с НРА исцелит нацию."
 CHI.endgame.628.c: "Только по-настоящему преданным можно доверять."

 CHI.endgame.629.t: "Предатели в наших рядах"
 CHI.endgame.629.d: "По мере того как революция продолжалась во время Второго Северного похода и Войны сопротивления, многие генералы и офицеры бывших реакционных полевых командиров приняли сторону Национально-революционной армии, видя, что им следует присоединиться к нашему делу, а не выступать против него.\n\nСейчас, когда проводятся кампании по умиротворению бывших ячеек СПК и террористов, входящих в Реорганизованный комитет действий или Временный комитет действий, роль НРА в партийной политике возросла как никогда. Однако НРА необходимо тщательно изучить свои ряды, чтобы определить, какие офицеры потенциально могут быть добровольными последователями нового режима, а какие стремятся к его падению. Во всяком случае, некоторые из этих сотрудников даже являются помехой, поскольку не все сотрудники, работающие у нас, обязательно являются бывшими выпускниками Вампоа.\n\nСуществует также вопрос об Индийской клике. Известно, что, участвуя в Северном походе, они часто принимали сторону Суня Фо и его Фракции реконструкции. Учитывая наше собственное неприятие их глупых разговоров о либерализме и демократии, нам следовало бы раз и навсегда избавить партию от индийской клики."
 CHI.endgame.629.a: "НРА должна быть очищена от всех реакционеров!"
 CHI.endgame.629.b: "Мы можем доверять только нашим братьям из Вампоа."
 CHI.endgame.629.c: "Преданность доказывается на поле боя, а не в партийном офисе."

 CHI.endgame.630.t: "По ком звонит колокол"
 CHI.endgame.630.d: "За прошедшие годы китайская нация познала много горя, поскольку некогда могущественная страна впала в уныние, а государство больше не было в состоянии защитить свой народ. По мере того как бушевали войны и революции, число трагедий и смертей росло - практически каждая семья понесла потери, обнищала, была вынуждена покинуть свой дом или призвать на военную службу кого-либо из родственников. Но жизнь продолжала идти своим чередом, даже в самые тёмные времена и в самых мрачных местах. И теперь, когда самые ожесточённые боевые действия прекратились, появилось место для более счастливых моментов, поскольку люди наконец-то могут увидеть за горизонтом будущее, свободное от насилия.\n\nХу Цзуннань, похоже, один из таких людей. После провала Северного похода Линсю поклялся, что не женится до тех пор, пока не наступит национальное освобождение, и это обещание он, наконец, сдержал сегодня на грандиозном свадебном торжестве со своей прекрасной молодой невестой. Его невеста, Е Сяди, - тоже бывшая учительница, ставшая революционеркой из Чжэцзяна, которая стала офицером в Цзюнтуне и служила одной из секретарш Дая. Эта пара была представлена друг другу Дай Чуньфэном и тайно обручилась, что скрывалось до самого недавнего времени.\n\nМножество других семей отпраздновали воссоединение, проведя свадьбы и обзаведясь собственными детьми, несмотря на то, что мёртвых продолжают хоронить. Несмотря на все травмы, которые пережил китайский народ, цикл рождения, жизни и смерти продолжается. Многие были разочарованы результатами некогда блестящей революции, но определённое чувство надежды сохраняется."
 CHI.endgame.630.a: "Цзао шэн гуй цзи! (Желаю рождения сына!)"

 CHI.endgame.631.t: "Принц и нищий"
 CHI.endgame.631.d: "Во многих отношениях новое государство напоминает армию, построенную вокруг строгой, догматичной иерархии Вампоа. На самом верху пирамиды сидит Ху Цзуннань, а под ним находится более близкий круг Лисиншэ, получивший название "Тринадцать тайбао" (прозвище, заимствованное из китайского фольклора). Эти люди - одни из самых преданных сторонников и протеже Ху, и по своему влиянию они намного превосходят Суня Фо, официального премьера. Левой и правой руками генералиссимуса являются Хэ Чжунхан и Дай Чуньфэн, каждый из которых олицетворяет совершенно разные течения сторонников генералиссимуса.\n\nХэ Чжунхан в душе идеолог, он родился в дворянской семье. Бывший марксист, синдикалист и пропагандист, он был сотрудником Дуна Биву, прежде чем учиться за границей, во Франции. Более прозорливый офицер, по образованию учитель средней школы, он придерживается широких идеологических амбиций, надеясь превратить свои убеждения во всеобъемлющую тоталитарную социалистическую программу, которой должна следовать его нация.\n\nДай Чуньфэн родился в семье бедной, но решительной матери-одиночки. В юности он ввязывался в драки, играл в азартные игры, а также некоторое время учился на учителя. Блестящий студент, несмотря на ограниченное традиционное образование, его национализм часто черпает вдохновение из китайской классики и различных героев и мифов, населявших её. Он всю жизнь "жил за счёт земли", прежде чем вступить в партию, и он гораздо менее идеологичен, чем те, кто смог сбежать за границу в Европу в 1927 году. Тем не менее, недостаток идеологической утончённости он с лихвой компенсирует своей непоколебимой верностью. Его любимое имя - Дай Ли (букв. "носить шляпу от дождя"), образно говоря, указывает на статус слуги его хозяина.\n\nПри старом порядке эти двое родились почти в разных мирах, но их объединяли революция, дух Вампоа и служение Ху Цзуннаню. Сам Ху - ещё один учитель по образованию, но из более скромной семьи, он, тем не менее, начинал свою карьеру в политике в качестве редактора мелкой газеты. Он часто выступает посредником в растущих столкновениях между двумя основными крыльями своей партии, особенно по вопросам идеалистической революции, циничного покровительства, личного братства и национальных интересов. Он воспользовался своим преклонным возрастом и более тесными связями с Чаном Кайши, чтобы стать бесспорным лидером Общества возрождения Китая, и даже сейчас, когда он ведёт борьбу с тайбао, практически не возникает сомнений в том, кому они в конечном счёте служат."
 CHI.endgame.631.a: "Мы должны придерживаться революционной линии!"
 CHI.endgame.631.b: "Мы стремимся к прагматичной форме героизма."
 CHI.endgame.631.c: "Мы беззаветно верны Линсю!"

 CHI.endgame.632.t: "Будущее земельной реформы"
 CHI.endgame.632.d: "В то время как синерубашечники Общества возрождения Китая номинально едины в своём стремлении к национальным экономическим реформам под руководством национал-социализма, что интересно, в ОВК наблюдаются разногласия по вопросу земельной реформы.\n\nСторонники земельной реформы (к которым относится большинство членов Лисиншэ/Центрального исполнительного комитета, не связанных с Ассоциацией товарищей революционной армии) выступают за массовую индустриализацию как средство модернизации сельского хозяйства. Они вдохновлены машинно-тракторными системами, предложенными савинковцами в России, и стремятся создать нечто подобное в Китае. Однако они выступают против тотальной национализации земли, поскольку считают, что система частного землевладения возникла в результате исторического развития, и свержение такой системы усугубило бы беспорядки в сельской местности. Вместо этого они выступают за снижение налогов и арендной платы, полное устранение коррумпированных бюрократов, а также улучшение транспортных и сельскохозяйственных условий и техники для крестьян. Таким образом, они стремятся следовать принципу доктора Суня "земля принадлежит земледельцу", согласно которому владельцы ферм должны продавать только землю площадью более девяти акров и получать взамен государственные облигации.\n\nОднако Хэ Чжунхан и его Ассоциация товарищей революционной армии выступают за гораздо более радикальную земельную реформу. Они требуют полной национализации земли и организации производства в сельскохозяйственных коллективах, управляемых государством. По их мнению, простое перераспределение земли между фермерами увековечило бы культурные устои экономического индивидуализма. Создание системы крупномасштабного рационализированного производства в государственных сельскохозяйственных коллективах облегчило бы внедрение усовершенствованных сельскохозяйственных технологий, а также накопление и реинвестирование излишков фермерских хозяйств. Создание таких сельскохозяйственных участков с помощью машинно-тракторных станций и других средств механизации привело бы к индустриализации сельского хозяйства.\n\nПропагандируя этот метод национализации и коллективизации, АТРА сознательно совершает идеологическую ересь, бросая вызов учению покойного лидера, доктора Сунь Ятсена. АТРА ответила, что Сунь никогда не заявлял, будет ли конечная земельная система основана на частной или национальной собственности - просто как средство достижения равных прав, что естественным образом произошло бы из-за полной национализации земли АТРА."
 CHI.endgame.632.a: "Мы будем придерживаться умеренного курса!"
 CHI.endgame.632.b: "Воля народа требует полной национализации!"

 #馬漢三
 CHI.endgame.633.t: "Дело Ма Ханьсаня"
 CHI.endgame.633.d: "Следователи, назначенные из числа сотрудников АТРА, возглавляемого Хэ Чжунханем, с энтузиазмом разъехались по всей стране, выискивая нечистоты везде, где только могли их обнаружить. Для многих молодых офицеров разгребание грязи в коррумпированной китайской бюрократии - это шанс на карьерный прорыв.\n\nВозможно, именно поэтому они стали слишком смелыми, недооценив, насколько уже укоренились постреволюционные интересы. На недавно захваченном севере генерал Ма Ханьсань занял пост директора северокитайского отделения Цзюньтун*, возглавляемого Дай Чуньфэном. Благодаря своим обширным связям и северному происхождению (90% цзюньтуновцев - южане), он считается "пятым" из "четырёх великих генералов севера", состоящих в Цзюньтуне (остальные - Ван Тяньму, Лю Ичжоу, Цяо Цзяцай и Чэнь Гуншу).\n\nНе выпускник Вампоа, он был сторонним наблюдателем во внутрипартийном соперничестве между чжэцзянской ветвью Мао Жэньфана, гуандунской ветвью Чжэна Цземиня, хунаньской ветвью Тана Цзуна и кликой Вэя Дамина. Следовательно, он был рад поддерживать свою собственную "нейтральную" клику, хвастаясь, что агенты Цзюнтун "на три уровня выше любого гражданского чиновника", его люди вымогали деньги у "предателей", собирали "плату за работу", присваивали конфискованное имущество и даже продавали фальшивые разрешения на работу в Цзюнтуне реакционерам, чтобы помочь им избежать правосудия.\n\nЭта вопиющая коррупция и другие нарушения сделали его лёгкой мишенью для толпы комиссаров, натравленных генералом Хэ. Ма был публично арестован (вероятно, по наводке завистливых соперников) по делу, о котором раструбили союзники Хэ Чжунханя. Ободренный этими успехами, Хэ Чжунхань выступил против своего собственного конкурента Дай Чуньфэна, попытав счастья в аресте десятков шанхайских гангстеров и других "патриотичных" бизнесменов, которых защищал смущённый Цзюньтун.\n\n"Лаобань" из главной тайной полиции новой республики проявил свой легендарный темперамент и потребовал немедленного освобождения тех, кто "несправедливо заключён в тюрьму." Он обратился непосредственно к генералиссимусу Ху, настаивая на том, что полицейская деятельность относится к его юрисдикции. Ирония, конечно, кажется, ускользнула от него.\n\n*Цзюнтун - сокращённое название Бюро расследований и статистики. Аналогично чекистам из ВЧК или Штази из Ministerium für Staatssicherheit (прим.пер.)"
 CHI.endgame.633.a: "Расширить круг расследований!"
 CHI.endgame.633.b: "Это внутреннее дело."

 CHI.endgame.634.t: "Орёл Красной армии"
 CHI.endgame.634.d: "Генерал Линь Бяо, прозванный "Орлом Красной армии", недавно приобрёл известность в рядах Национально-революционной армии за свои действия во время Северного похода, Второй китайско-японской войны и, совсем недавно, гражданской войны Гоминьдана.\n\nЛинь, несомненно, интересная личность в НРА, поскольку он был одним из первых учеников Вампоа, имел опыт работы в Синдикалистской партии Китая, а после Второй японо-китайской войны приобрёл репутацию довольно отчуждённого, скрытного и эмоционально холодного человека. Линь, член Ассоциации товарищей революционной армии Хэ Чжунханя, в последнее время постоянно находится рядом с исполнительным секретарём Хэ. Благодаря своей растущей политической карьере и новообретённой славе героя революции, Линь обзавёлся собственным небольшим кругом сторонников среди других генералов в ОВК и АТРА, которые стремятся расширить оборонный потенциал Китая и создать крупные промышленные комплексы во внутренних районах страны."
 CHI.endgame.634.a: "Герой на подъёме!"
 CHI.endgame.634.b: "Приглядывайте за его компанией."

 CHI.endgame.701.t: "Восхождение Линсю"
 CHI.endgame.701.d: "Историю всегда писали и направляли великие люди. Эти образцовые личности появлялись в решающие моменты истории человечества, чтобы руководить народом и вести его к достижению величия и национального спасения. История Китая не является исключением из этого правила, но, возможно, одной из величайших личностей, украсивших нашу историю, является первый император династии Цинь.\n\nЕстественно, весьма сомнительно, почему социалистический режим стал бы почитать первого монарха династии, которая на протяжении веков служила образцом китайского правления. Но для Общества возрождения Китая сожжение учёных и книг первым императором Цинь, хотя и было трагичным, считалось необходимым для создания основы китайского государства. Именно Цинь Шихуанди заложил фундамент китайского государства после многих лет спорадических междоусобиц и нестабильности, и именно генералиссимус возродил республику после гражданской войны. Любыми необходимыми средствами идеалы доктора Сунь Ятсена должны отстаиваться, даже если для этого придётся пожертвовать своей жизнью и свободой.\n\nНет никаких сомнений в том, что Ху Цзуннань является бесспорным лидером Китая и единственным, кто способен привести китайский народ к спасению. Только благодаря ему наша нация может пережить возрождение, придание сил и оживление. Точно так же, как революционеры из Тунмэнхоя и Гоминьдана обещали свою жизнь и счастье покойному лидеру доктору Сунь Ятсену, так и мы должны обещать себя нашему лидеру. Таким образом, впервые, да, мы действительно называем себя тоталистами в соответствии с хартией тоталистов. Пока не произойдёт тотальной революции, пока не будет полного подчинения лидеру, мы не сможем добиться свободы или избавления от цепей империализма!"
 CHI.endgame.701.a: "Великий человек нашего времени!"

 CHI.endgame.702.t: "Спасение нации"
 CHI.endgame.702.d: "На первом занятии Вампоа не было другого кандидата, который выделялся бы, кроме блестящего Хэ Чжунханя. Революционер и гордый националист, он видел роль Германии в унижении Китая и поклялся, что никогда больше, никогда китайский народ не должен страдать под гнётом империализма.\n\nИменно Хэ Чжунхан был одним из первых, кто превратил Общество возрождения Китая из маргинального движения в дисциплинированную и упорядоченную организацию. При нём была создана Ассоциация товарищей революционной армии, чтобы солдаты Военной академии Вампоа могли расти вместе, работать вместе, сражаться вместе и разделять тяготы национальной революции. Но он также писал, что европейский тоталитаризм пронизал дух революции доктора Суня, и только с помощью таких тоталитарных средств можно было спасти страну.\n\nСказать, что Хэ Чжунхан выступает за авторитарное государство, было бы преуменьшением, поскольку он выступает за совершенно беззастенчивое тоталитарное государство. Как исполнительный секретарь Лисиншэ, он принял множество законов, которые запрещают любую подстрекательскую деятельность журналистов и требуют, чтобы все газеты подвергались цензуре и проходили государственную проверку. Только при таком контроле массы смогут научиться - они смогут понять, что наши революционные методы верны. Кроме того, вся информация, поступающая к генералиссимусу, должна сначала пройти через него; это приводит к недовольству некоторых членов ОВК, которые задаются вопросом, кто на самом деле главный.\n\nНаша страна - страна мечтателей, и его мечты о Китае медленно, но верно становятся реальностью. Исполнительный секретарь мечтает о том дне, когда не нужно будет прибегать к опеке и когда люди сами смогут управлять массами. С их новыми культурными традициями, которым их научили АТРА и ОВК, они смогли бы контролировать несогласные меньшинства и по-настоящему практиковать миньцюань - по-настоящему работать в направлении социальной и национальной революции."
 CHI.endgame.702.a: "Мечты действительно сбываются..."

##Section 4e (800-999): Chen Endgame Events
 CHI.endgame.801.t: "Разбитые мечты"
 CHI.endgame.801.d: "Пыль оседает, и пушки по всему Китаю замолкают, когда гражданская война Гоминьдана наконец завершается. Временный комитет действий распался, многие из его лидеров либо бежали в изгнание, либо погибли в бою, а генерал Дэн Яньда пропал без вести (ходят слухи, что он бежал в Европу или в города-представительства). Сун Цинлин мирно сдалась, но её "призвали" сделать перерыв в национальной политике на неопределённый срок.\n\nКитайская национальная партия, или Гоминьдан, долгое время считалась единственным революционным органом в Китае, единственной партией, способной освободить Китай от империализма и преодолеть годы политической нестабильности в форме правления военачальников. Действительно, доктор Сунь Ятсен известен во всём мире своими усилиями по организации китайской революции против династии Цин и пользуется большим уважением за свои идеалы демократии, всеобщего благосостояния и национализма. Уважаемый во всей стране и за её пределами за свои революционные цели, Гоминьдан с тех пор утратил свою репутацию из-за жестокой гражданской войны. Репутация партии разлетелась в клочья, и некоторые наблюдатели даже отмечают, что в страну, скорее всего, вернётся период правления военного диктатора.\n\nТеперь Чэнь Гунбо, премьер-министр Китайской Республики, полон решимости навести порядок и возродить имидж партии. Но для этого партия должна быть сначала реорганизована - она должна быть очищена, даже если этот процесс требует насилия, крови... Партия нуждается в реформировании. Мечты остаются мечтами, пока кто-то не начнёт претворять их в жизнь. Что касается Чэня, то он полон решимости воплотить эти мечты в реальность."
 CHI.endgame.801.a: "Китай пробуждается к суровой реальности..."

 CHI.endgame.802.t: "Страна в руинах"
 CHI.endgame.802.d: "После успеха Национально-революционной армии во время войны Лиги восьми провинций, последняя фактически стала главной базой силы и оплотом Национальной революции во время Второго Северного похода и Войны сопротивления. Промышленность Цзиньлина, а также природные ресурсы Аньхоя использовались для удовлетворения потребностей растущего Национального революционного правительства и НРА.\n\nВо время гражданской войны в стране значительная часть инфраструктуры и промышленности восточного побережья Китая была повреждена или выведена из строя в ходе боевых действий. Кроме того, значительная часть страны, особенно крупные города, всё ещё находятся на военном положении, и их экономическая эффективность значительно снизилась.\n\nБолее того, многие региональные деятели, такие как местные губернаторы и администраторы, стали неуправляемыми из-за слабости Гоминьдана и отсутствия эффективной централизованной власти. Коррупция процветает, и есть заявления о том, что в некоторых деревнях голодают из-за отсутствия поставок продовольствия. Накопительство денег, бандитизм и насилие распространены по всей стране, и правительственным учреждениям/полиции становится всё труднее контролировать страну. Внешние инвесторы Китайской Республики также отозвали свои займы из-за шаткого характера политической власти националистов, а политика партии в области социального обеспечения была фактически приостановлена после гражданской войны."
 CHI.endgame.802.a: "Весь мир насилья мы разрушим."

 CHI.endgame.803.t: "Звенящая паранойя"
 CHI.endgame.803.d: "Во всей партии существует постоянное опасение, что всегда существует постоянная опасность или потенциал "второй волны" беспорядков, учитывая хаос гражданской войны в Гоминьдане. Партийные лидеры и чиновники ходят в страхе даже средь бела дня, опасаясь, что на следующий день они могут стать жертвами газетных заголовков.\n\nХотя председатель Цзэн Чжунмин считается более приемлемым лидером, чем Чэнь Гунбо, из-за его связей с местной фракцией партии, многим в Реорганизованной ассоциации товарищей его просто не хватает. РАТ стремится к завершению национальной и социальной революции; по их мнению, нет никого более способного осуществить радикальную революцию, чем сам Чэнь. Напряжённость в отношениях между Резидентской фракцией и Реорганизованной фракцией растет, поскольку обе фракции теперь подозревают друг друга в потенциальном стремлении отстранить другую от партийного влияния.\n\nНесмотря на настойчивость Молодой гвардии и Политического департамента в поддержании порядка, собственная паранойя Чэня Гунбо возросла до небес, и он видит врагов на каждом углу. Он особенно тяжело воспринял смерть председателя и считает военных главной причиной слабости партии. По его мнению, Временный комитет действий, Индийская клика, ОВК и даже Международная военная миссия в Китае в определённой степени ответственны за разжигание беспорядков.\n\nОн также выместил свой гнев на красном отряде Чжоу Эньлая и генерале Чжане Чжичжуне за то, что они не сделали достаточно для защиты любимого председателя. В связи с этим ходят слухи, что молодая гвардия пытается добиться от председателя Цзэн Чжунмина активизации действий и занять более жёсткую позицию в отношении премьера."
 CHI.endgame.803.a: "Это начинается с того, что вы всегда боитесь..."

 CHI.endgame.804.t: "Мерзкий напиток"
 CHI.endgame.804.d: "Ни для кого не секрет, что председатель Гоминьдана Цзэн Чжунмин время от времени любит хорошо выпить. С юности он был очарован культурным образом жизни, окружая себя развлечениями, ночной жизнью и всегда имеющейся бутылкой Мерло. Однако теперь председатель стал вести всё более замкнутый образ жизни и избегает публичных выступлений из-за глубокой депрессии, вызванной смертью двух его друзей - Вана Цзинвэя и Чэнь Бицзюнь. Более того, он оказывается в ситуации сильного стресса, паранойи и давления, поскольку его политический опыт меркнет по сравнению с некоторыми из наиболее громких идеологов РАТ.\n\nДля Цзэна Ван больше, чем просто друг и товарищ, он любящий наставник - учитель и образец для подражания. Каждую ночь в Президентском дворце Цзэн запирается в своём кабинете и проводит долгие часы, сочиняя прекрасные стихи, посвященные своему погибшему другу, и скорбя о том, что умереть должен был Цзэн, а не Ван. Погрузившись в свои печали, многие члены Реорганизованной ассоциации товарищей знают о борьбе председателя с пороками, и некоторые начали шептаться о планах смещения председателя в пользу гораздо более организованного и стабильного руководства. Ясно, что до тех пор, пока председатель борется со своим алкоголем, судьба партии продолжает висеть на волоске."
 CHI.endgame.804.a: "Ещё один стаканчик не повредит."

 CHI.endgame.805.t: "Освобождённый от дьявольского напитка"
 CHI.endgame.805.d: "После долгой борьбы с алкоголем председатель Цзэн Чжунмин решил полностью посвятить себя трезвости. Первые несколько недель... нет, первые несколько дней были сущим адом на земле. От рукопожатий до головной боли председателю часто приходилось отказываться от встреч с членами Центрального комитета, к большому удовлетворению таких членов РАТ, как Ши Цуньтун и Чэнь Гунбо. Тем не менее, находясь рядом со своей сестрой Цзэн Син, председатель бросил пить и в свободное время посвятил себя изучению французской и китайской литературы.\n\nСейчас, когда проводятся значительные правительственные реформы и доверие к нему восстановлено, нынешний Цзэн уже не тот, что был вчера. Ходят слухи о возможном свержении молодого председателя, поскольку он теперь чувствует себя достаточно уверенно, чтобы проводить длительные совещания и выступать с публичными речами. Его паранойя, хотя и сохранилась, уже не та, что была, когда он унаследовал должность председателя от своего покойного учителя."
 CHI.endgame.805.a: "День ото дня становится лучше."

 CHI.endgame.841.t: "Нанкинские процессы"
 CHI.endgame.841.d: "Проходивший в рамках Судебного Юаня, хотя и под руководством Реорганизованной ассоциации товарищей, звон молотка и крики "Виновен!" разносились по залам верховного суда Гоминьдана. Одного за другим высокопоставленных членов Ассоциации революционных одноклассников Военной академии Вампоа выводили на трибуну и, несмотря на их решительную защиту, приговаривали к расстрелу. Те, кому повезло, бежали за границу или скрывались, а Дэн Яньда объявлен в розыск по всей стране.\n\nПолитическому департаменту НРА было трудно справиться с численностью армии и отсутствием эффективного управления, учитывая, что большая часть прежнего руководства была фактически ликвидирована РАТ. Хотя РАТ действительно представляет себе Китай, в котором военные играют как можно более минимальную роль в национальной политике, отсутствие дееспособной военной администрации также вызывает беспокойство, учитывая, что Китаю могут угрожать реакционные державы.\n\nТем не менее, в АРОВАВ есть те, кто занимает более низкое положение, кто ходатайствовал об амнистии и заявлял, что они присягнут на верность новому режиму и будут полностью и преданно поддерживать партию. Эти генералы являются социалистами и верят, что социализм РАТ соответствует их личным убеждениям - в дополнение к тому, что они стали покорными после свержения руководства ВКД. В Обществе возрождения Китая также есть радикально настроенные молодые офицеры, такие как Линь Бяо, которые считают, что радикализм РАТ и стремление к авторитаризму соответствуют их собственной идеологии. Конечно, новые военные могли бы положиться на своих сторонников из "Молодой гвардии", но этим генералам определённо не хватает опыта, присущего ОВК и АРОВАВ."
 CHI.endgame.841.a: "Правые из АРОВАВ могут быть перевоспитаны."
 CHI.endgame.841.b: "Пригласить бывших членов ОВК!"
 CHI.endgame.841.c: "Мы справимся и с нашими сторонниками."

 CHI.endgame.842.t: "Битва за землю"
 CHI.endgame.842.d: "Земельный вопрос никогда не игнорировался в идеологии и доктрине Гоминьдана - на самом деле, покойный доктор Сунь живо говорил о "передаче земли земледельцу" и "уравнении прав на землю". Первый всекитайский партийный съезд, в конце концов, провозгласил, что уравнение прав на землю является одним из двух главных факторов Миньшэна - народного благосостояния. Во время Первого и Второго Северных походов проводилась политика партии по отношению к крестьянству, и в некоторых освобождённых районах активно проводились кампании по снижению арендной платы.\n\nЧэнь Гунбо и Реорганизованная ассоциация товарищей также выразили большую заинтересованность в поддержании массового движения посредством радикальной земельной реформы по сравнению с ортодоксальным подходом, изложенным доктором Сунем. Основной подход Чэня Гунбо заключается в том, чтобы методично добиваться от правительства принятия законов о земле, с тем чтобы национальное правительство могло законно конфисковывать землю. Другой подход, который поддерживается большинством радикалов РАТ, заключается в продвижении "конфискации земель", при которой помещичьи земли должны быть конфискованы крестьянами.\n\nЧэнь Гунбо и более умеренные члены РАТ выступают за первый подход на том основании, что земля не будет полностью распределена при использовании второго метода, и что земля теперь будет просто находиться в руках частного крестьянства. Тем не менее, члены РАТ единодушно согласны с тем, что земли у всех крупных землевладельцев должны быть немедленно изъяты, а крупные землевладельцы изгнаны со своих земель. Однако члены партии расходятся во мнениях относительно статуса мелких и средних землевладельцев, которые считаются потенциально революционным классом в виде мелкой буржуазии; при этом Чэнь придерживался более умеренного курса по сравнению с некоторыми из своих более радикальных коллег."
 CHI.endgame.842.a: "Следовать курсом товарища Чэня."
 CHI.endgame.842.b: "Следовать идеям товарища Ши."

 CHI.endgame.843.t: "Движение "Новые граждане""
 CHI.endgame.843.d: "Недавним распоряжением Центрального комитета и при поддержке премьера республики создано движение "Новые граждане", которое призывает гражданских лиц сообщать о гнусной и подрывной деятельности в отношении однопартийцев. Членам партии рекомендуется следить друг за другом, а местные чиновники ведут списки числа членов Реорганизованной ассоциации товарищей в своих городах и по месту жительства. Маленьким детям из Молодёжного корпуса их учителя и инструкторы советуют сообщать о своих родителях в полицию и партию, если их родители высказывают особое мнение о партии или лидерах РАТ.\n\nКроме того, РАТ предпринимает всё более активные попытки создать культ личности, сосредоточенный вокруг покойного лидера, доктора Сунь Ятсена, и недавно скончавшегося председателя Вана Цзинвэя. Портреты Суня и Вана можно увидеть почти в каждом общественном здании, и семьи часто обедают под их портретом. Пропагандистские плакаты и радиопередачи часто прославляют Национальную революцию и представляют председателя Цзэна и премьера Чэня как славных и непогрешимых лидеров. В университетах и школах студенты ведут агитацию против своих профессоров, а некоторые студенты даже доносят на своих преподавателей за "контрреволюционные" мысли и увольняют своих преподавателей за правые убеждения. У руководства радикальной фракции РАТ нет большой оппозиции, поскольку несколько военных генералов, таких как Чжан Чжицжун и Чжоу Эньлай, следуют указаниям премьера практически без колебаний (либо из-за страха, либо из-за боязни политической нестабильности). В то же время Цзэн Чжунмин и остатки фракции "Резиденция" оказались бессильны что-либо сделать. Возможно, в правительстве есть те, кто может попросить Чэня выбрать менее радикальное направление для революции, но много ли можно сделать на данный момент?"
 CHI.endgame.843.a: "Новые граждане для нового Китая"
 CHI.endgame.843.b: "Осмелится ли кто-нибудь заговорить?"

 CHI.endgame.844.t: "Манильский заговор"
 CHI.endgame.844.d: "С тех пор как Реорганизованная ассоциация товарищей одержала победу во внутрипартийной гражданской войне, многие из наиболее буржуазных или состоятельных членов партии бежали из страны, увидев надпись на стене. Многие из руководства Фракции реконструкции предстали перед судом за свои преступления против государства, связанные с участием в недолговечном правительстве Суня Фо, и их ожидало мрачное будущее.\n\nС учётом того, что Сун Цинлин находится под домашним арестом, а Дэн Яньда пропал без вести, число оставшихся противников господства РАТ сократилось до нескольких лидеров оппозиции. Сунь Фо и верные последователи его клики, в том числе У Чаошу (Си Си У), Лян Ханьцао, Хуан Ханьлян и Ван Куньлунь, бежали из страны, их местонахождение неизвестно. По крайней мере, так было до тех пор, пока агент "Красного отряда" за границей, в Юго-Восточной Азии, не телеграфировал в Нанкин, что высокомерный сын покойного лидера вскоре посетит город Манилу на Филиппинах, чтобы поприветствовать китайскую общину за рубежом.\n\nПохоже, что Ван Куньлунь предал старого "твердолобого" либерала. Будучи давним другом Суня Фо, Ван (убеждённый левый) был тайным членом РАТ и, опасаясь за безопасность своей семьи, решил предать Суня Фо в обмен на амнистию в новом реорганизованном правительстве. Он пообещал помочь нам при условии, что Сунь Фо не пострадает и ему будет позволено благополучно вернуться в Китай. Что делать с этой информацией, решать премьер-министру республики Чэню Гунбо. Хотя поступают срочные сообщения о том, что Сунь Фо создаёт заморское правительство в изгнании и стремится вернуть себе материк, он, конечно же, настроен несерьёзно и не планирует ничего предпринимать. И, кроме того, "Красный отряд", всегда преданный партии, всегда может быть использован для устранения угроз Центральному комитету. Конечно, это Сунь Фо - сын покойного лидера, но Чэнь не опустится до такого уровня... а он бы стал?"
 CHI.endgame.844.a: "Операция может быть продолжена."
 CHI.endgame.844.b: "Мы уже пролили достаточно крови."

 CHI.endgame.845.t: "Правительство реконструкции"
 CHI.endgame.845.d: "В оживлённом и зажиточном районе Манилы Китайская ассоциация зарубежных торговцев организовала грандиозную вечеринку в китайской столовой в честь прибытия Суня Фо на Филиппины. Однако, сославшись на то, что в последнюю минуту ему стало не по себе, Сунь Фо не присутствовал на вечерних торжествах. Тем не менее, на мероприятии присутствовали видные члены Фракции реконструкции, такие как У Чаошу и Хуан Ханьлян, и присутствующие подняли тосты за сына доктора Суня и за окончание деятельности Реорганизованной ассоциации товарищей.\n\nЗастольные тосты были прерваны, когда двое вооружённых людей в масках вытащили свои спрятанные автоматы и открыли огонь по толпе, а затем выбежали из зала в ночь. В хаосе перестрелки оба, У Чаошу и Хуан Ханьлян, были убиты, но убийцы не знали об изменении планов Суня Фо и, таким образом, упустили свою первоначальную цель.\n\nПосле кровопролития Ван Куньлунь, возможно, изменив своё мнение, раскрыл Суню Фо роль "Красного отряда" и принёс ему многочисленные извинения за то, что, по его мнению, мы пытались организовать экстрадицию Суня обратно в Китай, а не покушение на убийство. Поскольку ярость Суня сравняется с яростью его отца, судьба Вана будет отдана на милость Суня Фо и его немногих оставшихся сторонников.\n\nСунь Фо объявил о создании нового правительства реконструкции и гневно осудил правительство в Нанкине как нелегитимное китайское правительство. Обретя второе дыхание в своей политической карьере, он объявил о создании гоминьдановского правительства в изгнании. Однако у него нет поддержки со стороны какой-либо крупной державы, и у него нет реальной базы для подготовки своей контрреволюции. Хотя наши убийцы, безусловно, потерпели неудачу в достижении своих целей, мы не будем обращать внимания на этого реакционного правого деятеля, пытающегося вызвать беспорядки в нашей революции."
 CHI.endgame.845.a: "Позор для его отца и партии."

 CHI.endgame.846.t: "Убийство Суня Фо"
 CHI.endgame.846.d: "В оживлённом и зажиточном районе Манилы Китайская ассоциация зарубежных торговцев организовала грандиозную вечеринку в китайской столовой в честь прибытия Сунь Фо на Филиппины. Многие гости ожидали, что сын основателя китайского Гоминьдана произнесёт грандиозную речь, и поговаривали даже, что Сунь Фо организовал сообщество экспатриантов, чтобы противостоять Реорганизованной ассоциации товарищей. Среди присутствующих были У Чаошу, Хуан Ханьлян и Ван Куньлунь, а также другие лидеры фракции реконструкции, которые присоединились к Суню Фо в изгнании. Звучали приветствия и тосты в честь сына вечного премьера, многие также поднимали дополнительные тосты за окончание правления клики Чэня-Цзэна.\n\nЗастольные тосты были прерваны, когда двое вооружённых людей в масках вытащили свои спрятанные пистолеты-пулеметы и открыли огонь по толпе, а затем выбежали из зала в ночь. В хаосе перестрелки были убиты несколько видных представителей Фракции реконструкции, включая Суня Фо, который не смог избежать той же участи, что и Ван Цзинвэй. Возможно, чтобы свести концы с концами, Ван Куньлунь также был убит - несмотря на то, что последний согласился предать Суня Фо ради своей безопасности и безопасности своей семьи.\n\nНесмотря на это, все знали истинных виновников нападения. Чувство страха охватило эмигрантское сообщество, особенно в связи с убийством сына основателя Гоминьдана. По мнению некоторых, попытки Суня создать конкурирующее правительство привели к тому, что его постигла та же участь, что и его самого. Тем не менее, многие в ужасе от того, насколько безжалостно руководство РАТ Чэня-Цзэна распорядилось таким образом, и РАТ ясно дала понять, как они будут поступать с теми, кто выступает против его господства над Гоминьданом."
 CHI.endgame.846.a: "Собаке собачья смерть."

 CHI.endgame.847.t: "Падение ортодоксии"
 CHI.endgame.847.d: "Некогда хрупкий Союз синдикалистов Китая теперь полностью рухнул. Идеалистический альянс социалистов, не связанных с Гоминьданом, распался из-за усиления фракционной борьбы между партиями. В результате их поддержки Временного комитета действий, Всемирное общество анархистов было фактически запрещено партией, а большинство его лидеров бежали в изгнание в другие страны. Между тем, для большинства ортодоксальной фракции Синдикалистской партии Китая их лидеры и последователи либо выбрали двойственную позицию во время гражданской войны, либо поддержали ВКД. В результате многие из них были оттеснены на второй план новой "реорганизацией", а премьер-министр объявил, что они были просто замаскированными правыми. С другой стороны, радикалы из СПК поддерживали РАТ во время гражданской войны Гоминьдана.\n\nМногие представители радикальной фракции придерживаются схожих радикально-социалистических и в целом авторитарных взглядов на социализм по сравнению с другими фракциями ССК. Они также рассматривают историю с точки зрения чисто материалистических концепций, идеи революционных кадров, которые должны вести массы, и идеи классовой борьбы. Сейчас, когда Всекитайский съезд Синдикалистской партии Китая стремительно приближается, лидеры старой гвардии СПК, такие как Чэнь Дусю и Ли Лисань, сталкиваются с расколом в партии, поскольку ясно, что радикалы стремятся влиться в РАТ.\n\nВсепроникающее влияние Чэня Гунбо через СПК ощущается благодаря радикалу Ши Цуньтуну, который когда-то был членом СПК. Тем не менее, несмотря на огромную популярность радикалов, у ортодоксальной фракции всё ещё может быть шанс победить на этих выборах, поскольку и Ли Лисань, и Чэнь Дусю считаются уважаемыми членами-основателями партии."
 CHI.endgame.847.a: "Старая гвардия падает."
 CHI.endgame.847.b: "Имея незначительное большинство, ортодоксы держатся...!"

 CHI.endgame.848.t: "Чествование павших"
 CHI.endgame.848.d: "Революционер, патриот, герой, мученик. Смерть Вана Цзинвэя потрясла саму суть Гоминьдана, поскольку председатель партии был убит вместе со своей женой, что привело к жестокой гражданской войне и ввергло страну в хаос. Тело Вана было найдено вместе с его женой, и теперь то, что осталось от его сторонников из фракции "Резиденция" и Реорганизованной ассоциации товарищей, собралось вместе в редком единстве, чтобы решить, где похоронить председателя.\n\nПоследним желанием председателя всегда было похоронить его в Гуандуне, его родной провинции, и похоронить рядом с другими революционными мучениками. Его жена также хотела, чтобы её похоронили в Гуандуне, и поэтому было бы логично похоронить их вместе. С другой стороны, более радикально настроенные члены партии выступают за то, чтобы Ван был похоронен в недостроенном Национальном мавзолее недалеко от второй вершины Пурпурной горы. Там он может быть похоронен рядом с легендарным основателем партии, что навечно соединит учителя и мученика."
 CHI.endgame.848.a: "Будем уважать волю покойного председателя."
 CHI.endgame.848.b: "Сын Китая должен воссоединиться со своим отцом."

 CHI.endgame.849.t: "Молчаливые партнёры"
 CHI.endgame.849.d: "Поскольку вера в Гоминьдан находится на небывало низком уровне, председатель Цзэн Чжунмин и его жена мадам Фан Цзюньби предпринимают все возможные меры для завоевания сердец и умов людей. Его жена тесно связана со школой живописи Линнань и по образованию является профессором. Одна из немногих выдающихся китайских художниц, она привезла свою знаменитую персональную выставку из Шанхая в свою родную провинцию Фуцзянь, несомненно, чтобы завоевать расположение бывшей мятежной провинции. Её семья, почти все из которой долгое время были членами Гоминьдана, также проводила работу по всей провинции, стремясь к примирению, хотя богатство семьи подверглось нападкам со стороны членов Реорганизованной ассоциации товарищей.\n\nЕго старшая сестра Цзэн Син, также видный член Гоминьдана, заняла пост главы министерства по делам женщин. Люди, тем не менее, отметили увеличение числа публичных выступлений, заполнивших вакуум в национальном женском руководстве после того, как Сун Цинлин ушла со всенародной сцены, чтобы "сосредоточиться на благотворительной деятельности".\n\nЦзэн путешествовал по стране, выступая с речами и пытаясь разрядить напряженность. Хотя он в основном был номинальным руководителем и молчаливым партнёром в отличие от Вана Цзинвэя, ему удалось занять прочную нишу в качестве национального символа стабильности. Его команда по связям с общественностью работала над тем, чтобы его всегда респектабельно фотографировали во время поездок по региональным партийным офисам, недавно построенным заводам, военным базам и встреч с общественными организациями. Он не Ван Цзинвэй, но даже его злейшие недоброжелатели должны признать, что он эффективно поддерживал легитимность нового правительства."
 CHI.endgame.849.a: "У Цзэна большие планы на будущее."

 CHI.endgame.850.t: "Теория национального капитализма Чэня"
 CHI.endgame.850.d: "Поскольку Национальную революцию возглавляют рабочие и крестьяне Китая, немыслимо, чтобы эти два класса стремились к созданию капиталистического государства. Более того, буржуазия в Китае ещё не сформировалась в отдельный класс и была слишком слаба, чтобы доминировать на политической и экономической арене. Поскольку Китай является экономически отсталым государством, а его экономика контролируется империалистическими державами, государство должно играть важную роль в привлечении капитала и содействии промышленному развитию. Как только будет получено достаточное количество капитала, Китай сможет стать модернизированным обществом и по-настоящему двигаться к социализму.\n\nРаботы Чэня, как экономиста, о национальном капитализме пожалуй, являются одними из самых красноречивых в Гоминьдане. Недавно он опубликовал статью "Как создать государственный капитал в настоящее время", в которой разъясняется, что принцип миньшэна по своей сути является политикой государственного вмешательства. Чтобы увеличить государственный капитал, Чэнь согласился с Сунь Ятсеном в том, что государство должно национализировать железные дороги, крупные предприятия и горнодобывающую промышленность, но он также развил эту идею, заявив, что партия также должна провести национализацию внешней торговли.\n\nЧастный капитал не должен быть исключён из экономического развития Китая, напротив, он подчеркнул дополняющую роль частного капитала в построении будущего Китая. Благодаря созданию совместных государственных и коммерческих предприятий зарегистрированные компании могли бы контролировать прибыль от внешней торговли, помогая рабоче-крестьянским кооперативам увеличивать производство.\n\nКонечно, у многих теория Чэня вызывает мысль о том, что это просто приведёт Китай к капитализму. Но Чэнь опроверг эти идеи, заявив, что наличие партийного и государственного контроля над экономикой предотвратило бы безудержный экономический рост. Чэнь также подчеркнул важность участия рабочего класса и крестьянства в развитии новой экономики Китая. Когда государственная промышленность достигнет определённых размеров, большая часть рабочего класса может быть интегрирована и избавлена от эксплуатации капиталом - та же концепция применима и к крестьянам. Со временем классовые различия между крестьянами, рабочими и связанной с ними мелкой буржуазией уменьшились бы, поскольку они оба были бы просто "производителями общества", поэтому с национальным капитализмом неизбежно приходит прилив социализма."
 CHI.endgame.850.a: "Освободит ли это нас от капитализма?"

 CHI.endgame.851.t: "Реакционеры в армии"
 CHI.endgame.851.d: "Национально-революционная армия когда-то была задумана как будущий элитный авангард Национальной революции, будущий оплот и защита Родины. Однако практические соображения перевесили первоначальную элитарность армии. За годы кампаний по объединению НРА значительно расширилась, набрав большое количество офицеров из армий военачальников, чтобы соответствовать растущим военным силам. Кроме того, в местных администрациях провинциальных регионов местные наёмники и бывшие полевые командиры часто восстанавливаются на своих должностях благодаря оперативности и продвижению НРА.\n\nТакже были сторонники Гоминьдана в регионах за пределами территории Национально-революционного правительства, такие как генерал Чэнь Миншу и генерал Чжу Дэ, которые придерживались... по меньшей мере сомнительной лояльности. Многие из этих офицеров занимают довольно высокие посты, и премьер-министр республики считает их либо правыми, либо антиреволюционерами.\n\nПремьер-министр и Молодая гвардия НРА стремятся избавиться от этих реакционных элементов и укрепить новый революционный дух в залах Вампоа. Тем не менее, этот шаг непопулярен среди некоторых членов НРА, которые обеспокоены тем, что дальнейшие чистки лишь дестабилизируют и деморализуют и без того уставшую НРА. Конечно, в конце концов, эти офицеры предлагают больше практических военных знаний, чем политических вопросов. Однако председатель видит только врагов за каждым углом, и армия должна быть полностью обращена к идеям революции, если мы хотим уберечь революцию от вырождения."
 CHI.endgame.851.a: "В НРА не может быть никаких регионалистов!"
 CHI.endgame.851.b: "Вычистить всех, кому мы не можем доверять."
 CHI.endgame.851.c: "Наёмники по-прежнему верны монете."

 CHI.endgame.901.t: "Наследие Вана Цзинвэя"
 CHI.endgame.901.d: "Несмотря на свои разногласия, Цзэн Чжунмин (бывший учитель французского языка и художник) и Чэнь (ярый националист и лидер радикалов из Реорганизованной ассоциации товарищей) - председатель и его амбициозный премьер - установили уникальные рабочие отношения. Безусловно, Чэнь - главная сила, стоящая за правительством, и его сравнивают с другими великими фигурами, похожими на премьер-министров/канцлеров на Западе, такими как кардинал де Ришелье и Отто фон Бисмарк (в то время как политические противники режима Чэня-Цзэна называют Чэня просто Цао Цао*, нарисованным красной краской).\n\nТем не менее Цзэн доказал, что он нечто большее, чем просто марионеточный руководитель, и завоевал доверие к политике партии. Хотя поначалу Цзэн неохотно и подавленно продолжал руководить страной, оставленной его дорогим товарищем-революционером Ваном Цзинвэем, энергия в обращении к народам страны, а также его собственная харизма позволяют ему играть посредническую роль между тем, что осталось от фракции "Резиденция", и РАТ. Он способен предотвратить распространение крайностей радикализма в обществе, и как председатель, он действительно обладает властью сдерживать наихудшие из наиболее радикальных реформ Чэня Гунбо.\n\nОбладая предположительно коллективным руководством (хотя и под руководством РАТ), председатель Цзэн ведёт Китай к выполнению последней воли, оставленной доктором Сунь Ятсеном, и к признанию жертв великого председателя Вана. Портрет Вана можно увидеть почти во всех правительственных зданиях, и его привлекательность превозносится, поскольку он изображён как самый образцовый революционер, какой только может быть после Сунь Ятсена. Совершая длительные прогулки, чтобы уменьшить стресс, связанный с его положением председателя, товарищ Цзэн думает, что если бы Ван был всё ещё жив, он гордился бы своим соратником по национальной революции.\n\nНо пока что есть над чем поработать. Революция ещё не завершена, и Чэнь и Цзэн полны решимости довести её до конца. А до тех пор можно только гадать, приведёт ли Гоминьдан рабочих и крестьян к полной демократии.\n\n*Цао Цао - китайский полководец и был фактически правителем империи Хань в начале III века нашей эры. (прим.пер.)"
 CHI.endgame.901.a: "Безраздельно господствует двоевластие."

 CHI.endgame.902.t: "Новый председатель"
 CHI.endgame.902.d: "В стране, наконец, восстановлен порядок. Несмотря на роль реакционеров и контрреволюционеров, Гоминьдан сохранил за собой лидерство в стране, и партия способна осуществлять свою социалистическую и сильную опеку, чтобы подготовить китайский народ к росту и развитию социализма.\n\nОднако председатель Цзэн Чжунмин сделал шаг, который поразил всю страну, объявив, что он уходит со своих двойных постов председателя Гоминьдана и президента республики, завершив своё недолгое пребывание на этом посту и стабилизировав положение в стране. В своём заявлении об увольнении он сослался на проблемы со своим психическим здоровьем, а также на желание "проводить больше времени со своей семьёй" в качестве причины этого. Премьер Чэнь Гунбо и другие представители партийной элиты поблагодарили измученного почётного председателя и пожелали ему всего наилучшего на приятном прощальном торжестве, организованном в последний день его пребывания на этом посту.\n\nЗа этим последовало быстрое голосование в Центральном комитете, на котором Чэнь Гунбо был избран следующим председателем Гоминьдана, а Ши Цуньтун - премьером. В Президентском дворце Нанкина Чэнь Гунбо произнёс пламенную речь перед многотысячным митингом членов Реорганизованной ассоциации товарищей и Союза молодёжи, его глаза горели амбициями и страстью. Красноречивыми жестами, похожими на жесты бывшего председателя Вана Цзинвэя, Чэнь гневно осудил капиталистические страны Запада и пообещал, что революционный пыл китайского народа уничтожит капитализм. Завершая свою речь, председатель объявил о продолжении национальной революции до тех пор, пока все правые не будут изгнаны из страны, и призвал молодёжь Китая стремиться к модернизму, прогрессу и культурной революции против традиционного буржуазного вырождения.\n\nВ то время как Китай стремительно продвигается вперёд в своей всеобъемлющей революции, Чэнь недавно заказал статую Вана Цзинвэя, которая будет стоять рядом со статуей Сунь Ятсена в Нанкине. Председатель не забыл о многолетнем лидерстве Вана и надеется, что Ван гордился бы им за возрождение Гоминьдана, реорганизацию партии и, наконец, за осуществление Национальной революции. Однако судьба благоволит тем, кто амбициозен и обладает большим терпением; Чэнь достиг своей мечты... и только будущее знает, куда его мечты приведут страну в следующий раз."
 CHI.endgame.902.a: "Если бы только Ван мог видеть меня сейчас..."

