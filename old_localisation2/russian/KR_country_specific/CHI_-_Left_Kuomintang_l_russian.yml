 CHI_totalist_party: "Экстремисты Вампоа"
 CHI_totalist_party_long: "Экстремисты Вампоа (Хуанбу цзидуань фэньцзы)\n§gПосле Северного похода многие выпускники крайне политизированной Военной академии Вампоа оказались глубоко озлобленными и разочарованными. Многие из них, разбросанные по всей стране, пошли своим путем - искали работу, как могли.\n\n Некоторые, однако, встали на путь экстремизма. В Великобритании группа выпускников, считающих, что их революция была предана изнутри неэффективными политиками и атакована извне иностранными империалистами, приняла форму ультранационализма, вдохновленного меморандумом Мосли и бурлящими сорелийскими верованиями. Во главе с Хэ Чжунханом и Дэн Вэньи эта тайная, но растущая группа вошла в более широкий круг, возглавляемый Ху Цзуннанем, директором учебного отдела Вампоа в изгнании.\n\nДругие озлобленные и мстительные выпускники ждут в Китае, чтобы зарабатывать на жизнь тем, что им удалось раздобыть. Гоминьдановская мечта умерла, но что будет, если разгорится новая революция?§!"
 CHI_syndicalist_party: "ССК"
 CHI_syndicalist_party_long: "Союз синдикалистов Китая\n§gУспех гуанчжоуско-гонконгской забастовки побудил социалистических лидеров собраться в Шанхае 10 октября 1925 года. Воодушевлённая успехами в мобилизации китайской рабочей силы на проведение значимой акции, впервые в современной истории Китая, СПК создала Союз синдикалистов Китая, проводя параллель с плюралистическим характером французской социалистической политики. В результате деятельности Союза многочисленные социалистические и левые организации за пределами китайского Гоминьдана объединились в один сплочённый альянс, такой как Шанхайская федерация синдикатов, Всемирное общество, анархистская федерация (известная как АФ в Гуанчжоу), советские коммунисты, Народное общество Тоскина, Общество изучения синдикализма, Федерации молодых китайских анархо-коммунистов, а также других небольших социалистических, анархо-коммунистических и других левых группировок. В целом, это большая коалиция, в которую входят как либертарианские социалисты, так и те, кто вдохновлён более авторитарными течениями социализма, такими как ленинизм.§!"
 CHI_radical_socialist_party: "Центральный комитет"
 CHI_radical_socialist_party_long: "ЦК Гоминьдана\n§gПосле провала Северного похода Центральный исполнительный комитет Гоминьдана сформировал правительство в изгнании в Париже. Во главе с Ван Цзинвэем, председателем партии и президентом так называемой республики, они успешно добились дальнейшего признания своих хозяев в Интернационале. За это время Реорганизованная ассоциация товарищей - группа, основанная сторонниками Ван Цзинвэя (хотя и без его непосредственного участия), укрепила свою власть над партийным аппаратом.\n\n Однако в последнее десятилетие их единоличное господство над Гоминьданом было поставлено под сомнение. Повстанцы Миньганя создали собственное параллельное правительство, а многие либерально настроенные члены движения обосновались на Гавайях. Тем не менее, благодаря осторожной дипломатии Вана удалось избежать перелома, и в новой революции он наконец-то получил возможность освободить свою родину.§!"
 CHI_social_democrat_party: "Правительство Миньганя"
 CHI_social_democrat_party_long: "Временное правительство Миньганя"\n§gВ то время как многие бежали из страны после краха Северного похода, было много тех, кто решил остаться с народом и уйти в подполье, чтобы противостоять гнету клики Чжили. Первоначально во главе с маршалом Ли Цзишэнем, действовавшим через сети, проникавшие в Шанхай и выходившие из него, поражение восстания 1932 года вынудило их отступить на юг, в район Цзянси-Фуцзянь.\n\n В горах Сун Цинлин, Дэн Яньда и другие опубликовали "Декларацию к революционному народу Китая и мира", объявив о создании Временного комитета действий Гоминьдана для самостоятельного управления партизанской зоной. Это, в сочетании с ослаблением связи с правительством Вана в изгнании, привело к тому, что в рядах Миньганя появилась определенная независимость, даже несмотря на то, что движение вновь объединилось. Хотя пока гоминьдановское руководство делает вид, что ладит между собой, и действительно многие свободно приезжали и уезжали из Миньганя и Парижа на протяжении многих лет, некоторые противоречия начали проявляться.§!"
 CHI_social_liberal_party: "Гавайская клика"
 CHI_social_liberal_party_long: "Заморская китайская комиссия\n§gБлагодаря базированию на Гавайях, многие из более либерально настроенных и получивших американское образование членов Гоминьдана отказались присоединиться к Вану во Франции, вместо этого сплотившись вокруг фигуры Сунь Фо в Гонолулу. Издавая журнал "Обзор реконструкции" (Zaizao Xunkan) и критикуя газету "Революционный критик" фракции реорганизации за пересказ марксизма и отказ от "Трех принципов", они часто называют себя фракцией реконструкции.\n\nОднако большинство знает их как Гавайскую клику, и многие левые с недоверием относятся к ним как к буржуазным предателям. Они не стали формировать свой комитет (ограничившись требованием полной перерегистрации членов Гоминьдана, чтобы избавиться от внутренней гнили), но между ними возникла прочная вражда.\n\nОни ждут и наблюдают за исходом войны Лиги, отказываясь лично участвовать в ней, пока регион не будет безопасным. Однако, несмотря на это, их контроль над Комиссией по делам зарубежных китайцев и влияние в обществе Вермиллионов обеспечили им значительное влияние в китайской диаспоре в Юго-Восточной Азии. Их постоянный поток пожертвований, несмотря на продолжающиеся проблемы с руководством, дает надежду на то, что примирение еще возможно.§!"
 CHI_market_liberal_party: "Данвай"
 CHI_market_liberal_party_long: "Независимые и ассоциированные республиканцы (Данвай)\n§gПод "данвай" или партийными аутсайдерами понимаются те, кто участвует в законодательных органах, возглавляемых Гоминьданом, как "независимые" Инакомыслие относительно минимально из-за строгой приверженности Гоминьдана однопартийному правлению, хотя создание Объединенного фронта открыло возможность для некоторого плюрализма. Гоминьдан терпимо относится к небольшому числу "независимых", негласно предоставляя возможность вступления в партию лицам, не являющимся ее членами. При этом они практически не имеют отношения к общей партии-государству, а представляют собой республиканцев, готовых поддержать антиимпериалистическую и антивождистскую платформу Гоминьдана, несмотря на свои несоциалистические взгляды.§!"
 CHI_social_conservative_party: "Старейшины партии"
 CHI_social_conservative_party_long: "Старейшины партии Гоминьдан (Гоминьдан чжанлао)\n§g Под старейшинами партии Гоминьдан обычно подразумевают группу революционеров со стажем, входящих в так называемую Парижскую группу Чжан Жэньцзе, Цай Юаньпэй, У Чжиху и Ли Шицзэн. Эти пожилые государственные деятели Гоминьдана в свое время были анархистами, учились во Франции, где способствовали разработке программы Work-Study. Они представляют "старую гвардию" Гоминьдана и поддерживали революцию с самого ее начала, являясь фактически "генроями" (старейшинами). Они часто обращаются за помощью или советом к крупным политическим игрокам Гоминьдана, но с тех пор настроены против своего бывшего протеже Ван Цзинвэя, не доверяя его авторитаризму и возмущаясь уменьшением собственного влияния.§!"
 CHI_authoritarian_democrat_party: "Шанхайские клики"
 CHI_authoritarian_democrat_party_long: "Шанхайские клики\n§gГоминьдан имеет свои интересы и политических союзников как среди богатых спонсоров из Общества Вермильона, так и в теневых переулках шанхайских трущоб, поддерживая связь с различными националистами в надежде получить влияние в городах-легионах. Имея связи с членами ЦК от Чэнь Гунбо до Сун Цзывэня и Чжан Жэньцзе, они представляют собой источник финансовой и политической власти, который редко публично признается национальным революционным движением. Тем не менее, возникает вопрос, действительно ли эти отношения являются односторонними, как утверждает руководство, и что (если что) эти клики потребуют взамен.§!"
 CHI_paternal_autocrat_party: "Экстремисты Вампоа"
 CHI_paternal_autocrat_party_long: "Экстремисты Вампоа (Хуанбу цзидуань фэньцзы)\n§gВо время своего руководства Военной академией Вампоа покойный генералиссимус Чан Кайши создал культ среди многих своих учеников. Хотя его звезда погасла по мнению большинства членов Гоминьдана после полного провала Северного похода, среди его бывших учеников сохраняется значительная поддержка его памяти. Многие из них также находятся под влиянием идеолога правых сил Дай Цзитао, который с тех пор был осужден центральным комитетом как реакционер. В Гоминьдане их присутствие минимально, но ходят слухи, что в Обществе возрождения Китая есть криптоправые. Однако ОВК, со своей стороны, отвергает любые слухи о том, что они обхаживают открытых реакционеров.§!"
 CHI_national_populist_party: "Экстремисты Вампоа"
 CHI_national_populist_party_long: "Экстремисты Вампоа (Хуанбу цзидуань фэньцзы)\n§gПредставляя ультранационалистическую и крайне правую часть Гоминьдана, некоторые выпускники Вампоа после провала Северного похода начали отходить от ортодоксальных гоминьдановских идей. Они обращаются к модели савинковизма как к средству спасения национальной революции, отдаляясь от любого подобия демократии и принимая тоталитаризм. Хотя в рядах новой Национально-революционной армии их немного, многие утверждают, что в Обществе возрождения Китая есть люди с подобными настроениями. Тем не менее, в силу своих крайне реакционных и экстремистских взглядов они практически не представлены во властных структурах Гоминьдана.§!"

###- Переименовывает -###.
#中國國民黨中華復興社
 CHI_crs_party: "ГМД-ОВК"
 CHI_crs_party_long: "Общество возрождения Китая (Чжонго Гоминьдан чжонхуа фусиншэ)\n§gОбщество возрождения Китая (ОВК) - клика, сформированная радикально настроенными офицерами Национально-революционной армии и поддерживающая тесные связи с теневой BIS или Цзюньтун Дай Чуньфэна. Возглавляемая в основном Ху Цзуннанем, Хэ Чжунханем и Дэн Вэньи, ОВК возникла как новая политическая фракция после Первого национального конгресса и особенно популярна среди военной молодежи.\n\nВ их идеологии много влияний - от ультраправого савинковизма, японского бусидо до максимистского британского экономического планирования, но больше всего их вдохновляет сорелианская необходимость революционного очистительного насилия. Причиной гибели партии ОВК видит сложную бюрократическую природу Гоминьдана и желает очистить партию от демократических элементов - с конечной целью создания партии во главе с прославленным диктатором (линьсюй). После этого, по их замыслу, Китай должен превратиться в высокомилитаризованное и равноправное общество с искорененными понятиями и идеями классовой борьбы в пользу полностью тоталитарного и социалистического государства. Древность Китая и его конфуцианские порядки представляются им не элементами древней истории, а скорее ощущением безмятежного спокойствия, которое в конце концов будет достигнуто под властью благожелательного линьсюя. Чтобы спасти Китай, чтобы освободить его и чтобы он снова стал уважаемой могущественной державой, его нужно возродить с нуля.§!"

#中國國民黨改組同志會
 CHI_rca_party: "ГМД-РАТ"
 CHI_rca_party_long: "Реарганизованная ассоциация товарищей Гоминьдана (Чжонго Гоминьдан гайцзу тунчжихой)\n§gКогда после окончания Северного похода ЦК Гоминьдана, в котором преобладали левые, бежал в Европу, многие последователи изгнанников в Европе присоединились к Реорганизованной ассоциации товарищей Гоминьдана. АРТ, возглавляемая в основном Чэнь Гунбо, но включающая в себя ближайших друзей и последователей Ван Цзинвэя, считает, что для спасения революции ее необходимо реорганизовать в том же духе, что и в 1924 году. Гоминьдан, по их мнению, должен быть очищен от избыточных демократических и реакционных сил, и только тогда Китай сможет осуществить свою национальную революцию.\n\nРанее тайная фракция среди китайских эмигрантов в Европе, с возвращением ЦК КПК стала одной из двух основных политических партий Гоминьдана. Они придерживаются модели жесткого руководства (рассматривая Гоминьдан как авангард социалистической революции) и партии для крестьянства, рабочих и мелкой буржуазии. Они поддерживают теплые и сердечные связи с Третьим Интернационалом, а многие члены АРТ поддерживают отношения и с радикальным крылом Синдикалистской партия Китая. Тем не менее, это движение рассматривает дело китайского национализма не только как дело Китая, но и как дело всей Азии. РАТ исходит из того, что Китай - это социалистический авангард, распространяющий революцию далеко и надолго и освобождающий угнетенные народы Азии от цепей империализма. АРТ состоит из двух крыльев - радикального, возглавляемого Чэнь Гунбо, и умеренного, возглавляемого Гу Мэнъюем, взгляды которых расходятся по таким вопросам, как характер классовой борьбы в Китае или земельная реформа.§!"

#中國國民黨临时行动委员会
 CHI_pac_party: "ГМД-ВКД"
 CHI_pac_party_long: "Временный комитет действий Гоминьдана (Чжонго Гоминьдан линьши синдун вэйюаньху)\n§gВременный комитет действий был создан во время войны Лиги теми, кто поддерживал Сун Цинлин во Временном правительстве Мингана и не доверял авторитарному характеру вернувшегося ЦК во главе с Ван Цзинвэем. Веря в идею достижения полного социализма рабочими и крестьянами, ВКД получила свое название от стремления к тому, чтобы Гоминьдан действовал как революционный авангард, а массы обрели революционное сознание и также начали действовать.\n\nОсновными идеологическими установками ВКД являются полная социальная революция через демократическую земельную реформу с передачей земли тем, кто ее обрабатывает, создание в результате этого органов местного самоуправления и необходимость принятия Китаем метода "национального капитализма" для перехода Китая от феодального общества к социалистическому. Хотя некоторые члены ВКД рассматривают распространение Третьего Интернационала на Китай как потенциальную угрозу "коренной революции", практикуемой в Китае, ВКД, тем не менее, демонстрирует готовность к сотрудничеству с членами ортодоксальной фракции Синдикалистской партия Китая, а также не менее выгодные отношения с Всемирным обществом. Будучи одной из двух основных политических клик в Гоминьдане, ВКД стремится к просвещению народных масс Китая и превращению китайского пролетариата в силу революционных перемен для полной победы над военачальниками, изгнания империалистов и осуществления мечты Сунь Ятсена.§!"
 #中國工团主义同盟
 CHI_LCS_party: "ССК"
 CHI_LCS_party_long: "Союз синдикалистов Китая (Чжонго Гунтуаньчжуи тунмэн)\n§gСоюз синдикалистов Китая - движение, подающее надежды, хотя и разобщенное. Основанная Синдикалистской партией Китая совместно с Всемирным обществом в 1925 г. с целью объединения социалистов, не принадлежащих к Гоминьдану, Лига включает в себя множество независимых анархистов, ортодоксальных марксистов, коммунистов и других сторонников в целом городского, либертарианского взгляда на будущее. Эти убеждения получили значительный толчок к росту доверия благодаря успехам Интернационала, но последовательные неудачи Синьхайской революции разочаровали многих, и высшее руководство Лиги в основном довольствуется ролью младшего партнера в Объединенном фронте.\n\nОни надеются использовать гоминьдановскую революцию в качестве средства реализации своих планов, играя в долгую игру в направлении китайского синдикализма. Многие члены Лиги имеют двойное членство в Гоминьдане, что еще больше сокращает число "истинно верующих", а частые (и все более публичные) междоусобицы ослабляют способность Лиги к самостоятельной деятельности.§!"
 #中國工團黨-正统派
 CHI_csp_ort_party: "СПК-Ортодоксы"
 CHI_csp_ort_party_long: "Синдикалистская партия Китая - ортодоксальная фракция (Чжонго Гунтуаньдан-чжэнтунпай)\n§gОртодоксальная фракция, в которую входят многие из первоначальных лидеров СПК (включая бывших анархистов и профсоюзных организаторов), объединила старую Союз синдикалистов Китая. Охотно участвуя в Объединенном фронте, они считают, что пролетариат и крестьянство должны работать вместе, чтобы сначала победить империализм, прежде чем начнется серьезная классовая борьба. В то же время они надеются ослабить напряженность в Гоминьдане и отвести свою родственную партию от авторитаризма, а также поощрять преимущественно аграрный Китай к первой индустриализации, чтобы заложить основу для истинно синдикалистской системы.\n\nВнутри страны они стараются сохранить компромисс между марксистами из советов и синдикалистами из профсоюзов, зеркально отражая центристскую фракцию во французском правительстве. Чэнь Дусю, бывший анархист, с тех пор дистанцировался от движения в пользу более советского подхода. Ли Лисань, напротив, настаивает на роли профсоюзов в политике.§!"
 #中國工團黨-急进派
 CHI_csp_rad_party: "СПК-Радикалы"
 CHI_csp_rad_party_long: "Синдикалистская партия Китая - радикальная фракция" (Чжонго Гунтуаньдан-цзицзцзюньпай)\n§gПредставляя молодое, получившее европейское образование поколение, разочаровавшееся в ортодоксальной фракции СПК, эти социалисты выступают за более активную, жесткую роль СПК в китайской политике, а не просто за то, чтобы оставаться в тени Гоминьдана. По их мнению, хаос в Китае - это не просто продукт империализма или военачальников, а самого капитализма. Империализм, бизнес, помещики, дворянство и капитализм должны быть уничтожены полностью и немедленно.\n\n Этот материалистический социалистический радикализм сблизил их с АРТ, особенно с крылом Чэнь Гунбо, и они видят в них естественных союзников в деле внедрения синдикализма как в городе, так и в сельской местности. Ревностные по натуре, они отвергают идею союза с военачальниками или несоциалистами и склонны к борьбе с более умеренными гоминьдановскими элементами.§!"
 #世界社
 CHI_wrd_soc_party: "Всемирное общество"
 CHI_wrd_soc_party_long: "Новое всемирное общество (Шицзе Шэ)\n§gВстретившись вскоре после Боксерского восстания, "четверо старейшин" основали в 1906 г. Всемирное общество - первую в Китае анархистскую партию. Руководя ранними социалистическими издательствами, такими как "Синь шицзи", и программами, такими как "Движение за прилежный труд и бережливое обучение", они стали наставниками многих будущих китайских социалистических лидеров, включая Ван Цзинвэя, Чэнь Дусю и Чу Миньи.\n\nРеволюции синдикалистов принесли им значительное признание, но их участие в авторитарном руководстве Гоминьдана повредило их репутации в анархистских кругах. Возникновение Синдикалистской партии Китая затмило их влияние, а отношения с Ван Цзинвэем испортились из-за растущего влияния авангардистской АРТ.\n\nС тех пор "четверо старейшин" вернули свое влияние в синдикалистском движении, а их рупором стал протеже И Пэйцзи. К ним также относятся анархисты Лю Шисинь и Би Сюшао, а также другие либертарные социалисты, готовые пойти на подрыв своих идеалов в пользу национального объединения.  Сторонники проудоновского примирения классов и всеобщей гармонии, они также настаивают на постепенном и добровольном нравственном подъеме китайской культуры. Отвергая традиционализм и открыто выступая против христианства, они, как известно, не приемлют иконоборчества и ненужных классовых распрей. В конечном итоге они являются убежденными сторонниками утопического социалистического идеала Китая, возглавляемого Гоминьданом под влиянием их "Всемирного общества"§!"

#中國國民黨再造会
 CHI_RCF_party: "ГМД-ФР"
 CHI_RCF_party_long: "Фракция реконструкции" (Цзайцзаохой)\n§g Не каждый член Гоминьдана является ярым социалистом или авторитарным военным. Когда Гоминьдан раскололся из-за реорганизации в 1924 г. и создания Объединенного фронта, клика Сунь Фо "Кронпринц" оказалась в центре событий. Первоначально он и его соратники поддерживали правую фракцию "Западные холмы", состоявшую из недовольных гражданских правых, но в конечном итоге подчинились власти Ван Цзинвэя как дремлющей либеральной фракции, в которой доминировали буржуазные интересы.\n\n Оказавшись на обочине властных игр Ван Цзинвэя и Ху, Сунь Фо после провала Северного похода бежал на Гавайи, где его и его соратников стали уничижительно называть "гавайской кликой"\n\n. Однако эти умеренные люди были рады дать серьёзный отпор, обвинив в катастрофе радикализм и военное правление. Они призвали к полной перерегистрации членов Гоминьдана, чтобы исключить из него милитаристов и их коррумпированных приближенных, и основали журнал "Обзор реконструкции", давший им название.\n\nПодозревая марксизм АРТ и леворадикальные взгляды ССК, они, тем не менее, приняли неудобный союз с новым правительством, часто становясь  "третьим колесом" в гражданских делах. Их власть определялась и продолжает определяться их обширными связями в Комиссии по делам зарубежного Китая (КпДЗК), обеспечивая приток пожертвований от богатых, националистически настроенных и либеральных китайских бизнесменов и бизнесменов диаспоры.\n\n Им помогает союз с более мелкой фракцией, известной как "Индийская клика" офицеров, возглавляемой другом семьи Сунь и бывшим личным телохранителем Чжаном Факуи. Эти офицеры, отправленные в Индию в 1934 г. по соглашению между Ваном и Сунем в рамках военной миссии, якобы призванной помочь сохранить влияние Гоминьдана в Юго-Восточной Азии, представляют собой правых в армии, недовольных правлением других гоминьдановских группировок.§!"

###- Эндшпиль переименовывает -###.

 CHI_revolutionary_committee_party: "ГМД-РК"
 CHI_revolutionary_committee_party_long: "Революционный комитет Гоминьдана (Чжунго Гоминьдан гэминвэйюаньхуэй)\n§gРеволюционный комитет Гоминьдана является естественным преемником бывшего Временного комитета действий, многие из ведущих членов которого являются основателями бывшего ВКД. В соответствии с системой связей и лидерства "гуаньси" многие члены Революционного комитета Гоминьдана знакомы друг с другом, а в большинстве случаев даже являются давними товарищами, такими как Дэн Яньда и Хуан Цицян. В соответствии с идеалами ССК, Революционный комитет считает, что целью китайской революции является непосредственное осуществление социализма и демократии, однако полагает, что этот процесс постепенный и что революционный комитет необходим для того, чтобы революция развивалась естественным путем.\n\nПосле поражения бывшего председателя Ван Цзинвэя и его Реорганизованной ассоциации товарищей Революционный комитет фактически взял на себя полный контроль над партией, и его часто связывают с Революционной ассоциацией однокурсников Военной академии Вампоа - многие из его лидеров имеют двойное членство в обеих организациях.§!"

 CHI_WMARCA_party: "АРОВАВ"
 CHI_WMARCA_party_long: "Ассоциация революционных одноклассников Военной академии Вампоа (Хуанбу цзюньсяо гэмин тунсюэхой)\n§gАссоциация революционных одноклассников Военной академии Вампоа - это организация нынешних и прошлых выпускников Вампоа, которые поддерживали Временный комитет действий в период становления Национальной революции. Во время Национальной революции руководство ВКД под руководством Дэн Яньда считало, что национальное воссоединение невозможно без военной борьбы. Поэтому АРОВАВ была создана для борьбы с антиреволюционной деятельностью, для подготовки и воспитания новых кадров революционеров, для обучения и связи с массами, для обеспечения подчинения армии идеалам партии.\n\nПодобно отношениям, которые были у покойного Чан Кайши с его учениками, АРОВАВ должна была служить прикрытием для операций ВКД и привлекать молодых офицеров в таких учебных заведениях, как Вампоа и Баодин. После победы ССК и создания Революционного комитета АРОВАВ по-прежнему сохраняет свое влияние как братская клика офицеров, лояльных Дэну и Комитету.§!"

 CHI_residence_faction_party: "ГМД-Резиденция"
 CHI_residence_faction_party_long: "Гоминьдан - Фракция резиденции (Чжонго Гоминьдан гунгуаньпай)\n§gФракция "Резиденция" получила свое название благодаря тому, что ее члены тесно связаны с председателем Ван Цзинвэем, поскольку многие из них лично проживают с председателем в его особняке. В фракции фактически доминирует жена Вана Чэнь Бицзюнь, но в целом в нее входят те, кто считается "внутренним кругом", такие как Ли Шицюнь (телохранитель Вана), Чу Миньи (шурин Чэнь Бицзюнь), Цзэн Чжунмин (секретарь Вана), Цзэн Синь (сестра Цзэн Чжунмина) и др. Многие из членов фракции "Резиденция" были товарищами Вана во время его пребывания во Франции и поэтому считаются наиболее доверенным окружением председателя. В результате они часто конкурируют с Реорганизованной ассоциацией товарищей, которую они рассматривают как потенциальную угрозу для прекращения их всепроникающего влияния на Председателя.§!"

 CHI_rca_moderate_party: "ГМД-РАТ-(У)"
 CHI_rca_moderate_party_long: "Гоминьдан - Реорганизованная ассоциация товарищей (умеренная фракция) - (Чжонго Гоминьдан гайцзу тунчжихой - вэньхэпай)\n§gРеорганизованная ассоциация товарищей - сложная фракция в Гоминьдане, поскольку из-за размеров ее организации и идеологических различий ее лидеров внутри РАТ существует более слабая, умеренная фракция. Эту фракцию возглавляет Гу Мэнъюй; в отличие от радикалов, они не признают марксизм, осуждая его как форму метафизики, не имеющую под собой научной и эмпирической основы. В связи с этим они оказываются открытыми для таких фракций, как Временный комитет действий. По мнению умеренных, история движется не социальными факторами, а "волей", то есть стремлением людей преодолеть кризисные и трудные времена, а не социально-экономическими факторами, как это было показано в работах радикалов РАТ. В отличие от жестких формул, которые, казалось бы, должны были принять марксисты-радикалы, реорганизация предполагает создание новой формы революционера.\n\nGu считает, что РАТ должна вести массы осторожно, в отличие от радикалов, которые верят во всемогущество массового движения. Гоминьдан должен быть революцией, принадлежащей всем народам, а не только рабочим и крестьянам, как выражаются радикалы. В результате они предпочитают дистанцироваться от акцента радикалов на массы. По мнению умеренных, массы могут нести в себе неумолимую революционную силу, которая может погубить революцию. Поэтому во главе революции должны стоять люди, накопившие революционный опыт и знания; именно от воли этих людей зависит успех революции.§!"

#急进
 CHI_rca_radical_party: "ГМД-РАТ-(Р)"
 CHI_rca_radical_party_long: "Гоминьдан - Реорганизованная ассоциация товарищей (радикальная фракция) - (Чжонго Гоминьдан гайцзу тунчжихой - цзицзиньпай)\n§gВ Реорганизованной ассоциации товарищей доминирует радикальная фракция, которую возглавляет Чэнь Гунбо. Радикальная фракция дистанцируется от "умеренных" своими взглядами на классовую борьбу и марксистский исторический материализм. Хотя немногие члены РАТ готовы открыто объявить себя марксистами, в их работах заметно сильное марксистское влияние, а члены радикальной фракции часто используют такие выражения, как "противоречие" и "тотальность"\n\nВ рядах радикальной фракции много бывших синдикалистов, и их часто ассоциируют с радикальной фракцией Синдикалистской партия Китая. Члены Радикальной фракции РАТ придерживаются, по их мнению, "материалистической" интерпретации Трех принципов народа, т.е. считают, что "Саньминчжуи" можно интерпретировать через призму марксизма и что экономические факторы могут быть использованы для изучения истории Китая. Разделяя взгляды умеренных, радикалы все же считают, что необходима реорганизация, чтобы изгнать из Гоминьдана деградацию. Однако при этом партия должна быть связана с массами, а гоминьдановская организация должна превратиться в организацию рабочих и крестьян, - в конце концов, она станет настолько укорененной, что революцию возглавят рабочие и крестьяне. Однако до тех пор, пока это время не наступит, лидеры РАТ-Радикалов должны направлять и обучать революционные классы Китая, чтобы раз и навсегда уничтожить чудовищный капитализм.§!"

###- Сторонние организации -###.
 CHI_CDL_party: "КДЛ"
 CHI_CDL_party_long: "Китайская демократическая лига (Чжонго миньчжу тунмэн)\n§gКитайская демократическая лига, созданная Чжан Цзюньмаем (Карсон Чун), состоит в основном из левоцентристских республиканцев, которые отвергли партийно-государственную идеологию Гоминьдана, но впоследствии были вынуждены сотрудничать с ним для сохранения актуальности. Смутно вдохновленные западным либерализмом, они представляют собой собрание различных социал-демократов, отколовшихся от федералистов, умеренных республиканцев и других, объединившихся в надежде сохранить некоторую автономию перед лицом подавляющей власти Гоминьдана. Партия заявляет, что стремится к превращению Китайской Республики в подлинно демократическое государство, хотя, учитывая сомнительную компетентность ее враждующих лидеров, пока неясно, насколько важную роль они в конечном итоге сыграют.§!"

 CHI_RRA_party: "АРСР"
 CHI_RRA_party_long: "Ассоциация реконструкции сельских районов" (Сянцунь цзяньшэ сехой)\n§gСостоящая в основном из левых членов бывшей АРНКИ и возглавляемая Янь Янчу (более известным как Джеймс "Джимми" Янь), АРСР представляет лоббистов и политиков, которые верят, что сердце истинного Китая находится в провинциальной деревне. Они стремятся к прогрессу в виде технологических и социальных достижений в китайской деревне, считая, что деревня может стать местом рождения новой китайской демократии. Их выступления в поддержку сельских реформ и программ ликвидации неграмотности снискали им симпатии новых хозяев Китая, которые решили терпеть ограниченную автономию АРСР - разумеется, под надзором гоминьдановской опеки.§!"

 CHI_PIP_party: "ПОИ"
 CHI_PIP_party_long: "Партия общественных интересов" (Чжонго чжигундан)\n§g ПОИ была основной политической партией федералистского движения в Китае, основанной разочарованными политиками из Гуанчжоу в 1925 г., недовольными авторитарным социалистическим курсом Сунь Ятсена. Под руководством Чэнь Цзюнмина они объединили разрозненные фракции и призвали к созданию федеративной многопартийной республики.\n\nПосле горькой размолвки между Чэнем и Сунем Гоминьдан и ПОИ долгое время враждовали, конкурируя друг с другом за влияние. Гоминьдан долгое время рисовал НПИ как проводника военачальников, хотя в последние годы сближение позволило НПИ сохранить некоторое влияние под опекой партии-государства.\n\nПоскольку национальная политика смещается влево, а многие представители прогрессивного крыла НПИ вливаются во фракции Гоминьдана, НПИ борется за внимание. Тем не менее, ее лидеры полны решимости гарантировать, что даже в тех условиях, в которых они оказались, они будут продолжать бороться за свободную республику с выборными собраниями всех уровней.§!"

 CHI_rkmt_party: "Правый Гоминьдан"
 CHI_rkmt_party_long: "Правые фракции Гоминьдана (Чжонго Гоминьдан юпай)\n§gГоминьдан уже давно, еще до смерти Сунь Ятсена, переживает раскол в своем руководстве. Левая ветвь партии стала доминировать с 1924 года, в то время как правая продолжала делиться на фракции. Умеренные правые, включая последователей "клики Западных холмов" и Ху Ханьмина, в значительной степени вошли во фракцию "Реконструкция"\n\nДругие часто основываются на культе личности, особенно такие военные сильные личности, как Ли Цзунжэнь и Чан Кайши. Считается, что первый из них все еще действует, хотя в значительной степени сторонится военного истеблишмента. В отношении второго в партии наблюдается снижение его некогда высокого авторитета, однако он по-прежнему вызывает культовое восхищение у многих офицеров, прошедших обучение в Whampoa, и даже у некоторых левых. Однако с тех пор его клика "Уампоа" рассеялась, что лишило ее значительного влияния за пределами определенных армейских кругов.§!"

 CHI_gmj_party: "Гоминьцзюнь"
 CHI_gmj_party_long: "Национальная армия (Гоминьцзюнь)\n§gГоминьцзюнь - это культ личности, выросший из армии, созданной странствующим героем-военачальником Фэн Юйсяном. Проповедуя эклектическую смесь христианства, социализма, популизма, объединенную неуклонным национализмом, люди Фэн Юйсяна прославились своей дисциплиной. Будучи северной фракцией, они объединились с Гоминьданом во время первого Северного похода (фактически на короткое время заявив о своей прямой преданности партии) и официально стали придерживаться "Трех принципов" как части своего катехизиса.\n\n Фэн не отличается особой надежностью, его часто называют "Генерал-предатель" - прозвище, полученное за его предательство многих деятелей на протяжении многих лет. Левый сдвиг в национальной политике привел к тому, что Фенг стал жаждать влияния, а Ванг в основном держит его движение в стороне, несмотря на то, что якобы приветствует его в своем правительстве.§!"

###- Другие -###.
 CHI_totalist_juntong_generic: "ГМД-БРиС"
 CHI_totalist_juntong_generic_long: "Гоминьдан - Бюро расследований и статистики Комиссии по военным делам\n§gНеформально называемые 'Хунтун', небольшие подпольные разведывательные ячейки были созданы ныне печально известным шпионом Гоминьдана Дай Чуньфэном. Уходя со своих баз за линию фронта, они воображают себя "безымянными героями", о которых история не вспомнит ничего, кроме конечного триумфа их революции. Большая часть их высшего руководства происходит из клики выпускников Вампоа, известной как "Лига Десяти", ультранационалистической группы, связанной с организованной преступностью. Тем не менее, было бы неразумно считать их простыми гангстерами - известно, что они ищут себе соратников (как желающих, так и не желающих) как высокого, так и низкого уровня, от католических кардиналов до оперных певиц и светских плейбоев. Хотя это и не является прямой угрозой, к растущему влиянию Гоминьдана не следует относиться легкомысленно.§!"

 CHI_totalist_teke_generic: "ГМД-Теке"
 CHI_totalist_teke_generic_long: "Отдел специальных операций Центрального исполнительного комитета Гоминьдана\n§g'Теке' - небольшая подпольная разведывательная ячейка, созданная основателем Гоминьдана Чжоу Эньлаем. Отвечая за сбор разведданных, защиту и спасение пленных гоминьдановских лидеров, проникновение в правительства военачальников и, при необходимости, "глушение" перебежчиков из партии, "Теке" представляет собой скрытую угрозу, преследующую нацию. Пожалуй, самое известное их бюро - это "Особый отдел действий", переросток старого "Красного отряда", занимающийся убийствами на высшем уровне, особенно против предателей. Хотя это и не прямая угроза, к растущему влиянию Гоминьдана не стоит относиться легкомысленно.§!"

