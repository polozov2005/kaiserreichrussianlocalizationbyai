 #CRS/Hu Tooltips

 CHI_abolish_the_legislative_yuan_tt: "§oПосле упразднения Законодательного Юаня советник §YСунь Фо§! больше не будет доступен!§!"

 CHI_militarisation_of_society_effect_tt: "§YМы получим военные заводы в Нанкине, Гуанчжоу, Пекине, Ухане и Чанше. Мы приобретём по две фабрики в каждом городе в зависимости от совокупного влияния нашей популярности §oтоталистов§!.§!"

 CHI_military_syndicalism_modifier: "Военный синдикализм"
 CHI_military_syndicalism_modifier_desc: "В конце концов, даже находясь на грани победы, воры и дилетанты угрожали свести на нет все с таким трудом завоёванные достижения, которыми пожертвовала Национальная революция. Чтобы защитить страну, три принципа и китайский народ, Национально-революционная армия была вынуждена вмешаться и восстановить порядок.\n\nОднажды спасшие республику от безвременной кончины, они вряд ли уйдут в ближайшее время, вместо этого перестраивая страну по военному принципу. Некоторые из наиболее идейных представителей этого реформированного государства утверждают, что черпают вдохновение в западных идеях сорелианизма, утверждая, что конечный результат будет ближе к народу, чем дегенеративная республика.\n\nНо поскольку различные фракции уже определили свою долю в новом режиме, похоже, что Китай будет трудиться под новой опекой ещё несколько поколений."

 CHI_military_syndicalism_tt: "Будет создан динамический модификатор, который изменяет §Yмодификатор стабильности от популярности партии§!, §Yмаксимальный коэффициент прироста командного ресурса§!, §Yполучаемый опыт армии§! и §Yежедневный прирост политической власти§! на основе вашей популярности §oтоталистов§!, §Nнационал-популистов§!, §Pпатерналистов§! и §gавторитарных демократов§! соответственно."

#CSP Tooltips
 CHI_syndicalist_communes_effect_tt: "§YМы получим военные заводы в Нанкине, Гуанчжоу, Пекине, Ухане и Чанше. Мы приобретём по две фабрики в каждом городе в зависимости от совокупного влияния нашей популярности §Rсиндикалистов§!.§!"

#Dynamic Traits Tooltips
 CHI_red_napoleon_effect: "The Red Napoleon"
 CHI_red_napoleon_effect_desc: "Representing the legacy of Whampoa Military Academy, Deng Yanda's power is dependent on the reputation of the National Revolutionary Army as the champions of the peasants and workers.\n§YThe effects of this idea is modified by your current §PPaternal Autocrat§! party popularity.§!"
 CHI_pingmin_zhengquan_tt: "Modifies your §YSecond in Command§!:\nReplaces the trait §YHero of the Chinese Revolution§! with §YThe Red Napoleon§!, a §Ydynamic§! trait whose effects depend on your current §PPaternal Autocrat§! popularity. Current effects:\n - Army Attack Factor: [?CHI.party_popularity@paternal_autocrat|=%+]\n - Army Attack Defense Factor: [?CHI.party_popularity@paternal_autocrat|=%+]\n - Army Experience Gain Factor: [?CHI.party_popularity@paternal_autocrat|=%+]\n - Political Power Gain Factor: [?CHI.party_popularity@paternal_autocrat|=%+].\n - Weekly War Support (Combat Casualties): §G+0.10%§!"

 CHI_realising_datong_effect: "Realising Datong"
 CHI_realising_datong_effect_desc: "Representing the syncretic ideals of an older generation of Chinese anarchists, the influence of the Four Elders is dependent on the strength of the party's old guard.\n§YThe effects of this idea is modified by your current §cSocial Conservative§! party popularity.§!"
 CHI_towards_a_dream_of_true_love_tt: "Modifies your §YSecond in Command§!:\nReplaces the trait §YThe Pursuit of Datong§! with §YRealising Datong§!, a §Ydynamic§! trait whose effects depend on your current §cSocial Conservative§! popularity. Current effects:\n - Research Speed: [?ROOT.party_popularity@social_conservative|=%+]\n - Factory Output: [?ROOT.party_popularity@social_conservative|=%+]\n - Consumer Goods Factories: [?-0.05|=%Y]\n - Stability Factor: [?-0.25|=%+]§!"

 CHI_iron_necked_liberal_effect: "The Iron-necked Liberal"
 CHI_iron_necked_liberal_effect_desc: "Representing the might of liberal interests, Sun Fo's power waxes and wanes with the fortunes of the Reconstruction Faction.\n§YThe effects of this idea is modified by your current §lSocial Liberal§! party popularity.§!"
 CHI_the_vision_of_the_eternal_premier_tt: "Modifies your §YSecond in Command§!:\nReplaces the trait §Y$KR_kuomintang_crown_prince_sic$§! with §Y$KR_iron_necked_liberal$§!, a §Ydynamic§! trait whose effects depend on your current §lSocial Liberal§! popularity. Current effects:\n - Resistance Target: [?-0.10|=%-]\n - §YCivilian Factory§! Construction Speed: [?0.10|=%+]\n - Daily Political Power Gain: [?party_popularity@social_liberal|=%+]\n - Party Popularity Stability Factor: [?party_popularity@social_liberal|=%+]"

 CHI_blueshirt_harbinger_modifier: "Предвестник синерубашечников"
 CHI_blueshirt_harbinger_modifier_desc: "Голос Ассоциации товарищей революционной армии (АТРА), влияние Хэ Чжунханя как главы Национальной директории усиливается благодаря его способности использовать фанатичное, ультранационалистическое Общество возрождения Китая для достижения своих целей.\n§YЭффекты этого национального духа модифицируются исходя из популярности партии §oтоталистов§!.§!"
 CHI_blueshirt_harbinger_focus_tt: "Назначить советником §YХэ Чжунханя§! с эффектами\nАтака дивизии: [?0.10|=%+]\nСтабильность: [?-0.25|=%+]\nПоддержка войны: [?party_popularity@totalist|=%+]"

 CHI_chen_gongbo_tt: "§LЧерты Чэня Гунбо, представляющего интересы радикалов РАТ, будут усиливаться по мере того, как мы будем продвигаться вниз по дереву фокусов.§!"
 CHI_zeng_zhongming_tt: "§LЧерты Цзэна Чжунмина, представляющего интересы фракции Резиденция, будут усиливаться по мере того, как мы будем продвигаться вниз по дереву фокусов.§!"
 CHI_gu_mengyu_tt: "§LЧерты Гу Мэнъюя, представляющего интересы умеренных РАТ, будут усиливаться по мере того, как мы будем продвигаться вниз по дереву фокусов.§!"

