 ### Ideas ###

SAR_paramilitary0: "Саравакские парамилитарии"
SAR_paramilitary0_desc: "Хотя войска [SAR.GetNameDef] добились большой славы за свои подвиги и доблесть, особенно Рейнджеры, [SAR.GetNameDef] формально не имеет единой армии и продолжает полагаться на более децентрализованный подход с множеством различных парамилитарных подразделений. Несмотря на то, что это не так эффективно, как регулярная армия в conventional warfare, борьба на землях Борнео редко бывает традиционной, что может дать [SAR.GetAdjective] войскам преимущество, когда наступит нужный момент."
SAR_nbcc_influence: "Влияние Британской Северо-Борнейской Хартии"
SAR_nbcc_influence_desc: "Британская Северо-Борнейская Хартия — одна из немногих иностранных корпораций, которым были предоставлены экономические концессии в Сараваке. С их помощью они долгое время эксплуатировали ресурсы Борнео в своих интересах, нанося ущерб местным народам, особенно в Сабахе и Лабуане. В этих двух восточных территориях компания была и фактически остается единственной формой закона и власти, конкурируя с правительством в Кучинге."

SAR_white_rajahs_idea: "Царствование Белых Раджей"
SAR_white_rajahs_idea_desc: "Семья Брук правит Сараваком с тех пор, как территория была передана Джеймсу Бруку, первому Белому Радже, Султаном Брунея. Именно при этой династии зародилась нация Саравак, которая продолжала процветать и выживать при британской и немецкой защите. С тех пор как Саравак номинально стал независимым, Белый Раджа продолжает сидеть на троне Раджи, готовый вести нацию в будущее."

SAR_white_rajahs_oligarchy_idea: "Саравакская Олигархия"
SAR_white_rajahs_oligarchy_idea_desc: "Семья Брук правит Сараваком с тех пор, как территория была передана Джеймсу Бруку, первому Белому Радже, Султаном Брунея. Именно при этой династии зародилась нация Саравак, которая продолжала процветать и выживать при британской и немецкой защите. С тех пор как Саравак номинально стал независимым, Белый Раджа продолжает сидеть на троне Раджи, привнося значительные реформы в нацию, хотя до сих пор они приносят пользу только правящему кругу."

SAR_white_rajahs_democratic_idea: "Современный Раджа"
SAR_white_rajahs_democratic_idea_desc: "Семья Брук правит Сараваком с тех пор, как территория была передана Джеймсу Бруку, первому Белому Радже, Султаном Брунея. Именно при этой династии зародилась нация Саравак, которая продолжала процветать и выживать при британской и немецкой защите. С тех пор как Саравак номинально стал независимым, Белый Раджа продолжает сидеть на троне Раджи, привнося значительные реформы в нацию, которые посеяли семена демократии, которые, возможно, принесут процветание новому и обновленному государству."

SAR_perlembagaan_rakyat_idea: "Перлебагаян Ракят"
SAR_perlembagaan_rakyat_idea_desc: "Перлебагаян Ракят, или Конституция народа, является документом, который инициировал множество демократических реформ в государстве [SAR.GetNameDef]. Новая конституция предложила значительные реформы для Совета Негри, чтобы попытаться сделать его демократическим законодательным органом для всех граждан [SAR.GetNameDef], гарантированы права всех граждан независимо от их расы, а особый статус других государств на Северном Борнео официально признан. Время покажет, насколько эффективно и полно эти элементы будут реализованы, но похоже, что будущее [SAR.GetNameDef] будет демократическим."

SAR_birth_of_a_republic_idea: "Семена демократии"
SAR_birth_of_a_republic_idea_desc: "Несмотря на то, что политические интересные группы и организации всегда существовали в [SAR.GetNameDef], реформы Совета Негри привели к тому, что эти группы официально реорганизовались в политические партии, готовые работать в системе. Безусловно, потребуются годы, чтобы эти новые партии полностью интегрировались в систему, но с каждым шагом в этом направлении народ [SAR.GetNameDef] становится всё более уверенным в новой конституции и государстве в целом."

SAR_executive_idea: "Укреплённая исполнительная власть"
SAR_executive_idea_desc: "Хотя [SAR.GetNameDef] может быть свободным от иностранного правления, и реформы были проведены в Совете Негри для предоставления народу большего голоса, истинная власть в государстве всё ещё сосредоточена в руках малого правящего круга, и ничто не делается на политическом уровне без прямого указания сверху."

SAR_ketuanan_melayu_idea: "Кетуанан Малайю"
SAR_ketuanan_melayu_desc: "С точки зрения правящей Пергеркан Пемуда, [SAR.GetNameDef] — это государство, принадлежащее исключительно малайцам, которые его населяет, и они ясно дали понять свои намерения, чтобы это оставалось так. Хотя они не открыто враждебны к немалацам, живущим на территории страны, правительство оставляет мало места для сомнений в том, что всегда будет ставить интересы и желания малайского народа выше этих немалаев 'гостей', которые всё ещё составляют значительную часть населения."

SAR_datu_patinggi_idea: "Царствование Молодых Малаев"
SAR_datu_patinggi_idea_desc: "Даже с тем, что Белые Раджи больше не у власти, контроль над [SAR.GetNameDef] всё ещё остаётся твердо в руках сильного исполнительного правителя и тех, кто пользуется его благосклонностью. Несмотря на то, что они не так коррумпированы, как прежний режим Вайнера, многим кажется, что ничего не изменилось, кроме удаления многих 'колониальных остатков', которые могли ограничить влияние правящего круга."

SAR_three_stars_idea: "Три звезды Саравака"
SAR_three_stars_idea_desc: "Социализм пришёл в Северный Борнео, и его народ объединился под флагом с тремя звездами, символизирующими три основные этнические группы: малайцев, китайцев и дайков. Объединив эти народы под одним социалистическим флагом, правительство [SAR.GetNameDef] надеется освободить страну от наследия колониализма и привести её к светлому красному будущему."

SAR_three_stars_three_principles_idea: "Три звезды, три принципа"
SAR_three_stars_three_principles_idea_desc: "Будучи освобождены правительством, возглавляемым куоминтаном, руководство [SAR.GetName] черпало большое вдохновение в учениях Сунь Ятсена и других лидеров куоминтана, когда формировало своё видение нового государства. Хотя Северный Борнео и не является Китаем, они считают, что такие принципы, как Три Принципа, действительно универсальны и могут вести нацию вперёд, независимо от её местоположения."

SAR_nusantara_socialism_idea: "Нусантара социализм"
SAR_nusantara_socialism_idea_desc: "Хотя многие считают, что социализм находит своё наибольшее развитие в западных странах, правительство [SAR.GetNameDef] верит, что идеи, выработанные среди местных жителей и граждан соседних регионов, являются гораздо более ценным источником вдохновения. Черпая элементы из мыслителей с материкового Малая, с Явы и даже на Филиппинах, они надеются развить марку социализма, которая действительно будет соответствовать народам Юго-Восточной Азии."

SAR_army_idea: "Тентера Дарат Саравак"
SAR_army_idea_desc: "Старые парамилитарии, которые раньше составляли основу вооружённых сил Саравака, были устранены в пользу создания полноценной постоянной армии для защиты страны. Хотя вряд ли она когда-либо сможет соперничать с армиями великих держав, со временем надеются развить армию, способную защищать страну от любого разумного угрозы."

SAR_communal_militias_idea: "Копирование общинных ополчений"
SAR_communal_militias_idea_desc: "Для социалистического правительства в [SAR.GetNameDef] нет солдат, которые бы лучше олицетворяли истинный дух дела, чем ополчения Франции. Хотя Борнео — это не Франция, и его народ может быть не так вдохновлён, как французы, надеются, что даже если будет подражание лишь малой части этого, солдаты Саравака будут бороться так, как это нужно нации в нужный момент."

SAR_svobodniks_idea: "Изучение Свободников"
SAR_svobodniks_idea_desc: "Хотя парамилитарии [SAR.GetNameDef] были распущены в пользу постоянной армии, это не означает, что правительство страны не признает, насколько эффективными могут быть тактики, использованные этими войсками. Рассматривая парамилитарии, помогавшие в восхождении Савинкова, как пример таких тактик, они начали вводить элементы этих методов в обучение армии."

 ### Tooltips ###

SAR_bertram_chosen: "Брат Вайнера §YБернард Брук§! будет выбран новым Раджей Саравака, правящим как §YБернард I§!."
SAR_anthony_chosen: "Племянник Вайнера §YЭнтони Брук§! будет выбран новым Раджей Саравака, правящим как §YЭнтони I§!."

 ### Events ###

sarawak_events.1.t: "Наследование в Сараваке"
sarawak_events.1.d: "Хотя мы выбрали подтверждение правления Белых Раджей в Сараваке, Совет Негри решил, что возвращение Раджи Вайнера I не принесет пользы никому. Вместо этого совет официально подтвердил отречение Вайнера и приступил к обсуждению выбора преемника, хотя процесс осложняется из-за отсутствия у Вайнера мужских детей. Обсуждения, однако, сузились до двух кандидатов из династии Бруков, и Совет запросил советы по тому, кого из них следует поддержать.\n\nСамым очевидным кандидатом на трон для многих является Бернард Брук, младший брат Вайнера, который много лет был его наследником. Подобно своему брату, Бернард выражает взгляды, которые, кажется, склоняются к сохранению статус-кво в Сараваке, хотя и более прагматично, чем у Вайнера, и он был бы готов отступить от прямых обязанностей, если это будет воля его народа. Тем не менее, Бернард также ясно дал понять, что не стремится к короне, и несмотря на то, что не отверг эту идею, он направил Совет рассмотреть, не был ли бы лучше выбор его сына Энтони.\n\nПо сравнению с его отцом, Энтони считается несколько радикальным огненным лейтенантом, или хотя бы таким, каким может быть принц, с тем, что он предложил реформы своему дяде, которые были встречены довольно холодно со стороны старого Раджи. Хотя он и готов уступить место более демократическому правительству, если ему представится возможность, молодой принц, безусловно, предпримет попытки реформировать Саравак в более современную монархию, соответствующую текущим временам.\n\nВсе, что нам остается сделать теперь, это выбрать между этими двумя кандидатами, и Совет сделает последние шаги для официального подтверждения отречения Вайнера от престола и утверждения преемника, выбранного на основе наших советов."
sarawak_events.1.a: "Саравак будет в надежных руках у Бернарда."
sarawak_events.1.b: "Молодой Энтони выглядит многообещающе, трон должен достаться ему."
