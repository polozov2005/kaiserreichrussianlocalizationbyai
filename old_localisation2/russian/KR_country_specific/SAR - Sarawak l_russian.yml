 ### Characters ###

SAR_wu_chan: "Ву Чан"
SAR_wu_chan_leader_desc: "§YРодился:§! §L31 августа, 1904, округ Хайэфен, Гуандун, Империя Цин§!\n§YБиография:§! §LИзначально известный как Ву Цзантянь, лидер Антиимпериалистической лиги Саравака, Ву родился в бедной крестьянской семье в сельской местности Гуандуна, которая когда-то была богатой, но переживала трудные времена. Он провел свою молодость, работая в поле, пока в 1925 году не эмигрировал в Саравак вместе с большей частью своей семьи. Они поселились в китайском квартале Кучинга и стали торговцами на рынках Синиаван, что позволило Ву поехать в Японию на следующий год для получения высшего образования. Он поступил в Токийскую высшую нормальную школу, где сменил имя на Ву Чан.\n\nНесмотря на то что он родился и вырос в южных областях китайской революции, именно в Токио Ву познакомился с радикальной политикой. В это время его наиболее сильно повлияли китайский анархизм, японская левая политика и Третий интернационал. К началу 1930-х Ву бросил учебу, объяснив это тем, что японская империалистическая интервенция в Маньчжурии сильно беспокоила его совесть, и продолжение учебы в японской школе стало невозможным. Он переехал в Шанхай, где завел связи с местным отделением Гоминьдана через бывших однокурсников и основал местную газету под названием «Свобода».\n\nОднако его пребывание в Шанхае было недолгим. После Шанхайского восстания 1932 года он покинул Китай, опасаясь преследования за свои политические связи. Хотя некоторые товарищи предложили помочь ему добраться до базы Гоминьдана в Лоньяне, Ву отказался и решил вернуться в Саравак, чтобы применить уроки, полученные в Токио и Шанхае, среди китайской диаспоры.\n\nОн стал учителем в местной китайской школе в Бау, постепенно поднявшись до должности директора, а позже стал редактором газеты «Sarawak Daily» в Кучинге. Вдохновленный политической деятельностью Гоминьдана и шанхайскими профсоюзами, он основал «Антиимпериалистическую лигу Саравака», чтобы объединить социальных бандитов, студенческих радикалов и профсоюзников всех этнических групп Саравака для борьбы как с японским, так и с европейским империализмом в Азии.§!"

SAR_yang_zhanmou: "Ян Жанму"
SAR_yang_zhanmou_leader_desc: "§YРодился:§! §LИмперии Цин§!"

SAR_ong_kee_hui: "Онг Ки Хуи"
SAR_ong_kee_hui_leader_desc: "§YРодился:§! §L19 августа 1914, Кучинь, Саравак§!\n§YБиография:§! §LВеликая династия семьи Онг, являющаяся фактически лицом молодого китайского населения Саравака, выделяется не через опору на богатство и привилегии, а через политическую деятельность. Хуи родился в семье «Капитана Китая», титула, который присваивался лидерам китайской общины в Сараваке самим Раджей. Унаследовав наследие прадеда, первого Капитана, Онг Эве Хая, и деда, нынешнего Капитана, Онг Тян Сви, Хуи было суждено стать лидером китайской общины.\n\nОн был воспитан в строгих конфуцианских традициях, хотя в зрелом возрасте проявил интерес к христианству, и был отправлен учиться в престижные частные китайские школы как в Сараваке, так и в Сингапуре. Позже он окончил Сельскохозяйственный колледж Серданга в Селангоре, вернувшись в Саравак для работы в сельскохозяйственном департаменте Раджа в 1935 году. Хуи стал известен своим мастерством в возделывании риса, частыми поездками в «Улу» (термин, обозначающий удаленные джунгли Саравака), а также умением чувствовать проблемы бедняков.\n\nПозже его вернули в Кучинг, где он помогал управлять частными фермерскими и фабричными активами своей семьи. Там он познакомился с местными студенческими движениями и стал сочувствовать пролетарским «Ночным школам» и краткосрочным профсоюзам, которые формировались вокруг бизнеса его семьи. Несмотря на насмешки со стороны своих старых знакомых из богатых слоев общества и отказ некоторых новых товарищей называть его «социалистом из верхнего класса», Хуи был свидетелем тяжелой жизни саравакских крестьян, рабочих и студентов, людей всех народов страны, и не побоялся использовать богатство и влияние своей семьи, чтобы им помочь. В особенности его поддержка и неофициальное лидерство в Объединенном представительном делегировании студентов, а также его дальнейшее сотрудничество с Антиимпериалистической лигой Саравака привлекли наибольшее внимание, выделяя его как политическую звезду, которая пыталась примирить китайские торговые семьи и их гильдии с растущим рабочим движением.§!"

