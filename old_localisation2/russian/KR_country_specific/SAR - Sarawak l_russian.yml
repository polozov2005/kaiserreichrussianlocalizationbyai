SAR_charles_vyner_brooke: "Чарльз Вайнер Брук"
SAR_charles_vyner_brooke_regnal: "Вайнер I"
SAR_charles_vyner_brooke_leader_desc: "§YРодился:§! §L26 сентября 1874, Вестминстер, Лондон, Англия§!\n§YБиография:§! §LЧарльз Вайнер де Уиндт Брук родился за границей, во время одной из многочисленных поездок своей матери Маргарет, вдали от родной земли Белых Раджей Саравака. Несмотря на то что он был подготовлен к тому, чтобы однажды унаследовать трон от своего отца, Чарльза Брука, его строгое воспитание в британском высшем обществе и обучение в Винчестерской школе и Тринити-колледже оставили Вайнера скромным и застенчивым. По возвращении в Саравак в конце 1890-х годов он был назначен помощником своего отца, а иногда и его регентом. У него была впечатляющая военная карьера, подавляя местные восстания в Сараваке и служа в британской армии до и во время Мировой войны. Постепенно Вайнер вышел из своей оболочки и начал наслаждаться привилегиями, которые он получил как наследник, а позже и как Раджа.\n\nПолучив трон в 1917 году, он использовал свое среднее имя, чтобы отличиться от отца, и изначально правил в тандеме с младшим братом Бертрамом, который, по мнению многих, был предпочтительным выбором наследника для Чарльза. Его брат был противоположностью ему; когда-то смелый и харизматичный человек, который с возрастом стал замкнутым. Так что не прошло много времени, как Вайнер взял на себя полное управление правительством Саравака, поскольку совместные обязанности братьев легли исключительно на его плечи.\n\nТакого рода махинации, как «Белый Халиф» Жерар МакБрайан и жена Вайнера Сильвия, смогли оказать значительное влияние, в то время как Раджа все больше уступал контроль Британскому колониальному офису и Северно-Борнео компании. Кульминацией этого стал неудавшийся план Вайнера по «передаче» Саравака Великобритании в начале 1920-х годов, предложив свое королевство в обмен на пожизненную стипендию, на которую он мог бы жить комфортно. Когда эта схема провалилась, Вайнер продолжил занимать трон, даже после того как немецкий протекторат был наложен на регион после Британской революции. И сегодня он продолжает уклоняться от своих обязанностей, мечтая о более увлекательной жизни в бальных залах и вечеринках Оттавы среди своих старых друзей из Британии.§!"

