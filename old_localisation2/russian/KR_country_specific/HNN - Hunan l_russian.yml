 hunan_events.1.t: "Хунань выходит из Лиги"
 hunan_events.1.d: "После смерти Сунь Чуаньфана Хунань, одна из уже автономных провинций Лиги восьми провинций, вновь обрела полную провинциальную автономию под управлением Чжао Хэнти. Впереди неспокойные времена, а Миньганское восстание угрожает перекинуться и на нашу территорию, поэтому мы должны держать ухо востро. Как выяснилось, мы также должны следить и за западной границей с Юньнанью. Хотя Тан Цзяо - соратник федералистов, его готовность позволить Правому Гоминьдана хозяйничать в западной Гуйчжоу испортила отношения и стала еще одним источником насилия, которое может просочиться в нашу провинцию.\n\nК счастью для нас, север и юг - более безопасные фронты. На юге есть друг - клика Лянгуан, возглавляемая Чэнь Цзюнмином. И Чэнь, и Чжао - родоначальники федералистского движения, одни из единственных демократически избранных лидеров Китая. А к северу от нас находится еще один друг - У Пэйфу и его правительство в Пекине. Чжао питает личную неприязнь к Тан Сянмину, командиру гарнизона Чжили в Юэяне, за то, что тот арестовал его и бросил в тюрьму в 1913 году. Несмотря на это, он по-прежнему лично дружит с У Пэйфу, и эти двое знают друг друга уже более десяти лет, а значит, на клику Чжили можно рассчитывать как на одного из наших союзников в Китае."
 hunan_events.1.a: "Тщательное балансирование..."

 hunan_events.2.t: "Восстановление конституции провинции Хунань"
 hunan_events.2.d: "Чжао Хэнти, губернатор, пришел к власти в 1920-х годах благодаря федералистскому движению, и его первыми действиями у власти стало собрание интеллектуалов со всего Китая для написания конституции Хунани, которую, к сожалению, не удалось восстановить, пока она находилась под властью Чжили. Однако с распадом Лиги и хаосом 1936 года в Китае у губернатора Чжао наконец появилась возможность восстановить Конституцию, которую он помог создать более десяти лет назад.\n\nВ то время как другие, даже федералисты, предостерегают от создания провинциальной Конституции без центрального федерального правительства, губернатор Чжао считает, что федерализм должен сначала возникнуть на провинциальном уровне, что каждая провинция должна свергнуть своих военачальников, создать свои собственные провинциальные Конституции и построить демократию в своих провинциях. Только тогда конфедерация провинций сможет сформировать центральное правительство, и федералистское движение восторжествует.\n\nИмея в виду этот идеал, Чжао официально объявил, что конституция провинции Хунань восстановлена с сегодняшнего дня!"
 hunan_events.2.a: "Важный шаг в будущее!"
 
#Election Events

 hunan_events.election.1.t: "Выборы объявлены"
 hunan_events.election.1.d: "С восстановлением конституции провинции Хунань пламя демократии снова мерцает на перекрестке Китая. Чжао выступил сегодня перед у входа в резиденцию губернатора в Чанше, заявив, что выборы состоятся через три месяца, и объявив о выдвижении своей собственной кандидатуры на выборах под знаменем своего Общества Народного Обновления. Важно отметить, что губернатор провинции Хунань не избирается напрямую, а работает по парламентской системе: избиратели выбирают своих выборщиков, а те голосуют за губернатора, причем любому кандидату требуется большинство голосов, чтобы получить пост губернатора. Прошло совсем немного времени, и еще два кандидата объявили о своей гонке. Основным соперником Чжао в этой гонке будет Хуан Янпэй из Китайской Национальной Ассоциации Строительства Демократии. Третий кандидат и темная лошадка гонки - независимый политик Чжоу Шичжао. Хотя у него нет собственной партии, он пользуется заметным влиянием среди наиболее левых членов Ассамблеи, своих коллег по политической независимости. И наконец, Тан Янкай, человек, примыкающий и к федералистскому движению, и к Гоминьдану, объявил, что будет баллотироваться против Чжао и может подорвать его электоральную базу.\n\nХотя Чжао - явный фаворит на победу, все три кандидата вложат все силы в свои кампании, и в ближайшие месяцы в Хунани пройдут действительно демократические выборы, пример для подражания всему Китаю!"
 hunan_events.election.1.a: "За молодую демократию Хунани!"

 hunan_events.election.2.t: "Тан Шэнчжи отправляется в Хунань"
 hunan_events.election.2.d: "Генерал Тан Шэнчжи, прославленный командующий 8-й армией в Северном походе и боевой товарищ Миньгана, по сообщениям, довольно быстро уведомил своих коллег-генералов Дэн Яньда и Ли Цзишэня о своем желании участвовать в недавно объявленных выборах в провинции Хунань. На фоне хаоса, царящего в ходе войны Лиги, многие командиры в зоне повстанцев выразили явный гнев по поводу внезапного ухода генерала-изгоя, обвинив его и его сторонников в том, что они, возможно, жертвуют самим выживанием Гоминьдана ради шанса получить власть в Хунани.\n\nОднако, как бы они ни старались, Тан и остатки его 8-й армии уже покинули свои командные пункты и, скорее всего, в данный момент пересекают границу провинции, так что, увы, их крики осуждения останутся неуслышаны. Несмотря на то, что его гамбит может закончиться неудачей, генерал-изгой, возможно, обеспечит Национальной революции всю провинцию Хунань. Только время покажет, что выльется из этого."
 hunan_events.election.2.a: "По крайней мере, удачи"

 hunan_events.election.3.t: "Тан Шэнчжи прибывает в Хунань"
 hunan_events.election.3.d1: "Тревожные новости достигли офиса губернатора в Чанше. На фоне хаоса войны Лиги и восстаний гоминьдановцев в провинции Фуцзянь изгнанный гоминьдановский губернатор Хунани и повстанец Миньгана Тан Шэнчжи, по сообщениям, пересек границу провинции. В сопровождении своих подчиненных Хэ Луна, Пэн Дэхуая и небольшого отряда 8-й армии генерал, похоже, решил бросить вызов Чжао Хэнти на недавно объявленных выборах.\n\nБыв ранее подчиненным Чжао и сместив его накануне Северного похода, Тан Шэнчжи всегда хотел занять пост губернатора родной Хунани даже во время своего пребывания в зоне повстанцев. Благодаря своим связям с крестьянством и левыми по всей провинции, он показал себя серьезным соперником на национальных выборах, всколыхнув то, что считалось гарантированной победой Чжао."
 hunan_events.election.3.d2: "Тревожные новости достигли офиса губернатора в Чанше. На фоне хаоса войны Лиги и неудачных восстаний гоминьдановцев в провинции Фуцзянь изгнанный гоминьдановский губернатор Хунани и повстанец Миньгана Тан Шэнчжи, по сообщениям, пересек границу провинции, спасаясь от разрушений, причиненных его товарищам. В сопровождении своих подчиненных Хэ Луна, Пэн Дэхуая и небольшого отряда 8-й армии генерал, похоже, решил бросить отчаянный вызов Чжао Хэнти на выборах.\n\nБыв ранее подчиненным Чжао и сместив его накануне Северного похода, Тан Шэнчжи всегда хотел занять пост губернатора родной Хунани даже во время своего пребывания в зоне повстанцев. Благодаря своим связям с крестьянством и левыми по всей провинции, он показал себя серьезным соперником на национальных выборах - с помощью или без помощи Гоминьдана.\n\nХотя он вполне может быть последним, отчаянно цепляющимся за жизнь гоминьдановцем, он все же испортил то, что считалось гарантированной победой Чжао."
 hunan_events.election.3.a: "Одного Тана было уже достаточно..."
 
 hunan_events.election.4.t: "Чэн Цянь вторгается в Гуйчжоу!"
 hunan_events.election.4.d: "Еще одно поразительное событие произошло на выборах губернатора провинции Хунань. Хотя Минган был рассадником гоминьдановских настроений, в более широкой политической сфере он всегда имел исключительно левую направленность. Однако, когда Северная экспедиция потерпела крах, те, кто выступал против сотрудничества с Синдикалистской партией Китая, в основном бежали в провинцию Гуйчжоу, которая в настоящее время разделена между кликами Хунань и Юньнань, номинально оставаясь под защитой губернатора Юньнани Тан Цзияо.\n\nТан Цзияо конечно не был членом Гоминьдана, однако существование \"Правого\" Гоминьдана в Гуйчжоу часто использовалось в качестве разменной монеты против предполагаемого вторжения Чжили, даже в ущерб отношениям Тана с Чжао Хэнти.\n\nОдин из важнейших руководителей правого Гоминьдана в Гуйчжоу, Чэн Цянь, уроженец Хунани, был командующим 6-й армией НРА во время Северной экспедиции. Предприняв, по-видимому, несогласованный шаг со своим однопартийцем Таном Шэнчжи, генерал обошел Юань Цзумина и выставил свою кандидатуру на выборах."
 hunan_events.election.4.a: "Теперь их стало двое!"

 hunan_events.election.5.t: "Начало кампании в Хэнъяне"
 hunan_events.election.5.d: "Два дня назад, губернатор Чжао Хэнти вернулся в свой родной город Хэнъян, надеясь что он сможет убедить земляков проголосвать за него. Он успел встретился с семьей и старыми друзьями, произнес кучу речей по всему городу, привлекая внимание людей. Несмотря на выступления Тана Шэнчжи Чэн Цяня, Чжао легко собирал шумные толпы, используя свое ораторское исскуство.\n\nПопулярность Чжао, естественно, представляют угрозу для обоих лидеров Гоминьдана. Посколько ни один из них не способен победить Чжао в одиночку, они встретились в Хэнъяне после своих выступлений, и обсудили идею \"Единого Фронта\" между их фракциями. Эти двое конечно не друзья, однако им все же хотелось, чтоб губернатором стал их однопартиец из Гоминьдана,а не федералист Чжао."
 hunan_events.election.5.a: "Чжао Хэнти сохранит демократические ценности Хунани!"
 hunan_events.election.5.b: "Гоминьдан должен принести Национальную Революцию в провинцию!"

 hunan_events.election.6.t: "Кто возглавит Единый Фронт?"
 hunan_events.election.6.d: "Когда Чэн Цянь и Тан Шэнчжи договорились об учреждении Единого Фронта, сразу же возник вопрос кто его возглавит?\n\nС одной стороны, есть Тан Шэнчжи, связанный с левым крылом Гоминьдана, с его ориентаций на крестьян и сотрудничество с СПК, что делает его поистинне народным кандидатом, учитывая сельский характер Хунани. Однако волнующим являются, его статус аутсайдера партии, полевого командира и оппортуниста, что может привести к расколу в момент, когда единство важнее всего.\n\nС другой стороны, есть Чэн Цянь, авторитетный член партии, высоко ценящий товарищество и единство, и который поэтому легко может стать умеренной и обьединящей фигурой на выборах. Член старой гвардии, известный своим упорным характером, и хотя он не самый успешный командир в истории, в целом у него достойный послужной список. Проблема в том,что его программа не предлагает многого,в отличие от его более радикального коллеги.\n\nОба из них имеют преимущества и недостатки,но кто же станет лидером Единого Фронта?"
 hunan_events.election.6.a: "Единство партии превышего всего, Чэн возглавит Единый Фронт"
 hunan_events.election.6.b: "Нам нужен пламенный борец, передайте Тану бразды правления"

 hunan_events.election.7.t: "Сделка с Дьяволом?"
 hunan_events.election.7.d: "Внезапное появление Чэн Цяня и Тана Шэнчжи поставило губернатора Чжао в затруднительную ситуацию. Хорошо осведомленный об авторитарных и авангардистских тенденциях Гоминьдана, он опасается, что в случае их победы молодая хунанская демократия может пасть. Желая избежать этого любой ценой, он ходил взад-вперед по своему кабинету и пытался выбрать один из вариантов... наиболее достойных для победы на выборах. Провинциальная ассамблея известна своей коррумпированостью, а губернатору не хватает полномочий для борьбы с коррупцией, несмотря на все попытки, ничто похоже не может уменьшить ее. Несмотря на коррумпированность депутатов Ассамблеи, это не значит что они дружелюбны Гоминьдану...\n\nС ними конечно можно найти общую почву для разговоров, и заручится их поддержкой на выборах, при условии... что он закроет глаза на их коррумпированность, как во время выборов, так и после. Все это печально, но когда дело доходит до драки, лучше нарушать правила, чем их нарушать."
 hunan_events.election.7.a: "Я человек принципа!"
 hunan_events.election.7.b: "Это нечестно, но это необходимо."

 hunan_events.election.8.t: "Волнения среди крайне левых"
 hunan_events.election.8.d: "С тех пор как Тан Шэнчжи прибыл на восток, волнения в провинции Хунань резко усилились. На границе с Цзянси отряды социалистической милиции преследуют членов правительства Чжао, часто происходят вспышки насилия и нарушается порядок. В то же время в городах Чанша и Чандэ профсоюзные работники и Синдикалистская партия Китая активизировали свои действия, в обоих городах вспыхнули протесты.\n\nТан Шэнчжи извлек из этого выгоду, убедительно рассказав о том, что беспорядки являются естественным следствием неспособности Чжао позаботиться о рабочих Хунани, и что при Гоминьдане каждому рабочему будет выплачен причитающийся ему долг.\n\nЧжао быстро опроверг утверждения Тана, указав, что именно Тан Шэнчжи и Гоминьдан раздули пламя этих беспорядков, активно поощряли насилие на границе, а теперь обещают, что они сами решат проблему, которую сами же и создали."
 hunan_events.election.8.a: "Тан верен делу социализма"
 hunan_events.election.8.b: "Насилие пугает людей, заставляя их стекаться под знамена Чжао."

 hunan_events.election.9.t: "Голосуй за Тан Янькая!"
 hunan_events.election.9.d: "В Чанша живет бывший губернатор провинции Хунань и бывший член Гоминьдана Тан Янькай. Когда Северная экспедиция потерпела крах, Чжао предоставил ему амнистию из-за их старой дружбы и защиту от репрессий со стороны Пекина и Нанкина. Когда было объявлено о недавних выборах, он решил баллотироваться на пост губернатора против Чжао, в основном собирая голоса в Чанше и среди знати, что подорвало базу поддержки Чжао.\n\nСегодня у него на уме вопрос: в Едином Фронте Гоминьдана между Таном Шэнчжи и Чэн Цянем встанет ли он под знамена Гоминьдана или продолжит свою кампанию как независимый политик? Будучи лидером Северной экспедиции и членом Гоминьдана, он испытывает личную неприязнь как к Тану, так и к Чэну. Кроме того, его основная база поддержки находится среди дворян, поэтому связывать его имя с социалистическим насилием в Чанше и на востоке было бы для него опасным шагом."
 hunan_events.election.9.a: "Проведет кампанию как независимый."
 hunan_events.election.9.b: "Проведет компанию под стягом Гоминьдана."

 hunan_events.election.10.t: "Избирательная компания в Чанша"
 hunan_events.election.10.d: "За последние годы Чанша значительно выросла, чему способствовали экономические перемены и начало индустриализации. Тан Янькай отвлек дворянство от Чжао и теперь рассчитывает на поддержку интеллегенции в Чанше. Средний класс, со своей стороны, отдалился от его администрации, начав вместо этого обращать внимание на Чэн Цяня и его обещания. Оба они пытаются заискивать перед горожанами и склонить голоса избирателей на свою сторону, при этом Чжао апеллирует к интеллигенции и защищает работу, которую он уже проделал для Чанши и Хунани, в то время как Чэн говорит о реформировании системы, которое принесет им пользу, и дает обещания, что если они проголосуют за него, это приведет к еще большему развитию города. Примечательно, что Тан Шэнчжи отсутствует, его кампании, ориентированные на сельскую местность, не получили должного отклика в Чанше, поэтому он решил поддержать Чэна в городе. У обоих есть все шансы склонить город в свою пользу, но чья риторика окажется самой привлекательной?"
 hunan_events.election.10.a: "Популярность Чжао среди интеллегенции дает ему поддержку в городе!"
 hunan_events.election.10.b: "Чэну с помощью своих обещаний удается завоевать доверие среднего класса!"

 hunan_events.election.11.t: "Малые либеральный партии"
 hunan_events.election.11.d: "Учитывая широкую поддержку Гоминьдана с его популистской риторикой, либералам, баллотирующимся на пост губернатора, Хуан Яньпэю и Чжоу Шичжао, предстоит сделать важный выбор. Ни один из них не хочет, чтобы свет демократии в провинции Хунань погас, что вполне вероятно, если Гоминьдан одержит победу. Таким образом, они рассматривали возможность отказаться от участия в выборах губернатора и официально поддержать Чжао, объединившись под его знаменем, чтобы создать \"демократический фронт\" против Гоминьдана. С другой стороны, они всегда могут продолжить борьбу за пост губернатора, пытаясь занять свою нишу в Ассамблее, и обсудить переговоры с Чжао после того, как Ассамблея соберется после выборов. У обоих вариантов есть свои преимущества, но какой стратегии они будут придерживаться?"
 hunan_events.election.11.a: "Встать под знамя федерализма."
 hunan_events.election.11.b: "Продолжить независимые кампании."

 hunan_events.election.12.t: "Гарнизон Юэяна"
 hunan_events.election.12.d: "На границе с Хубэем находится город Юэян, который является важным связующим звеном между нашей провинцией и северным правительством. В настоящее время этот город является личной вотчиной Тан Сянмина, мэром которого является его брат Тан Хуалун. Ни один из них не был другом Чжао, но в 1913 году Тан Сянмин даже арестовал Чжао по поручению Юань Шикая и бросил его в пекинскую тюрьму. Несмотря на это, оба они симпатизируют клике Чжили, и между ними установилось непростое перемирие, хотя оно было особенно чревато распадом Лиги.\n\n Братья Тан встретились сегодня в Юэяне, чтобы обсудить свою стратегию на предстоящих выборах. Тан Хуалун, опасаясь победы Гоминьдана, предложил Тан Сянмину пока заключить перемирие с Чжао и сосредоточить усилия на том, чтобы помешать Гоминьдану захватить власть в Хунани. Тан Сянмин, не веря по-настоящему в то, что Гоминьдан может добиться успеха на выборах, не согласен со своим братом и заявляет, что они должны свести к минимуму успех Чжао."
 hunan_events.election.12.a: "Тан Сянмин прав, держите Чжао в узде"
 hunan_events.election.12.b: "Тан Хуалун прав: Гоминьдань представляет собой большую угрозу"

 hunan_events.election.13.t: "Классовая война"
 hunan_events.election.13.d: "Трибуны и предвыборные кампании - не единственные поля битвы на этих выборах. С появлением Гоминьдана и его зажигательной риторики, направленной на крестьянство, поднялась массовая волна беспорядков, направленная непосредственно против высших классов, землевладельческого дворянства. Один представитель знати даже подвергся нападению со стороны нескольких крестьян, которые впоследствии были арестованы за нападение. Несмотря на то, что насилие, по-видимому, приобрело характер эскалации, Чжао встретился со многими видными представителями дворянства, выслушал их опасения и попытался успокоить их страхи, а также смиренно попросил их поддержать его на предстоящих выборах, чтобы он смог решить проблемы, с которыми они сталкиваются.\n\nТан, с другой стороны, выступил с очередной речью перед крестьянами, заявив, что их победа близко, и что до тех пор, пока они будут продолжать продвигаться вперед и бороться, они добьются всего, чего пожелают.\n\nЧэн, всегда придерживавшийся умеренных взглядов, был значительно спокойнее Тана. Положительно отзываясь о действиях крестьян, он тем не менее призвал к компромиссу, так как все мы хунаньцы и китайцы, и должны работать сообща."
 hunan_events.election.13.a: "Чжао успокаивает дворян."
 hunan_events.election.13.b: "Тан раздувает пламя крестьянских волнений."
 hunan_events.election.13.c: "Чэн делает все возможное, чтобы быть посредником между всеми сторонами."

 hunan_events.election.14.t: "Двоевластие в Сянси"
 hunan_events.election.14.d: "На западе провинции Хунань находится диархия Сянси, которую возглавляют Тянь Инчжао и Чэнь Цюйчжэнь, полноправные военачальники, последние десять лет или около того они провели в клике Чжао Хэнти. Хотя в последние годы Тан Сянмин предпринял более согласованные усилия, чтобы подчинить их себе. Хотя вступление Тяня в Альянс защиты конституции привело к отстранению Тан Сянмина с поста губернатора.\n\nУчитывая популярность Гоминьдана на выборах и их зажигательную риторику, указывающую на \"полевых командиров на западе Хунани\" и необходимость их устранения, диархия, естественно, обеспокоена результатами этих выборов. У них, очевидно, есть два варианта: либо они могут направить свое влияние и ресурсы на обеспечение победы Чжао. Либо они могут вместо этого отреагировать на предложения Тан Сянмина и сформировать "Антигоминьдановский союз" на случай, если на предстоящих выборах победит не тот человек."
 hunan_events.election.14.a: "Тан Сянмин восстановит порядок."
 hunan_events.election.14.b: "Победа Чжао позволит держат их в узде."

 hunan_events.election.15.t: "Кампания в сельской местности"
 hunan_events.election.15.d: "Исторически сложилось так, что поддержку губернатору Чжао оказывали в основном горожане. Нынешний избирательный цикл ничем не отличается от предыдущих, поскольку среди крестьян наблюдается массовая апатия по отношению к администрации Чжао, и он банально неспособен завоевать большинство их голосов. Однако два кандидата от Гоминьдана - это совсем другая история. Тан Шэнчжи уделяет особое внимание крестьянству и дает широкие обещания о проведении земельной реформы и поддержке крестьянских организаций. Чэн Цянь, по-прежнему обещающий аналогичные усилия по земельной реформе, не заходит так далеко, как его более левый коллега. Однако, если он удвоит свои усилия и будет проводить кампании в сельской местности, он, возможно, сможет отобрать у Тана голоса в сельской местности и закрепить их за собой."
 hunan_events.election.15.a: "Риторика Тана позволяет завоевать поддержку крестьян!"
 hunan_events.election.15.b: "Чэн с трудом заручается поддержкой!"

 hunan_events.election.16.t: "Чанша и Гуйчжоу"
 hunan_events.election.16.d: "К западу от Хунани лежит Гуйчжоу, а вместе с этим там находится лидер Старой клики Гуйчжоу Юань Цзумин. Хотя формально он является полноправным губернатором и признан Чжили в качестве такового, ему не хватает сил, чтобы настоять на своем, и поэтому он вынужден полагаться на правительство в Чанше. Хотя Чжао и Юань не во многом сходятся во мнениях, оба симпатизируют Чжили и решили, что для обоих будет лучше, если они будут работать вместе. Поскольку Чэн Цянь прошел мимо Юаня и Гуйчжоу, а Чжао сосредоточился на выборах, их союз в последнее время стал более хрупким. Чжао размышляет о том, следует ли ему направить часть финансирования в Гуйчжоу или вместо этого сосредоточиться на повышении своих шансов на переизбрание в эти последние дни, ценой раздражения своего союзника на Западе. В то же время Чэн активно высказывался о Юане и его \"авторитарном режиме\" в Гуйчжоу, заявляя, что он больше не будет поддерживать его, и что в случае избрания Гоминьдана они больше не будут терпеть режим Юаня."
 hunan_events.election.16.a: "Выступления Чэн Цяня против Юаня становится популярной!"
 hunan_events.election.16.b: "Чжао скоращает поддержку, чтобы сосредоточиться на Гоминьдане и выборах."

 hunan_events.election.17.t: "Итоги выборов!"
 hunan_events.election.17.d: "Голоса подсчитаны, и выборы подходят к концу. Все участвующие кандидаты выложились по полной, но всем ясно, что лидерами являются Народное Общество Обновления и Гоминьдан. При вступлении в гонку было неясно, кто из них двоих победит на выборах, в то время как Чжао стартовал как явный фаворит, объединенный фронт Чэна и Тана неожиданно изменил ход гонки, они получили значительное преимущество и стали сильными соперниками Чжао. Теперь осталось только объявить результаты, от этого результата зависит будущее Хунани, и мы ждем победителя, затаив дыхание..."
 hunan_events.election.17.a: "Победителем выборов 1936 года стал..."

#Tang Xiangming Events

 hunan_zhili_events.1.t: "Марш на Чанша"
 hunan_zhili_events.1.d.qing: "После нашей недавней победы на выборах, войска Чжили, оккупировавшие Юэян, во главе с Тан Сянмином, спустились по железной дороге и прибыли в Чаншу в течение нескольких часов. Хотя мы, вероятно, могли бы справиться с его войсками, которые в настоящее время находятся к северу от Чанши, самостоятельно, нам удалось получить сообщение, в котором говорилось, что Пекин посылает подкрепления. Чэн Цянь и Тан Шэнчжи решили окопаться и попытаться удержать Чаншу. К сожалению, подошло подкрепление Тан Сянмина, которое укрепило его позиции на севере и создало второй фронт на востоке, зажимая город и наши силы в клещи, наши перспективы выглядят действительно мрачными..."
 hunan_zhili_events.1.d.zhao: "В связи с нашими неудачами по сдерживанию остатков Гоминьдана по всей провинции, командир гарнизона Юэян-Тан Сянмин заявил, что наше правительство не способно \"защитить лояльных граждан провинции Хунань\", и пообещал, что пойдет маршем на Чаншу, чтобы \"установить правительство, действительно заботящееся о безопасности\". из всей Хунани". Он быстро выполнил это обещание, использовав железнодорожную линию, чтобы перебросить свою армию из Юэяна за считанные часы, поскольку наши войска все еще были стянуты в Хунани, пытаясь подавить повстанцев в нашей области, мы не смогли организовать мощное контрнаступление, победа Тан Сянмина, похоже, была предопределена..."
 hunan_zhili_events.1.d: "После нашей недавней победы на выборах, войска Чжили, оккупировавшие Юэян, во главе с Тан Сянмином, спустились по железной дороге и прибыли в Чаншу в течение нескольких часов. К счастью для нас, у него, похоже, есть только его гарнизон, без каких-либо дополнительных подкреплений, о которых можно было бы говорить. Увидев благоприятную возможность, Тан Шэнчжи быстро выступил со своей Восьмой армией и встретился с войсками противника под Чанша. Чэн Цянь узнал об этом только постфактум и быстро перебросил свою Шестую армию на подмогу Тану... Однако, как ни странно, армия провинции Хунань, похоже, все еще находится в Чанше, а не движется на помощь своему губернатору."
 hunan_zhili_events.1.a: "Тан Сянмин занимает Чанша!"
 hunan_zhili_events.1.b: "Гоминьдан выходит победителем!"

 hunan_zhili_events.2.t: "Новые лица в Чанша"
 hunan_zhili_events.2.d: "Тан Сянмин шел по улицам Чанши, его войска по-прежнему стояли почти на каждом углу. Прошло много времени с тех пор, как он мог называть себя губернатором провинции Хунань, последний раз он занимал этот пост в 1916 году, то есть два десятилетия назад. Его контроль над провинцией еще не был абсолютным, войска предыдущего губернатора быстро отступали в сельскую местность, повстанцы, лояльные Гоминьдану, совершали рейды и наносили удары по его собственным войскам. Он вошел в кабинет губернатора и официально подписал приказ о выводе своих войск. Губернатор Тан Сянмин добьется абсолютного контроля над Хунанью любыми необходимыми средствами."
 hunan_zhili_events.2.a: "А теперь обсудим все остальное."

 hunan_zhili_events.3.t: "Губернатор [ROOT.GetLeader] выходит победителем"
 hunan_zhili_events.3.d: "Несмотря на то, что Единый Фронт Гоминьдана был застигнут врасплох, войска Тан Сянмина были немедленно встречены лучшими и умелыми бойцами 8-й и 6-й армий НРА. Направив свои войска прямо по железной дороге в сторону Чанши, адмирал был встречен быстро переброшенными силами Сун Силяня, которые вступили с ним в изнурительные бои.\n\nКогда острие копья затупилось, остальные части 6-й и 8-й армий смогли быстро включиться в боевые действия. После умелых маневров Хэ Цзяня, его дивизии удалось обойти войска Чжили с фланга и атаковать более слабые колонны Тана в сочетании с действиями Хэ Луна и Пэн Дэхуая, которым удалось полностью окружить войска Чжили. В конечном счете, это сражение, закончившееся капитуляцией войск военачальника, укрепило моральный дух войск Гоминьдана и укрепило концепцию о том, что Единый фронт может быть долговечным.\n\nПо всей стране новость о разгроме Чжили в провинции Хунань была встречена одобрительными возгласами многих, в том числе радикальных революционеров в Центральном комитете, остатков правого Гоминьдана в Гуйчжоу и, что самое любопытное, таких людей, как [YUN.GetLeader] и [FNG.GetLeader]. Тем не менее, бежавшему \"Мяснику Хунани\" удалось избежать плена, он вырвался из окружения с ротой своих элитных войск и, как сообщается, перешел на дружественную территорию."
 hunan_zhili_events.3.a: "Надеюсь мы видели его в последний раз."

 hunan_zhili_events.4.t: "Восстановление порядка в Хунани"
 hunan_zhili_events.4.d: "Хотя номинально мы губернатор Хунани, наш контроль над провинцией ограничивается северо-востоком. Так было до недавнего времени, когда наши войска продвигались на юг и запад, сокрушая всех сторонников Гоминьдана или федералистов, которых они находили. Один за другим города Хэнъян, Чэньчжоу и Шаоян перешли под нашу власть. Губернатор Тан Сянмин лично отправился на Запад, чтобы встретиться с Чэнь Цюйчжэнем из диархии Сянси и убедиться, что они не создадут проблем нашему губернатору. Поскольку диархия подчиняется нашему правлению, провинция Хунань прочно находится в нашей власти."
 hunan_zhili_events.4.a: "Абсолютная власть губернатора."

 hunan_zhili_events.5.t: "Контроль над восточным Гуйчжоу"
 hunan_zhili_events.5.d: "Установив контроль в провинции, Тан перенес свои планы на восточную часть Гуйчжоу, где правил чжилийский правитель Юань Цзумин. На всякий случай оставив свою армию в западной части Хунани, два губернатора встретились для переговоров. Переговоры были краткими, учитывая все обстоятельства, поскольку Тан Сянмин пообещал поддерживать отношения, которыми Юань пользовался с прошлой администрацией, и Юань заявил, что с любыми остатками Гоминьдана, оставшимися в его собственной провинции, будут обращаться как с предателями, каковыми они и являются. Некоторые темы, такие как разделение Гуйчжоу и Юньнаньская Клика, не поднимались, но планировалось обсудить позже."
 hunan_zhili_events.5.a: "Хорошо, что он умеет выбирать верные решения."

 hunan_zhili_events.6.t: "Комиссия по обороне"
 hunan_zhili_events.6.d: "Учитывая угрозы, с которыми сталкивается Хунань, также учитывая, что повстанцы из Гоминьдана все еще скрываются в наших лесах, а соседние державы жадно присматриваются к нашим землям, губернатору Тану было необходимо создать "Комиссию по обороне провинции". Внесудебный орган, предоставляющий губернатору широкие полномочия исполнительной власти в вопросах, связанных с обороной провинции. На практике это означает, что губернатор Тан имеет больше возможностей защищать Хунань от угроз, которые ее окружают. Это может показаться неоправданным уклоном в сторону авторитаризма, но это необходимо для обеспечения безопасности каждого лояльного гражданина Хунани."
 hunan_zhili_events.6.a: "Во имя безопасности и стабильности общества."

 hunan_zhili_events.7.t: "Зачистка Гоминьдана"
 hunan_zhili_events.7.d: "При Чжао Хэнти Гоминьдану было позволено беспрепятственно существовать, расти и распространять свои идеи по всей провинции Хунань, как болезнь. Во имя демократии Чжао отказался выступить против них во время своего избрания, позволив ране, которую они нанесли в провинции Хунань, загноиться. К счастью для провинции Хунань, губернатор Тан более чем готов устранить причину этой болезни и, наконец, искоренить эту заразу в нашей провинции. Его действия были быстрыми и решительными, гоминьдановские повстанцы, все еще готовые атаковать, были разгромлены нашими армиями, брошены в тюрьмы или преданы быстрому правосудию. Быстро растущая культура страха перед самопровозглашенными "революционерами" привела к тому, что многие сложили оружие и стали скрываться либо в пределах нашей провинции, либо бежали из нее.\n\nНеожиданным побочным эффектом усилий губернатора является то, что круг лиц, в первую очередь из числа дворян, которые опасаются того, что Гоминьдан сделает с ними, если они придут к власти, начал формировать политический круг вокруг губернатора Тана."
 hunan_zhili_events.7.a: "Будем надеяться, что на этот раз они не сдадутся."

 hunan_zhili_events.8.t: "Гамбит до моря"
 hunan_zhili_events.8.d: "Губернатор Тан Сянмин всегда был моряком по натуре. Он был адмиралом задолго до того, как стал генералом, и для него более чем очевидна ирония положения губернатора провинции, не имеющей выхода к морю. Чтобы исправить этот факт, он разработал план нанесения удара на Юг, в Гуанси и Гуандун, и захвата портового города Гуанчжоу. Хотя он уверен в своем собственном плане, ему нужно будет обосновать его перед руководством Чжили и убедить их присоединиться к плану. С этой целью он написал прошение, которое отправит в [HNN_zhili_home_base], и надеется, что они вразумятся и позволят ему совершить поход на Юг и обезопасить Лянгуан для клики Чжили... и для него самого.."
 hunan_zhili_events.8.a: "Отправить план."

 hunan_zhili_events.9.t: "Предложение из Хунани"
 hunan_zhili_events.9.d: "[HNN_a_petition_from_changsha_loc_desc]"
 HNN_a_petition_from_changsha_loc_desc_qie_gxc: "Сегодня к нам поступила предложение из Чанша. Тамошний новый губернатор, Тан Сянмин, предложил выступить против режима в Лянгуане. Быстрый удар на юг, когда они еще не оправились от войны, мог бы привести к тому, что у нас появились бы традиционно неспокойные провинции-близнецы, что, безусловно, было бы желанным изменением в их обычно враждебном отношении к нашему правительству. Фактически, один из наших адмиралов, Са Чжэньбин, высказался в пользу своего бывшего подчиненного, заявив, что он доверяет его мнению и что это прекрасная возможность обезопасить Южное побережье. Риск, однако, заключается в том, что переброска нашей армии на юг для оказания помощи Тан Сянмину может оставить нас открытыми для других угроз в Китае, главной из которых является клика Фэнтянь на северо-востоке.\n\nЧто нам делать? Примем ли мы петицию губернатора Тана и позволим ему сделать свой ход? Или отвергнем его план, будем держать свои карты при себе и сосредоточимся на том, чтобы сохранить то, что у нас есть?"
 HNN_a_petition_from_changsha_loc_desc_szc_gxc: "Сегодня к нам поступила предложение из Чанши. Тамошний новый губернатор, Тан Сянмин, предложил выступить против режима в Лянгуане. Быстрый удар на юг, когда они еще не оправились от войны, мог бы привести к тому, что у нас появились бы традиционно неспокойные провинции-близнецы, что, безусловно, было бы желанным изменением в их обычно враждебном отношении к нашему правительству. Учитывая наше положение на вторых ролях, закрепление за нами большей части Юга, особенно богатого Гуандуна, было бы для нас полезным благом. Риск, конечно, заключается в том, что маньчжуры угрожают нам прямо на пороге, и что, если мы двинем нашу армию на юг, это может оставить нас открытыми для нападения с Севера.\n\nЧто нам делать? Примем ли мы петицию губернатора Тана и позволим ему сделать свой ход? Или мы отвергнем его план, будем держать свои карты при себе и сосредоточимся на том, чтобы сохранить то, что у нас есть?"
 HNN_a_petition_from_changsha_loc_desc_qie_szc: "В связи с успешным захватом губернатором Тан Сянмином Гуанчжоу и созданием им Политического совета Юго-Западного Китая, сегодня от него поступило еще одно предложение. Поскольку сычуаньская группировка на нашей границе настроена против нас, он предложил, чтобы мы вместе выступили против этой группировки, и он включит ее в свой Юго-Западный политический совет. Выгода от этого очевидна, защита нашего юго-западного фланга была бы для нас бесценной. Вопрос в том, хотим ли мы сохранить полномочия губернатора Тана, хотя в прошлом он доказал свою стойкость и лояльность, наделение полномочиями автономного политического совета может стать для нас головной болью в будущем.\n\nТаким образом, остается открытым вопрос: должны ли мы принять петицию губернатора и позволить ему выступить в поход на Сычуань? Или мы отвергнем план и попытаемся сдержать его амбиции?"
 HNN_a_petition_from_changsha_loc_desc_qie_yun: "В связи с успешным захватом губернатором Тан Сянмином Гуанчжоу и созданием им Политического совета Юго-Западного Китая, от него сегодня поступило еще одно предложение. Исторически проблемная, Юньнаньская Клика в очередной раз не желает признавать Пекин законным правительством Китая. В петиции губернатора Тана содержится просьба к нам немедленно разобраться с этой занозой в наших задницах, вернуть остальную часть Гуйчжоу Юань Цзумину и включить Юньнань в его политический совет. Несмотря на то, что в прошлом провинция была довольно неспокойной, хотим ли мы предоставить Тану еще большую власть, чем у него уже есть? В любом случае, нам нужно ответить на петицию как можно скорее."
 HNN_a_petition_from_changsha_loc_desc_szc_yun: "В связи с успешным захватом губернатором Тан Сянмином Гуанчжоу и созданием им Политического совета Юго-Западного Китая, сегодня от него поступило еще одно предложение. Теперь Юньнань зажата между нами и территорией Тана, окружена и не может расширяться, не нападая на нас. Губернатор Тан считает, что это угроза и что они нанесут нам удар в спину, как только мы двинемся на север или Восток. Его предложение направлена на то, чтобы предотвратить нападение юньнаньцев, нанеся удар первыми, вернуть Гуйчжоу Юань Цзумину и включить Юньнань в свой политический совет. Он, безусловно, прав в том, что Юньнань может нанести нам удар в спину, но действительно ли мы хотим тратить наши силы и оружие на усиление Тана, когда все еще существует множество явных угроз? В этом есть свои плюсы, но мы должны тщательно подумать, прежде чем сделать свой выбор..."
 hunan_zhili_events.9.a: "Фортуна любит смелых,одобрить предложение!"
 hunan_zhili_events.9.b: "Нам следует быть осторожнее, иначе рискуем потерять все, отвергнуть предложение."

 hunan_zhili_events.10.t: "Наше предложение одобрено!"
 hunan_zhili_events.10.d: "[HNN_petition_accepted_loc_desc]"
 HNN_petition_accepted_loc_desc_gxc: "[HNN_zhili_home_base] передает хорошие новости: после тщательного рассмотрения руководством Чжили было принято решение принять наше предложении о выступлении на Юг против Лянгуана. Получив разрешение, губернатор Тан Сянмин быстро собрал свою армию и направил ее к южной границе провинции Хунань. И он, и наши люди рвутся в путь, ожидая приказа перейти границу и двинуться на юг. Губернатор Тан, со своей стороны, уже может представить себе вид на океан из Гуанчжоу, он провел большую часть в течении десяти лет, любуясь озером Дунтин из своей резиденции в Юэяне, но скоро он сможет увидеть настоящий океан, соленый воздух и морской ветер. Имея это в виду, он отдал приказ."
 HNN_petition_accepted_loc_desc_szc: "Из Пекина поступили хорошие новости. Правильно оценив аргументы губернатора Тана и то, что Сычуань, явно позиционирующая себя против Пекина, может легко открыть против нас второй фронт, они согласились с петицией губернатора об организации марша на Чунцин. Координируя совместное вторжение с Пекином, губернатор Тан двинул свои войска на Юг, в то время как У разместил свои войска на Севере. Если повезет, конфликт будет недолгим, и Сычуань будет немедленно включена в состав Политического совета Юго-Западного Китая.."
 HNN_petition_accepted_loc_desc_yun: "[HNN_zhili_home_base] передает хорошие новости, они правильно оценили аргументы губернатора, угрозу, которую представляет Юньнань, и приняли его предложение о проведении марша на Куньмин. Губернатор Тан собрал свою армию и начал перебрасывать ее на Запад, отправив телеграмму губернатору Гуйчжоу Юань Цзумину, в которой говорилось, что он достаточно скоро восстановит контроль над остальной частью своей провинции! Все, что нам нужно сделать, это отдать приказ о наступлении на Куньмин."
 hunan_zhili_events.10.a: "[HNN_petition_accepted_loc_option]"
 HNN_petition_accepted_loc_option_gxc: "Мы немедленно выступаем на Юг!"
 HNN_petition_accepted_loc_option_szc: "Порядок будет наконец-то восстановлен в Сычуане"
 HNN_petition_accepted_loc_option_yun: "Мы же вернем себе Гуйчжоу и Юньнань!"

 hunan_zhili_events.11.t: "Наше предложение отклонено!"
 hunan_zhili_events.11.d: "[HNN_zhili_home_base] передал неутешительные новости: после некоторого обсуждения руководством Чжили было принято решение отклонить нашу петицию о проведении марша против наших потенциальных врагов. Губернатор Тан, по понятным причинам, разочарован этой новостью, но, руководствуясь собственным чувством лояльности и веры в иерархию, он принял их решение с достоинством. Поскольку внешняя экспансия была категорически отвергнута, губернатор Тан обратил свое внимание внутрь страны, на укрепление своего положения в качестве губернатора и надлежащее закрепление в провинции Хунань."
 hunan_zhili_events.11.a: "Печально, но мы должны смириться с этим."

 hunan_zhili_events.12.t: "Наши друзья в Гуйчжоу"
 hunan_zhili_events.12.d: "[HNN_tang_xiangming_title] Тан Сянмин из [HNN_tang_xiangming_domain] и губернатор провинции Гуйчжоу Юань Цзумин встретились сегодня на границе, их армии проводят совместные учения, чтобы убедиться в боеспособности обеих армий. Пока они наблюдали за передвижениями своих войск, губернатор Юань отвел Тана в сторону, [HNN_friends_in_guizhou_end_text]"
 hunan_zhili_events.12.guizhou.split: "и затронул ситуацию в Гуйчжоу и Юньнаньской клики. Заявив, что он был бы рад предложить большую поддержку провинции Хунань, если бы они были готовы внести свой вклад в возвращение Гуйчжоу его законному правителю. Губернатор Тан согласился, сказав губернатору Юаню, что он сделает все, что в его силах, чтобы вернуть контроль над Гуйчжоу, и что он надеется, что этот день ознаменует еще более прочный союз, когда Хунань и Гуйчжоу будут работать рука об руку.."
 hunan_zhili_events.12.guizhou.united: "говоря о недавнем восстановлении Гуйчжоу и его официальном вступлении в Политический совет Юго-Западного Китая.\n\nПоблагодарив Тан Сянмина за помощь в восстановлении его родной провинции, он кратко рассказал о своих надеждах на тесный и плодотворный союз и заявил, что хотел бы, чтобы Гуйян и Чанша более тесно сотрудничали в этом направлении. будущее. Генеральный инспектор согласился, заверив, что они смогут сообща противостоять угрозам, которые им угрожают, и что вместе с единством придет сила."
 hunan_zhili_events.12.a: "За долгое и плодотворное сотрудничество!"

 hunan_zhili_events.13.t: "Бегство федералистов"
 hunan_zhili_events.13.d: "Избавившись от яда Гоминьдана в провинции Хунань, губернатор Тан обратил свой взор на гораздо более коварного врага - федералистов. Бывший губернатор Чжао утверждал, что лоялен клике Чжили, но он был более чем счастлив предоставить убежище тем, кто хотел бы свержения Чжили, и даже был готов позволить Гоминьдану участвовать в его выборах. Не имея терпения к тем, кто бросает ему вызов, губернатор Тан приказал своим людям выследить этих федералистов, этих предателей, и лично наблюдал за их арестами. К сожалению, многим из них удалось скрыться, они бежали в другие части Китая, куда именно, мы не знаем.\n\nОдними из немногих старых союзников Чжао, которым можно доверять, являются представители диархии Сянси, Тянь Инчжао и Чэнь Цюйчжэнь. С учетом нашего недавнего решения и бегства федералистов из провинции, губернатор начал очередную серию переговоров с Тянем в Чанша. Этот человек имеет значительное влияние в Ассамблее, и, учитывая, что он начал полностью интегрироваться в клику Тан Сянмина, объединение его парламентской группы с Ассоциацией гармонии Тан Сянмина имеет логический смысл, чтобы объединить ресурсы и помочь всем вовлеченным, конечно."
 hunan_zhili_events.13.a: "У нас нет места для предателей."

 hunan_zhili_events.14.t: "Железная пята"
 hunan_zhili_events.14.d: "Одной из самых коварных черт Гоминьдана является его приверженность социалистическим идеалам, особенно интернационализм, который предпочел бы, чтобы Китай был продан самопровозглашенным \"антиимпериалистам\", которые не хотят ничего, кроме второго столетия унижений. Мы не можем позволить этим идеям разрастаться и тлеть в нашей провинции, чего бы это нам ни стоило.\n\nГубернатор Тан не жалел средств на искоренение социалистов, после запрета профсоюзов в провинции Хунань многие начали бастовать, но эти забастовки были быстро подавлены нашей армией, заставившей рабочих вернуться на свои рабочие места. Несколько главарей были схвачены и брошены в тюрьму, условия содержания в которой были весьма суровыми... и даже мрачными.\n\nВ ответ на эти масштабные антисоциалистические выступления нашего губернатора, лидеры КСП бежали из провинции, избежав поимки нашими агентами, а остальная часть партии была дезорганизована и находилась в агонии. С отрубленными головами социалистической гидры, движение пошатнется и угаснет естественным образом."
 hunan_zhili_events.14.a: "Предатели и трусы."

 hunan_zhili_events.15.t: "Новые выборы?"
 hunan_zhili_events.15.d: "Теперь, когда безопасность Хунани была окончательно установлена, Гоминьдан и социализм побеждены, многие стали призывать окончательно отменить военное положение и вернуть гражданские правление в Хунань. Всегда великодушный правитель, [HNN_tang_xiangming_title] Тан прислушался к этим призывам и объявил, что военное положение, наконец, прекращено.\n\n[HNN_new_elections_middle_text] Сделав шаг в сторону от авторитаризма, [HNN_tang_xiangming_title] Тан Сянмин убедил своего брата, Тан Хуалуна, полностью интегрировать Конституционную партию Китая в коалицию Ассоциации гармонии. Объединив свою политическую мощь, они одержали победу на недавно прошедших выборах, \"Ассоциация гармонии\" Тан Сянмина получила подавляющее большинство в провинциальной ассамблее и быстро избрала Тан Сянмина новым гражданским губернатором провинции Хунань.\n\nВ то время как некоторые за пределами нашей провинции утверждают, что выборы были нечестными, из самой провинции практически не поступало сообщений о подобных вещах, и поэтому губернатор Тан в основном списывал эти заявления на слухи. Получив свой \"демократический\" мандат, Тан Сянмин с нетерпением ожидает своего нового срока на посту губернатора провинции."
 hunan_zhili_events.15.scpc: "Поскольку он сам переходит с должности военного губернатора на гражданскую должность, он признает необходимость получения надлежащего губернаторского мандата, и объявленные выборы будут проведены в ближайшее время. Он также заявил, что будет сотрудничать с провинциями Гуандун и Гуанси, чтобы восстановить там гражданский контроль, и как только это будет сделано, он откажется от должности генерального инспектора Сян-Юэ-Гуя и будет править в Хунани только."
 hunan_zhili_events.15.hnn: "Поскольку он сам переходит с должности военного губернатора на гражданскую должность, он признает необходимость получения надлежащего губернаторского мандата, и объявленные выборы будут проведены в ближайшее время."
 hunan_zhili_events.15.a: "Да здравствует наш \"Гражданский\" губернатор!"

 hunan_zhili_events.16.t: "Начальник Генерального Штаба"
 hunan_zhili_events.16.d: "Теперь, когда безопасность Хунани наконец-то обеспечена, Гоминьдан и социализм побеждены, многие призывают окончательно отменить военное положение и вернуть гражданский контроль в Хунань. Однако губернатор Тан Сянмин признает, что это всего лишь ложное чувство безопасности. Видя угрозы вокруг себя и в провинции, он отверг попытки убедить его действовать мягче и заявил, что военное положение будет продолжаться до тех пор, пока \"не будет обеспечена абсолютная безопасность от внешних угроз\"\n\nТакая жесткая позиция в этом вопросе привела к тому, что интеллектуалы и демократы, включая его собственного брата Тан Хуалуна, по-прежнему готовы сотрудничать с ним, чтобы дистанцироваться от его режима. Хотя Тан не ушел в отставку со своего поста, он ясно дал понять своему младшему брату, что он и его партия рассматривают это как явный захват власти губернатором Тан Сянмином.\n\nГубернатор Тан, со своей стороны, поговорил со своим братом за закрытыми дверями, отстаивая его правоту и заверяя, что он по-прежнему может рассчитывать на его поддержку в ближайшее время.\n\nЗаручившись поддержкой своего брата, военный губернатор заявил, что он обеспечит быстрое предание суду всех предателей Хунани, что его правительство откажется мириться с неповиновением или нелояльностью, и что безопасность каждого верного гражданина Хунани останется абсолютной."
 hunan_zhili_events.16.a: "НГШ несет порядок, а не свободу."

 hunan_zhili_events.17.t: "Формирование Политического совета Юго-Западного Китая"
 hunan_zhili_events.17.d: "После серии переговоров с [HNN_zhili_home_base], Тан Сянмин объявил о создании Политического совета Юго-Западного Китая. С одобрения [HNN_zhili_home_base] он был повышен с должности губернатора провинции Хунань до генерального инспектора провинции Сян-Юэ-Гуй (провинция Хунань, провинция Гуандун, провинция Гуанси), что дает ему полный и прямой контроль над военными делами и, как следствие, фактический контроль над провинциями Хунань, Гуандун и Гуанси. В самой провинции Хунань это привело к незначительным изменениям, однако в провинциях Гуандун и Гуанси это означает прекращение оккупации крупных городов Новой армией и возвращение некоторого подобия нормальной жизни в двух провинциях Гуанчжоу..\n\nВ Гуанси генеральный инспектор решил сотрудничать с местными кланами Гуанси, бывшими членами Старой клики Гуанси и местными военачальниками, такими как Лю Чжэньхуань. Все это для обеспечения надлежащего порядка в такой неспокойной и воинственной провинции..\n\nВ провинции Гуандун, однако, требовался более мягкий подход, поскольку при Чэнь Цзюнмине провинция Гуандун столкнулась с теми же проблемами, что и Хунань при Чжао Хэнти, однако Тан признает, что не может придерживаться того же подхода. Он отправил Тан Хуалуна на юг для переговоров с Ассамблеей Гуандуна.. К счастью для обоих, Тан Хуалун смог успешно найти компромисс с провинцией, воспользовавшись опасениями купцов, дворянства и других консерваторов. В то же время он использовал свои связи в CERA, чтобы привлечь на свою сторону умеренных и даже некоторых левых. Он успешно провел переговоры о создании рабочей коалиции в Ассамблее и вернулся в Чаншу с хорошими новостями для своего младшего брата.\n\nВзяв под контроль две провинции Гуан, Тан Сянмин обеспечил себе мощный блок и автономию от Чжили. Генеральный инспектор добился успеха на местах и за их пределами, и был вознагражден за свои усилия и таланты."
 hunan_zhili_events.17.a: "За генерального инспектора Сян-Юэ-Гуя, за Тан Сянмина!"

 hunan_zhili_events.18.t: "Восстановление порядка в Сычуане"
 hunan_zhili_events.18.d: "Завоевание Тан Сянмином Сычуани, которая, несомненно, является самой раздробленной провинцией Китая, принесло ощущение стабильности в эту хаотичную провинцию. Однако это также сопряжено со своими проблемами. Не желая сам попадать в трясину, которая является политическим центром Сычуани, он должен был найти подходящего губернатора для провинции.\n\nПо мере того, как он собирал все больше информации о провинции и ее положении на местах, у него начинала болеть голова, когда он пытался найти достойного кандидата, соответствующего его критериям. В конце концов, он нашел одного.\n\nТянь Сонъяо, мелкий военачальник в Сычуани, делатель королей в провинции и союзник чжилийской клики. Если он убежденный антисоциалист, который верой и правдой служил Китаю. Рано завязав связи с чжилийской кликой, Тянь был игроком на сцене Сычуани еще со времен Юань Шикая, и поэтому он знает политику провинции лучше, чем кто-либо за пределами его провинции. Он идеально подходит на пост губернатора провинции Сычуань и является отличным выбором для генерального инспектора.\n\nОтправив телеграмму этому человеку и в Пекин, генеральный инспектор Тан разрешил ему перебраться на земли, которые оккупировала Новая армия, что дало ему сильную власть, для того чтобы держать в узде других сычуаньских военачальников."
 hunan_zhili_events.18.a: "В Чэнду наконец наступит порядок."

 hunan_zhili_events.19.t: "Усмирение республиканской твердыни"
 hunan_zhili_events.19.d: "Генеральный инспектор Тан Сянмин наконец-то принес в Юньнань, одну из самых неспокойных провинций, порядок.\n\nС тех пор как Цай Э провозгласил независимость после того, как Юань Шикай провозгласил себя императором, Юньнань традиционно была далека, если не откровенно враждебна, по отношению к центральному правительству Китая. Национальный альянс защиты, Движение в защиту конституции, Юньнань гордится своим упрямым и стойким характером. Однако гордость предшествует падению, и Юньнань пала под натиском наших сил.\n\nК счастью для Тана, он быстро разобрался в политической жизни Юньнани и быстро понял, что генерал Ху Жую, человек, уважающий центральную власть Китая, является идеальным кандидатом на пост губернатора Юньнани. Уступающий только Лун Юню и уроженец Юньнани, он хорошо знает свой дом и, несомненно, сможет использовать свои силы для подавления беспорядков внутри него.\n\nОтправив телеграмму этому человеку и, конечно же, [HNN_zhili_home_base], Тан Сянмин сообщил ему о своем назначении губернатором и получил заверения в том, что он восстановит порядок в провинции как можно скорее."
 hunan_zhili_events.19.a: "Республиканский оплот пал перед Генеральным инспектором."

 hunan_zhili_events.20.t: "Восстановление Гуйчжоу"
 hunan_zhili_events.20.d: "Временно оставив Чаншу в руках своего брата, [HNN_tang_xiangming_title] Тан Сянмин переехал в Гуйян, чтобы оценить ситуацию на местах и то, насколько сильно город пострадал в ходе боевых действий. Вполне естественно, что к нему присоединился губернатор Юань Цзумин, который наконец-то возвращается в город после слишком долгого перерыва. Это был первый раз, когда он получил контроль над городом и всем Гуйчжоу с 1921 года.\n\n[HNN_reclamation_of_guizhou_end_text]"
 hunan_zhili_events.20.alliance: "Это был первый разговор между ними с тех пор, как они наблюдали за учениями своих армий на границе. Именно тогда Тан Сянмин заявил, что сделает все, что в его силах, чтобы вернуть контроль над Гуйчжоу надлежащим властям, и сегодня он подтвердил верность своего слова. Всем ясно, что возвращение Гуйчжоу ознаменовало бы собой яркий день как в их союзе, так и в истории самого Китая."
 hunan_zhili_events.20.no.alliance: "Лишь однажды, когда Тан захватил Чаншу и стал новым губернатором провинции Хунань, Юань выразил неуверенность в том, как все изменится при новом режиме. Воссоединение Гуйчжоу стало довольно приятным сюрпризом для человека. Он коротко переговорил с Тан Сянмином, сказав, что прямо сейчас ему нужно сосредоточиться на воссоединении остальной части Гуйчжоу со своей кликой, но добавил, что в ближайшее время им следует поговорить еще раз, возможно, во время совместных учений их армий."
 hunan_zhili_events.20.a: "Гуйчжоу, так долго разделенный, наконец-то воссоединился."

#Kuomintang events
 hunan_kuomintang_events.1.t: "Оглушительный успех на выборах"
 hunan_kuomintang_events.1.d: "Ко всеобщему удивлению, объединенный список Гоминьдана одержала победу над "Народным обществом обновления" Чжао Хэнти и другими второстепенными либеральными партиями. Считавшийся аутсайдером предвыборной гонки, этот дуэт сумел завоевать сердца и умы населения провинции Хунань, причем Тан, несомненно, завоевал голоса рабочих, в то время как Чэну удалось склонить на свою сторону более умеренных избирателей, скептически относившихся к радикальным действиям Тана.\n\nНесмотря на то, что выборы действительно ознаменовались ростом политического насилия со стороны Гоминьдана, этот дуэт прошел в провинциальную ассамблею в качестве лидеров. После того, как [HNN_kmt_leader] был приведен к присяге в качестве губернатора провинции, а [HNN_kmt_sic] стал спикером Ассамблеи, они быстро заполнили свой кабинет своими товарищами по Гоминьдану. Примечательно, что Хуан Гунлюэ из Восьмой армии и Цинь Чжэнь присоединились к Чэн Цяню, хотя и не из Шестой армии.\n\nОднако не все в регионе согласны с ходом выборов. Тан Сянмин, командующий гарнизоном в Юэяне и атташе Чжили в провинции Хунань, проявил себя загадочным образом невосприимчивым к телеграммам Центрального правительства. Аналогичным образом, на востоке и западе деспотичные военачальники-партнеры Чжао, Юань Цзумин и Тянь Инчжао, Чэнь Цюйчжэня также отказались отвечать на какие-либо телеграммы от правительства провинции. Ведущие военные лидеры, главным образом Хэ Цзянь и Сун Силиан, обсуждали произошедшее со своими соратниками."
 hunan_kuomintang_events.1.a: "Тучи сгущаются над Чанша..."

 hunan_kuomintang_events.2.t: "Последнее приветствие адмирала"
 hunan_kuomintang_events.2.d: "После сокрушительного разгрома Тана \"Мясника\" Сянмина и полного разрыва любых связей, которые предыдущие администрации провинции Хунань имели с чжилийской кликой, Единый фронт Гоминьдана пережил бурю и теперь может, наконец, сосредоточиться на том, чтобы принести Национальную Революцию массам Хунани. В конечном счете, как показывает нерешительность армейских подразделений провинции Хунань, Гоминьдану и только ему одному необходимо привести Хунань к светлому будущему, поскольку без доблестных усилий Шестой и Восьмой армий Хунань, скорее всего, погрузилась бы в очередную эпоху тьмы под тиранией Тан Сянмина.\n\nОднако работа Объединенного фронта Гоминьдана никогда не заканчивается, поскольку в Западной и восточной частях Гуйчжоу находятся две следующие угрозы правлению Гоминьдана. С учетом того, что в Сянси сохраняется двоевластие Тянь Инчжао и Чэнь Цюйчжэня, которые долгое время сотрудничали с Чжао, и Старой гуйчжоуской клики, окопавшейся в Восточном Гуйчжоу, также являющейся союзником Чжао, становится ясно, что для устранения обеих угроз потребуются объединенные силы Единого Фронта.\n\nОднако они не одиноки, поскольку, хотя их правление и может быть обеспечено, они не могут завоевать сердца провинциальной ассамблеи. Однако именно здесь в игру вступает Тан Янкай. Бывший командующий 2-й армией Гоминьдана и предыдущий губернатор провинции Хунань, Тан храбро повел свои войска в Хунань во время Северной экспедиции, но в конечном счете сдался Чжао в обмен на амнистию. Выдвинув свою кандидатуру на недавних выборах, Тан решил возродить свое военное формирование, привлекая, в частности, таких людей, как братья Лу, на свою сторону, чтобы стать объединяющим фактором для оставшихся умеренных республиканцев в провинции Хунань.\n\nИспытывая личное отвращение как к Чэну, так и к Тану из-за предыдущих действий против его губернаторства в прошлом, Тан, тем не менее, предложил руку помощи, если не Гоминьдану, то республиканскому движению в целом."
 hunan_kuomintang_events.2.a: "Время собраться и исправить ситуацию."

 hunan_kuomintang_events.3.t: "Неожиданный конец"
 hunan_kuomintang_events.3.d: "Поскольку оба в основном действовали независимо друг от друга, Чэн Цянь усердно трудился, сосредоточившись на искоренении местных полевых командиров и бандитов в провинции Хунань, стремясь обеспечить безопасность народа Хунани под эгидой Гоминьдана. Тем временем Тан Шэнчжи и Тан Янькай руководят общим управлением правительства провинции, причем Тан использует свой статус члена ассамблеи, а Тан - свои связи с гражданами, чтобы обеспечить возвращение к нормальной жизни даже после хаотичного избирательного цикла и неудачной попытки государственного переворота, предпринятой Тан Сянмином.\n\nОднако, используя свои новые полномочия, предоставленные ему конституцией провинции, Тан недавно созвал экстренное заседание провинциальной ассамблеи с участием представителей власти. Когда члены законодательного собрания всех мастей и цветов кожи заняли свои места, толпы представителей элиты, республиканцев и федералистов в конце концов обратили внимание на отсутствие клики Тан Янькая, Хуан Янпея или даже Чжоу Шичжао и Цянь Юнмина. Тем не менее, Тан Шэнчжи открыл заседание немедленным объявлением о том, что Провинциальная ассамблея настоящим распускается, Конституция объявляется недействительной и что Гоминьдан провозгласит создание нового революционного партийного государства, намеревающегося следовать этапам Национальной Революции в соответствии с ее основными принципами. Когда шум и суматоха на собрании улеглись, Тан предъявил всем присутствующим членам собрания обвинения в \"измене Революции\", приказав своим людям немедленно начать аресты.\n\nУзнав от своего адъютанта о последствиях роспуска ассамблеи, Чэн Цянь немедленно отправил телеграмму в столицу с просьбой прислать ответ, но ответа не получил, вместо этого получил ответ от теперь уже бывшего члена ассамблеи Тань Янкая, который отговаривал генерала от любых попыток образумить Тана и просил его, бессильная глупость - предвидеть, что это произойдет. Взяв дело в свои руки, Тану удалось эвакуировать ряд ключевых республиканцев из ассамблеи, чтобы они не попали в тюрьму к военнослужащим Восьмой армии."
 hunan_kuomintang_events.3.a: "Первый удар по местным притеснителям и злобным дворянам!"
 hunan_kuomintang_events.3.b: "Неужели вы там и правда совсем обезумели?"

 hunan_kuomintang_events.4.t: "Воздать должное предателям"
 hunan_kuomintang_events.4.d: "После объявления о начале кампании по уничтожению полевых командиров, оставшихся в провинции Хунань, генералы Чэн Цянь и Тан Шэнчжи договорились об одновременном нанесении двойного удара по Юань Цзумину, скрывавшемуся в Гуйчжоу, и установлению двоевластия в западной части провинции Хунань. Пока Чэн боролся с Диархией на западе провинции, старый генерал решил провести серию разрушительных артиллерийских обстрелов, умело нацеленных на то, чтобы подорвать моральный дух войск военачальников, прежде чем позволить дивизии Сун Силиана полностью окружить Сянси. Несмотря на то, что они сами организовали доблестную оборону, войска военачальника, возглавляемые непосредственно Тянь Инчжао, начали сдаваться первыми из-за постоянного оцепенения своих командирова, и, несмотря на все усилия, войска Чэнь Цюйчжэня не смогли переломить ситуацию. Когда их последние попытки провести операцию по прорыву на территорию Сычуани закончились драматическим провалом, Диархия сдалась продвигающейся Шестой армии.\n\nНа Восточном фронте в Гуйчжоу 8-я армия Тана Шэнчжи при поддержке партизанских отрядов, действующих в Гуйчжоу, начала кампанию интенсивной разведки, прежде чем двинуться на окопавшуюся в Старом Гуйчжоу группировку Юань Цзумина. Формально Юань Цзумин ожидал, что любое столкновение произойдет внутри Юньнани, но его оборона на восточном фланге была сравнительно слабой, что позволило 8-й армии вести устойчивое наступление, несмотря на ожесточенные бои со стороны преданной ему Старой клики Гуйчжоу. Однако благодаря умелой помощи бывшего члена клики Гуйчжоу Ван Тяньпэя, который предоставил бесценные связи и знания о ключевых слабых местах Юань Цзумина, Восьмая армия одержала убедительную победу с минимальными потерями.\n\nПосле окончательного захвата Юаня 2-й дивизией Хэ Цзяня военачальник был передан Тану, а выдвиженец Гоминьдана Лю Дао был назначен командующим в Гуйчжоу. С намерением быть доставленным в Чанша для наказания, аналогичного диархии, в Чанша появились сообщения о том, что Юань, как сообщается, скончался в заключении. Такие новости немедленно вызвали подозрения у Тань Янькая, который руководил провинциальным правительством в отсутствие генералов, обвинив Тана в том, что он тайно казнил Юаня за его предательство во время Северной экспедиции. Аналогичным образом, Чэн Цянь также сделал выговор Тану за то, что тот действовал так безжалостно и без учета интересов других членов правительства."
 hunan_kuomintang_events.4.a: "Месть за Северную экспедицию."
 hunan_kuomintang_events.4.b: "Месть-удел недалеких."

 hunan_kuomintang_events.5.t: "Трещины в \"Едином\" Фронте"
 hunan_kuomintang_events.5.d: "Кульминацией всех усилий является постоянный страх неудачи. В последнее время это чувство слишком сильно засело в сознании Чэн Цяня. Первоначально он рассматривали союз с Тан Шэнчжи и его Восьмой армией левого Гоминьдана как первый шаг к партийному примирению, но жестокие когти реальности разрушили эти мечты. Несмотря на все свои усилия, Тань Янькай из возрожденной 2—й армии намеревался объединить враждующих сторон — несмотря на то, что в равной степени презирал как Чэна, так и Тана - и изо всех сил пытался стать посредником между Шестой и Восьмой армиями, но безуспешно. И то, и другое оказывается почти непримиримым и может привести к расколу движения.\n\nТем не менее, среди критически настроенных командиров Восьмой армии Тана есть паршивая овца. Они не поддерживают аграрный социализм Хэ Луна или Пэн Дэхуая. Здесь находятся Хэ Цзянь и его верный заместитель Лю Цзяньсюй. Поскольку генерал служил Тану с 1920-х годов, его лояльность к нему противоречива, а недавние радикальные действия его начальника заставили генерала задуматься о себе. Решающий фактор во многих успехах, но в то же время ответственный за рост радикализма в его провинции. Точно так же его давно возмущала необходимость постоянно находиться в тени Тана Шэнчжи, Пэн Дэхуая и Хэ Луна.\n\nОднако, слишком долго оставаясь в стороне, он направил Чэн Цяню прошение о включении 2-й дивизии его 8-й армии в состав 6-й армии, переведя всех людей и материальную часть в 6-ю армию, взамен он желает повышения не только для себя, но и для Лю Цзяньсюя. Долго взвешивая преимущества такого рискованного шага, неизбежно приводящего к дальнейшему обострению напряженности в отношениях с 8-ой армией, Чэн в конце концов уступил ходатайству Хэ и пошел еще дальше.\n\nПосле созыва чрезвычайного конгресса Чэн Цянь объявил о ряде повышений в должности, в частности, для Хэ, Лю и Ли Минхао, а также о создании новых отделений по обеспечению мира в сельской местности, чтобы улучшить координацию между местными силами и регулярными армиями, а также решить проблему организации местного ополчения.\n\nНеожиданностью для многих, но особенно для Тан Шэнчжи, стало то, что генерал объявил о серии повышений в должности верных людей на должности в провинциальной армии, а именно Лю Сина, Гун Хао и Тао Гуана, в попытке уравнять шансы. Несмотря на все их усилия, похоже, что Единый фронт рухнул, и только один выживший может выйти победителем..."
 hunan_kuomintang_events.5.a: "И тут появляется четвертый игрок."

 hunan_kuomintang_events.6.t: "Вопрос об ополчении"
 hunan_kuomintang_events.6.d: "Формально являясь местной организацией, ополчение в провинции Хунань должно было выполнять функции местных защитников своих общин во времена великого национального кризиса, но все обернулось иначе. Многие командиры местных ополчений, которые, как правило, считаются подконтрольными местным элитам и служащими исключительно их интересам, не только сильно коррумпированы, но и используют военную власть, предоставленную им правительством провинции, и злоупотребляют ею для вмешательства в местное управление и отправление честного правосудия на местах. Кроме того, уровень подготовки местного ополчения сильно варьируется от округа к округу, а широкая автономия командиров ополчения препятствует проведению любых совместных операций.\n\nЧто, однако, остается под вопросом, так это намерения и предназначение постоянных рот. Хотя они и не выполняют присущую им функцию местной обороны, подобную патрулированию, они, тем не менее, могут быть использованы против врагов государственного аппарата. Командующий 8-ой армией Тан Шэнчжи выступает за то, чтобы направить усилия ополчения против тех, кого он с сомнением называет \"врагами народа\", в то время как командующий 6-ойармией Чэн Цянь настаивает на том, чтобы ополчение направило свои усилия против местных бандитов и оставшихся мелких полевых командиров, переживших первые операции Гоминьдана."
 hunan_kuomintang_events.6.a: "Направим наши усилия против врагов народа!"
 hunan_kuomintang_events.6.b: "Займемся оставшимися бандитами и мелкими военачальниками."

 hunan_kuomintang_events.7.t: "Формирование Бюро по сохранения мира"
 hunan_kuomintang_events.7.d: "В свете наших недавних масштабных реформ, направленных на решение проблемы местного ополчения, представляется, что прежняя система, введенная генералом Хэ Цзянем и его управлением по поддержанию мира, привела к результатам, не соответствующим ожиданиям ни правительства, ни его самого. Например, большинство магистратов слишком заняты, чтобы реально руководить подразделениями местного ополчения, и поэтому руководство ими ложится на плечи заместителей глав. Поскольку многие заместители глав фактически являются бывшими командирами местного ополчения, то, как правило, возникают те же случаи злоупотреблений. Аналогичным образом, местные власти не спешили внедрять систему дозорного патрулирования, и отсутствие такой важной основы привело к легализации того, что по сути было наемническими компаниями.\n\nВ ответ Хэ Цзянь предложил еще одну крупную реформу, направленную на изменение самой природы постоянных рот. Во-первых, все постоянные роты должны быть реформированы и объединены в единое подразделение \"По поддержанию мира\", и эти силы будут проходить подготовку, аналогичную регулярной армии. Надзорная функция магистрата будет отменена, и вместо этого подразделения по поддержанию мира будут подчиняться офицерам, отобранным на основе предыдущего опыта службы в армии и назначенным командующим по поддержанию мира в сельской местности Хэ Цзянем.\n\nОднако Тан Шэнчжи, Хэ Лун и Пэн Дэхуай выразили обеспокоенность по поводу откровенно антисоциалистических взглядов Хэ Цзяня. Зная генерала на протяжении десятилетий, Тан высказал конгрессу свои личные убеждения в том, что он ярый антисоциалист, обвинив его в том, что он собирает свою личную армию головорезов, чтобы распространить свое так называемое \"умиротворение\" на бедных граждан, которые хотят только лучшего мира для себя. Он отверг эти обвинения, настаивая на том, что его целью является милитаризация народа Хунани, чтобы он мог быть готов к тому, что на территорию провинции ступит нога захватчика."
 hunan_kuomintang_events.7.a: "Это оскорбление для всей партии!"
 hunan_kuomintang_events.7.b: "Хорошая программа, только не доводите ее до крайних моментов."

 hunan_kuomintang_events.8.t: "Финансироние образования"
 hunan_kuomintang_events.8.d: "Особый интерес как для Хэ Цзяня, так и для Чэн Цяня представляет департамент образования. Учитывая, что Чэн Цянь помог получить образование многим будущим восходящим звездам Гоминьдана, таким как Сун Силянь, а Хэ Цзянь происходит из семьи, имеющей образование, вполне естественно, что обоих объединяет их любовь к просвещению молодежи. Таким образом, этот дуэт предложил амбициозный план, который позволит увеличить число начальных школ в провинции Хунань с 18 000 до 23 800. В то же время они выступают за расширение охвата средним образованием и создание обычных школ в каждом округе, введение системы экзаменов для учителей начальных и средних школ в целях повышения качества обучения, организацию процесса отбора и предоставление государственного финансирования для учителей начальных и средних школ. Наконец, дуэт хочет основать краткосрочные начальные школы и стипендиальные программы для детей из бедных семей, а также организовать кампанию по распространению грамотности по всей провинции.\n\nПолучив единодушное согласие всех членов правительства, и, что особенно важно, Тан Янькая и Тан Шэнчжи, на обсуждение был вынесен вопрос о том, где правительству провинции следует изыскать необходимые средства для такого амбициозного проекта. Хэ Цзянь настаивал на том, чтобы по крайней мере четверть бюджета провинции выделялась на цели программ, но Тан Шэнчжи сопротивлялся. Поднимая вопрос о том, что даже сейчас оплата расходов правительственных учреждений часто задерживается, а выплаты войскам часто задерживаются, Тан предполагает, что правительству необходимо сократить бюджет, чтобы начать реализацию такой важной программы.\n\nПоддержав эту идею, Тан выступил за выделение средств из Управления генерала Хэ Цзяня по умиротворению и сохранению мира в сельской местности, настаивая на том, что эти органы должны подчиняться военным, а не иметь достаточного финансирования, чтобы иметь возможность действовать независимо от них. Выступая против, Хэ Цзянь предлагает правительству отказаться от финансирования программ поддержки профсоюзов, настаивая на том, что рабочие уже получают достаточную помощь непосредственно от правительства, и что финансирование профсоюзов, несомненно, приведет к увеличению влияния Синдикалистской партии Китая."
 hunan_kuomintang_events.8.a: "Перейти к выделению средств из Бюро по сохранению мира."
 hunan_kuomintang_events.8.b: "Попросить помощи у профсоюзов."

 hunan_kuomintang_events.9.t: "Покончим со старым и возьмемся за новое"
 hunan_kuomintang_events.9.d: "Следующая реформа, которая горячо обсуждается в правительстве провинции, - это реформа местного самоуправления, предложенная генералом Хэ Цзяном. В рамках упомянутых реформ Генеральный прокурор выступает за расширение и реструктуризацию местных администраций, способствуя развитию систем экзаменов и оценки для магистратов страны, наряду с расширением и совершенствованием системы управления округами. Аналогичным образом, он хотел бы, чтобы правительство предприняло реорганизацию и придание законного статуса органам местного самоуправления - возможно, подкрепленную постоянными усилиями генералов, с разной степенью успеха, по созданию системы взаимной безопасности баоцзя — и по внедрению системы периодических проверок, чтобы оценить эффективность реагирования местных должностных лиц и их эффективность в реализации государственной политики.\n\nОднако, в частности, последний раздел реформы вызвал гнев Тан Шэнчжи, который вместо этого предлагает оценивать местных чиновников не по эффективности, хотя это и важно, а по их лояльности партии. Тан обращает особое внимание на значение предыдущих администраций провинции Хунань, при которых местная элита и дворянство начали контролировать магистратов своих сельских округов с помощью взяток или других нечестных средств. Настаивая на лояльности к партии, новая администрация Хунаня может исправить проблемы прошлого, двигаясь навстречу будущему."
 hunan_kuomintang_events.9.a: "Главное-лояльность к партии!"
 hunan_kuomintang_events.9.b: "Назначайте чиновников, основываясь на навыках, а не на идеологической лояльности."

 hunan_kuomintang_events.10.t: "Обьем временных мер"
 hunan_kuomintang_events.10.d: "В рамках еще одной важной реформы, предпринятой генералом Хэ Цзяном, он посоветовал правительству провинции приступить к созданию ряда консультативных комитетов, разработке ряда нормативных актов и формированию планов на будущее для осуществления Национальной Революции в провинции Хунань. Настаивая на том, что провинция крайне не готова к переходу к опеке, не говоря уже о военном правлении или национальном восстановлении, он настаивает на том, что правила в Хунани будут служить руководством к будущим действиям, а не будут написаны на месте действия.\n\nВ конечном счете, Шестая армия согласна с генералом Хэ, а сам Чэн Цянь признает преимущества, которые дает создание все более институционализированного режима регулирования, связанного с более широкими усилиями Гоминьдана в области государственного строительства в целом. Аналогичным образом, он продолжил свою предвыборную кампанию, настаивая на том, что законы и нормативные акты являются важной основой для любых действий, и представляет не только написание этих нормативных актов, но и их распространение как важную функцию правительства.\n\nВ полной оппозиции к таким действиям находится Тан Шэнчжи и его Восьмая армия, настаивающие на том, что продолжающаяся бюрократизация партийных органов и функций приведет лишь к ненужной трясине кошмаров, через которую придется пройти, чтобы осуществить какие-либо значительные действия. Вместо этого генерал выступает за политику краткого планирования, но немедленных соответствующих действий. Подчеркивая, что революционное правление - это уродливое дело, и что любые дальнейшие действия приведут к неэффективному правительству, подобному правительству в Бэйяне."
 hunan_kuomintang_events.10.a: "Планы ничего не значат без соответствующих действий!"
 hunan_kuomintang_events.10.b: "Управление заключается не в количестве слов, а в их реализации."

 hunan_kuomintang_events.11.t: "Заложить основы"
 hunan_kuomintang_events.11.d: "По совету генерала Хэ Цзяня правительство приступило к масштабному расширению транспортной и коммуникационной систем провинции Хунань. Основной целью правительственного проекта, направленного на развитие автомобильного транспорта, является расширение автомобильных дорог провинции Хунань с 1000 миль до верхнего предела в 4000 миль. Как отметил он, такое расширение критически важной инфраструктуры означало бы, что любой бесстрашный человек мог бы управлять моторизованными транспортными средствами из провинции Хунань во все соседние провинции. Аналогичным образом, при строительстве железных дорог правительство стремится расширить уже существующую линию Гуанчжоу-Пекин, чтобы вдоль нее могли курсировать другие поезда.\n\nЧто касается телекоммуникаций, то Департамент строительства провинции Хунань надеется расширить ничтожное количество телекоммуникационных кабелей протяженностью 90 миль до 2800 миль, что составит в общей сложности 15 линий в 33 из 75 округов провинции Хунань. Естественно, в то время как ожидается, что гражданские лица получат некоторую выгоду от этих проектов, реальные улучшения возникают в случае транспортировки и координации военных действий.\n\nТем не менее, Тан Шэнчжи раскритиковал правительство за растрату ресурсов провинции на проекты, которые в незначительной степени удовлетворяют потребности китайских граждан. Указание на то, что строительство дорог приносит мало пользы фермерам, у которых нет доступа к таким транспортным средствам, является признаком того, что правительство провинции и Шестая армия зацикливаются на собственной прибыли."
 hunan_kuomintang_events.11.a: "Однако эти усилия не достигают тех, кто в них больше всего нуждается."
 hunan_kuomintang_events.11.b: "Фантастическая инициатива, Хэ Цзянь!"

 hunan_kuomintang_events.12.t: "Революционный ученый муж Хунани"
 hunan_kuomintang_events.12.d: "Когда Тан Шэнчжи впервые предал Чжао накануне Северной экспедиции, он мало что знал о том, как его игра за власть начнет влиять на его дальнейшую жизнь. Возможно, если бы он остался под командованием Чжао, то присоединился бы к таким, как Е Кайсинь или Хэ Яозу, в качестве доверенных лиц Чжао, и, возможно, занял бы губернаторский пост, бросив вызов действующему губернатору в честном поединке. Но, в конечном счете, был бы он удовлетворен? Стал бы он сидеть сложа руки, когда Чжао подавлял рабочее движение, сотрудничал с деспотами и угнетал рабочих? И все это во имя защиты демократии в Хунани?\n\nРазмышляя о своих действиях и своей связи с миром, генерал все больше понимает, почему Синьхайская революция потерпела неудачу в 1911 году. Главной причиной ее неудач была не нехватка оружия или квалифицированного персонала, а недостаточное участие рабочих и крестьян. Успех революции, будь то Национальная революция Гоминьдана или какая-либо другая, зависел от поддержки и массового восстания как рабочих, так и крестьян. Зарождающееся движение 30 мая доказало этот факт, и точно так же восстания 1932 года по всей стране укрепили его в этом.\n\nОбойдя с фланга своего политического соперника Чэн Цяня, бесстрашный генерал созвал второй съезд правительства провинции Хунань, на котором объявил о срочном увольнении всех военнослужащих Шестой армии с занимаемых ими правительственных должностей, упразднении управлений по умиротворению и сохранению мира в сельской местности и назначении Хэ Луна на пост министра обороны. предыдущие посты, занимаемые Чэном, наряду с назначением других командующих Восьмой армией на внезапно освободившиеся должности.\n\nТем не менее, Тан не мог заставить себя лишить кого-либо из 6-й армии членства в партии, возможно, из уважения к их общим жертвам во имя нации или по какой-либо другой причине. В поразительном проявлении сострадания, по крайней мере, к посторонним, Тан протянул руку благодарности своим соперникам, надеясь, что вместе они смогут успешно защитить народ Хунани, чего бы это ни стоило."
 hunan_kuomintang_events.12.a: "Наконец мы на высоте."

 hunan_kuomintang_events.13.t: "Размышления о Старой Гвардии"
 hunan_kuomintang_events.13.d: "Измученный и побитый, но все же упрямый и стойкий. Никакие более прекрасные слова не могли бы проиллюстрировать непрекращающуюся революционную борьбу Чэн Цяня за китайский народ. Молодые радикалы, живущие по другую сторону лагеря, считают Чэна пережитком ушедшей эпохи, но, тем не менее, он твердо стоит у руля будущего Хунани. Несмотря на то, что он, возможно, разжег пламя междоусобицы, которая привела к такому хаосу и кровопролитию за короткий срок правления правительства провинции Хунань, он по-прежнему убежден, что это был правильный выбор.\n\nБлагодаря тщательному политиканству старого генерала, сумевшего противостоять радикальному натиску Тан Шэнчжи, председатель созвал второй съезд правительства провинции Хунань, на котором объявил об отстранении Тан Шэнчжи и Восьмой армии от всех правительственных учреждений и полной дерадикализации правительства. Преисполнившись решимости, председатель назначил инициатора недавних реформ в провинции Хунань и главу управления по сохранению мира Хэ Цзяня для выполнения обязанностей, связанных с предыдущей ролью Тан Шэнчжи в правительстве.\n\nНесмотря на все совершенные несправедливости и то, что многие члены партии могли бы расценить как измену, старый генерал решил не применять к Тану смертную казнь в какой-либо форме и не лишать его членства в партии. Как всегда, протягивая руку компромисса, генерал надеется, что Тан искупит свою вину служением нации и делу Национальной Революции.\n\nТем не менее, за закрытыми дверями старый генерал по-прежнему приказывает Бюро общественной безопасности отслеживать все действия, совершенные Таном и двумя его заместителями, Пэн Дэхуаем и Хэ Луном. Хотя он и надеется на их искреннее искупление, он на собственном опыте убедился в последствиях глупости. Теперь все, что нам остается, - это смотреть вперед, в светлое будущее китайской нации."
 hunan_kuomintang_events.13.a: "Мечта наших товарищей продолжает жить."

 hunan_kuomintang_events.14.t: "Наши друзья в Хунани"
 hunan_kuomintang_events.14.d1: "[ROOT.GetLeader] недавно получил телеграмму о предполагаемой поддержке от главы провинции [hunan_events.GetLeader], подтверждающую его связи с нашим федеральным правительством.Учитывая тот факт, что [hunan_events.GetLeader] совсем недавно во второй раз сместил федералиста и нашего близкого союзника Чжао Хэнти, естественно, что многие в правительстве относятся к [hunan_events.GetLeader] с сильным чувством отчуждения. Хуже того, первоначальное изгнание Чжао привело к катастрофической Северной экспедиции.\n\nТем не менее, революционные действия создают странных партнеров, и [ROOT.GetLeader] не привыкать к компромиссам с беспринципными оппортунистами, чтобы увидеть общее достижение федеративного Китая. Поскольку первоначальные сторонники [hunan_events.GetLeader] в Гоминьдане терпели поражение по всем направлениям, он обратился к [ROOT.GetLeader], который любезно принял его союз, несмотря на протесты Чжао.\n\nВ конечном счете, однако, каким бы идеалистом он ни был, [hunan_events.GetLeader], без сомнения, должен противостоять мощи своего величайшего союзника и соперника в лице [hunan_events.GetSecondInCommand], который абсолютно против идеологии нашего правительства. Неустанно борется с [hunan_events.GetLeader] на каждом шагу. К счастью, [hunan_events.GetLeader] заверяет [ROOT.GetLeader], что его положение в правительстве провинции Хунань абсолютно безопасно." #Fed
 hunan_kuomintang_events.14.d2: "Несмотря на жесткую партийную линию, отстаиваемую Реорганизованной Ассоциацией Товарищей, хунаньский Гоминьдан смеется над такими идеалами и ортодоксальностью. Управляемый двоевластием 8-й армии Тана Шэнчжи и 6-й армии Чэн Цяня, этот дуэт внешне представляет собой перекрестный Единый Фронт Гоминьдана. Однако наши глаза и уши в подполье убеждают нас, что демонстрируемое единство - это всего лишь видимость. За всем этим блеском скрывается провинциальное правительство, погрязшее в междоусобицах и интригах.\n\nВозможно, каким-то странным образом это символизирует нашу собственную внутреннюю борьбу за власть. Тем не менее, оба хунаньских лидера твердо выступают против реорганизации Ассоциации товарищей, при этом Тан Шэнчжи был одним из ключевых генералов Временного Комитета Действий во время правления династии Мин, в то время как Чэн Цянь твердо придерживался умеренной позиции, проповедуемой Фракцией Реконструкции Сунь Фо.\n\nИ все же было бы глупо не признавать больших успехов, достигнутых правительством провинции. Хунань продемонстрировала замечательную способность участвовать в жизни, пусть и несовершенной, демократии. Хотя в конечном счете с этим придется подождать до завершения Национальной Революции, провинция служит ключевой образцовой провинцией для остальной части страны." #LKMT
 hunan_kuomintang_events.14.d3: "Прекрасно проявив свой стратегический склад ума, Чэн Цянь сумел успешно содействовать устранению одного из соперников Гоминьдана, Чжао Хэнти. Однако любопытно, что командующий 6-й армией добился этого благодаря совместным усилиям с левыми радикалами из Гоминьдана и командующим 8-й армией Таном Шэнчжи. Оба генерала прибыли в провинцию Хунань после объявления о проведении выборов в провинции Хунань и решили сотрудничать по совместному списку Гоминьдана.\n\nWhilst idealists would dream of this being a sign of reunification of the wings of the party, it has clearly exemplified the opposite. Even now, both Cheng and Tang squabble, fight, and commit espionage against each other to try and oust the other individual from their position of power within the province.\n\nУчитывая обстоятельства, абсолютно необходимо, чтобы Чэн Цянь вышел победителем, однако мы не можем выделить ресурсы для открытой поддержки его усилий. Пока [ROOT.GetLeader] ясно видно, что, несмотря на междоусобицы, Хунань добивается больших успехов в том, чтобы стать образцовой провинцией Гоминьдана, успешно продвигаясь по пути распространения Национальной революции." #RKMT
 hunan_kuomintang_events.14.d4: "Странная утка среди членов Альянса национальной защиты, \"председатель\" Провинции [hunan_events.GetLeader] отправил серию тщательно продуманных телеграмм [ROOT.GetLeader], заверив лидера в своей и Хунаньской неизменной поддержке Альянса национальной защиты. Революционер по духу и действиям, председатель оказался среди тех, кто обычно не согласен с его руководством, но, тем не менее, он сражается на их стороне.\n\nОднако, несмотря на союзников достопочтенного председателя, сама Хунань остается очагом революционного пыла, с сильным рабочим движением и еще более крепкой крестьянской основой. Возможно, в свете ситуации в стране, Гоминьдан продержится даже после воссоединения с ННА.\n\nОднако в конечном счете, каким бы идеалистом он ни был, ему, без сомнения, придется бороться со своими более ортодоксальными союзниками по Гоминьдану, с которыми он делит власть. В то время как [hunan_events.GetLeader] подтверждает свою приверженность делу, его заместитель и главный соперник [hunan_events.GetSecondInCommand] не является нашим абсолютным другом и будет неустанно бороться, чтобы противостоять нам по всем направлениям. К сожалению, все [ROOT.GetLeader] может только надеяться, что [hunan_events.GetLeader] сможет перессорить своих радикалов и сохранить контроль." #NPA
 hunan_kuomintang_events.14.a: "Лучше говорить с чертом, которого давно знаешь..."
 hunan_kuomintang_events.14.b: "Поздравляем,Председатель [hunan_events.GetLeader]!"
 hunan_kuomintang_events.14.c: "Надеюсь, Чэн Цянь сможет сохранить контроль над ситуацией."

 hunan_kuomintang_events.15.t.hejian: "Перебежчик ставший победителем"
 hunan_kuomintang_events.15.t.song: "Свет Вампоа"
 hunan_kuomintang_events.15.t.cheng: "Вечный революционер"
 hunan_kuomintang_events.15.t.peng: "Светлая голова 8-й армии"
 hunan_kuomintang_events.15.t.helong: "Герой революционного крестьянства"
 hunan_kuomintang_events.15.t.tang: "Генерал-\"буддист\""
 hunan_kuomintang_events.15.d.hejian: "Человек, умеющий завоевать лестный отзов о себе, но в то же время подвергается поношению со стороны не меньшего числа людей, Хэ Цзянь является воплощением кадрового офицера. Его амбиции привели его от медленного продвижения по службе ученого к стремительному продвижению по службе в новых, современных китайских армиях. Хэ Цзянь - ветеран многих конфликтов, и все они требуют его способного ума и быстроты мышления, чтобы обеспечить выживание. Пройдя путь от Тан Шэнчжи по карьерной лестнице до командира бригады, Хэ Цзянь сам начал проявляться после Северной экспедиции и пребывания в Мингане. Возможно, он достиг зенита своей карьеры после повышения до командира дивизии и главы Бюро по умиротворению сельских районов, возможно, он не самый лояльный или идеологически крепкий, но одни его достижения говорят сами за себя."
 hunan_kuomintang_events.15.d.song: "Сун Силянь, олицетворяющий поколение кадровых работников Вампоа, является свежим, молодым лицом в Национально-революционной армии. Склонный к революционному поведению с юных лет, в возрасте 13 лет, он и его одноклассники стали соучредителями революционной газеты, наиболее печально известной своей критикой Чжао Хэнти в связи с казнью профсоюзных активистов во время его пребывания в должности. Окончив первый класс Вампоа, Сонг стал самым молодым выпускником в истории академии и с блеском выступил на поле боя, доблестно проявив себя в Восточных и Северных экспедициях. Однако, в конечном счете, его настоящая карьера еще не началась, и, хотя его превозносят как одного из величайших офицеров Гоминьдана, он сосредоточился на том, чтобы занимать в основном аполитичную умеренную позицию в межпартийной политике, хотя в личных отношениях, похоже, поддерживает своего старого начальника Чэн Цяня."
 hunan_kuomintang_events.15.d.cheng: "За десятилетия революционной борьбы в карьере Чэн Цяня было много взлетов и падений, но он ни разу по-настоящему не потерпел поражения. Пройдя службу в Синьхае, участвуя в Северной экспедиции и во всем, что было между ними, он стал символом старых несгибаемых революционеров Тунмэнхуэя, поколения, давно ушедшего в прошлое.Считается умеренной по многим своим современникам как правое и левое крыло Гоминьдана, Чэн отголоски стопам песню Jiaoren, или Хуан Син, больше, чем те доктора Сунь Ятсен. Тем не менее, старый тигр сражался бок о бок с такими людьми, как покойный генералиссимус Чан Кайши и генерал Ли Цзишэнь, всегда надеясь увидеть Национальную революцию. Благодаря своим недавним успехам на поле боя Чэн сумел завоевать сердца людей своей знаменитой Шестой армией."
 hunan_kuomintang_events.15.d.peng: "Пэн родился в семье с давними традициями ведения сельского хозяйства, но его семья быстро приходила в упадок, что вынуждало его идти на многочисленные жертвы, чтобы помочь им выжить. В конечном счете, участвуя в крестьянском восстании, Пэн был вынужден бежать из своей семьи, а позже, в 1916 году, завербовался в армию Тан Сянмина. С этого началась его легендарная революционная карьера, в ходе которой Пэн вечно боролся за права своих собратьев-крестьян. Испытывая особую симпатию к военному делу, Пэн с тех пор продолжал совершенствоваться на поле боя, что привело к повышению до командира дивизии во время пребывания в Мингане. Рассматриваемый как вторая опора Восьмой армии, наряду с такими, как Хэ Лун, этот дуэт продолжает продвигать аграрно-социалистическую доктрину под эгидой своего начальника Тана Шэнчжи, несмотря на его довольно умеренные взгляды."
 hunan_kuomintang_events.15.d.helong: "Поскольку его отец был военным офицером династии Цин, возможно, это была судьба, что он тоже встал на путь военной и революционной политики. После многополярной карьеры, в ходе которой он заигрывал с социализмом, покушения на Тан Янькая и, в конечном счете, разгрома Чжао Хэнти, он присоединился к Национально-революционной армии и служил с отличием. После их поражения в Северной экспедиции он последовал за Восьмой армией в зону действия повстанцев, где за ним начали присматривать многие люди из Временного Комитета Действий. Укрепляя свои аграрно-социалистические взгляды во время пребывания там, его военные успехи служат площадкой, на которой он может продвигать идеалы и оказывать поддержку своей радикальной фракции в 8-й армии. Однако, насколько сильно он сможет повлиять на политику своего начальника Тана Шэнчжи, еще предстоит выяснить."
 hunan_kuomintang_events.15.d.tang: "Многие считают Тан Шэнчжи предателем, оппортунистом, что свидетельствует о том, как низко пал Гоминьдан, однако никто не может отрицать его революционных заслуг. Вступив в "Тунмэньхуэй" в 1909 году, Тан сражался в студенческом отряде во время Синьхайской революции под руководством Чжао Хэнти в 1923 году, а позже - против самого Чжао в 1926 году. Вступив в Национально-революционную армию и получив в том же году командование 8-й армией, Тан зажег спичку, которая в конечном итоге превратилась в ад Северной экспедиции, и в первый период конфликта добился успехов. Наблюдая за мириадами людей, борющихся за власть и наживу в провинции Хунань, Тан пережил период депрессии, пока не встретил буддийского практикующего Гу Боксу, после чего обратился в христианство, следуя его учению. В то время как его политические оппоненты стараются изобразить его религиозным фанатиком, Тан с гордостью носит данное ими прозвище \"буддистский генерал\"."
 hunan_kuomintang_events.15.a: "Беспрецедентные амбиции, но неприятный характер."
 hunan_kuomintang_events.15.b: "Наш лучик света в эти трудные времена."
 hunan_kuomintang_events.15.c: "У Старого Пса все еще есть несколько козырей."
 hunan_kuomintang_events.15.d: "Решительный в своих убеждениях."
 hunan_kuomintang_events.15.e: "Сражаясь за народ."
 hunan_kuomintang_events.15.f: "\"Буддистский\" генерал? Забавно."

 hunan_kuomintang_events.16.t: "Доминирование 8-ой армии"
 hunan_kuomintang_events.16.d: "Следует признать, что радикальная революция требует радикальных действий, однако такие действия способны подорвать те самые основы, на которых построено государство. Восьмая армия, конечно, не анархисты, и даже они видят ценность в поддержании хотя бы дружеских связей со своей оппозицией. Благодаря тому, что они получили власть во всех правительственных органах, им удалось сделать Шестую армию практически бесполезной.\n\nЭтот тотальный контроль вылился в настоящий шторм, в результате чего вся оппозиция Тану была заглушена отделом пропаганды 8-ой армии, однако это вызвало опасения, что такое доминирование приведет в конечном итоге к слабости. По мере того как радикалы из 8-й армии становятся все более самоуверенными, они начали даже теснить умеренных военнослужащих.\n\nШестая армия, возможно, и повержена, но они еще не вышли из игры. Возможно, благодаря нашим связям и взаимному братству, Тан сможет дать Шестой армии возможность дать отпор, по крайней мере частично, радикалам из его лагеря. Это был бы мудрый выбор, поскольку на карту поставлена сама Хунань."
 hunan_kuomintang_events.16.a: "Обратится к Тан Янькаю, чтобы снизить напряжение."
 hunan_kuomintang_events.16.b: "Продолжайте давить до полной победы!"

 hunan_kuomintang_events.17.t: "Доминирование 6-ой армии"
 hunan_kuomintang_events.17.d: "В то время как Шестая армия позиционирует себя как оплот умеренности против предполагаемой тирании 8-й армии, наши действия по \"обороне\" могут в равной степени защитить людей, поскольку они могут заглушить их крики. В конечном счете, успехи 6-й армии на политическом поле боя привели к почти полному доминированию ее рядов в правительстве, а все сторонники Тана Шэнчжи, или Синдикалистской партии Китая, оказались в изоляции.\n\nУчитывая цену, которую мы должны заплатить за спасение, сторонники и офицеры Шестой армии становятся все более самоуверенными, теряя бдительность, которая принесла им их могущество. В ходе связанных с этим событий бюро по установлению мира в сельской местности становились все более амбициозными и дерзкими, больше не считаясь с необходимостью скрывать свои вопиющие антисоциалистические злоупотребления.\n\nЗаботясь о стабильности и процветании Хунани в целом, Чэн мог бы договориться с Таном в форме заключения сделки, чтобы уравнять силы и позволить 8-й армии дать отпор. Это представляется заманчивой возможностью, для того, чтобы в Хунани не разразилась полномасштабная гражданская война."
 hunan_kuomintang_events.17.a: "Обратится к Тан Янькаю, чтобы снизить напряжение."
 hunan_kuomintang_events.17.b: "Продолжайте давить до полной победы!"

 hunan_kuomintang_events.18.t: "Роскошь в текущих обстоятельствах"
 hunan_kuomintang_events.18.d: "Гоминьдановцам не привыкать к грандиозным проявлениям военной фривольности, будь то парады или награждение дивизий или солдат медалями и достижениями. Аналогичным образом, Шестая и Восьмая Национально-революционные армии были проинспектированы как председателем [hunan_events.GetLeader], так и [hunan_events.GetSecondInCommand]. Официальные лица в правительстве считают, что эта грандиозная демонстрация, номинально являющаяся демонстрацией военной мощи Гоминьдана для всеобщего обозрения, является попыткой подчеркнуть превосходство армии того или иного лидера Гоминьдана.\n\nТолпа из 15 000 человек собралась, чтобы понаблюдать за выступлениями лучших солдат 6-ой и 8-ой армии. Первым на презентацию была представлена 6-я армия Чэн Цяня, возглавляемый их восходящей звездой Сун Силянем. Солдаты, олицетворявшие силу Правого Гоминьдана, были явно обветренными и с гордостью носили свою стандартную гоминьдановскую форму. Маршируя в унисон друг с другом под громкую музыку, лица солдат сияли решимостью.\n\nНапротив, 8-я армия Тана Шэнчжи представляла собой смесь иррегулярных подразделений, регулярных частей и элиты-ветеранов самого Тана. Однако, возможно, из-за того, что их командир был особенно сосредоточен на представлении своей армии, их униформа не пострадала в результате конфликта, поскольку явно была изготовлена с единственной целью - для парада.\n\nОднако самое любопытное - это украшения на элитных солдатах Тана. Все они носили "Медаль за великую благотворительность и спасение человечества", что является явным признаком буддийского влияния Тана на своих солдат. На самом деле, элитные солдаты Тана родом из того времени, когда все войска под командованием командира должны были следовать буддизму, добровольно или нет, чтобы служить под его началом. Когда парад завершился, мало кто знал, что думать об образе, созданном Таном: эклектичная смесь набожных воинов-буддистов в сочетании со стандартной военной формой НРА."
 hunan_kuomintang_events.18.a: "Гордость НРА!"
 hunan_kuomintang_events.18.b: "Он и наших товарищей обучал этому?"

 hunan_kuomintang_events.19.t: "Осмысливая произошедшее"
 hunan_kuomintang_events.19.d: "Из-за постоянных боевых действий у человека остается мало времени для мира и спокойствия, что еще хуже, если он не был изгнан из своей родной провинции в течение почти десяти лет. Гоминьдан - это организация революционеров, молодых, радикальных и требующих перемен. Тем не менее, в его основе лежало более спокойное время, по-прежнему искренне революционное, правда, но это было время поэтов, интеллектуалов и политиков. А не милитаристов, оппортунистов и полевых командиров. Внутри нации остаются те, кому удается балансировать на грани между двумя мирами. Мыслитель и в то же время тактик. Писатель и воин. К их числу относится и творчество Чэн Цяня, поскольку, хотя он всю свою жизнь был военным, он общается с бесчисленными мыслителями-интеллектуалами и составил довольно большое количество стихотворений и прозы.\n\nПосле посещения башни Юэян генерал взял паузу, чтобы поразмыслить. О битве, в которой он участвовал здесь, в частности, против У Пэйфу, в 1917 году. О сходстве пейзажей после возвращения домой с войны и изгнания. С меланхоличным видом генерал приступил к составлению нового текста:\n\n\"Чем больше всего дорожит страна? От старых крепостей тех времен не осталось и следа.\nСтараюсь не обращать внимания, но зрелище удручающее, впереди долгий путь и бушует снежная буря.\nМаленький остров в море любим птицами, но лодки и корабли по-прежнему хотят столкнуться с волнами.\nНа протяжении веков меланхолия была переполнена, бесчисленные милости и обиды сталкивались друг с другом.\nГоры Цзюйи и гора Хэн кажутся вполне достижимыми, но Преисподняя по-прежнему остается препятствием.\"\n\nУчитывая продолжающуюся борьбу против полевых командиров, против его собственной партии, против тех, кто руководит революцией, может показаться, что история этой страны полна кровопролития и страданий. Но даже в этом случае борьба должна продолжаться, несмотря ни на что. Находясь в осаде на всех фронтах, он не позволит революции в Хунани пошатнуться, спасти ее навсегда."
 hunan_kuomintang_events.19.a: "Это наше бремя, которое мы должны нести."
 hunan_kuomintang_events.19.b: "Бесполезная трата времени на поэзию, не так ли?"

#Zhao Hengti Events

 hunan_federalist_events.1.t: "Демократический мандат!"
 hunan_federalist_events.1.d_1: "Поскольку коалиция Чжао и Гоминьдана, казалось бы, зашла в тупик в Ассамблее, ряд независимых политиков сформировали правительство, решавшее, кто будет губернатором. Опасаясь, что в случае победы Гоминьдана они окажутся в стороне, они отдали свои голоса за Чжао и обеспечили ему губернаторство. В своей речи Чжао говорил о том, как обеспечить безопасность Хунани в предстоящие неспокойные времена, и что он сделает все возможное для укрепления молодой демократии в стране, а также поблагодарил всех, кто помогал ему во время выборов, и пообещал обеспечить свободную и справедливую жизнь в Хунани для всех ее граждан, независимо от их происхождения."
 hunan_federalist_events.1.d_2: "Коалиция Чжао Хэнти одержала победу на выборах с заметным отрывом. Этот результат вряд ли стал неожиданностью, учитывая, что он был фаворитом на выборах. В своей речи Чжао говорил о том, как обеспечить безопасность Хунани в предстоящие неспокойные времена, и что он сделает все возможное для укрепления молодой демократии в стране, а также поблагодарил всех, кто помогал ему во время выборов, и пообещал обеспечить свободную и справедливую жизнь в Хунани для всех ее граждан, независимо от их происхождения."
 hunan_federalist_events.1.a: "За Хунань и Демократию!"

 hunan_federalist_events.2.t: "Провести черту"
 hunan_federalist_events.2.d: "Губернатор Чжао, возможно, и победил на выборах, но это не означает, что демократия в Хунани обеспечена. На самом деле, учитывая неожиданный успех Гоминьдана и членов Ассамблеи, избранных под влиянием военачальников (Тан Сянмин, Чэнь Цюйчжэнь и Тянь Инчжао), кажется, что эти выборы укрепили позиции более авторитарных фигур.\n\nЭти силы, хотя и не являются союзниками ни в каком качестве, все вместе представляют угрозу для нашей молодой демократии, и если Гоминьдан станет слишком сильным, мы легко можем увидеть, как Тан Сянмин двинется на юг против нас и обезглавит нашу демократию с ног до головы. Более того, двоевластие Сянси все больше отдаляется от нас, с течением времени все больше ориентируясь на Тан Сянмина. Возможно, сейчас они выжидают своего часа, но это не продлится вечно, и мы должны действовать до того, как они это сделают.\n\nК счастью, мы не одиноки в своей борьбе. Губернатор Чжао быстро осознал угрозу и принял соответствующие меры, сформировав \"Большую коалицию\" с другими демократическими партиями (и независимыми кандидатами), чтобы сформировать широкий демократический фронт. С формированием Большой коалиции у нас есть доступ к нескольким инструментам, позволяющим подорвать позиции автократов в нашей провинции и ограничить их усилия по уничтожению демократии, столь дорогой нашему губернатору."
 hunan_federalist_events.2.a: "Линии фронта стали видны, вопрос только в том, кто победит.?"

 hunan_federalist_events.3.t: "[HNN_fed_end_title_text]"
 hunan_federalist_events.3.d: "[HNN_fed_end_desc_text]"
 hunan_federalist_events.3.t.assassinated: "Чэнь Цзюнмин убит!"
 hunan_federalist_events.3.t.coup: "Путч в Лянгуане"
 hunan_federalist_events.3.t.defeat: "Итоги второй гуаньдун-гуанскийской войны"
 hunan_federalist_events.3.d.assassinated: "Совершив самый гнусный акт, военачальник Гуанси Ма Цзи успешно отдал приказ об убийстве нашего союзника Чэнь Цзюнмина, лидера федералистов Китая и Лянгуана. Чэна обманом заставили присутствовать на похоронах предшественника и приемного отца Ма Цзи в Наньнине, провинция Гуанси, где он был застрелен из засады.\n\nПоскольку правительство Лянгуана и Гуандуна находится в руинах вместе с федералистским движением, наш союз с ними утратил силу, поскольку они скатились к гражданской войне между враждующими провинциальными лидерами."
 hunan_federalist_events.3.d.coup: "Увидев возможность захватить власть в свои руки, политик и генерал, поддерживающий Гоминьдан, Чэнь Миншу организовал государственный переворот против нашего союзника Чэнь Цзюнмина в Гуанчжоу. Судьба Чэнь Цзюнмина в настоящее время неизвестна, но городские власти, похоже, убеждены, что он все еще жив и бежал в Гонконг.\n\nХотя это, по-видимому, предотвращает войну между двумя провинциями Лянгуана, поскольку Гуанси недавно был захвачен Ли Цзунжэнем, еще одним военачальником, поддерживающим правый Гоминьдан, наш союз с Лянгуаном был признан недействительным в связи с незаконным отстранением нашего союзника от власти."
 hunan_federalist_events.3.d.defeat: "Когда разногласия между Старой и Новой кликами Гуанси улеглись, победитель обратил свой взор на Гуандун, втянув Лянгуан в кровопролитную гражданскую войну. Самым печальным событием стало то, что силы федералистов проиграли конфликт, а судьба Чэнь Цзюнмина осталась неизвестной. Поскольку Лянгуаном теперь управляет губернатор [GXC.GetLeader], мы больше не можем считать Лянгуан нашим союзником, и наш альянс становится недействительным."
 hunan_federalist_events.3.a: "Наши последние союзники в Китае - Чжили, и нам лучше объединиться с ними."
 hunan_federalist_events.3.b: "Федерализм еще не умер, пока мы живы!"

 hunan_federalist_events.4.t: "Арест Тан Сянмина"
 hunan_federalist_events.4.d: "Теперь, когда позиции губернатора Чжао укрепились и он должным образом обеспечен, он может, наконец, выступить против одного из самых серьезных препятствий на своем пути - Тан Сянмина. С тех пор как Тан арестовал Чжао и бросил его в пекинскую тюрьму по приказу Юань Шикая, вражда между двумя мужчинами накалилась до предела, и Чжао никогда не выставлял его в хорошем свете, несмотря на то, что оба симпатизировали Чжили.\n\nГубернатор только что отдал приказ командующему 1-й хунаньской дивизией Хэ Яоцзу отвести свою армию в Юэян и официально арестовать Тана. Всего через несколько часов после того, как был отдан приказ, Хэ Яоцзу оказался за пределами города, когда гарнизон Тан Сянмина выступил вперед и вступил в перестрелку с войсками Хэ. В конечном счете, Тан потерпел поражение и отступил через границу. Хотя это, к сожалению, означает, что Чжао не смог арестовать Тана, это означает, что он больше не может представлять угрозу для нашей демократии."
 hunan_federalist_events.4.d.zhili: "Теперь, когда позиции губернатора Чжао укрепились и он должным образом обеспечен, он может, наконец, выступить против одного из самых серьезных препятствий на своем пути - Тан Сянмина. С тех пор как Тан арестовал Чжао и бросил его в пекинскую тюрьму по приказу Юань Шикая, вражда между двумя мужчинами накалилась до предела, и Чжао никогда не выставлял его в хорошем свете, несмотря на то, что оба симпатизировали Чжили.\n\nСначала отправляю телеграмму [HNN_zhili_home_base], объясняющую ситуацию, что предстоящие действия направлены исключительно против Тан Сянмина и что он по-прежнему лоялен клике Чжили. После этого губернатор отдал приказ командующему 1-й хунаньской дивизией Хэ Яоцзу отвести свою армию в Юэян и официально арестовать Тана. Всего через несколько часов после того, как был отдан приказ, Хэ Яоцзу оказался за пределами города, когда гарнизон Тан Сянмина выступил вперед и вступил в перестрелку с войсками Хэ. В конечном счете, Тан потерпел поражение и отступил через границу. Хотя это, к сожалению, означает, что Чжао не смог арестовать Тана, это означает, что он больше не может представлять угрозу для нашей демократии."
 hunan_federalist_events.4.a: "Скатертью дорога."

 hunan_federalist_events.5.t: "Наша администрация и наша интеллигенция"
 hunan_federalist_events.5.d: "Одним из столпов нашей поддержки является интеллигенция провинции Хунань. После репрессий Лиги против интеллектуалов многие представители китайской интеллигенции бежали в Хунань в поисках безопасности, и губернатор Чжао был рад принять их. Наше правительство и наша интеллигенция образуют симбиотические отношения, и они сыграли важную роль в нашем переизбрании, и благодаря этому Чжао еще больше укрепил свою поддержку, чем раньше. Эти усилия превратили Чаншу в интеллектуальный центр, место, где самые яркие умы Китая встречаются и обсуждают проблемы, волнующие нацию.\n\nЭто, вполне естественно, хорошо отражается на нашей собственной администрации и показывает, что интеллектуальные дебаты, что демократия, безусловно, возможны, даже несмотря на проблемы полевых командиров и бандитизм. Впечатляющий подвиг для провинции, которая всего несколько лет назад была втянута в ту же самую борьбу, которая подавляла эти яркие умы и подавляла образование в стране в целом."
 hunan_federalist_events.5.a: "К обновленному сотрудничеству!"

 hunan_federalist_events.6.t: "Проблемы с "китайской доктриной Монро""
 hunan_federalist_events.6.d: "Одной из наиболее необычных частей Конституции Хунани является статья 89, известная также как \"доктрина Монро\", в которой говорится, что войска других провинций не могут входить на территорию Хунани, а хунанские войска не могут покидать провинцию. Хотя это было сделано для того, чтобы обезопасить Хунань от армий в неспокойное время эры военачальников, это нанесло ущерб безопасности Хунани. Полевым командирам и руководителям провинций за пределами провинции Хунань едва ли есть дело до того, что гласит наша Конституция, и, как таковая, она не обеспечивает реальной защиты от них, а лишь ограничивает нашу способность действовать в интересах провинции Хунань.\n\nИсходя из этих соображений, Чжао настаивал на внесении поправок в доктрину Монро, которые позволили бы армиям Хунани выйти из провинции, а центральному правительству при необходимости передвигаться по Хунани. Защищая свои поправки в Провинциальной ассамблее, он указал на Северную экспедицию, крах Лиги, два раза, когда Гоминьдан силой вводил свои войска в провинцию Хунань. Заявив, что доктрина Монро не сделала ничего, чтобы остановить их, и что они не колебались ни секунды из-за нее.\n\nК его удивлению, Ассамблея была на удивление восприимчива к этому аргументу, похоже, что две армии Гоминьдана, вступившие в Хунань, послужили тревожным сигналом для многих в Ассамблее, осознав, что единственный способ для Хунани по-настоящему обезопасить себя от полевых командиров и вражеских армий - это объединить Китай под одним знаменем."
 hunan_federalist_events.6.a: "За новую Хунань в новом Китае!"

 hunan_federalist_events.7.t: "Оливковая ветвь трудящимся"
 hunan_federalist_events.7.d: "Наши отношения с организованными профсоюзами были... чревато, мягко говоря. Трагическая гибель профсоюзных активистов во время правления Чжао в прошлом была символом этих сложных взаимоотношений. Но губернатор Чжао полон решимости изменить это. Организованные профсоюзы являются основой поддержки Гоминьдана, и если он хочет подорвать самопровозглашенную "партию-государство" и обеспечить демократию в Хунани, он должен заключить мир с профсоюзами.\n\nНа встрече с ведущими профсоюзными лидерами в Чандэ напряжение, повисшее в воздухе, было ощутимым. После того, как все были представлены друг другу, Чжао объяснил, что, несмотря на действия в прошлом, он хотел бы протянуть оливковую ветвь лейбористам. Воспользовавшись случаем, лидеры лейбористской партии немедленно выдвинули ряд требований, в частности, о принятии нового закона, который укрепил бы профсоюзы и улучшил их способность заключать сделки от имени работников.\n\nГубернатор Чжао понимал, что их первоначальные требования не пройдут через Ассамблею, и после серии напряженных переговоров ему удалось склонить их к компромиссному законопроекту, который, как он был уверен, он сможет провести через Ассамблею. После заключения этого соглашения, до тех пор, конечно, пока законопроект не станет законом, казалось, что он сможет, наконец, заключить перемирие с профсоюзными организациями и сократить поддержку Гоминьдана в крупных городах Хунани."
 hunan_federalist_events.7.a: "Первый шаг к гармонии труда."

 hunan_federalist_events.8.t: "Наш собственный Билль о правах"
 hunan_federalist_events.8.d: "Конституция провинции Хунань уже наделяет ее граждан рядом прав. Включая Habeas Corpus (статья 6), право на владение частной собственностью (статья 7), свободу вероисповедания (статья 10), свободу ассоциаций (статья 12), право на ношение оружия (статья 13) и обязательное всеобщее образование (статья 21). Это важные достижения в нашем деле, но мы должны работать над укреплением этих прав и дополнять их другими, включая право на свободу слова, право критиковать правительство и свободу прессы. Хотя все три права де-факто находятся в введении администрации Чжао, мы не можем гарантировать, что другие последуют примеру губернатора.\n\nТаким образом, губернатор Чжао встретился со многими самыми яркими умами провинции Хунань, собрав группу интеллектуалов, и провел конференцию, посвященную принятию в провинции Хунань собственного Билля о правах, дальнейшей кодификации существующих мер защиты, закрепленных в Конституции, и дополнению их новыми правами, указанными выше.\n\nПосле долгих дебатов среди различных интеллектуалов конференция увенчалась оглушительным успехом, и Чжао использовал свое личное влияние и политическую хватку, чтобы провести ее через Ассамблею, что позволило провести голосование в чистом виде и обеспечить больше прав для каждого гражданина нашей провинции!"
 hunan_federalist_events.8.a: "Важный шаг к свободе."

 hunan_federalist_events.9.t: "Старые союзники,новые проблемы"
 hunan_federalist_events.9.d: "Двоевластие в Сянси, как правило, поддерживалось кликой губернатора Чжао. Несмотря на это, они служат препятствием на пути расцвета хунаньской демократии. Работая в рамках своих полномочий на посту губернатора, Чжао провел несколько реформ на западе, сократив официальные позиции Тянь Инчжао в плане власти и используя свои силы для обеспечения того, чтобы местные представители западных деревень были теми, кто будет должным образом представлять свои деревни, а не служить интересам Диархии\n\nЭти реформы не обошлись без их противников, Диархия контролирует значительное количество мест в Ассамблее, и эти депутаты приложили все усилия, чтобы заблокировать реформы в Ассамблее.\n\nПоддержку им оказали, к нашему большому удивлению, многие члены Ассамблеи, проголосовавшие за Гоминьдан, которые, по-видимому, сочли Диархию, состоящую из двух полевых командиров, более невыносимым, чем губернатор Чжао. Главным среди этих членов был бывший губернатор Тан Янкай, который произнес страстную речь в поддержку реформ. Мы не знаем, какие намерения стояли за этим, и какую пользу это ему принесет, но мы, безусловно, благодарны ему за помощь в устранении влияния военачальников в провинции Хунань."
 hunan_federalist_events.9.a: "Союзный военноначальник все еще военноначальник."

 hunan_federalist_events.10.t: "Федералистская модель провинции"
 hunan_federalist_events.10.d: "Столкнувшись с ожесточенным сопротивлением и врагами со всех сторон, губернатор Чжао успешно защитил и укрепил демократию в провинции Хунань от тех, кто предпочел бы ее уничтожения. Балансировать на тонкой, как бритва, проволоке между Тан Сянмином и Гоминьданом было непросто, но, будучи опытным политическим деятелем, Чжао сумел вдеть нитку в иголку. Сдерживать влияние Гоминьдана посредством обращений к крестьянам и рабочим, гарантируя, что они не смогут использовать популистские волнения в качестве оружия против молодой демократии Хунани. С другой стороны, Тан Сянмин и его гарнизон в Юэяне были изгнаны из Хунани, и Дамоклов меч, нависший над демократией в Хунани, был разрушен. Хотя возможности для дальнейшей работы еще есть, усилия губернатора Чжао привели к значительному расширению прав людей, демократических традиций и местной демократии в Китае. Хунань, являющаяся образцом для подражания для всех федералистов, зарекомендовала себя как Оплот Демократии в самом сердце Китая."
 hunan_federalist_events.10.a: "За Хунань, за Конституцию, и за федералистский Китай!"

 hunan_federalist_events.11.t: "День Конституции"
 hunan_federalist_events.11.d: "Сегодня годовщина восстановления конституции провинции Хунань, один из немногих праздников, совершенно уникальных для провинции Хунань. Торжества проходят в каждом крупном городе, и губернатор Чжао выступает с речью перед администрацией губернатора, заявляя, что для него большая честь руководить одной из по-настоящему демократических провинций Китая. После своей речи он присоединился к параду, проходившему через Чаншу в честь годовщины принятия Конституции и возрождения демократии в провинции Хунань. Энергия, витавшая в воздухе, была ощутима, губернатор Чжао приложил немало усилий, чтобы прояснить ситуацию, просто прогуливаясь по улице, - яркое пятно во тьме эпохи военачальников, Хунань действительно является примером для подражания для всех!"
 hunan_federalist_events.11.a: "Выпьем за еще один успешный год!"

#Economic

 hunan_events.economy.1.t: "Всемирный кризис достигает Хунани"
 hunan_events.economy.1.d: "Будучи одной из составных провинций Лиги восьми провинций, экономика Хунани, естественно, была разумно интегрирована в более широкое немецкое сообщество. Однако, будучи в большинстве своем аграрной, Хунань является одним из крупнейших регионов связанных с экономикой ОАК, окруженная промышленными городами Ухань, Гуанчжоу и Нанкин, экономика Хунани пережила тяжелые времена в эпоху правления военачальников. Ибо кто в здравом уме станет вкладывать деньги в Хунань, когда неподалеку и трава зеленее и Солнце ярче.\n\nОднако еще не все потеряно, поскольку сохранение нашей независимости от Сунь Чжуаньфана пошло нам на пользу во многих отношениях. Поскольку, несмотря на довольно тяжелые экономические условия, сложившиеся после того, что было названо Черным понедельником, в провинции Хунань дела обстоят немного лучше, чем у ее соседей по Лиге или Центрального правительства.\n\nТем не менее, наши основные экономические партнеры переживают все более серьезные потрясения, в результате чего наш сельскохозяйственный сектор переживает катастрофические последствия, а наши инвесторы стремительно бегут из страны. Правительство провинции должно незамедлительно позаботиться о том, чтобы кризис не усугубился, используя любые экономические средства, которые есть в нашем распоряжении."
 hunan_events.economy.1.a: "Я правда думал, что Лига поможет обеспечить стабильность?"

 hunan_events.economy.2.t: "План земельной реформы"
 hunan_events.economy.2.d_zhili: "Сельское хозяйство провинции Хунань зависит от природы ее плодородных земель. Благодатная река Сян обеспечивает необходимый уровень плодородия для создания богатых и разнообразных фермерских хозяйств по всей провинции. Тем не менее, как и на большинстве плодородных земель в Китае, таких как районы в пределах Сычуани и те, что прилегают к Янцзы, здесь сохраняется хищническая культура арендного земледелия, граничащая почти с феодализмом. Эти проблемы еще больше усугубляются из-за особенностей сельскохозяйственного рынка провинции Хунань, поскольку на него приходится значительная часть доходов провинции из-за ее экономики, основанной в основном на экспорте. Итак, взгляните на развитую природу сельского хозяйства Хунани: труд крестьян порождает недовольство, направленное на дворянство, в то время как последние пожинают плоды.\n\nБудучи военным по своей натуре, сельскохозяйственная реформа не входит в круг компетенций [hunan_events.GetLeader], и все же он оказался в довольно неблагоприятной ситуации. Различные члены провинциальной ассамблеи, самым важным из которых был его родной брат Тан Хуалун, призвали губернатора увидеть смысл в проведении политики, направленной на лечение коллективной травмы крестьян. Но упрямый адмирал категорически отказался слушать, потому что он не собирается поддерживать тех, кто так сильно хочет его свержения. Хунанцам нужен путеводный свет для их защиты, и только правящая каста может обеспечить такую защиту в его глазах.\n\nУчитывая, что все предыдущие попытки нарушить хрупкое равновесие в сельскохозяйственном секторе Хунани заканчивались негативной реакцией джентри, или провинциального собрания, амбиции нового проекта остаются непоколебимыми. Чтобы стать по-настоящему современной провинцией, достойной содействия национальному воссоединению, Хунань должна разработать по-настоящему сильную земельную политику, которая легла бы в ее основу. С самого начала губернатор [hunan_events.GetLeader] принял решение проводить политику..."
 hunan_events.economy.2.d_kmt: "Сельское хозяйство провинции Хунань зависит от природы ее плодородных земель. Благодатная река Сян обеспечивает необходимый уровень плодородия для создания богатых и разнообразных фермерских хозяйств по всей провинции. Тем не менее, как и на большинстве плодородных земель в Китае, таких как районы в пределах Сычуани и те, что прилегают к Янцзы, здесь сохраняется хищническая культура арендного земледелия, граничащая почти с феодализмом. Эти проблемы еще больше усугубляются из-за особенностей сельскохозяйственного рынка провинции Хунань, поскольку на него приходится значительная часть доходов провинции из-за ее экономики, основанной в основном на экспорте. Итак, взгляните на развитую природу сельского хозяйства Хунани: труд крестьян порождает недовольство, направленное на дворянство, в то время как последние пожинают плоды своего.\n\nЯростные сторонники радикальной земельной реформы с самого начала и массовой кампании против "местных тиранов и злобной знати". Поскольку теоретики Гоминьдана долгое время определяли феодализм как систему, при которой натуральное хозяйство Китая играет доминирующую роль в китайском обществе, эта по своей сути несправедливая система распространена не более явно, чем на землях провинции Хунань. Поскольку местные землевладельцы использовали политическую силу для захвата земель, эксплуатации крестьян и принуждения их к бесплатному труду, это привело к полной монополии дворянства на экономическую, военную и политическую власть. Абсолютная прерогатива партии - вмешаться и освободить этих несчастных тружеников от их архаичного рабства. Следуя принципу \"Земля - земледельцу\", поддерживаемому господствующей партией Гоминьдан, такая жестокая система больше не будет существовать.\n\nУчитывая, что все предыдущие попытки нарушить хрупкое равновесие в сельскохозяйственном секторе Хунани заканчивались негативной реакцией джентри, или провинциального собрания, амбиции нового проекта остаются непоколебимыми. Чтобы стать по-настоящему современной провинцией, достойной участия в Национальной революции, Хунань должна разработать по-настоящему сильную земельную политику, которая легла бы в ее основу. Как и ожидалось, губернатор [hunan_events.GetLeader] и [hunan_events.GetSecondInCommand] решили проводить политику..."
 hunan_events.economy.2.d_fed: "Сельское хозяйство провинции Хунань зависит от природы ее плодородных земель. Благодатная река Сян обеспечивает необходимый уровень плодородия для создания богатых и разнообразных фермерских хозяйств по всей провинции. Тем не менее, как и на большинстве плодородных земель в Китае, таких как районы в пределах Сычуани и те, что прилегают к Янцзы, здесь сохраняется хищническая культура арендного земледелия, граничащая почти с феодализмом. Эти проблемы еще больше усугубляются из-за особенностей сельскохозяйственного рынка провинции Хунань, поскольку на него приходится значительная часть доходов провинции из-за ее экономики, основанной в основном на экспорте. Итак, взгляните на развитую природу сельского хозяйства Хунани: труд крестьян порождает недовольство, направленное на дворянство, в то время как последние пожинают плоды своего.\n\nВсегда обдумывая возможные варианты, [hunan_events.GetLeader] обратился за советом к Ассамблее своей провинции при принятии решения о будущем сельскохозяйственной реформы в провинции Хунань. Естественно, поскольку различные члены ассамблеи одновременно являются либо представителями дворянства, либо получают от них зарплату, группа поддержки, выступающая за умеренную земельную реформу, является громкой и властной. Важно учитывать тот факт, что те же самые дворяне также играют первостепенную роль в поддержке губернатора [hunan_events.GetLeader] в его предвыборных кампаниях. С другой стороны, члены его левой коалиции, придерживающиеся идеалов реформистского прогрессизма, отстаивают подход, ориентированный на крестьянство, часто вступая по этому поводу в ожесточенные дебаты с консервативной стороной. Их аргументы сводились к тому, чтобы избежать революции, лишить Гоминьдан его базы поддержки и поддерживать многих, а не немногих.\n\nУчитывая, что все предыдущие попытки нарушить хрупкое равновесие в сельскохозяйственном секторе Хунани заканчивались негативной реакцией джентри, или провинциального собрания, амбиции нового проекта остаются непоколебимыми. Чтобы стать по-настоящему современной провинцией, достойной содействия национальному воссоединению, Хунань должна разработать по-настоящему сильную земельную политику, которая легла бы в ее основу. Губернатор [hunan_events.GetLeader] принял решение проводить политику..."
 hunan_events.economy.2.a: "Реформ,в интересах крестьян!"
 hunan_events.economy.2.b: "Умеренных реформ."

 hunan_events.economy.3.t: "Преодоление финансового кризиса"
 hunan_events.economy.3.d_zhili: "Поскольку подавляющее большинство промышленных предприятий провинции Хунань расположено в наших основных городах Чанша и Чандэ, они станут основным направлением усилий правительства по финансовому оздоровлению и развитию новой экономики для новой провинции Хунань. На протяжении более десяти лет промышленный центр провинции Хунань загнивал и разлагался из-за плохого управления, войн, репрессий и хаоса. Промышленники Хунани бежали, рабочие оказались же прикованы к своим цепям, общество поражено кумовством и некомпетентностью.\n\nТакое застойное положение дел только вредит стремлению провинции к процветанию. Тем не менее, не все в провинции бедны, поскольку городское рабочее население Хунани остается стойким и преданным своей роли в рабочей силе, и они в достаточной степени обучены техническим навыкам. Наряду с этим, провинция Хунань богата сельскохозяйственными и минеральными ресурсами, для использования которых требуются лишь согласованные усилия. Кроме того, связь Хунани с железной дорогой Гуанчжоу-Пекин делает ее отличной отправной точкой для выхода на другие рынки внутри страны и за ее пределами.\n\nНесмотря на очевидные связи Чжили с Центральным правительством и другими объединенными провинциями, в лагере [hunan_events.GetLeader] остаются сторонники новой формы экономического управления, при которой промышленность и товары Хунани в первую очередь служат Хунани, а посторонние - во вторую. Однако, по мнению губернатора, эти чиновники отказываются признавать сложившуюся в провинции ситуацию. Поставки и ресурсы Центрального правительства многочисленны, а его деловые круги могут стать настоящим благом для Хунани, если их правильно контролировать. Хотя это, несомненно, вызовет недовольство концессиями и самих рабочих, Хунань нуждается в большей интеграции."
 hunan_events.economy.3.d_kmt: "Поскольку подавляющее большинство промышленных предприятий провинции Хунань расположено в наших основных городах Чанша и Чандэ, они станут основным направлением усилий правительства по финансовому оздоровлению и развитию новой экономики для новой провинции Хунань. На протяжении более десяти лет промышленный центр провинции Хунань загнивал и разлагался из-за плохого управления, войн, репрессий и хаоса. Промышленники Хунани бежали, рабочие оказались же прикованы к своим цепям, общество поражено кумовством и некомпетентностью.\n\nТакое застойное положение дел только вредит стремлению провинции к процветанию. Тем не менее, не все в провинции бедны, поскольку городское рабочее население Хунани остается стойким и преданным своей роли в рабочей силе, и они в достаточной степени обучены техническим навыкам. Наряду с этим, провинция Хунань богата сельскохозяйственными и минеральными ресурсами, для использования которых требуются лишь согласованные усилия. Кроме того, связь Хунани с железной дорогой Гуанчжоу-Пекин делает ее отличной отправной точкой для выхода на другие рынки внутри страны и за ее пределами.\n\nПризнавая, что Синдикалистская партия Китая сохраняет значительное влияние на рабочих в провинции Хунань, Гоминьдан по-прежнему остается партией, в первую очередь, для угнетенных классов. Предвидя будущее без капитализма, партия отказалась от любых попыток вести переговоры с внешними капиталистами и инвесторами. Утверждая, что проблемы с промышленностью в провинции Хунань связаны с широко распространенной коррупцией в прошлом, а также с глупостью западных бизнесменов. Партия завершила разработку масштабного плана реконструкции, направленного, в первую очередь, на развитие экономики провинции Хунань, централизацию экономики под контролем правительства, чтобы обеспечить рост государственного капитализма в стране."
 hunan_events.economy.3.d_fed: "Поскольку подавляющее большинство промышленных предприятий провинции Хунань расположено в наших основных городах Чанша и Чандэ, они станут основным направлением усилий правительства по финансовому оздоровлению и развитию новой экономики для новой провинции Хунань. На протяжении более десяти лет промышленный центр провинции Хунань загнивал и разлагался из-за плохого управления, войн, репрессий и хаоса. Промышленники Хунани бежали, рабочие оказались же прикованы к своим цепям, общество поражено кумовством и некомпетентностью.\n\nТакое застойное положение дел только вредит стремлению провинции к процветанию. Тем не менее, не все в провинции бедны, поскольку городское рабочее население Хунани остается стойким и преданным своей роли в рабочей силе, и они в достаточной степени обучены техническим навыкам. Наряду с этим, провинция Хунань богата сельскохозяйственными и минеральными ресурсами, для использования которых требуются лишь согласованные усилия. Кроме того, связь Хунани с железной дорогой Гуанчжоу-Пекин делает ее отличной отправной точкой для выхода на другие рынки внутри страны и за ее пределами.\n\nГубернатору [hunan_events.GetLeader], предстоит принять важное решение. Его партнеры слева призывают губернатора сосредоточиться на изолированном, автаркическом подходе, чтобы рабочие провинции могли процветать под руководством государства. С другой стороны, его собственная партия выступает против подобных попыток централизованной национализации, считая, что это с самого начала ничем не лучше социализма. Вместо этого они предлагают Хунани просто воспользоваться преимуществами, предоставляемыми иностранным капиталом и инвесторами, поскольку такие возможности могут обеспечить значительный рост Хунани и преодолеть любые последствия, которые могут возникнуть в будущем. Взвешивая свой выбор, губернатор должен принять окончательное решение."
 hunan_events.economy.3.a: "Мировой рынок привел нас к нынешнему кризису, и мы были бы дураками, если бы снова пошли по этому пути."
 hunan_events.economy.3.b: "Прогресс достигается за счет интеграции в мировую торговлю, чего бы это ни стоило!"

 hunan_events.economy.4.t: "Окончание земельной реформы"
 hunan_events.economy.4.d: "Сельскохозяйственный сектор провинции Хунань, находящийся в критическом состоянии, вызывающий страдания и нищету, наконец-то перестал влиять на биение сердца провинции. Благодаря неустанным усилиям наших чиновников, нашего правительства и нашего народа, Хунани удалось ликвидировать существовавшее десятилетиями неравенство в сельском хозяйстве. Добившись давно заслуженной стабильности и процветания для своего народа, население теперь с нетерпением ждет вечно светлых дней. Благодаря перераспределению земель и установлению баланса между крестьянством и дворянством, соответствующего идеалам правительства, был заложен прочный фундамент для поддержки будущих начинаний губернатора [hunan_events.GetLeader].\n\nНа наших обширных плодородных землях производство чая, рами и конопли в провинции Хунань уступает место совершенно новым хлопковым и рисовым полям, а разнообразие нашей продукции открывает еще больше экономических возможностей. Благодаря различным небольшим мастерским и предприятиям, которые перерабатывают эти продукты в промышленные товары, а также растущему уровню образования крестьян, Хунань достигла вошла в новую эпоху."
 hunan_events.economy.4.a: "К новой эпохи процветания!"

 hunan_events.economy.5.t: "Окончание промышленных реформ"
 hunan_events.economy.5.d: "Наконец, благодаря огромным усилиям и решительным действиям, мобилизовав все, что мы могли, народ Хунани, наконец, добился долгожданных промышленных успехов, к которым он стремился. Хотя следует отдать должное тем, кто спланировал и осуществил программу, которая обеспечила такие успехи, следует воздать должное крови и поту народа Хунани, который так много пережил, чтобы позволить провинции достичь этого результата. В связи со значительным ростом нашей производственной мощи, сравнимым даже с маньчжурским, многие из ранее безработных в провинции Хунань вернулись на работу, предприятия начали вновь открываться. В целом, [hunan_events.Capital.GetCapitalVictoryPointName] превратился в настоящий экономический центр в юго-западном секторе Китая, и наши лучшие экономические умы полны энтузиазма по поводу новых масштабных проектов, к которым они теперь могут приступить.\n\nНесмотря на то, что в промышленном секторе все еще сохраняются некоторые трудности и для достижения такого статуса было принесено много жертв, в конечном счете провинция Хунань стала более развитой провинцией."
 hunan_events.economy.5.a: "Новый арсенал Китая!"

#Military
 hunan_military_events.1.t: "Предпоследний этап китайской междоусобицы"
 hunan_military_events.1.d_zhili: "Появившаяся на разлагающемся трупе империи Цин, Бэйянская армия Юань Шикая и ее преемники десятилетиями правили страной или оказывали на нее влияние. Новые армии, как их еще называли, были разделены на клики, расколотые на провинциальные группировки. Даже сегодня некоторые из них остаются доминирующими, и сильнейшей из них является клика Чжили, поскольку под мудрым руководством Нефритового Маршала им удалось сохранить ключевые региона страны после ее катастрофического раскола.\n\nВ условиях, когда нация вновь расколота на враждующие фракции, те, кто стремится к ее надлежащему объединению, нуждаются в превосходном вооружении и превосходных офицерах, если они хотят преодолеть множество препятствий, которые стоят между ними и сильным Китаем. Полное понимание этой концепции и внимательное руководство губернатора привело к тщательным и масштабным военным реформам, стилизованным под победоносного немецкого орла.\n\nБлагодаря своей преданности Чжилийской клике, а до этого Юань Шикаю, губернатор взял на себя ответственность за создание подлинного образа Новой армии. Элитные офицеры, обученные солдаты и выдающиеся генералы, пусть все те, кто выступает против Чжили, испытают свою мощь против армии нового образца и увидят всю тщетность своих действий."
 hunan_military_events.1.d_fed: "Не будучи известнымии своими военными достижениями, мало кто мог ожидать, что самой мощной боевой силой в стране станет армия Сянь [hunan_events.GetLeader]. Несмотря на посредственный успех в 1920-х годах, после того как его неоднократно вытесняли вероломные гоминьдановцы, боевая сила Чжао была сочтена истощенной, и ему пришлось полагаться на благосклонность У Пэйфу, чтобы добиться своего восстановления на посту губернатора провинции Хунань. Однако решительный настрой Чжао и его армии привел к стабильности, к которой так отчаянно стремилась Хунань.\n\nВ условиях, когда нация вновь расколота на враждующие фракции, те, кто стремится к ее надлежащему объединению, нуждаются в превосходном вооружении и превосходных офицерах, если они хотят преодолеть множество препятствий, которые стоят между ними и сильным Китаем. Полностью осознавая свой прошлый опыт и пределы провинции, [hunan_events.GetLeader] приступил к серии обширных и тщательных реформ, стилизованных под победоносную немецкую армию.\n\nБудучи федералистом до мозга костей, войска Чжао полностью независимы от армии Юэ под командованием Чэнь Цзюнмина или юньнаньской армии Тан Цзияо. Напротив, его войска однозначно являются хунаньскими. Без поддержки Германии или федералистов Чжао сумел создать армию, состоящую из элитных офицеров, обученных солдат и генералов, превосходящих всех его современников. Путь к национальному объединению может быть долгим, но армия Хунани обеспечит осуществление мечтаний федералистского движения."
 hunan_military_events.1.a: "Гордость нации!"

 hunan_military_events.2.t: "Ведущий вперед"
 hunan_military_events.2.d_zhili: "Известные своими боевыми традициями, солдаты из провинции Хунань славятся свирепостью, упорством и силой воли в бою. Несмотря ни на что, хунаньские воины неизменно меняли ход событий в критические моменты. Благодаря тому, что наши военные реформы идут полным ходом, Хунань вновь обрела свою заслуженную репутацию. И все же не только наши солдаты превосходят ожидания, но и наши офицеры, наш командный состав, которые по-настоящему преуспели в исполнении реформ.\n\nНе будучи уроженцем провинции Хунань, [hunan_events.GetLeader] снова и снова оказывался в провинции, возглавляя армии, руководя бюрократами, и даже дважды занимал пост губернатора. Однако, по правде говоря, он всегда был человеком моря. Начав свою военную карьеру в качестве адмирала в конце правления династии Цин, Тан возглавил армию только после начала войны за национальную безопасность в 1916 году, когда в то время он был губернатором провинции Хунань. Получив в 1917 году звание генерала, Тан продолжал руководить армиями вплоть до 1920-х годов, демонстрируя профессионализм, присущий флоту.\n\nВо время второго пребывания на посту губернатора армия Хунани претерпела радикальные реформы, превратив ее из разрозненного облика былой славы в настоящих воинов Китая. Хотя он и не командовал флотами, как ему хотелось бы, он сумел найти новый дом в своей Новой армии."
 hunan_military_events.2.d_fed: "Известные своими боевыми традициями, солдаты из провинции Хунань славятся свирепостью, упорством и силой воли в бою. Несмотря ни на что, хунаньские воины неизменно меняли ход событий в критические моменты. Благодаря тому, что наши военные реформы идут полным ходом, Хунань вновь обрела свою заслуженную репутацию. И все же не только наши солдаты превосходят ожидания, но и наши офицеры, наш командный состав, которые по-настоящему преуспели в исполнении реформ.\n\nИскренне гордясь своей провинцией, Чжао зарекомендовал себя как надежный командир, стоящий у руля. Возглавляя провинцию Хунань более десяти лет, губернатор повидал множество состояний ее армий. От его собственных местных войск до сил западных и восточных военачальников провинции Хунань, никто не может сравниться с мощью ее армий в настоящее время. Однако для Чжао это больше, чем успех его правительства или его народа, это признак его истинной приверженности делу доведения своей революции до конца.\n\nПредставитель старшего революционного поколения, окончивший Академию Императорской армии Японии вместе с такими людьми, как Тан Цзияо, Янь Сишань, Чэн Цянь и Ли Лэцзунь, Чжао - старый тигр, повидавший немало кровопролития. Служил под началом Цай Э, командовал такими людьми, как Бай Чунси и Хуань Шаохун, был подчиненным Тана Янкая, другом У Пэйфу. Карьера, полная множества историй, и все же она не закончена, потому что нация нуждается в воссоединении, и Чжао, безусловно, сыграет в этом свою роль."
 hunan_military_events.2.a: "Торжественное размышление об этих великих лидерах."

 hunan_military_events.3.t: "Проверенные командиры"
 hunan_military_events.3.d: "В соответствии с новой концепцией, предложенной командующими 8-й армией Хэ Луном и Пэн Дэхуаем, армия провинции Хунань провела серию совещаний после боя, на которых офицеры и солдаты анализировали недавние боевые действия. Имея возможность свободно общаться между нижестоящими и вышестоящими чинами, бойцы обсуждали и критиковали поведение отдельных офицеров и солдат, а также планы сражений или кампаний. После этого командир, председательствующий на собрании, задавал вопросы о будущих запланированных действиях подразделения.\n\nПоскольку все командиры лично выступают на массовых митингах, они надеются донести до солдат и офицеров общую политическую и военную ситуацию, с тем чтобы они лучше понимали, почему они сражаются и за что. Хэ и Пэн настаивают на том, что такая новая инициатива, которую они продвигают, обеспечит равенство информации среди руководителей, и надеются, что она будет использована для устранения некомпетентных командиров и сохранения достойных."
 hunan_military_events.3.a: "Настоящая демократическая армия!"

 hunan_military_events.4.t: "Истинный дух Национально-Революционной Армии"
 hunan_military_events.4.d: "Как и наши братья и сестры из Вампоа, 6-я и 8-я армии Национально-революционной армии несут с собой дух Национальной революции и спасения нации. Представляя лучших представителей нации, сотрудники Национальной ассоциации защиты прав человека провинции Хунань являются неутомимой силой революционного мужества, всецело преданной делу осуществления мечты доктора Сунь Ятсена.Полностью осознавая, что их семьи, их мечты, их надежды, сами средства к существованию - все это ничего не значит, когда они погибают в кампаниях Гоминьдана. Тем не менее, они продолжают рисковать своими жизнями, выполняя задачи, выходящие за рамки миссии, поскольку они действительно понимают, что, хотя все умирают, жизнь их самих и их товарищей продолжается в каждом китайском революционере. Преданные своему делу, сердца этих отважных людей устремляются вперед, в самую глубь царства военноначальников, местных тиранов, злых аристократов и иностранных империалистов, ибо на карту поставлено само будущее Китая, и они пожертвуют всем, чтобы увидеть, что Китай стал единым."
 hunan_military_events.4.a: "Пусть жертвы наших солдат приблизят победу Национальной Революции."

 hunan_military_events.5.t: "Прибытие изгнанников из Чжили!"
 hunan_military_events.5.d: "После хаоса, вызванного маньчжурским переворотом, наш храбрый товарищ по оружию Чжили вступил в смелую, но в конечном счете проигранную битву с превосходящими силами маньчжуров. После потери Лояна некоторые полагали, что это станет похоронным звоном для клики Северных Чжили, поскольку южные Чжили не представляли реальной альтернативы, а союзники потерпели поражение в других местах. И все же во тьме забрезжал свет, ибо то, что Тан Сянмин захватил Хунань для Чжили, дало клике возможность окончательно отбиться от угроз с Юга.\n\nПри такой безопасности, похоже, остатки Чжилийской клики начали обьединяться вокруг губернатора, а храбрый генерал и несколько его соратников появились в Чанше, пообещав губернатору свою мощь."
 hunan_military_events.5.a: "Наша битва еще не окончена!"

#Foreign Tag events

 hunan_events.106.t: "Тан Шэнчжи побеждает на выборах"
 hunan_events.106.d: "Возможно, гамбит генерала-мошенника принес свои плоды. Решение Тан Шэнчжи и 8-й армии отказаться от участия в боевых действиях в войне Лиги и принять участие в выборах в провинции Хунань, которое многие в Центральном комитете сочли неожиданностью, привело к его, казалось бы, решительной победе. Несмотря на неопределенность первоначальных перспектив, участие в выборах нашего бывшего товарища Чэн Цяня, возможно, изменило их совместные усилия.\n\nДоговорившись о сотрудничестве, правогоминдановец Чэн Цянь и левый Тан Шэнчжи объединились, чтобы сорвать победу Чжао Хэнти на выборах, и в ходе выборов в законодательное собрание провинции Хунань, состоявшихся вскоре после их объявленной победы, было решено, что Тан Шэнчжи станет губернатором, а Чэн Цянь сохранит важное положение в правительстве.\n\nВ большей степени поддерживаемый своими левыми коллегами, [CHI.GetLeader] искренне поздравил нового официального губернатора Гоминьдана, укрепившего позиции партии в стране."
 hunan_events.106.a: "Честно говоря неожиданно,но мы рады."

 hunan_events.107.t: "Чжао Хэнти одержал победу на выборах"
 hunan_events.107.d: "Согласно ожидаемому результату выборов в провинции Хунань, действующий губернатор Чжао Хэнти возглавил провинцию, обеспечив себе еще один срок пребывания у власти. Хотя это и не стало неожиданностью для Центрального Комитета, многие по-прежнему возмущены тем, что деспот сохраняет свою власть в провинции. Что еще более важно, похоже, что генерал-мошенник Тан Шэнчжи вместе с 8-й армией бежал из провинции Хунань, недавно войдя в [CHI.Capital.GetCapitalVictoryPointName].\n\nЗатем, принося искренние извинения за свой внезапный отъезд, генерал попросил у [CHI.GetLeader] прощения и предложил еще раз дать ему возможность сражаться в составе Национально-Революционной Армии. Номинально связанный с Временным Комитетом Действий, это может стать шансом для [CHI.GetLeader] устранить потенциального политического противника, однако Тан и его подчиненные невероятно талантливы на поле боя, и это все еще может принести чистую выгоду."
 hunan_events.107.a: "Во-первых, это было глупо."
 hunan_events.107.b: "В НРА нет места перебежчикам."

 hunan_events.108.t: "Чэн Цянь победил на выборах"
 hunan_events.108.d: "В то время как наш сторонник, Тан Шэнчжи, довольно внезапно покинул свой пост, чтобы принять участие в провинциальных выборах в Хунани, похоже, что он был не единственным гоминьдановским активистом с непомерными амбициями. Расположившись лагерем в отколовшейся провинции Гуйчжоу, остатки правого Гоминьдана позволили командующему 6-й армией Чэн Цяню занять свое место в гонке.\n\nПредприняв столь смелый шаг, генерал договорился с Тан Шэнчжи о совместном выдвижении в Гоминьдан, и благодаря их совместным усилиям ему удалось одержать победу на выборах. После этого было решено, что Чэн Цянь займет пост губернатора, в то время как Тан Шэнчжи сохранит за собой важное положение в правительстве.\n\nРадикалы внутри партии осуждают данный шаг как предательство из-за того, что Тан по сути примкнул к правому крылу партии, однако другие, особенно те, кто входит во Временный комитет действий, придерживаются мнения, что это была прекрасная победа и что мы получили ключевого союзника."
 hunan_events.108.a: "Должны ли мы были согласовывать эти действия?"

 hunan_events.109.t: "Чэн Цянь прибыл в Куньмин"
 hunan_events.109.d: "К удивлению всех жителей Куньмина, один из самых известных сторонников правого Гоминьдана и лидер 6-й армии Национально-Революционной Армии Чэн Цянь, по сообщениям, покинул свой лагерь в нашей части Гуйчжоу, пересек границу и попытался победить на выборах в Хунане. Еще более абсурдно то, что генерал, по-видимому, сделал это одновременно с Таном Шэнчжи из Левого Гоминьдана, который перебрался в Восточную Хунань из зоны Минганского Восстания.В тщетной попытке свергнуть Чжао Хэнти два генерала объединились в Единый Фронт, однако он был обречен с самого начала. Используя свое мастерское руководство политической сферой Хунани, Чжао очень легко разгромил все потуги со стороны Гоминьдана.\n\nКаким бы быстрым ни был их союз, Чэн и Тан расстались, и их пути разошлись. Эти события привели к текущему положению вещей, когда посрамленный генерал вернулся в Куньмин, предложив свои услуги [YUN.GetLeader]. Однако есть многочисленные опасения, что принятие его предложения вызовет ответный удар со стороны Чжили и Чжао в провинции Хунань. Другие предлагают арестовать вероломного генерала за действия против своего начальства."
 hunan_events.109.a: "Благородная попытка, конечно мы рады будем его принять."
 hunan_events.109.b: "Из-за него мы все можем пойти ко дну! Арестовать его!"

 hunan_events.111.t: "Левый Гоминьдан захватывает власть в Хунани!"
 hunan_events.111.d: "Тан Шэнчжи, командующий 8-й армией Национально-Революционной Армией, успешно сместил действующего губернатора Чжао Хэнти, выступив Единым фронтом Гоминьдана совместно с командующим 6-й армией Чэн Цянем. В разгар противостояния их с правительством ходят слухи о том, что в гарнизоне Юэян и его кукловодах в Пекине разворачивается настоящая паника.\n\nЧто еще более важно, Тан Шэнчжи негласно поддерживает Центральный комитет Гоминьдана, и, хотя он не столь идеологичен, как его коллеги по партии, ожидается, что он будет поддерживать линию ЦК в политических вопросах."
 hunan_events.111.a: "Мы должны пристально наблюдать за ним."

 hunan_events.112.t: "Правый Гоминьдан захватывает власть в Хунани!"
 hunan_events.112.d: "Чэн Цянь, командующий 6-й армией Национально-революционной армии, успешно сместил действующего губернатора Чжао Хэнти, выступив за объединение Гоминьдана совместно с командующим 8-й армией Тан Шэнчжи. В разгар противостояния их с правительством ходят слухи о том, что в гарнизоне Юэян и его кукловодах в Пекине разворачивается настоящая паника.\n\nЧто еще более важно, Чэн Цянь преданно поддерживает правые остатки Гоминьдана в Гуйчжоу, и хотя Тан Шэнчжи, безусловно, служит противовесом, обеспечивающим своего рода центристскую позицию, ожидается, что генерал присоединится к своим единомышленникам, если они захватят власть."
 hunan_events.112.a: "Государство-партия становится сильнее."

 hunan_events.113.t: "Тан Сянмин захватывает провинцию для Чжили"
 hunan_events.113.d: "Учитывая, что недавние выборы в провинции Хунань привели к формированию в Чанше правительства, настроенного против Чжили, было вполне ожидаемо, что чжилийский атташе в Юэяне Тан Сянмин будет склонен действовать. Как и ожидалось, удар был нанесен по неоперившемуся правительству в провинции Хунань. Солдаты Национально-революционной армии Чжили, объединившиеся с действующим правительством, предприняли отчаянную попытку остановить наступление..\n\nОднако ситуация изменилась, когда местные армии в провинции Хунань заколебались действовать в интересах своего предполагаемого губернатора, и тем самым судьба Гоминьдана была решена. Теперь военный губернатор Тан Сянмин вступил на тропу войны, твердо намереваясь искоренить все античилийское влияние в провинции, правя под дулом пистолета и нарушая недавно обновленную конституцию."
 hunan_events.113.a: "Печальная смерть для молодой демократии Хунани."
 hunan_events.113.b: "Тяжелые времена для Хунани."

 hunan_events.114.t: "Чжао Хэнти выиграл на выборах"
 hunan_events.114.d: "Несмотря на ожидаемую явку на недавно объявленных выборах губернатора провинции Хунань, Чжао Хэнти сумел одержать блестящую победу на выборах. Будучи федералистом до мозга костей, Чжао является отцом демократии в провинции Хунань и ее верным защитником. В то время как коалиция "Обьединенного Гоминьдана" оказалась серьезным соперником действующего губернатора, его умелая политическая игра и пламенные речи на фоне довольно хаотичных выборов обеспечили ему победу.\n\nВ очередной раз подтверждая свою приверженность демократии в Китае, он надеется, что Хунань послужит образцом для подражания для всех других провинций, однако, если Хунань окажется во внешней политике в изоляции, ему, возможно, придется поступиться своими принципами и обратиться за защитой к своему старому другу У Пэйфу."
 hunan_events.114.a: "Редко можно увидеть, чтобы человек следовал своим принципам."

 hunan_events.115.t: "Чжао Хэнти и Е Кайсин бегут"
 hunan_events.115.d: "Опустошенный политическим насилием и междоусобицами, которые последовали за победой Гоминьдана на недавних выборах в Хунане, Чжао впал в еще большее уныние после полной отмены выборов в Хунане, последовавшей за попыткой Тан Сянмина организовать чжилийский переворот против победителей в Чанша. Видя, что его любимая провинция и конституция запятнаны теми, кого он считает автократами, у экс-губернатора не осталось выбора.\n\nСобрав свои пожитки и установив контакт со своими преданными союзниками Е Кайсином и Хэ Яозу, эта троица, как сообщается, сбежала к любому правительству, которое может их принять. Будь то федералист или сторонник Чжили, стремящийся заручиться поддержкой, чтобы вернуть свою любимую провинцию и назначить его законным губернатором."
 hunan_events.115.a: "Прощай, Чжао Хэнти."

 hunan_events.116.t: "Прибытиет Чжао Хэнти и Е Кайсина"
 hunan_events.116.d: "В связи с недавними политическими событиями в провинции Хунань, ранее занимавший этот пост губернатор Чжао Хэнти был смещен в результате демократических выборов. Несмотря на уважение к демократическому процессу, политические оппоненты Чжао, похоже, не разделяют его стремления к демократии и после хаоса, вызванного попыткой государственного переворота в Чжили, они превратили провинцию в автократическую страну.\n\nНесмотря на кажущуюся подавленность, Чжао не из тех, кто безучастно наблюдает за гибелью демократии в Хунани: Чжао и его самые верные командиры прибыли в [ROOT.GetCapital], чтобы предложить свой опыт в обмен на то, что они вырвут его провинцию из лап деспотов.\n\nНекоторые в нашем правительстве очень рады и готовы принять Чжао, будь то из-за личных связей, взаимного уважения или идеологической принадлежности, имя экс-губернатора имеет большой вес. Однако в том же духе некоторые считают, что Чжао пора наконец уйти в отставку, поскольку он явно стал бесполезной силой в политическом и, возможно, военном отношении."
 hunan_events.116.a: "Наша битва еще не окончена!"
 hunan_events.116.b: "Тебе пора на покой, Чжао."

 hunan_events.117.t: "Тан Сянмин занимает Хунань!"
 hunan_events.117.d: "После внезапного ухода Тан Шэнчжи и его подчиненных из 8-й армии из Повстанческой Зоны многие ожидали, что его попытка занять пост губернатора провинции закончится неудачей и он вернется на наши позиции запуганным псом. Тем не менее, самым неожиданным стало то, что хитрый генерал заключил союз с лидером правого Гоминьдана и командующим 6-й армией Чэн Цянем, который также прибыл в провинцию примерно в то же время.\n\nПосле совместной кампании по объединению Гоминьдана против Чжао и других более мелких партий этому дуэту удалось одержать уверенную победу, но этому не суждено было сбыться. Гарнизон Юэяна, который был тисками чжилийцев на шее Хунани, был склонен предпринять отчаянную попытку вернуть Хунань чжилийцам, и, несмотря на смелую попытку, у истощенных сил 8-й и 6-й армий не было ни единого шанса противостоять натиску чжилийцев. После их поражения юэянский военачальник Тан Сянмин объявил военное положение, конституцию недействительной, а себя - губернатором.\n\nСпасаясь от ужасных преследований, члены партии вступили в ожесточенную дискуссию о том, следует ли им принимать объединенные силы Тана и Чэна, однако благодаря личному вмешательству Ли Цзишэня эти двое мужчин получили свои должности безоговорочно в знак доброй воли, к большому гневу [CHI.GetLeader]."
 hunan_events.117.a: "Еще больше людей попадут под террор милитаристов."

 hunan_events.118.t: "Тан Сянмин занимает Хунань!"
 hunan_events.118.d: "Несмотря на попытку Гоминьдана подавить влияние Чжао Хэнти в провинции Хунань, губернатору удалось одержать принципиальную победу перед лицом притока радикальных революционеров. Тем не менее, в провинции Хунань не все было хорошо, поскольку, несмотря на то, что Чжао занимал этот пост более десяти лет, ему все еще приходилось бороться с влиянием Чжили в своей провинции. На востоке, в Гуйчжоу, такие, как Юань Цзумин, с его связями с партией "Молодой Китай". На западе - двоевластие Хунань, управляемое деспотами Чэнь Цючжэнем и Тянь Инчжао, которые давно укрепили свои позиции. Что особенно важно, на севере - Тан Сянмин, правивший Юэяном как своей личной вотчиной.\n\nК сожалению для нас, оказалось, что Чжао не смог сохранить контроль над стабильностью в своей провинции, и в результате Тан Сянмин был отвергнут и вынужден был двинуться на столицу Чанша и свергнуть действующего губернатора во имя ликвидации хаоса и некомпетентности, которые царили в администрации Хунани. Таким поступком Тан решил разорвать все прежние дипломатические отношения с союзниками Чжао, включая [FROM.GetLeader], и переориентировать провинцию на своих чжилийских покровителей."
 hunan_events.118.a: "Чертов Мясник Хунани!"

 #Overlord Uniting China Events

 #Cheng
 hunan_events.119.t: "От 1911 к [GetYear]"
 hunan_events.119.d_rkmt: "С наступлением единства нации эпоха упадка и катастроф, связанная с военными-диктаторами, подходит к концу. Двигаясь вперед, Китай только начинает новую эру. Чтобы достичь этого, потребовалось принести много жертв. Многие товарищи пожертвовали своим будущим, чтобы мы могли жить дальше, и все же это принесло лучшее будущее целым поколениям. Китайский народ больше не будет изнемогать под гнетом мелких тиранов или военачальников, его надежды на лучшую жизнь больше не будут тлеющими мечтами, ведь разгорелось настоящее пламя Революции. Под эгидой Гоминьдана нация была воссоединена, и  Хунань в этом сыграла свою жизненно важную роль.\n\nПоскольку нация объединилась благодаря усилиям [THIS.overlord.GetNameDef], [hunan_events.GetLeader] считался ключевым лидером в революционной борьбе. Присоединившись к Тунмэнхуэю в 1905 году, он был свидетелем конфликтов с самого конца правления монархии Цин, во время войн за защиту конституции, Северной экспедиции и Второй китайско-японской войны. Всегда стремясь к безопасности, процветанию и единству населения провинции Хунань, он является ярким примером того, что значит быть настоящим революционером.\n\nХотя между [THIS.overlord.GetLeader] и [hunan_events.GetLeader] могут возникнуть разногласия по поводу реализации Трех принципов доктора Суня, тем не менее, они товарищи по оружию. В связи с предпринимаемыми усилиями по централизации [hunan_events.GetLeader] рассматривается возможность того, чтобы вновь занять должность в Центральном исполнительном комитете. С приближением периода реконструкции, национальной реконструкции и опеки, работа [hunan_events.GetLeader] еще не закончена."
 hunan_events.119.d_lkmt: "С наступлением единства нации эпоха упадка и катастроф, связанная с военными-диктаторами, подходит к концу. Двигаясь вперед, Китай только начинает новую эру. Чтобы достичь этого, потребовалось принести много жертв. Многие товарищи пожертвовали своим будущим, чтобы мы могли жить дальше, и все же это принесло лучшее будущее целым поколениям. Китайский народ больше не будет изнемогать под гнетом мелких тиранов или военачальников, его надежды на лучшую жизнь больше не будут тлеющими мечтами, ведь разгорелось настоящее пламя Революции. Под эгидой Гоминьдана нация была воссоединена, и Хунань в этом сыграла свою жизненно важную роль.\n\nПоскольку нация объединилась благодаря усилиям [ЭТОГО.overlord.GetNameDef], [hunan_events.GetLeader] считался ключевым лидером в революционной борьбе. Присоединившись к Тунмэнхуэю в 1905 году, он был свидетелем конфликтов с самого конца правления монархии Цин, во время войн за защиту конституции, Северной экспедиции и Второй китайско-японской войны. Всегда стремясь к безопасности, процветанию и единству населения провинции Хунань, он является ярким примером того, что значит быть настоящим революционером.\n\nСчитающийся аутсайдером по сравнению с различными фракциями и кликами Центрального комитета, [hunan_events.GetLeader] благодаря своему положению в провинции Хунань создал оплот для более умеренных членов Гоминьдана. Проводя обширные встречи с Сунь Фо и другими либерально настроенными членами партии, уважаемый генерал пользуется большим влиянием, и с ним желают сотрудничать все стороны. Несмотря на это, [hunan_events.GetLeader] официально сохраняет нейтралитет, не поддерживая ни одну из сторон, а лишь подтверждая свою приверженность Революции. С наступлением периода национального восстановления и приближением Третьего Конгресса [hunan_events.GetLeader], возможно, потребуется еще раз защитить жизни граждан Хунани."
 hunan_events.119.a: "Если бы только Хуан, Сун и Сунь могли смотреть на нас сейчас."

 #Tang S
 hunan_events.120.t_lkmt: "От Минганя к Фэнтяну"
 hunan_events.120.t_nokmt: "Подавленная Революция"
 hunan_events.120.t_rkmt: "Форпост радикалов"
 hunan_events.120.d_lkmt: "С наступлением единства нации эпоха упадка и катастроф, связанная с военными-диктаторами, подходит к концу. Двигаясь вперед, новая эра для Китая только начинается. Чтобы достичь этого, потребовалось принести много жертв. Многие товарищи пожертвовали своим будущим, чтобы мы могли жить дальше, и все же это принесло лучшее будущее целым поколениям. Китайский народ больше не будет изнемогать под гнетом мелких тиранов или военачальников, его надежды на лучшую жизнь больше не будут лишь тлеющими мечтами, ведь разгорелся настоящий революционный пожар. Под эгидой Гоминьдана нация была воссоединена, и благодаря этому Хунань сыграла свою жизненно важную роль.\n\nПоскольку нация объединилась благодаря усилиям [THIS.overlord.GetNameDef], [hunan_events.GetLeader] считался ключевым лидером в революционной борьбе. И все же никто бы не подумал, что [hunan_events.GetLeader] был настолько предан революционной миссии. Первоначально присоединившись к Тунмэнхуэю под влиянием Тан Жэньфэна, [hunan_events.GetLeader] участвовал в Синьхайской революции, но именно тогда его революционный пыл пошел на убыль. В 1926 году он снова поднял факел, и его истинное пламя превратило Китай в пекло, а его 8-я армия стала инструментом, с помощью которого он сжег все дотла.\n\nНаходясь в лагере Временного комитета действий, Тан много лет назад после Северной экспедиции помогал организовать мятеж в Мингане, а его 8-я армия выступала в качестве первоначальных основателей. Начав революционную борьбу в провинции Хунань, он продолжал ее в Маньчжурии и за ее пределами. Теперь, когда нация объединена, хор, призывающий к проведению Третьего Конгресса, становится все громче, и пришло время \"буддистскому\" генералу занять свое место."
 hunan_events.120.d_nokmt: "С наступлением единства нации эпоха упадка и катастроф, связанная с военными-диктаторами, подходит к концу. Двигаясь вперед, Китай только начинает новую эру. Чтобы достичь этого, потребовалось принести много жертв. Многие товарищи пожертвовали своим будущим, чтобы мы могли жить дальше, и все же это принесло лучшее будущее целым поколениям. Китайский народ больше не будет страдать под гнетом тех, кто хотел бы его обидеть, поскольку новая жизнь, полная процветания и счастья, уже не за горами. Под покровительством [THIS.overlord.GetNameDef] нация была обьединина, и благодаря этому Хунань сыграла свою жизненно важную роль.\n\nТеперь когда страна обьединена, многие члены партии, по крайней мере те, кто остался, обвиняют [hunan_events.GetLeader] в предательстве Революции, доктора Суня, принципов Гоминьдана. Однако их возражения противоречат истине. Ибо, если Тан действительно не представлял себе будущее в соответствии с Тремя принципами, зачем ему было внедрять их в своей родной провинции Хунань? Или, если уж на то пошло, укрывать и защищать беженцев Гоминьдана, поскольку их влияние в других провинциях ослабло. Революционный огонь Хунани, возможно, и был потушен, а ее идеализм отброшен в сторону в пользу бесконечного прагматизма, но лучше продолжать жить мечтой, чем позволить ей угаснуть.\n\nОказавшись белой вороной среди своих союзников, Тан, тем не менее, сыграл решающую роль в объединении нации, и, хотя Революция, возможно, и затихла, она продолжает развиваться все более уверенно. Возможно, Гоминьдан вырвется из Хунани в последней отчаянной битве против [THIS.overlord.GetLeader], возможно, они будут играть в медленную игру, ведя войну изнутри. Все это, в конечном счете, еще предстоит выяснить."
 hunan_events.120.d_rkmt: "С наступлением единства нации эпоха упадка и катастроф, связанная с военными-диктаторами, подходит к концу. Двигаясь вперед, Китай только начинает новую эру. Чтобы достичь этого, потребовалось принести много жертв. Многие товарищи пожертвовали своим будущим, чтобы мы могли жить дальше, и все же это принесло лучшее будущее целым поколениям. Китайский народ больше не будет изнемогать под гнетом мелких тиранов или военачальников, его надежды на лучшую жизнь больше не будут тлеющими мечтами, ведь разгорелось настоящее пламя Революции. Под эгидой Гоминьдана нация была воссоединена, и благодаря этому Хунань сыграла свою жизненно важную роль.\n\nПоскольку нация обрела единство благодаря [THIS.overlord.GetNameDef], [hunan_events.GetLeader] считался ключевым лидером в революционной борьбе. И все же никто бы не подумал, что [hunan_events.GetLeader] был настолько предан революционной миссии. Первоначально присоединившись к Тунмэньхуэю под влиянием Тан Жэньфэна, [hunan_events.GetLeader] участвовал в Синьхайской революции, но именно тогда его революционный пыл пошел на убыль. В 1926 году он снова зажег факел, и его пламя превратилось в пылающий жар, а его 8-я армия стала инструментом, с помощью которого он сжег все дотла.\n\nНесмотря на то, что Тан сыграл важную роль в формировании повстанческой зоны Минганя и был связан с левым крылом партии, он оказался радикалом среди умеренных и автократов. Несмотря на давление снизу, а именно со стороны радикалов, и сверху, Тан остается сильным, непоколебимым и стойким, укрепляя позиции Хунани в стране как очага социалистической мысли. Теперь, когда настало время национального возрождения, левый гоминьдан, возможно, больше не является доминирующей фракцией, но с ними не будет покончено, пока \"буддистский\" генерал правит своей провинцией."
 hunan_events.120.a_lkmt: "В ожидании Третьего Конгресса..."
 hunan_events.120.a_nokmt: "Последний оплот Гоминьдана."
 hunan_events.120.a_rkmt: "Несмотря на своры реакционеров вокруг, мы будем стоять до конца."

 #Zhao
 hunan_events.121.t_fed: "Демократическая Хунань!Демократический Китай!"
 hunan_events.121.t_zhili: "Островок демократии"
 hunan_events.121.t_feng_negotiation: "Республика,порожденная росчерком пера"
 hunan_events.121.d_fed: "Наконец-то наступает закат эры военачальников, а вместе с ними и светлое будущее. Наконец-то опускается занавес над самой мрачной эпохой нашей страны, и может начаться следующий этап.\n\nВ Хунане Чжао Хэнти успешно справился с хаосом 1936 года, после чего ему пришлось иметь дело с силами, которые хотели, чтобы молодая провинциальная демократия умерла в зародыше. Успешно обуздав влияние радикального Гоминьдана и изгнав мясника Тан Сянмина из своей провинции, Чжао продемонстрировал очевидную способность федералистской модели добиваться успеха и процветать.\n\nИ хотя Хунань является самой яркой историей успеха федералистского движения, это не единственный пример. [HNN_fed_central_government_desc] Федерализм продемонстрировал свою мощь и занял достойное место в движениях Китая. Учитывая наш успех, правительства других провинций наверняка обратятся к хунанской модели для защиты и поддержания своей демократии.\n\nПредстоит еще многое сделать, не все военноначальники еще побеждены, и о молодой федеральной демократии нужно заботиться. Но это вопросы будущего, сегодня мы можем праздновать, праздновать успех нашей провинции и успех нашей страны в целом. С закатом эры военачальников в Китае начинается новый, полный надежд рассвет этап."
 hunan_events.121.d_zhili: "Наконец-то наступает закат эры военачальников, а вместе с ними и светлое будущее. Наконец-то опускается занавес над самой мрачной эпохой нашей страны, и может начаться следующий этап.\n\nВ Хунане Чжао Хэнти успешно справился с хаосом 1936 года, после чего ему пришлось иметь дело с силами, которые хотели, чтобы молодая провинциальная демократия умерла в зародыше. Успешно обуздав влияние радикального Гоминьдана и изгнав мясника Тан Сянмина из своей провинции, Чжао продемонстрировал очевидную способность федералистской модели добиваться успеха и процветать.\n\nОставшаяся часть Китая была объединена правительством Чжили. Клика добилась истинного объединения, а не иллюзии единства, которая возникла после Северной экспедиции. Чжао, конечно, примкнул к Чжили отчасти из-за своих личных связей с У Пэйфу и Цзян Байли, а отчасти из-за желания, чтобы его провинция избежала дальнейшего кровопролития и потерь. Поскольку Хунань является островком демократии в объединенном Китае. Китайский островок демократии, способный сохранить своего избранного губернатора благодаря сделке Чжао с У в 1921 году, должен служить примером для всех, кто придерживается демократических идеалов в нашей стране..\n\nНаш островок будет служить важным напоминанием Китаю. Что демократия в нашей стране возможна. Губернатор Чжао верит, что хунаньская модель станет той, которой последует весь остальной Китай. Будущее может быть неопределенным, но есть надежда для будущего Китая."
 hunan_events.121.d_fengtian: "Наконец-то наступает закат эры военачальников, а вместе с ними и светлое будущее. Наконец-то опускается занавес над самой мрачной эпохой нашей страны, и может начаться следующий этап.\n\nВ Хунане Чжао Хэнти успешно справился с хаосом 1936 года, после чего ему пришлось иметь дело с силами, которые хотели, чтобы молодая провинциальная демократия умерла в зародыше. Успешно обуздав влияние радикального Гоминьдана и изгнав мясника Тан Сянмина из своей провинции, Чжао продемонстрировал очевидную способность федералистской модели добиваться успеха и процветать.\n\nОстальной Китай был объединен Фэнтянским правительством. Когда Чжан Цзолинь двинулся на юг, на Пекин, у Чжао не осталось друзей в Китае. Его прагматизм по отношению к Бэйяну и его республиканские идеалы привели к тому, что он начал переговоры с официальными лицами Фэнтяня. Будучи в состоянии сохранить местное самоуправление Хунани, он согласился признать новое правительство. Наша провинция - островок демократии в Китае, и мы сделаем все возможное, чтобы защитить его.\n\nНаш островок будет служить важным напоминанием Китаю. Что демократия в нашей стране возможна. Губернатор Чжао верит, что хунаньская модель станет той, которой последует весь остальной Китай. Будущее может быть неопределенным, но есть надежда для будущего Китая."
 hunan_events.121.d_feng_negotiation: "Наконец-то наступает закат эры военачальников, а вместе с ними и светлое будущее. Наконец-то опускается занавес над самой мрачной эпохой нашей страны, и может начаться следующий этап.\n\nВ Хунане Чжао Хэнти успешно справился с хаосом 1936 года, после чего ему пришлось иметь дело с силами, которые хотели, чтобы молодая провинциальная демократия умерла в зародыше. Успешно обуздав влияние радикального Гоминьдана и изгнав мясника Тан Сянмина из своей провинции, Чжао продемонстрировал очевидную способность федералистской модели добиваться успеха и процветать.\n\nНаряду с Хунанем, Чэнь Цзюнмин из Гуандуна пережил бурю 1936 года, и южные провинции служили все это время бастионом федерализма. Чжан пригласил обоих на свою “Объединительную конференцию”. После серии напряженных переговоров, в основном под руководством Чэна, соглашение было, наконец, достигнуто. Чжан соблюдает это соглашение, а федералисты поддерживают правительство в Пекине, признавая его истинным правительством Китая\n\nБлагодаря этому были спасены жизни бесчисленного количества людей, больше не будет проливаться ненужная кровь, что стало столь необходимой передышкой для народа Китая, который прошел через огонь эпохи военачальников. Теперь пришло время смотреть вперед, на формирование нового федерального правительства и нового Китая."
 hunan_events.121.a_fed: "\"И теперь мы можем насладится рассветом.\""
 hunan_events.121.a_zhili: "\"И все же мы надеемся.\""
 hunan_events.121.a_feng_negotiation: "\"Давайте вместе двигаться в сторону нового Китая.\""

