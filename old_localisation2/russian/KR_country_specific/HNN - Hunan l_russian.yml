 HNN_KR_gathering_storm_desc: "Окруженный со всех сторон милитаристами, Чжао Хэнти должен действовать осторожно, чтобы сохранить мир в Хунани, достигнутый с таким трудом. Чжао, сторонник федерализма, мечтает о свободном Китае, основанном на принципах провинциальной автономии и демократии. Однако внутренние и внешние угрозы ставят под сомнение федералистские планы Чжао.\nНационалистические силы под командованием Чэн Цяня и Тан Шэнчжи скрываются за границами Хунани, готовые к нападению, а адмирал Тан Сянмин будет следить за тем, чтобы влияние Чжили сохранилось в провинции. Сможет ли Чжао защитить демократию в Хунани или провинция падет перед лицом партийно-государственных и милитаристских сил?"
 
### Intro Screen ###
 HNN_country_intro_background: "GFX_HNN_intro"
 HNN_country_intro_header: "Хунань и Синхай"
 HNN_country_intro_content: "Будучи одной из первых провинций, присоединившихся к §lСинхайской Революции§! под руководством губернатора §RЦзяо Дафэна§!, Хунань переживала тяжелые времена. Когда §RЦзяо§! умер в сражении во время §lСинхайской Революции§!,его сменил §cТан Янкай§! в 1911. §cТан§! успел пробыть на должености всего 2 года, однако, из-за позиции нейтралитета в конфликте между §PЮань Шикаем§! и §gСунь Ятсеном§!, случилось так, что §PЮань сместил§! §cТана§! и заменил его §PТан Сянмином§!.\n\nПосле короткого шестимесячного губернаторства, отчасти из-за действий §PТанга§! в качестве исполняющего обязанности губернатора провинция переходила из рук в руки от одного губернатора к другому вплоть до 1916 года, во время которого §PТан Сянмин стал§! снова стал губернатором. Это губернаторство вновь продлилось всего несколько месяцев, и губернатор провинции Юньнань §gтан Цзияо§! провозгласил независимость после того, как §PЮань§! взошел на императорский трон в качестве императора §cПоднебесной§!. Подобно каскаду костяшек домино, провинция за провинцией начали следовать их примеру, присоединяясь к Юньнани и провозглашая независимость, и довольно скоро..."

 HNN_country_intro_header_1: "Неспокойные времена"
 HNN_country_intro_content_1: "...провинция Хунань оказалась в осаде, и местный военачальник §PТянь Инчжао§! Адмирал §PТан Сянмин§! заявил, что в качестве соломинки, которая сломала хребет верблюду, он выступил в поддержку НПА. В хаосе он бежал из Хунани на лодке, поднявшись вверх по Янцзы. В августе, премьер министр Центрального Правительства §PДуань Цижуй§! назначил §cТан Янкая§! губернатором провинции вновь. Этот срок не был длинее предыдущего, и  после краткого пребывания в должности §gЧэн Цяня§!, §PФу Линцзяо§! и §gЧжоу Чжаоциня§!, §PДуань Цижуй§! назначил §NЧжан Цзинъяо§! губернатором.\n\nПечально известный\"Мясник Хунани\" установил режим террора. Бандитизм и грабежи стали официальной правительственной политикой, а по всей провинции бушуют массовые беспорядки. Это безумие привело к тому,что §NЧжан§! был свергнут спустя 2 года, когда §cТан Янкай§! и его подчиненный, §cЧжао Хэнти§!, присоединились к восставшим и выгнали "Мясника" из провинции. К несчастью для §cТана§!, как и во всех предудыщих сроках губернаторов, он также продержался недолго.\n\nПо мере того,как возрастало давление со стороны федералистской интеллигенции, §cТан§! запаздывал с разроботкой конституции провинции, что в конце концов завершилось мятежом под руководством начальника гарнизона Лилиня, §gЧэн Цянем§!. Вместе с начальником штаба §cЧжао Хэнти§! отказавшимся помогать губернатору, §cТан Янкай§! вышел из игры и сдал власть §cЧжао§! прямо в руки."

 HNN_country_intro_header_2: "Десятилетие власти §cЧжао§!"
 HNN_country_intro_content_2: "§cЧжао Хэнти§! став новым губернатором Хунани, незамедлительно пригласил лучших умов Китая разработать конституцию, достойную Хунани и федералистских идеалов.. 1 января 1922 года, §cЧжао Хэнти§! официально провозгласил \"Конституцию провинции Хунань\", и в сентябре того же года стал первым демократически избранным губернатором.\n\nВо время его гражданский реформ, §cЧжао Хэнти§! поддержал нефритого маршала §PУ Пэйфу§! в 1925, после того как §gФэн Юйсянь§! предал его, поэтому услуга оказанная §PУ§! будет скоро возвращена. В середине 1926, два его подчиненных, §SТан Шэнчжи§! и §cЕ Кайсин§!, вступили в спор, в котором §cЧжао§! более склонялся на сторону §cЕ§!. Полагая,что губернатор стал проявлять фаворитизм, §SТан Шэнчжи§! изменил свои взгляды и присоединился к §RГоминьдану§! в Гуйчжоу, присоединившись к Северной Экспедиции.\n\nЭто привело к тому, что силы §cЧжао§! были разбиты наголову, и вытеснены из Хунани. Однако благодаря §cЕ Кайсину§!, федералисты обратились за помощью к  §PУ Пэйфу§! для отвовевания провинции. После разгрома Гоминьдана, §PУ Пэйфу§! назначил §cЧжао§! в качестве губернатора Хунани. Но §PУ Пэйфу§! был занят на Севере из-за четвертой Чжифэнской войны, из-за чего §cЧжао§! все еще угрожали остатки §RГоминьдана§! в Гуйчжоу и по всей провинции вообще, губернатор попал в трудную ситуацию.\n\nПризнав это единственным выходом, Чжао обратился к "Улыбающемуся Тигру" §PСун Чуанфаню§! с предложением принять провинцию в Лигу, несмотря на личную неприязнь ко всему этому. Однако неуверенный в действительной верности §cЧжао§!, У \"представил\" в качестве представителя Чжили при правительстве Хунани бывшего командира юэянского гарнизона §PТан Сянмина§!, вернувшегося в Хунань спустя десятилетие.\n\nС наступлением года Крысы, Хунань по прежнему под руководством §cЧжао§!, однако все еще сохраняется угроза падения "Дамоклового Меча" со стороны Чжили, наряду с проблемами в лице §PДиархии§! и §NСтарой клики Гуйчжоу§!, для всех нас грядут трудные времена..."

 HNN_guide: "§MАбсолютная власть губернатора§! (§PПатернализм§!)\n£white_dot Выберите §gЧэн Цяня§! или §SТана Шэнчжи§! во время §Yпровинциальных выборов§!\n£white_dot Когда §PТан Сянмин§! выдвинется из Юэяня, принимайте решения,которые помогут §PТану§! успешно свергнуть нынешнего губернатора.\n£white_dot Также, §PТан§! может взять власть свергнув §cЧжао Хэнти§!,если тот не сможет §Yподавить антидемократическую оппозицию§! в Хунани.\n\n§MДемократический мандат§! (§cСоциал-консерватизм§!)\n£white_dot Во время §Yпровинциальных выборов§!, убедитесь, что популярность §cЧжао Хэнти§! выше чем популярность §RЕдиного фронта Гоминьдана§!, или любой другой политической силы связанной с ними.\n£white_dot Чтобы сохранить власть §cЧжао§!, и предовратить переворот §PТан Сянмина§!, необходимо успешно завершить решения по подавлению §Yантидемократической оппозиции§! в Хунани.\n\n§MГоминьдан в Хунани§! (§gАвторитарная Демократия§! / §SСоциал-демократизм§!)\n£white_dot Во время §Yпровинциальных выборов§!, добейтесь того, чтобы популярность §RЕдиного фронта Гоминьдана§! была выше чем у  сторонников §cЧжао§!.\n£white_dot В самом начале выборов будет возможность выбрать кто будет лидером §RЕдиного Фронта§!.\n£white_dot Чтобы открыть путь §gАвангард Революции§!, выберите §gЧэн Цяня§! лидером.\n£white_dot Чтобы открыть путь §SТемная лошадка Революции§!, выберите §SТана Шэнчжи§! лидером.\n£white_dot Когда §PТан Сянмин§! выдвинется из Юэяна, выбирайте решения,которые приведут к провалу путча.\n"

