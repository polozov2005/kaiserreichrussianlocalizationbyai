 #譚延闓
 HNN_tan_yankai: "Тань Янькай"
 HNN_tan_yankai_advisor_desc: "§YРодился:§! §L25 января, 1880, Ханьчжоу, Чжэцзян, Империя Цин§!\n§YПолитическая принадлежность:§! §lРеспубликанец§!\n§YБиография:§! §LИзначально сторонник реформ Империи Цин и сторонник конституционной монархии, Тань становился все более радикальным по мере падения империи Цин. Тан стал губернатором Хунани в период ранней Республики, но был отстранен Юанем Шикаем. Он был заменен Таном Сянминем, который жестоко подавил революционеров во имя власти Юаня.\n\n"Мясник" был вынужден бежать из Чанши в 1916, и Лю Жэньси новым губернатором. Однако, он был неспособен контроллировать ситуацию, и Тань вернулся к должности губернатора. Когда Дуань Цижуй и Аньхойская клика взяли власть в Пекине, Тань был снова изгнан. Тань однако предпринял еще одну попытку возвращения в Хунань, поскольку губернатор Чжан Цзинъяо и его правительство были настолько нежффективными и коррумпированными,что заставило его бежать. Тань снова стал губернатором в 1920, и стал выступать за автономию провинций и мирное воссоединение.\n\nВ течении года, мятеж в Пинцзяне вынудил Тана уйти с поста губернатора в пользу Чжао Хэнти, и он покинул провинцию чтобы присоединиться к Сунь Ятсену в Гуанчжоу. Тань официально стал членом Гоминьдана в 1922, и предпринял попытку вернуть Хунань под контроль Гоминьдана в 1923, но был остановлен силами Чжао Хэнти. Он возглавлял 2-ую армию во время Северной Экспедиции, но попал в окружение в Хунане,когда немцы вторглись и захватили Гуанчжоу. Чжао пообещал Таню и его людям амнистию, которую он неохотно принял, и с тех пор жил в безвестности. Однако у Таня все еще есть желание служить своей стране, и если обстоятельства позволят это сделать, был бы рад возвращению в политику.\n\n§YПримечания: Он известен тем, что больше всего раз подряд занимал пост губернатора провинции Хунань. В общей сложности 4 раза.§!"

