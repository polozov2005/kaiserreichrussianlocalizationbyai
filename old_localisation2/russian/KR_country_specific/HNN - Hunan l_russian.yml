 #趙恆惕
 HNN_zhao_hengti: "Чжао Хэнти"
 HNN_zhao_hengti_bio: "Чжао Хэнти, губернатор Хунани уже более 10 лет. Родившийся в 1880,в Хэнъяне, Чжао Хэнти окончил курсы для китайских курсантов в Японской Военной Академии, выпустившись как артелирист. Он присоединился к движению Тутмэнхуэй под руководством Сунь Ятсена и принял участия в двух революциях как военноначальник. После разгрома Второй Революции, Чжао был заключен в тюрьму Тан Сянмином по поручению Юань Шикая. Он был освобожден два года спустя благодаря Цай Е, и принял командование над первой хунаньской дивизией. В 1920 он и Тан Янькай отстранил Чжана Цзиняо от должности губернатора, Тан стал губернатором, а Чжао стал командующим армией.\nПосле того как Чжао сместил бывшего начальника, и основал первое конституционалистское провинциальное движение в Азии, выраженное в Конституции региона Хунань, представленное демократическим региональным советом и возможностью выбирать губернатора, первые выборы которого,в 1922 году выиграл он. Как губернатор Хунани, Чжао ограничил собственную власть как губернатора, что было одобрено многими.\nC началом Северной Экспидиции, Чжао был изгнан из провинции своим бывшим подчиненым, Таном Шэнчжи. Он запросил помощь у Пэйфу, и он помог восстановить власть Чжао. Однако, теперь в Хунани он был военным губернатором, назначенным Центральным Правительством, а не избранным народом губернатором,как он хотел.\nПоскольку У смотрел на Север, Чжао Хэнти оказался связан с Лигой Восьми Провинцией, и несмотря на то, что он имел больше всех власти в своей провинции, имея право не подчиняться Сунь Чуаньфаню, он решил остаться с ним, чтобы избежать проблем с Германией."
