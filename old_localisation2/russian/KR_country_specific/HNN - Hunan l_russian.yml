 HNN_chen_GXC: "Чэнь Цзюнмин выдержал бурю в 1936 году и закрепил за собой два Гуана. Затем он отправился на север, из Гуанчжоу в Пекин, чтобы объединить остальную часть страны."
 HNN_chen_SZC: "В то время как Чэнь Цзюнмина вытеснили из Гуандуна, он триумфально вернулся в Сычуань и вышел из провинции, чтобы объединить остальную часть страны."
 HNN_tang: "Сохранив власть над Юньнанем, Тан Цзяо поднял флаг федерализма и прошел с ним от Гуанчжоу до Пекина и дальше."
 #Traits
 HNN_civilian_governor: ""Гражданский" губернатор\n§gТан Сянмин известен как ярый сторонник верховенства закона, но даже он готов вернуть хунаньцам их "демократию", но такую, где у бандитов вроде Тан Шэнчжи нет шансов использовать систему в своих целях. Пусть народ Хунани радуется, что мясник ушел, а на его место заступил гражданский губернатор!§!"
 HNN_civilian_governor_desc: "§LТан Сянмин не сказать, что известен как убежденный сторонник верховенства права, но даже он готов вернуть народу Хунани их «демократию», но такую, где у бандитов вроде Тан Шэнчжи не будет шансов злоупотреблять системой. Пусть жители Хунани ликуют, ведь Мясник ушел, и Гражданский Губернатор пришел!§!"

 HNN_commander_in_chief: "Верховный главнокомандующий\n§gВ 1916 году Тан Сянмин неустанно трудился, чтобы принести мир, свободу, справедливость и безопасность в свою новую провинцию. Однако подрывные элементы и разрушительные революционеры уничтожили все, к чему он стремился. Тан Сянмин - словно отец для хунаньского народа, и все должны радоваться, что безграничная любовь главнокомандующего к Хунани не знает границ!§!"
 HNN_commander_in_chief_desc: "§LВ 1916 году Тан Сянмин неустанно трудился, чтобы принести мир, свободу, справедливость и безопасность в свою новую провинцию. Однако подрывные элементы и разрушительные революционеры уничтожили все, к чему он стремился. Тан Сянмин был подобен отцу для народа Хунани, и все должны радоваться, ведь безграничная любовь главнокомандующего к Хунани не знает границ!§!"

 HNN_inspector_general: "Генеральный инспектор Сян-Юэ-Гуй"

 HNN_first_son_of_the_revolution: "Первый сын революции\n§gРеволюционно-социалистические заслуги Тан Шэнчжи, ставшего зачинщиком Северного похода, ясны как день. Кто-то может назвать его оппортунистом, но те, кто действительно знает Тана, понимают, что он - региональный прагматик, борющийся за народ Хунани на каждом шагу.§!"
 HNN_first_son_of_the_revolution_desc: "§LТан Шэнчжи, ставший отправной точкой Северной экспедиции, демонстрирует безупречную приверженность революционным социалистическим идеям. Некоторые могут осуждать его как оппортуниста, но те, кто действительно знает Тана, понимают, что он — простой, но прагматичный человек, борющийся за народ провинции Хунань. На каждом шагу.§!"

 HNN_old_guard_revolutionary: "Революционер старой школы\n§gЧэн Цянь был свидетелем многих событий, неустанно сражаясь за освобождение и свободу китайского народа со времен Синьхая. Будучи стойким сторонником умеренности перед лицом авторитарного подъема партии, он, тем не менее, самоотверженно служит Гоминьдану, выполняя свой долг до последнего вздоха.§!"
 HNN_old_guard_revolutionary_desc: "§LЧэн Цянь многое повидал, неустанно борясь за освобождение и свободу китайского народа со времен Синьхайской республики. Несмотря на склонность к умеренности перед лицом авторитарного подъема партии, он самоотверженно служит Гоминьдану, исполняя свой долг до последнего вздоха.§!"

