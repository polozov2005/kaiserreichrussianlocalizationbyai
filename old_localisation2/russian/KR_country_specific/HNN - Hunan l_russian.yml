 #宋希濂
 HNN_song_xilian: "Сун Силянь"
 HNN_song_xilian_advisor: "§YРодился:§! §L9 апреля, 1907, округ Сянсан, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §g6-я армия§!\n§YБиография:§! §LРодившийся в богатой крестьянской семье, Сун был первым сыном среди преобладающих в семье дочерей, и его отец и дядя специально обучали его классической поэзии. Окончив несколько частных школ, В 1921 году Сун поступил в среднюю школу Чанша Чанцзюнь, где он впервые почувствовал вкус к революционной деятельности. Активно учавствуя в студенческом движении, Сун был соосноватлеем стенгазеты \"Гром\",критиковавшей империализм, варлордов, и особенно Чжао Хэнти — за расстрел им двух рабочих активистов, Хуан Айя и Пан Жэнцюаня.\n\nПосле зачисления в начальный лагерь армейских курсов, под руководством Чэна Цяня, Сун убедил Чэнь Гена, среди прочих, присоединиться к нему и отправиться в недавно открытую военную академию Вампоа. Став самым молодым выпускником из первой группы курсантов Вампоа, он присоединился к Гоминьдану в июне 1924 года и участвовал в Восточной экспедиции против Чэнь Цзюнмина. Отличившись в Северной экспедиции, люди Сун Силяня даже сошлись в рукопашной схватке с чжилийским военачальником Мэн Чжаоюем.\n\nОднако с началом коллапса Северной Экспедиции по всем фронтам, Сун обнаружил, что отступает с несколькими армиями в Гуйчжоу, где он желает воссоединиться со своим старым наставником Чэн Цянем.§!"

 #楊杰
 HNN_yang_jie: "Ян Цзе"
 HNN_yang_jie_theorist_desc: "§YРодился:§! §L25 января, 1889, округ Дали, Юньань, Империя Цин§!\n§YПолитическая принадлежность:§! §g6-я армия§!\n§YБиография:§! §LС юных лет Ян Цзе был прилежным учеником, и вопросы, которые он задавал своим учителям и одноклассникам, лишали их дара речи, а о нем говорили, что у него фотографическая память. Однако, пропустив экзамены в Пекинский педагогический университет, Ян в конечном итоге перевелся в начальные курсы при Юньнаньской армии, начав свою военную карьеру. Позже он выпустился в первой волне из Баодинской армейской академии ускоренного обучения пехотного дела, а в 1907 году был направлен на изучение артиллерии в Императорскую академию армии Японии.\n\nВ этом учебном заведении Ян Цзе познакомился с Чан Кайши и в 1909 году присоединился к Тунмэнхуэю. После выпуска в 1911, Ян Цзе вернулся как раз вовремя, чтобы принять участие в Синьхайской революции. Получив звание полковника, Ян вернулся в Юньнань, чтобы присоединиться к развивающейся Юньнаньской армии Цай Е. Служа на различных военных должностях в Юньнани и Сычуани, в том числе начальником кавалерии и преподавателем в Юньнаньской военной академии, Ян Цзе в конечном итоге стал военным советником при Президентском дворце в Пекине и советником военного министерства, а в 1921 году уехал учиться в военный колледж армии Японии, где Ян получил бы большое восхищение от своих одноклассников и был бы награжден саблей от японского императора как лучший ученик своего класса.\n\nЯн, изучавший древние войны Китая, географию, стратегию и тактику, считался блестящим специалистом в области военной теории, и благодаря своей переписке с Сунь Ятсеном, Чэн Цянем и Сюй Чунчжи, он вернулся в Китай, чтобы служить при Сунь Юэ в качестве начальника штаба. В 1926,он ушел, чтобы присоединиться к Национально-революционной армии, став генеральным советником 6-й армии и командиром дивизии.\n\nПосле того, как Чэн Цянь отправился в изгнание после Северной экспедиции, Ян Цзе продолжил развивать свой острый ум в области военной теории и стал одним из самых способных генералов во всей НРА.§!"

 #李明灝
 HNN_li_minghao: "Ли Минхао"
 HNN_li_minghao_army_chief_desc: "§YРодился:§! §L19 сентября 1897, округ Лилинь, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §g6-я армия§!\n§YБиография:§! §LСолдат по своей натуре, Ли Минхао на 4 поток курсов  Первого Армейского Училища Цинхэ в возрасте 20 лет, в 1919 году окончил китайские классы Академии Императорской армии Японии и перешел в нее для изучения пехотного дела, благодаря своей отличной успеваемости.После окончания школы Ли поступил в Военную академию Чанша в качестве инструктора. После получения личного предложения от Чэн Цяня в 1923 году, Ли начал служить в качестве подполквоника в военно-политическом отделе командования Гуанчжоу, возглавляемого Сунем Ятсенем, где вступил в Гоминьдан.\n\nВ том же году, Доктор Сунь назначил Чэн Цяня министром обороны и (хотя и ненадолго) директором Военной академии Вампоа, после этого назначения Чэн назначит Ли Минхао полковником и начальником отдела образования в Вампоа. Позже, Ли станет офицером штабы при командовании Хубейской армии, под руководстом доктора Суня, а позже - стал начальник штаба войск Чэн Цяня в Восточной экспедиции против Чэнь Цзюнмина. Принимал участие в Северной экспедиции в качестве командира 54-ого полка 18-ой дивизии в составе 6-й армии Чэн Цяня, Ли последовал за Чэн Цянем и остальной частью 6-й армии в Гуйчжоу после провала экспедиции на всех фронтах. Однако, будучи всегда на чеку, Ли продолжал усердно работать и в конце концов был назначен командиром 17-й дивизии.\n\nНа фоне эскалации напряженности в отношениях между Шестой и Восьмой армиями Чэн Цянь в очередной раз повысил Ли Минхао до генерал-майора, пытаясь уравнять шансы в противостоянии с чередой быстрых назначений Тана Шэнчжи.§!\n\n§YПримечания: Многие считают, что Ли Минхао, касательно принципов Гоминьдана, довольно политически отчужденный, питает симпатии к левому Центральному Комитету и Синдикалистской Партии Китая. Однако никаких доказательств, подтверждающих этого нет.§!"

 #LKMT
 #彭德懷
 HNN_peng_dehuai: "Пэн Дэхуай"
 HNN_peng_dehuai_high_command_desc: "§YРодился:§! §L24 октября, 1888, округ Сянтань, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §R8-я армия (Радикалы)§!\n§YБиография:§! §LРодился в бедной крестьянской семье, Пэн был старшим сыном в семье. В 1904, Пэн отправился в Шаньшаньли, чтобы учиться в частной школе своего дяди. Однако через два года Пэну пришлось бросить учебу, так как его мать и младший брат умерли, а его отец страдал астмой и поэтому не мог обеспечить семью средствами к существованию. Небольшие сбережения его семьи таяли, и Пэн работал на нескольких изнурительных работах, чтобы свести концы с концами. Пэн был очарован И Хуа, крестьянской армией, которая совершала набеги на богатых, чтобы помочь бедным, и в 1916 году стал солдатом.\n\nПэн начал свою карьеру на службе у Тан Сянмина и прославился своей храбростью, быстро продвигаясь по служебной лестнице. После того как Пэн помог изгнать Чжана Цзинъяо из провинции Хунань, он помог Обществу борьбы с бедностью убить местного притеснителя-землевладельца. В 1923 году Пэн окончил военную академию в провинции Хунань и взял себе имя Дэхуай. В 1926 году Пэн стал командиром первой дивизии 8-й армии под руководством Тана Шэнчжи. Пэн использовал устав Ассоциации по борьбе с бедностью в качестве устава солдатского комитета.\n\nКогда НРА потерпела крах и 8-я армия оказалась под угрозой со всех сторон, Тан возглавил бегство в Цзянси, чтобы избежать встречи с войсками Чжао. Пэн очень быстро поднялся по службе в 8-й армии во время восстания Минган, зарекомендовав себя как самый способный офицер Тана. У Пэна также завязалась крепкая дружба с Хэ Луном, основанная на общем крестьянском происхождении обоих, их взаимной неприязни к угнетателям-землевладельцам и сильной приверженности крестьянского социализма. После того, как он проработал в Мингане почти десять лет, Пэн готов сбросить оковы империализма с Поднебесной и построить новый Китай, свободный и равный для всех.§!"

 #何鍵
 HNN_he_jian: "Хэ Цзян"
 HNN_he_jian_sic_desc: "§YРодился:§! §L10 апреля, 1888, округ Сянтань, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §g6-я армия§!\n§YБиография:§! §LХотя первоначально он хотел сделать карьеру в гражданской администрации, после начала Синьхайской революции он заметил, что можно достичь более высокого статуса и известности благодаря относительно быстрому продвижению по службе новых армий современного образца Бэйян.\n\nПоступив в Хунаньскую офицерскую школу в Чанше, Хэ Цзянь поступил в училище в Нанкине, а затем в 3-ю армейскую подготовительную школу Учан в провинции Хубэй, прежде чем, наконец, поступить в 3-й поток Военной академии Баодин для изучения пехотного дела, которую окончил в 1916 году. Вернувшись в Хунань в надежде на стабильную карьеру, он не смог осуществить свои мечты, когда в 1917 году начались восстания против губернатора Тан Сянмина. После этого он решил сформировать свой собственный местный партизанский отряд с разрешения Чжао Хэнти, чтобы противостоять бэйянским захватчикам.\n\nПытаясь использовать свое подразделение для ведения переговоров, он был назначен командиром батальона в полку, которым командовал Тан Шэнчжи, начав долгую карьеру вместе с последним. Следуя примеру Тана в продвижении по службе, как и Ли Пинсянь, он присоединился к Национально-революционной армии и Гоминьдану в качестве командира 2-й дивизии 8-й армии. Получив назначение в Северную экспедицию, он последовал за 8-й армией в Минган, но у него сложились отчужденные отношения с убежденными социалистами Хэ Луном и Пэн Дэхуаем.\n\nПолучив повышение в свете последних политических событий, Хэ Цзянь теперь, возможно, является третьим по влиянию членом Гоминьдана в провинции Хунань и стремится так или иначе осуществить ряд своих долгосрочных реформ.§!"

 #李品仙
 HNN_li_pinxian: "Ли Пиньсянь"
 HNN_li_pinxian_army_chief_desc: "§YРодился:§! §L22 апреля, 1890, округ Цанву, Гуанси, Империя Цин§!\n§YПолитическая принадлежность:§! §S8-я армия§!\n§YБиография:§! §LЛи, родившийся в известной семье в округе Цанву, вырос в привилегированном окружении, ознакомившись с классикой и получая хорошее образование, активно занимаясь поэзией и прозой. Одержав победу как на окружном, так и на государственном экзаменах, Ли в конечном счете был поставлен в тупик на экзамене в колледже — он случайно пропустил страницу в документе.\n\nПосле того как его академическая карьера была разрушена, Ли поступил в начальную школу армии Гуанси при Цай Е, начав тем самым свою военную карьеру.Окончив школу в 1909 году, он поступил на военную службу и в 1911 году окончил среднюю школу 3-й армии в Ухане, одновременно непосредственно участвуя в Уханьском восстании.\n\nНадеясь помочь революции, Ли отправился в Гуанси, чтобы разжечь там революцию, но ему помешало провозглашение независимости Лу Жунтином.Позже, в 1912 году, Ли поступил в 1-й класс Военной академии в Баодине для изучения пехоты, окончил ее в следующем году и, столкнувшись с недовольством в армии Гуанси, перевелся в армию Хунань, где познакомился со своим бывшим одноклассником Таном Шэнчжи. Всякий раз, когда Тан получал повышение, Ли должен был следовать за ним, пройдя путь от командира взвода до командира бригады за 8 лет.Последовав за Таном в Национально-революционную армию, Ли стал командиром 3-й дивизии 8-й армии и сражался в составе Северной экспедиции, позже присоединившись к Гоминьдану.После провала экспедиции он, в конце концов, остался ждать своего часа в Мингане, храбро сражаясь.\n\nЛи занимает промежуточное положение между левым и правым Гоминьданом, хотя официально остается \"аполитичным"\, сосредоточившись на своей военной работе.§!\n\n§YПримечания:Благодаря своему образованию, Ли в свободное время пишет стихи, и все, кто с ним знакомится, считают его дружелюбным и жизнерадостным человеком в НРА.§!"

 #劉建緒
 HNN_liu_jianxu: "Лю Цзянсуй"
 HNN_liu_jianxu_high_command_desc: "§YРодился:§! §L2 октября, 1892, округ Лилинь, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §g6-я армия§!\n§YБиография:§! §LНачав свою военную карьеру в подготовительной школе 3-й армии Ухани в 1913 году,Лю Цзяньсю виделся довольно стандартный карьерный путь для офицера. Окончив ее в 1915 году, Лю поступил в 3-й класс Военной академии в Баодине, где изучал артиллерийское дело и познакомился с будущим командующим 8-й армией Хэ Цзянем. После окончания, Лю Цзянсуй в 1-ю дивизию армии Хунаня под командованием Чжао Хэнти, а позже присоединился к местному партизанскому отряду Хэ Цзяня, чтобы бороться с вторжением бэйянцев. Вслед за Хэ Цзянем, поступившим на службу к Тану Шэнчжи, бесстрашный Лю стал самым способным командиром Хэ Цзяня и своего рода доверенным лицом.\n\nВо время Северной Экспедиции,Бригада Лю Цзяньсюя отличилась, захватив Юэян, захватив арсеналы в Гуйшане и Ханьяне, и успешное организовав восстание против командира гарнизона Ханьяна Лю Цзолуна, в результате которого путь на Ханьян и Ханькоу был восстановлен. После окончания экспедиции Лю последовал за Хэ Цзянем в Минган, где они вдвоем сформировали антисоциалистический блок в составе 8-й армии.\n\nС повышением Хэ Цзяня до звания генерала Лю Цзяньсюй последовал за ним и продолжал помогать своему другу на каждом шагу, вплоть до назначения последнего в управление по умиротворению и сохранению мира в сельской местности провинции Хунань.§!"

 #劉興
 HNN_liu_xing: "Лю Син"
 HNN_liu_xing_high_command_desc: "§YРодился:§! §L22 ноября, 1887, округ Циян, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §S8-я армия§!\n§YБиография:§! §LВ 1912 году Лю поступил в военную академию Баодин на командира пехоты вместе с Таном Шэнчжи, после того как Лю окончил базовый курс и 3-ю подготовительную школу в Ухане, они так сильно избили своих военных инструкторов, что Министерство в ярости отправило их домой. В 1916 году мясник Тан Сянмин был изгнан из провинции Хунань, а Тан Шэнчжи и Лю были приглашены новым военным губернатором Лю Жэньси на службу. В последующие годы Лю продолжал служить под началом своего друга, дослужившись до должности командира бригады. Когда в 1926 году Чжао Хэнти дал Тану отпор и ему пришлось бежать в Гуанчжоу, Лю последовал за ним в изгнание.\n\nГоминьдан приказал Тану реорганизовать свои войска в 8-ю армию НРА, а Лю был назначен командиром 4-й дивизии. Во время Северной экспедиции Лю лично взял на себя командование и отбил Ханькоу у войск У Пэйфу. Несмотря на успех Лю, Северная экспедиция обернулась катастрофой, и Лю бежал вместе с Таном в сельские районы Цзянси и Фуцзян.Прошло десять лет с тех пор, как началась Северная экспедиция, но Лю остается таким же верным Тану Шэнчжи, каким он был, когда они вдвоем отправлялись в Баодин.§!"

 #龔浩
 HNN_gong_hao: "Гун Хао"
 HNN_gong_hao_high_command_desc: "§YРодился:§! §LСентябрь 1887, округ Иян, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §S8-я армия§!\n§YБиография:§! §LОднокурсник Тана Шэнчжи по 1-му классу Военной академии в Баодине, Гун Хао, учившийся на кавалериста в Баодине, с ранних лет симпатизировал революционерам. Гун Хао участвовал как в Учанском восстании 1911 года, так и в войне 1916 года. После окончания правления Юань Шикая Гун Хао поступил в 5-й класс Штабного училища в Пекине и окончил его в 1919 году. В 1921 году Гун вернулся в Хунань, чтобы служить в штабе Тана Шэнчжи. Когда Тан присоединился к Гоминьдану, Гун служил начальником штаба 8-й армии.\n\nКогда Северная экспедиция провалилась, Гун последовал за Таном в Цзянси, где 8-я армия скрывалась до тех пор, пока силы ВКД не объединились с Таном, чтобы поднять Минганское Восстание. Возможно, Гун и не самый преданный подчиненный Тана, но он способный инструктор и помогает обучать новобранцев Тана военному искусству.Гун, которого многие любят, известен своей скромностью и гостеприимством. Он тратит большую часть своего свободного времени за чтением книг по истории и классической китайской литературе, в особенности интересуюясь лаоцизмом и даосизмом..§!"

 #陶廣
 HNN_tao_guang: "Тао Гуан"
 HNN_tao_guang_high_command_desc: "§YРодился:§! §L1887, округ Лилинь, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §S8-я армия§!\n§YБиография:§! §LХотя Тао изначально был художником, он решил сменить профессию и обучался в нескольких военных академиях в Пекине и Нанкине. После окончания университета он отправился в Юньнань и служил как штабной офицер. Когда он вернулся в свою родную провинцию Хунань после смерти Цай Э, он служил под началом Чэн Цяня и Тан Шэнчжи. Во время Северной Экспедиции он стал командиром 26-го полка 8-й армии.\n\nОн участвовал в сражениях за мосты Тингси и Хэшенг и был назначен командиром бригады. Хотя битва при Ухане стала катастрофой для Гоминьдана, Тао смог сохранить тысячи орудий для 8-й армии, чем заслужил повышение до командира дивизии. Тао последовал за Таном в Цзянси после того, как военные усилия Гоминьдана потерпели крах. Десять лет боевых действий в районе Минган превратили его в опытного партизана, и офицер, которого Тан Шэнчжи очень уважает.§!"

 #唐生明
 HNN_tang_shengming: "Тан Шэнминь"
 HNN_tang_shengming_commander_desc: "§YРодился:§! §L10 октября, 1906, округ Дунъань, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §S8-я армия§!\n§YБиография:§! §LЧетвертый брат генерала Тана Шэнчжи, Тан Шэнмин окончил Военную академию Вампоа в 1926 году. Когда Гоминьдан потерпел крах во время Северной экспедиции, Тан последовал за своим братом и скрылся в горных районах Цзянси и Фуцзянь. Он продолжил служить своему старшему брату, когда в 1932 году было организовано восстание в Мингане, вплоть до распада Лиги в 1936 году. Tан и его старший брат захватили Хунань для Гоминьдана, а далее случилось повышение Тан Шэнмина до звания генерала, что свидетельствует о растущем влиянии 8-й армии на политическую жизнь Хунани.\n\n§YNotes: Многие считают назначение его младшего брата явным признаком кумовства, что свидетельствует о растущем влиянии Тана Шэнчжи, несмотря на то, какими качествами или навыками на самом деле обладал Тан Шэнмин.§!"

 #Feds
 #賀耀祖
 HNN_he_yaozu: "Хэ Яоцзу"
 HNN_he_yaozu_high_command_desc: "§YРодился:§! §L8 мая, 1889, округ Нинсян, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §cФедералист§!\n§YБиография:§! §LРодившийся в богатой семье, он получил частное образование в семейном учебном заведении, а позже поступил в академию Ютань.Поступив в подготовительную школу армии Хунаня, а затем в 3-е военное училище армии Учан, он окончил их и был направлен в 11-й китайский класс Императорской академии армии Японии для изучения материально-технического обеспечения из-за своей исключительной успеваемости. Во время своего пребывания там он присоединился к Тунмэнхуэю, а затем принял участие в Синьхайской революции. По просьбе Хуан Сина он вернулся учиться в Японию, а в 1916 году вернулся в Китай, чтобы принять участие в различных революциях, возглавляемых доктором Сунь Ятсеном\n\nВ следующем году он поступил на службу в армию провинции Хунань под командованием Чжао Хэнти и за 6 лет неуклонно продвигался по служебной лестнице от командира полка до командира дивизии. Находясь под огромным давлением, вынуждавшим его последовать примеру Тана Шэнчжи, предать Чжао и присоединиться к Национально-революционной армии, он в конечном счете проявил твердость, вместо этого сражаясь против сил НРА, когда они вторглись в Хунань. Сражаясь стойко и решительно, дивизия Хэ в конечном счете была вытеснена из Хунани преследующими ее 8-й, 6-й и 7-й армиями. Однако, заручившись поддержкой Чжили, наряду с предательством Юань Цзумина, армия провинции Хунань, возглавляемая Хэ, Е Кайсинем и Чжао Хэнти, смогла вновь обеспечить свое присутствие в провинции Хунань, уничтожив 8-ю и 2-ю армии Гоминьдана.\n\nТеперь, когда в провинции Хунань установилось некоторое подобие стабильности, он старается поддерживать строгую службу и дисциплину в армии провинции Хунань, чтобы им, возможно, больше никогда не пришлось полагаться на помощь Чжили.§!"

 #葉開鑫
 HNN_ye_kaixin: "Е Кайсинь"
 HNN_ye_kaixin_high_command_desc: "§YРодился:§! §L1885, округ Нинсян, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §cФедералист§!\n§YБиография:§! §LРодившийся и выросший в Хунани, Е Кайсинь поступил в Цзяннаньский университет в Уси в 1903 году. После окончания университета он вернулся в Хунань и в 1913 году командовал второй дивизией хунаньской армии. Именно в это время он познакомился с Чжао Хэнти и стал его близким доверенным лицом. В 1923 году Чжао передал Е командование третьей дивизией Хунани.n\n\nКогда Северная экспедиция достигла Хунани, именно Е Кайсинь немедленно повел свою армию против Тана Шэнчжи, но был вынужден покинуть Хунань и бежал вместе с Чжао в У Пэйфу и Чжилийскую провинцию.. У сделал Е Начштаба хунаньской армии, и когда Северная экспедиция обернулась в пользу Чжили, именно войска Е отбили Чаншу, официально передав ее под контроль Чжили, но ни для кого не было секретом, что Е хотел вернуть Чжао к власти в Хунани.\n\nК счастью для генерала, У Пэйфу решил назначить Чжао губернатором провинции Хунань, и гражданский контроль над провинцией вскоре был восстановилен, поскольку войска Гоминьдана были вытеснены. Не будучи большим поклонником Сунь Чуаньфана, он согласился со вступлением Хунани в Лигу восьми провинций, хотя и предпочитает держать свою армию на восточной границе, не доверяя Суню, который примет автономию Хунани или подавит мятеж в зоне Минган.\n\nВ течение почти последнего десятилетия Е Кайсинь был доволен существующим положением вещей, лоялен к Чжао и дружен с Северными Чжили, он является одним из главных генералов, на которых Чжао может положиться, и пользуется поддержкой губернатора провинции Хунань.§!"

 #龔憲
 HNN_gong_xian: "Гун Сянь"
 HNN_gong_xian_high_command_desc: "§YРодился:§! §L1892, округ Чанша, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §cФедералист§!\n§YБиография:§! §LГун Сянь прошел военную подготовку, чтобы стать военным офицером в Чанше, и попал в 1-ю дивизию армии Хунаня. Он служил под руководством Хэ Яоцзу, который, в свою очередь, был подчиненным Чжао Хэнти. Когда началась Северная экспедиция, Чжао был почти изгнан из Хунани навсегда, но Чжилийская клика смогла вернуть Чжао в провинцию, когда Гоминьдан пал. Гун Сянь известен как храбрый офицер, хотя некоторые могут назвать его безрассудным.\n\n§YПримечания: Целеустремленный командир, он часто проявляет приступы почти самоубийственной храбрости,как нарример, ведя своих солдат против численно превосходящих врагов во время Северной экспедиции, преследуя их днем и ночью.\n\nВозглавляя наступления, он много раз чуть не погибал в бою, но каким-то чудом всегда держался на плаву.§!"

 #陶峙岳
 HNN_tao_zhiyue: "Тао Чжиюэ"
 HNN_tao_zhiyue_army_chief_desc: "§YРодился:§! §L18 сентября 1892, округ Нинсян, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §cФедералист§!\n§YБиография:§! §LТао Чжиюэ поступил в Хунаньское армейское училище в 1907, и выпустился в 1911 году,во время Синьхайской революции. Он отправился в Ухань, чтобы поступить в среднюю школу 3-й армии, и принял участие в Уханском восстании. После того как Тао окончил 2-й класс военной академии в Баодине, где он изучал пехотное дело, Тао вернулся в Хунань и стал штабным офицером при губернаторе. Тао провел большую часть своей военной карьеры в провинции Хунань под руководством Хэ Яоцзу, после участия в Северной экспедиции. Его служба Хэ сделала его известным офицером в клике Чжао.\n\n§YПримечания: Известный управленец с прогрессивными идеалами, Тао Чжиюэ приложил много усилий для ослабления этнической напряженности в провинции Хунань и часто использовал своих солдат для защиты крестьян от злоупотреблений знати.\n\nНекоторые считают, что Тао Чжиюэ имеет симпатии к Гоминьдану из-за его связей с Чжан Чжичжуном.§!"

 #蔣鋤歐
 HNN_jiang_chuou: "Цзян Чуоу"
 HNN_jiang_chuou_high_command_desc: "§YРодился:§! §L1891, округ Дунъань, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §cФедералист§!\n§YБиография:§! §LОкончив кадровое армейское училище Гуанси, Цзян Чуоу вступил в армию провинции Хунань после участия в Синьхайской революции. Цзян участвовал во многих конфликтах, таких как война национальной обороны, изгнание Чжана Цзиняо, отражение попытки Тань Янькая вернуться в провинцию и восстание Тана Шэнчжи.Под руководством Е Кайсиня Цзян остается способным офицером под началом Чжао Хэнти, даже если Е, возможно, становится слишком политизированным для офицера.\n\n§YПримечания:Известный сторонник модернизации армии, Цзян проявлял особый интерес к разработке бронетанковой техники и железнодорожной артиллерии. Свои взгляды он описал в статье \"Заметки о расследовании военных перевозок в Европе и Америке"\, в которой подробно рассказывается о достижениях в области технологий на Западе.§!"

 #Zhili

 #陳渠珍
 HNN_chen_quzhen: "Чэнь Цюйчжэнь"
 HNN_chen_quzhen_high_command_desc: "§YРодился:§! §L22 сентября, 1883, округ Фэнхуан, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §PДиархия§!\n§YБиография:§! §LВ 1906 году Чэнь Цюйчжэнь начал свою воинскую карьеру, служа офицером в новой армии Хунани, а затем сражаясь с тибетскими сепаратистами во время Синьхайской революции. После падения династии Цин,Чэнь Цюйчжэнь вернулся в свою родную провинцию Хунань и стал подполковником штаба и заместителем начальника штаба гарнизона Сянси.\n\nВ 1917 году начнется война за защиту Конституции. Чэнь посоветовал своему начальнику Тянь Инчжао дождаться дальнейшего развития событий. Когда Чжан Сюэцзи заявил о своей преданности Гуанчжоу, Тянь Инчжао последовал его примеру и организовал первую маршевую армию движения Защиты, начальником штаба которой стал Чэнь. Чэнь был назначен исполняющим обязанности командующего армией в 1921 году, когда Тянь переехал в Чаншу после прихода к власти Чжао Хэнти.\n\nКогда в 1926 году сычуаньский военачальник Сюн Кэу вторгся в провинцию Хунань, губернатор Чжао Хэнти признал Чэня пограничным послом Сянси. После Северной экспедиции Гоминьдана для Чэня мало что изменилось, и он продолжал сохранять свою власть в регионе вплоть до года Крысы, с молчаливого согласия Чжао.§!\n\n§YПримечания: В то время как его друг и наставник Тянь Инчжао остается его номинальным начальником, пристрастие Тяня к опиуму и передача полномочий Чэню фактически сделали их равными, и они правят западной Хунанью в режиме двоевластия. За ним также наблюдает командир гарнизона Юэян Тан Сянмин, но он остается в стороне от политических интриг в Чанше, предпочитая подождать и посмотреть, как будут развиваться события.§!"

 #田應詔
 HNN_tian_yingzhao: "Тянь Инчжао"
 HNN_tian_yingzhao_commander_desc: "§YРодился:§! §L1876, округ Фэнхуан, Хунань, Империя Цин\n§YПолитическая принадлежность:§! §PДиархия§!\n§YБиография:§! §LВ 1896 году Тянь поступил в общевойсковую школу армии Хунань, а затем был выбран для поступления в токийскую Шинбу Гакко, военную подготовительную школу, созданную для начинающих китайских военных офицеров. В 1904 году Тянь, будучи пехотным курсантом 4-го китайского класса Академии Императорской армии Японии, познакомился в Японии с Сунь Ятсеном и вступил в его революционную партию "Тунмэнхуэй". Вернувшись в Китай в 1906 году, Тянь стал генеральным директором Сычуаньской военной академии, где готовил будущих сычуаньских военачальников Лю Сяна и Ян Сена, и участвовал в Синьхайской революции.\n\nПосле возвращения в Хунань в 1913 году Тан Янькай назначил его посланником Чжэньюаня, Чжэнтая и Сянси. Когда началась война за защиту конституции, Тянь последовал совету своего заместителя начальника штаба Чэнь Цюйчжэня подождать дальнейшего развития событий и заявил о своей верности Гуанчжоу только после того, как находящийся неподалеку военачальник Чжан Сюэцзи присоединился к Суню. Во время войны Тянь занял город Чандэ, но затем был вытеснен из Сянси Фэн Юйсяном, что вынудило его отступить в Юаньлин.\n\nЗа это время у Тяня развилась опиумная зависимость, и он передавал Чэню все больше и больше полномочий. В 1921 году новый губернатор Чжао Хэнти пригласил Тяня в Чаншу для реорганизации гарнизона Сянси. Тянь оставил Чэня исполняющим обязанности командующего в Сянси, и такое положение дел сохраняется по сей день.§!\n\n§YПримечания: Aпоскольку Тянь оставался в Чанша более десяти лет, его друг и подчиненный Чэнь Цюйчжэнь обрел власть, правя вместо Тяня, фактически уравняв их в правах. Хотя Тянь и Чэнь принадлежат к старой хунаньской клике Чжао, они не обязательно лояльны к нему.§!"

 #周西成
 HNN_zhou_xicheng: "Чжоу Сичэн"
 HNN_zhou_xicheng_high_command_desc: "§YРодился:§! §L7 апреля, 1893, округ Тунчжи, Цзянси, Империя Цин§!\n§YПолитическая принадлежность:§! §nСтарая клика Гуйчжоу§!\n§YБиография:§! §LЧжоу родился в семье землевладельца и в 16 лет поступил в государственную начальную школу Миндэ уезда Тунчжи. Окончив ее в 1911 году, он решил заняться боевыми искусствами. Чжао Вэньбинь, выпускник военной академии в Баодине, хотел набрать солдат из Северного Гуйчжоу, поэтому Чжоу и его шурин Мао Гуансян присоединились к его армии. После Синьхайской революции Чжоу был передан в подчинение военного губернатора Ян Цзиньчэна на должность заместителя командующего.\n\nЯн начал вторжение в Хунань и захватил Чандэ, где должен был дислоцироваться Чжоу. В следующем, 1913 году, Юньнаньцы захватили Гуйчжоу, и Чжоу был демобилизован. Во время войны за национальную безопасность Чжоу служил под командованием Дай Кана, который вторгся в Сычуань. Дай был убит во время боя, и Чжоу повел свой батальон на прорыв через позиции сычуаньцев и на возвращение в Гуйчжоу. К 1922 году Чжоу установил контроль над своей бригадой, хотя он все еще находился под общим командованием Юань Цзумина.\n\nОпасаясь амбициозного Юаня, Чжоу сблизился с его ближайшим окружением и завоевал его доверие. Когда Гоминьдан начал Северную экспедицию, Юань вступил с ними в союз из соображений удобства, но затем предал их по предложению своего подчиненного Чжао Юсуна. Пекин назначил Юаня губернатором Гуйчжоу, но большая часть Гуйчжоу все еще находилась под контролем юньнаньской армии. Такое положение дел продолжалось почти десять лет, и Чжоу по-прежнему остается на стороне Юаня.\n\n§YПримечания: У него репутация человека, который всегда руководит своими подразделениями прямо на фронте, непосредственно контролируя своих подчиненных\n\nЧжоу известен своими обширными операциями по борьбе с бандитизмом в Гуйчжоу, создав главное управление по защите торговцев в провинции и различные контрольно-пропускные пункты для торговцев, а также систему страхования торговцев.\n\nСпособный на крайнюю жестокость, Чжоу известен тем, что сурово наказывал любую коррупцию в пределах своей юрисдикции, обезглавив множество коррумпированных чиновников и расстреляв других в прошлом.§!"

 #龍雲飛
 HNN_long_yunfei: "Лун Юньфэй"
 HNN_long_yunfei_high_command_desc: "§YРодился:§! §L1886, округ Фэнхуан, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §PЧжилли§!\n§YБиография:§! §LЭтнический мяо-яо, Лун Юньфэй покинул дом в 18 и стал бандитом. Присоединившись к Гэ Лаохуэю, он провел последующие годы за азартными играми, контрабандой сигарет и сопровождением торговцев.Как и другие выдающиеся бандиты того времени, после Синьхайской революции он был назначен командиром дивизии, получив ряд повышений от командира батальона до командира дивизии. Действуя в регионе Сянси на западе провинции Хунань, Лун работает на Сянсийскую диархию Тянь Инчжао и Чэнь Цюйчжэня, и, хотя он не самый благородный человек, по крайней мере, он хороший, честный бандит.\n\n§YПримечания: Сообщается, что Лонг владеет более чем 14 гектарами земли в провинции Хунань из-за своей нелегальной предпринимательской деятельности, однако он отказывается уточнять, где находится эта земля.§!"

 #戴季韜
 HNN_dai_jitao: "Дай Цзитао"
 HNN_dai_jitao_army_chief_desc: "§YРодился:§! §L1891, округ Фэнхуан, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §PДиархия§!\n§YБиография:§! §LОкончив в 1921 году 14-е классы Юньнаньской военной академии, Дай Цзитао изучил инженерное дело и отправился служить в свою родную провинцию Хунань. В 1925 году он был назначен командиром учебного батальона пограничной охраны в Сянси под командованием Тянь Инчжао и Чэнь Цюйчжэня.Его положение пошатнулось, когда гоминьдановцы начали вторжение в Хунань, но, к счастью для него, Национальная Революция потерпела крах, и У Пэйфу установил контроль над Южным Китаем. Губернатор Чжао был вполне доволен тем, что гарнизон Сянси оставался таким, каким он был большую часть десятилетия, и Дай по-прежнему привержен фактическому руководству Чэня в Сянси.\n\n§YПримечания: Дай начал собирать и подробно описывать все деяния диархии Сянси под правлением Чэнь Цюйчжэня и Тянь Инчжао, якобы для того, чтобы опубликовать историческую статью об их правлении.§!"

 ##- Admiral -##
 #楊宣城
 HNN_yang_xuancheng: "Ян Сюаньчэн"
 HNN_yang_xuancheng_navy_chief_desc: "§YРодился:§! §L 1889, Чанша, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §LАполитичный§!\n§YБиография:§! §LЯн Сюаньчэн родился в простой семье и начал свою жизнь с сельского хозяйства и учебы. В юном возрасте Ян отправился изучать военно-морское дело в Японии, а позже присоединился к обществу Хуасин, прототонменхуэйской группе, основанной Хуан Сином и Сун Цзяореном. После возвращения в Китай он служил артиллерийским офицером на корабле "Чутай" военно-морского флота династии Цин.\n\nВ 1913,республиканское правительство отобрало группу молодых людей, проявивших исключительные заслуги, для обучения за границей. По рекомендации Хуан Сина Ян должен был поступить в бизнес-школу Калифорнийского университета, однако из-за того, что его командировочные были отменены, Ян вернулся в Японию, чтобы работать переводчиком в политико-юридической школе, которой руководил Хуан Син в Токио. Вновь вернувшись в Китай в 1916 году, Ян стал преподавать в Хунаньском педагогическом университете, а в 1920 году был назначен директором отдела связей провинции Хунань.\n\nДобросовестно проработав в правительстве Чжао более десяти лет, Ян приобрел опыт работы на новых должностях в правительстве провинции, занимаясь защитой и обеспечением безопасности водных путей провинции Хунань. Однако, обладая знанием новых революционных методов ведения войны с помощью разведки и честолюбивым желанием вновь вернуться в море, Ян вполне может когда-нибудь осуществить свое желание.§!"

