 HNN_financial_recovery_category_desc_loc_kmt_6th: "§g6-ой армии§!"

 HNN_kmt_leader_tang: "Тан Шэнчжи"
 HNN_kmt_leader_cheng: "Чэн Цянь"
 HNN_kmt_sic_tang: "Тан Шэнчжи"
 HNN_kmt_sic_cheng: "Чэн Цянь"

 HNN_agricultural_reform_mission_timer: "Реформа сельского хозяйства"
 HNN_agricultural_reform_mission_timer_desc: "Хунань переживает значительные изменения в своем наиболее важном секторе экономике, предпринимаются серьезные усилия по преодолению феодальной трясины. Решения, которые может принять правительство, могут ускорить ход реформ, но какой ценой? В любом случае, Хунань не сможет по-настоящему восстановиться, пока не разрешится аграрный кризис."

 HNN_increase_taxation: "Пересмотреть налогообложение"
 HNN_increase_taxation_desc: "Для того чтобы должным образом профинансировать наши экономические реформы, крайне важно, чтобы мы увеличили объем поступлений в нашу казну. Хотя мы не осмеливаемся слишком сильно нарушить хрупкое равновесие сельскохозяйственной системы провинции Хунань, пересматрев наш земельный налог наряду с другими налогами и сборами, мы сильно поколеблем благосостояние дворян и других землевладельцев. Они, без сомнения, будут протестовать, кричать о тирании или о полной анархии."

 HNN_maintain_order_in_countryside: "Восстановить порядок в сельской местности"
 HNN_maintain_order_in_countryside_desc: "Сельское общество в настоящее время переживает потрясения в более широком культурном восприятии того, что значит быть крестьянином и землевладельцем. Чтобы пресечь любые попытки крестьянства объединиться против правительства или его бюрократов, единственным справедливым ответом является, по крайней мере, попытка уравнять систему. Требуя проведения регулярных проверок поместий и введения принудительного составления бюджета для дворянства, они должны значительно склонить чашу весов в пользу крестьян. Аналогичным образом, чтобы предотвратить любое распространение антиправительственных настроений и риторики, направление дополнительных сотрудников полиции в сельскую местность поможет в поддержании безопасности и вызовет благодарность дворянства."

 HNN_emphasising_cooperation: "Сотрудничество с дворянством"
 HNN_emphasising_cooperation_desc: "В то время как правительство действует справедливо, добросовестно и логично в решении земельного вопроса, дворянство и элиты все еще продолжают яростно протестовать против любых попыток посягнуть на их политическое влияние. В соответствии с нашими принципами, мы направим многочисленных правительственных комиссаров для проведения личных встреч с местными землевладельцами и заверения их в том, что их права защищены в максимальной степени."

 HNN_limited_redistribution: "Ограниченное перераспределение земли"
 HNN_limited_redistribution_desc: "Поскольку уже был проведен ряд реформ, направленных на завоевание доверия как крестьянства, так и землевладельцев, настало время предпринять серьезные согласованные усилия для решения проблемы в корне. При абсолютной лояльности нового поколения районных чиновников мы будем проводить ограниченную политику перераспределения земель, находящихся под нашим контролем. Предоставляя им преимущественное право на покупку земли в пределах их территории и поддерживая заявки фермеров со стороны правительства, мы обеспечим постепенную реорганизацию пестрой сети пахотных земель в провинции Хунань без необходимости открытого насилия."

 HNN_strike_against_landowners: "Забастовка против землевладельцев"
 HNN_strike_against_landowners_desc: "[HNN_strike_against_landowners_desc_loc]"
 HNN_strike_against_landowners_desc_nokmt: "Несмотря на то, что губернатор обеспечивал безопасность и относительную стабильность для землевладельцев в течение десяти лет, а глобальный финансовый кризис нанес ущерб Хунани, дворяне продолжают мобилизовывать свои силы, чтобы остановить наши усилия по проведению земельной реформы. Отказываясь видеть причину и уважая только силу, правительство должно играть более активную роль в их повседневной жизни. Направляя армейские подразделения в деревни, мы покажем дворянам, что правительство настроено серьезно. И если они продолжат препятствовать нашим усилиям, то потеряют права на свои земли."
 HNN_strike_against_landowners_desc_kmt: "Слишком долго коррумпированные деспоты из Бэйяна правили в Хунане, слишком долго им удавалось раскалывать провинцию и крестьянство, превратив их в разрозненную, отвратительное феодальное царство, и слишком долго правительство отказывалось действовать. Больше не надо. Когда Гоминьдан наконец пришел к власти, мы полностью поддержим простых людей и мобилизуем их на ответный удар по их тираническим повелителям. Хотя мы должны проявлять некоторую сдержанность, чтобы не воцарилась анархия, вооружение крестьянства и подготовка местной милиции для защиты их интересов покажут элитам, что с крестьянства Хунани хватит, и правительство услышало их крики."

 HNN_supporting_non_compliance: "Поддержка кампании неповиновения"
 HNN_supporting_non_compliance_desc: "Не все формы противостояния элитам основаны на насилии или даже на хаосе. Существует мирный метод, который по-прежнему наносит наибольший ущерб интересам и доходам дворянства. Субсидирование крестьянских семей для заключения соглашений о \"неповиновении\", огромное количество потенциальных фермеров просто откажутся трудиться на полях. При защите и поддержке правительства все, что нам останется сделать, - это дождаться, пока элиты сядут за стол переговоров."

 HNN_reducing_gentry_control: "Уменьшить влияние дворянства"
 HNN_reducing_gentry_control_desc: "[HNN_reducing_gentry_control_desc_loc]"
 HNN_reducing_gentry_control_desc_kmt: "Несмотря на наши постоянные усилия понять суть проблем крестьянства, дворянство продолжает оставаться в стороне, отчаянно цепляясь за свое богатство или политическую власть, которые они могут получить. Их несправедливость и сопротивление только продолжают раздражать как радикальных идеологов Гоминьдана, так и крестьянство. Занимая различные должности в органах местного управления, дворяне набивают карманы чиновников, превращая честных бюрократов, работающих на правительство, в инструменты для дальнейшей эксплуатации. Однако с установлением власти Гоминьдана мы освободим от должности всех, кто симпатизирует элите в районных правительствах, и направим на их места наши собственные кадры."
 HNN_reducing_gentry_control_desc_nokmt: "Несмотря на наши постоянные усилия понять суть проблем крестьянства, дворянство продолжает оставаться в стороне, отчаянно цепляясь за свое богатство или политическую власть, которые они могут получить. Их упорное стремление придерживаться старых методов привело к большому разочарованию в правительстве, а многочисленные представители элиты фактически вошли в состав провинциальной ассамблеи, которая является политической оппозицией нашим продолжающимся реформам. Отказываясь видеть причину, губернатор решил, что необходимы радикальные действия. Заменив местных окружных судей свежими кадрами из Чанша, те, кто привержен идеалам федерализма, будут руководить даже на самом низком уровне управления. Таким образом, мы можем только надеяться, что препятствия со стороны дворянства прекратится."

 HNN_seizing_estates: "Конфискация недвижимости"
 HNN_seizing_estates_desc: "[HNN_seizing_estates_desc_loc]"
 HNN_seizing_estates_desc_nokmt: "Наконец, последняя преграда была сломлена. Когда-то губернатор был близкими союзником дворян, работал вместе с ними над обеспечением стабильности в провинции Хунань, но их постоянные попытки держаться за традиции и прошлое привели к их краху. Не имея другого выхода и испытывая глубокое сожаление, губернатор санкционировал силовой захват, национализацию и перераспределение всех дворянских владений, которые, как считается, нарушают принципы программы сельскохозяйственной реформы. Есть надежда, что это станет последним шагом на пути к освобождению крестьян Хунани от их оков."
 HNN_seizing_estates_desc_kmt: "Непрекращающаяся наглость землевладельцев по-прежнему дорого обходится прогрессу провинции и нации в целом. Как Хунань может способствовать завершению Национальной Революции, если она слишком медлительна, слишком осторожна, чтобы решать внутренние проблемы?Одобренная всеми членами правительства провинции Хунань, военнослужащие Национально-революционной армии проследят за захватом элитных поместий и земельных владений для последующего перераспределения в программе \"Земля к румпелю\". Таким образом, проблема с дворянством будет окончательно решена, и Хунань сможет с надеждой смотреть в светлое будущее."

 HNN_cheap_credit: "Доступные кредиты"
 HNN_cheap_credit_desc: "Сельское хозяйство в Хунане сталкивается с серьезными проблемами, из-за которых фермеры часто залезают в долги, поскольку они инвестируют в жизненно важные современные инструменты, такие как удобрения, в надежде на обильный урожай, который компенсирует их расходы. Однако при плохом урожае эти финансовые проблемы усугубляются и приводят к возникновению хронической задолженности. Чтобы поддержать наших тружеников, давайте договоримся с банками о предоставлении кредитов по выгодным ставкам. Кроме того, мы будем работать над предоставлением страхования урожая непосредственно заинтересованным фермерам, что даст им чувство финансовой безопасности в такие тяжелые времена."

 HNN_maintaining_proper_irrigation: "Поддержка орошения"
 HNN_maintaining_proper_irrigation_desc: "Благодаря процветанию и плодородию, которые дает река Сян, Хунань является провинцией с большим природным разнообразием и сельскохозяйственным производством. Однако к западу от нас находятся земли провинции Гуйчжоу. Несмотря на то, что провинция сама по себе является относительно процветающей, неумелое управление Юань Цзумина и Тана Цзию привело к серьезной неравномерности в урожаях сельскохозяйственной продукции. Благодаря строительству оросительных каналов, отводимых от реки Сян, мы можем создать новые водохранилища, чтобы гарантировать, что ни один урожай не будет по-настоящему худородным."

 HNN_modernising_our_communication: "Улучшить наши средства связи"
 HNN_modernising_our_communication_desc: "Как и правительства других провинций, Хунань внимательно следит за достижениями в области глобальных телекоммуникационных технологий, стремясь к прогрессу в модернизации и благам, которые он дает. В то время как в предыдущие десятилетия в Хунани большинство существующих телеграфных систем были связаны исключительно с военными вопросами. Учитывая наш новый подход к развитию, давайте работать над расширением нашей сети не только в наших округах, но и таким образом, чтобы добиться более широкой интеграции в национальную сеть в целом. Только благодаря таким усилиям Хунань действительно станет современной провинцией."

 HNN_kaili_to_changsha: "С Запада на Восток"
 HNN_kaili_to_changsha_desc: "Если честно, железнодорожная сеть по всему Китаю, мягко говоря, похожа на оборванные участки бечевки. Разобщенная по своей природе и часто остающаяся изолированной в пределах границ провинций, это самая тяжелая ситуация, с которой, однако, придется подождать до национального объединения. Благодаря более тесной интеграции провинции Хунань с внутренними торговыми путями страны, Чанша обладает редким преимуществом - прямой линией из Пекина в Гуанчжоу. Однако такая грандиозная железная дорога плохо отражает тот факт, что даже в пределах нашей провинции один из наших крупных городов остается отделенным от столицы. Используя государственное финансирование, мы заручимся поддержкой местных железнодорожных компаний, чтобы, наконец, соединить Кайли с остальной частью страны."

 HNN_industrial_reform_mission_timer: "Реформа промышленного сектора"
 HNN_industrial_reform_mission_timer_desc: "В провинции Хунань, где происходят значительные изменения в промышленном секторе, предпринимаются серьезные усилия по устранению несправедливости и пренебрежительного отношения к городским центрам, существовавших десятилетиями. Решения, которые может принять правительство, могут ускорить ход реформ, но какой ценой? В любом случае, Хунань не сможет по-настоящему восстановиться, пока не разрешится промышленный кризис."

 HNN_pursuing_new_partners: "Поиск новых экономических партнеров"
 HNN_pursuing_new_partners_desc: "В конечном счете, для того чтобы преобразовать нашу некогда ориентированную на экспорт экономику в экономику, стремящуюся к самообеспечению, необходимо будет мобилизовать не только правительство, но и народ. Уделяя особое внимание местным экономическим партнерам в рамках наших новых предприятий, мы обеспечим, чтобы потребление и покупка товаров хунаньского происхождения номинально осуществлялись в пределах провинции Хунань, а полученные доходы использовались для развития самой провинции."

 HNN_securing_urban_support: "Завовоевать поддержку горожан"
 HNN_securing_urban_support_desc: "В течение довольно долгого времени городские центры провинции Хунань были очагами развития синдикалистской партии Китая, что способствовало расколу между администрацией и рабочими. Это привело к большому расколу, эффективно пресекающему любые попытки выслушать их сомнения, а также к тому, что правительство также стало проповедовать наши заверения. Несмотря на то, что это, без сомнения, невероятно дорого, нам, без сомнения, необходимо еще раз объединить усилия рабочих и правительства, поскольку у прогресса нет времени на мелкие дрязги."

 HNN_economic_controls_board: "Учредить совет по экономическому контролю"
 HNN_economic_controls_board_desc: "Порицаемые защитниками капитализма в нашей провинции как авторитаризм со стороны правительства, подготовленные планы по созданию Совета по экономическому контролю провинции Хунань предусматривают, что руководящий орган будет контролировать потоки импорта посредством лицензирования. Совет директоров с большой осторожностью будет исключать нежелательные иностранные товары, которые будут иметь несправедливое преимущество по сравнению с собственным внутренним производством в провинции Хунань. Однако спорный аспект этого плана заключается в том, что лицензирование распространяется не только на продукцию за пределами Китая, но и на продукцию, производимую за пределами провинций, что в конечном итоге наносит ущерб национальному воссоединению. Хотя это делается с тяжелым сердцем, крайне важно довести восстановление экономики Хунани до конца."

 HNN_zhuzhou_industrial_zone: "Промышленная зона Чжучжоу"
 HNN_zhuzhou_industrial_zone_desc: "Расположенный на реке Сян и железной дороге Гуанчжоу-Ухань, город Чжучжоу является одним из лучших объектов недвижимости для более активного экономического развития. Правительство, недавно выбравшее это место в рамках нашей программы промышленной реформы, надеется на довольно амбициозное развитие города, превращение его в промышленную зону Чжучжоу благодаря его огромному потенциалу. Хотя построенные там заводы будут принадлежать государству, это, несомненно, повысит мощь отечественной металлургической и химической промышленности провинции Хунань."

 HNN_reinforce_the_banks_of_hunan: "Укрепление банковского сектора"
 HNN_reinforce_the_banks_of_hunan_desc: "Не будучи способными конкурировать с торговыми центрами Гуанчжоу, Уханя или Шанхая, местные банки провинции Хунань в основном либо были выкуплены предприятиями, не находящимися под контролем провинции, либо обанкротились иным образом. Несмотря на то, что финансовые рынки Хунани приносят стабильность и прибыль, существуют многочисленные опасения, что крупные державы, владеющие указанными учреждениями, скорее позаботятся о том, чтобы их активы в Хунани были ликвидированы, когда их сочтут убыточными, чем сохранят их на благо народа. Более того, Китай - многоликая страна, и у каждой из них есть своя собственная валюта. Банкам часто приходится иметь дело с сочетанием легальной, местной и нелегальной валюты, что привело к серьезному недоверию к стоимости национальной валюты провинции Хунань. Хотя с введением национальной валюты придется подождать до объединения, возможно, при надлежащем государственном надзоре и создании центрального банка, мы можем заложить основу для более активного развития провинции в будущем."

 HNN_influx_of_capital: "Приток капитала"
 HNN_influx_of_capital_desc: "Недавний всплеск притока валюты и инвестиций в провинцию Хунань дал правительству возможность убедиться в значительных успехах, которые будут достигнуты в будущем. Потенциальные инвесторы изучали возможность расширения производства наших отечественных аграрных продуктов, таких как чай, рами и конопля, другие изучали острую потребность провинции Хунань в грандиозных инфраструктурных проектах для реальной поддержки наших промышленных реформ. Мы в полной мере воспользуемся этой новой суетой в провинции, гарантируя, что мы сможем предоставить все, что нужно этим инвесторам и их проектам."

 HNN_privatise_railroads: "Приватизация железных дорог"
 HNN_privatise_railroads_desc: "Поскольку провинция Хунань связана с центральной железнодорожной сетью Гуанчжоу-Пекин, правительство провинции часто сталкивалось с попытками частных покупателей извлечь выгоду из прибыльного потенциала такого соединения. Однако до сих пор главари в Чанше фактически отказывались от распределения и продажи такого важного для провинции транспортного средства. Тем не менее, поскольку наши промышленные реформы продвигаются быстрыми темпами, а потенциальных покупателей железных дорог становится все больше, возможно, пришло время, наконец, приватизировать железную дорогу. Сокращение потребности правительства в обслуживании такой линии и, по-видимому, получение столь необходимого капитала для дальнейшего строительства железных дорог по всей провинции."

 HNN_acquiring_foreign_expertise: "Перенять зарубежный опыт"
 HNN_acquiring_foreign_expertise_desc: "Хорошо разбираясь в вопросах местной культуры и национального общества в целом, оживленная интеллектуальная жизнь Хунани оказывает огромное влияние на общий интеллектуализм в провинции, предоставляя нашим университетам и школам великих мастеров, у которых могут учиться будущие поколения. И все же, как это ни парадоксально, наши местные эксперты в области промышленности изо всех сил стараются сохранить поступательный темп, заложенный нашими учебными заведениями. В дополнение к этому правительство приступит к реализации программы найма иностранных работников, в рамках которой те, кто обладает знаниями в области современной промышленности и электроники, будут приглашены для обучения наших собственных работников и менеджеров, чтобы промышленность провинции Хунань действительно вступила в новую эпоху."

 HNN_attack_SZC: "Инкорпорировать [FROM.GetNameDef] в Южнокитайский Политический Совет"

 HNN_attack_YUN: "Инкорпорировать [FROM.GetNameDef] в Южнокитайский Политический Совет"

 ###Chen Qian Democratic Reforms
 HNN_expanding_local_elections_category: "Строительство фундамента демократии"
 HNN_expand_local_elections_decision: "Расширить местную демократию в [HNN_expand_local_elections_decision_loc]"
 HNN_expand_local_elections_decision_desc: "Несмотря на его наилучшие пожелания, все надежды на достижение подлинного компромисса с демократическими традициями Хунани были разрушены насильственными действиями Тана Шэнчжи. Однако успешный компромисс, достигнутый при посредничестве Гоминьдана и различных республиканских организаций, позволил провести ограниченные демократические выборы в провинции Хунань, которые были признаны жизнеспособными для выхода за рамки необходимости в опеке.\n\nХотя для обеспечения надлежащей демократии требуется гораздо больше логистики, чем просто создание новых урн для голосования и привлечение большего количества голосов. Кандидаты должны будут пройти тщательную \"проверку\", чтобы убедиться в их верности Трем Принципам, и потребуется определенная степень утонченности, чтобы гарантировать, что ни один из этих местных советов никогда не пойдет не в ногу с председателем провинции. В противном случае, это только вопрос времени, когда реакционеры или милитаристы сорвут местные выборы в Хунани."

 HNN_local_elections_guizhou: "Кайли"
 HNN_local_elections_chenyuan: "Чандэ"
 HNN_local_elections_xiangjiang: "Чанша"

 ###Tang Shengzhi Communes
 HNN_constructing_rural_autonomy_category: "Создание сельских автономий"
 HNN_constructing_rural_autonomy_decision: "Развивать коммуны в [HNN_construct_rural_autonomy_decision_loc]"
 HNN_constructing_rural_autonomy_decision_desc: "Твердо убежденный в том, что основой Национальной Революции является сила китайского крестьянства, Тан Шэнчжи обнародовал программу официальной государственной поддержки создания местных сельских коммун, разумеется, под эгидой партии, с тем чтобы делегировать полномочия по местному самоуправлению и обороне китайскому правительству.\n\nОднако, по правде говоря, партия должна внимательно следить за этими коммунами, а официальные лидеры должны быть партийными работниками, поскольку, если крестьяне могут бастовать против реакционеров, они могут также бастовать против Гоминьдана. Однако с помощью этих инициатив Хунань преодолеет необходимость в собраниях мелкой буржуазии и обратится к лучам истинной китайской демократии."

 HNN_rural_autonomies_guizhou: "Восточный Гуйчжоу"
 HNN_rural_autonomies_chenyuan: "Сянси"
 HNN_rural_autonomies_xiangjiang: "Лоуди"

#Aligning with faction decisions
 HNN_join_federalists: "Присоединиться к федералистам"
 HNN_join_federalists_desc: "[HNN_join_federalists_desc_text]"
 HNN_join_federalists_desc_default: "Движение федералистов было крепким со времён отделения Хунани. Южные федералисты - наши естественные товарищи, и нам бы было выгодно сотрудничать с ними."
 HNN_join_federalist_desc_exiled: "Движение федералистов пусть и было изгнано в Сычуань, но не потеряло своей хватки. Возможно, слочённые Хунань и Сычуань вместе воплотят мечту о федеральном Китае."

 HNN_join_left_kmt: "Присоединиться к Левому Гоминьдану"
 HNN_join_left_kmt_desc: "Власть Гоминьдана в Хунани прочно укоренилась. Теперь мы можем формально присоединиться к партийному государству."

 HNN_join_right_kmt: "Присоединиться к Правому Гоминьдану"
 HNN_join_right_kmt_desc: "Мы повернулись спиной к левому крылу партии. Правый Гоминьдан, судя по всему, сейчас на взлёте, поэтому нам бы не помешала их защита."

 HNN_join_zhili: "Присоединиться к Чжилийской клике"
 HNN_join_zhili_desc: "[HNN_join_zhili_desc_text]"
 HNN_join_zhili_desc_default: "У Пейфу и [ROOT.GetLeader] - друзья и давние союзники. Это не говоря уже о том, что они - сильнейшие лидеры Китая. Такой альянс был бы наиболее логичным для Хунани."
 HNN_join_zhili_desc_exiled: "После изгнания в Сычуань, чжилийское командование выстояло, несмотря не на что. Наши интересы, во многом, совпадают. Такой альянс был бы наиболее логичным для Хунани."

 HNN_join_npa: "Присоединиться к Ассоциации Защиты Нации"
 HNN_join_npa_desc: "Ассоциация Защиты Нации заявляет, что уважает местную автономию провинций Китая. И хотя было бы логичным присоединиться к ним, стоит заметить, что Ассоциацию возглавляют самые противоречивые люди, чьё слово мало чего стоит. Если мы встанем на их сторону, могут быть непредвиденные последствия."

 HNN_join_lep: "Присоединиться к [LEP.GetNameDef]"
 HNN_join_lep_desc: "Сейчас, когда Лига восстанавила свою власть, а Северная Чжили полностью разваливается, мы должны перестроиться на режим Ци в Нанкине, чтобы он не восстановил контроль Лиги над Хунанью с помощью оружия."

 HNN_join_yan: "Присоединиться к [SHX.GetNameDef]"
 HNN_join_yan_desc: "Пекин пал, и Чжилийская клика распалась, поэтому нам надо изменить свои приоритеты и искать новых союзников. К счастью для нас,Янь Сишань стал восходящей звездой в Китае, человеком, с которым мы рады работать и в котором мы нашли друга."

########################################
#####- Section 06: Focuses - ###########
########################################

### Tang Xiangming

 HNN_all_under_the_governor: "Абсолютная власть губернатора"
 HNN_all_under_the_governor_desc: "Генерал Тан захватил Чаншу, и те, кто был против бывшего губернатора, быстро стекаются под его знамена. Настало время действовать, мы используем все необходимые средства, чтобы обеспечить абсолютную лояльность Хунани клике Чжили."

 HNN_strongarm_the_assembly: "Направлять Собрание"
 HNN_strongarm_the_assembly_desc: "Поскольку Хунань находится под нашим контролем, нам нужна сильная рука, чтобы обеспечить постоянную стабильность в борьбе с Гоминьданом. С этой целью Тан Сянмин волевым решением назначил себя губернатором Хунани, а Тан Хуалуна, мэра Юэяна (и брата Тан Сянмина) - спикером собрания в Хунани."

 HNN_declare_martial_law: "Объявить военное положение"
 HNN_declare_martial_law_desc: "В сельской местности и за границами наших провинций уцелевшие гоминьдановские повстанцы устраивают наглые беспорядки. Нападения и набеги на местные гарнизоны Бэйяна, а затем смешивание с населением. Этому нужно положить конец любыми средствами, мы объявим военное положение, чтобы должным образом справиться с повстанцами в нашей провинции."

 HNN_establish_the_defence_commission: "Учредить Комиссию по обороне"
 HNN_establish_the_defence_commission_desc: "По всей провинции, да и в целом в Чжили, сидят предатели и ждут удобного случая, чтобы наброситься. Они непрерывно точат свои ножи, выискивая любой признак слабости. Поскольку полномочия губернатора в настоящее время ограничены, будет создана внесудебная "Комиссия обороны", которая будет обеспечивать безопасность границ Хунани."

 HNN_speak_with_the_diarchy: "Переговоры с диархией"
 HNN_speak_with_the_diarchy_desc: "Наше недавнее объявление военного положения вызывает понятное беспокойство у представителей диархии, Чэнь Цючжэня и Тянь Инчжао. Мы должны встретиться с ними и убедиться, что они получили необходимые заверения, а наш союз официально оформлен."

 HNN_crush_the_kmt: "Раздавить повстанцев Гоминьдана"
 HNN_crush_the_kmt_desc: "У подлых предателей Гоминьдана был шанс, и они ожидаемо пали духом перед мощью Чжили. Теперь, когда революционеры уничтожены, остается лишь постигнуть ту же участь их пропагандистских материалов. Квартальные, деревенские болтуны и им подобные замолчали. Однако если не пресечь все на корню, появятся новые разрушители, а для этого губернатор должен приложить руку к каждой сути управления."

 HNN_march_to_the_sea: "Марш к морю"
 HNN_march_to_the_sea_desc: "После окончания гражданской войны в Лянгуане губернатор двух Гуанов вряд ли является нашим другом. У губернатора Тана есть план похода на юг, чтобы захватить портовый город Гуанчжоу для Чжили и для себя. Это, конечно, рискованный шаг, но он может принести огромные дивиденды."

 HNN_expand_governor_powers: "Расширение полномочий губернатора"
 HNN_expand_governor_powers_desc: "Несмотря на все усилия нашей администрации, кажется, что угрозы для Хунани только растут. Это обстоятельство требует расширения полномочий Комиссии по обороне и ее главы, губернатора Тан Сянмина."

 HNN_cooperation_with_guizhou: "Сотрудничество с Гуйчжоу"
 HNN_cooperation_with_guizhou_desc: "К западу от нас расположена провинция Гуйчжоу, официально находящаяся под контролем нашего друга, губернатора Юань Цзумина. Но большая часть провинции незаконно оккупирована Юньнаньской кликой, что вынудило Юаня прибегнуть к помощи Чжао. Мы унаследовали эту ситуацию, и поскольку Юань помог нам отбить Гоминьдан и подавить несогласие с новым режимом, мы должны протянуть ему руку дружбы."
 
 HNN_ensure_rural_loyalty: "Обеспечить лояльность сельских жителей"
 HNN_ensure_rural_loyalty_desc: "Даже после разгрома повстанцев Гоминьдана, волнения среди крестьянства все еще велики. Не будучи другом крестьян, губернатор прислушался к мнению своего брата Тан Хуалуна и решил провести несколько символических реформ в их пользу, не подрывая власти дворянства и гарантируя, что оно будет лояльно к нашему режиму."

 HNN_appease_workers_concerns: "Разрешить проблемы рабочих"
 HNN_appease_workers_concerns_desc: "Рабочие в Чанша и Чандэ не спешат принимать новый режим. К счастью для нас, реформы Тан Хуалуна на посту мэра успокоили рабочих Юэяна. Мы должны распространить эти реформы на остальную часть провинции Хунань, что послужит решению проблем рабочих."

 HNN_southern_heir_to_beiyang: "[HNN_southern_heir_to_beiyang_loc]"
 HNN_southern_heir_to_beiyang_desc: "[HNN_southern_heir_to_beiyang_desc_loc]"

 HNN_expel_zhili_enemies: "Изгнать врагов Чжили"
 HNN_expel_zhili_enemies_desc: "Несмотря на заявления о лояльности Чжили, Чжао Хэнти укрывал многих, кто был настроен против нашей клики. Для нас крайне важно изгнать этих нелояльных деятелей из провинции Хунань, мы не потерпим, чтобы предатели прятались в наших рядах."

 HNN_bolster_loyal_intellectuals: "Поддержка лояльной интеллегенции"
 HNN_bolster_loyal_intellectuals_desc: "Хотя предыдущий губернатор позаботился о том, чтобы те, кто бежал от репрессий со стороны Центрального правительства и Лиги, нашли безопасное место в городских центрах Хунани, в конечном счете это принесло скорее вред, чем благо. Даже сейчас, когда ослабленная интеллигенция сплачивается против только что назначенного губернатора, самое время сделать это еще раз... и дать лояльным нашему режиму трибуну."

 HNN_wipe_out_socialists: "Сокрушить социалистов"
 HNN_wipe_out_socialists_desc: "В то время как реформы Тан Хуалуна склонили умеренных к нашему режиму, все еще есть много экстремистов и социалистов, которые упорно поддерживают Гоминьдан и Синдикалистскую Партию Китая. Если оливковая ветвь не сможет их поколебать, тогда мы должны раздавить их своей железной пятой. Не будет никаких революционеров, пытающихся свергнуть нашего губернатора, даже если это означает правление под дулом винтовки."

 HNN_rule_by_decree: "Управление по указам"
 HNN_rule_by_decree_desc: "Полномочия Комиссии по обороне были важны для того, чтобы Тан Сянмин мог обеспечить безопасность провинции Хунань. Однако этого недостаточно, но на Западе есть кое-что, на что мы можем положиться, у Соединенных Штатов Америки есть  \"чрезвычайные приказы\", которые могут быть использованы, когда требуются немедленные действия. Мы передадим это право нашей администрации и предоставим губернатору право издавать чрезвычайные приказы по его собственному усмотрению."

 HNN_safety_and_security: "Спокойствие и порядок"
 HNN_safety_and_security_desc: "При режиме Тан Сянмина наступила новая эра безопасности для граждан провинции Хунань. Угрозы со стороны Гоминьдана и социализма были устранены из нашей провинции. Враги Чжили уничтожены, и губернатор Тан обладает необходимыми полномочиями, чтобы защитить нашу провинцию от любых угроз. Наконец-то появился достойный правитель, который позаботится о том, чтобы Хунань была безопасной и процветающей."

 HNN_restore_civilian_rule: "Восстановить гражданское правление"
 HNN_restore_civilian_rule_desc: "С уходом врагов нашего губернатора вопрос о введении военного положения встал снова. Тан Хуалун предложил своему брату отменить военное положение и восстановить гражданский контроль. Мы можем согласиться с этим и представить себе слияние нашего политического круга с политическим кругом Тан Хуалуна, чтобы создать правительство, действительно заботящееся о благополучии каждого гражданина провинции Хунань."

 HNN_maintain_martial_law: "Поддерживать режим военного положения"
 HNN_maintain_martial_law_desc: "В то время как многие люди вокруг нас, включая брата губернатора, хотели бы, чтобы мы отменили военное положение. Суровая реальность такова, что Хунань по-прежнему находится под угрозой со всех сторон и готова нанести удар, как только мы проявим слабость. По этой причине наш губернатор и главнокомандующий решил сохранить военное положение, по крайней мере, до тех пор, пока угрозы вокруг нас окончательно не будут устранены."

### Zhao Hengti

 HNN_the_democratic_mandate: "Демократический мандат"
 HNN_the_democratic_mandate_desc: "С обновленным демократическим мандатом в руках губернатор Чжао Хэнти смотрит в будущее, и нашей непосредственной заботой является то, что Чжао считает авторитарными силами в провинции. Губернатор считает, что он должен использовать этот мандат для укрепления демократии в Хунани, чтобы она не скатилась в радикализм или апатию."

 HNN_form_a_grand_coalition: "Сформировать Большую Коалицию"
 HNN_form_a_grand_coalition_desc: "При наличии такой сильной антидемократической силы в Ассамблее нам необходимо сформировать \"Большую коалицию\" из сочувствующих партий, чтобы работать сообща в целях укрепления молодой демократии и защиты ее от тех, кто предпочел бы, чтобы она была уничтожена."

 HNN_reach_out_to_the_peasantry: "Обращение к крестьянству"
 HNN_reach_out_to_the_peasantry_desc: "Простой крестьянин, безусловно, является главной опорой, на которую может опереться Гоминьдан. Если мы хотим подорвать их поддержку и не дать им использовать популистскую риторику для уничтожения нашей молодой демократии, мы должны обратиться к простому человеку, среднестатистическому крестьянину."

 HNN_revise_the_monroe_doctrine: "Перенять Доктрину Монро"
 HNN_revise_the_monroe_doctrine_desc: "Хунаньская доктрина Монро гласит, что армия Хунани не может покидать провинцию, а армии других провинций не могут входить в Хунань. Хотя намерения у него были благие - уберечь Хунань от кровопролития, хаос, охвативший Гуйчжоу и Минган, показал, что единственный способ по-настоящему освободить Хунань от вражеских армий - это, наконец, объединить Китай, и с этой целью мы должны пересмотреть нашу доктрину Монро, чтобы она отражала современный Китай."

 HNN_appeal_to_the_legislature: "Обращение к Собранию"
 HNN_appeal_to_the_legislature_desc: "Провинциальное собрание является важным органом государственного управления и демократии в провинции Хунань. Вместе с тем она поражена коррупцией и склоками фракций, и часто пытается объявить импичмент губернатору Чжао без видимой причины. Учитывая недавнюю угрозу демократии в Хунани, мы должны обратиться к ним с призывом зарыть топор войны и выйти из тупика, по крайней мере, до тех пор, пока демократия и безопасность в Хунани не будут должным образом обеспечены."

 HNN_bolster_the_intelligensia: "Поддержка интеллигенции"
 HNN_bolster_the_intelligensia_desc: "Сильная интеллигенция - важная черта любой демократической страны, Чанша уже стала центром для китайской интеллигенции, поэтому мы должны оказывать им покровительство, чтобы еще больше укрепить наш растущий интеллектуальный центр."

 HNN_introduce_basic_welfare: "Введение базового дохода"
 HNN_introduce_basic_welfare_desc: "Одним из самых популярных обещаний Гоминьдана было создание \"системы социальной защиты\", которая поддерживала бы безработных и обнищавших. Хотя мы сами не проводили такую кампанию, очевидно, что это была особенно популярная политика, и что мы должны принять базовый план социального обеспечения, чтобы ослабить их риторику и поддержку."

 HNN_support_peasant_organisations: "Поддержка крестьянских союзов"
 HNN_support_peasant_organisations_desc: "Мы начали налаживать контакты с крестьянством, и для того, чтобы продолжать оказывать эту поддержку, мы должны поощрять крестьянские организации к участию в работе правительства. Мы надеемся, что это еще больше расположит к нам крестьянство и увеличит нашу поддержку среди них."

 HNN_the_federalist_revival: "Возрождение федерализма"
 HNN_the_federalist_revival_desc: "Мы захватили Гуанчжоу, оплот федералистов, и закрепили свою власть в провинции Гуандун. Благодаря этим событиям мы можем заявить о себе как о претенденте на национальное объединение, наследнике федералистского движения и знаменосце флага федералистов!"

 HNN_improve_rural_schooling: "Улучшение сельского образования"
 HNN_improve_rural_schooling_desc: "Несмотря на то, что Чанша является образовательным центром Китая, наши сельские жители часто лишены тех же возможностей, что и жители наших городов. Мы должны немедленно исправить это и начать широкомасштабный проект по улучшению нашей сельской академической инфраструктуры."

 HNN_expand_changsha_university: "Расширение Университета Чанша"
 HNN_expand_changsha_university_desc: "Крупнейший университет провинции Хунани, Университет Чанша, является важным центром знаний и обучения в нашей провинции. Поэтому крайне важно, чтобы мы направляли ему финансирование, чтобы он мог расширяться еще больше, чтобы не отставать от нашей растущей интеллигенции."

 HNN_guaranteed_liberty: "Гарантировать личные свободы"
 HNN_guaranteed_liberty_desc: "Личные свободы являются основой любой стабильной демократии, и поэтому мы должны провозгласить права, предоставляемые всем гражданам Хунани, с обещанием как можно скорее закрепить их в законе."

 HNN_court_the_unions: "Статус профсоюзов"
 HNN_court_the_unions_desc: "Наши отношения с профсоюзами и рабочими активистами были...проблемными в лучшем случае. Но пришло время зарыть топор войны между нами,и протянуть оливковую ветвь профсоюзам в Хунани. Если повезет, профсоюзы, в свою очередь, отплатят нам за доброту, и агитация городских рабочих замедлится или вовсе прекратится."

 HNN_invest_in_the_countryside: "Инвестиции в сельскую местность"
 HNN_invest_in_the_countryside_desc: "Заключительной частью нашего плана по обеспечению поддержки крестьянства является реализация крупномасштабной программы по улучшению инфраструктуры сельских районов провинции Хунань, объединяющей провинцию и обеспечивающей ощутимые улучшения в жизни простых людей."

 HNN_encourage_legislative_debates: "Поощрение законодательных дебатов"
 HNN_encourage_legislative_debates_desc: "Одной из важнейших составляющих законодательного процесса являются дебаты о достоинствах и недостатках того или иного закона. Поскольку наша демократия все еще находится в зачаточном состоянии, для нас важно поощрять эти дебаты и участвовать в них."

 HNN_rights_of_man: "Права человека"
 HNN_rights_of_man_desc: "Поскольку наше устное заявление было встречено с робкой надеждой, мы должны довести его до конца. Потребуется время, чтобы убедить Ассамблею и протолкнуть его, но у Хунани должна быть своя воля!"

 HNN_undermine_the_diarchs: "Подкоп под диархию"
 HNN_undermine_the_diarchs_desc: "Диархия на Западе провинции является одним из самых серьезных препятствий для демократии в Хунани. Хотя в настоящее время мы не в состоянии устранить двух полевых командиров, мы можем использовать наше улучшившееся положение для подрыва их власти, что, как мы надеемся, должно обуздать их крайности."

 HNN_foster_democratic_traditions: "Продвижение демократических традиций"
 HNN_foster_democratic_traditions_desc: "Одной из важнейших гарантий против авторитаризма является традиция демократии. Хотя, безусловно, вырастить и воспитать такого человека непросто, в прошлом были явные примеры демократических фракций, которым удавалось свергнуть любого потенциального автократа. Если мы сможем заложить основы этих традиций сейчас, даже в эти неспокойные времена, то зарождающаяся демократия в провинции Хунань станет еще сильнее."

 HNN_the_democratic_stronghold: "Бастион демократии"
 HNN_the_democratic_stronghold_desc: "Это была значительная работа, но наши демократические реформы достигли значительного прогресса. Все, что теперь остается, - это провести последние несколько реформ, чтобы еще больше укрепить нашу местную демократию и показать Китаю и всему миру, что мечта федералистов не просто достижима, но и находится в пределах нашей досягаемости."

### Kuomintang

 HNN_victory_of_the_united_front: "Победа \"Единого\" Фронта"
 HNN_victory_of_the_united_front_desc: "Несмотря на все, гоминьдановцам удалось отбиться как от Чжили, так и от федералистов. Однако после этого их первоочередной задачей было разобраться с деспотами-военачальниками, с которыми сотрудничал Чжао, и смириться с существованием провинциальной ассамблеи. Возможно, они и пришли к власти с помощью избирательной системы Хунани, но действительно ли она работает?"

 HNN_dismantling_the_diarchy: "Ликвидировать Диархию"
 HNN_dismantling_the_diarchy_desc: "Предыдущее сотрудничество Чжао Хэнти с гнусными деспотами на востоке и западе провинции Хунань является явным признаком слабости федералистов и готовности склониться перед военачальниками. Однако гоминьдановцы не боятся ни военачальника, ни его армий. Начиная немедленно, мы будем работать над тем, чтобы искоренить всякое влияние Бэйяна в провинции, поскольку им нет места в Национальной Революции."

 HNN_handling_the_assembly: "Взять под контроль Ассамблею"
 HNN_handling_the_assembly_desc: "Важнейший вопрос, вызывающий озабоченность у Гоминьдана, заключается в том, что Провинциальная Ассамблея является учреждением, с помощью которого они получают легитимность и власть, но при этом она полностью противоречит концепциям Данго. В то время как Чэн Цянь призвал к поддержке этого института, Тан Шэнчжи, похоже, крайне недоволен такой концепцией. Сама судьба демократии в провинции Хунань висит на волоске..."

 HNN_an_emergency_congress: "Чрезвычайный конгресс"
 HNN_an_emergency_congress_desc: "В конечном счете, разногласия между Шестой и Восьмой армиями Национально-Революционной Армии кажутся непримиримыми, поскольку Чэн Цянь и Тан Шэнчжи постоянно сталкиваются лбами из-за своих собственных целей. Сторонники радикальных изменений и "Старая гвардия" находятся на грани раскола провинции! Необходимо созвать чрезвычайный конгресс!"

 HNN_repudiate_the_canton_squatters: "[HNN_repudiate_the_canton_squatters_loc]"
 HNN_repudiate_the_canton_squatters_desc: "[HNN_repudiate_the_canton_squatters_desc_loc]"

 HNN_formenting_the_kuomintang_revival: "Возрождение Гоминьдана"
 HNN_formenting_the_kuomintang_revival_desc: "С завоеванием Гуанчжоу, казалось бы, мантия Национальной Революции Гоминьдана легла на плечи хунаньского дуэта. Гоминьдановцы в других местах могут быть мертвы или скрываться, но мы не позволим Белому Солнцу, Голубому небу и  Красной Земле больше колебаться! Мы боремся не только за мечту доктора Суня, но и за всю нацию в целом, и мы не успокоимся, пока наша миссия не будет выполнена."

 HNN_expansion_of_yuelu_academy: "Расширение академии Юэлу"
 HNN_expansion_of_yuelu_academy_desc: "Академия Юэлу, престижное учебное заведение, основанное в 976 году при династии Сун, в последнее время переживает период бурного запустения. В связи с тем, что недавние администрации отдали предпочтение университету Чанша, это привело к тому, что учебная программа для такого грандиозного учебного заведения стала сравнительно древней. Чтобы показать нации, что мы стремимся к настоящей модернизации, мы будем работать над расширением легендарной академии."

 HNN_the_magistrate_problem: "Вопрос о магистратах"
 HNN_the_magistrate_problem_desc: "Несмотря на победу на выборах, местные чиновники и окружные магистраты, которые служат нашему новому правительству, по-прежнему остаются несогласными или вообще являются пережитками предыдущей коррумпированной администрации. Глава Бюро по сохранению мира Хэ Цзянь выдвинул обширную программу реформ и реструктуризации, направленную на замещение должностей в местной администрации."

 HNN_reforming_the_militias: "Реформа ополчения"
 HNN_reforming_the_militias_desc: "Для всех китайских провинций характерно наличие местного ополчения, однако в провинции Хунань ситуация больше напоминает ситуацию с легализованными бандитами. При предыдущих администрациях ополчение, считавшееся частью гражданского правительства, контролировалось представителями местной элиты и было полностью автономным. Под эгидой своего "Бюро по сохранению мира" Хэ Цзянь стремится вновь централизовать контроль над ополчением, чтобы положить конец хаосу."

 HNN_planning_hunans_national_revolution: "План Национальной Революции в Хунани"
 HNN_planning_hunans_national_revolution_desc: "Возможно, из-за хаоса эпохи военачальников или из-за небрежности Чжао, Хунань как провинция лишена ряда важнейших законов и комитетов, необходимых для истинного управления. Играя ключевую роль в реформировании институтов провинции, Хэ Цзянь выступал за создание консультативного комитета, призванного планировать будущее народа Хунани."

 HNN_ensuring_rural_pacification: "Обеспечить лояльность в сельской местности"
 HNN_ensuring_rural_pacification_desc: "Несмотря на проведенные ранее реформы, призванные помочь в решении проблемы ополчения, Хэ Цзянь уведомил председателя провинции о своем намерении провести вторую серию реформ, направленных на надлежащее преобразование ополчения в постоянную армию. Укрепляя существующие формирования ополчения и вводя новые процедуры подготовки, он пообещал, что его силы прекрасно дополнят Шестую и Восьмую армии."

 HNN_the_basis_of_peoples_livelihood: "Принцип народного благосостояния"
 HNN_the_basis_of_peoples_livelihood_desc: "Народное благосостояние, или Миньшэн, является одним из трех важнейших принципов Гоминьдана. Направленная на повышение уровня жизни китайцев, она требует для своей окончательной реализации широких программ социального обеспечения, и все же Хунань как провинция испытывает острую нехватку какой-либо подобной инфраструктуры. Если мы действительно хотим внедрить эти три принципа в Хунани, мы должны сначала заложить основу для их введения в действие."

 HNN_providing_universal_literacy: "Обеспечение всеобщей грамотности"
 HNN_providing_universal_literacy_desc: "Ситуация с неграмотностью в провинции ужасающая. Несмотря на то, что Чжао приветствовал приток интеллектуалов в провинцию, это только усилило пропасть между гражданами и элитой. Сидя в своей башне из слоновой кости в Чанша, они мало что сделали для того, чтобы обеспечить такой же интеллектуализм для населения. Мы, близкие сердцу всех членов Гоминьдана, должны работать над искоренением неграмотности в провинции Хунань."

 #Cheng
 HNN_vanguard_of_the_revolution: "Авангард Революции"
 HNN_vanguard_of_the_revolution_desc: "Если и был кто-то, кто самоотверженно и с железной волей служил Революции, то это был Чэн Цянь. Защищая революцию всю свою жизнь, он даже сейчас находится в авангарде борьбы с радикальным извращением идеалов Гоминьдана. По другую сторону прохода находится оппортунистический волк в овечьей шкуре, и Чэн Цянь должен сделать то, что должен, чтобы спасти Хунань."

 HNN_preventing_subversive_elements: "Преследование подрывных элементов"
 HNN_preventing_subversive_elements_desc: "В конечном счете и всецело верно служа принципам демократии в Хунани, упомянутая демократия по-прежнему нуждается в направляющей руке, которая привела бы ее к просвещению. Под высшим руководством партии мы можем работать над искоренением любого, кто выступает против реализации Трех принципов и Национальной Революции, будь то военачальник, реакционер или оппортунист, в конечном итоге враг демократии, к которой мы так стремимся."

 HNN_preaching_social_liberation: "Проповедь социального освобождения"
 HNN_preaching_social_liberation_desc: "Несмотря на стремительный рост социальной мобильности, наряду с экономическим и политическим выравниванием положения наших женщин-соратниц, все еще остается значительное число тех, кто оказался в стороне на пути к Национальной революции. Укрепляя наше сотрудничество с различными феминистскими движениями, партия будет способствовать глобальной борьбе за всех, независимо от пола."

 HNN_exalt_scientific_advancement: "Продвижение научного прогресса"
 HNN_exalt_scientific_advancement_desc: "В отличие от радикальных социалистов, которые недавно проникли в партию, с их преклонением перед насилием и классовой борьбой. Истинные приверженцы Гоминьдана проповедуют ортодоксальную идею научного будущего, которая в конечном итоге приведет нас к Датуну. Подобно промышленной революции, партия должна стремиться вступить в новую эру изобретательности, поскольку распространение науки ведет к увеличению пользы для китайского народа."

 HNN_establishment_of_youth_orgs: "Учредить молодежные организации"
 HNN_establishment_of_youth_orgs_desc: "Гоминьдан не может полагаться только на свою старую гвардию, на угасающую касту старых революционеров, которая в конечном итоге рано или поздно рассеется. Вместо этого партия должна работать над тем, чтобы воспитать в стране новое поколение революционеров. По словам доктора Сана, мы будем и дальше расширять молодежные общества партии, чтобы повысить политическую осведомленность молодых представителей нации."

 HNN_cooperating_with_dangwai: "Сотрудничество с Данвай"
 HNN_cooperating_with_dangwai_desc: "Несмотря на наилучшие пожелания Чэн Цяня, Тан Шэнчжи безжалостно уничтожил десятилетнюю провинциальную демократию в одно мгновение. Несмотря на несовершенство, это продемонстрировало, что народ Хунани был законодателем моды в Национальной революции и имел возможность пройти период ускоренной опеки. Хотя мы не можем исправить ущерб, нанесенный прошлым, мы можем, по крайней мере, наладить связи на будущее."

 HNN_developing_national_consciousness: "Развивать национальное самосознание"
 HNN_developing_national_consciousness_desc: "Обладая характерными чертами здоровой демократии, провинция Хунань была признана подходящей для проведения местных выборов. Хотя каждый кандидат проходит специальный отбор, чтобы элиты или представители дворянства не злоупотребляли своим небольшим влиянием, провинция Хунань станет образцом того, как выглядит настоящая китайская демократия."

 HNN_hunans_shield: "Щит Хунани"
 HNN_hunans_shield_desc: "Несмотря на все это, на вызовы, испытания и невзгоды, командующий Шестой армией генерал Чэн Цянь сумел одержать полную победу в свете предательских действий Тан Шэнчжи. Утвердив господство истинных революционеров над так называемыми \"гоминьдановскими военачальниками\", народ Хунани может спокойно отдыхать под покровительством Защитника Хунани."

 #Tang Shengzhi
 HNN_the_revolutionary_dark_horse: "Темная лошадка Революции"
 HNN_the_revolutionary_dark_horse_desc: "Долгое время считавшийся изгоем партии, Тан Шэнчжи по-прежнему остается революционером до мозга костей. Вступив в партию Тунмэнхуэй благодаря влиянию Тан Жэньфэна и сражаясь в Синьхае, Тан является истинным и преданным сторонником революции. Будучи движущей силой, стоявшей за организацией Северной экспедиции, и неустанно работая на благо крестьянства, Тан надеется воплотить в жизнь свою собственную интерпретацию доктрины Временного Комитета Действий."

 HNN_consolidate_the_province: "Обьединение провинции"
 HNN_consolidate_the_province_desc: "Как наглядно продемонстрировала ошеломляющая победа Гоминьдана на выборах, истинным желанием людей по всей стране является осуществление Трех принципов. Однако, несмотря на отзыв и арест множества членов ассамблеи, многие аспекты деятельности старых администраций продолжают противоречить нашему правительству. Чтобы действительно осуществить Национальную Революцию, давайте работать над укреплением нашей власти в провинции Хунань."

 HNN_provide_the_peoples_alms: "Обеспечить народ"
 HNN_provide_the_peoples_alms_desc: "По правде говоря, крестьяне и рабочие подвергались жестокой эксплуатации и угнетению во время пребывания Чжао Хэнти на посту губернатора, поскольку его лицемерные крестьянские ассоциации и желтые профсоюзы служили только интересам дворянства и их капиталистических союзников. Используя политику Временного комитета действий, давайте работать над реформированием ранее существовавших профсоюзов и реорганизацией крестьянских ассоциаций для удовлетворения их потребностей."

 HNN_establish_the_political_and_officer_academy: "Учредить Военно-политическую академию" #政治和軍官講習所
 HNN_establish_the_political_and_officer_academy_desc: "Первоначальная офицерская академия провинции Хунань, основанная тогдашним командиром дивизии Таном Шэнчжи, была заброшена из-за отсутствия ее создателя в провинции. Став свидетелями упорства и силы курсантов Вампоа в Северной экспедиции, давайте превратим это учебное заведение в уникальную академию, где кадровый состав и офицеры смогут изучать Три принципа, земные добродетели и военные навыки в одном месте."

 HNN_construct_rural_autonomy: "Создание сельских автономий"
 HNN_construct_rural_autonomy_desc: "Как сказал Тан Шэнчжи, крестьяне - это опора революции. Чтобы облегчить управление сельскими районами и предотвратить притеснение крестьянства под нашей эгидой, мы реформируем "Группу от двери к двери", местное подразделение безопасности, и создадим местные сельские комитеты при партийных отделениях, чтобы они могли защищаться от реакционеров, управляя самостоятельно, чтобы построить лучшее будущее."

 HNN_promote_buddhisation: "Распостранять буддийские добродетели"
 HNN_promote_buddhisation_desc: "В отличие от многих деспотов, местных тиранов и мелких военачальников, Тан Шэнчжи - человек набожный и твердый в своих моральных принципах. Обратившись в буддизм во времена больших личных разногласий, генерал ощутил новый прилив сил к жизни, который, как он утверждает, проистекает из его религиозной философии. Хотя было бы глупо участвовать в крестовом походе массового характера, самое меньшее, что мы можем сделать, - это пропагандировать земные принципы, которым должны следовать люди."

 HNN_revolution_in_the_countryside: "Революция в сельской местности"
 HNN_revolution_in_the_countryside_desc: "Несмотря на все наши усилия, масштабы сельскохозяйственного кризиса в провинции Хунань по-прежнему остаются для нас загадкой. Если мы хотим по-настоящему и безоговорочно преобразовать страну, мы должны сотрудничать с массами, которые работают на ее полях. Поскольку наши сельскохозяйственные реформы направлены сверху вниз, давайте одновременно подойдем к решению проблемы с самого начала и обрушим цунами революционного правосудия на всех тех, кто посягает на крестьянство Хунани."

 HNN_dawn_of_a_new_hunan: "Рассвет новой Хунани"
 HNN_dawn_of_a_new_hunan_desc: "Несмотря на сильную оппозицию со стороны наших умеренных товарищей в Шестой армии, Хунань была втянута в новую эру революционной современности, хотели того государственные учреждения или нет. Мы больше не будем считаться сельской глушью, где крестьяне и рабочие трудятся за бесценок, а элиты получают прибыль. Вместо этого в Китае воцарилось новое, нравственное общество, настоящий рай для низших классов."

 ##- Economy -##

 ##- Industry -##

 HNN_the_crossroads_of_china: "Перекресток Китая"
 HNN_the_crossroads_of_china_desc: "Занимая важное положение в центре страны, Хунань функционирует как "Перекресток Китая", способствуя экономическому движению с севера на юг и с востока на запад. Однако такое положение дел является одновременно и благословением, и проклятием, поскольку, несмотря на то, что мы являемся свидетелями огромного роста продуктивности, проходящего через наши границы, внутри них остается очень мало. Зачем кому-то вкладывать деньги в сельскохозяйственный лабиринт провинции Хунань, когда лучшие пастбища находятся буквально за углом?"

 HNN_securing_our_sovereignty: "Обеспечить нашу независимость"
 HNN_securing_our_sovereignty_desc: "Разве не глобальные рынки стали причиной краха нашей промышленности? Те самые капиталисты, которые подлетели слишком близко к солнцу, по глупости настаивают на том, что мы должны вернуться к нашим старым способам управления экономикой. Тем не менее, некоторые экономисты в провинции рекомендуют новый путь, в первую очередь ориентируясь на потребности правительства и населения провинции. Используя возможности, которые предоставил нам кризис, давайте работать над созданием независимой индустриализированной экономики."

 HNN_facilitating_investments: "Содействие инвестициям"
 HNN_facilitating_investments_desc: "Глобальный экономический крах произошел не по вине самой мировой торговли, а по вине глупых авантюристов-капиталистов, которые недальновидно инвестировали и плакали, когда терпели крах. Имея надежную поддержку в правительстве, мы можем возродить процветание, которое наблюдалось в Лиге, Маньчжурии и Центральном правительстве. Все, что нам нужно сделать, - это подойти к этому с трезвой головой и взвешенными суждениями, пресекая излишества."

 HNN_nationalising_critical_industries: "Национализация важнейших отраслей промышленности"
 HNN_nationalising_critical_industries_desc: "Китай - страна, изобилующая несправедливостью, от военачальников до бандитов и мелких деспотов, которые, как бы они ни были известны, столь же непостижимо презираемы, как и иностранные концессии. Это остается постоянным напоминанием о порабощении Китая иностранными державами. Хуже того, они контролируют многие важнейшие отрасли промышленности в провинции Хунань, такие как водоснабжение или электроснабжение. Используя все доступные нам средства, мы должны, по крайней мере, обеспечить, чтобы ключевые отрасли промышленности находились в руках самих жителей провинции."

 HNN_opening_our_doors: "Политика открытых дверей"
 HNN_opening_our_doors_desc: "Чтобы обеспечить подлинное экономическое процветание, давайте предоставим дополнительные стимулы и дочерние компании для любого смелого предпринимателя, будь то в стране или за ее пределами. Ведь благодаря их многочисленному капиталу мы можем позаботиться о том, чтобы провинция превратилась в сияющий город на холме, конкурирующий с финансовым процветанием, наблюдаемым в других местах."

 HNN_ensuring_healthy_competition: "Обеспечение здоровой конкуренции"
 HNN_ensuring_healthy_competition_desc: "Хотя мы, возможно, и способствовали тому, что в Чандэ и Чанша появилось множество капиталистов, большинство из них - выходцы из жестокого мира дипломатических миссий. Среди всех прибрежных городов Шанхай особенно известен тем, что предпочитает играть грязно. Однако Хунань не дружит с теми, кто стремится злоупотреблять ее жителями, и, хотя мы не будем слишком сильно вмешиваться в систему, лучше всего обеспечить здоровую конкуренцию между участниками торгов."

 HNN_rewards_for_arms_manufacturers: "Преференции для военных заводов"
 HNN_rewards_for_arms_manufacturers_desc: "Недавно назначенный чрезвычайным губернатором после неудачных результатов губернаторских выборов в провинции Хунань, Тан Сянмин стремится к тому, чтобы провинция Хунань служила щитом интересов Чжили на хаотичном юго-западе. Из-за ненадежных губернаторов Гуанси и Гуандуна на юге и непримиримого республиканского бастиона на юго-западе, провинция Хунань крайне плохо подготовлена к обороне от них. К счастью, у Тана есть соответствующий план."

 HNN_utilising_changsha_unions: "Соглашение с профсоюзами Чанши"
 HNN_utilising_changsha_unions_desc: "Известные своей свирепостью и пассионарностью синдикалистские профсоюзы в Чанше пользуются большим влиянием среди представителей рабочего класса. Протягивая руку честного сотрудничества и покровительства, а также в обмен на некоторые уступки, возможно, мы сможем использовать их влияние, чтобы завоевать любовь рабочих. Потому что, в конце концов, правительство работает на них, а не наоборот."

 HNN_from_the_pearl_river_to_the_yangtze: "От Жемчужной реки до Янцзы"
 HNN_from_the_pearl_river_to_the_yangtze_desc: "С оживленным центром Гуанчжоу, расположенным на юге, в дельте Жемчужной реки, и промышленным гигантом Уханем на севере, Чанша и Чандэ находятся в выгодном положении, чтобы выступать в качестве посредников при перевозке товаров между ними. Увеличив пропускную способность наших железных дорог на Севере, мы сможем еще больше облегчить такую торговлю и извлечь из этого выгоду."

 HNN_industrial_self_sufficiency: "Самодостаточность промышленности"
 HNN_industrial_self_sufficiency_desc: "Как многие и предвидели, когда мы приступали к реализации нашей программы промышленных реформ, экономика значительно восстановилась. Предприятия процветают, рабочие добросовестно выполняют свои обязанности, а наша промышленная мощь превосходит те скромные возможности, которые мы когда-то имели. Промышленная мощь Хунани больше не зависит полностью от добрых вестей от какого-либо сюзерена, и от этого провинция становится намного лучше."

 HNN_fostering_national_reconstruction: "[HNN_fostering_national_reconstruction_loc]"
 HNN_fostering_national_reconstruction_desc: "[HNN_fostering_national_reconstruction_loc_desc]"

 ##- Agriculture -##

 HNN_our_most_critical_issue_of_the_day: "Наиболее злободневные вопросы"
 HNN_our_most_critical_issue_of_the_day_desc: "Наши проблемы в сельском хозяйстве имеют гораздо более серьезный характер, чем проблемы в промышленности. Поскольку подавляющее большинство доходов провинции поступает от сельскохозяйственной продукции, а также из-за более широкого экономического кризиса, влияющего на торговлю, наши крестьяне работают с очень низкой прибылью и в результате подвергаются наказанию со стороны землевладельцев. Необходимы какие-то действия, чтобы позаботиться о том, чтобы наша ужасная сельскохозяйственная система была обновлена и усовершенствована."

 HNN_mobilising_the_masses: "Мобилизировать массы"
 HNN_mobilising_the_masses_desc: "Слишком долго крестьяне жили под властью местных тиранов и злобных дворян. Слишком долго они часто страдали от несправедливости со стороны своих хозяев. Наконец-то правительство услышало их крики, потому что злоупотребления прекратились. В то время как прямой удар по укоренившимся элитам, несомненно, приведет к катастрофе, мы можем мобилизовать крестьянство, стоящее под ними, на борьбу за светлое будущее. Возможно, тогда землевладельцы прислушаются."

 HNN_expanding_our_exports: "Расширение нашего экспорта"
 HNN_expanding_our_exports_desc: "Поскольку у нас всегда была относительно слабая экономика, наш экспорт был таким же дефицитным и лишенным разнообразия. Благодаря новой инициативе правительства мы расширим производство чая, рами, конопли и табака, которые являются нашими основными экспортными товарами, и расширим ассортимент нашей продукции, сосредоточив внимание на производстве большего количества промышленных товаров, таких как одежда из хлопка и керамика."

 HNN_harmony_in_the_land_harmony_at_home: "Гармония на земле, гармония дома"
 HNN_harmony_in_the_land_harmony_at_home_desc: "Как можно по-настоящему достичь гармонии в мире, если сама земля страдает от несчастий? Когда-то практиковавшие принципы восстановительного земледелия, в условиях хаоса эпохи военачальников и многочисленных войн, которые пережила Хунань, многие утратили веру в эти методы. Мы не можем винить их, однако мы можем работать над тем, чтобы еще раз научить наших землепашцев и тружеников уважительному отношению к матери-природе, ибо она дарует нам свои блага, и самое меньшее, что мы можем сделать, - это отплатить ей тем же."

 HNN_negotiating_with_the_landowners: "Переговоры с землевладельцами"
 HNN_negotiating_with_the_landowners_desc: "Сторонники столь радикального перераспределения земли действуют нешибко продуманно, не придавая особого значения постепенному и скрупулезному подходу. Вместо того, чтобы очернять и принижать важную роль, которую играют землевладельцы в нашем обществе, почему бы не поработать с ними, чтобы добиться постепенного упорядочения сельскохозяйственного производства, не лишая их средств к существованию."

 HNN_annihilating_exploitation: "Уничтожить эксплуатацию"
 HNN_annihilating_exploitation_desc: "С помощью ревущего огня крестьянской ярости, который мы разожгли, мы можем использовать усердных крестьян, чтобы они, наконец, выступили против вопиющей эксплуатации их труда, которая имеет место в настоящее время. Несмотря на то, что эти средства могут быть недобросовестными и многими восприниматься как жестокие, крестьянам постоянно приходится сталкиваться с жестоким обращением с ними владельцев обрабатываемой ими земли, и настало время, чтобы правительство уравняло ситуацию."

 HNN_alliance_with_the_peasantry: "Альянс с крестьянством"
 HNN_alliance_with_the_peasantry_desc: "Созданные различными местными лидерами в качестве противовеса политическим тяжеловесам класса землевладельцев, крестьянские советы в провинции Хунань доблестно сражались за права своих собратьев. Однако, если мы окажем им достаточную поддержку для более широкой экспансии, мы не только произведем революцию в стране, но и завоюем сердца населения."

 HNN_for_our_mutual_benefit: "Во имя взаимной выгоды"
 HNN_for_our_mutual_benefit_desc: "Несмотря на то, что мы постоянно повторяем, что реформы необходимы для сохранения их средств к существованию и статуса, землевладельцы по-прежнему не решаются полностью согласиться с инициативами правительства. Однако, приложив надлежащие усилия, встретившись с главами местных землевладельческих организаций и посетив их поместья, мы сможем должным образом донести наше послание. Хотя они могут жаловаться на наши программы, это, безусловно, лучше, чем Революция."

 HNN_enhance_tea_manufacturing: "Расширение производства чая"
 HNN_enhance_tea_manufacturing_desc: "Чай, имеющий огромное значение для китайской культуры в целом, является жизненно важным источником энергии и для экономики провинции Хунань. До финансового кризиса он был одним из наших приоритетных видов экспорта и обеспечивал значительный приток доходов в казну правительства провинции. Учитывая столь важное положение в местной финансовой сфере, возможно, модернизация и механизация наших уборочных работ принесут еще большие результаты."

 HNN_hunans_brilliant_success_story: "Блестящая история успеха Хунани"
 HNN_hunans_brilliant_success_story_desc: "Прежде всего, история успеха сельского хозяйства провинции Хунань заслуживает изучения и похвалы. После хаоса, феодализма и нищеты, начисто уничтоженных пожарами Черного понедельника, из пепла восстал стремительный феникс. Поскольку крестьянство и землевладельцы удовлетворены своей ролью в экономике провинции, давайте идти рука об руку в новую эпоху процветания."

 ##- Shared -##

 HNN_balancing_the_books: "Балансировка счетов"
 HNN_balancing_the_books_desc: "Финансовое положение Хунани всегда было плачевным и бедным, поэтому правительству провинции часто приходилось брать кредиты, чтобы предотвратить полный экономический крах. В отличие от остальных провинций страны, наша финансовая отчетность находится в плачевном состоянии, а долг - в ещё более худшем. Привлекая лучших бухгалтеров и бюрократов провинции к решению этой проблемы, мы наконец-то сможем обрести немного экономической свободы."

 HNN_excavating_the_interior: "Раскопки в провинции"
 HNN_excavating_the_interior_desc: "Из-за бесхозяйственности или некомпетентности провинциальное правительство не смогло использовать истинный потенциал внутренних ресурсов Хунани. Благодаря новым экономическим свободам, предоставленным нам в результате выхода из Лиги, и исправлению провинциальной казны, мы сможем наконец извлечь все, что может дать нам наша прекрасная земля."

 HNN_the_vital_economic_linchpin: "Жизненно важный экономический стержень"
 HNN_the_vital_economic_linchpin_desc: "Занимая центральное место в государстве, Хунань пережила много благ и много трудностей. Однако благодаря тактичному управлению индустриализацией, местными и иностранными властями, Хунань заслужила роль главной провинциальной державы в государстве. Способная оказывать влияние на других, она действительно является жизненно важным экономическим стержнем Китая."
 
 ##- Military -##

 HNN_our_provincial_army: "Провинциальная армия Хунани"
 HNN_our_provincial_army_desc: "Армия Хунани, почти не участвовавшая в боях в годы, последовавшие за Северной экспедицией, представляет собой всего лишь небольшую кучку солдат, поскольку она почти ничего не получила от немецкой военной миссии в Чжили. С теми небольшими ресурсами, которыми мы располагаем, армия Хунани должна быть укреплена, перестроена и обучена, чтобы стать грозной силой, способной соперничать с Чжили, Фэнтянем и всеми остальными, кто посягнет на провинцию."

 HNN_following_in_great_footsteps: "Следуя путями Великих"
 HNN_following_in_great_footsteps_desc: "Свирепый и неумолимый. Политически сознательный и преданный своему делу. Все это присуще храбрым солдатам Национально-Революционной Армии. Даже сейчас те, кто искренне поддерживает идеалы доктора Сунь Ятсена и Гоминьдана борются за свои убеждения в зоне мятежей Минган и в Гуйчжоу. Следуя по стопам наших товарищей, мы должны стремиться сравняться с ними в силе."

 HNN_arise_hunans_peasantry: "Поднять крестьянство Хунани"
 HNN_arise_hunans_peasantry_desc: "Крестьяне Хунани больше не будут страдать под гнетом дворян или деспотичных военачальников. С приходом к власти в Хунани Гоминьдана мы, наконец, сможем предоставить им свободу, о которой они так мечтают. Благодаря интеграции во вспомогательные формирования в дополнение к нашим регулярным армиям, крестьяне провинции Хунань покажут всему Китаю свою ярость."

 HNN_disintegrating_their_walls: "Разрушая их стены"
 HNN_disintegrating_their_walls_desc: "Подобно удару молота по наковальне, огневая мощь артиллерии уничтожает все на своем пути. Как видно из "Вельткрига" и, что более важно, из "эры милитаристов" сторона, обладающая более мощным оружием, обязательно одержит победу. Благодаря опыту Чэн Цяня в командовании артиллерийскими соединениями, наша армия обрушит гром на наших врагов."

 HNN_steel_hearts_tenacious_minds: "Стальные сердца, твердые умы"
 HNN_steel_hearts_tenacious_minds_desc: "Нет ничего более надежного в солдатах НРА, чем их преданность Трем принципам и Национальной Революции. Благодаря рвению, жестокости и мужеству наши войска будут вызывать страх и в равной степени прославляться. Со стальными сердцами и непоколебимым разумом мы увидим, как страна объединится, а иностранные империалисты будут полностью изгнаны."

 HNN_disciplined_and_motivated: "Дисциплина и мотивация"
 HNN_disciplined_and_motivated_desc: "Несмотря на численное и огневое превосходство врагов в Северной экспедиции, НРА одержала победу, несмотря на трудности. Многие из наших прошлых побед можно отнести на счет мотивации и дисциплины рядовых солдат по сравнению с силами военачальников. Даже во времена Мингана и изгнания в Гуйчжоу наши армии все еще сражались, чтобы увидеть, как лучи Белого солнца освещают всю страну."

 HNN_critiquing_our_mistakes: "Исправление ошибок"
 HNN_critiquing_our_mistakes_desc: "Мы знаем о своих провалах. Каждый командир Национально-Революционной Армии знает об этом. Наши ошибки в прошлом едва не стоили нам будущего Китая, и мы никогда не допустим, чтобы это повторилось. Благодаря анализу прошлых конфликтов и осуществлению строгой программы встреч после боев мы добьемся того, что наши силы станут непревзойденными на поле боя."

 HNN_modernised_cavalry_command: "Современные кавалерийские соединения"
 HNN_modernised_cavalry_command_desc: "Национальная оборонная промышленность Китая в настоящее время не располагает возможностями для производства настоящих бронетанковых или даже механизированных сил, сравнимых с западными, однако это не означает, что мы не можем признать приоритет маневренной войны. В соответствии с рекомендациями передовых теоретиков Москвы, Берлина и Лондона, давайте пополним наши ограниченные запасы моторизованной техники уже существующими кавалерийскими подразделениями, что позволит нам по-настоящему использовать достигнутые успехи."

 HNN_pincer_and_envelopment: "Захват в клещи и добивание"
 HNN_pincer_and_envelopment_desc: "Наши враги могут использовать превосходящее вооружение или численное превосходство, чтобы попытаться подавить нашу революцию, однако с помощью тактики захвата в клещи даже превосходящие силы могут быть разбиты. Изолируя вражеские колонны благодаря нашему знанию местности и координации действий нашей регулярной армии совместно с кавалерийскими подразделениями, мы можем уничтожать целые вражеские дивизии."

 HNN_luring_the_enemy_in_deep: "Заманивание врага в глубину"
 HNN_luring_the_enemy_in_deep_desc: "Китайские военные теоретики долгое время забавлялись концепцией "заманивания противника в глубину". Об этом свидетельствуют такие теоретики эпохи Цин, как Янфан Шуолуэ, Хайго Тужи или даже современные революционные деятели, такие как Цай Е. Давайте, наконец, применим методы, разработанные этими великими мыслителями. Тщательно заманивая вражеские силы последовать за нашими людьми, мы позволим обширности наших земель сокрушить их."

 HNN_centralised_planning_decentralised_execution: "Централизованное планирование- децентрализованное исполнение"
 HNN_centralised_planning_decentralised_execution_desc: "Как неоднократно подтверждалось на протяжении всей истории, строгое выполнение приказов часто может привести к плачевным результатам, если боевая ситуация отличается от запланированной. Хотя мы всегда должны надеяться на разработку конкретного плана действий, давайте передадим конкретные приказы отдельным командирам на местах, предоставив им инициативу в выборе действий."

 HNN_hallmark_of_revolutionary_warfare: "Символ революционной войны"
 HNN_hallmark_of_revolutionary_warfare_desc: "Воистину, объединение 6-й и 8-й национально-революционных армий породило фанатичную силу, которая стремится к тому, чтобы видение доктора Суна о Китае не умерло. Неся факел наших погибших товарищей и будущего китайского народа, мы отправляемся в наше собственное смелое путешествие. Мобилизация всех классов, совместные действия на благо нации - вот истинный признак революционной войны."

 HNN_victors_of_weltkrieg_victors_of_china: "Победители в Вельткриге, победители в Китае"
 HNN_victors_of_weltkrieg_victors_of_china_desc: "Наблюдая за ожесточенными боями в Вельткриге, именно Армия в конечном счете одержала победу в жестоких сражениях. Снова и снова они одерживали победу, и в очередной раз они одержали победу, когда немецкие войска выступили на стороне чжилийской клики и разгромили Национально-Революционную Армию во время Северного похода. Мы должны работать над созданием армии, способной на такие победы, и в то же время минимизировать недостатки немецкого гиганта."

 HNN_our_own_heer: "Наш собственный Heer"
 HNN_our_own_heer_desc: "Как известно всему миру, вооруженные силы Германской империи являются самой мощной военной силой на международном уровне. Повсюду немецкий орел расправляет свои крылья исключительно благодаря способностям своего командования. В то время как наша провинция уступает в партнерстве с Германией странам Лиги или Пекину, нашим местным теоретикам удалось изучить немецкую военную миссию в Чжили, и мы можем только надеяться на то, что сможем повторить ее опыт."

 HNN_acting_as_one: "Действовуя как единое целое"
 HNN_acting_as_one_desc: "Решающее значение для успеха немцев имела их способность координировать массовые действия своих вооруженных сил для достижения единой, общей цели. Благодаря быстрым инновациям в области радиосвязи полезность и эффективность таких скоординированных действий только возросла. Инвестируя в развитие наших собственных коммуникационных технологий, давайте привнесем в Китай новую эру ведения войны."

 HNN_concealment_and_reconnaissance: "Маскировка и разведка"
 HNN_concealment_and_reconnaissance_desc: "Поскольку мир стремительно приближается к катастрофе, этот вихрь, несомненно, затянет и китайскую нацию. Чтобы обеспечить себе преимущество перед потенциальными врагами, мы должны обучать наших командиров принципам маскировки и разведки. Придавая особое значение сохранению секретности, расширяя наши разведывательные подразделения и разведывательные операции, мы всегда будем сохранять инициативу в бою."

 HNN_defence_and_industry_in_tandem: "Смычка обороны и промышленности"
 HNN_defence_and_industry_in_tandem_desc: "Как наиболее критично утверждают немецкие теоретики, представляющие все вооруженные силы страны, армия и промышленный сектор в наибольшей степени работают над достижением общей синергетической цели обеспечения нашей независимости. Заключая специальные деловые контракты с начинающими предпринимателями, мы будем работать сообща, чтобы мобилизовать всю мощь промышленности и рабочей силы провинции Хунань."

 HNN_victory_through_innovation: "Победа через инновации"
 HNN_victory_through_innovation_desc: "Вельткриг наглядно продемонстрировал, как быстрое развитие вооружений может переломить ход конфликта. Благодаря развитию танков, воздушного флота и даже подводных лодок баланс сил склонился в пользу одной из сторон. Несмотря на ограниченные возможности, наше правительство вложит значительные средства в сектор образования, чтобы гарантировать, что Хунань сохранит технологическое превосходство над своими конкурентами."

 HNN_officers_example: "Пример офицера"
 HNN_officers_example_desc: "Действительно, солдаты не смогли бы добиться победы в одиночку, поскольку именно офицерский корпус, командиры, возглавляют наступление. Эти люди заслуживают особого вознаграждения за планирование наилучших путей достижения стратегических целей провинции путем правильного применения тактики на местности. Ибо эти великие личности являются носителями меча во имя спасения Хунани."

 HNN_new_infantry_drill_regulations: "Новые правила подготовки пехоты"
 HNN_new_infantry_drill_regulations_desc: "\"Цаофа\", или \"Новые правила подготовки пехоты\", были основным учебным пособием в военных учебных заведениях поздней династии Цин. Несмотря на то, что они появились еще до начала современной мобильной войны, их основные принципы по-прежнему актуальны в наше время. Придавая первостепенное значение строю пехоты и призывая всегда быть в наступлении, давайте поручим офицерам нашей армии ознакомиться с таким полезным литературным произведением."

 HNN_pinnacle_of_the_new_army: "[HNN_pinnacle_of_the_new_army_loc]"
 HNN_pinnacle_of_the_new_army_desc: "[HNN_pinnacle_of_the_new_army_loc_desc]"

 HNN_the_example_for_the_nation: "Образец для народа"
 HNN_the_example_for_the_nation_desc: "Наша армия не знает границ. Несравненная и не имеющая противников, она является ярким примером для подражания по всей стране. Хотя она и не может сравниться с армией Германской империи, на полях сражений в Китае она будет безраздельно властвовать. Точно так же, как честное правление и дух Хунани должны служить образцом для других провинций, так и наша военная мощь должна служить примером для других провинций."

 HNN_revitalise_zhuzhou_arsenal: "Обновление арсенала Чжучжоу"
 HNN_revitalise_zhuzhou_arsenal_desc: "Столкнувшись с финансовыми и производственными трудностями в начале нового года, Арсенал Чжучжоу по-прежнему способен производить большое количество вооружений для наших родных армий и за пределами провинции. Давайте возобновим наши инвестиции в важнейший арсенал, чтобы он мог соперничать даже с тайюаньским."

 HNN_a_thorough_reexamination_of_strategy: "Переоценка нашей доктрины"
 HNN_a_thorough_reexamination_of_strategy_desc: "В течение долгого периода военной спячки наши командиры так и не смогли по-настоящему приспособиться к современности, некоторые из них все еще живут в эпоху войн Чжифэн. Что еще хуже, по сравнению с западными армиями, армии Китая никогда не смогут сравняться с ними даже в относительном отношении. Это может оказаться дорогостоящим, но мы приступим к тщательному изучению наших стратегий, поскольку на карту может быть поставлена целостность провинции Хунань."

 HNN_a_new_academy: "[HNN_a_new_academy_faction_loc]"
 HNN_a_new_academy_desc: "[HNN_a_new_academy_faction_loc_desc]"

 HNN_provincial_redoubts: "Наши укрепления"
 HNN_provincial_redoubts_desc: "Не имея возможности по-настоящему полагаться на собственные силы обороны, значительная часть наших инженерных войск предложила построить различные национальные редуты на границах с нашими самыми опасными врагами. За счет государственного финансирования будут возведены огромные бетонные бункеры, которые, несомненно, станут оплотом в любой попытке свергнуть наше правительство в Чанше."

 HNN_producing_a_viable_air_fleet: "Создание жизнеспособного воздушного флота"
 HNN_producing_a_viable_air_fleet_desc: "По-настоящему китайские попытки контролировать наше внутреннее небо были в лучшем случае тщетны. Наиболее боеспособным парком являются устаревшие бипланы, которыми пользуются жители провинции Гуандун или Фэнтяня. Мы никогда не могли надеяться на то, что сможем по-настоящему бросить вызов иностранному небу, но давайте работать над обеспечением безопасности нашего собственного воздушного пространства. По крайней мере, для того, чтобы граждане Хунани не боялись неба."

 HNN_securing_hunans_airspace: "Обеспечить воздушную безопасность Хунани"
 HNN_securing_hunans_airspace_desc: "Испытывая недостаток в существующей авиационной промышленности и не имея средств или рабочей силы для ее создания, правительство решило вложить средства в создание серии зенитных батарей, чтобы, по крайней мере, наши храбрые солдаты на земле могли сбивать любой бомбардировщик или истребитель, который появится на их пути."

 HNN_developing_native_pilots: "Продвижение местных пилотов"
 HNN_developing_native_pilots_desc: "Обучение пилотов управлению теми небольшими машинами, которые мы можем собрать, было совершенно чуждым для значительной части населения провинции Хунань процессом. Благодаря согласованным усилиям правительства и, возможно, привлечению тех, кто находится за пределами провинции, мы должны разработать конкретную учебную программу для обучения отважных хунаньских летчиков истинным качествам пилота-аса."

 HNN_importing_fighter_designs: "Импортировать проекты истребителей"
 HNN_importing_fighter_designs_desc: "Лишенные каких-либо отечественных образцов истребителей, но располагающее ресурсами для приобретения иностранных, правительство сочло необходимым обеспечить импорт чертежей из стран, готовых их предоставить. К сожалению, это придется делать до тех пор, пока Китай не начнет развивать собственную авиационную промышленность."

########################################
#####- Section 07: Ideas - #############
########################################

 HNN_a_democratic_province: "Конституционное наследие"
 HNN_a_democratic_province_desc: "В отличие от других провинций, Хунань уникальна тем, что у нее есть Конституция. Конституция провинции, принятая Чжао Хэнти и двенадцатью другими 1 января 1922 года, направлена на защиту прав каждого жителя провинции Хунань, будь то мужчина, женщина или ребенок. Это гарантирует свободные выборы в провинции Хунань с выборным провинциальным советом и губернатором. Хотя Чжао принимает демократию Хунани близко к сердцу, его приверженность своим идеалам (и часто шумное собрание) означает, что политический тупик является обычным явлением. В Конституции также есть пункт, подробно описывающий "доктрину Монро" Хунани, в котором говорится, что никакие хунанские войска не должны выходить из Хунани, и войска других провинций не могут входить в Хунань."

 HNN_constitutional_hopes_dashed: "Крушение конституционалистских надежд"
 HNN_constitutional_hopes_dashed_desc: "Тан Сянмин отменил новую редакцию Конституции провинции Хунань и занял пост военного губернатора, сокрушив своим железным сапогом демократическую мечту провинции."

 HNN_intellectual_hub: "Интеллектуальный центр"
 HNN_intellectual_hub_desc: "В Китае Хунань - одно из немногих мест, где интеллектуалы могут собираться и свободно высказываться. Хотя в нашей провинции это было замечательным достижением, в нашей относительно бедной провинции приют такого количества интеллектуалов может дорого обойтись"

 HNN_the_western_diarchy: "Диархия на Западе"
 HNN_the_western_diarchy_desc: "В западной части провинции Хунань, Сянси, правят два военачальника, Чэнь Цюйчжэнь и Тянь Инчжао. Формально они лояльны Чжао, но больше симпатизируют Тан Сянмину. В любом случае, они служат занозой в заднице губернатора, и с ними нужно либо идти на компромисс, либо подчиняться, либо двоевластие должно рухнуть."

 HNN_the_revolutionary_model: "Революционная модель армии"
 HNN_the_german_model: "Германская модель армии"
 HNN_hunanese_high_command_KMT: "Высшее командование Хунани"
 HNN_hunanese_high_command_ger: "Высшее командование Хунани"

 HNN_clearing_house: "Отдел эффективности"
 HNN_clearing_house_desc: "С окончательным урегулированием политической ситуации в провинции Хунань правительство теперь может провести критически необходимые реформы, чтобы возродить наш офицерский корпус и персонал. Благодаря процессу тщательной проверки, суровому наказанию за любые предполагаемые признаки коррупции и усиленным тренировкам армия Хунани будет блистать как никогда прежде."

 HNN_arise_hunans_peasantry_idea: "Собственное производство оружия"
 HNN_arise_hunans_peasantry_idea_desc: "Хотя в провинции Хунань, возможно, и нет таких больших производств, как в Шэньяне, Тайюане или Цзиньлине, недостаток в вооружении мы восполняем изобретательностью. Утилизируя пришедшее в негодность оборудование, повторно используя старое оборудование и модернизируя нашу технику, промышленность Hunan arm может более эффективно производить винтовки нового поколения для нашего нового поколения солдат."

 HNN_reexamining_our_strategies: "Пересмотреть нашу стратегию"
 HNN_reexamining_our_strategies_desc: "Благодаря тщательному анализу наших предыдущих ошибок на поле боя, результатов действий как Чжилийской армии, так и Национально-революционной армии, мы стремимся в конечном итоге модернизировать нашу родную армию провинции Хунань в соответствии с западными стандартами. Однако дополнительная бюрократия и новые стратегии влияют на способности нашего командира действовать в реальном бою."

 HNN_the_revolutionary_model_dummy: "Революционная модель армии"
 HNN_the_german_model_dummy: "Германская модель армии"
 HNN_hunanese_high_command_KMT_dummy: "Высшее командование Хунани"
 HNN_hunanese_high_command_ger_dummy: "Высшее командование Хунани"

 HNN_perilous_industrial_sector: "Рискованная промышленность"
 HNN_perilous_industrial_sector_desc: "На юге находится сияющая звезда дельты Жемчужной реки, Гуанчжоу. На северо-востоке расположено объединение трех промышленных городов, Ухань, а на западе - практичный мегаполис внутренних районов, Чунцин. Однако на перекрестке между ними находятся скромные промышленные центры Чандэ и Чанша. Эти два города, возвышающиеся над обширными сельскохозяйственными угодьями, которыми изобилует провинция Хунань, являются крупнейшими ярмарками в нашем промышленном потенциале. Однако ни один из них не получил должного внимания, поскольку инвесторы предпочитают вкладывать свои деньги в более благоустроенные районы в соседних провинциях. Это ставит правительство Хунани в несколько опасное положение, поскольку весь промышленный сектор зависит от успеха двух городских центров, которые недостаточно финансируются."

 HNN_intense_agricultural_imbalance: "Серьезный дисбаланс в сельском хозяйстве"
 HNN_intense_agricultural_imbalance_desc: "В отличие от остальной части Китая, в провинции Хунань преобладает сельскохозяйственная экономика с небольшим количеством крупных городов. Многочисленные деревни и фермерские общины разбросаны по всей территории, и еще больше работников возделывают свои поля. При дальнейшем анализе выясняется, что одной из самых поразительных характеристик сельскохозяйственной системы Хунани — и страны в целом — является почти феодальный кошмар, который она собой представляет. Местные дворяне и землевладельцы управляют своими деревенскими общинами как монархи своими вотчинами, и в подавляющем большинстве случаев населению от этого только хуже. Однако интересы землевладельцев - это в значительной степени то, с чем правительство Чанши вынуждено считаться, поскольку они контролируют нити, управляющие экономикой Хунани."

 HNN_derelict_industrial_sector: "Заброшенный промышленный сектор"
 HNN_derelict_industrial_sector_desc: "Цунами "Черного Понедельника" наконец-то захлестнуло Восточную Азию, и вместе с этим бедствием, сопровождавшимся жесткими беспорядками, которое в конечном итоге стало похоронным звоном для Лиги, вместе с ним исчезли и скудные промышленные предложения Хунани. Подобно тарану, хаос на востоке обрушился на все предприятия как в Чанше, так и в Чандэ: малые предприятия закрылись, а более крупные уволили множество сотрудников. Поскольку наша экономика полностью разрушена, жизнеспособность наших городских центров ослабевает, и правительство должно принять все необходимые меры для облегчения страданий людей."

 HNN_catastrophic_agricultural_crisis: "Катастрофический сельскохозяйственный кризис"
 HNN_catastrophic_agricultural_crisis_desc: "Глобальный экономический спад, который в основном носит аграрный характер, нанес серьезный удар по стабильности сельского хозяйства провинции Хунань. Некогда продуктивная, но криминально несбалансированная ситуация в сельском хозяйстве быстро превратилась в стремительно развивающийся кризис. В условиях невероятной нехватки денег, при продолжающемся сборе урожая, наблюдается серьезный дефицит продуктов, но нет потенциальных покупателей, которые могли бы их продать, что приводит к напрасной трате усилий и продуктов питания. Что еще хуже, землевладельцы считают необходимым ликвидировать рабочие места, чтобы защитить свои активы, что приводит к дальнейшим беспорядкам."

 HNN_stabilising_industrial_sector: "Стабилизированный промышленный сектор"
 HNN_stabilising_industrial_sector_desc: "После того, как правительство, наконец, снизошло до решения промышленного вопроса, в нашей отрасли наблюдается заметная стабилизация, что соответствует показателям других глобальных экономик по всему миру. Несмотря на то, что ситуация по-прежнему хуже, чем до кризиса, предприятия больше не закрываются, а безработица больше не растет. В условиях такого хаоса открываются новые возможности, поскольку правительство теперь может работать над восстановлением экономики с нуля."

 HNN_renewed_agricultural_balance: "Восстановление баланса в сельском хозяйстве"
 HNN_renewed_agricultural_balance_desc: "Приступая к осуществлению грандиозной миссии по возрождению и, в конечном счете, улучшению экономики провинции Хунань, правительство предприняло первые инициативы, которые наряду с сокращением активов и власти землевладельцев привели к своего рода равновесию в сельском хозяйстве. Несмотря на то, что злоупотребления все еще имеют место, а дворянство по-прежнему имеет значительное влияние на провинцию, восстановленный баланс привел к созданию новых условий, необходимых для продуктивного развития сельского хозяйства Хунани."

 HNN_independent_industrial_sector: "Независимый промышленный сектор"
 HNN_independent_industrial_sector_desc: "Проводя политику экономической независимости, правительство позаботилось о том, чтобы промышленность Хунани работала на благо народа Хунани, а не иностранных инвесторов за пределами провинции. Сторонники свободного рынка считают эту политику радикальной, но правительство стало свидетелем того, к чему приводит безудержный неограниченный ничем капитализм. "

 HNN_developing_industrial_sector: "Развивающийся промышленный сектор"
 HNN_developing_industrial_sector_desc: "Финансируя городское развитие Хунани за счет привлечения иностранных инвесторов, наша экономика будет проводить замечательную политику открытых дверей с точки зрения роста. Благодаря стимулам, обещанной стабильности и субсидиям Чанша превратится в рог изобилия промышленных инноваций и производства, конкурирующий даже с высокими дымовыми трубами Маньчжурии."

 HNN_self_sufficient_industry: "Самодостаточная промышленность"
 HNN_self_sufficient_industry_desc: "Инициативы правительства Хунани, направленные на достижение подлинной экономической самодостаточности, позволили создать экономику, которая работает на людей, а не на инвесторов. По мере того, как благосостояние нашего народа постепенно растет, растет и его благосостояние, и наша провинция становится только лучше от этого. Несмотря на то, что жители провинции Хунань никоим образом не прославились, для них наступила новая эра процветания."

 HNN_export_oriented_industry: "Экспортоориентированная промышленность"
 HNN_export_oriented_industry_desc: "Несмотря на то, что наша экономика несопоставима с современными экономиками Токио или Запада, наше промышленное положение по-прежнему не вызывает насмешек. Уделение приоритетного внимания экспорту, быстрое развитие фабрик и бурный рост производства товаров привели к процветанию благодаря прекрасному экономическому управлению. Несмотря на то, что экономика Хунани, безусловно, зависит от стабильности иностранных инвестиций и торговли, она, тем не менее, процветает."

 HNN_careful_agricultural_reform: "Умеренная сельскохозяйственная реформа"
 HNN_careful_agricultural_reform_desc: "Предвидя, что тотальное перераспределение земель неизбежно приведет к хаосу, политики провинции Хунань сочли необходимым начать политику умеренной земельной реформы. В рамках которой они реализуют ряд программ, направленных на пресечение вопиющих злоупотреблений элитного класса землевладельцев, одновременно используя государственные средства для покупки и перераспределения земли среди своих работников. Однако даже такие умеренные планы вызвали недовольство со стороны дворян, обеспокоенных тем, что это всего лишь уловка губернатора для дальнейшего укрепления своей власти, однако губернатор все еще пытался убедить их, что это делается для процветания провинции."

 HNN_embers_of_agricultural_redistribution: "Тлеющие угли земельной реформы"
 HNN_embers_of_agricultural_redistribution_desc: "Решив, что для спасения и обновления пошатнувшейся сельскохозяйственной системы Хунани необходимы радикальные меры, политики в Чанше приступили к осуществлению программы ограниченного перераспределения земель. В ходе которого правительство начало скупать (и захватывать) различные землевладельческие поместья и продавать их более многочисленным семьям или крестьянским советам. Как и следовало ожидать, вызвав сильное недовольство элит, они предприняли попытки заблокировать правительство или иным образом воспрепятствовать процессу, но безрезультатно."

 HNN_revitalised_agricultural_balance: "Восстановленное равновесие в сельском хозяйстве"
 HNN_revitalised_agricultural_balance_desc: "После завершения реализации своих сельскохозяйственных инициатив взвешенный подход правительства к земельной реформе привел к созданию нового, обновленного баланса в сельском хозяйстве. Поскольку чаша весов не обязательно склонялась слишком сильно в одну сторону, лидеры в Чанше позаботились об упорядочении феодального лоскутного землевладения в провинции Хунань. Однако, хотя более радикально настроенные члены общества могут счесть, что этого недостаточно, крестьяне и дворяне провинции Хунань видят взаимное улучшение своей повседневной жизни, и крики несогласных в значительной степени заглушаются."

 HNN_peasant_oriented_agriculture: "Крестьяноориентированное сельское хозяйство"
 HNN_peasant_oriented_agriculture_desc: "Наконец-то завершив свою экономическую программу, подход правительства, ориентированный на крестьянство, по-видимому, принес значительную пользу их жизни. Благодаря поддержке местных крестьянских кооперативов и советов, а также возобновившемуся в настоящее время перераспределению земли от немногих ко многим, сельскохозяйственная система провинции Хунань является настоящей яркой звездой среди аграрных регионов Китая. Как бы ни старались старые элиты препятствовать прогрессу, их попытки оказались тщетными, и, поскольку их власть значительно ослабла, все получат свою справедливую долю земли, которая была обработана тяжелым трудом."

 HNN_peasant_oriented_self_sufficient_economy: "Самодостаточная аграрная экономика"
 HNN_peasant_oriented_self_sufficient_economy_desc: "К счастью, окончательное завершение и интеграция экономических реформ в провинции Хунань привели к фантастическим результатам. Благодаря усилению внимания к Хунани в первую очередь, экономика приобрела уникальный для крестьянской провинции характер. Уделяя первоочередное внимание потребностям крестьянства, рабочих и всех жителей Хунани, все они могут получить долгожданную передышку от бесконечного тяжелого труда за те скудные крохи, которые им предоставляются по \"доброй воле\" иностранных финансистов и аристократии. Если экономический сектор будет в безопасности и процветать, то и Хунань будет процветать в условиях хаоса эпохи военачальников."

 HNN_revitalised_export_oriented_economy: "Возрожденная экспортоориентированная экономика"
 HNN_revitalised_export_oriented_economy_desc: "К счастью, окончательное завершение и интеграция экономических реформ в провинции Хунань дали фантастические результаты. С усилением внимания к превращению провинции в экономический центр финансовая система приобрела уникальный индустриальный и модернизированный вид. История экономического успеха провинции Хунань, которая может соперничать с экономической мощью Лиги и Фэнтяня без каких-либо сомнительных условий, достойна восхищения. Хунаньскую капиталистическую утопию ожидают безграничные возможности."

 HNN_peasant_oriented_export_oriented_economy: "Аграрная экспортоориентированная экономика"
 HNN_peasant_oriented_export_oriented_economy_desc: "Программы экономических реформ в провинции Хунань, которые некоторые сторонники жесткой идеологической линии осудили бы как эзотерическую смесь запутанных принципов, привели к тому, что эклектичное крестьянство отдало приоритет экспортной экономике. Ведь крестьяне честно трудятся на полях, и их сельскохозяйственная продукция превращается в такие товары, как одежда или предметы роскоши, которые затем продаются на международных рынках. В конечном счете, экономическая модель Хунани - это меритократическая модель, тесно интегрированная с более широкими рынками, гарантирующая, что как рабочие, так и крестьяне в равной степени будут пользоваться преимуществами, которые дает им их занятость."

 HNN_revitalised_self_sufficient_economy: "Возрожденная самодостаточная экономика"
 HNN_revitalised_self_sufficient_economy_desc: "Благодаря двуединому подходу к управлению экономикой, экономика Хунани стала двуличной. На одном полюсе находится умеренная земельная реформа, которая уравнивает условия труда между дворянами и землепашцами, сохраняя при этом честность и стабильность. С другой стороны, развитие городских центров, ориентированных на провинцию, обеспечивает полное государственное управление важнейшими отраслями промышленности. Однако, в конечном итоге, финансовая ситуация улучшается, поскольку правительство становится свидетелем притока доходов, а люди становятся богаче. Восстановление Хунани - это образец большого успеха, в этом нет сомнений."

 HNN_balancing_the_books_idea: "Сведение счетов"
 HNN_balancing_the_books_idea_desc: "Благодаря процессу критической оценки, искоренению коррупции, сокращению ненужных расходов и ужесточению бюджета правительство переживает интенсивный период восстановления экономического равновесия. Однако благодаря нашим усилиям правительство должно было улучшить ситуацию в регионе Хунань настолько, чтобы возродить процветание, даже ценой долгого блуждания по бюрократическому болоту."

 HNN_seized_foreign_assets: "Арестованные иностранные активы"
 HNN_seized_foreign_assets_desc: "В соответствии с независимым экономическим курсом Хунани, правительство позаботилось о национализации и захвате различных важнейших отраслей промышленности, находящихся в руках империалистов. Благодаря таким радикальным действиям наша государственная казна быстро наполняется, а экономика переживает незначительный подъем, даже ценой того, что иностранные инвесторы спасаются от преследований."

 HNN_subsidised_military_industry: "Субсидируемая военная промышленность"
 HNN_subsidised_military_industry_desc: "Считая провинцию Хунань оплотом процветания Чжили, губернатор Тан Сянмин использовал свои связи в Центральном правительстве, чтобы пригласить ряд военно-промышленных магнатов для открытия новых заводов по производству вооружения в провинции Хунань. Таким образом, есть надежда, что Хунань превратится в центр производства вооружений, способный конкурировать даже с арсеналами в Хубэе или Шаньси."

 HNN_open_for_business: "Открытая экономика"
 HNN_open_for_business_desc: "Благодаря новой инициативе по открытию своих рынков для иностранных инвестиций, она стала свидетелем потока предпринимательских инициатив со стороны как местных, так и международных капиталистов. С их помощью наша экономика процветает, несмотря на то, что правительство испытывает трудности, не в состоянии поддерживать бюрократические процедуры для надлежащего удовлетворения потребностей бизнесменов."

 HNN_union_government_synergy: "Договор правительства с профсоюзами"
 HNN_union_government_synergy_desc: "Протянув руку помощи профсоюзам Чанши, которые, как правило, ведут активную работу, правительство и профсоюзные лидеры пришли к соглашению. Удовлетворив требования рабочих, правительство пообещало уделять первоочередное внимание их благосостоянию в соответствии с правительственным курсом на развитие самодостаточной промышленности. В свою очередь, профсоюзы добились значительного повышения производительности труда работников, обеспечив взаимную выгоду для обеих сторон."

 HNN_industrial_self_sufficiency_idea: "Промышленная самодостаточность"
 HNN_industrial_self_sufficiency_idea_desc: "Воистину, как недоброжелатели, так и союзники могут согласиться в одном. Новая экономика Хунани - это экономика исключительно Хунани, и ей больше не нужно быть связанной с какой-либо крупной партией, такой как Лига, вместо этого она стоит на своих собственных ногах, мощная и работающая в первую очередь на благо народа Хунани. Благодаря своему обновленному статусу она должна быть способна противостоять любому радикальному изменению экономических перспектив, сейчас и навсегда."

 HNN_industrial_self_sufficiency_aat_idea: "Промышленная самодостаточность"
 HNN_industrial_self_sufficiency_aat_idea_desc: "Воистину, как недоброжелатели, так и друзья могут согласиться в одном. Новая экономика Хунани - это экономика исключительно Хунани, и ей больше не нужно быть связанной с какой-либо крупной партией, такой как Лига, вместо этого она стоит на своих собственных ногах, мощная и работающая в первую очередь на благо народа Хунани. Благодаря своему обновленному статусу она должна быть способна противостоять любому радикальному изменению экономических перспектив, сейчас и навсегда."

 HNN_harmonious_land_development: "Гармоничное сельское хозяйство"
 HNN_harmonious_land_development_desc: "Благодаря нашим новым экономическим инициативам, которые привели к ошеломляющим успехам, наше правительство достигло нового уровня \"гармонии\" с ситуацией в сельском хозяйстве. Благодаря активизации усилий по производству продукции не только для экономики, но и для людей, Хунань достигла того, что можно считать идеальной формой управления экономикой в сельском хозяйстве."

 HNN_peasant_councils: "Крестьянские Советы"
 HNN_peasant_councils_desc: "Политика правительства, направленная на формирование нового, дружественного крестьянам подхода к сельскому хозяйству, позволила сформировать местные крестьянские советы, конечная цель которых - служить противовесом политическому влиянию дворянства. Благодаря их организации и поддержке со стороны Чанша этот новый союз с крестьянством привел к росту политической поддержки и патриотизма по всей провинции."

### Politics

 ## Tang Xiangming

 HNN_lingering_kmt_insurgents: "Недобитые гоминьдановские повстанцы"
 HNN_lingering_kmt_insurgents_desc: "Несмотря на нашу победу над Гоминьданом, в провинции Хунань все еще действуют повстанческие ячейки, и губернатору Тан Сянмину и его войскам потребуются усилия, чтобы избавиться от последних представителей Гоминьдана из нашей провинции."

 HNN_turbulent_intelligentsia: "Неспокойная интеллигенция"
 HNN_turbulent_intelligentsia_desc: "Захватив Хунань, мы перенаправили средства, ранее выделявшиеся провинциальной интеллигенции, на более важные дела. Это, наряду с жестким характером нашего режима, настроило многочисленную интеллигенцию Хунани против нас, что будет препятствовать нашему развитию до тех пор, пока мы не сможем разобраться с нелояльными интеллектуалами."

 HNN_martial_law: "Военное положение"
 HNN_martial_law_desc: "Чтобы должным образом подавить гоминьдановских повстанцев, которым удалось выжить в первых боях с Таном, губернатор объявил военное положение. Хотя это может показаться суровым для сторонних, особенно иностранных наблюдателей, это необходимо для обеспечения безопасности граждан Хунани, поскольку это единственный способ помешать повстанцам Гоминьдана совершать набеги на их деревни и грабить их."

 HNN_eradicated_opposition: "Уничтоженная оппозиция"
 HNN_eradicated_opposition_desc: "Уничтожив Гоминьдан и должным образом заткнув рот \"демократическим\" союзникам предыдущего губернатора, губернатор Тан Сянмин успешно ликвидировал всю оппозицию чжилийской клике и своему собственному правлению в провинции Хунань. Некоторые спрашивали, означает ли это, что военное положение может быть отменено, но печальная правда заключается в том, что у Хунани по-прежнему много внешних врагов, и она по-прежнему находится под постоянной угрозой извне."

 HNN_defence_commission: "Комиссия по обороне - §LУчрежденная§!"
 HNN_defence_commission_desc: "\"Комиссия по обороне провинции Хунань\", или сокращенно Комиссия по обороне, является недавно созданным правительственным органом, который предоставляет губернатору Тану широкие полномочия в \"любых вопросах, связанных с обороной провинции Хунань\". Губернатор быстро применил эти полномочия, гарантируя, что каждый гражданин сможет жить в безопасной провинции."

 HNN_defence_commission_2: "Комиссия по обороне - §gРасширенные полномочия§!"
 HNN_defence_commission_2_desc: "\"Комиссия по обороне провинции Хунань\", или сокращенно Комиссия по обороне, является недавно созданным правительственным органом, который предоставляет губернатору Тану широкие полномочия в \"любых вопросах, связанных с обороной провинции Хунань\". Недавно полномочия Комиссии были расширены, что предоставило губернатору широкие полномочия по управлению внутренними делами провинции, разумеется, в целях обеспечения безопасности."

 HNN_defence_commission_3: "Комиссия по обороне - §PУправление по указам§!"
 HNN_defence_commission_3_desc: "\"Комиссия по обороне провинции Хунань\", или сокращенно Комиссия по обороне, является недавно созданным правительственным органом, который предоставляет губернатору Тану широкие полномочия в \"любых вопросах, связанных с обороной провинции Хунань\". Эти полномочия стали настолько широкими по своей природе, что это означает, что губернатор Тан Сянмин может эффективно править, издавая указы через Комиссию, даже не нуждаясь в том, чтобы Ассамблея выступала в качестве "штампа" для претворения его воли в действие."

 HNN_alliance_with_the_diarchy: "Союз с диархией"
 HNN_alliance_with_the_diarchy_desc: "После недавних переговоров с представителями Диархии в западной части провинции Хунань, губернатор Тан достиг с ними взаимопонимания, и их знания региона будут неоценимы при планировании обороны провинции Хунань."

 HNN_consolidating_power: "Укрепление власти"
 HNN_consolidating_power_desc: "Поскольку [HNN_zhili_home_base] отклонил нашу петицию о походе на юг, мы вместо этого сосредоточили наши усилия на укреплении нашей власти в провинции Хунань, как того предпочитает руководство Чжили."

 HNN_joint_drills_with_guizhou: "Совместные учения в Гуйчжоу"
 HNN_joint_drills_with_guizhou_desc: "Недавно мы провели инструктаж наших военнослужащих под руководством губернатора Гуйчжоу Юань Цзумина, его строгие методы были переданы нашим войскам, что сделало их более внимательными и активными в самосовершенствовании."

 HNN_rural_loyalty_ensured: "Обеспечение лояльности со стороны крестьян"
 HNN_rural_loyalty_ensured_desc: "Реформы нашей администрации в сельской местности позволили подавить волнения крестьян, сделать их послушными и принимающими новый режим, а также обеспечить стабильность нашей администрации."

 HNN_yueyang_reforms: "Реформы Юэяна"
 HNN_yueyang_reforms_desc: "Мы распространили реформу Тан Хуалуна на остальную часть провинции Хунань. Эти реформы успокоили городских рабочих и подавили беспорядки в крупных городах провинции Хунань, значительно стабилизировав наш режим."

 HNN_socialism_vanquished: "Социализм побежден"
 HNN_socialism_vanquished_desc: "Между реформами Тан Хуалуна и репрессиями Тан Сянмина та поддержка социализма, которая существовала в провинции Хунань, быстро превращается в разрозненные остатки. Поскольку поддержка Гоминьдана и китайских синдикалистов ослабевает все больше и больше, правление нашего губернатора с каждым днем кажется все более надежным"

 HNN_safe_and_secure: "Безопасность и стабильность"
 HNN_safe_and_secure_desc: "Губернатор Тан Сянмин обеспечил две вещи: безопасность. Объединившись с двоевластием Сянси, он разгромил социалистических террористов из Гоминьдана и КПБ. Это потребовало несколько резкой, но необходимой консолидации власти с помощью его Комиссии по обороне. Учитывая все, что он сделал для провинции, он может быть спокоен, зная, что его железная хватка в Хунани укрепилась и что он сможет защитить ее от любого, кто посмеет угрожать его провинции."

 ## Zhao Hengti

 HNN_a_democratic_province_2: "Конституционное наследие"
 HNN_a_democratic_province_2_desc: "В отличие от других провинций, Хунань уникальна тем, что у нее есть конституция. Провинциальная конституция, принятая Чжао Хэнти и двенадцатью другими деятелями 1 января 1922 года, направлена на защиту прав каждого жителя Хунани, будь то мужчина, женщина или ребенок. Она обещает свободные выборы в провинции Хунань, с выборным провинциальным советом и выборным губернатором. Благодаря успеху недавних переговоров Чжао удалось добиться того, чтобы Ассамблея работала с ним, а не против него. Однако в Хунани по-прежнему активно действует своеобразная "доктрина Монро", и для ее изменения потребуются дальнейшие переговоры с Ассамблеей."

 HNN_a_democratic_province_3: "Конституционное наследие"
 HNN_a_democratic_province_3_desc: "В отличие от других провинций, Хунань уникальна тем, что у нее есть конституция. Провинциальная конституция, принятая Чжао Хэнти и двенадцатью другими деятелями 1 января 1922 года, направлена на защиту прав каждого жителя Хунани, будь то мужчина, женщина или ребенок. Она обещает свободные выборы в провинции Хунань, с выборным провинциальным советом и выборным губернатором. Благодаря успеху недавних переговоров Чжао удалось добиться того, чтобы Ассамблея работала с ним, а не против него. Кроме того, своеобразная "доктрина Монро", наконец-то, была пересмотрена, что позволило Чжао должным образом поддержать воссоединение Китая в целом."

 HNN_peasant_support_weak: "Поддержка крестьян: §RСлабая§!"
 HNN_peasant_support_weak_desc: "Наши усилия по налаживанию контактов с крестьянами пока не увенчались большим успехом, но мы добились некоторых успехов, медленно, но верно укрепляя доверие к нашему правительству со стороны простых людей."

 HNN_peasant_support_growing: "Поддержка крестьян: §OРастущая§!"
 HNN_peasant_support_growing_desc: "Благодаря нашей недавней поддержке местных крестьянских организаций, наша поддержка среди крестьянства начала расти в масштабах. Теперь, когда многие видят, что мы предлагаем нечто большее, чем просто слова, поддержка радикалов наконец-то уменьшается."

 HNN_peasant_support_strong: "Поддержка крестьян: §CСильная§!"
 HNN_peasant_support_strong_desc: "По мере улучшения сельской инфраструктуры и повседневной жизни крестьян все большее их число стало поддерживать или, по крайней мере, терпеть наше правительство. Лишившись самой большой опоры Гоминьдана, они вряд ли смогут снова стать серьезной угрозой для демократии в Хунани."

 HNN_bolstered_intellectual_hub: "Надежное убежище интеллегенции"
 HNN_bolstered_intellectual_hub_desc: "Под покровительством губернатора Чжао Хэнти и без того живая интеллигенция в Хунани стала еще сильнее, и можно сказать, что Чанша, без сомнения, является одним из лучших мест для любого китайского интеллектуала."

 HNN_robust_academic_infrastructure: "Надежная академическая инфраструктура"
 HNN_robust_academic_infrastructure_desc: "В сельской местности многие школы впервые откроют свои двери в этом году. Это, наряду с многочисленной интеллигенцией, привело к тому, что наша провинция имеет одну из самых надежных академических инфраструктур в Китае. Расширение сельских школ также позволило трудоустроить многих представителей местной интеллигенции, снизив нагрузку на бюджет нашего правительства."
 
 HNN_basic_welfare: "Базовое благосостояние"
 HNN_basic_welfare_desc: "В рамках борьбы с Гоминьданом мы ввели в действие систему базового уровня благосостояния, включающую пособия по безработице и социальное обеспечение. Эти реформы снизили волнения среди безработных и обнищавших людей, сделав их гораздо менее склонными голосовать за автократических популистов."

 HNN_peace_with_the_unions: "Примирение с профсоюзами"
 HNN_peace_with_the_unions_desc: "Наша история отношений с профсоюзами, особенно во время нашего пребывания в Лиге, была непростой. Но, похоже, эти дни прошли. Лидеры профоюзов положительно отреагировали на оливковую ветвь Чжао, и после напряженных переговоров между нашей администрацией и лидерами Союзов был заключен мир. Мы надеемся, что этот мир станет основой для улучшения отношений между правительством и рабочими."

 HNN_building_federalism_at_home: "Строительство федерализма у себя дома"
 HNN_building_federalism_at_home_desc: "Мы сосредоточили свои усилия на построении местной демократии в соответствии с традициями федерализма, одновременно помогая центральному правительству в его усилиях по воссоединению Китая."

 HNN_rights_guaranteed: "Гарантия прав"
 HNN_rights_guaranteed_desc: "Губернатор Чжао недавно дал устную гарантию прав, предоставляемых всем жителям Хунани. Хотя это еще не закреплено в законе, это показывает четкое направление, в котором он хочет вести свое правительство и свою провинцию."

 HNN_bill_of_rights: "Билль о правах"
 HNN_bill_of_rights_desc: "Теперь кодифицированный в законе Хунани, наш собственный Билль о правах гарантирует, что каждый гражданин имеет ожидаемые права на свободу слова, право на собрания и многое другое. Важный шаг в построении нашей растущей демократии, он был отмечен многими демократическими мыслителями по всей стране, такими как Ху Ши и Чжан Цзюньмай, как первый шаг к национальной китайской демократии."

 HNN_legislative_debates: "Законодательные дебаты"
 HNN_legislative_debates_desc: "В провинциальном собрании продолжается обсуждение любого законопроекта, который попадает в зал заседаний. Поощряемая культура дебатов заставляет представителей в Ассамблее больше думать о том, как они будут голосовать по тому или иному законопроекту, и служит оживлению нашей зарождающейся демократии."

 HNN_diarchy_influence_curbbed: "Сдерживать влияние Диархии"
 HNN_diarchy_influence_curbbed_desc: "Хотя мы не можем полностью устранить западную диархию, нам удалось подорвать их власть настолько, чтобы обуздать худшие из их эксцессов, гарантируя, что демократия Хунани не может быть обойдена мелкими военачальниками."

 HNN_democratic_traditions: "Демократические традиции"
 HNN_democratic_traditions_desc: "Хотя наша демократия еще молода, мы успешно заложили основы сильных Демократических традиций в Хунани. С установленным Билль о правах и оживленными дебатами в провинциальном собрании, демократия в Хунани действительно вступает в свои права и служит примером для всех провинций Китая."

 HNN_democratic_stronghold: "Оплот демократии"
 HNN_democratic_stronghold_desc: "При губернаторе Чжао Хунань стала сияющим маяком демократии в Китае! Подавив антидемократическое сопротивление, он создал Билль о правах, сильную академическую систему и процветающую местную демократию. И все это при том, что примирение с профсоюзами обеспечивает поддержку крестьянства, а антидемократические силы в нашей провинции слабы и разобщены. Хотя будущее может быть неспокойным, Хунань - это светлое пятно в темное время."
 
##Kuomintang

 HNN_the_western_diarchy_3_desc: "Западная часть Хунани оказалась в состоянии осады и изоляции после успешной победы Гоминьдана над Тан Сянмином и Чжао Хэнти. Диархия Тянь Инчжао и Чэнь Цючжэня, напоминающая собственную провинцию военачальников, противостоит влиянию Гоминьдана на каждом шагу, разрабатывая кампанию пограничной сецессии. К западу от них клика Старого Гуйчжоу под эгидой Юань Цзумина точно так же блокирует свою часть Гуйчжоу. Их разгоряченные усилия продолжают наносить ущерб нашему управлению."
 
 HNN_local_militias: "Местные ополченцы"
 HNN_local_militias_desc: "Считавшиеся принципиальной частью предыдущих администраций Хунани, местные ополченцы представляют собой деспотическую группу, схожую с местными военачальниками, причем в некоторых уездах командиры ополчения полностью подконтрольны местной элите. Еще хуже то, что качество этих ополченцев в разных формированиях варьируется в широких пределах. Если Хунань действительно хочет вырваться из лап Бэйяна, необходимо решить вопрос с ополчением."

 HNN_popular_support_desc: "Гоминьдан может иметь демократические и популистские идеалы, но ему предстоит пройти долгий путь, чтобы воплотить эти идеалы в жизнь. Для крестьян и рабочих Хунани многие мечтатели приходили и уходили со своими утопическими обещаниями, и лишь немногие их выполняли. Если они хотят по-настоящему завоевать сердца людей, они должны сначала избавить простых людей от постоянных трудностей.\n\nДля того чтобы хунаньцы увидели в провинциальном правительстве легитимность, потребуется долгий период государственного строительства и тщательного проведения политики. Пока же многие видят в Гоминьдане лишь шаг вперед по сравнению с военачальниками."
 
 HNN_popular_support_1: "Легитимность партии: §RУжасающая§!"
 HNN_popular_support_1_desc: "$HNN_popular_support_desc$"

 HNN_popular_support_2: "Легитимность партии: §nРастущая§!"
 HNN_popular_support_2_desc: "$HNN_popular_support_desc$"

 HNN_popular_support_3: "Легитимность партии: §GПровинциальное правительство§!"
 HNN_popular_support_3_desc: "$HNN_popular_support_desc$"

 HNN_popular_support_for_the_peasants_and_workers: "Легитимность партии: §SВо имя рабочих и крестьян§!"
 HNN_popular_support_for_the_peasants_and_workers_desc: "Гоминьдан может иметь демократические и популистские идеалы, но ему предстоит пройти долгий путь, чтобы воплотить эти идеалы в жизнь. Для крестьян и рабочих Хунани многие мечтатели приходили и уходили со своими утопическими обещаниями, и лишь немногие их выполняли. Если они хотят по-настоящему завоевать сердца людей, они должны сначала избавить трудящихся от их вечных распрей.\n\nСейчас, когда Тан Шэнчжи контролирует провинцию, рабочие и крестьяне Хунани смогут раскрыть свой истинный потенциал. Их больше не будут контролировать, ими не будут торговать элиты, автократы и дворяне, стремящиеся извлечь выгоду из их несчастья. Хунань будет идти в ногу со всеми, чтобы объединить нацию, а Тан будет ее знаменосцем."
 
 HNN_popular_support_the_nations_revival: "Легитимность партии: §gВозрождение нации§!"
 HNN_popular_support_the_nations_revival_desc: "Гоминьдан может иметь демократические и популистские идеалы, но ему предстоит пройти долгий путь, чтобы воплотить эти идеалы в жизнь. Для крестьян и рабочих Хунани многие мечтатели приходили и уходили со своими утопическими обещаниями, и лишь немногие из них выполнили их. Если они хотят по-настоящему завоевать сердца народа, они должны сначала избавить трудящихся от вечных распрей.\n\nПосле того как Чэн Цянь направил провинцию к умеренности и спасению от приливов насильственной революции, роль Хунани в Национальной революции практически обеспечена. Благодаря проведению выборов в местные органы власти и сотрудничеству с независимыми республиканцами, будущее нации будет светлым, пока в ней есть Чэн Цянь."
 
 HNN_universal_education_efforts: "Усилия в области всеобщего образования"
 HNN_universal_education_efforts_desc: "Заплатив немалую цену, конечная цель - распространение всеобщего образования среди бедных и угнетенных жителей Хунани - стоит любых жертв, на которые приходится идти правительству провинции. Однако идеалы и убеждения не отменяют влияния на наше управление".

 HNN_universal_education: "Университетское образование"
 HNN_universal_education_desc: "Благодаря гениальному осуществлению тщательных образовательных программ и быстрому расширению школ на всех этапах жизни, усилия Хунани в области образования привели к заметному росту грамотности. Хотя провинция и страна все еще страдают от неграмотности, правительство провинции может гордиться тем, что будущее для значительной части населения страны светлее."

 HNN_centralising_militia_control: "Централизация управления ополчением"
 HNN_centralising_militia_control_desc: "Несмотря на некоторые проблемы, провинциальное правительство добилось больших успехов в изгнании гнили системы местного ополчения в провинции. Расширив полномочия Бюро по сохранению мира, Хэ Цзянь сумел объединить местное ополчение и домашнее ополчение под единым бюро, возглавляемым уездными магистратами, которым помогали заместители главы. Несмотря на некоторые недостатки, ополченцы быстро приспосабливаются к пожеланиям партии."

 HNN_peace_preservation_corps: "Корпус сохранения мира"
 HNN_peace_preservation_corps_desc: "Не стесняясь своей власти над ополчением, Хэ Цзянь начал влиять на жизнь хунаньцев, занявшись умиротворением сельских районов и Бюро по сохранению мира. Озабоченный упорством и проблемами, возникающими из-за местных бандитов и социалистической активности, он решил объединить все постоянные роты старого ополчения в единые подразделения "Сохранение мира". Благодаря новым профессиональным методам обучения и организации, схожей со стандартами регулярной армии, Хунань будет надежно защищена новыми силами местных защитников."

 HNN_revolutionary_progress_corps: "Революционный корпус прогресса"
 HNN_revolutionary_progress_corps_desc: "Изначально детище командира Корпуса сохранения мира и умиротворения сельских районов Хэ Цзяня, Тан Шэнчжи сумел провести ряд мер по революционизированию и радикализации корпуса "Сохранение мира". Считая, что Хэ Цзянь стремится использовать подразделения в качестве своих верных силовиков между Шестой и Восьмой армиями, Тан ввел ряд программ политического образования, которые должны функционировать в тандеме с новым профессиональным режимом, которому следует ополчение, превращая его из инструмента реакционеров в инструмент революционеров."

 HNN_a_reformed_administration: "Реформированная администрация"
 HNN_a_reformed_administration_desc: "Усугубленная десятилетиями бесхозяйственности и коррупции со стороны военачальников, местных хулиганов и злобных дворян, провинциальная администрация Хунани прошлого десятилетия остро нуждалась в реформе. Благодаря ряду хитроумных программ, направленных на расширение и реструктуризацию местной администрации, а также внедрению системы экзаменов и оценок для уездных магистратов, местная бюрократия Хунани процветает, несмотря на все усилия коррупционеров."
 
 HNN_a_peoples_administration: "Народная администрация"
 HNN_a_peoples_administration_desc: "Усугубленная десятилетиями бесхозяйственности и коррупции со стороны военачальников, местных хулиганов и злобных дворян, провинциальная администрация Хунани в прошлом десятилетии остро нуждалась в реформе. Изначально Тан Шэнчжи намеревался просто реформировать уже существовавшую бюрократию, но теперь он решил полностью пересмотреть существующую структуру, добившись, чтобы местные бюрократы придерживались истинных гоминьдановских принципов."

 HNN_public_safety_bureau: "Бюро общественной безопасности"
 HNN_public_safety_bureau_desc: "Сформированное как компромисс между конкурирующими Шестой и Восьмой армиями, Бюро общественной безопасности было создано по приказу председателя провинции для проведения линии партии в вопросах внутренней безопасности, а также создания сети контрразведки и шпионажа для контроля и защиты национальной революции от врагов внутри и снаружи."

 HNN_intellectual_safehaven: "Интеллектуальное убежище"
 HNN_intellectual_safehaven_desc: "Благодаря предыдущим восхитительным усилиям Чжао Хэнти, Хунань превратилась в одно из немногих мест интеллектуальной свободы и безопасности в Китае. Дальнейшее сотрудничество с этими интеллектуалами, некоторые из которых симпатизируют идеалам Гоминьдана, еще больше укрепило исследовательские возможности Хунани. В сочетании с рационализацией расходов на их содержание, Хунань действительно является рогом науки в стране."

 HNN_assurances_of_dangguo: "Заверения Даньго"
 HNN_assurances_of_dangguo_desc: "Несмотря на честные обстоятельства и убеждения, которых придерживались члены ныне не существующего провинциального собрания, препирательства и постоянная оппозиция действующему губернатору довольно нагло демонстрировали необходимость в авангардной партии, способной направить население Хунани к демократическим идеалам. Один из основных постулатов гоминьдановской идеологии, институт Даньго, или партийного государства, необходим для того, чтобы довести национальную революцию до конца."
 
 HNN_nationalist_youth_organisations: "Националистические молодежные организации"
 HNN_nationalist_youth_organisations_desc: "Доктор Сунь считал, что именно молодежь должна участвовать в национальной революции. Молодежь - это основа революционного будущего, и дух китайской национальной революции и китайского национализма должен сохраниться в следующих поколениях, если Китай хочет быть сильным. Ведь слабость Китая заключается в отсутствии единства, и если мы будем пренебрегать молодежью, мы не подготовим ее к революционной борьбе в будущем. Давайте обратимся к молодежи через националистические организации и будем поощрять членство в них как юношей, так и девушек, чтобы они изучали и воплощали в жизнь "Три принципа народа" доктора Суня."

 HNN_scientific_advancement: "Научный прогресс"
 HNN_scientific_advancement_desc: "Только благодаря твердой вере в научный прогресс Китай может обрести свое спасение. Как заключали величайшие философы Гоминьдана, элитный научный класс должен нести просвещение производящим классам, и с такой верой правительство вкладывает средства в возобновление научных усилий для развития китайского народа."

 HNN_belief_in_minsheng: "Вера в Миньшэн"
 HNN_belief_in_minsheng_desc: "Не имея никакой конкретной инфраструктуры, чтобы обеспечить принцип Миньшэн для населения, правительство приняло ряд инфраструктурных инвестиций и расширение автомагистралей наряду с железными дорогами, чтобы обеспечить основу для наших услуг социального обеспечения. Совершив революцию в системе здравоохранения старого Китая, Хунань становится свидетелем повышения уровня жизни всех своих граждан."

 HNN_expanded_social_services: "Расширенное социальное обеспечение"
 HNN_expanded_social_services_desc: "В соответствии с глубокой верой Гоминьдана в современность, Шестая армия стремится расширить возможности провинции Хунань по обеспечению населения. С помощью консультативного комитета, созданного Хэ Цзянем, граждане Хунани и ее роль в Национальной революции решительно обеспечены. Возможно, не так радикально, как хотелось бы тем, кто находится в рядах Восьмой армии, но это предотвратило возможное наступление хаоса, если бы они добились своего."

 HNN_supporting_unions: "Поддержка профсоюзов"
 HNN_supporting_unions_desc: "Следуя убеждениям Объединенного фронта ЦК, правительство провинции Хунань решило проводить политику открытой поддержки профсоюзов Чанши, укрепляя связи Гоминьдана с местным отделением Китайской синдикалистской партии. Хотя мы еще далеки от создания собственного Объединенного фронта, мы добились больших успехов в улучшении жизни трудящихся в провинции."

 HNN_local_democratic_elections: "Местные демократические выборы"
 HNN_local_communes: "Местные коммуны"
 
 HNN_rule_of_the_kuomintang_cheng_1: "Власть Гоминьдана"
 HNN_rule_of_the_kuomintang_cheng_1_desc: "Достигнув зенита, гоминьдановское правление в Хунани становится конкретным. Благодаря ряду масштабных реформ старая провинция совершенно меркнет по сравнению с новой. В конечном итоге партия завоевала сердца людей и под ее эгидой наступила революционная современность. Действуя как направляющая рука для народа, перед нацией встает по-настоящему оптимистичное будущее."

 HNN_rule_of_the_kuomintang_cheng_2_desc: "$HNN_rule_of_the_kuomintang_cheng_1_desc$"
