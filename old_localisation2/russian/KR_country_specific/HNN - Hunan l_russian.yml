 #袁祖铭
 HNN_yuan_zuming: "Юань Цзумин"
 HNN_yuan_zuming_bio: "Родвшийся в семье строго Юаня Цзиньтая, Юань Цзумин в детстве был очарован военной карьерой. В 1909, Директор военной школы Синъи Ван Вэньхуа рекомендовал Юаня военному посланнику Гуйчжоу Лю Сяньши для оказания помощи в подготовке городского полка в Синъи. Когда началась Война Национальной Обороны, Юань вступил в Национальную армию обороны под командованием Вана Вэньхуа.\n\nПосле того как Ван сверг Лю Сяньши и захватил власть в Гуйчжоу, Юань планировал его ликвидацию. Юань убил Вана в 1921 году, объединив провинцию с Пекином, и на следующий год стал губернатором. Это привело в ярость губернатора Юньнани Тан Цзияо, который помогал Лю Сяньши продвигать Юаня в Сычуань. Юань вмешивался в местные конфликты, что в конечном итоге привело к тому, что Ян Сен и Лю Сян совместными усилиями изгнали Юаня. С его разбитой наголову армией, Юань заключил союз с Гоминьданом, и стал командующим 12-ой армии НРА.\n\nЮань помогал Тану Чжэнщи в его вторжении в Хунань, но Северная Экспедиция скоро обернулась катастрофой, после вмешательства Германии на стороне Чжили и смерти Чана Кайши в возникшем хаосе. Переговоры с У Пэйфу через его подчиненного Чжао Юсуня, Юань переориентировался на Пекин. Вновь назначенный губернатором Гуйчжоу, Юань смог контролировать только восточную часть провинции, причем большая часть находилась под контролем Тан Цзияо, который поддержал своего брата Тана Цзию на посту губернатора. Хотя Юань по-прежнему не в состоянии изгнать Тана из Гуйчжоу, он по-прежнему уверен, что настанет день, когда он сможет наказать Танов за их предательство."
 HNN_yuan_zuming_army_chief_desc: "§YРодился:§! §L9 июня, 1889, округ Синъи,Гуйчжоу, Империя Цин§!\n§YПолитическая принадлежность:§! §nСтарая клика Гуйчжоу§!\n§YБиография:§! §L$HNN_yuan_zuming_bio$§!"
 HNN_yuan_zuming_leader_desc: "§YРодился:§! §L9 июня, 1889, округ Синъи,Гуйчжоу, Империя Цин§!\n§YБиография:§! §L$HNN_yuan_zuming_bio$§!"

 #賀龍
 HNN_he_long: "Хэ Лун"
 HNN_he_long_sic_desc: "§YРодился:§! §L22 марта, 1896, округ Санчжи, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §R8-я армия (Радикалы)§!\n§YБиография:§! §LЭтнический туцзя, Хэ Лун родился в бедной крестьянской семье. В детстве у него была репутация человека с сильным чувством преданности и справедливости среди жителей его деревни. В 1914,  Хэ Лун присоединился к революционному движению Сунь Ятсена. В 1918, Он сформировал революционную крестьянскую армию в Западной Хунани и заработал репутацию \"Робина Гуда\". Он стал симпатизировать марксизму в 1920,находясь под влиянием интеллектуалов из Тайюаня. Хэ Лун вступил в Сычуань в 1922 году по приказу Суня, но не смог добиться больших успехов из-за внутренних разногласий в своей армии.\n\nТакой опыт привел его к неприятия политики Суня по сотрудничеству с местными полевыми командирами.Он стал членом Гоминьдана в 1924, после первой реорганизации и сближения с Интернационалом. После того, как Чжао Хэнти выдавил его из Сычуани, Хэ Лун отступил в гуйчжоу. В 1926, Хэ Лун объединил свои войска в 8-ю армию под командованием генерала Тана Шэнчжи, местного прогоминьдановского полевого командира,мечтавшего свергнуть Чжао Хэнти. Хэ Лун и 8-ая армия проявил себя превосходно во время Северной экспедиции, но немецкая интервенция и неудачная попытка взять Ухань привели к коллапсу Гоминьдана в Китае.\n\nВан Цзинвэй взял ЦК под контроль в Париже, который пребывал там уже почти 10 лет. Тан Шэнчжи действуя независимо от ЦИК, он повел своих людей в соседнюю Цзянси, чтобы избежать возвращающихся войск Чжао, участвуя в партизанской войне против сил Лиги Сунь Чуанфаня в регионе. Тан в дальнейшем присоединился к Миньганскому Восстанию после Шанхайского Восстания 1932 года. Хэ Лун стал неофициальным лидером радикального крыла 8-ой армии вместе с его правой рукой-Пэн Дэхуайем, и хранит надежды объединить своего начальника Тан Шэнчжи с Сун Цинлин,ориентированной на крестьян.§!"

 #蔡和森
 HNN_cai_hesen: "Цай Хэсэнь"
 HNN_cai_hesen_advisor_desc: "§YРодился:§! §L30 марта, 1895, Шанхай, Шанхайская международная зона, Империя Цин§!\n§YПолитическая принадлежность:§! §rКСП§!\n§YБиография:§! §LПятый из шестерых детей в семье, Цай Хэсень родился в неполной семье, после того, как мать Цая ушла от своего мужа из-за того, что тот взял вторую жену. Следуя примеру своей матери и не желая участвовать в бизнесе отца, Цай отправился в родную провинцию своей матери Хунань, где учился в Хунани обычной школе, а затем в Первом Педагогическому Университете Хунани.Там Цай попал под влияние уважаемого хунаньского педагога Яна Чанцзи и впоследствии основал в Чанше общество изучения Нового Человека.\n\nКогда Цай услышал что анархисты Цай Юаньпэй и Ли Шицзэн организовали образовательные курсы для рабочих, он решил присоединится к ним и отправился во Францию в 1919 с его сестрой Цай Чань. В Париже, Цай организовал Кооперативное общество рабочих и студентов и стал ярым сторонником синдикализма.  Цай однако он не был согласен с оптимистичной верой анархистов в культурные изменения и вместо этого выступал за то, чтобы централизованная синдикалистская партия Китая возглавила революцию после создания партии - ему было дано разрешение на создание официального отделения в 1922 году.\n\nЦай и Сянь вернулись в Китай чтобы принять участие в работе Китайской Синдикалистской Партии, где he они основали первую партийную газету. В 1925, он отвечал за связь КСП с Парижем. Накануне Северной экспедиции Цай ненадолго вернулся в Китай, но после провала экспедиции вернулся в Париж. В 1932 году, он секретно вернулся в Шанхай для принятия участие в Шанхайском Восстании, где он скрывался с тех пор - скрывался между Хунанем и Шанхаем в надежде синдикалистской революции.\n\n§YПримечания: Его лучшими друзьями были Чжоу Шицзао и Мао Цзэдун, Цай глубоко опечален смертью Мао во время Восстания перед сбором урожая. Однако он опровергает идеи о безрассудном, неорганизованном восстании, полагая, что только сотрудничество с Гоминьданом может продвинуть дело рабочих вперед.§!"

