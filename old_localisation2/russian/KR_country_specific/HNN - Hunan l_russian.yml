 #RKMT
 #覃振
 HNN_qin_zhen: "Цинь Чжэнь"
 HNN_qin_zhen_advisor_desc: "§YРодился:§! §L1885, округ Таоюань, Хунань, Империя Цин\n§YПолитическая принадлежность:§! §g6-я армия§!\n§YБиография:§! §LС юных лет сторонник Революции, Цинь Чжэнь проявил признаки выдающегося лидера и красноречия во время вторжения союзных войск восьми держав в Пекин в 1900 году. Услышав эту новость, Цинь Чжэнь, будучи еще простым студентом, пришел в ярость и произнес речь на площади, рассказывая о преступлениях цинского двора и о том, как их действия привели к унижению нации, а ближе к концу выступления разрыдался.\n\nПосле того, как Сун Цзяожэнь познакомил его с обществом Хуасин, его исключили из школы за частые выступления против текущего строя. Перед отъездом Цинь написал статью "Выживший", в которой подчеркивал актуальность революции. Присутствовавший на учредительном собрании Тунмэнхуэй, он стал президентом Хунаньского отделения организации. После того, как доктор Сунь отправил Цинь Чжэня организовать революцию в провинции Хунань, Цинь Чжэнь был арестован цинскими властями и подвергнут жестоким пыткам, а затем приговорен к пожизненному заключению.\n\nВ ходе Синьхайской Революции Цинь вышел из заключения,и в 1912 году был избран в Палату представителей Бэйяна. После убийства Сун Цзяорена Цинь участвовал в последующей революции, которую организовали Сунь Ятсен и Хуан Син. Несмотря на то, что Хуан Син предложил ему пожертвовать собой, чтобы убить Юань Шикая, он был обескуражен и вместо этого работал над импичментом Юаня в Палате представителей. Вступив в Гоминьдан в 1914 году, он на протяжении многих лет участвовал в ряде антиюаньских акций и был переизбран в Национальное собрание после прихода к власти Ли Юаньхуна.\n\nПосле создания базового лагеря доктора Суна в Гийине Цинь был назначен ответственным за все партийные дела, связанные с Президентским дворцом, позже помогал в разработке устава партии и стал членом Центрального исполнительного комитета. Позже, участвуя в конференции клики Западных холмов, Цинь стал изгоем в правых кругах партии, а после провала Северной экспедиции оказался под защитой Чэн Цяня.§!"
 #李世璋
 HNN_li_shizhang: "Ли Шичжан"
 HNN_li_shizhang_advisor_desc: "§YРодился:§! §L1900, округ Цзиньсянь, Цзянси, Империя Цин\n§YПолитическая принадлежность:§! §g6-я армия§!\n§YБиография:§! §LВ молодые годы Ли прилежно учился и в 1918 году был принят на экономический факультет Пекинского университета. Позже, участвуя в Движении 30 мая, в 1922 году он вступил в Китайскую социалистическую лигу молодежи, а в следующем году - в синдикалистскую партию Китая. В том же году основатель Beijing News Шао Пяопин пригласил его работать репортером газеты и одновременно учителем в пекинской средней школе № 4.\n\nОкончив Пекинский университет в 1924 году, он вступил в Гоминьдан и служил пресс-секретарем доктора Сунь Ятсена всякий раз, когда тот заболевал. Позже он переехал в Шанхай, чтобы работать репортером в "Шенбао" и "Китайской ежедневной газете", а затем вернулся в Гуанчжоу, чтобы работать политическим инструктором в Военной академии Вампоа по приглашению Чжоу Эньлая. Впоследствии он занимал должности секретаря политического отдела Шестой армии, исполняющего обязанности директора политического отдела и партийного представителя в 18-й дивизии.\n\nУвидев то, во что зашла Северная экспедиция, Ли вместе с остальными членами 6-й армии бежал в Гуйчжоу, продолжая выполнять функции ее главного администратора.§!\n\n§YПримечания: Поскольку Ли Шичжан никогда не отказывался от членства в КСП и, учитывая его связи с Чжоу Эньлаем, многие в Правом Гоминьдане считают его ставленником Центрального комитета. Тем не менее, он продолжает энергично работать, обеспечивая боеспособность 6-й армии, ставя под сомнение эти слухи.§!"

 #盧燾
 HNN_lu_dao: "Лу Дао"
 HNN_lu_dao_advisor_desc: "§YРодился:§! §L1882, округ Ишан, Гуанси, Империя Цин\n§YПолитическая принадлежность:§! §LГоминьдан§!\n§YБиография:§! §LПосле завершения учебы в школе в 1900 году, Лу стал служить секретарем в армии Цин, и Чжан Тяншэн, засланный в армию революционер, познакомил его с Тунмэнхуэем. Участвуя в различных мероприятиях против династии Цин в течение шести лет, Лу в 1910 году был принят в 3-й класс Юньнаньской военной академии для изучения пехотного дела, где он познакомился со многими юньнаньскими соратниками по Тунмэнхуэю. Вскоре после окончания университета разразилась Синьхайская революция, и Лу Дао последовал за новой Юньнаньской армией в Сычуань, а затем в Гуйчжоу\n\nОднако, невзирая на автократические наклонности Тана, Лу покинул свой пост до того, как был приглашен в Гуйчжоу его военачальником Лю Сяньши, сблизившись с новой гвардией армии Гуйчжоу во главе с Ван Вэньхуа. После беспорядочного инцидента в Миньцзю в конце 1920 года, который привел к свержению Лю и убийству Вана, Лу недолго проработал на многих провинциальных должностях, прежде чем бежать на юг в Шаогуань перед началом Северной экспедиции. Находясь там, Лу пытался поддерживать политическую сплоченность в Гоминьдане, набирая популярность как фигура республиканского единства. Однако провал Северной экспедиции привел к его уходу из политики, и он предпочел вести мирную жизнь в сельской местности провинции Хунань. С возвращением Гоминьдана в провинцию многие гражданские деятели выдвинули Лу Дао на пост губернатора Гуйчжоу, благодаря как его добродетельной и честной репутации, так и репутации эффективной рабочей лошадки.§!"

 #LKMT
 #任弼時
 HNN_ren_bishi: "Жэнь Биши"
 HNN_ren_bishi_advisor_desc: "§YРодился:§! §L30 апреля, 1904, округ Сянъинь, Хунань, Империя Цин\n§YПолитическая принадлежность:§! §oКСП-Радикалы§!\n§YБиография:§! §LРодившись в сельской местности провинции Хунань в семье учителя, Рен Биши в 1915 году поступил в первый Хунаньский педагогический университет, а затем присоединился к молодежному крылу будущей Синдикалистской партии Китая в 1921 году в Шанхае. Вдохновленный короткой, но безуспешной большевистской революцией, Жэнь в 1923 году отправился вместе с Лю Шаоци и Сяо Цзингуаном во Францию в составе делегации КСП, направленной для перенятия опыта в только что образованной Французской Коммуне.\n\nПосле окончания учебы в 1924 году Жэнь был направлен обратно в Китай, где его назначили преподавателем французского языка в Шанхайский университет. В том же году он был назначен членом районных комитетов Чжэцзяна и Аньхоя и отвечал за многочисленные публикации.\n\nВ январе 1925 года, в рамках реорганизации КСП в Лигу китайских синдикалистов, Жэнь принял участие в работе Социалистической лиги молодежи Третьего Всекитайского собрания народных представителей и был назначен первым секретарем движения. Амбициозный и горячо верующий в молодежное движение, Жэнь намеревался объединить и использовать молодежную лигу для расширения и популяризации растущего политического аппарата КСП, особенно после бурных событий 30 мая в Китае.\n\nПосле провала Северной экспедиции Жэнь отправляется в изгнание в Шанхай, где проводит время между номинальной штаб-квартирой КСП в Шанхае и местными партийными ячейками в провинции Хунань, где он готовит молодых членов партии к будущей социальной и национальной Революции.§!"

 #黃公略
 HNN_huang_gonglue: "Хуан Гунлюэ"
 HNN_huang_gonglue_advisor_desc: "§YРодился:§! §L24 января, 1898, округ Сянсан, Хунань, Империя Цин\n§YПолитическая принадлежность:§! §R8-я армия (Радикалы)§!\n§YБиография:§! §LХуан поступил на военную службу в 1916 году и служил командиром взвода. Он быстро подружился с Пэн Дэхуаем, сослуживцем по взводу. Пэн и Хуан проводили тайные собрания по борьбе с бедностью в своей роте. В 1923 году он и Пэн окончили учебное заведение армии Хунань и вступили в 1-ю дивизию 8-й армии Северной Кореи, возглавляемую Таном Шэнчжи.\n\nКак и остальные члены 8-й армии, Хуан очень успешно выступил в Северной экспедиции, несмотря на ее окончательную неудачу. 8-я армия стала первой партизанской армией того, что впоследствии стало повстанческим движением Минган, пока Дэн Янда и Сун Цинлин не возглавили силы ПКК, чтобы возглавить партизанскую войну. Хуан и Пэн стали убежденными сторонниками программы крестьянского социализма ПКК и под руководством Хэ Луна сформировали ядро более радикального крыла 8-й армии. Хуан Гунлюэ не успокоится, пока Китай не освободится от империализма и угнетения или пока он не умрет, сражаясь.§!"

 #唐鐸
 HNN_tang_duo: "Тан До"
 HNN_tang_duo_air_chief_desc: "§YРодился:§! §L1904, округ Иян, Хунань, Империя Цин\n§YПолитическая принадлежность:§! §rКСП§!\n§YБиография:§! §LРодившись в 1904 году в начале нового века, Тан Дуо родился в семье школьных учителей и, таким образом, был отдан в плодотворное образование в раннем возрасте. Там, в Первой общеобразовательной школе провинции Хунань, он познакомился с Жэнь Биши, который позже стал его товарищем по синдикалистской партии Китая. Они вместе с товарищем по хунаньской революции Цай Хэсэнем отправились во Францию в рамках программы обучения в коммуне Франции. Именно там, во время этой программы, Тан стал преданным членом Синдикалистской партии Китая.\n\nПо приглашению Тань Янькая в 1923 году Тан До, получивший образование во Франции, был направлен на помощь китайскому революционеру Сунь Ятсену в организации авиазавода. В рамках политики сотрудничества и "Единого фронта", проводимой КСП в союзе с Гоминьданом в 1924 году, Тан стал официальным членом Гоминьдана и стал одним из первых участников, которые помогли подготовить первую группу студентов, которые впоследствии стали частью революционных Военно-воздушных сил Китая. По просьбе представителя КСП Лю Юня и националистического правительства Гуанчжоу Тан был направлен для дальнейшего военного и авиационного образования в Социалистическую Республику Италия, Французскую Коммуну и недавно созданный Британский Союз в 1925 году.\n\nТан планировал вернуться в Китай к 1927 году, когда началась Северная экспедиция, но не смог обеспечить себе проезд домой к тому времени, когда экспедиция провалилась. Расстроенный тем, что не смог принять участие в неудавшейся Революции, Тан вернулся в Китай вместе с другими революционерами, такими как Дэн Янда, в 1932 году в рамках запланированного и провалившегося Шанхайского восстания.§!"

 #門炳岳
 HNN_men_bingyue: "Мэнь Бинъюэ"
 HNN_men_bingyue_high_command_desc: "§YРодился:§! §L24 июня, 1891, округ Дунгуань, Чжили, Империя Цин\n§YПолитическая принадлежность:§! §S8-я армия§!\n§YБиография:§! §LПрофессиональный революционер Мэнь Бинъюэ, изучавший немецкий язык в 1-й армейской средней школе Цинхэ и ускоренной военной академии армии Бэйян, кавалерию в 1-м классе военной академии Баодин, а затем в 5-м классе штабного колледжа, участвовал как в Синьхайской революции, так и во Второй Революции, а затем служил в качестве офицера. командир кавалерии в различных подразделениях республики. После переворота Гоминцзюня в Пекине Мэнь служил Сунь Юэ. После того, как клика Фэнтяня вытеснила Фэн Юйсяна из Пекина, Мэнь переехал на юг Китая и служил вместе со своим однокурсником по военной академии в Баодине-Таном Шэнчжи. Мэнь - это что-то вроде рыбы, вытащенной из воды, учитывая его положение в клике Тана Шэнчжи, поскольку он один из немногих, которые не являются уроженцами провинции Хунань. Несмотря на это, Тан часто советуется с ним и считает его надежным офицером.§!"

 #Feds
 #李劍農
 HNN_li_jiannong: "Ли Цзяньнун"
 HNN_li_jiannong_sic_desc: "§YРодился:§! §LJune 10th, 1880, in Shaoyang County, Hunan Province, Qing Empire\n§YПолитическая принадлежность:§! §cФедералист§!\n§YБиография:§! §LРодился into a peasant family, Li Jiannong attended a local academy upon growing up. Li would grow resentful of the officials there for incompetence and lack of knowledge on their part. He attended the Hunan Middle Road Normal School in 1904, and graduated with a specialisation in history. While studying economics in Japan, Li became associated with Sun and the Tongmenghui. After the Qing Dynasty fell, Li became a staunch defender of the republic.\n\nIn his newspapers, Li advocated for provincial autonomy, and opposed warlordism. Li's work on provincial autonomy and political reform attracted the attention of Governor Zhao Hengti, who invited Li to Changsha to draft a provincial constitution in 1922.Li would remain in Hunan thereafter, helping Zhao promote his political programme. Li's work in promoting federalism has turned him into Governor Zhao's right hand man and a capable theorist for the Hunanese Федералист movement.§!"

 #趙君邁
 HNN_zhao_junmai: "Чжао Цзюньмай"
 HNN_zhao_junmai_advisor_desc: "§YРодился:§! §L1901, in Hengshan County, Hunan Province, Qing Empire\n§YПолитическая принадлежность:§! §cФедералист§!\n§YБиография:§! §LThe younger brother of Zhao Hengti, Zhao went to Japan and the US for his education. He would graduate from the University of Wisconsin with a major in civil engineering, and was invited by his brother to work for the Hunanese government. Although his current station in life was determined by his brother's power, Zhao is determined to be a competent minister in Hunan's government and do right by the brother.§!"

 #鍾伯毅
 HNN_zhong_boyi: "Чжун Бои"
 HNN_zhong_boyi_advisor_desc: "§YРодился:§! §L1880, in Lanshan County, Hunan Province, Qing Empire\n§YПолитическая принадлежность:§! §cФедералист§!\n§YБиография:§! §LZhong Boyi was a member of the Hunan Consultative Bureau under the Qing, until the Xinhai Revolution. He sided with the revolutionaries and became elected as a member of its house of representatives. In 1917, He joined Sun Yat-sen's Guangzhou Government, formed in opposition to Duan Qirui's Anhui Clique which had succeeded Yuan Shikai. In 1921, He served as the Director of Finance of Hunan and helped promulgate the Hunanese Constitution. He still serves in the Hunanese government and is considered an influential figure in Zhao's camp.§!"

 #黄炎培
 HNN_huang_yanpei: "Хуан Янпэй"
 HNN_huang_yanpei_advisor_desc: "§YРодился:§! §LOctober 1st, 1878, in Chuansha County, Jiangsu Province, Qing Empire\n§YПолитическая принадлежность:§! §mCNDCA§!\n§YБиография:§! §LРодился in Jiangsu, Huang Yanpei lost both of his parents as a teenager and lived at his grandma's house as a result. Huang became well learned on the Confucian classics and passed the Imperial Examination. He studied at Nanyang Public School, but dropped out collectively with the other students in protest of the school's expulsion. He was forced into exile to Japan due to his revolutionary activities, and met Cai Yuanpei who brought him into the Tongmenghui. After 1912, Huang was promoted to the director of the Southeast University, Jinan University, Tongji University, and more.\n\nHe created the China Vocational Education Society in Shanghai, alongside many other Chinese scholars, intellectuals, and celebrities. Huang continued pushing his educational reforms in Shanghai until Sun Chuanfang began cracking down on intellectuals for suspected support in the Shanghai Uprising of 1932. Huang subsequently fled to Hunan Province, where Governor Zhao Hengti welcomed him as a friend and scholar. While in Changsha, Huang reorganised his party into the China National Democratic Construction Association to continue promoting his reforms and democratic ideals.§!"

 #錢永銘
 HNN_qian_yongming: "Цянь Юнмин"
 HNN_qian_yongming_advisor_desc: "§YРодился:§! §LAugust 29th, 1885, in Wuxing, Zhejiang Province, Qing Empire\n§YПолитическая принадлежность:§! §mCNDCA§!\n§YБиография:§! §LA native of Zhejiang, Qian Yongming went to Tianjin Beiyang University to study Economics. He became a financial minister in Shanghai after the Xinhai Revolution. In 1913, he was recommended by Chen Qimei to become the new minister for agriculture, industry, and commerce. When Yuan Shikai killed Song Jiaoren and purged Sun Yat-sen's supporters, Qian left the Beiyang Government. He joined with Huang Yanpei in establishing the China Vocational Educational Society in Shanghai. He also fled with Huang to Hunan in 1932, and is a member of Huang's reformed China National Democratic Construction Association.§!"

 #周世釗
 HNN_zhou_shizhao: "Чжоу Шичжао"
 HNN_zhou_shizhao_advisor_desc: "§YРодился:§! §LMarch 12th, 1897, in Ningxiang County, Hunan Province, Qing Empire\n§YПолитическая принадлежность:§! §lRepublicans§!\n§YБиография:§! §LРодился in Changsha to a poor peasant family, Zhou Shizhao studied the Confucian Classics directly from his father. Zhou attended Hunan First Normal University, and was classmates with Mao Zedong. The two would become fast friends, and the two men alongside Cai Hesen founded the Xinmin Society at Zhou's home in 1918. In 1919, Zhou became a consultant at Mao's weekly newspaper, the \"Xiangjiang Review\". In 1921, Zhou pursued a career in education, and worked for the National Southeast University in Nanjing. He returned to Hunan to teach Chinese at the First Woman's Normal College in Hunan Province.\n\nAlthough he had sympathies to the Kuomintang ever since Xu Teli introduced him to the party, he remained in Hunan Province after the Northern Expedition. In 1932, Mao Zedong would lead and participate in the Autumn Harvest Uprising, which was in solidarity with the Shanghai Uprising, but was killed when provincial forces under Zhao Hengti and aided by Tang Xiangming put down the insurrection. Zhou would become deeply resentful towards both Zhao and Tang for causing Mao's death, and while nominally aligned with Huang's CNDCA, opposes continued Zhili presence in the province as well as Zhao's governorship.§!"

 #Zhili
 #湯化龍
 HNN_tang_hualong: "Тан Хуалун"
 HNN_tang_hualong_sic_desc: "§YРодился:§! §L27 ноября, 1874, Хуанчжоу, Хубэй, Империя Цин\n§YПолитическая принадлежность:§! §SКПК§!\n§YБиография:§! §LСтарший брат Тан Сянмина, Тан-старший во многом отличается от адмирала. Выпускник академии Хуанган Цзингу, Тан стал способным экономистом и мыслителем-рационалистом. Последние несколько лет правления династии Цин Тан преподавал в различных учебных заведениях, а затем работал государственным чиновником.\n\nКогда началась Синьхайская революция, Тан настаивал на том, чтобы различные офицеры присоединились к республиканцам, в том числе Тан Сянмин и Ли Юаньхун. Тан служил правительству Юань Шикая, пока тот не решил заявить о своих имперских амбициях, после чего бежал в Тяньцзинь, а затем в Шанхай. После смерти Юаня и восхождения Дуаня на престол, Тан вернулся в Пекин, но к 1918 году почувствовал отчуждение и уехал путешествовать за границу.\n\nОн вернулся в Китай почти десять лет спустя, сначала в Пекин в 1927 году вместе со своим политическим союзником Лян Цичао, затем, год спустя, отправился к своему брату в Хунань, где младший Тан служил командиром гарнизона в Юэяне. Тан Хуалун стал мэром города и возглавил экспансию китайской конституционалистской партии в провинции Хунань. Надежды Тан Хуалуна на возвращение к власти зависят от действий его брата и от того, насколько адмирал готов придерживаться конституционных реформ.§!"

 #Apolitical
 #胡庶華
 HNN_hu_shuhua: "Ху Шухуа"
 HNN_hu_shuhua_advisor_desc: "§YРодился:§! §LDecember 24th, 1886, in You County, Hunan Province, Qing Empire\n§YПолитическая принадлежность:§! §LАполитичный§!\n§YБиография:§! §LPassing the Qing imperial examination in 1903, Hu would become a scholar at Hunan's Private Mingde School, later being publicly funded to study in the German Empire, studying first at the Berlin University of Mining and Technology and later at the Berlin University of Technology. In 1920, Hu graduated with a doctorate in iron metallurgy, returning to China two years later with his knowledge of modern industrial metal-working techniques, acquired through visiting various steel plants throughout Europe.\n\nUpon his return to Hunan, Hu was hired as the director of affairs at Hunan Public Industrial Vocational School by its president Bin Bucheng. Later, he would also serve tenures as principal of Wuchang, Tongji and Hunan Universities. It was at the University of Hunan in particular that Hu's vision of industrial development in both the practical and educational sense was fully realised, restoring the Department of Mining and Metallurgy Engineering and inviting numerous experts to teach at the establishment.\n\nHu emphasised the combination of industrial education for students, advocated for collaboration and exchanges with provincial metallurgical enterprises, and aimed to expand Hunan University into an important centre for metalwork training in the country. In the summer of 1934, it would be Hu who would convene the 11th Annual Academic Conference of the China Economic Society in Hunan, the first time it would be hosted outside along the burgeoning cities of China's Eastern seaboard.§!"

 #黄士衡
 HNN_huang_shiheng: "Хуан Шихэн"
 HNN_huang_shiheng_advisor_desc: "§YРодился:§! §L1889, in Chenzhou County, Hunan Province, Qing Empire\n§YПолитическая принадлежность:§! §LАполитичный§!\n§YБиография:§! §LUnder the subtle influence of his scholarly family origins, Huang Shiheng developed the habit of loving self-study at a young age, laying a strong foundation in Chinese studies. Two years after the outbreak of the Xinhai revolution, Huang studied in the United States as a publicly funded student, graduating with various degrees from Columbia University and the University of Iowa.\n\nAfter a short stint as head writer of the New York-based \"People's Daily\", Huang returned to China in 1920 after completing his studies. He served as the director of the Department of Literature and History at Chengdu Normal University after returning to China. Moving to Hunan, he held roles at the Hunan Commercial College, later becoming the principal of the establishment, also playing a key role in founding Hunan University.\n\nDespite political upheavals during the failed Northern Expedition, he twice served as director of the Hunan Provincial Department of Education, focusing on educational enrichment and facilitating increased expansion of both public and private schools in Hunan. Huang's advisory career would only grow as Zhao Hengti's governorship stabilised the province, being appointed president of Hunan University in 1932 and setting up a 7-man committee to ensure the quality of the provincial educational programme. He has since contributed significantly to cultural and educational initiatives, including donations to schools and libraries under Zhao Hengti's jurisdiction.§!"

 #王天培
 HNN_wang_tianpei: "Ван Тяньпэй"
 HNN_wang_tianpei_advisor_desc: "§YРодился:§! §LDecember 1888, in Tianzhu County, Guizhou Province, Qing Empire\n§YПолитическая принадлежность:§! §lРеспубликанец§!\n§YБиография:§! §LDetermined to serve his country, Wang Tianpei would start his military career as the appointed commander of the Fenghuang Mountain fortress during the Wuhan Uprising by Huang Xing. After the success of the Xinhai revolution and owing to his strategic merit, Wang was sent to the prestigious Baoding Military Academy, where he would further develop his strategic prowess in military command.\n\nParticipating in the National Protection War against Yuan Shikai, Wang would rise through the ranks of the Guizhou provincial army amidst the unfolding backdrop that was the power politics of the region. Originally a subordinate of Guizhou warlord Yuan Zuming, he was disenfranchised by the warlord hierarchies that thrived in China's South-Western frontiers along with his acquaintance with revolutionary leader Sun Yat-sen, which would fan the flames of his own republican awakening.\n\nThis revolutionary fervour would result in Wang joining the Northern Expedition into Hunan as leader of the NRA Tenth Army, achieving numerous successes in the province's north. However, this progress would stall as Wang's army partook in the disastrous Siege of Wuhan and then in the slow retreat southward as Chiang's Guangzhou government crumbled. In the wake of the expedition's failure, Wang would serve under the nascent leadership of Zhao Hengti, particularly as an advisor for the ongoing banditry that occurs in Hunan's Southern and Western border regions.§!"

 #胡瑛
 HNN_hu_ying: "Ху Ин"
 HNN_hu_ying_advisor_desc: "§YРодился:§! §L1884, in Taoyuan County, Hunan Province, Qing Empire\n§YПолитическая принадлежность:§! §LАполитичный§!\n§YБиография:§! §LIntroduced to Wuhan by Huang Xing in his late adolescence, Hu would join both the Qing New Army as well as the Huaxing Society, planning the failed 1904 Changsha Uprising. After a few failed assassinations on various Qing officials, Hu escaped to Japan before returning to China at the behest of Sun Yat-sen. Back on Chinese soil, Hu would launch another unsuccessful revolution, resulting in his imprisonment by local government authorities.\n\nJoining the Literary Society in prison, Hu would be at the centre of the Xinhai Revolution, being released and utilising his revolutionary connections to become the first foreign minister of the fledgling republic. He would then serve temporarily as the governor of Shandong under Sun Yat-sen before being appointed envoy to settlements in the North-West by interim president Yuan Shikai. But as China descended into Yuan's chaotic reign, Hu joined the pro-Yuan Preparatory Committee, becoming one of the \"Six Gentlemen of Hongxian\". However as Yuan died in 1916, Hu would be one of the few to escape revolutionary prosecution, instead serving as an envoy of the Constitutional Protection Army in Western Hunan.\n\nIn 1920, Hu served as associate director of the Hunan Provincial Mining Bureau after the expulsion of Zhang Jingyao. As Zhao Hengti consolidated his rule around Hunan following the Northern Expedition, Hu would voice support for Zhao's governorship, acting as a politically indifferent yet stable diplomatic connection in Zhao's cabinet.§!"

 #葉德輝
 HNN_ye_dehui: "Е Дэхуэй"
 HNN_ye_dehui_advisor_desc: "§YРодился:§! §L1864, in Wuxian County, Jiangsu Province, Qing Empire\n§YПолитическая принадлежность:§! §LАполитичный§!\n§YБиография:§! §LHaving studied at Yuelu Academy in Changsha, Ye Dehui would pass the imperial examination in 1885, becoming a Jinshi in 1892, and was awarded the title of \"Head of the Ministry of Personnel\" within the Qing government. During the reform period of the late 1800s and early 1900s, Ye would relentlessly attack Kang Youwei and Liang Qichao's reform ideas, and attempted to undermine Hunan's New Deal.\n\nDuring a disastrous flood in 1910, Ye would hoard Changsha's provincial grain storage, leading to a rice-grabbing trend, and the revocation of his Imperial honours. Later during the Xinhai Revolution, Ye would flee to Nanyue Monastery, and in 1915, would serve as provincial education president, initiating the establishment of the Classics Society. Upon Yuan Shikai restoring the monarchy, Ye would organise the Hunan branch of the Preparatory Committee, and would support Yuan's imperial efforts.\n\nSeeing through the tumultuous period of the 1920s, Ye would flee Hunan during the Northern Expedition, only to return to the province following the Qing restoration. Now officially retired, Ye focuses his efforts on compiling classical Confucian writings, drafting history books, and exerting his influence as one of Hunan's most proficient scholars and traditional leaders.§!\n\n§YNotes: A notable conservative even in a time of republicanism and revolutionaries, Ye has drawn much ire from Changsha's peasantry and agrarian population, and similarly, from its union movement. However, he enjoys the patronage of the local gentry, elites, and most importantly, Zhao Hengti.§!"

 #Zhili/YCP
 #趙毓松
 HNN_zhao_yusong: "Чжао Юйсун"
 HNN_zhao_yusong_advisor_desc: "§YРодился:§! §L26 декабря, 1897, округ Липин, Гуйчжоу, Империя Цин\n§YПолитическая принадлежность:§! §nСтарая клика Гуйчжоу§!\n§YБиография:§! §LУроженец Гуйчжоу, Чжао первоначально сделал карьеру в армии. Он оказался на службе у Юань Цзумина, сторонника строгой дисциплины, который внушал страх как своим соперникам-военачальникам, так и подчиненным. Однако Юань столкнулся со многими военными неудачами и был вынужден присоединиться к Гоминьдану. Чжао, который был членом Младокитайской партии, убедил Юаня предать Гоминьдан, и Пекин назначил Юаня губернатором Гуйчжоу.\n\nОднако Юань смог обезопасить только восточную часть провинции, поскольку Тан Цзияо контролировал остальную часть. После окончания Северной экспедиции Чжао поднялся до должности лидера отделения партии в Гуйчжоу и стал навязывать идеи младокитайцев своему начальнику. Для Чжао,Юань олицетворяет образцового китайца, который поведет нацию к современности и создаст новое сильное китайское государство, не обремененное демократией. Юань, со своей стороны, мало что понимает в идеологии младокитайцев, но их восхищение военными и готовность поддержать его правление его вполне устраивают.§!"

 #左舜生
 HNN_zuo_shunsheng: "Цзо Шушэн"
 HNN_zuo_shunsheng_advisor_desc: "§YРодился:§! §L13 октября, 1893, Чанша, Хунань, Империя Цин\n§YПолитическая принадлежность:§! §nМладокитаец§!\n§YБиография:§! §LЛидер Хунаньского отделения Младокитайской партии Цзо Шуньшэн изучал английский и японский языки в школе иностранных языков в Чанше. Затем в 1914 году он поступил в шанхайский колледж "Аврора" для изучения французского языка, где познакомился с Цзэн Ци и Ли Хуаном. Он присутствовал при создании Младокитайской партии в 1918 году и помогал движению 4 мая в 1919 году. Помогая Цзэну и Ли вытеснить левое крыло партии в 1923 году, Цзо известен своими ярыми антисоциалистическими убеждениями, часто публикуя антисоциалистические статьи в журнале "Пробуждающийся лев", который он основал в 1924 году вместе с другими лидерами младокитайской партии.\n\nПосле провала Северной экспедиции и усиления Чжили Цзо решил вернуться в свою родную провинцию Хунань и создать отделения партии на уровне провинций и уездов, полагая, что это будет лучшим способом оказать давление для достижения целей партии и что это еще больше укрепит их базу. Его усилия принесли свои плоды, в основном, в окрестностях Юэяна и в Сянси. С приходом Тан Сянмина на пост губернатора политическая карьера Цзо еще больше укрепилась, и адмирал был более чем счастлив спонсировать его и его партию. И Цзо с радостью будет спонсировать Тана, если тот продолжит свои антисоциалистические настроения.§!"

 #Misc
 #谭道源
 HNN_tan_daoyuan: "Тань Даоюань"
 HNN_tan_daoyuan_advisor_desc: "§YРодился:§! §L1887, округ Цзиньсянь, Хунань, Империя Цин\n§YПолитическая принадлежность:§! §lРеспубликанец§!\n§YБиография:§! §LТань Даоюань был одним из первых членов общества Тунмэнхуэй, присоединившись к ее отделению в Гуанси. Позже он служил под командованием Цай Э и вторгся в Сычуань во время войны за национальную безопасность, одержав много побед. В 1923 году Сунь Ятсен поручил Тану объединиться с Тань Янькаем для отвоевания Хунани у поддерживаемого Пекином Чжао Хэнти, что в конечном итоге провалилось. Тань также помог Гоминьдану отразить нападение Чэнь Цзюнмина и утвердить власть Гоминьдана в провинции Гуандун.\n\nТань был назначен во 2-ю армию Тань Янькая и и помог Гоминьдану захватить Цзянси. Однако ранний успех Гоминьдана был сведен на нет, когда немцы вмешались на стороне У Пэйфу, в то время как Чан Кайши наступал на Ухань, и 2-я армия была окружена в провинции Хунань. Старый противник Тан Янькая, Чжао Хэнти, объявил амнистию 2-й армии, и с тех пор Тан Даоюань находится в отставке. Уважаемый за храбрость Тан Янькай, несомненно, обратится к Тан Даоюаню, если тот вернется в политику.§!"

 #魯滌平
 HNN_lu_diping: "Лу Дипин"
 HNN_lu_diping_advisor_desc: "§YРодился:§! §L1887, округ Нинсян, Хунань, Империя Цин\n§YПолитическая принадлежность:§! §lРеспубликанец§!\n§YБиография:§! §LЛу Дипин примкнул к революционерам в последние годы правления династии Цин и принимал участие в Синьхайской революции. Лу присоединился к революционному лагерю Сунь в 1915 году и служил в хунаньской армии. В последующие годы Лу стал важным военачальником в провинции Хунань и колебался между Чжао Хэнти и Тань Янькаем. В конце концов он сблизился с лагерем Тана из-за сочувствия подчиненных первого и присоединился к нему в изгнании, когда во время мятежа в Пинцзяне Тан был изгнан из Хунани.\n\nВ 1925 году войска Тана были реорганизованы во 2-ю армию НРА, а Лу был назначен заместителем командующего. Во время Северного похода Лу и 2-я армия вошли в Хунань, но вторжение обернулось катастрофой, поскольку наступление Гоминьдана на Ухань спровоцировало немцев на интервенцию. Гоминьдан был наголову разбит, а 2-я армия была окружена в Хунани. Лу и Тан были спасены от уничтожения, когда Чжао предложил 2-й армии полную амнистию. С тех пор Лу жил мирной жизнью в провинции Хунань, но, если обстоятельства вынудят его, Лу готов служить Тану, но только в том случае, если последний вернется к политической жизни.§!"

 #魯蕩平
 HNN_lu_dangping: "Лу Данпин"
 HNN_lu_dangping_advisor_desc: "§YРодился:§! §L1895, округ Нинсян, Хунань, Империя Цин\n§YПолитическая принадлежность:§! §lРеспубликанец§!\n§YБиография:§! §LМладший брат Лу Дипина, Лу Данпин, стал правительственным чиновником в провинции Хунань в 1915 году. Когда Лу Дипин покинул Хунань вместе с Тань Янькаем, Лу Дангпин последовал его примеру. Лу Дангпин успешно служил командиром 2-й армии во время Северной экспедиции и был помилован Чжао вместе со своим братом и Таном, когда Гоминьдан рухнул. С тех пор Лу сделал карьеру журналиста новостей, часто беседуя с Таном о политике. Тан, в свою очередь, очень уважает интеллектуальные способности Лу и уверен, что он может рассчитывать на его помощь, если тот вернется в политику.§!"

 #張輝瓚
 HNN_zhang_huizan: "Чжан Хуэйцзань"
 HNN_zhang_huizan_advisor_desc: "§YРодился:§! §L1884, Чанша, Хунань, Империя Цин\n§YПолитическая принадлежность:§! §lРеспубликанец§!\n§YБиография:§! §LПройдя обучение в Военной академии Хунани и обучаясь на командира пехоты в Академии Императорской армии Японии, Чжан Хуэйцзань начал свою военную карьеру в качестве штабного офицера в провинции Хунань. Затем он стал инструктором квартирмейстерской школы в Бэйяне. Поскольку он был против имперских амбиций Юань Шикая, он бежал обратно в Хунань и организовал армию для борьбы с Юанем в войне за национальную свободу. После войны Чжан продолжал служить под командованием Тана, а затем помогал сражаться с войсками Чжана Цзинъяо.\n\nПосле того, как Тану не удалось вернуться Хунань в 1923 году, Чжан последовал за ним в Гуанчжоу. Он продолжал служить Тану во 2-й армии Национальной армии Китая и участвовал в Северной экспедиции. Когда Северная экспедиция потерпела крах, Чжао предложил амнистию окруженной 2-й армии, которая распространилась и на Чжана. С тех пор он находится в полуотставке, но вернется в политику вслед за Таном, если тот решит это сделать.§!"

 #王之
 HNN_wang_zhi: "Ван Чжи"
 HNN_wang_zhi_advisor_desc: "§YРодился:§! §L1907, Чанша, Хунань, Империя Цин\n§YПолитическая принадлежность:§! §LАполитичный§!\n§YБиография:§! §LОбучаясь в школе Цинхау, Висконсинском университете и Университете Лоури, Ван Чжи стал первым из многих свежих, ярких и молодых умов, вступивших в армию провинции Хунань. После о в академии Вест-Пойнт,в 1928 году он вернулся в Китай, чтобы последовательно служить командиром взвода, командиром роты, командиром батальона и командиром полка корпуса налоговой полиции и армии провинции Хунань. За время службы в полиции Ван развил в себе неплохие навыки по выявлению лазутчиков и вражеских оперативников в рамках четко организованной структуры, и поэтому был специально отобран как отличное новое лицо для работы в развивающейся разведовательной службы провинции Хунань.§!"

 #柳哲生
 HNN_liu_zhesheng: "Лю Чжэшэн"
 HNN_liu_zhesheng_air_chief_desc: "§YРодился:§! §L22 февраля, 1914, округ Баодин, Чжили, Республика Китай\n§YПолитическая принадлежность:§! §LАполитичный§!\n§YБиография:§! §LРодился в Баодине, Семья Лю Чжэшэна была хорошо известна и пользовалась большой любовью в обществе, несмотря на то, что изначально она была родом из провинции Хунань. Отец Лю, Лю Шуфань, который на протяжении нескольких поколений создавал и поддерживал местные предприятия и сам был довольно преуспевающим, отказался от семейной практики и вместо этого поступил в военную академию быстрого реагирования Бэйян в Баодине. Следуя примеру своего отца, Лю Чжэшенг в 1933 году поступил в академию в Баодине. Учась в академии, Лю увлекся высотными полетами и записался на экзамены в школу пилотов. После окончания университета правительство провинции Хунань обратилось к Лю с просьбой обучения начинающих курсантов ВВС на родине его предков.§!"

