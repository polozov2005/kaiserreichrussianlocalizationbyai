 #Hunan Election Category
 HNN_elections_category: "Выборы в провинции Хунань"
 HNN_elections_category_desc: "Приверженец федералистских идеалов, §cЧжао Хэнти§! использовал крах Лиги, чтобы восстановить Конституцию провинции, которую он помогал писать в 1922 году. Это означает, что в конце этого года будут назначены новые выборы, которые первоначально планировалось провести в основном между самим §cЧжао Хенгти§! и §mЛибералами§!, но прибытие генералов Национально-революционной армии §SТана Шэнчжи§! и §gЧэн Цяня§! кардинально изменило структуру выборов. С появлением §Sдвух§!  кандидатов от §gГоминьдана§! показания опросов показывают, чьл §cЧжао Хэнти§! дышат в спину. Ведь выборы - это игра, в которую может играть каждый.\n\nПоддержка §cЧжао Хенгти§! [?HNN_zhao_election_percentage_var|c%]§!§!\n\nПоддержка §SТана Шэнчжи§! [?HNN_tang_election_percentage_var|S%]§!§!\n\nПоддержка §gЧэн Цяня§! [?HNN_cheng_election_percentage_var|g%]§!§!\n\nСовокупная поддержка §RГоминьдана§! [?HNN_kmt_election_percentage_var|R%]§!"

 HNN_add_zhao_votes: "Кампания в поддержку Чжао Хенгти"
 HNN_add_zhao_votes_desc: "Несмотря на то, что Чжао является фаворитом на выборах, его показатели в опросах, похоже, хуже, чем ожидалось. Мы должны удвоить усилия в наших кампаниях и обеспечить ему успех на предстоящих выборах!"

 HNN_add_chen_votes: "Кампания в поддержку Чэн Цяня"
 HNN_add_chen_votes_desc: "Будучи темной лошадкой, Чэн Цянь нуждается в любом преимуществе, которое он может получить. Наши кампании должны быть сосредоточены на его полномочиях, его относительно умеренном характере и на том, как он может привести Хунань к светлому будущему для всех!"

 HNN_add_tang_votes: "Кампания в поддержку Тана Шэнчжи"
 HNN_add_tang_votes_desc: "Хотя Тан Шэнчжи и не является фаворитом, победа наверняка в его руках, но для ее достижения необходимо приложить все усилия. Для этого мы выделим лучшие части его платформы, его земельную реформу, а также его поддержку профсоюзов и СПК"

 HNN_remove_zhao_votes: "Кампания против Чжао Хэнти"
 HNN_remove_zhao_votes_desc: "Как действующий губернатор, Чжао Хэнти в настоящее время является фаворитом на победу в выборах. Мы должны направить усилия нашей кампании против Чжао, указывая на его связь с Лигой и гарнизоном Юэяна."

 HNN_remove_chen_votes: "Кампания против Чэн Цяня"
 HNN_remove_chen_votes_desc: "Националистические идеи Чэн Цяня нашли неожиданный отклик у избирателей, в ответ мы должны направить избирательную кампанию против Чэна, рассказывая о том, как его недолгое губернаторство привело к приходу к власти Чжан Цзинъяо, и о его связи с насилием на западе."

 HNN_remove_tang_votes: "Кампания против Тана Шэнчжи"
 HNN_remove_tang_votes_desc: "Послание крестьянам от Тана Шэнчжи нашло неожиданный отклик у избирателей, в ответ мы должны направить избирательную кампанию против Тана, указывая на его оппортунистическую натуру и готовность ударить в спину другим ради собственной выгоды."

 HNN_zhao_campaign_zhao: "Чжао Хэнти проводит кампанию в свою пользу"
 HNN_zhao_campaign_tang: "Чжао Хэнти ведет кампанию против Тан Шэнчжи"
 HNN_zhao_campaign_cheng: "Чжао Хэнти ведет кампанию против Чэн Цяня"

 HNN_kmt_campaign_tang: "Гоминьдан проводит кампанию в поддержку Тан Шэнчжи"
 HNN_kmt_campaign_cheng: "Гоминьдановские кампании за Чэн Цяня"
 HNN_kmt_campaign_zhao: "Кампания Гоминьдана против Чжао Хэнти"
 
 #Tang Xiangming's Defence Commission

 HNN_defence_commission_category: "Комиссия по обороне"
 HNN_defence_commission_category_desc: "Комиссия по обороне провинции Хунань, или сокращенно Комиссия по обороне, является внесудебным правительственным органом, который наделяет губернатора §Pспециальными полномочиями§!, связанными с "обороной провинции Хунань". Эти полномочия позволяют нам обходить провинциальное собрание и принимать необходимые меры в интересах всей провинции, а не только отдельных граждан. Чем больше мы будем расширять полномочия комиссии, тем больше §Cрешений§! будет открыто для нас. Хотя ни одно из них не требует определенных затрат, все они приносят пользу нашей администрации, и мы должны использовать их с умом."

 HNN_drill_the_troops: "Муштра солдат"
 HNN_drill_the_troops_desc: "Наши солдаты должны всегда быть начеку. Хунаньские военные должны всегда быть на высоте, ведь внешние враги и предатели постоянно угрожают нашему оплоту свободы и безопасности. Армия Сиана - величайшая боевая сила в Китае, и мы должны сохранить это преимущество. Наша армия была, есть и всегда будет предметом зависти Поднебесной!"

 HNN_foster_militarist_sentiment: "Поддерживать милитаристские настроения"
 HNN_foster_militarist_sentiment_desc: "Под властью южных революционеров хунаньский дух был запятнан слабостью рьяного республиканизма. Настало время нашему прославленному губернатору напомнить народу Сянгана, что сила заключается не в идеалистических системах демократии и социализма, а в славе армии. Расцвет Китая пришелся на эпоху Великой Хань при императоре-бойце, когда ни одна сила в мире не могла оспорить превосходство китайской армии. Хунаньский народ должен заново познать силу милитаризма."

 HNN_emergency_planning: "Планирование чрезвычайных ситуаций"
 HNN_emergency_planning_desc: "Немецкий фельдмаршал Гельмут фон Мольтке сказал, что ни один план не выживает после первого контакта с врагом. Губернатор Тан впитал эту мудрую мысль, разработав план экстренных совещаний, если ситуация потребует этого, чтобы хунаньские военные не пострадали из-за того, что полагаются на устаревшие планы."

 HNN_construct_a_grand_fleet: "Построить большой флот"
 HNN_construct_a_grand_fleet_desc: "До того как наш губернатор благословил нас своим присутствием, Тан Сянмин был адмиралом цинского флота. К сожалению, его таланты остались непризнанными, и он так и не смог реализовать свои амбиции в военно-морской карьере. Однако перед правителем Тангом открылась возможность, поскольку закрепление за нами китайского побережья привело к необходимости развивать собственные военно-морские силы. Армия Сианя занимает первое место среди провинциальных армий Китая, теперь и флот Сианя станет лидером в модернизации китайского военно-морского флота!"

 HNN_arrest_dissidents: "Арестовать диссидентов"
 HNN_arrest_dissidents_desc: "Нет человека, более преданного делу безопасности хунаньского народа, чем Тан Сянмин. Однако революционные глупцы и корыстные бандиты стремятся эксплуатировать народ Сянгана и уничтожить его средства к существованию, как это было во время правления Чжао. Эти несогласные не будут разрушать Хунань для всех остальных, пусть будет известно, что Хунань - это провинция, свободная от беззакония."

 HNN_enforce_work_quotas: "Обеспечение квот на работу"
 HNN_enforce_work_quotas_desc: "Экономическая модернизация и развитие имеют решающее значение для обеспечения лучшего качества жизни хунаньского народа. Однако природная география не в пользу Хунани, поскольку удаленность от процветающих прибрежных городов делает экономический рост вялым даже в лучшие времена. Именно из-за этого факта хунаньцы должны упорно трудиться, чтобы обеспечить лучшее будущее для следующего поколения. Народ Сиань должен научиться быть как можно более продуктивным, ведь безделье - это разрушительная привычка, в которую хунаньцы не могут себе позволить впасть."

 HNN_deals_with_the_gentry: "Сделка с помещиками"
 HNN_deals_with_the_gentry_desc: "Во времена правления Чжао помещики получили большую власть, поскольку они помыкали им ради собственной выгоды. Однако губернатор Тан не из тех, кто позволяет просто кусать себя за руку, и дворянам следовало бы относиться к нему с уважением, причитающимся великому государственному деятелю. Губернатор знает, что дворяне составляют важнейший класс китайского общества, и для них найдется место в танской Хунани, если только они не станут наглеть."

 HNN_encourage_a_military_economy: "Чрезвычайный приказ:Акт о военной промышленности"
 HNN_encourage_a_military_economy_desc: "Настоящая рыночная экономика, возможно, была бы целью, к которой стоит стремиться в будущем, но сегодняшнему Китаю не требуется ничего, кроме сильной армии. Как всегда заявляли в немецкой военной миссии, военная модернизация может сопровождаться только экономической модернизацией. Таким образом, губернатор Тан наметил планы по специализации экономики Хунани на современном военном производстве."

 HNN_emergency_conscription: "Чрезвычайный приказ: Акт о мобилизации"
 HNN_emergency_conscription_desc: "Все наши соседи располагают большим населением и превосходящими военными арсеналами, чем наша провинция . Губернатор Тан уже начал разрабатывать планы по восполнению дефицита населения путем проведения далеко идущих реформ, которые значительно улучшат систему воинской повинности в провинциях Хунань и устранят все лазейки, оставшиеся от некомпетентного управления Чжао. Теперь посмотрим, как наши враги попытаются окружить нас большим количеством людей"

 HNN_ensure_loyalty: "Чрезвычайный приказ: Акт о лояльности"
 HNN_ensure_loyalty_desc: "Чтобы подняться по служебной лестнице в современном Китае, необходимо знать нужных людей, и Тан Сянмин знает это слишком хорошо. Тан, которого Пекин постоянно упускал из виду в связи с его продвижением по службе из-за отсутствия связей с элитой Чжилийской клики, был вынужден демонстрировать свою абсолютную преданность китайской нации, чтобы достичь того, чего он достиг сегодня. В провинции Хунань, где живет Тан, известна истинная меритократия, но в таком меритократическом обществе, как у Тана, трудно добиться политической лояльности. Наш губернатор должен позаботиться о том, чтобы внедрить концепцию лояльности и в то же время сохранить некое подобие меритократического правления."

 #Hunan Zhao Anti-Democratic Opposition Mechanic
 HNN_democratic_reform_category: "Укрепление хунанской демократии"
 HNN_democratic_reform_category_desc: "§cЧжао Хэнти§! успешно одержал верх над §RГоминьданом§!, но это не означает, что угроза хунанской демократии миновала. Между сохраняющимся влиянием §RГоминьдана§! и §Pгарнизоном Юэяна§! Тан Сянмина, в провинции по-прежнему сильны антидемократические настроения. Чтобы не допустить, чтобы эти силы §довели наше правительство до коллапса§! мы должны работать над тем, чтобы ограничить их влияние, где только сможем. Если они станут слишком сильными, это может сделать невозможным проведение дальнейших демократических реформ через провинциальную ассамблею.\n\nТекущая сила §Pанти-демократической оппозиции§!: [HNN_opposition_strength_variable_loc]"

 HNN_arrest_tang_xiangming: "Арестовать Тан Сяньмина"
 HNN_opposition_growing: "Антидемократическая оппозиция растет"

 HNN_opposition_strength_low: "§GНизкая§!"
 HNN_opposition_strength_moderate: "§OСредняя§!"
 HNN_opposition_strength_high: "§RВысокая§!"

 HNN_opposition_change_moderate: "Сила §PОппозиции§! вырастет,и будет на §Oсреднем§! уровне по завершении."
 HNN_opposition_change_high: "Сила §PОппозиции§! вырастет, и будeт на §Rвысоком§! уровне по завершении."
 HNN_opposition_change_nothing: "Сила §PОппозиции§! вырастит,но §Gничего не произойдет§! по завершении."

 HNN_opposition_strength_slight_requirement: "§Сила §PОппозиции§! §gнизкая§!"
 HNN_opposition_strength_moderate_requirement: "Сила §POппозиции§! §Oсредняя§! или ниже"

 HNN_weaken_the_opposition: "Это ослабит §PОппозицию.§!"
 #Hunan Financial Recovery Category
 HNN_financial_recovery_category: "Восстановление после Черного Понедельника"
 HNN_financial_recovery_category_desc: "[HNN_financial_recovery_category_desc_loc]"

 HNN_financial_recovery_category_desc_loc_kmt: "Установление новой администрации §Гоминьдана§! в Хунани породило множество проблем, как в военном, так и в политическом плане. Однако, что особенно важно, продолжателям дела §cЧжао Хэнти§! также приходится сталкиваться с разрушительной экономической ситуацией, сложившейся в провинции из-за некомпетентного хозяйствования капиталистов. После того, как различные программы восстановления экономики предыдущей администрации были отменены, сторонники §RГоминьдана§! в лице [HNN_financial_recover_category_desc_kmtleader] и [HNN_financial_recover_category_desc_kmtsic] попытались начать новую программу восстановления экономики, в общих чертах следуя идеалам, которые отстаивали доктор Сунь и другие теоретики партии.\n\nХотя формально предполагалось, что это произойдет на Третьем этапе Национальной революции, полностью разрушенное игровое поле, созданное экономическим коллапсом, дало администрации [HNN_financial_recovery_category_desc_kmtparty] свежий старт для реализации более широкой программы национального восстановления. Приведут ли их амбиции к результату, это будет в решающей степени зависеть от жертв, на которые люди готовы идти."
 HNN_financial_recovery_category_desc_loc_zhili: "После неудовлетворительных результатов недавних выборов в провинции Хунань, Провинциальная Ассамблея сочла целесообразным избрать радикальных демагогов из §RГоминьдана§!, намеревавшихся подорвать влияние Чжили в провинции. Однако зачинщики беспорядков не были готовы к быстрому, но успешному свержению их режима с помощью §P[HNN.GetLeader]§!, захватившего столицу в расцвете славы. После того, как все, кто потерпел поражение в боях, бежали, от Хунани остались лишь жалкие руины. Провинция опустошена во всех отношениях, но самым серьезным является ее экономический ущерб.\n\nПережив глобальный финансовый крах, остановку планов предыдущего губернатора §cЧжао Хэнти§! по восстановлению экономики и нестабильную политику §RГоминьдана§! после победы на выборах, экономические проблемы стали серьезной назревающей катастрофой. Теперь все меняется, поскольку новый губернатор, §P[HNN.GetLeader]§!, и его союзники из §P[HNN.GetRulingParty]§! позаботятся о том, чтобы несчастья в Хунани прекратились. От того насколько крепко держать его руки и руля, мы получим результаты, которые будут зависить от жертвы, которую люди готовы принять."
 HNN_financial_recovery_category_desc_loc_fed: "В связи с глобальным финансовым кризисом, охватившим провинцию, §c[HNN.GetLeader]§! и его союзники в §gСобрании§! спешат ратифицировать любую серию законодательных актов, которые могут облегчить финансовые трудности провинции. Будучи непреклонным, министры §c[HNN.GetLeader]! предлагают два радикально отличающихся подхода к экономическим реформам.С одной стороны, §cЧжао§! может положиться на своих старых друзей из §gвысших кругов§!, §cдворянства§! и §mиностранных инвесторов§! чтобы вытащить Хунань из могилы. С другой стороны, §cЧжао§! может принять современный прогрессивный идеализм, которого придерживаются его союзники - демократы §mХуан Яньпэй! и §Очжоу Шичжао§!, переключив внимание правительства на §Rкрестьян§! и §rрабочих§!. С тяжелым сердцем, программа реформ может навсегда определить будущее его провинции, однако с этим придется повременить, поскольку на горизонте маячут выборы...."
 HNN_financial_recovery_category_desc_loc_fed_electionover: "В связи с глобальным финансовым кризисом, охватившим провинцию, §c[HNN.GetLeader]§! и его союзники в §gСобрании§! спешат ратифицировать любую серию законодательных актов, которые могут облегчить финансовые трудности провинции. Будучи непреклонным, министры §c[HNN.GetLeader]! предлагают два радикально отличающихся подхода к экономическим реформам.С одной стороны, §cЧжао§! может положиться на своих старых друзей из §gвысших кругов§!, §cдворянства§! и §mиностранных инвесторов§! чтобы вытащить Хунань из могилы. С другой стороны, §cЧжао§! может принять современный прогрессивный идеализм, которого придерживаются его союзники - демократы §mХуан Яньпэй! и §Очжоу Шичжао§!, переключив внимание правительства на §Rкрестьян§! и §rрабочих§!. С тяжелым сердцем, программа реформ может навсегда определить будущее его провинции, и все это зависит от того, по плечам ли людям [HNN.GetAdjectiveCap]! бремя."

 HNN_financial_recovery_category_desc_loc_kmt_cheng: "§gЧэн Цяня§!"
