 hunan_events.122.t_qie: "Империя и ее адмирал"
 hunan_events.122.t_szc: "Пережить бурю"
 hunan_events.122.t_zhili: "Возрождение Бэйяна"
 hunan_events.122.d_qie: "Наконец-то наступает закат эры военачальников, а вместе с ними и светлое будущее. Наконец-то опускается занавес над самой мрачной эпохой нашей страны, и может начаться следующий этап.\n\nНеожиданный приход адмирала Тан Сянмина к власти в провинции Хунань стал неожиданностью для многих за ее пределами, но подчиненные нашего адмирала знали, что он сможет принять вызов. После распада Лиги и крушения гегемонии династии Цин Тан Сянмин оказался на высоте положения и добился того, что Хунань осталась верна законному правительству Китая.\n\nИмперия Цин, со своей стороны, преуспела в разгроме своих соперников, чжилийцев, гарантирующих, что попытка возрождения Гоминьдана окажется ничем иным, как несбывшейся мечтой. А их северо-восточные соперники были раздавлены сапогами У Пэйфу. С адмиралом Тан Сянмином, который всегда готов был прийти на помощь, прикрыть фланг и гарантировать, что Хунань сделает все возможное для воплощения мечты о едином Китае.\n\nИ эта мечта сбылась, Китай наконец-то может оставить в прошлом эпоху военачальников и вступить в лучшее будущее. Наконец-то судно готово выйти в открытое море, и ему понадобится достойный адмирал, который поможет сориентироваться в океане, а Тан Сянмин всегда будет готов прийти на помощь, когда потребуется."
 hunan_events.122.d_szc: "Наконец-то наступают сумерки эры военачальников, а вместе с ними и светлое будущее. Наконец-то опускается занавес над самой мрачной эпохой нашей страны, и может начаться следующий этап.\n\nНеожиданный приход адмирала Тан Сянмина к власти в провинции Хунань стал неожиданностью для многих за ее пределами, но подчиненные нашего адмирала знали, что он сможет принять вызов. После распада Лиги и крушения гегемонии Чжили Тан Сянмин оказался на высоте положения и добился того, что Хунань осталась верна законному правительству Китая.\n\nОднако не все было хорошо для Чжили. После смерти У Пэйфу войска Чжили были вынуждены покинуть свой оплот и бежать в Сычуань. И в самый тяжелый момент адмирал Тан по-прежнему был непоколебим и оставался на их стороне. Помогая им вернуть Пекин и Ухань и обеспечивая возрождение Бэйянского правительства под руководством ее истинного наследника.\n\nИ теперь Чжили вернулись к власти, провозгласив возрождение Китайской Республики под своим руководством. Адмирал Тан с гордостью наблюдает за тем, как Чжили выдержала шторм 1936 года и плывет навстречу светлому будущему и ясному небу. Для нас наступил новый рассвет, и наш адмирал гордится тем, что сыграл свою роль в истории"
 hunan_events.122.d_zhili: "Наконец-то наступают сумерки эры военачальников, а вместе с ними и светлое будущее. Наконец-то опускается занавес над самой мрачной эпохой нашей страны, и может начаться следующий этап.\n\nНеожиданный приход адмирала Тан Сянмина к власти в провинции Хунань стал неожиданностью для многих за ее пределами, но подчиненные нашего адмирала знали, что он сможет принять вызов. После распада Лиги и крушения гегемонии Чжили Тан Сянмин оказался на высоте положения и добился того, что Хунань осталась верна законному правительству Китая.\n\nПосле попытки государственного переворота, предпринятой маньчжурами и бывшим императором, У Пэйфу успешно устранил угрозу для Чжили, и [THIS.overlord.GetNameDef] значительно помог стабилизировать ситуацию. Укрепив свои позиции, молодая республика сокрушила ложного наследника северо-востока и взяла под контроль остальную часть Китая, эпоха военачальников, наконец, подошла к концу.\n\nНаш адмирал поддерживал Бэйянское правительство в 1911 году, и он поддерживал его в 1936 году. Сам город Бэйян означает \"Северный океан\", и для нашего адмирала естественно любить Республику так же сильно, как он любит океан. И, как сделал бы любой адмирал, он будет рядом, готовый прийти на помощь, когда потребуется."
 hunan_events.122.a_qie: "\"Пришло время отправляться в путь и направить свои взоры на океан.\""
 hunan_events.122.a_szc: "\"Мы смотрим за горизонт, на ясное небо впереди.\""
 hunan_events.122.a_zhili: "\"Да здравствует Республика!\""

