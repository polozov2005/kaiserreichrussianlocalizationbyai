 HNN_tang_shengzhi: "Тан Шэнчжи"
 HNN_tang_shengzhi_desc_body: "Выпускник 1-ых классов военного училища в Баодине, где он обучался на офицера пехоты, Тан Шэнчжи был первоначально офицером под руководством губернатора Чжао Хэнти, в начале своей карьеру он столкнулся лицом к лицу с Танем Янкаем. Тан вместе с Хэ Яоцзу и Е Кайсинем вытеснили Тана из Хэншаня, который бежал обратно в Гуанчжоу. За последующие годы, Е и Тан конфликт разгорался все сильнее, и последний чувствовал, что Чжао отдает предпочтение первому. В марте 1926, Тан начал восстание против Чжао, которое было подавлено, что вынудело Тана бежать в Гуанчжоу.\n\nТан был принят с распрострертрыми обьятиями и его армия была реорганизована в 8-ую армию НРА. Они зарекомендовали себя как одни из самых боеспособных сил Гоминьдана, выбив Чжао из провинции Хунань и даже одержав победу над У Пэйфу. Однако, Национальная Революция была разбита вмешательством Германии на стороне У Пэйфу, что завершилось смертью генералисимусса Чана Кайши и бегством ЦК в Париж.\n\nТан и 8-ая армия бежали в горы Цзянси и Фуцзяня, где они сопротивлялись силам Лиги Восьми Провинций на протяжении многих лет. После Шанхайского восстания, Дэн Янда и Сунь Цинлин возглавлявшие южные силы ВКД-Гоминьдан присоединились к Тану и организовали Миньганское Восстание."
 HNN_tang_shengzhi_leader_desc: "§YРодился:§! §L12 октября, 1889, в Дунъане, Хунань, Империя Цин§!\n§YБиография:§! §L$HNN_tang_shengzhi_desc_body$ После падения Лиги, Тан выиграл выборы в Хунане и теперь ищет способы превратить регион в бастион националистов.§!"
 HNN_tang_shengzhi_sic_desc: "§YРодился:§! §L12 октября, 1889, в Дунъане, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §S8-я армия§!\n§YБиография:§! §L$HNN_tang_shengzhi_desc_body$ В то время как ситуация для националистов кажется безрадостной, \"Буддистский генерал\" сохраняет надежду, что однажды он сможет освободить родную провинцию от нечестивого правительства Чжао.§!"
 #程潛
 HNN_cheng_qian: "Чэн Цянь"
 HNN_cheng_qian_desc_start: "Родившийся в преуспевающей семье землевладельцев, Чэн получил традиционное конфуцианское образование и прошел имперские экзамены первой степени в надежде стать студентом. Однако, учитывая политическую обстановку в Китае конце 19-ого века,он выбрал карьеру военного. Выпустившись из Военной академии Хунаня и отправившись в Японию, где он учился и встретил множество революционеров,таких как:Сун Цзяожчэнь и Ли Цзюнь. в 1905, он встретил Сунь Ятсена и вступил в Тутмэнхуэй. Он закончил китайские курсы Японской Военной Академии вместе с Таном Цзияем, как артиллерист.\n\nВо время Синьхайской революции в 1911, он принял участие в битве за Чаньшу.Он проявил верность идеалам Суня, присоединившись к Гоминьдану и пригласив Суня в Движение за защиту Конституции. Изгнание Тан Сянмина из провинции Хунань, в ходе последующих войн, позволило Чэну стать демократически избранным губернатором в 1917 году."
 HNN_cheng_qian_leader_desc: "§YРодился:§! §L31 марта, 1882, округ Лилинь, Хунань, Империя Цин§!\n§YБиография:§! §L$HNN_cheng_qian_desc_start$\n\nВо время Северной Экспедиции, он возглавлял 6-ую армию в битве при Нанчане, и в других известных битвах. Правда, экспедиция обернулась разгромом Гоминьдана, Чэн Циан и его 6-ая армия обнаружили себя в это время в западном Хунане. Следуя вместе с потоком гоминьдановских беженцев в Гуйчжоу, он использовал свою в основном непотрепанную армию для переговоров с Таном Цзияем для безопасности Гоминьдана.\n\nОбьединившись со своим товарищем по партии Таном Шэнчжи, чтобы победить Чжао на выборах, Чэн Цянь был выбран как более умеренный представитель Гоминьдана.§!"
 HNN_cheng_qian_sic_desc: "§YРодился:§! §L31 марта, 1882, округ Лилинь, Хунань, Империя Цин§!\n§YПолитическая принадлежность:§! §g6-я армия§!\n§YБиография:§! §L$HNN_cheng_qian_desc_start$\n\nОдин из ближайших сторонников Суня в его войне против Чэна Цзюнминя, он был назначен одним из военн,отвечавшиз за подготовку к Северной Экспедиции, и когда-то считался директором Вампоа. Одержав победы в битвах Восточной Экспедиции, он был избран в Центральный Комитет, и реорганизовал свою армию Хунани в 6-ую армию.\n\nКогда Северная Экспедиция шла к завершению, он возглавлял 6-ую армию в битве за Наньчан, а также в других известных битвах. Правда, экспедиция обернулась разгромом Гоминьдана, Чэн Циан и его 6-ая армия обнаружили себя в это время в западном Хунане. Следуя вместе с потоком гоминьдановских беженцев в Гуйчжоу, он использовал свою в основном непотрепанную армию для переговоров с Таном Цзияем для безопасности Гоминьдана.\n\nСохраняя значительные силы в Гуйчжоу, 6-я армия Чэн Цяня выжидала удобного момента, чтобы вернуться из изгнания и снова захватить Хунань. Пользуясь значительным уважением не только среди гоминьдановцев, но и в провинциях в целом, Чэн вполне мог бы осуществить свою мечту.§!"

 #湯薌銘
 HNN_tang_xiangming: "Тан Сянмин"
 HNN_tang_xiangming_bio: "Карьера Тана Сянмина началась еще в Империи Цин,где он был адмиралом. Разразившаяся в 1911 Синхайская Революция все изменила. Он был в распоряжении командира,лояльного Империи Цин, но увидев сколько путей ему может открыться, перешел на сторону Революции. В октябре 1931 Тань Янкай был вынужден уйти в отставку с поста губернатора провинции Хунань, и Тан был назначен Юань Шикаем губернатором, и также поддерживал его попытку короновать себя Императором,во время своего правления провинцией он выстроил репрессивный режим и поэтому заработал себе прозвище \"Мясник Тан\". Из-за его поддержки Юаня Шикая, Тан был вынужден бежать из Хунани в июле 1916, так как провинция перешла под контроль Альянса Национальной Защиты, его заменил Тань Янкай.\n\nОн присоединился к Чжилийской клики в 1917, и во время второй Чжили-Фэнтянской войны служил в военной полиции. Когда Северная Экспидиция закончилась поражением революционеров, Тану был предоставлен гарнизон в Юэяне. Когда У поддерживал официально Чжао как губернатора Хунани, он позаботился о том, чтобы Тан был наготове на случай, если правительство в Чанше решит выступить против Пекина. Тан пользуется заметным влиянием среди западных военачальников, Чэна Цюйчжэня и Тяна Инчжао, и ставленника Чжили в Гуйчжоу, Юаня Цзумина. Так что, если дело дойдет до драки, Тан готов на все, чтобы оставить Хунань под контролем Чжили."
 HNN_tang_xiangming_leader_desc: "§YРодился:§! §L1885, Хуанчжоу, Хубей, Империя Цин§!\n§YБиография:§! §L$HNN_tang_xiangming_bio$\n\nС его назначением на пост губернатора провинции Хунань карьера Тан Сянмина достигла новых высот. Вооруженный и пользующийся поддержкой военных, он намерен любой ценой закрепить провинцию за кликой Чжили. Последством управления его \"Комиссии по обороне\", считается, что он надеется по-настоящему искоренить античжилийские настроения в провинции раз и навсегда.\n\n§Yпримечания: Несмотря на всю его пышность, обстоятельства и регалии, Тан по-прежнему считается аутсайдером в клике Чжили, и считается, что именно это привело к его назначению в Хунань.\n\nПрежде всего, Тан по-прежнему страстно любит свою первую настоящую любовь - море, и надеется, что однажды он снова будет командовать кораблями.§!"
 HNN_tang_xiangming_army_chief_desc: "§YРодился:§! §L1885, Хуанчжоу, Хубей, Империя Цин§!\n§YПолитическая принадлежность:§! §PЧжили§!\n§YБиография:§! §L$HNN_tang_xiangming_bio$§!"

