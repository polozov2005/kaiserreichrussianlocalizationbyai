 heavy_tank_flame_chassis_0: "Межвоенный тяжелый огнеметный танк"
 heavy_tank_flame_chassis_desc: "Большая машина с огнеметом в башне для атаки укреплений и домов."
 heavy_tank_flame_chassis_1: "Базовый тяжелый огнеметный танк"
 heavy_tank_flame_chassis_2: "Улучшенный тяжелый огнеметный танк"
