 lc_heavy_naval_guns: "Тяжелые морские орудия"
 lc_heavy_naval_guns_desc: "Эти мощные корабельные пушки, стандартное основное вооружение такой массивной бронетехники, приспособлены для прямого противостояния и обеспечивают разрушительную огневую мощь как по бронированным, так и по укрепленным целям."
 lc_super_heavy_railway_gun: "Сверхтяжёлая железнодорожная пушка"
 lc_super_heavy_railway_gun_desc: "Это массивное орудие, изначально созданное для железнодорожных платформ, способно обстреливать цели с огромных дистанций с беспрецедентной разрушительной силой."
 lc_high_impact_obliterator_cannon: "Мощная уничтожительная пушка"
 lc_high_impact_obliterator_cannon_desc: "Это оружие, специально разработанное для пробития чрезвычайно толстой брони, обладает высокой кинетической энергией, что делает его мощным средством борьбы с другими сверхтяжелыми танками."
 lc_heavy_anti_air_platform: "Тяжелая зенитная платформа"
 lc_heavy_anti_air_platform_desc: "Платформа с несколькими крупнокалиберными зенитными орудиями, предназначенная для защиты от вражеских бомбардировщиков и самолетов-разведчиков, угрожающих Land Cruiser."
 lc_medium_naval_guns: "Средние морские орудия"
 lc_medium_naval_guns_desc: "Предлагая сбалансированное сочетание скорострельности и огневой мощи, эти орудия эффективны для поражения более легких транспортных средств и оказания поддержки против небронированных целей."
 lc_hull_mounted_railway_gun: "Корпусная железнодорожная пушка"
 lc_hull_mounted_railway_gun_desc: "Модернизированная железнодорожная пушка, встроенная непосредственно в корпус для обеспечения максимальной устойчивости, обеспечивает мощную огневую поддержку и может с высокой точностью поражать удаленные цели."
 lc_super_heavy_howitzer: "Сверхтяжелая гаубица"
 lc_super_heavy_howitzer_desc: "Массивная гаубица, предназначенная для разрушения укреплений и городской обороны. Этот вариант специализируется на доставке осколочно-фугасных снарядов, идеально подходящих для зачистки окопов и уничтожения укреплённых сооружений."
 lc_heavy_high_velocity_cannons: "Тяжелые высокоскоростные пушки"
 lc_heavy_high_velocity_cannons_desc: "Противотанковые орудия, предназначенные для поражения и уничтожения бронетехники противника с высокой точностью. Их высокоскоростные снаряды обеспечивают превосходное пробитие на больших дистанциях."
 lc_heavy_anti_air_battery: "Тяжелая зенитная батарея"
 lc_heavy_anti_air_battery_desc: "Зенитная батарея, оснащенная крупнокалиберными орудиями для поражения скоростных и высотных самолетов, обеспечивающая защитный пузырь вокруг машины."
 lc_medium_cannon_turret: "Средняя пушечная турель"
 lc_medium_cannon_turret_desc: "Стандартная турельная пушка, способная поражать пехоту и легкую технику. Компактный дизайн делает его универсальным для ближнего боя и второстепенных ролей."
 lc_assault_gun: "Штурмовая пушка"
 lc_assault_gun_desc: "Предназначен для ведения боевых действий в городских условиях на ближней дистанции и разрушения бункеров. Это оружие поражает пехоту и защищенные цели мощными осколочно-фугасными снарядами."
 lc_high_velocity_cannon_turret: "Скорострельная пушечная турель"
 lc_high_velocity_cannon_turret_desc: "Башня с высокоскоростной пушкой для поражения бронетехники противника. Его меньшие размеры позволяют ему обеспечивать быструю и оперативную огневую поддержку против более легких бронированных машин."
 lc_light_anti_air_battery: "Легкая зенитная батарея"
 lc_light_anti_air_battery_desc: "Легкая зенитная батарея, предназначенная для поражения низколетящих самолетов и защиты машины от обстрелов и пикирующих бомбардировщиков."
 lc_flamethrower_turret: "Огнеметная турель"
 lc_flamethrower_turret_desc: "Специализированная турель, излучающая струю огня, идеально подходящая для зачистки укреплённых позиций, пехоты и точек засад. Идеально подходит для ближнего боя в условиях плотной городской застройки."
 lc_rocket_launcher: "Ракетная установка"
 lc_rocket_launcher_desc: "Модульная ракетная система, установленная на Land Cruiser, обеспечивает разрушительный ракетный обстрел для подавления обороны противника и подавления крупных группировок."
 lc_radio_1: "$tank_radio_1$"
 lc_radio_1_desc: "$tank_radio_1_desc$"
 lc_radio_2: "$tank_radio_2$"
 lc_radio_2_desc: "$tank_radio_2_desc$"
 lc_radio_3: "$tank_radio_3$"
 lc_radio_3_desc: "$tank_radio_3_desc$"
 lc_command_center: "Командный центр"
 lc_command_center_desc: "Полностью интегрированный командный центр, превращающий Land Cruiser в мобильный штаб, оснащенный передовыми системами связи для координации крупномасштабных военных операций."
 lc_radar: "Радар"
 lc_radar_desc: "Система раннего обнаружения, которая повышает осведомленность о вражеских самолетах и ​​близлежащих силах, позволяя Land Cruiser подготовиться к потенциальным воздушным или наземным угрозам."
 lc_aircraft_catapult: "Авиационная катапульта"
 lc_aircraft_catapult_desc: "Система запуска для небольших самолетов-разведчиков, позволяющая Land Cruiser разведывать отдаленные районы и предоставлять разведданные в режиме реального времени."
 lc_helipad: "Вертолетная площадка"
 lc_helipad_desc: "Платформа для запуска вертолетов, предназначенная для обеспечения расширенной воздушной разведки и повышения осведомленности об обстановке на поле боя."
 lc_armored_skirts: "Бронированные юбки"
 lc_armored_skirts_desc: "По бортам установлена ​​усиленная броня для защиты уязвимых гусениц и систем подвески от огня противотанковых средств и стрелкового оружия."
 lc_bunker_emplacement: "Размещение бункера"
 lc_bunker_emplacement_desc: "Внутренняя укрепленная конструкция, превращающая Land Cruiser в мобильный бункер. Это позволяет экипажу удерживать оборону и вести ответный огонь по противнику даже под шквальным огнем."
 lc_obstacle_clearance_gear: "Механизм преодоления препятствий"
 lc_obstacle_clearance_gear_desc: "Навесное оборудование для тяжелых условий эксплуатации, такое как массивные бульдозерные отвалы и краны, предназначенные для расчистки завалов, прокладки путей в труднопроходимой местности и оказания помощи в операциях по окопам."
 lc_internal_fuel_tanks: "Внутренние топливные баки"
 lc_internal_fuel_tanks_desc: "Расширенные топливные отсеки внутри корпуса, увеличивающие дальность действия машины и снижающие необходимость частых остановок для дозаправки во время длительных походов."
 lc_internal_ammunition_compartments: "Внутренние отсеки для боеприпасов"
 lc_internal_ammunition_compartments_desc: "Усиленные отсеки для хранения дополнительных боеприпасов, позволяющие Land Cruiser вести длительные бои без пополнения запасов."
 lc_wet_ammunition_storage: "Влажное хранение боеприпасов"
 lc_wet_ammunition_storage_desc: "Специализированные отсеки, заполненные жидким теплоносителем, минимизируют риск детонации боеприпасов от ударов противника, что значительно повышает безопасность экипажа."
 lc_smoke_generators: "Дымогенераторы"
 lc_smoke_generators_desc: "Система, предназначенная для создания толстых дымовых завес, маскирующих движения машины и снижающих ее видимость как для наземных, так и для воздушных угроз."
 lc_stabilizers: "Стабилизаторы"
 lc_stabilizers_desc: "Механические устройства, уменьшающие отдачу и поддерживающие выравнивание орудия при стрельбе, позволяют быстрее обнаруживать цель и более точно стрелять во время коротких остановок."
