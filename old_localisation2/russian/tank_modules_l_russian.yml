 advanced_light_tank_chassis: "Усовершенствованное шасси легкого танка"
 advanced_light_tank_chassis_short: "1941 Свет"
 advanced_light_tank_chassis_desc: "Поскольку средние танки все чаще занимают центральное место в бою, легким танкам в основном отводится вспомогательная роль. Необходима новая конструкция шасси, учитывающая потребности этих ролей."
