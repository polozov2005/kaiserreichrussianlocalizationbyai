 heavy_tank_flame_chassis: "Тяжелый огненный танк"
 amphibious_tank_chassis: "Шасси танка-амфибии"
 amphibious_tank_chassis_desc: "Небольшой корпус танка, специально предназначенный для плавания. Для этого необходимо установить строгие ограничения на размер оружия и толщину брони, которую несет машина."
 amphibious_tank_chassis_1: "Шасси танка-амфибии"
 gwtank_chassis: "Межвоенная разработка танков"
 gwtank_chassis_desc: "Танк зарекомендовал себя как мощное оружие в Великой войне. Хотя за прошедшие годы развитие замедлилось, оно, несомненно, сыграет важную роль в будущих войнах."
 gwtank_chassis_short: "Шасси танка времён Вельткрига"
 armor_tech_1: "Базовая броня защиты"
 armor_tech_1_desc: "Танкам в годы Великой войны приходилось бороться только со стрелковым оружием противника. Таким образом, они отделались довольно тонкой броней. Новое поколение противотанковых средств сделало поле боя гораздо более опасным местом для танка, и необходима более мощная защита."
 armor_tech_2: "Улучшенная бронезащита"
 armor_tech_2_desc: "Поскольку по всему миру размещается все более и более тяжелое противотанковое оружие, танкам следующего поколения потребуется еще лучшая защита."
 armor_tech_3: "Улучшенная броня защиты"
 armor_tech_3_desc: "Хотя предел развернутых противотанковых орудий, вероятно, уже достигнут, танки нового поколения будут нести более совершенное вооружение, способное пробить любой текущий уровень защиты на большом расстоянии."
 armor_tech_4: "Современная броневая защита"
 armor_tech_4_desc: "Во время войны угрозы, с которыми сталкиваются танки, увеличились: от вражеских танков, противотанковых орудий, специализированных истребителей танков до современного пехотного оружия, стреляющего кумулятивными зарядами, способными пробить даже тяжелую броню. Мы должны разработать новые методы защиты, чтобы сохранить наши танки живыми перед лицом этих угроз."
 engine_tech_1: "Базовый двигатель"
 engine_tech_1_desc: "Если танки Великой войны были медленными и неуклюжими зверями, то современные танки для достижения победы во многом полагаются на скорость и мобильность."
 engine_tech_2: "Улучшенный движок"
 engine_tech_2_desc: "Новое поколение танков, обладающее более крупными орудиями и более тяжелой броней, требует более мощного двигателя, чтобы оставаться мобильным."
 engine_tech_3: "Расширенный движок"
 engine_tech_3_desc: "Механизированная война — это форма боя, требующая быстрого принятия решений и быстрого перемещения войск и припасов. Если наши танки хотят иметь современное вооружение и достаточную броню, чтобы выжить на поле боя, им потребуются мощные двигатели, чтобы не отставать от мотопехоты."
 engine_tech_4: "Современный двигатель"
 engine_tech_4_desc: "Многочисленные новые дополнения к танкам, необходимые в условиях современной войны, существенно увеличили вес машины. Чтобы переместить всю эту массу, нам нужны двигатели, обладающие большой мощностью."
 DESIGNER_CHASSIS_BASE: "Шасси:"
 DESIGNER_FROM_MODULES: "Модули:"
 DESIGNER_UNSAVED_CHANGES: "Несохраненные изменения:"
 tank_rocket_launcher: "Ракетная установка"
 tank_rocket_launcher_desc: "Многоствольная пусковая установка для неуправляемых фугасных ракет. Большая громкость огня обеспечивает превосходную эффективность против слабых целей, но даже прямые попадания малоэффективны против бронированных целей."
 tank_rocket_launcher_2: "Улучшенная ракетная установка"
 tank_rocket_launcher_2_desc: "Несмотря на ряд улучшений точности, основное преимущество этой улучшенной ракетной установки заключается в том, что она может содержать больше ракет для стрельбы по противнику."
 tank_wheeled_suspension: "Колесная подвеска"
 tank_wheeled_suspension_desc: "Эта подвеска, созданная на базе шасси грузовика, очень ограничена по грузоподъемности и имеет ограниченную проходимость, но имеет то преимущество, что ее изготовление очень дешево."
 tank_half_track_suspension: "Полугусеничная подвеска"
 tank_half_track_suspension_desc: "Гибрид полностью гусеничного автомобиля и обычной колесной подвески. Эта установка имеет пару передних колес для рулевого управления и гусеничный задний мост для улучшения проходимости. Несмотря на ограниченную грузоподъемность, он все же дешевле полностью гусеничной конструкции."
 squeezebore_adaptor: "Переходник с выжимным отверстием"
 squeezebore_adaptor_desc: "Специальный переходник на конце пистолета уменьшает диаметр ствола и сжимает снаряд до меньшего калибра. Это значительно увеличивает начальную скорость и, следовательно, проникающую способность орудия. Для этого требуются специальные боеприпасы, изготовленные из редких материалов."
 armor_skirts: "Бронированные юбки"
 armor_skirts_desc: "Набор тонких металлических пластин, установленных на борту машины, обеспечивающих дополнительную защиту от противотанковых ружей и кумулятивных зарядов."
 dozer_blade: "Бульдозерный отвал"
 dozer_blade_desc: "Бульдозерный отвал позволяет машине быстро занять боевую позицию в поле без поддержки инженеров."
 auto_loader: "Авто погрузчик"
 auto_loader_desc: "Автоматический механизм, заряжающий снаряды и позволяющий танку сохранять высокую скорострельность в течение длительного периода времени."
 easy_maintenance: "Простое обслуживание"
 easy_maintenance_desc: "Люки вокруг машины обеспечивают доступ ко множеству различных компонентов машины и позволяют экипажу довольно легко выполнять даже сложное обслуживание."
 additional_machine_guns: "Дополнительные пулеметы"
 additional_machine_guns_desc: "Комплект пулеметов в спонсонах и специальные шкворневые установки повышают защиту машины от атак пехоты с близкого расстояния."
  
 EQUIPMENT_AMPHIBIOUS: "Танк-амфибия"
  
 light_flame_tank: "Танковая рота «Легкое пламя»"
 light_flame_tank_desc: "Рота легких, оснащенных огнеметами машин для поддержки при штурме городов и укреплений."
 medium_flame_tank: "Рота средних огненных танков"
 medium_flame_tank_desc: "Рота средних машин, оснащенных огнеметами, для поддержки при штурме городов и укреплений."
 heavy_flame_tank: "Рота тяжелых огнеметных танков"
 heavy_flame_tank_desc: "Рота тяжелой, оснащенной огнеметами техники для поддержки при штурме городов и укреплений."
  
 light_tank_amphibious_chassis_desc: "Легкий танк, оснащенный поплавковыми устройствами и гребным винтом."
 medium_tank_amphibious_chassis_desc: "Средний танк, оснащенный поплавковыми устройствами и гребным винтом."
 heavy_tank_amphibious_chassis_desc: "Тяжелый танк, оснащенный плавучими устройствами и гребным винтом."
  
 expanded_fuel_tank: "Топливная бочка"
 expanded_fuel_tank_desc: "Внешняя топливная бочка, предназначенная для расширения дальности действия бронетехники."
  
 land_cruiser_chassis: "Ленд Крузер Шасси"
 land_cruiser_chassis_desc: "Гигантское шасси, тяжелобронированное, предназначенное для поддержки сверхтяжелого вооружения и выдерживающее огромные нагрузки на поле боя, но с высоким расходом топлива и низкой скоростью из-за своих огромных размеров."
 land_cruiser_chassis_1: "Ленд Крузер Шасси"
  
