 basic_heavy_tank_chassis: "Базовое шасси тяжелого танка"
 basic_heavy_tank_chassis_desc: "Тщательный анализ Великой войны показал, что существует необходимость в тяжелой машине, чтобы прорвать линию траншей противника и открыть путь более легким силам для использования прорыва. Такая машина должна быть хорошо вооружена и хорошо бронирована, но не обязательно должна быть очень быстрой."
 basic_heavy_tank_chassis_short: "1934 Тяжелый"
 improved_heavy_tank_chassis: "Улучшенное шасси тяжелого танка"
 improved_heavy_tank_chassis_desc: "Несмотря на то, что характер войны изменился, по-прежнему существует место для тяжелой машины с толстой броней, позволяющей прорвать линию обороны противника или укрепить оборону от нападения противника."
 improved_heavy_tank_chassis_short: "1940 Тяжелый"
 advanced_heavy_tank_chassis: "Усовершенствованное шасси тяжелого танка"
 advanced_heavy_tank_chassis_desc: "С развитием брони и огневой мощи современный танк должен иметь толстую броню и большую пушку, чтобы быть эффективным. Для этого нужен большой автомобиль."
 advanced_heavy_tank_chassis_short: "1943 Тяжелый"
 heavy_tank_chassis_desc: "Большое шасси, на котором можно установить тяжелую пушку, толстую броню или и то, и другое."
