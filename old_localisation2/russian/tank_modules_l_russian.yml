 super_heavy_tank_aa_chassis_1: "Сверхтяжелая СП ПВО"
 super_heavy_tank_aa_chassis: "Сверхтяжелая СП ПВО"
 light_tank_flame_chassis_0: "Межвоенный легкий огнеметный танк"
 light_tank_flame_chassis_desc: "Небольшая машина с огнеметом в башне для атаки укреплений и домов."
 light_tank_flame_chassis_1: "Базовый легкий огнеметный танк"
