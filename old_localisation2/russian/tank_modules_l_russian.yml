  ### EQUIPMENT MODULES ### 
  
 tank_gasoline_engine: "Бензиновый двигатель"
 tank_gasoline_engine_desc: "Двигатель, работающий на бензине, будет работать быстрее для данного размера двигателя, но топливо будет гораздо более склонно к возгоранию."
 tank_diesel_engine: "Дизельный двигатель"
 tank_diesel_engine_desc: "Двигатель, работающий на дизельном топливе, более надежен, чем бензиновый, но не такой быстрый для двигателя того же размера."
 tank_petrol_electric_engine: "Бензин-электрический двигатель"
 tank_petrol_electric_engine_desc: "Комбинация бензинового двигателя, обеспечивающего мощность электродвигателя. Сложный, дорогой и ненадежный, он, тем не менее, обеспечивает непревзойденные характеристики в тактических действиях."
 tank_gas_turbine_engine: "Газовая турбина"
 tank_gas_turbine_engine_desc: "Турбина, разработанная на основе реактивных двигателей. Высокий расход топлива, но самая высокая скорость среди всех двигателей данного размера."
 tank_riveted_armor: "Клепаная броня"
 tank_riveted_armor_desc: "Броневые листы крепились болтами к раме и скреплялись заклепками, вбитыми по краям. Очень проверенная и довольно дешевая технология, но заклепанные края создают слабые места в броне и могут причинить вред экипажу, если заклепки повредятся."
 tank_cast_armor: "Литая броня"
 tank_cast_armor_desc: "Все шасси, включая броню, отлито как единое целое. Дорогой и трудоемкий процесс, позволяющий получить гораздо более толстую броню с меньшим количеством слабых мест."
 tank_welded_armor: "Сварная броня"
 tank_welded_armor_desc: "Броневые листы приварены к шасси. Более быстрый процесс, чем литье, но при этом обеспечивает хорошую защиту."
 NOR_tank_rikstanken_armor: "Импровизированная броня"
 NOR_tank_rikstanken_armor_desc: "Сделано из листов железа, а не из стали, чтобы сэкономить деньги. Лучше, чем отсутствие доспехов... Наверное."
 tank_torsion_bar_suspension: "Торсионный стержень"
 tank_torsion_bar_suspension_desc: "Достаточно надежная система подвески из металлических стержней, закрепленных на шасси автомобиля, обеспечивающая более плавный ход, чем другие типы подвесок."
 tank_christie_suspension: "Кристи Подвеска"
 tank_christie_suspension_desc: "Эта подвеска, разработанная американским изобретателем, позволяет развивать исключительно высокие скорости."
 tank_bogie_suspension: "Подвеска тележки"
 tank_bogie_suspension_desc: "Простой и достаточно дешевый тип подвески, в котором опорные катки установлены индивидуально, что позволяет легко заменить их в случае повреждения."
 tank_interleaved_suspension: "Перемежающиеся опорные колеса"
 tank_interleaved_suspension_desc: "Перекрывая опорные катки, можно разместить большее их количество на корпусе той же длины, тем самым улучшая подвижность, а также обеспечивая некоторую дополнительную защиту флангов."
 tank_light_one_man_tank_turret: "Одноместная турель"
 tank_light_one_man_tank_turret_desc: "Небольшая башня, достаточно большая, чтобы вместить одного члена экипажа, которому поручено прицеливаться и заряжать основное вооружение, а также следить за целями и угрозами."
 tank_light_two_man_tank_turret: "Двухместная турель"
 tank_light_two_man_tank_turret_desc: "Башня, позволяющая двум членам экипажа разделить работу по управлению вооружением и наблюдению за обстановкой. Это по-прежнему не позволяет обеспечить эффективное разделение труда среди экипажа."
 tank_light_three_man_tank_turret: "Трехместная турель"
 tank_light_three_man_tank_turret_desc: "Башня достаточно большая, чтобы три члена экипажа могли разделить задачи по заряжанию и наведению основного вооружения, а также следить за ситуацией вокруг себя."
 tank_light_fixed_superstructure_turret: "Легкая фиксированная надстройка"
 tank_light_fixed_superstructure_turret_desc: "Неподвижная надстройка позволяет основному вооружению перемещаться только по небольшой дуге, не поворачивая всю машину. Тем не менее, это позволяет машине устанавливать более крупное вооружение, хотя в целом она имеет меньшие размеры, что делает машину идеальной для засад."
 tank_medium_one_man_tank_turret: "Одноместная турель"
 tank_medium_one_man_tank_turret_desc: "Небольшая башня, достаточно большая, чтобы вместить одного члена экипажа, которому поручено прицеливаться и заряжать основное вооружение, а также следить за целями и угрозами."
 tank_medium_two_man_tank_turret: "Двухместная турель"
 tank_medium_two_man_tank_turret_desc: "Башня, позволяющая двум членам экипажа разделить работу по управлению вооружением и наблюдению за обстановкой. Это по-прежнему не позволяет обеспечить эффективное разделение труда среди экипажа."
 tank_medium_three_man_tank_turret: "Трехместная турель"
 tank_medium_three_man_tank_turret_desc: "Башня достаточно большая, чтобы три члена экипажа могли разделить задачи по заряжанию и наведению основного вооружения, а также следить за ситуацией вокруг себя."
 tank_medium_fixed_superstructure_turret: "Средняя фиксированная надстройка"
 tank_medium_fixed_superstructure_turret_desc: "Неподвижная надстройка позволяет основному вооружению перемещаться только по небольшой дуге, не поворачивая всю машину. Тем не менее, это позволяет машине устанавливать более крупное вооружение, хотя в целом она имеет меньшие размеры, что делает машину идеальной для засад."
 tank_heavy_two_man_tank_turret: "Двухместная турель"
 tank_heavy_two_man_tank_turret_desc: "Башня, позволяющая двум членам экипажа разделить работу по управлению вооружением и наблюдению за обстановкой. Это по-прежнему не позволяет обеспечить эффективное разделение труда среди экипажа."
 tank_heavy_three_man_tank_turret: "Трехместная турель"
 tank_heavy_three_man_tank_turret_desc: "Башня достаточно большая, чтобы три члена экипажа могли разделить задачи по заряжанию и наведению основного вооружения, а также следить за ситуацией вокруг себя."
 tank_heavy_fixed_superstructure_turret: "Тяжелая фиксированная надстройка"
 tank_heavy_fixed_superstructure_turret_desc: "Неподвижная надстройка позволяет основному вооружению перемещаться только по небольшой дуге, не поворачивая всю машину. Тем не менее, это позволяет машине устанавливать более крупное вооружение, хотя в целом она имеет меньшие размеры, что делает машину идеальной для засад."
 tank_super_heavy_four_man_tank_turret: "Четырехместная турель"
 tank_super_heavy_four_man_tank_turret_desc: "Массивная башня с дополнительным местом для второго заряжающего для обслуживания основного орудия."
 tank_super_heavy_three_man_tank_turret: "Трехместная турель"
 tank_super_heavy_three_man_tank_turret_desc: "Башня достаточно большая, чтобы три члена экипажа могли разделить задачи по заряжанию и наведению основного вооружения, а также следить за ситуацией вокруг себя."
 tank_modern_tank_turret: "Современная турель"
 tank_modern_tank_turret_desc: "Хорошо продуманная башня позволяет трем членам экипажа эффективно управлять основным вооружением и следить за обстановкой."
 tank_heavy_machine_gun: "Тяжелый пулемет"
 tank_heavy_machine_gun_desc: "Пулемет обеспечивает достойные противопехотные возможности при невысокой цене. Даже со специальными бронебойными боеприпасами его противобронебойные характеристики оставляют желать лучшего."
 flamethrower: "Огнемет"
 flamethrower_desc: "Устройство для подачи струи горящей жидкости. Хотя он очень полезен в городских боях и против укреплений, он не обладает противотанковыми возможностями и для эффективности должен использоваться специально обученным экипажем в отдельном подразделении."
 advanced_flamethrower: "Усовершенствованный огнемет"
 advanced_flamethrower_desc: "Усовершенствованные огнеметные системы, идеально подходящие для зачистки укрепленных позиций и нанесения разрушительного урона в ближнем бою."
 tank_auto_cannon: "Автоматическая пушка"
 tank_auto_cannon_desc: "Эта автоматическая пушка, созданная на основе скорострельной зенитной пушки, способна обрушить град огня, разрушительный для слабых целей. Малый калибр ограничивает его противотанковые характеристики."
 tank_auto_cannon_2: "Улучшенная автоматическая пушка"
 tank_auto_cannon_2_desc: "Эта автоматическая пушка, созданная на основе скорострельной зенитной пушки, способна обрушить град огня, разрушительный для слабых целей. Малый калибр ограничивает его противотанковые характеристики."
 tank_anti_air_cannon: "Базовая зенитная пушка"
 tank_anti_air_cannon_desc: "Скорострельная автоматическая пушка, предназначенная для поражения самолетов. Он имеет ограниченный потенциал в качестве средства огневой поддержки по наземным целям."
 tank_anti_air_cannon_2: "Улучшенная зенитная пушка"
 tank_anti_air_cannon_2_desc: "Скорострельная автоматическая пушка, предназначенная для поражения самолетов. Он имеет ограниченный потенциал в качестве средства огневой поддержки по наземным целям."
 tank_anti_air_cannon_3: "Усовершенствованная зенитная пушка"
 tank_anti_air_cannon_3_desc: "Скорострельная автоматическая пушка, предназначенная для поражения самолетов. Он имеет ограниченный потенциал в качестве средства огневой поддержки по наземным целям."
 tank_medium_howitzer: "Средняя гаубица"
 tank_medium_howitzer_desc: "Средняя полевая гаубица, приспособленная для установки на транспортное средство. Его основное назначение — огневая поддержка с закрытых позиций по слабым целям, но при необходимости из него можно вести огонь и напрямую по цели. Имея лишь небольшое количество бронебойных боеприпасов, он плохо пригоден для противотанковых действий."
 tank_medium_howitzer_2: "Улучшенная средняя гаубица"
 tank_medium_howitzer_2_desc: "Средняя полевая гаубица, приспособленная для установки на транспортное средство. Его основное назначение — огневая поддержка с закрытых позиций по слабым целям, но при необходимости из него можно вести огонь и напрямую по цели. Имея лишь небольшое количество бронебойных боеприпасов, он плохо пригоден для противотанковых действий."
 tank_heavy_howitzer: "Тяжелая гаубица"
 tank_heavy_howitzer_desc: "Тяжелая полевая гаубица, приспособленная для установки на транспортное средство. Его основное назначение — огневая поддержка с закрытых позиций по слабым целям, но при необходимости из него можно вести огонь и напрямую по цели. Имея лишь небольшое количество бронебойных боеприпасов, он плохо пригоден для противотанковых действий."
 tank_small_cannon: "Маленькая Пушка"
 tank_small_cannon_desc: "Маленькая и дешевая пушка, способная стрелять как противопехотными, так и противотанковыми снарядами. Малый калибр ограничивает его полезность."
 tank_small_cannon_2: "Улучшенная маленькая пушка"
 tank_small_cannon_2_desc: "Маленькая и дешевая пушка, способная стрелять как противопехотными, так и противотанковыми снарядами. Малый калибр ограничивает его полезность."
 tank_medium_cannon: "Средняя пушка"
 tank_medium_cannon_desc: "Универсальное оружие, хорошо подходящее для решения самых разных задач. Он не преуспевает ни в противопехотных, ни в противотанковых действиях, но обеспечивает машине большую гибкость."
 tank_medium_cannon_2: "Улучшенная средняя пушка"
 tank_medium_cannon_2_desc: "Универсальное оружие, хорошо подходящее для решения самых разных задач. Он не преуспевает ни в противопехотных, ни в противотанковых действиях, но обеспечивает машине большую гибкость."
 tank_high_velocity_cannon: "Базовая высокоскоростная пушка"
 tank_high_velocity_cannon_desc: "Пушка, специально разработанная для достижения высокой начальной скорости. Используя специализированные боеприпасы, он обладает превосходными противобронебойными характеристиками, но его эффективность против слабых целей ухудшается."
 tank_high_velocity_cannon_2: "Улучшенная высокоскоростная пушка"
 tank_high_velocity_cannon_2_desc: "Пушка, специально разработанная для достижения высокой начальной скорости. Используя специализированные боеприпасы, он обладает превосходными противобронебойными характеристиками, но его эффективность против слабых целей ухудшается."
 tank_high_velocity_cannon_3: "Усовершенствованная высокоскоростная пушка"
 tank_high_velocity_cannon_3_desc: "Пушка, специально разработанная для достижения высокой начальной скорости. Используя специализированные боеприпасы, он обладает превосходными противобронебойными характеристиками, но его эффективность против слабых целей ухудшается."
 tank_heavy_cannon: "Базовая тяжелая пушка"
 tank_heavy_cannon_desc: "Оружие, способное стрелять большим снарядом. Обладая исключительной бронепробиваемостью и приличными характеристиками против мягких целей, его самым большим недостатком являются огромные размеры и стоимость, что делает его слишком громоздким для установки в большинстве транспортных средств, специально не предназначенных для его перевозки."
 tank_heavy_cannon_2: "Улучшенная тяжелая пушка"
 tank_heavy_cannon_2_desc: "Оружие, способное стрелять большим снарядом. Обладая исключительной бронепробиваемостью и приличными характеристиками против мягких целей, его самым большим недостатком являются огромные размеры и стоимость, что делает его слишком громоздким для установки в большинстве транспортных средств, специально не предназначенных для его перевозки."
 tank_heavy_cannon_3: "Усовершенствованная тяжелая пушка"
 tank_heavy_cannon_3_desc: "Оружие, способное стрелять большим снарядом. Обладая исключительной бронепробиваемостью и приличными характеристиками против мягких целей, его самым большим недостатком являются огромные размеры и стоимость, что делает его слишком громоздким для установки в большинстве транспортных средств, специально не предназначенных для его перевозки."
 tank_super_heavy_cannon: "Сверхтяжелая пушка"
 tank_super_heavy_cannon_desc: "Невероятно большое оружие с непревзойденными характеристиками. Есть очень мало вещей, которые это оружие не может уничтожить, и никому из них нечего стрелять по танку."
 tank_close_support_gun: "Пистолет ближней поддержки"
 tank_close_support_gun_desc: "Стрелковое оружие, предназначенное для стрельбы осколочно-фугасными снарядами по полевым укреплениям противника с целью помощи пехоте в атаке. Несмотря на то, что он способен поражать танки, его короткий ствол и ограниченный боезапас не позволяют ему бороться с более мощными танками противника."
 tank_radio_1: "Базовое радио"
 tank_radio_1_desc: "Базовая двусторонняя радиосвязь позволяет танкам координировать свои тактические маневры в небольших масштабах."
 tank_radio_2: "Улучшенное радио"
 tank_radio_2_desc: "Усовершенствованная радиосвязь позволяет командирам эффективно контролировать более крупные соединения танков, позволяя проводить крупномасштабные оперативные маневры."
 tank_radio_3: "Расширенное радио"
 tank_radio_3_desc: "Благодаря более мощному передатчику и лучшему приему эта радиостанция обеспечивает связь на десятки километров и в условиях помех противника."
 amphibious_drive: "Амфибийный драйв"
 amphibious_drive_desc: "Набор плавучих устройств и небольшой винт позволяют быстро подготовить этот танк для перемещения по воде с корабля на берег или через реку."
 secondary_turret_hmg: "Тяжелый пулемет"
 secondary_turret_hmg_desc: "Крупнокалиберный пулемет в дополнительной башне. Расположение башни ограничивает сектор обстрела, снижая общую эффективность орудия, но позволяет танку поражать больше целей. Это особенно полезно во время атаки."
 secondary_turret_small_cannon: "Маленькая Пушка"
 secondary_turret_small_cannon_desc: "Небольшая пушка во вторичной башне. Расположение башни ограничивает сектор обстрела, снижая общую эффективность орудия, но позволяет танку поражать больше целей. Это особенно полезно во время атаки."
 secondary_turret_close_support_gun: "Пистолет ближней поддержки"
 secondary_turret_close_support_gun_desc: "Орудие непосредственной поддержки во вспомогательной башне. Расположение башни ограничивает сектор обстрела, снижая общую эффективность орудия, но позволяет танку поражать больше целей. Это особенно полезно во время атаки."
 sloped_armor: "Наклонная броня"
 sloped_armor_desc: "Броня, расположенная под углом к ​​летящему снаряду, имеет гораздо большую эффективную толщину, чем такое же количество брони, расположенное вертикально. Это также увеличивает вероятность того, что снаряд просто безвредно отскочит. Однако для этого требуется, чтобы весь бак был спроектирован вокруг него, что усложняет сборку машины."
 stabilizer: "Стабилизатор"
 stabilizer_desc: "Механическое устройство, удерживающее орудие в одном направлении при движении танка. Хотя он и не достаточно усовершенствован, чтобы обеспечить точную стрельбу на ходу, он позволяет наводчику вести точный огонь во время короткой остановки без необходимости повторного обнаружения цели."
 smoke_launchers: "Дымовые пусковые установки"
 smoke_launchers_desc: "Батарея пиротехнических устройств, которые можно активировать изнутри танка, чтобы создать густое облако дыма, скрывающее танк. Очень полезно при обороне или после попадания в засаду."
 extra_ammo_storage: "Дополнительное хранилище боеприпасов"
 extra_ammo_storage_desc: "Дополнительные стеллажи с боекомплектом позволяют танку значительно дольше оставаться в бою без пополнения запасов. Однако если броня будет пробита, результаты, скорее всего, будут катастрофическими. Это особенно проблематично при атаке."
 wet_ammo_storage: "Влажное хранение боеприпасов"
 wet_ammo_storage_desc: "Водяные рубашки, установленные на боеукладках, резко снижают риск взрыва боеприпасов после попадания в танк, что очень ценят экипажи."
 armor_tech_1_tt: "Включает значения улучшения брони 5 и выше."
 armor_tech_2_tt: "Включает значения улучшения брони 10 и выше."
