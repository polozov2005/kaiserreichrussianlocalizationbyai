 medium_tank_flame_chassis_desc: "Машина среднего размера с огнеметом в башне для атаки укреплений и домов."
 medium_tank_flame_chassis_1: "Базовый средний огнеметный танк"
 medium_tank_flame_chassis_2: "Улучшенный средний огнеметный танк"
