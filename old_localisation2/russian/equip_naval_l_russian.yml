l_russian:
 naval_equipment: "Корабли"
  
 ship_hull_submarine_1_desc: "Первые подводные военные корабли, действительно способные к эффективным боевым действиям, эти конструкции представляют собой значительные усовершенствования по сравнению со своими предшественниками. Благодаря тому, что дизель-электрические двигатели заменили преимущественно бензино-электрические двигатели первых подводных лодок, они значительно увеличили дальность полета и надводную скорость по сравнению со своими предшественниками. В бою с военными кораблями противника они действуют в основном как легкие погружные торпедные катера, но им не хватает скорости и выносливости в подводном положении, чтобы оставаться под водой более чем относительно короткие периоды времени. Это подводные лодки, которые использовались крупнейшими военно-морскими державами во время Вельткрига."
 ship_hull_submarine_2_desc: "В результате эволюции более ранних конструкций подводных лодок некоторые из этих военных кораблей развили идеи «крейсерских» подводных лодок, с более крупными орудиями и большим упором на надводные возможности, в то время как другие смотрят в другом направлении, стремясь увеличить подводные возможности и характеристики."
 ship_hull_submarine_3_desc: "Достижения, достигнутые некоторыми более ранними проектами в увеличении дальности подводного плавания, скорости и общих возможностей, привели к повороту в разработке подводных лодок от «крейсерских» типов к судам с большим упором на подводные возможности. Эти подводные лодки, значительно улучшенные по сравнению с предыдущими типами, несут мощную торпедную нагрузку и представляют реальную угрозу практически для всех надводных кораблей. Однако они по-прежнему ограничены по продолжительности, дальности и скорости подводного плавания и остаются уязвимыми при надводном положении, особенно для самолетов."
 ship_hull_submarine_4_desc: "Благодаря значительно увеличенной емкости аккумуляторов, усовершенствованным системам освежения воздуха во время погружения и усовершенствованной конструкции, это первые подводные лодки, способные оставаться под водой большую часть времени своего пребывания в море. Таким образом, они знаменуют собой масштабный сдвиг в военно-морской войне и превращение подводных лодок в настоящие ужасы. Такие военные корабли дают возможность доминировать в океанах тем странам, которые их разработали и развернули."
  
 ship_hull_light_1_desc: "Мировая война породила новый спрос на эсминцы: они не только должны были защищать свой флот, но и были вынуждены защищать судоходные линии Антанты. Чтобы удовлетворить эту потребность, конструкции эсминцев были оптимизированы и запущены в серийное производство, чтобы удовлетворить спрос. Корабли этой эпохи обычно весят 1000 тонн и развивают максимальную скорость 34 узла, неся при этом пару торпед большего размера, чем их предшественники."
 ship_hull_light_2_desc: "К 1935 году, когда на вооружение поступали все более мощные конструкции новых самолетов, а также несколько военно-морских сил развернули больше авианосцев, хотя все еще существовали некоторые сомнения в том, насколько полезны авианосцы будут в открытой войне, беспокойство по поводу потенциальной угрозы, которую самолеты могли представлять для военных кораблей, росло. Операции немецкого авианосца во время китайской интервенции и продолжающиеся британские учения показали миру, что авианосец имеет свою цель на флоте. В результате на эсминцах появилось основное вооружение двойного назначения, что дало эсминцу значительно улучшенную зенитную роль, что снова увеличило их полезность. Эти корабли водоизмещением до 2500 тонн часто несут увеличенную торпедную нагрузку, чтобы компенсировать уменьшенную торпедную нагрузку на более современных крейсерах."
 ship_hull_light_3_desc: "С началом Второго Вельткрига военно-морским силам мира потребовались дешевые зенитные платформы. Успех авианосных боев показал миру, что они подходят не только для разведки и борьбы с авианосцами, но и необходимы для современной войны против крупных кораблей. Передовые противолодочные технологии также играют важную роль в борьбе с основной угрозой для операций конвоев, они и зенитные платформы усилили требования к большему количеству эсминцев. В то время как раньше инвестиции в эсминцы снижались в пользу крейсеров и новых линейных крейсеров, эсминцы начинают возвращаться на первый план как неотъемлемая часть как флота, так и системы конвоев. Часто они не крупнее своих предшественников, но гораздо более продвинуты в технологическом отношении, в основном имеют палубы заподлицо и гораздо более мощное торпедное вооружение."
 ship_hull_light_4_desc: "Ближе к концу Второго Вельткрига военно-морские силы мира были вынуждены адаптироваться к новым подводным лодкам, которые могли оставаться под водой в течение почти неопределенного периода времени, авианосцам, нагруженным самолетами, более чем способными уничтожить крупные корабли, а большие артиллерийские крейсеры быстро стали ненужными перед лицом авианосцев и подводных лодок. В умах большинства военно-морских теоретиков будущую роль эскорта флота берут на себя почти исключительно эсминцы, а скорострельные турели двойного назначения уничтожают любые самолеты, которые осмелятся пересечь его путь в попытке бомбить его с пикирования. Водоизмещение этих кораблей также было увеличено, часто доходя до 3000 тонн, поскольку конструкторы загружали их все большим количеством зенитного вооружения, а также большего количества основных орудий."
  
 ship_hull_cruiser_1_desc: "Улучшение качества брони и развитие паротурбинных двигателей привели к появлению легких броненосных крейсеров. Эти конструкции, более быстрые и лучше защищенные, чем защищенные крейсеры, пришли на смену им в 1910-х годах. Хотя они легче и меньше других современных кораблей, они по-прежнему остаются настоящими крейсерами, сохраняя расширенный радиус действия и самодостаточность, позволяющую действовать независимо по всему миру."
 ship_hull_cruiser_2_desc: "В межвоенный период были усовершенствованы более крупные крейсеры, появившиеся после Гонок дредноутов. Поскольку политика и финансы по-прежнему ограничивают многие военно-морские державы, выпускаемые модели лишь незначительно больше по размеру, чем предыдущее поколение, вместо этого наблюдается повышение огневой мощи за счет использования более крупных орудий или растущего внедрения тройных башен и счетверенных торпедных аппаратов. Растущее значение авиации в войне на море также привело к принятию на вооружение высокоугольных установок двойного назначения, дополненных растущим набором автопушек."
 ship_hull_cruiser_3_desc: "Благодаря возросшему финансированию новые крейсеры, построенные в конце межвоенного периода и начале Второго Вельткрига, вновь немного увеличились в размерах. Хотя калибр основного вооружения снова остался неизменным, за некоторыми исключениями, их огневая мощь была дополнительно увеличена за счет добавления дополнительной башни или увеличения количества орудий в каждой башне. Вспомогательное вооружение было модернизировано за счет дополнительных спаренных орудий двойного назначения и еще более специализированного зенитного вооружения, часто связанного с улучшенным управлением огнем. В этом поколении также наблюдается растущее внедрение радиолокационных систем на крейсерах."
 ship_hull_cruiser_4_desc: "Крейсеры позднего и раннего послевоенного периода остаются похожими на крейсеры начала войны, но при этом учитывают многочисленные уроки, извлеченные на протяжении всей войны. Поскольку самолеты оказались одной из самых больших угроз для кораблей, конструкторы сосредоточились на дальнейшем улучшении возможностей ПВО за счет улучшения управления огнем и улучшения координации между батареями и радаром. Некоторые военно-морские силы также экспериментируют с механизмами самозарядки основного вооружения, значительно повышая их скорострельность."
  
 ship_hull_heavy_1_desc: "Эти классы, разработанные незадолго до начала Вельткрига и завершенные в то время, когда он бушевал, представляют собой высший уровень развития военно-морского флота до начала этого конфликта. Они были ведущими военными кораблями флота в войне и сохраняют свою мощь еще долгое время после ее окончания. Хотя они заметно быстрее, чем предшествующие им дредноуты, их наиболее заметной отличительной особенностью является расширенное вооружение: они несут от восьми до десяти основных орудий, большинство из которых расположены в сдвоенных башнях, но некоторые - в новых тройных башнях. Их разрушительная огневая мощь и тяжелая броня гарантировали, что они окажутся в центре своих боевых флотов в Вельткриге, но за это продолжающееся продвижение пришлось платить быстро растущую цену. Даже в большей степени, чем военные корабли до них, эти классы требовали огромных инвестиций, хотя они были лишь тенью того, что должно было произойти."
 ship_hull_heavy_2_desc: "Окончание «Гонки дредноутов» привело к тому, что крупномасштабное военно-морское строительство в значительной степени прекратилось, а финансирование военно-морского флота, которое выросло до огромного уровня в период до 1925 года, наконец, рухнуло. «Великие державы» потратили следующее десятилетие на медленное завершение строительства уже строящихся кораблей, сосредоточив при этом разработку на меньших кораблях, которым было легче ускользнуть от военно-морских бюджетов. Лишь в начале 30-х годов великие державы начали экспериментировать с конструкциями быстрых линкоров. Эти конструкции линкоров гораздо более современны, с улучшенными дальномерами, мощными масляными двигателями и 16–18-дюймовыми орудиями, но, как правило, являются итеративными, ориентированными больше на создание мощного корабля по лучшей цене, а не на радикальное улучшение по сравнению со своими предшественниками."
 ship_hull_heavy_3_desc: "В преддверии Второго Вельткрига, а международная напряженность высока как никогда, конструкторы стремятся построить новое поколение кораблей для участия в предстоящей войне. В то время как некоторые страны перенесли свои военно-морские надежды на авианосцы, другие по-прежнему настаивают на том, что авианосец может выполнять лишь дополнительную роль, а не заменять основную роль линкора, направленную против капитального корабля. Вместо этого эти страны переоснащают свои новые конструкции, уделяя особое внимание улучшенной компоновке брони и более эффективным орудиям и башням, а также улучшенной скорости."
 ship_hull_heavy_4_desc: "К концу Второго Вельткрига великие державы начали понимать: военно-морская авиация одержала победу над всеми артиллерийскими крупными кораблями. Однако некоторые страны продолжают развивать линкоры в качестве платформ для береговых бомбардировок, престижных проектов и поддержки авианосцев внутри флота или даже пытаются продвигать свою старую роль. Некоторые конструкторы загружают свои линкоры зенитными батареями, чтобы повысить шансы на выживание. Хотя многие из этих линкоров могут продолжать эксплуатироваться в течение многих лет, некоторые страны уже считают их устаревшими."
  
 ship_hull_carrier_conversion_ca_desc: "Научившись опыту использования тендеров на гидросамолеты, военно-морские силы, у которых были для этого ресурсы, начали работу над следующим поколением кораблей, которые могли бы нести самолеты в море. В отличие от своих предшественников, эти авианосцы имеют кабины экипажа, позволяющие самолетам как взлетать с них, так и затем возвращаться и приземляться на них. Переоборудованные из гражданских кораблей и тендеров на гидросамолеты, большинство этих кораблей ограничены относительно тесными летными палубами и ангарами, но они определенно демонстрируют, что корабли способны эффективно управлять авиационным составом на море."
 ship_hull_carrier_1_desc: "Разработанные в 30-х годах, эти корабли предназначены для обеспечения воздушной разведки и прикрытия легких истребителей флотов, в первую очередь ориентированных на более «обычные» военные корабельные силы. Их дальность значительно увеличена, и были предприняты усилия, чтобы сделать их достаточно быстрыми, чтобы не отставать от флотов, работающих на полной скорости в открытом океане."
 ship_hull_carrier_2_desc: "Поскольку крупные морские боевые операции в эпоху морской авиации продемонстрировали способность авиации серьезно влиять на сражения на море, многие державы отстали в развитии своих авианосных сил. Хотя авианосцы быстро оказываются самыми мощными из своих собратьев, они также представляют собой массивные корабли, для постройки которых требуется много времени и большое количество ресурсов. Стремясь увеличить свои возможности по переброске авиации в океаны, военно-морские державы обратились к подобным проектам, увеличенным версиям существующих более легких авианосцев, чтобы попытаться быстро укрепить возможности своей морской авиации."
 ship_hull_carrier_3_desc: "Продолжающееся развитие конструкции авианосцев привело к созданию гораздо более крупных моделей. Эти корабли приближаются по размеру к первым авианосцам флота, в то же время вбирая в себя все конструктивные улучшения, внесенные за прошедшие годы. Большинство из них обладают значительной броневой защитой и мощной зенитной огневой мощью, а также обладают высокой механической надежностью. Однако они отказались от концепции вторичного вооружения большого калибра в обмен на меньшие орудия двойного назначения."
  
 ship_hull_super_heavy_1_desc: "Быстрый рост ресурсов, выделяемых на военно-морское строительство после окончания крупного сухопутного конфликта во время Вельткрига, первоначально привел к появлению этих проектов, которые положили начало тенденции к внезапному росту размеров, огневой мощи, брони, калибра и, конечно же, стоимости. Такие суда отличают ведущие военно-морские державы мира от простых претендентов на величие, но у них есть свои проблемы; их быстрое развитие и поспешное строительство привели к конструктивным недостаткам и постоянным механическим проблемам. Эти конструкции вооружены восемью-десятью 18-дюймовыми или эквивалентными основными орудиями и имеют защиту, позволяющую конкурировать с кораблями с аналогичным вооружением. Когда Гонка Дредноутов достигла своего апогея, были задуманы эти настоящие монстры. Они намного превосходят по размеру и огневой мощи все, что было раньше, их стоимость ошеломляет, и лишь немногие страны могут позволить себе даже подумать о их строительстве."
  
 ship_hull_light_1: "Межвоенный легкий корабль"
 ship_hull_light_2: "Базовый легкий корабль"
 ship_hull_light_3: "Улучшенный легкий корабль"
 ship_hull_light_4: "Усовершенствованный легкий корабль"
  
 ship_hull_cruiser: "Крейсер"
 ship_hull_cruiser_desc: "Средний скрининговый сосуд. Его основная задача — защищать крупные корабли от легких кораблей противника, но он также может выпускать мощные торпеды, которые могут повредить более крупные корабли."
 ship_hull_cruiser_1: "Межвоенный крейсер"
 ship_hull_cruiser_2: "Базовый крейсер"
 ship_hull_cruiser_3: "Улучшенный крейсер"
 ship_hull_cruiser_4: "Продвинутый крейсер"
  
 ship_hull_heavy: "Тяжелый корабль"
 ship_hull_heavy_desc: "Эти массивные, тяжелобронированные гиганты, являющиеся высшим символом военно-морской мощи, такие как линейные крейсеры, линкоры и даже дредноуты, по-прежнему пользуются уважением в открытом море, хотя некоторые эксперты подвергают сомнению их роль в эпоху самолетов и подводных лодок."
 ship_hull_heavy_1: "Межвоенный тяжелый корабль"
 ship_hull_heavy_2: "Базовый тяжелый корабль"
 ship_hull_heavy_3: "Улучшенный тяжелый корабль"
 ship_hull_heavy_4: "Усовершенствованный тяжелый корабль"
  
 ship_hull_heavy_modern: "Современный линкор"
  
 ship_hull_carrier: "Перевозчик"
 ship_hull_carrier_desc: "Крупный корабль, способный нести в бою крылья мощных авианосных самолетов. Также полезен в качестве плавучего аэродрома, который можно расположить у берегов врага."
 ship_hull_carrier_conversion_bb: "Переоборудованный линкор"
 ship_hull_carrier_conversion_bb_desc: "Первые крупные авианосцы. Эти корабли в основном построены на корпусах, которые изначально предназначались для крупных военных кораблей, но по разным причинам были переоборудованы и достроены в авианосцы. Лишь немногие военно-морские силы построили такие корабли, и их конструкции сильно различались; вместимость их самолетов варьировалась от шестидесяти до более сотни. Однако есть константы, такие как сохраненные тяжелобронированные пояса и другие особенности артиллерийского корабля. Полуэкспериментальные и ненадежные, они по-прежнему остаются невероятно грозным оружием и заложили основу для следующих поколений авианосцев."
 ship_hull_carrier_conversion_ca: "Переоборудованный крейсер"
 ship_hull_carrier_1: "Базовый перевозчик"
 ship_hull_carrier_2: "Улучшенный перевозчик"
 ship_hull_carrier_3: "Продвинутый перевозчик"
  
 ship_hull_carrier_modern: "Современный перевозчик"
 ship_hull_carrier_modern_desc: "Крупнейшие и совершеннейшие авианосцы, способные использовать новейшие технологии, оборудование и достижения. Они являются воплощением «современного» вооружения."
  
 ship_hull_submarine: "Подводная лодка"
 ship_hull_submarine_desc: "Современная подводная лодка, далекая от примитивных лодок времен Великой войны, более эффективна, чем когда-либо прежде, и может угрожать даже самому большому кораблю за очень умеренную цену."
 ship_hull_submarine_1: "Межвоенная подводная лодка"
 ship_hull_submarine_2: "Базовая подводная лодка"
 ship_hull_submarine_3: "Улучшенная подводная лодка"
 ship_hull_submarine_4: "Продвинутая подводная лодка"
  
 ship_hull_pre_dreadnought: "До Дредноута"
 ship_hull_pre_dreadnought_desc: "Следуя конструкции британского класса Majestic конца 1890-х годов, линкоры до дредноута заменили броненосные линкоры 1870-х и 1880-х годов. Построенные из стали и защищенные закаленной стальной броней, линкоры до дредноута несут главную батарею очень тяжелых орудий в барбетах, поддерживаемую одной или несколькими вспомогательными батареями более легкого оружия.\n\nПоскольку конструкция «Дредноут» сделала их устаревшими еще до Вельткрига, а также гигантский рост числа конструкций на базе дредноутов в предыдущие три десятилетия, лишь немногие из них все еще находятся в эксплуатации."
 ship_hull_armoured_cruiser: "Бронированный крейсер"
 ship_hull_armoured_cruiser_desc: "Сразу после Вельткрига все великие военно-морские державы начали проектировать новое поколение еще более мощных линкоров, в которых линейные крейсеры должны были играть роль «быстрых линкоров». Их конструкция была задумана как промежуточный класс, с орудиями и дальностью стрельбы, позволяющими сражаться со старыми линкорами на их собственных условиях, а также со скоростью, позволяющей преследовать более легкие крейсеры и уходить от более современных линкоров, одолеть которые у них нет шансов. При первых попытках это сделать немецкие инженеры сделали практически невозможное и сумели соединить вооружение почти линкорного уровня с корпусом крейсера. В результате получился корабль, превосходящий по вооружению любой другой известный крейсер, но при этом дорогой, сравнительно медленный и относительно плохо бронированный. Эти корабли, принятые многими странами в качестве новых «броненосных крейсеров», являются самыми тяжелыми кораблями досмотра, которые когда-либо видел мир."
 ship_hull_cruiser_coastal_defense_ship: "Корабль береговой обороны"
 ship_hull_cruiser_coastal_defense_ship_desc: "Корабли береговой обороны — это небольшие военные корабли, часто размером с крейсер, которые пожертвовали скоростью и дальностью действия ради брони и вооружения. Они обычно привлекательны для стран, которые либо не могут позволить себе полноразмерные линкоры, либо могут довольствоваться специально спроектированными мелкосидящими судами, способными вести прибрежные операции вблизи своих берегов."
 ship_hull_torpedo_cruiser: "Торпедный крейсер"
 ship_hull_torpedo_cruiser_desc: "Основываясь на доктрине Jeune École («Молодая школа»), согласно которой небольшие военные корабли, вооруженные торпедами, могут эффективно и дешево побеждать гораздо более крупные линкоры, эти крейсеры в основном вооружены торпедами. Большинство торпедных крейсеров потеряли популярность у большинства военно-морских сил в 1890-х годах, хотя многие другие флоты продолжали приобретать их до начала 1900-х годов. Современные торпедные крейсера предназначены для использования торпед, которые подводные лодки не могут нести."
 ship_hull_super_heavy_1: "Дредноут"
 ship_hull_cruiser_submarine: "Крейсерская подводная лодка"
 ship_hull_cruiser_submarine_desc: "Эти подводные лодки, значительно крупнее предыдущих, относятся к «крейсерскому» типу, предназначены для независимых операций на дальних дистанциях при торговых рейдах и предназначены для лучшего оснащения для ведения боя с легкими военными кораблями противника в надводном положении. Таким образом, они несут более тяжелое артиллерийское вооружение и имеют улучшенную надводную скорость. Однако их подводные возможности остаются ограниченными."
 ship_hull_midget_submarine: "Миниатюрная подводная лодка"
 ship_hull_midget_submarine_desc: "Небольшая подводная лодка, управляемая небольшим экипажем. Его уменьшенная дальность и мощность вооружения компенсируются высокой производительностью."
 ship_hull_fleet_submarine: "Подводная лодка флота"
 ship_hull_fleet_submarine_desc: "Подводные лодки, которые благодаря большой дальности действия могут выполнять функции сопровождения и поддержки надводного флота."
 ship_hull_carrier_submarine: "Подводный авианосец"
 ship_hull_carrier_submarine_desc: "Большой корпус подводной лодки, в котором могут размещаться и запускаться самолеты, способные выполнять различные воздушные задачи."
 ship_hull_nuclear_submarine: "Атомная подводная лодка"
 ship_hull_nuclear_submarine_desc: "Благодаря ядерным реакторам наши подводные лодки могут очень долго работать под водой, сохраняя при этом высокую скорость, что делает их чрезвычайно смертоносным инструментом в нашем арсенале."
 ship_hull_mega_carrier: "Ледяной перевозчик"
 ship_hull_mega_carrier_desc: "Гигантский авианосец, созданный из экспериментальных ледяных композитов типа Пайкрита, позволяющий летать на нем обычным самолетам, увеличивая дальность действия нашей морской авиации."
 support_ship_hull: "Корабль поддержки"
 support_ship: "Корабль поддержки"
 support_ship_1: "Корабль поддержки"
 support_ship_1_desc: "Корабли поддержки — это небоевые суда, предназначенные для материально-технической поддержки боевого флота, увеличивающие боевую выносливость за счет резервных запасов топлива и припасов."
 support_ship_2: "Улучшенный корабль поддержки"
 support_ship_2_desc: "Опыт эксплуатации позволяет создать более совершенный и способный корабль поддержки, способный поддерживать боевой флот на еще больших расстояниях."
 repair_ship_hull: "Ремонтный корабль"
 repair_ship: "Ремонтный корабль"
 repair_ship_1: "Ремонтный корабль"
 repair_ship_1_desc: "Ремонтные корабли оснащены сверхмощным восстановительным оборудованием, которое может означать разницу между сильно поврежденным кораблем, способным хромать обратно в порт, и затонувшим."
 repair_ship_2: "Улучшенный ремонтный корабль"
 repair_ship_2_desc: "Еще более мощный ремонтный корабль с самым современным оборудованием, способным спасти дружественные военные корабли от любых повреждений, кроме самых серьезных."
 ship_hull_escort_carrier: "Эскорт-перевозчик"
 ship_hull_escort_carrier_desc: "Меньший по размеру и более дешевый авианосец, обычно используемый для сопровождения конвоев и противолодочной борьбы, а не для прямых действий флота. Он несет небольшую, но полезную авиагруппу."
  
 screen_ship: "Экраны"
 capital_ship: "Капитальные корабли"
