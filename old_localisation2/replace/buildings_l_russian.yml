 ######################################################## 
 ### KEEP THESE IN THE SAME ORDER AS THE VANILLA FILE ### 
 ######################################################## 
  
 landmark_statue_of_liberty: "Статуя Свободы"
 landmark_statue_of_liberty_plural: "$landmark_statue_of_liberty$"
 landmark_statue_of_liberty_desc: "§LКолоссальная Статуя Свободы гордо возвышается в гавани Нью-Йорка, главном пункте въезда в Соединенные Штаты для иммигрантов, желающих начать новую жизнь. Впоследствии он стал олицетворением американского идеала жизни, свободы и стремления к счастью.§!" #NT!
  
 landmark_big_ben: "Вестминстерский дворец" #NT!
 landmark_big_ben_plural: "$landmark_big_ben$"
 landmark_big_ben_desc: "§LВестминстерский дворец стоит на северном берегу реки Темзы в Лондоне. Первоначально он был построен в одиннадцатом веке и тщательно перестраивался в последующие столетия. На протяжении веков он служил резиденцией британского парламента и центром государственного управления при монархии. С момента создания республиканского правительства в 1925 году дворец был приспособлен для использования в качестве музея, а также для общественных и гражданских функций, сочетая сохранение исторической архитектуры с современными административными и выставочными целями.§!" #NT!
  
 landmark_colosseum: "Колизей"
 landmark_colosseum_plural: "$landmark_colosseum$"
 landmark_colosseum_desc: "§LКолизей находится в центре Рима. Это самый большой древний амфитеатр, когда-либо построенный, который использовался римлянами и жителями города после падения римлян для развлечений с момента его завершения императором Титом.§!" #NT!
  
 landmark_cristo_redentor: "Статуя Христа-Искупителя"
 landmark_cristo_redentor_plural: "$landmark_cristo_redentor$"
 landmark_cristo_redentor_desc: "§LХристос-Искупитель возвышается над Рио-де-Жанейро, его строительство было завершено в 1931 году. Это национальный символ Бразилии и имеет большое значение среди католиков региона.§!" #NT!
  
 landmark_eiffel_tower: "Эйфелева башня"
 landmark_eiffel_tower_plural: "$landmark_eiffel_tower$"
 landmark_eiffel_tower_desc: "§LЭйфелева башня названа в честь своего создателя Гюстава Эйфеля и была построена в 1889 году. Расположенная на Марсовом поле в Париже, Железная леди стала мировой культурной иконой Франции и символом национальной гордости.§!" #NT!
  
 landmark_kremlin: "Московский Кремль"
 landmark_kremlin_plural: "$landmark_kremlin$"
 landmark_kremlin_desc: "§LМосковский Кремль — укрепленный комплекс. На территории комплекса находится Большой Кремлевский дворец, бывшая императорская резиденция Императора России и нынешняя резиденция российского парламента. Кремль выходит на Москву-реку на юге, собор Василия Блаженного и Красную площадь на востоке и Александровский сад на западе.§!" #NT!
  
 landmark_berlin_reichstag: "Рейхстаг"
 landmark_berlin_reichstag_plural: "$landmark_berlin_reichstag$"
 landmark_berlin_reichstag_desc: "§LPlenarbereich Reichstagsgebäude, также известный как Рейхстаг, — историческое здание законодательного правительства на Кёнигсплац в Берлине. Это символическое здание, которое имеет большое значение в сердцах и умах людей.§!" #NT!
  
 landmark_hofburg_palace: "Хофбург"
 landmark_hofburg_palace_plural: "$landmark_hofburg_palace$"
 landmark_hofburg_palace_desc: "§LХофбург — главный императорский дворец династии Габсбургов, обращенный к Хельденплац, Фольксгартену, а за ним — к Парламенту и Венской ратуше. Это сердце Габсбургской монархии, окруженное множеством парков.§!" #NT!
  
 landmark_sadabad_complex: "Саадабадский комплекс"
 landmark_sadabad_complex_plural: "$landmark_sadabad_complex$" #NT!
 landmark_sadabad_complex_desc: "§LПостроенный династией Каджаров комплекс Саадабад на севере Тегерана служит королевской резиденцией и центром власти. Его дворцы и сады отражают меняющийся политический ландшафт Персии: от консерватизма к модернизму.§!" #NT!
  
 landmark_taj_mahal: "Тадж-Махал"
 landmark_taj_mahal_plural: "$landmark_taj_mahal$" #NT!
 landmark_taj_mahal_desc: "§LТадж-Махал – шедевр архитектуры Великих Моголов. Его величественные белые мраморные купола и замысловатые сады делают его одним из самых знаковых символов Индии, свидетельством имперской власти и непреходящего наследия.§!" #NT!
  
 landmark_hagia_sophia: "Айя-София"
 landmark_hagia_sophia_plural: "$landmark_hagia_sophia$" #NT!
 landmark_hagia_sophia_desc: "§LСтоя на перекрестке империй, собор Святой Софии был византийским собором, османской мечетью и символом постоянно меняющихся правителей Константинополя. Его массивный купол и большие залы отражают как его духовное значение, так и амбиции тех, кто провозгласил город своим.§!" #NT!
  
 landmark_nanjing_presidential_palace: "Президентский дворец в Нанкине"
 landmark_nanjing_presidential_palace_plural: "$landmark_nanjing_presidential_palace$"
 landmark_nanjing_presidential_palace_desc: "§LПрезидентский дворец в Нанкине — исторический комплекс, долгое время связанный с китайским управлением. После падения династии Цин он некоторое время служил национальной резиденцией правительства, но политическая власть перешла к Пекину, и впоследствии дворец продолжал служить офисом губернатора провинции.§!" #NT!
  
 landmark_forbidden_city: "Запретный город"
 landmark_forbidden_city_plural: "$landmark_forbidden_city$"
 landmark_forbidden_city_desc: "§LЗапретный город в Пекине, историческая резиденция императорской власти, занимал центральное место в системе управления Китаем со времен династии Мин. После полутора десятилетий республиканского правления император Цин возобновил свою резиденцию в 1927 году.§!" #NT!
  
 landmark_great_wall_section: "Великая стена"
 landmark_great_wall_section_plural: "$landmark_great_wall_section$"
 landmark_great_wall_section_desc: "§LВеликая китайская стена, построенная на протяжении сотен лет и десятков администраций, является шедевром логистики. Сегодня можно сказать, что это символ великого мужества и неповиновения китайского народа перед лицом невзгод.§!" #NT!
  
 landmark_tokyo_imperial_palace: "Императорский дворец"
 landmark_tokyo_imperial_palace_plural: "$landmark_tokyo_imperial_palace$"
 landmark_tokyo_imperial_palace_desc: "§LИмператорский дворец в Токио является главной резиденцией Императора со времен Реставрации Мэйдзи и свержения последнего сёгуната. Это символ гордости и почтения японцев, вдохновляющий их на упорный труд.§!" #NT!
  
 landmark_national_diet: "Здание национального парламента"
 landmark_national_diet_plural: "$landmark_national_diet$"
 landmark_national_diet_desc: "§LКоккай-гидзидо — это здание, где встречаются обе палаты Национального парламента Японии. Завершенный в начале 1936 года, он почти полностью построен из японских материалов, за некоторыми исключениями. Его предшественник был разрушен в 1925 году, когда этот район опустошил еще один пожар. Хотя здание диеты много раз падало, на этот раз оно наверняка простоит века!§!" #NT!
  
 landmark_hakko_ichiu: "Монумент «Хакко итиу»"
 landmark_hakko_ichiu_plural: "$landmark_hakko_ichiu$"
 landmark_hakko_ichiu_desc: "§LБашня Хакко Итиу была построена в ознаменование 2600-летия основания Японии и как памятник, символизирующий судьбу Японии по объединению восьми уголков мира под одной крышей.§!" #NT!
  
