  #country_l_english 
 ARMY_EXPERIENCE_DESC: "Когда ваше снаряжение используется в бою, вы получаете армейский опыт. Это означает, что вы можете получить армейский опыт, когда ваш §HDivisions§! вступить в бой или если вы отправили §H$lend_lease_string_caps$§! в войнах ваших союзников.\nВы также получаете опыт, проводя §HАрмейские учения§! с войсками уровня не ниже $UNIT_TRAINING_LEVEL|Y$ и выполняя определенные §HНациональные фокусы§!. Некоторые §HМинистры§! могут увеличивать получаемый опыт.\n\nАрмейский опыт необходим для создания и изменения ваших §HШаблонов дивизий§!." #NT!
 AIR_EXPERIENCE_DESC: "Когда ваш самолет вступает в бой с противником в миссиях или тренируется в §HУчениях пилотов§!, вы получаете Опыт полета. Это означает, что вы можете получить опыт в воздухе, когда ваши §HВоздушные Крылья§! участвуют в бою или если вы отправили §H$lend_lease_string_caps$§! в войны своих союзников.\nОпределенные §HНациональные фокусы§! дают дополнительный опыт, а некоторые §HМинистры§! могут увеличить получаемый опыт.\n\nВоздух Опыт используется для разработки лучших вариантов существующих самолетов." #NT!
  
