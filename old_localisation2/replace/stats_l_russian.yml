 #changed to British spelling 
 STAT_COMMON_MAX_ORG: "Организация:" #NT!
 STAT_COMMON_MAX_ORG_DESC: "Организация указывает на боеготовность и организованность подразделения. Подразделение без организации не может эффективно сражаться или двигаться." #NT!
 STAT_ARMY_DEFAULT_MORALE_DESC: "Сколько дополнительной организованности можно восстановить ежечасно, когда не в бою." #NT!
 STAT_ARMY_DEFENSE: "Защита:" #NT!
 STAT_ARMY_BREAKTHROUGH_DESC: "Сколько вражеских атак отряд может попытаться избежать во время наступления, что позволяет ему дольше оставаться в наступлении." #NT!
 STAT_ARMY_HARDNESS_DESC: "§T§HHardness§! показывает, какая часть вашей §HДивизии§! состоит из бронетехники или, по крайней мере, защищенной техники.\n\nПри атаке дивизия суммирует все мягкие атаки и жесткие атаки. Дивизия с высокой §HЖесткостью§! будет страдать от §HМягких атак§! меньше и больше §HЖестких атак§! - и наоборот.§!" #NT!
 STAT_NAVY_SHORE_BOMBARDMENT_DESC: "Способность подразделения проводить береговую бомбардировку, чтобы помочь в наземных сражениях, соседних с его морской провинцией, когда миссия находится в режиме удержания." #NT!
 STAT_NAVY_EVASION_DESC: "Способность кораблей уклоняться от огня противника путем маневрирования. При оценке шансов избежать поражения значение уклонения цели сравнивается с атакующим, поэтому, если у вас высокое уклонение, вы также сможете лучше поражать уклоняющиеся цели." #NT!
 STAT_AIR_DEFENCE: "ПВО:" #NT!
 STAT_ADJUSTER_DEFENCE: "Защита:" #NT!
 STAT_COMMON_ARMOR: "Броня:" #NT!
 STAT_COMMON_ARMOR_DESC: "Имея §HArmour§! это выше, чем у оппонентов §HPiercing§! Это значение позволяет вам получать меньше урона, а также позволяет выполнять больше атак в бою, поскольку юнит имеет больше свободы передвижения." #NT!
 STAT_COMMON_PIERCING_DESC: "Имея равное или большее §HPiercing§! к целям §HArmour§! значения позволяют наносить больше урона и более эффективно сковывать свои бронетанковые войска" #NT!
 STAT_COMMON_ACCLIMATIZATION_HOT_GAIN: "Коэффициент усиления горячей акклиматизации" #NT!
 STAT_COMMON_ACCLIMATIZATION_HOT_GAIN_DESC: "Скоростной агрегат акклиматизируется в теплом климате." #NT!
 STAT_COMMON_ACCLIMATIZATION_COLD_GAIN: "Коэффициент усиления адаптации к холоду" #NT!
 STAT_COMMON_ACCLIMATIZATION_COLD_GAIN_DESC: "Скоростной агрегат акклиматизируется в холодном климате." #NT!
  
 #added zero at the end for tooltip clarity 
 STAT_CARRIER_SIZE_MOD_DIFF: "$VALUE|=+0$§G0§!" #NT!
  
 #changed to British spelling 
 STAT_NAVY_AMPHIBIOUS_DEFENSE: "Десантная оборона" #NT!
 STAT_NAVY_AMPHIBIOUS_DEFENSE_DESC: "Дополнительная защита, предоставляемая подразделениям во время десантных вторжений." #NT!
