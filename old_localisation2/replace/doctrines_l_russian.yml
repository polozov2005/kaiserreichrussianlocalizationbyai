 #changed to British spelling 
 GRAND_DOCTRINE_MOBILE_WARFARE_DESC: "Ударьте их там, где они не ожидают: доктрина мобильной войны направлена ​​на то, чтобы выйти из окопного тупика Первой мировой войны с помощью агрессивных маневров, чтобы упредить и дезорганизовать противника." #NT!
 GRAND_DOCTRINE_SUPERIOR_FIREPOWER_DESC: "Отправляйте снаряды, а не людей. В Superior Firepower упор делается на использование сокрушительных масс огня, чтобы проложить путь маневренным подразделениям для продвижения и захвата территории." #NT!
 GRAND_DOCTRINE_GRAND_BATTLEPLAN_DESC: "При достаточной подготовке нет непреодолимых препятствий — Grand Battleplan характеризуется терпеливой и тщательной подготовкой всех видов оружия, как для атаки, так и для защиты." #NT!
  
 large_unit_tactics_motorization_initiative: "Инициатива по автомобилизации" #NT!
 SUBDOCTRINE_ASSAULT_INFANTRY_DESC: "Организуйте армию, используя общевойсковой подход к бою, используя штатные средства огневой поддержки, интегрированные в самую маленькую тактическую единицу." #NT!
 mounted_infantry_anti_mechanized_cavalry_groups: "Противомеханизированные кавалерийские группы" #NT!
 SUBDOCTRINE_IRREGULARS_DESC: "Асимметричный подход к пехотной войне, при котором избегают прямого боя с превосходящими силами, используя партизанскую тактику засад, неправильного направления и преследования, чтобы ослабить решимость противника." #NT!
 irregulars_improvised_officer_groups: "Импровизированные группы офицеров"
 irregulars_standardization_efforts: "Усилия по стандартизации" #NT!
 SUBDOCTRINE_FIRE_CONCENTRATION_DESC: "Централизуя контроль над средствами огневой поддержки, наша армия может сконцентрировать огневую мощь в критической точке, а не распылять ее небольшими частями." #NT!
 fire_concentration_dedicated_air_support: "Централизованная зенитная поддержка" #NT!
 SUBDOCTRINE_ANTI_TANK_FRONT_DESC: "Единый подход к противотанковой обороне на всех тактических звеньях, защита флангов прорывов своих сил и направление ударов бронетехники противника в заранее запланированные зоны поражения." #NT!
 SUBDOCTRINE_FLYING_BATTERIES_DESC: "Общеармейская инициатива по повышению мобильности вспомогательных войск, чтобы они могли идти в ногу с быстрым наступлением моторизованных сил и быстро вступать в бой в поддержку." #NT!
 flying_batteries_ballistics_corrections: "Бронированные машины передового наблюдения" #NT!
 SUBDOCTRINE_MOBILE_RECON_AND_ASSAULT_DESC: "Благодаря общевойсковому подходу, подкрепленному широкой моторизацией, мы можем использовать разведывательные подразделения для обнаружения противника и мобильные тяжелые вооружения для быстрого его разгрома." #NT!
 mobile_recon_and_assault_motorization_support: "Органическая моторизованная поставка" #NT!
 self_propelled_support_mobile_battery_management_platoons: "Мобильный центр управления огнем" #NT!
 SUBDOCTRINE_ARMORED_SPEARHEAD: "Бронированное острие" #NT!
 SUBDOCTRINE_ARMORED_SPEARHEAD_DESC: "Танк дает возможность развязать войну передвижения, а не просто на истощение. Наша доктрина должна делать упор на быстрое использование прорывов для окружения и уничтожения противника." #NT!
 SUBDOCTRINE_ARMORED_INFANTRY_SUPPORT: "Поддержка бронетанковой пехоты" #NT!
 armored_infantry_support_armored_cohorts: "Бронированные когорты" #NT!
 armored_infantry_support_mobile_armored_strongpoints: "Мобильные бронированные опорные пункты" #NT!
 SUBDOCTRINE_ARMORED_CAVALRY: "Бронированная кавалерия" #NT!
 SUBDOCTRINE_ARMORED_CAVALRY_DESC: "Механизированные силы при поддержке быстрых легких танков и бронемашин могут прощупывать слабые места и поражать противника там, где он наиболее уязвим." #NT!
 armored_cavalry_quick_response_force: "Моторизованные силы безопасности" #NT!
 armored_cavalry_speed_as_armour: "Скорость — лучшая броня"
 streamlined_deployment_flexible_armored_battalions: "Армейская механизация" #NT!
 streamlined_deployment_mechanized_wave: "Механизированная волна" #NT!
 SUBDOCTRINE_MOBILE_DEFENSE: "Мобильная защита" #NT!
 SUBDOCTRINE_MOBILE_DEFENSE_DESC: "Бронетанковые войска полезны как в защите, так и в нападении. Благодаря своей мобильности они могут быстро занять сильную оборонительную местность или занять позицию, чтобы противостоять прорыву противника." #NT!
 mobile_defense_combined_anti_armor: "Комбинированная противотанковая" #NT!
 SUBDOCTRINE_TANK_DESTROYER_FORCE_DESC: "Столкнувшись с серьезной бронетанковой угрозой противника, мы не можем рассчитывать на то, что наша первая линия обороны всегда остановит противника. Крайне важна глубокая оборона с помощью засадных противотанковых подразделений." #NT!
 SUBDOCTRINE_LAST_STAND: "Отчаянная защита" #NT!
 SUBDOCTRINE_DEEP_BATTLE_DESC: "Дальность и ударная мощь современного оружия позволяют преодолевать оборонительную систему противника, нанося по ней удары на всю глубину одновременно всеми имеющимися в нашем распоряжении средствами." #NT!
 SUBDOCTRINE_GUERILLA_WAR: "Партизанская война" #NT!
 guerilla_war_galvanize_support: "Гальванизация поддержки" #NT!
 guerilla_war_defense_of_gained_power: "Защита завоеванной власти" #NT!
 SUBDOCTRINE_PEOPLES_WAR: "Ополченцы" #NT!
 SUBDOCTRINE_PEOPLES_WAR_DESC: "Века за веком простые люди формировали ополчения для защиты своих домов и родины. Даже в эпоху современных войн санкционированные государством и организованные вооруженные формирования могут стать мощным средством сдерживания иностранного вторжения." #NT!
 SUBDOCTRINE_EXPEDITIONARY_WARFARE_DESC: "Вся боевая мощь мира мало что значит, если она не может попасть в бой. Мы сделаем организационный упор на возможности проецирования сил для достижения наших стратегических целей." #NT!
  
 DOCTRINE_TRACK_ARMOR: "Броня" #NT!
 ADVISOR_DOCTRINE_FAVOR: "$NAME|H$ поддерживает эту доктрину:" #NT!
 DOCTRINE_MONTHLY_MASTERY_GAIN_THEATER_COMMANDER: "- $LEADER_NAME|H$ (командир театра): $VALUE|+=1$" #NT!
  
 mobile_infantry_cavalry_charge: "Модернизированная кавалерия" #NT!
 mobile_infantry_maneuver_warfare: "Маневренная война" #NT!
  
 GRAND_DOCTRINE_FLEET_IN_BEING_DESC: "The Big Gun Club — традиционалистский подход к морской артиллерии и тяжелой броне, призванный сокрушить вражеский флот и утопить его в стальном шторме." #NT!
  
 SUBDOCTRINE_ARMORED_RAIDERS: "Бронированные рейдеры" #NT!
 SUBDOCTRINE_ARMORED_RAIDERS_DESC: "Сопровождение конвоев в первую очередь ориентировано на противолодочную оборону. Представьте себе их шок, когда посреди них появляется полностью вооруженный крупный корабль, словно волк среди овец." #NT!
 armored_raiders_modernized_officer_education: "Модернизированные протоколы поиска" #NT!
 SUBDOCTRINE_COASTAL_DEFENCE: "Флот береговой обороны" #NT!
 SUBDOCTRINE_COASTAL_DEFENCE_DESC: "Меньшие военные корабли, отдающие приоритет огневой мощи дальности действия и действующие вблизи дружественных берегов, могут оказаться значительным сдерживающим фактором для вражеского флота." #NT!
 coastal_defence_fleet_aging_navy: "Модернизация" #NT!
 coastal_defence_fleet_casemate_upgrades: "Модернизация вторичного вооружения" #NT!
 SUBDOCTRINE_NAVAL_GUNFIRE_SUPPORT_DESC: "Как только боевой флот противника будет нейтрализован, наши тяжелые военно-морские орудия смогут направить свой гнев на наземные цели, чтобы поддержать наши войска на берегу." #NT!
 convoy_escort_escort_reclassification: "Настойчивая защита конвоя" #NT!
 SUBDOCTRINE_SCREEN_INTEGRATED_OPERATIONS_DESC: "Силам прикрытия не хватает огневой мощи крупных кораблей, но, используя скорость в качестве брони, они могут оказать ценную услугу даже в решающем морском сражении." #NT!
 SUBDOCTRINE_SCREEN_HUNTER_KILLERS_DESC: "В то время как подводные лодки противника угрожают задушить нашу военную экономику, хорошо организованное и агрессивное сопровождение эсминцев может превратить охотника в жертву." #NT!
 SUBDOCTRINE_SCREEN_TORPEDO_PRIMACY_DESC: "Акцент на агрессивных и смелых торпедных атаках эсминцев в пользу защитного прикрытия, чтобы измотать боевую линию противника перед основным боем." #NT!
 SUBDOCTRINE_SCREEN_SUPPORT_FOCUS_DESC: "Улучшение подготовки и организации нашего корабля поддержки косвенно, но существенно укрепит наш основной боевой флот." #NT!
 SUBDOCTRINE_SCREEN_JEUNE_ECOLE_DESC: "Доктринальная концепция, в которой упор делается на стаи небольших кораблей, торпедные удары и непрямую коммерческую войну как противоядие старому представлению о крупнокалиберной схватке в открытом море." #NT!
 SUBDOCTRINE_SCREEN_PATROL_BOATS_DESC: "Дешевые быстроходные ударные корабли, вооруженные торпедами, являются мощным инструментом против традиционного боевого флота тяжелых кораблей, особенно в прибрежных водах, где они могут нанести удар из засады." #NT!
 patrol_boats_home_waters_defense: "Защита домашних вод" #NT!
 SUBDOCTRINE_CARRIER_BATTLEGROUPS_DESC: "Авианосец быстро затмевает линкор как главное военно-морское оружие нашего времени. Наши флоты должны быть сосредоточены вокруг них." #NT!
 escort_carrier_support_evasive_convoy_maneuvers: "Уклоняющиеся маневры конвоя" #NT!
 SUBDOCTRINE_BROAD_NAVAL_SUPPORT: "Общая поддержка" #NT!
 SUBDOCTRINE_BROAD_NAVAL_SUPPORT_DESC: "Обладая разведкой, превосходством в воздухе и ударными возможностями в одном пакете, авианосцы являются бесценным универсальным инструментом в руках командира оперативной группы." #NT!
 broad_naval_support_carrier_maneuvering: "Маневрирование авианосца" #NT!
 broad_naval_support_organized_support_protocols: "Протоколы организованной поддержки" #NT!
 light_task_forces_localized_sea_power: "Локализованная морская мощь" #NT!
 SUBDOCTRINE_SUBMARINE_WOLFPACKS_DESC: "Охота разошлась – ударим в унисон. Наши подводные лодки могут рассредоточиться, чтобы покрыть обширные участки океана, а затем подать сигнал друг другу о необходимости сходиться, когда будет обнаружена подходящая добыча." #NT!
 wolfpacks_improvisation: "Культура импровизации"
 wolfpacks_wolfpack_coordination: "Централизованная идентификация позывного" #NT!
 SUBDOCTRINE_SUBMARINE_COASTAL_DEFENSE: "Береговая оборона" #NT!
 submarine_coastal_defense_optimized_compartments: "Миниатюрные системы" #NT!
  
 SUBDOCTRINE_DESCRIPTION: "С помощью субдоктрины мы специализируемся и совершенствуем наш подход к ведению войны в определенной области." #NT!
  
 SUBDOCTRINE_FIGHTER_HOMELAND_DEFENSE: "Родина ПВО" #NT!
 air_subdoctrine_tactical_flexibility_combat_discipline: "Эффективная поисково-спасательная организация" #NT!
 SUBDOCTRINE_FLYING_ARTILLERY_DESC: "Универсальный подход к расстановке приоритетов ударов, поражающий возможные цели от линии фронта до оперативной глубины." #NT!
 air_subdoctrine_dive_bombers_terrifying_precision: "Систематический воздушный терроризм" #NT!
 air_subdoctrine_carrier_strikes_optimized_deck_space_usage: "Оптимизация пространства ангара" #NT!
 SUBDOCTRINE_NAVAL_STRIKE_TACTICS_DESC: "Самолеты-носители должны преодолеть строй вражеских истребителей и ПВО, чтобы доставить свою полезную нагрузку. В нашей подготовке особое внимание будет уделяться выживаемости и упорству в отражении атаки." #NT!
 air_subdoctrine_long_range_escort_mutual_air_cover: "Всесторонняя групповая защита" #NT!
 air_subdoctrine_tactical_battlefield_support_ship_hunters: "Наличие бронебойной бомбы" #NT!
 air_subdoctrine_theater_interdiction_extended_reach: "Оптимизация траектории полета" #NT!
 SUBDOCTRINE_COASTAL_AIR_PATROL_DESC: "Традиционные средства береговой обороны на уровне моря трудоемки и неэффективны. Воздушная мобильность означает, что мы можем следить за дружественными берегами и наказывать любого потенциального захватчика." #NT!
 air_subdoctrine_open_ocean_air_patrol_harbor_raids: "Портовые рейды" #NT!
