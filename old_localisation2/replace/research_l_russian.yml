 #changed to British spelling 
 heavy_armor_advice_tt: "\nМонтаж лучшего §YArmour§! Модуль на §YТяжёлых кораблях§! улучшает их способность противостоять повреждениям. §YЛинкоры§! и §YЛинейные крейсеры§! определяются разными §YСхемами бронирования§!, при этом линейные крейсеры обычно имеют худшую броню." #NT!
 basic_heavy_armor_scheme: "Схема наклонного пояса брони" #NT!
 basic_heavy_armor_scheme_desc: "Если разместить поясную броню под углом, броню того же веса и толщины будет гораздо труднее пробить.\n\nУстановка этого модуля на §YТяжелые корабли§! улучшает их способность §Yпротивостоять урону противника§!. §YЛинкоры§! и §YЛинейные крейсеры§! имеют разные §YСхемы брони§!." #NT!
 improved_heavy_armor_scheme: "Схема брони «Все или ничего»" #NT!
 improved_heavy_armor_scheme_desc: "Эта схема направлена ​​на защиту только наиболее важных частей корабля, игнорируя при этом второстепенные части.\n\nУстановка этого модуля на §YТяжелые корабли§! улучшает их способность §Yпротивостоять урону противника§!. §YЛинкоры§! и §YЛинейные крейсеры§! имеют разные §YСхемы брони§!." #NT!
  
 MOUNTAINEERS_DOCTRINE_DESC: "Сильная военная ориентация на полки, привыкшие к труднопроходимой местности, даст нам преимущество в перехитринии и подавлении наших противников." #NT!
 RANGERS_DOCTRINE_DESC: "Имея возможность действовать крупными силами в густолесистой местности, наша армия может обойти и перехитрить силы противника." #NT!
 special_forces_paratroopers_desc: "Нет ничего более устрашающего, чем небо, потемневшее от вида тысячи транспортных самолетов, заполненных солдатами. Наша доктринальная философия должна использовать преимущества шока и трепета, которые вызывают полеты в воздухе." #NT!
 ski_troops_desc: "Специалисты по холодной погоде жизненно важны для нашей тактики боя. Официально признав этих экспертов в нашей военной конституции, мы можем высвободить ресурсы и обучение, чтобы еще больше поднять их уровень." #NT!
 mountaineers_combat_1_desc: "Наши элитные силы должны сосредоточить свои усилия на удержании территорий, в которых они специализируются. Сочетание тактики засад и улучшенной полковой организации гарантирует, что наш спецназ обеспечит значительную эшелонированную защиту от сил вторжения." #NT!
 mountaineers_combat_2_desc: "Горно-артиллерийские полки — это специализированные силы, предназначенные для оперативной поддержки наших элитных дивизий на дальних дистанциях, прошедших подготовку и действовавших в труднопроходимой местности. Их наличие существенно повышает боевые возможности нашего спецназа." #NT!
 mountaineers_keystone_1_desc: "Успех наших элитных сил специального назначения требует реорганизации нашей военной философии вокруг их присутствия." #NT!
 paras_dispersed_drop_desc: "Характер наших операций требует, чтобы наши воздушно-десантные войска специализировались на высокорассредоточенных воздушных операциях, что позволяет проводить значительные диверсии еще до того, как противник узнает о нашем присутствии." #NT!
 SF_PARAS_combat_effect_tt: "Вражеских дивизий в штатах у нас §HParadrop§! в будет свой текущий §HOrganisation§! уменьшено.\n\n$PARA_EFFECT_TIMER$" #NT!
 paras_airborne_light_armor: "Воздушно-десантная броня" #NT!
 paras_bonus_1_desc: "Даже тщательно подготовленная высадка может пойти не по плану. Нужно сделать все, чтобы наши бойцы умели ориентироваться на местности."
 rangers_guerilla_doctrine: "Лесные партизаны" #NT!
 rangers_backbone_doctrine: "Специализация легкой пехоты" #NT!
  
